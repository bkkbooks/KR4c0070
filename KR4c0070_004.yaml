body:
  text: 白香山詩集卷四歙縣汪立名編長慶集四諷諭新樂府下三十首驪宫髙美天子重惜人之財力也髙髙驪山上有宫朱樓紫殿三四重遲遲兮春日玉甃暖兮溫泉溢嫋嫋兮秋風山蟬鳴兮宫樹紅翠華不來兮嵗月久牆有衣兮瓦有松吾君在位已五載何不一幸於一作乎其中西去都門幾多地吾君不遊有深意一人出兮不容易六宫從兮百司備八十一車千萬騎朝有宴飫暮有賜中人之産數百家未足充君一日費吾君修已人不知不自逸兮不自嬉吾君愛人人不識不傷財兮不傷一作奪力驪宫髙兮髙入雲君之來兮為一身君之不來兮為一本有千字萬人百鍊鏡辨皇王鑒也百鍊鏡鎔範非常規日辰置處靈且竒江心波上舟中鑄五月五日日午時瓊粉金膏磨瑩已化為一片秋潭水鏡成將獻蓬萊宫揚州長吏手自封一作鈿函金匣鎖幾重人間臣妾不合照一作用背有九五飛天龍人人呼為天子鏡我有一言聞太宗太宗常以人為鏡鑒古鑒今不鑒容四海安危居掌內百王治亂懸心中乃知天子別有鏡不是揚州百鍊銅青石激忠烈也青石出自藍田山兼車運載來長安工人磨琢欲何用石不能言我代言不願作人家墓前神道碣墳土未乾名已滅不願作官家道傍德政碑不鐫實録鐫虛辭願為段氏顔氏碑雕鏤太尉與太師刻此兩片堅貞質狀彼二人忠烈姿義心如石屹不轉死節如石確不移如觀奮擊朱泚日似見叱呵希烈時各於其上題名諡一置髙山一沉水陵谷雖遷碑獨存骨化為塵名不死長使不忠不烈臣觀碑改節慕為人慕為人勸事君兩朱閣刺佛寺漸多也兩朱閣南北相對起借問何人家貞元雙帝子帝子吹簫雙得仙五雲飄颻飛上天第宅亭臺不將去化為佛寺在人間妝閣妓樓何寂靜栁似舞腰池似鏡花落黃昏悄悄時不聞歌吹聞鐘磬寺門敕榜金字書尼院佛庭寬有餘青苔明月多間地比屋齊人無處居憶昨平陽宅初置吞并平人幾家地仙去雙雙作梵宫漸恐人家盡為寺西涼伎刺封疆之臣也西涼伎假面胡人假獅子刻木為頭絲作尾金鍍眼睛銀帖齒奮迅毛衣擺雙耳如從流沙來萬里紫髯深目兩胡兒鼓舞跳梁前致辭應似涼州未陷日安西都護進來時須臾云得新消息安西路絶歸不得泣向獅子涕雙垂涼州陷沒知不知獅子回頭向西望哀吼一聲觀者悲貞元邊將愛此曲醉坐笑看看不足享一作娛賔犒士宴監軍獅子胡兒長在目有一征夫年七十見弄涼州低面泣泣罷斂手白將軍主憂臣辱昔所聞自從天寶兵戈起犬戎日夜吞西鄙涼州陷來四十年河隴侵將七千里平時安西萬里疆今日邊防在鳳翔平時開逺門外立堠云去安西九千九百里以示戍人不為萬里行其實就盈數也今蕃漢使往來悉在隴州交易緣邊空屯十萬卒飽食溫衣間過日遺民腸斷在涼州將卒相看無意收天子每思常痛惜將軍欲説合慙羞奈何仍看西涼伎取笑資歡無所愧縱無智力未能收忍取西涼弄為戲八駿圖戒竒物懲佚遊也穆王八駿天馬駒後人愛之寫為圖背如龍兮頸如象一作鳥骨竦筋髙脂月壯一作少日行萬里疾如飛穆王獨乘何所之四荒八極踏欲遍三十二蹄無歇時屬車軸折趁不及黃屋草生棄若遺瑶池西赴王母宴七廟經年不親薦璧臺南與盛姬遊明堂不復朝諸侯白雲黃竹王母瑶池宴穆天子所歌之曲也增歌聲動一人荒樂萬人愁周從后稷至文武積德纍功世勤苦豈知才及五代孫心輕王業如灰土由來尤物不在大能蕩君心即為害文帝却之不肯乘千里馬去漢道興穆王得之不為戒八駿駒來周室壞至今此物世稱珍不知房星之精下為怪八駿圖君莫愛澗砥松念寒雋也有松百尺大十圍生在澗砥寒且卑澗深山險人路絶老死不逢工度之天子明堂欠梁木此求彼有兩不知誰諭蒼蒼造物意但與之材不與地金張世祿黃憲賢牛衣寒賤貂蟬貴貂蟬與牛衣髙下雖有殊髙者未必賢下者未必愚君不見沈沈海砥生珊瑚歷歷天上種白榆按英華辨證白居易澗砥松金張世祿黃憲賢黃憲本牛醫兒而集本作原憲貧詳上下句黃憲賢是牡丹芳美天子憂農也牡丹芳牡丹芳黃金蘂綻紅玉房千片赤英霞爛爛百枝絳焰燈煌煌照地初開錦繡段當風不結蘭麝囊仙人琪樹白無色王母桃花小不香宿露輕盈泛紫豔朝陽照耀生紅光紅紫二色間深淺向背萬態隨低昂映葉多情隱羞面臥叢無力含醉妝低嬌笑容疑掩口凝思怨人如斷腸穠姿貴彩信竒絶雜卉亂花無比方石竹金錢何細碎芙蓉芍藥苦尋常遂使王公與卿相遊花冠蓋日相望庳車軟輿貴公子香衫細馬豪家郎衛公宅靜閉東院西明寺深開北廊戲蝶雙舞看人久殘鶯一聲春一作嬌日長共愁日照芳難駐仍張帷幕垂隂涼花開花落二十日一城之人皆若狂三代以還文勝質人心重華不重實重華直至牡丹芳其來有漸非今日元和天子憂農桑恤下動天天降祥去嵗嘉禾生九穗田中寂莫無人至今年瑞麥分兩岐君心獨喜無人知無人知可歎息我願暫求造化力減却牡丹妖豔色少回卿士愛花心同似吾君憂稼穡紅線毯憂蠶桑之費也紅線毯擇繭繅絲清水煮揀絲練線紅藍染染為紅線紅於藍織作披香殿上毯披香殿廣十丈餘紅線織成可殿鋪綵絲茸茸香拂拂線軟花虛不勝物美人踏上歌舞來羅襪繡鞋隨步沒太原毯澀毳縷硬蜀都褥薄錦花冷不如此毯溫且柔年年十月來宣州宣州太守加樣織自謂為臣能竭力百夫同擔進宫中線厚絲多卷不得宣州太守知不知一丈毯用一本無用字千兩絲地不知寒人要暖少奪人衣作地衣貞元中宣州進開樣加絲毯杜陵叟傷農夫之困也杜陵叟杜陵居嵗種薄田一頃餘三月無雨旱風起麥苗不秀多黃死九月降霜秋早寒禾穗未熟皆青乾長吏明知不申破急斂暴徴求考課典桑賣地納官租明年衣食將何如剝我身上帛奪我口中粟虐人害物即豺狼何必鈎爪鋸牙食人肉不知何人奏皇帝帝心惻隱知人弊白麻紙上書德音京畿盡放今年稅昨日里胥方到門手持尺牒榜鄉村十家租稅九家畢虛受吾君蠲免恩繚綾念女工之勞也繚綾繚綾何所似不似羅綃與紈綺應似天台山上明月一作月明前四十五尺瀑布泉中有文章又竒絶地鋪白煙花簇雪織者何人衣者誰越溪寒女漢宫姬去年中使宣口敕天上取樣人間織織為雲外秋鴈行染作江南春水色廣裁衫袖長製裙金斗尉波刀剪紋異彩竒文相隱映轉側看花花不定昭陽舞人恩正深春衣一對直千金汗沾粉汙不再著曵土踏泥無惜心繚綾織成費功績莫比尋常繒與帛絲細繅多女手疼扎扎千聲不盈尺昭陽殿裏歌舞人若見織時應也一作合惜賣炭翁苦宫市也賣炭翁伐薪燒炭南山中滿面塵灰煙火色兩鬢蒼蒼十指黑賣炭得錢何所營身上衣裳口中食可憐身上衣正單心憂炭賤願天寒夜來城上一尺雪曉駕炭車輾冰轍牛困人飢日已髙市南門外泥中歇兩騎翩翩來是誰黃衣使者白衫兒手把文書口稱敕迥回車叱牛牽向北一車炭重一本無重字千餘斤宫使驅將惜不得半匹紅紗一丈綾繫向牛頭充炭直母別子刺新間舊也母別子子別母白日無光哭聲苦關西驃騎大將軍去年破虜新䇿勳敕賜金錢二百萬洛陽迎得如花人新人迎來舊人棄掌上蓮花眼中刺迎新棄舊未足悲悲在君家留兩兒一始扶行一初坐坐啼行哭牽人衣以汝夫婦新嬿婉使我母子生別離不如林中烏與鵲母不失雛雄伴雌應似園中桃李樹花落隨風子住一作在枝新人新人聽我語洛陽無限紅樓女但願將軍重立功更有新人勝於汝隂山道疾貪虜也按李傳云元和二年有詔悉以金銀酬回鶻馬價隂山道隂山道紇邏敦肥水泉好每至戎人送馬時道傍千里無纖草草盡泉枯馬病羸飛龍但印骨與皮五十匹縑易一匹縑去馬來無了日養無所用去非宜每嵗死傷十六七縑絲不足女工苦疏織短截充匹數藕絲蛛網三丈餘回鶻訴稱無用處咸安公主號可胡賈反敦逺為可音克汗頻奏論元和二年下新敕內出金帛酬馬直仍詔江淮馬價縑從此不令疏短織合羅將軍呼萬嵗捧授金銀與縑綵誰知黠虜啓貪心明年馬多來一倍縑漸好馬漸多隂山虜奈爾何時世妝警戎也時世妝時世妝出自城中傳四方時世流行無逺近腮不施朱面無粉鳥膏注脣脣似泥雙眉畫作八字低妍蚩黑白失本態妝成盡似含悲啼圓鬟無鬢椎髻樣斜紅不暈赭面狀昔聞被髮伊川中辛有見之知有戎元和妝梳君記取髻椎面赭非華風李夫人鑒嬖惑也漢武帝初喪李夫人夫人病時不肯別死後留得生前恩君恩不盡念未已甘泉殿裏令寫真丹青寫出竟何益不言不笑愁殺人又令方士合靈藥玉釡煎鍊金爐焚九華帳深夜悄悄反魂香降夫人魂夫人之魂在何許香煙引到焚香處既來何苦不須臾縹眇悠揚還滅去去何速兮來何遲是邪非邪兩不知翠蛾髣佛平生貌不似昭陽寢疾時魂之不來君心苦魂之來兮君亦悲背燈隔帳不得語安用暫來還見違傷心不獨漢武帝自古及今皆若斯君不見穆王三日哭重璧臺前傷盛姬又不見太陵一掬淚馬嵬坡下念楊妃縱令妍姿豔質化為土此恨長在無銷期生亦惑死亦惑尤物惑人忘不得人非木石皆有情不如不遇傾城色陵園妾憐幽閉也陵園妾顔色如花命如葉命如葉薄將奈何一奉寢宫年月多年月多時光換春愁秋思知何限青絲髮落叢鬢疏紅玉膚銷繫裙縵憶昔宫中被妬猜因讒得罪配陵來老母啼呼趁車別中官監送鎖門回山宫一閉無開日未死此身不令出松門到曉月徘徊柏城盡日風蕭瑟松門柏城幽閉深聞蟬聽燕感光隂眼看菊蕊重陽淚手把梨花寒食心把花掩淚無人見緑蕪牆繞青苔院四季徒支妝粉錢三朝不識君王面遙想六宫奉至尊宣徽雪夜浴堂春雨露之恩不及者猶聞不啻三千人我爾君恩何厚薄願令輪轉直陵園三嵗一來均苦樂鹽商婦惡幸人也鹽商婦多金帛不事田農與蠶績南北東西不失家風水為鄉船作宅本是揚州小家女嫁得西江大商客緑鬟溜去金叉多皓腕肥來銀釧窄前呼蒼頭後叱婢問爾因何得如此壻作鹽商十五年不屬州縣屬天子每年鹽利入官時少入官家多入私官家利薄私家厚鹽鐵尚書逺不知何况江頭魚米賤紅鱠黃橙香稻飯飽食濃妝倚柂樓兩朵紅腮花欲綻鹽商婦有幸嫁鹽商終朝美飯食終嵗好衣裳好衣美食來何處一作有來亦須慚愧桑𢎞羊桑𢎞羊死已久不獨漢時今亦有杏為梁刺居處僣也杏為梁桂為柱何人堂室李開府碧砌紅軒色未乾去年身沒今移主髙其牆大其門誰家第宅盧將軍素泥朱板光未滅今嵗官收賜別人開府之堂將軍宅造未成時頭已白逆旅重居逆旅中心是主人身是客更有愚夫念身後心雖甚長計非久窮奢極麗越規模付子傳孫令保守莫教門外過客聞撫掌回頭笑殺君君不見馬家宅尚猶存宅門題作奉誠園君不見魏家宅屬他人詔贖賜還五代孫元和四年詔特以官錢贖魏徴勝業坊中舊宅以還其孫用奬忠儉儉存奢失今在目安用髙牆圍大屋井底引銀瓶止淫奔也井底引銀瓶銀瓶欲上絲繩絶石上磨玉簪玉簪欲成中央折瓶沉簪折知奈何似妾今朝與君別憶昔在家為女時人言舉動有殊姿嬋娟兩鬢秋蟬翼宛轉雙蛾逺山色笑隨女伴後園中此時與君未相識妾弄青梅倚短牆君騎白馬傍垂楊牆頭馬上遙相顧一見知君即斷腸知君斷腸共君語君指南山松柏樹感君松柏化為心暗合雙鬟逐君去到君家舍五六年君家大人頻有言聘則為妻奔是妾不堪主祀奉蘋蘩終知君家不可住其奈出門無去處豈無父母在髙堂亦有親情滿故鄉潛來更不通消息今日悲羞歸不得為君一日恩誤妾百年身寄言癡小人家女慎勿將身輕許人官牛諷執政也官牛官牛駕官車滻水岸邊驅載沙一石沙幾斤重朝載暮載將何用載向五門官道西緑槐隂下鋪沙隄昨來新拜右丞相恐怕泥塗汙馬蹄右丞相馬蹄踏沙雖淨潔牛領牽車欲流血右丞相但能濟人治國調隂陽官牛領穿亦無妨紫毫筆誡失職也紫毫筆尖一作纖如錐兮利如刀江南石上有老兔喫竹飲泉生紫毫宣城工人采為筆千萬毛中選一作揀一毫毫雖輕功甚重管勒工名充嵗貢君兮臣兮勿輕用勿輕用將何如願賜東西府御史願頒左右臺起居搦一作握管趨入黃金闕抽毫立在白玉墀一作除臣有姦邪正衙奏君有動言直筆書起居郎侍御史爾知紫毫不易致每嵗宣城進筆時紫毫之價如金貴慎勿空將彈失儀慎勿空將録制詞隋堤栁憫亡國也隋堤栁嵗久年深盡衰朽風飄飄兮雨蕭蕭三株兩株汴河口老枝病葉愁殺人曾經大業年中春大業年中煬天子種栁成行夾流水西至黃河東至淮緑影一千三百里大業末年春暮月栁色如煙絮如雪南幸江都恣佚遊應將此栁繫龍舟紫髯郎將護錦纜青蛾御史直迷樓海內財力此時竭舟中歌笑何日休上荒下困勢不久宗社之危如綴旒煬天子自言福祚長一作垂無窮豈知皇子封􅈶公龍舟未過彭城閣義旗已入長安宫蕭牆禍生人事變晏駕不得歸秦中土墳數尺何處葬吳公臺下多悲風二百年來汴河路沙草和煙朝復暮後王何以鑒前王請看隋堤亡國樹一本綴旒下多煬天子自言歡樂殊無極豈知明年正朔歸武德草茫茫懲厚葬也草茫茫土蒼蒼蒼蒼茫茫在何處驪山腳下秦皇墓墓中下涸二重泉當時自以為深固下流水銀象江海上綴珠光作烏兔別為天地於其間擬將富貴隨身去一朝盜掘墳陵破龍椁神堂三月火可憐寶玉歸人間暫借泉中買身禍奢者狼藉儉者安一凶一吉在眼前憑君回首向南望漢文葬在灞陵原古冢狐戒豔色也古冢狐妖且老化為婦人顔色好頭變雲鬟面變妝大尾曵作長紅裳徐徐行傍荒村路日欲暮時人靜處或歌或舞或悲啼翠眉不舉花鈿一作顔低忽然一笑千萬態見者十人八九迷假色迷人猶若是真色迷人應過此彼真此假俱迷人人心惡假貴重真狐假女妖害猶淺一朝一夕迷人眼女為狐媚害則一作却深日增月長溺人心何况褒妲之色善蠱惑能喪人家覆人國君看為害淺深間豈將假色同真色黑潭龍疾貪吏也黑潭水深色如墨傳有神龍人不識潭上架屋官立祠龍不能神人神一作異之豐凶水旱與疾疫鄉里皆言龍所為家家養豚漉清酒朝祈暮賽依巫口神之來兮風飄飄紙錢動兮錦繖搖神之去兮風亦靜香火滅兮杯盤冷肉堆潭岸石酒潑廟前草不知龍神享幾多林鼠山狐長醉飽狐何幸豚何辜年年殺豚將餧狐狐假龍神食豚盡九重泉底龍知無天可度惡詐人也天可度地可量唯有人心不可防但見丹誠赤如血誰知偽言巧似簧勸君掩鼻君莫掩使君夫婦為參商勸君掇蜂君莫掇使君父子成豺狼海底魚兮天上鳥髙可射兮深可釣唯有人心相對時咫尺之間不能料君不見李義府之輩笑欣欣笑中有刀潛殺人隂陽神變皆可測不測人間笑是嗔秦吉了哀寃民也秦吉了出南中彩毛青黑花頸紅耳聰心慧舌端巧鳥語人言無不通昨日長爪鳶今朝大觜烏鳶捎乳燕一窠覆烏啄母雞雙眼枯雞號墮地燕驚去然後拾卵攫其雛豈無雕與鶚嗉中肉飽不肯搏亦有鸞鶴羣間立髙揚如不聞秦吉了人云爾是能言鳥豈不見雞燕之寃苦吾聞鳳凰百鳥主爾竟不為鳳凰之前致一言安用噪噪一作嗏嗏間言語鴉九劒思決壅也歐冶子死千年後精靈暗授張鴉九鴉九鑄劒吳山中天與日時神借功金鐵騰精火翻焰踴躍求為鏌鋣劒劒成未試十餘年有客持金買一觀誰知閉匣長思用三尺青蛇不肯蟠客有心劒無口客代劒言告鴉九君勿矜我玉可切君勿誇我鍾可刜不如持我決浮雲無令漫漫蔽白日為君使無私之光及萬物蟄蟲昭蘇萌草出采詩官監前王亂亡之由也采詩官采詩聽歌導人言言者無罪聞者誡下流上通上下泰周滅秦興至隋氏十代采詩官不置郊廟登歌讚君美樂府豔詞恱君意若求興諭規刺言萬句千章無一字不是章句無規刺漸恐朝廷絶諷議諍臣杜口為冗貟諫鼓髙懸作虛器一人負扆常端默百辟入門皆自媚夕郎所賀皆德音春官每奏唯祥瑞君之堂兮千里逺君之門兮九重閟君耳唯聞堂上言君眼不見門前事貪吏害民無所忌姦臣蔽君無所畏君不見厲王胡亥一作煬帝之末年群臣有利君無利君兮君兮願聽此欲開壅蔽一本作君兮君兮若要除貪害開壅蔽逹人情先向歌詩求諷刺立名按郭茂倩云新樂府者皆唐世之新歌也以其辭實樂府而未盡被於聲故曰新樂府又云新樂府五十篇白居易元和四年作也大抵皆以諷諭為體欲以播於樂章歌曲焉白香山詩集卷四
