body:
  text: 白香山詩集卷十二歙縣汪立名編長慶集卷二感傷歌行曲引雜體凡四十八首短歌行曈曈太陽如火色上行千里下一刻出為白晝入為夜圓轉如珠住不得住不得可奈何為君舉酒歌短歌歌聲苦詞亦苦四座少年君聽取今夕未竟明旦一作夕催秋風才住春風迥回人無根蒂時不駐朱顔白日相隳頽勸君且強笑一面勸君復強飲一杯人生不得長歡樂年少須臾老到來生離别食檗不易食梅難檗能苦兮梅能酸未如生别之為難苦在心兮酸在肝晨雞再鳴殘月沒征馬連嘶一作嘶風行人出回看骨肉哭一聲梅酸檗苦甘如蜜黃河水白黃雲秋行人河邊相對愁天寒野一作路曠何處宿棠梨葉戰風颼颼生離别生離别憂從中來無斷絶憂極一作積心勞血氣衰未年三十生白髮浩歌行天長地久無終畢昨夜今朝又明日鬢髮蒼浪牙齒疏不覺身年四十七前去五十有幾年把鏡照面心茫然既無長繩繫白日又無大藥駐朱顔朱顔日漸不如故青史功名在何處欲留年少待富貴富貴不來年少去去復去兮如長河東流赴海無回波賢愚貴賤同歸盡北邙冢墓髙嵯峨古來如此非獨我未死有酒且髙歌顔回短命伯夷餓我今所得亦巳多功名富貴須待一作推命命若一作苟不來爭奈何王夫子王夫子送君為一尉東南三千五百里道途雖逺位雖卑月俸猶堪活妻子男兒口讀古人書束帶斂手來從事近將徇祿給一家逺則行道佐時理行道佐時須待命委身下位無為恥命苟未來且求食官無卑髙及逺邇男兒上既未能濟天下下又不至飢寒死吾觀九品至一品其間氣味都相似紫綬朱紱青布衫顔色不同而已矣王夫子别有一事欲勸君逢一作遇酒逢春且歡喜江南遇天寶樂叟白頭老一作病叟泣且言祿山未亂入梨園能彈琵琶和法曲多在華清隨至尊是時天下太平久年年十月坐朝元千官起居環珮合萬國會同車馬奔金鈿照耀石甕寺蘭麝熏煮溫湯源貴妃宛轉侍君側體弱不勝珠翠繁冬雪飄颻錦袍暖春風蕩漾霓裳翻歡娛未足燕冦至弓徑馬肥胡語喧豳土人遷避夷狄鼎湖龍去哭軒轅從此漂淪落南土萬人死盡一身存秋風江上浪無限暮雨舟中酒一樽涸魚久失風波勢枯草曾沾雨露恩我自秦來君莫問驪山渭水如荒村新豐樹老籠明月長生殿暗鎖春雲一作黃昏紅葉紛紛蓋欹瓦緑苔重重封壞垣唯有中官作宫使每年寒食一開門送張山人歸嵩陽黃雲慘慘天微雪循行坊西鼓聲絶張生馬瘦衣且單夜扣柴門與我别愧君冒寒來别我為君沽酒張燈火酒酣火暖與君言何事出關又入關一作君何入關又出關答云前年偶下山四十餘月客長安長安古來名利地空手無金行路難朝遊九城陌肥馬輕車欺殺客暮宿五侯門殘茶冷酒愁殺人春明門外城一作髙髙處直下一作門前便是嵩山路幸有雲泉容此身明日辭君且歸去醉後走筆酬劉五主簿長句之贈兼簡張大賈二十四先輩昆季劉兄文髙行孤立十五年前名翕習是時相遇在符離我年二十君三十得意忘年心迹親寓居同縣日知聞衡門寂寞朝尋我古寺蕭條暮訪君朝來暮去多攜手窮巷貧居何所有秋燈夜寫聨句詩春雪朝傾暖寒酒陴湖緑愛白鷗飛濉水清憐紅鯉肥偶語間攀芳樹立相扶醉踏落花歸張賈弟兄同里巷乘間數數來相訪雨天連宿草堂中月夜徐行石橋上我年漸長忽自驚鏡中冉冉髭鬚生心畏後時同勵志身牽前事各求名問我栖栖何所適鄉人薦為鹿鳴客二千里别謝交遊三十韻詩慰行役出門可憐唯一身敝裘瘦馬入咸秦鼕鼕街鼓紅塵暗晚到長安無主人二賈二張與余弟驅車邐迤來相繼操詞握賦為干戈鋒鋭森然勝氣多齊入文場同苦戰五人十載九登科二張得雋名居甲美退爭雄重告捷棠棣輝榮並桂枝芝蘭芬馥和荆葉唯有沅犀屈未伸握中自謂駭雞珍三年不鳴鳴必大豈獨駭雞當駭人元和運啓千年聖同遇明時余最幸始辭祕閣吏王畿遽列諫垣升禁闈蹇步何堪鳴珮玉衰容不稱著朝衣閶闔晨開朝百辟冕旒不動香煙碧步登龍尾上虛空立去天顔無咫尺宫花似雪從乘輿禁月如霜坐直廬身賤每驚隨內宴才微常愧草天書晚松寒竹新昌第職居密近門多閉日暮銀臺下直回故人到門門暫開回頭下馬一相顧塵土滿衣何處來斂手炎涼敘未畢先説舊山今悔出岐陽旅宦少歡娛江左羈遊費時日贈我一篇行路吟吟之句句披沙金嵗月徒催白髮貌泥塗不屈青雲心誰會茫茫天地意短才獲用長才棄我隨鵷鷺入煙雲謬上丹墀為近臣君同鸞鳯棲荆棘猶著青袍作選人惆悵知賢不能薦徒為出入蓬萊殿月慙諫紙二百張嵗愧俸錢三十萬大抵浮榮何足道幾度相逢即身老且傾斗酒慰羈愁重話符離問舊遊北巷鄰居幾家去東林舊院何人住武里村花落復開流溝山色應如故感此酬君千字詩醉中分手又何之須知通塞尋常事莫歎浮沉先後時慷慨臨岐重相勉殷勤别後加飱飯君不見買臣衣錦還故鄉五十身榮未為晚和錢員外答盧員外早春獨遊曲江見寄長句春來有色暗融融先到詩情酒思中栁岸霏微裛塵雨杏園淡蕩開花風聞君獨遊心鬱鬱薄晚新晴騎馬出醉思詩侣有同年春歎翰林無暇日雲夫首倡寒玉音蔚章繼和春搜吟此時我亦閉門坐一日風光三處心雲夫蔚章同年及第時豫與蔚章同在翰林東墟晚歇時退居渭村涼風冷露蕭索天黃蒿紫菊荒涼田繞冢秋花少顔色細蟲小蝶飛翻翻中有騰騰獨行者手拄漁竿不騎馬晚從南澗釣魚回歇此墟中白楊下褐衣半故白髮新人逢知我是何人誰言渭浦棲遲客曾作甘泉侍從臣客中月客從江南來來時月上弦悠悠行旅中三見清光圓曉隨殘月行夕與新月宿誰謂月無情千里逺相逐朝發渭水橋暮入長安陌不知今夜月又作誰家客挽歌詞丹旐何飛揚素驂亦悲鳴晨光照閭巷轜車儼欲行蕭條九月天晚出洛陽城一作哀挽出重城借問送者誰妻子與弟兄蒼蒼古原上峨峨開新塋含酸一慟哭異口同哀聲舊壠轉蕪絶新墳日羅列春風秋草一作草緑北邙山此地年年生死别長相思九月西風興月冷露華凝思君秋夜長一夜魂九升二月東風來草拆花心開思君春日遲一日腸九回妾住洛橋北君住洛橋南十五即相識今年二十三有如女蘿草生在松之側蔓短枝苦髙縈迥回上不得人言人有願願至天必成願作逺方獸步步比肩行願作深山木枝枝連理生山鷓鴣山鷓鴣朝朝暮暮啼復啼啼時露白風凄凄黃茅岡頭秋日晚苦竹嶺下寒月低畬田有粟何不啄石楠有枝何不棲迢迢不緩復不急樓上舟中聲暗入夢鄉遷客展轉卧抱兒寡婦倣徨立山鷓鴣爾本此鄉鳥生不辭巢不别羣何苦聲聲啼到曉啼到曉唯能愁北人南人慣聞如不聞放旅鴈元和十年冬作九江十年冬大雪江水生冰樹枝折百鳥無食東西飛中有旅鴈聲最飢雪中啄草冰上宿翅冷騰空飛動遲江童持網捕將去手攜入市生賣之我本北人今譴謫人鳥雖殊同是客見此客鳥傷客人贖汝放汝飛入雲鴈鴈汝飛向何處第一莫飛西北去淮西有賊討未平百萬甲兵久屯聚官軍賊軍相守老食盡兵窮將及汝健兒飢餓射汝喫拔汝翅翎為箭羽送春歸元和十一年三月三十日作送春歸三月盡日日暮時去年杏園花飛御溝緑何處送春曲江曲今年杜鵑花落子規啼送春何處西江西帝城送春猶怏怏天涯送春能不加惆悵莫惆悵送春人冗員無替五年罷應須凖擬再送潯陽春五年炎涼凡十變又知此身健不健好送今年江上春明年未死還相見山石榴寄元九山石榴一名山躑躅一名杜鵑花杜鵑啼時花撲撲九江三月杜鵑來一聲催得一枝開江城上佐間無事山下斸得廳前栽爛熳一欄十八樹根株有數花無數千房萬葉一時新嫩紫殷紅鮮麴塵淚痕裛損胭脂臉剪刀裁破紅綃巾謫仙初墮愁在世姹女新嫁嬌泥去聲春日射血珠將滴地風翻火焰欲燒人間折兩枝持在手細看不似人間有花中此物是西施芙蓉芍藥皆嫫母竒芳絶豔别者誰通州遷客元拾遺拾遺初貶江陵去去時正值青春暮商山秦嶺愁殺人山石榴花紅夾路題詩報我何所云苦云色似石榴裙當時叢畔唯思我今日欄前只憶君憶君不見坐銷落日西風起紅紛紛畫竹歌并引協律郎蕭悅善畫竹舉時無倫蕭亦甚自祕重有終嵗求其一竿一枝而不得者知豫天與好事忽寫一十五竿惠然見投豫厚其意髙其藝無以答貺作歌以報之凡一百八十六字云植物之中竹難寫古今雖畫無似者蕭郎下筆獨逼真丹青以來唯一人人畫竹身肥擁腫蕭畫莖瘦節節竦人畫竹梢死羸垂蕭畫枝活葉葉動不根而生從意生不笋而成由筆成野塘水邊崎岸側森森兩叢十五莖嬋娟不失筠粉態蕭颯盡得風煙情舉頭忽看不似畫低耳靜聽疑有聲西叢七莖徑而健省向天竺寺前石上見東叢八莖疏且寒憶曽湘妃廟裏雨中看幽姿逺思少人别與君相顧空長歎蕭郎蕭郎老可惜手顫一作戰眼昏頭雪色自言便是絶筆時從今此竹尤難得真娘墓墓在虎邱寺真娘墓虎邱道不識真娘鏡中面唯見真娘墓頭草霜摧桃李風折蓮真娘死時猶少年脂膚荑手不牢固世間尤物難留連難留連易銷歇塞北花江南雪長恨歌長恨歌傳開元中泰階平四海無事玄宗在位嵗久倦于旴食宵衣政無小大始委于右丞相深居遊宴以聲色自娛先是元獻皇后武淑妃皆有寵相次即世宫中雖良家子千數無可恱目者上心忽忽不樂時每嵗十月駕幸華清宫內外命婦熠耀景從浴日餘波賜以湯沐春風靈液淡蕩其間上心油然若有顧遇左右前後粉色如土詔髙力士潛搜外宫得𢎞農楊玄琰女于夀邸既笄矣鬒髮膩理纎穠中度舉止間冶如漢武帝李夫人别疏湯泉詔賜澡瑩既出水體弱力微若不任羅綺光彩煥發轉動照人上甚恱進見之日奏霓裳羽衣曲以導之定情之夕授金叉鈿合以固之又命戴步搖垂金璫明年册為貴妃半后服用繇是冶其容敏其詞婉孌萬態以中上意上益嬖焉時省風九州泥金五嶽驪山雪夜上陽春朝輿上行同室宴專席寢專房雖有三夫人九嬪二十七世婦八十一御妻暨後宫才人樂府妓女使天子無顧盻意自是六宫無復進幸者非徒殊豔尤態致是蓋才智明慧善巧便佞先意希旨有不可形容者叔父昆弟皆列在清貫爵為通侯姊妹封國夫人富埒王室車服邸第與大長公主侔而恩澤勢力則又過之出入禁門不問京師長吏為側目故當時謡誄有云生女勿悲酸生男勿喜歡又曰男不封侯女作妃看女却為門上楣其人心羡慕如此天寶末兄國忠盜丞相位愚弄國柄及安祿山引兵向闕以討楊氏為辭潼關不守翠華南幸出咸陽道次馬嵬亭六軍徘徊持戟不進從官郎吏伏上馬前請誅以謝天下國忠奉氂纓盤水死於道周左右之意未快上問之當時敢言者請以貴妃塞天下怒上知不免而不忍見其死反袂掩面使牽之而去蒼黃展轉竟就絶於尺組之下既而玄宗狩成都肅宗受禪靈武明年大凶歸元大駕還都尊玄宗為太上皇就養南宫遷于西內時移事去樂盡悲來每至春之日冬之夜池蓮夏開宫槐秋落梨園弟子玉琯發音聞霓裳羽衣一聲則天顔不怡左右歔欷三載一意其念不衰求之夢魂杳不能得適有道士自蜀來知上皇心念楊妃如是自言有李少君之術玄宗大喜命致其神方士乃竭其術以索之不至又能遊神馭氣出天界沒地府以求之不見又旁求四虛上下東極大海跨蓬壺見最髙仙山上多樓闕西廂下有洞户東向闔其門署曰玉妃太真院方士抽簪扣扉有雙童女出應門方士造次未及言而雙鬟復入俄有碧衣侍女又至詰其所從方士因稱唐天子使者且致其命碧衣云玉妃方寢請少待之于時雲海沉沉洞天日晚瓊户重闔悄然無聲方士屛息斂足拱手門下久之而碧衣延入且曰玉妃出見一人冠金蓮披紫綃珮紅玉曵鳯舄左右侍者七八人揖方士問皇帝安否次問天寶十四年巳還事言訖憫默指碧衣取金叉鈿合各拆其半授使者曰為謝太上皇謹獻是物尋舊好也方士受辭與信將行色有不足玉妃固徵其意復前跪致詞請當時一事不為他人聞者驗於太上皇不然恐鈿合金叉負新垣平之詐也玉妃茫然退立若有所思徐而言之曰昔天寶十載侍輦避暑驪山宫秋七月牽牛織女相見之夕秦人風俗是夜張錦繡陳飲食樹瓜果焚香于庭號為乞巧宫掖間尤尚之夜殆半休侍衛於東西廂獨侍上上憑肩而立因仰天感牛女事密相誓心願世世為夫婦言畢執手各嗚咽此獨君王知之耳因自悲曰由此一念又不得居此復墮下界且結後緣或為天或為人決再相見好合如舊因言太上皇亦不久人間幸唯自安無自苦耳使者還奏太上皇皇心震悼日日不豫其年夏四月南宫晏駕元和元年冬十二月太原白樂天自校書郎尉于盩厔鴻與琅邪王質夫家于是邑暇日相攜遊仙遊寺話及此事相與感歎質夫舉酒于樂天前曰夫希代之事非遇出世之才潤色之則與時消沒不聞于世樂天深於詩多於情者也試為歌之如何樂天因為長恨歌意者不但感其事亦欲徵尤物窒亂階垂于將來也歌既成使鴻傳焉世所不聞者豫非開元遺民不得知世所知者有玄宗本紀在今但傳長恨歌云爾前進士陳鴻撰漢皇重色思傾國御宇多年求不得楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側回眸一笑百媚生六宫粉黛無顔色春寒賜浴華清池溫泉水滑洗凝脂侍兒扶起嬌無力始是新承恩澤時雲鬢花顔一作冠金步搖芙蓉帳暖度春宵一作帳裏暖春宵春宵苦短日髙起從此君王不早朝承歡侍宴一作寢無間暇春從春遊夜專夜後一作漢宫佳麗三千人三千寵愛在一身金屋籹成嬌侍夜玉樓宴罷醉和春姊妹弟兄皆列土可憐光彩生門户遂令天下父母心不重生男重生女驪宫髙處入青雲仙樂風飄處處聞緩歌慢舞凝絲竹盡日君王看一作聽不足漁陽鞞鼓動地來驚破霓裳羽衣曲九重城闕煙塵生千乘萬騎西南行翠華搖搖行復止西出都門百餘里六軍不發無奈何宛轉蛾睂馬前死花鈿委地無人收翠翹金雀玉搔頭君王掩面救不得回看血淚相和流黃埃散漫風蕭索雲棧縈紆登劒閣峨嵋山下少人行旌旗無光日色薄蜀江水碧蜀山青聖主朝朝暮暮情行宫見月傷心色夜雨聞鈴腸斷聲天旋日轉回龍馭到此躊躇不能去馬嵬坡下泥一作塵土中不見玉顔空死處君臣相顧盡沾衣東望都門信馬歸歸來池苑皆依舊太液芙蓉未央栁芙蓉如面栁如眉對此如何不淚垂春風桃李花開日一作夜秋雨梧桐葉落時西宫南內多秋草落葉滿階紅不掃梨園弟子白髮新椒房阿監青娥老夕殿螢飛思悄然孤一作秋燈挑盡未成眠遲遲鐘鼓初長夜耿耿星河欲曙天鴛鴦瓦冷霜華重翡翠衾寒誰與共一作舊枕故衾誰與共悠悠生死别經年魂魄不曾來入夢臨卭道士鴻都客能以精誠致魂魄為感君王展轉思一作恩遂教方士殷勤覔排雲馭氣奔如電升天入地求之遍上窮碧落下黃泉兩處茫茫皆不見忽聞海上有仙山山在虛無縹眇間樓閣一作殿玲瓏五雲起其中綽約多仙子中有一人字太真一作字玉真又作名玉妃雪膚花貌參差是金闕西廂叩玉扃轉教小玉報雙成聞道漢家天子使九華帳裏夢魂驚攬衣推枕起徘徊珠箔銀鉤迤邐開雲髻半偏新睡覺花冠不整下堂來風吹仙袂飄飄舉猶似霓裳羽衣舞玉容寂寞淚闌干梨花一枝春帶雨含情凝涕一作睇謝君王一别音容兩渺茫昭陽殿裏恩愛絶蓬萊宫中日月長回頭下望人寰處不見長安見塵霧唯將一作空持舊物表深情鈿合金叉寄將去叉留一股合一扇叉擘黃金合分鈿但教心似金鈿堅天上人間會相見臨别殷勤重寄詞詞中有誓兩心知七月七日長生殿夜半無人私語時在天願作比翼鳥在地願為連理枝天長地久有時盡此恨綿綿無盡期隱居詩話云唐人詠馬嵬事多矣世所稱白居易六軍不發無奈何宛轉蛾眉馬前死此乃歌詠祿山能使官軍叛逼追明皇不得已而誅楊妃也豈特不曉文章體裁而造語蠢拙抑亦失臣下事君之禮老杜則不然其北征詩曰不聞夏殷衰中自誅褒妲乃見明皇鑒夏商之敗畏天悔禍賜妃子以死官軍何與焉立名按此論為推尊少陵則可若以此貶樂天則不可論詩須相題長恨歌本與陳鴻王質夫話楊妃始終而作猶慮詩有未詳陳鴻又作長恨歌傳所謂不特感其事亦欲懲尤物窒亂階垂于將來也自與北征詩不同若諱馬嵬事實則長恨二字便無著落矣讀書全不理會作詩本末而執片詞肆議古人巳屬大過至謂歌詠祿山能使官軍云云則尤近乎鍛鍊矣宋人多文字吹求之禍皆釀于此等議論若唐人作詩本無所謂忌諱忠厚之風自可慕也然陳傳中敘貴妃進于夀邸而白詩諱之但云楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側安得謂樂天不知文章大體耶倘有祖其謬以羅織少陵者必將以少陵憶昔詩張后不樂天子忙句為失以臣事君之禮百官跣足隨天王句為歌詠吐蕃追逼代宗又豈通論乎婦人苦蟬鬢加意梳蛾睂用心掃幾度曉籹成君看不言好妾身重同穴君意輕偕老惆悵去年來心知未能道今朝一開口語少意何深願引他時事移君此日心人言夫婦親義合如一身及至死生際何曾苦樂均婦人一喪夫終身守孤孑有如林中竹忽被風吹折一折不重生枯死猶抱節男兒若喪婦能不暫傷情應似門前栁逢春易發榮風吹一枝折還有一枝生為君委曲言願君再三聽須知婦人苦從此莫相輕長安道花枝缺處青樓開豔歌一曲酒一杯美人勸我急行樂自古朱顔不再來君不見外州官客長安道一回來時一迥回老立名按文苑英華末二句作外州客長安道一回來一迥回老去二字亦甚佳潛别離不得哭潛别離不得語暗相思兩心之外無人知深籠夜鎖獨棲鳥利劒春斷連理枝河水雖濁有清日烏頭雖黑有白時唯有潛離與暗别彼此甘心無後期隔浦蓮隔浦愛紅蓮昨日看猶在夜來風吹落只得一回採花開雖有明年期復愁明年還暫時寒食野望吟邱墟郭門外寒食誰家哭風吹曠野紙錢飛古墓纍纍春草緑棠梨花映白楊樹盡是死生離别處冥漠重泉哭不聞蕭蕭暮雨人歸去琵琶引并序元和十年豫左遷九江郡司馬明年秋送客湓浦口聞舟中夜彈琵琶者聽其音錚錚然有京都一作邑聲問其人本長安倡女嘗學琵琶於穆曹二善才年長色衰委身為賈人婦遂命酒使快彈數曲曲罷憫默自敘少小時歡樂事今漂淪憔悴轉徙於江湖間豫出官二年恬然自安感斯人言是夕始覺有遷謫意因為長句歌以贈之凡六百一十二言命曰琵琶行潯陽江頭夜送客楓葉荻花秋瑟瑟主人下馬客在船舉酒欲飲無管絃醉不成歡慘將别别時茫茫江浸月忽聞水上琵琶聲主人忘歸客不發尋聲暗問彈者誰琵琶聲停欲語遲移船相近邀相見添酒回燈重開宴千呼萬喚始出來猶抱一作把琵琶半遮面轉軸撥絃三兩聲未成曲調先有情絃絃掩抑聲聲思似訴平生不得志一作意低睂信手續續彈説盡心中無限事輕攏慢撚抹復挑初為霓裳後六么一作緑腰大絃嘈嘈如急雨小絃切切如私語嘈嘈切切錯雜彈大珠小珠落玉盤間關鶯語花底滑幽咽泉流水一作氷下灘一作難水泉冷澀絃疑絶疑絶不通聲暫歇别有幽情暗恨生此時無聲勝有聲銀瓶乍破水漿迸鐵騎突出刀槍鳴曲終收撥當心畫四絃一聲如裂帛東船西舫悄無言唯見江心秋月白沉吟放撥插絃中整頓衣裳起斂容自言本是京城女家在蝦蟇陵下住十三學得琵琶成名屬教坊第一部曲罷曾教善才伏籹成每被秋娘妬五陵年少爭纒頭一曲紅綃不知數鈿頭雲箆擊節碎血色羅裙翻酒汚今年歡笑復明年秋月春風等間度弟走從軍阿姨死暮去朝來顔色故門前冷落鞍馬稀老大嫁作商人婦商人重利輕别離前年浮梁買茶去去來江口守空船繞船月明江水寒夜深忽夢少年事夢啼籹淚紅闌干一作啼籹淚落紅闌干我聞琵琶已歎息又聞此語重唧唧同是天涯淪落人相逢何必曾相識我從去年辭一作離帝京謫居卧病潯陽城潯陽地僻一作小處無音樂終嵗不聞絲竹聲住近湓江地低濕黃蘆苦竹繞宅生其間旦暮聞何物杜鵑啼血猿哀鳴春江花朝秋月夜往往取酒還獨傾豈無山歌與村笛嘔啞嘲􅑜難為聽今夜聞君琵琶語如聽仙樂耳暫明莫辭更坐彈一曲為君翻作琵琶行感我此言良久立却坐促絃絃轉急凄凄不似向前聲滿座重聞皆掩泣座一作就中泣下一作淚誰最多江州司馬青衫濕立名按容齋五筆白公琵琶行讀者但羡其風致敬其詞章至形於樂府詠歌之不足遂以謂真為長安故倡而作不知直欲攄寫天涯淪落之恨爾東坡謫黃州賦定惠院海棠詩有陋邦何處得此花無乃好事移西蜀天涯流落俱可念為飲一尊歌此曲其意亦爾也簡簡吟蘇家小女名簡簡芙蓉花腮栁葉眼十一把鏡學點籹十二抽針能繡裳十三行坐事調品不肯迷頭白地藏玲瓏雲髻生菜樣飄飄風袖薔薇香殊姿異態不可狀忽忽轉動如有光二月繁霜殺桃李明年欲嫁今年死丈人阿母忽悲啼此女不是凡夫妻恐是天仙謫人世只合人間十三嵗大都好物不堅牢彩雲易散琉璃脆花非花花非花霧非霧夜半來天明去來如春夢幾多時去似朝雲無覔處醉後狂言酬贈蕭殷二協律餘杭邑客多羈貧其間甚者蕭與殷天寒身上猶衣葛日髙甑中未拂塵江城山寺十一月北風吹沙雪紛紛賔客不見綈袍惠黎庶未沾襦袴恩此時太守自慚愧重衣復衾有餘溫因命染人與針女先製兩裘贈二君吳綿細軟桂布密柔如狐腋白似雲勞將詩書投贈我如此小惠何足論我有大裘君未見寬廣和暖如陽春此裘非繒亦非纊裁以法度絮以仁刀尺鈍拙製未畢出亦不獨裹一身若令在郡得五考與君展覆杭州人立名按今本此下有贈商玲瓏醉歌一首乃長慶三年詩正入後集説見本詩下又自十三卷至二十卷今本皆作律詩而古調歌行雜體之誤收往往而有悉為摘出未敢以臆見穿鑿分列諷諭間適感傷各卷但附雜體卷末仍各詳原次某卷以存其舊夜哭李夷道以下十三卷內並未應舉時作逝者絶影響空庭朝復昏家人哀臨畢夜鎖壽堂門無妻無子何人葬空見銘旌向月翻病中作時年十八久為勞生事不學攝生道年少巳多病此身豈堪老立名按容齋隨筆今人富貴中作不如意語少壯時作哀病語詩家往往以為讖白公十八嵗病中作如此而夀至七十五則詩讖之説不盡然也秋江晚泊扁舟泊雲島倚棹念鄉國四望不見人煙江淡秋色客心貧易動日入愁未息寒食卧病病逢佳節長歎息春雨濛濛榆栁色羸坐全非舊日容扶行半是他人力喧喧里巷踏青歸笑閉柴門度寒日寒食月夜風香露重梨花濕草舍無煙一作燈愁未入南鄰北一作井里歌吹時獨倚柴門月中立長安早春旅懷軒車歌吹喧都邑中有一人向隅立夜深明月卷簾愁日暮青山望鄉泣風吹新緑草芽拆雨灑輕黃栁條濕此生知負少年春不展愁眉欲三十晚秋夜以下十四卷內碧空溶溶月華靜月裏愁人弔孤影花開殘菊傍踈籬葉下衰桐落寒井塞鴻飛急覺秋盡鄰雞鳴遲知夜永凝情不語空所思風吹白露衣裳冷和錢員外早冬玩禁中新菊禁署寒氣遲孟冬菊初拆新黃間繁緑爛若金照碧仙郎小隱日心似陶彭澤秋憐潭上看日慣籬邊摘今來此地賞野意潛自適金馬門內花玉山峰下客寒芳引清句吟玩煙景夕賜酒色偏宜握蘭香不敵淒淒百卉死嵗晚氷霜積唯有此花開一作有此花開時殷勤助君惜錢嘗居藍田山下故云贈别宣上人上人處世界清淨何所似似彼白蓮花在水不著水性真悟泡幻行潔離塵滓修道來幾時身心俱到此嗟豫牽世網不得長依止離念與碧雲秋來朝夕起和夢遊春詩一百韻并序微之既到江陵又以夢遊春詩七十韻寄豫且題其序曰斯言也不可使不知吾者知知吾者亦不可使不知樂天知吾也吾不敢不使吾子知豫辱斯言三復其旨大抵悔既往而悟將來也然豫以為苟不悔不悟則已若悔於此則宜悟於彼也反於彼而悟於妄則宜歸於真也况與足下外服儒風內宗梵行者有日矣而今而後非覺路之返也非空門之歸也將安反乎將安歸乎今所和者其章旨卒歸於此夫感不甚則悔不熟感不至則悟不深故廣足下七十韻為一百韻重為足下陳夢遊之中所以甚感者敘婚仕之際所以至感者欲使曲盡其妄周知其非然後返乎真歸乎實亦猶法華經序火宅偈化城維摩經入媱舍過酒肆之義也微之微之豫斯文也尤不可使不知吾者知幸藏之云爾昔君夢遊春夢遊仙山曲恍若有所遇似愜平生欲因尋菖蒲水漸入桃花谷到一紅樓家愛之看不足池流渡清泚草嫩踏緑蓐門栁暗全低簷櫻紅半熟轉行深深院過盡重重屋烏龍卧不驚青鳥飛相逐漸聞玉珮響始辨珠履躅遙見窗下人娉婷十五六霞光抱明月蓮豔開初旭縹眇雲雨仙氛氲蘭麝馥風流薄梳洗時世寬籹束袖軟異文綾裾輕單絲縠裙腰銀線壓梳掌金筐蹙帶纈紫蒲萄袴花紅石竹凝情都未語付意微相矚眉斂逺山青鬟低片雲緑帳牽翡翠帶被解鴛鴦襆秀色似堪飱穠華如可掬半卷錦頭席斜鋪繡腰褥朱唇素指勻粉汗紅綿撲心驚睡易覺夢斷魂難續籠委獨棲禽劒分連理木存誠期有感誓志貞無黷京洛八九春未曾花裏宿壯年徒自棄佳會應無復鸞歌不重聞鳯兆從兹卜韋門女清貴裴氏甥賢淑羅扇夾花燈金鞍攢繡轂既傾南國貌遂坦東床腹劉阮心漸忘潘楊意方睦新修履信第初食尚書祿九醖備聖賢八珍窮水陸秦家重蕭史彥輔憐衛叔朝饌饋獨盤夜醪傾百斛親賔盛輝赫妓樂紛曄煜宿醉才解醒朝歡俄枕麴飲過君子爭令甚將軍酷酩酊歌鷓鴣顛狂舞鴝鵒月流春夜短日下秋天速謝傅隙過駒一作奔光蕭娘風送一作過燭全凋蕣花折半死梧桐秃暗鏡對孤鸞哀絃留寡鵠凄凄隔幽顯冉冉移寒燠萬事此時休百身何處贖提攜小兒女將領舊姻族再入朱門行一傍青樓哭櫪空無廄馬水涸失池鶩搖落廢井梧荒涼故籬菊莓苔上几閣塵土生琴築舞榭綴蠨蛸歌梁聚蝙蝠嫁分紅粉妾賣散蒼頭僕門客思倣徨家人泣咿噢心期正蕭索宦序仍拘局懷䇿入崤函驅車辭郟鄏逢時念既濟聚學思大畜端詳筮仕蓍磨拭穿楊鏃始從讐校職首中賢良目一拔侍瑶墀再升紆繡服誓酬君王寵願使朝廷肅密勿奏封章清明操憲牘鷹韝中病下豸角當邪觸糾繆盡一作靜東周申寃動南蜀危言詆閽寺直氣忤鈞軸不忍曲作鈎乍能折為玉捫心無愧畏騰口有謗讟只要明是非何曾虞禍福車摧太行路劒落酆城獄襄漢問修途荆蠻指殊俗謫為江府掾遣事荆州牧趨走謁麾幢喧煩視鞭朴簿書常自領縲囚每親鞠竟日坐官曹經旬曠休沐宅荒渚宫草馬瘦畬田粟薄俸等涓毫微官同桎梏月中照形影天際辭骨肉鶴病翅羽垂獸窮爪牙縮行看鬢間白誰勸杯中緑時傷大野麟命問長沙鵩夏梅山雨漬秋瘴海一作江雲毒巴水白茫茫楚山青簇簇吟君七十韻是我心所蓄既去誠莫追將來幸前朂欲除憂惱病當取禪經讀須悟事皆空無令念將屬請思遊春夢此夢何閃倐豔色即空花浮生乃焦穀良姻在嘉偶頃刻為單獨入仕欲榮身須臾成黜辱合者離之始樂兮憂所伏愁恨僧祗長歡榮剎那促覺悟因傍喻迷執由當局膏明誘暗蛾陽焱奔癡鹿貪為苦聚落愛是悲林麓水蕩無明波輪回死生輻塵應甘露灑垢待醍醐浴障要智燈燒魔須慧刀戮外熏性易染內戰心難衄法句與心王期君日三復微之常以法句及心王頭陀經相示故申言以卒其志也秋晚十六卷內籬菊花稀砌桐落樹隂離離日色薄單幕踈簾貧寂寞涼風冷露秋蕭索光隂流轉忽已晚顔色凋殘不如昨萊妻卧病月明時不搗寒衣空搗藥謫居面瘦頭斑四十四逺謫江州為郡吏逢時棄置從不才未老衰羸為何事火燒寒澗松為燼霜降春林花委地遭時榮悴一時間豈是昭昭上天意偶然二首楚懷邪亂靈均直放棄合宜何惻惻漢文明聖賈生賢謫向長沙堪歎息人事多端何足怪天文至信猶差忒月離于畢合雱􅀢有時不雨誰能測火發城頭魚水裏救火竭池魚失水乖龍藏在牛領中雷擊龍來牛枉死人道蓍神龜骨聖試卜魚牛那至此六十四卦七十鑽畢竟不能知所以喜山石榴花開去年自廬山移來以下十八卷內忠州州裏今日花廬山山頭去年樹已憐根損斬新栽還喜花開依舊數赤玉何人小琴軫紅纈誰家合羅袴但知爛熳恣情開莫怕南賔桃李妒惻惻吟惻惻復惻惻逐臣返鄉國前事難重論少年不再得泥塗絳老頭斑白炎瘴靈均面黎黑六年不死却歸來道著姓名人不識獨眠吟二首夜長無睡起階前寥落星河欲曙天十五年來明月夜何曾一夜不孤眠獨眠客夜夜可憐長寂寂就中今夜最愁人涼月清風滿床席期不至紅燭清尊久延佇出門入門天欲曙星稀月落竟不來煙栁曨曨鵲飛去代謝好答崔員外謝好妓也十九卷內青娥小謝娘白髮老崔郎謾愛胸前雪其如頭上霜别後曹家碑背上思量好字斷君腸白香山詩集卷十二
