body:
  text: 白香山詩集卷二歙縣汪立名編長慶集二諷諭古調詩五言凡五十八首續古詩十首戚戚復戚戚送君遠行役行役非中原海外黃沙磧伶俜獨居妾迢遞長征客君望功名歸妾憂生死隔誰家無夫婦何人不離拆所恨薄命身嫁遲别日迫妾身有存沒妾心無改易生為閨中婦死作山頭石掩淚别鄉里飄颻將逺行茫茫緑野中春盡孤客情驅馬上丘隴髙低路不平風吹棠梨花啼鳥時一聲古墓何代人不知姓與名化作路傍土年年春草生感彼忽自悟今我何營營朝采山上薇暮采山上薇歲晏薇亦盡飢來何所為坐飲白石水手把青松枝擊節獨長歌其聲清且悲櫪馬非不肥所苦常縶維豢豕非不飽所憂竟為犧行行歌此曲以慰常苦飢雨露長纖草山苗髙入雲風雪折徑木澗松摧為薪風摧此何意雨長彼何因百丈澗底死寸莖山上春可憐苦節士感此涕盈巾窈窕雙鬟女容德俱如玉晝居不踰閾夜行常秉燭氣如含露蘭心如貫霜竹宜當備嬪御胡為守幽獨無媒不得選年忽過三六歲暮望漢宫誰在黃金屋邯鄲進娼女能唱黃花曲一曲稱君心恩榮連九族栖栖逺方士讀書三十年業成無知已徒步來入關長安多王侯英俊競攀援幸隨衆賔末得厠門館間東閣有㫖酒中堂有管絃何為向隅客對此不開顔富貴無是非主人終日歡貧賤多悔尤客子終一作中夜歎歸去復歸去故鄉貧亦安凉風飄嘉樹日夜減芳華下有感秋婦攀條苦悲嗟我本幽間女結髮事豪家豪家多婢僕門內頗驕奢良人近封侯出入鳴玉珂自從富貴來恩薄讒言多冢婦獨守禮羣妾互奇邪但信言有玷不察心無瑕容光未銷歇歡愛忽蹉跎何意掌上玉化為眼中砂盈盈一尺水浩浩千丈河勿言小大異隨分有風波閨房猶復爾邦國當如何心亦無所迫身亦無所拘何為腸中氣鬱鬱不得舒不舒良有以同心久離居五年不見面三年不得書念此令人老抱䣛坐長吁豈無盈尊酒非君誰與娛攬衣出門行遊觀繞林渠淡淡春水暖東風生緑蒲上有和鳴鴈下有掉尾魚飛沉一何樂鱗羽各有徒而我方獨處不與之子俱顧彼自傷已禽魚之不如出遊欲遣憂孰知憂有餘春旦日初出曈曈耀晨輝草木照未逺浮雲已蔽之天地黯以晦當午如昏時雖有東南風力微不能吹中園何所有滿地青青葵陽光委雲上傾心欲何依秦中吟十首并序貞元元和之際豫在長安聞見之間有足悲者因直歌其事命為秦中吟議婚按韋縠才調集作貧家女天下無正聲恱耳即為娛人間無正色恱目即為姝顔色非相逺貧富則有殊貧為時所棄富為時所趨紅樓富家女金縷繡羅襦見人不斂手嬌癡二八初母兄未開口已嫁不須臾緑窗貧家女寂寞二十餘荆叉不直錢衣上無真珠幾回人欲聘臨日又踟蹰主人㑹良媒置酒滿玉壺四座且勿飲聽我歌兩途富家女易嫁嫁早輕其夫貧家女難嫁嫁晚孝於姑聞君欲娶婦娶婦意何如重賦按才調集作無名稅厚地植桑麻所用濟生民生民理布帛所求活一身身外充征賦上以奉君親國家定兩稅本意在愛一作憂人厥初防其淫明敕內外臣稅外加一物皆以枉法論奈何歲月久貪吏得因循浚我以求寵斂索無冬春織絹未成匹繅絲未盈斤里胥迫一作逼我納不許暫逡巡歲暮天地閉隂風生破村夜深煙火盡霰雪白紛紛幼者形不蔽老者體無溫悲喘與寒氣併入鼻中辛昨日輸殘稅因窺官庫門繒帛如山積絲絮似雲屯號為羡餘物隨月獻至尊奪我身上暖買爾眼前恩進入瓊林庫嵗久化為塵傷宅按才調集作傷大宅誰家起甲第朱門大道邊豐屋中櫛比髙墻外回環纍纍六七堂棟宇相連延一堂費百萬鬱鬱起青煙洞房溫且清寒暑不能干髙堂虛且逈坐臥見南山繞廊紫藤架夾砌紅藥欄攀枝摘櫻桃帶花移牡丹主人此中坐十載為大官厨有臭敗肉庫有貫朽錢誰能將我語問爾骨肉間豈無窮賤者忍不救飢寒如何奉一身直欲保千年不見馬家宅今作奉誠園傷友又云傷苦節士按才調集作膠漆契陋巷孤寒士出門苦恓恓雖云志氣髙豈免顔色低平生同門一作袍友通籍在金閨曩者膠漆契邇來雲雨暌正逢下朝歸軒騎五門西是時天久隂三日雨淒淒蹇驢避路立肥馬當風嘶回頭忘相識占道上沙堤昔年洛陽社貧賤相提攜今日長安道對面隔雲泥近日多如此非君獨慘悽死生不變者唯聞任與黎任公叔黎逢不致仕按才調集作合致仕七十而致仕禮法有明文何乃貪榮者一作貴斯言如不聞可憐八九十齒墮雙眸昏朝露貪名利夕陽憂子孫掛冠顧翠緌懸車惜朱輪金章腰不勝傴僂入君門誰不愛富貴誰不戀君恩年髙須告老名遂合退身少時共嗤誚晚嵗多因循賢哉漢二疏彼獨是何人寂寞東門路無人繼去塵立名按八朝偶雋元和初杜佑為司徒年過七十猶未請老裴晉公時知制誥因髙郢致仕令詞曰以年致仕抑有前聞近代寡亷罕由斯道蓋譏佑也公此詩所指當與裴同盛為當時傳誦厥後杜牧之每于公多不足語形之詩篇至托李戡之言極口詆誚文章家報復可畏如此宋祁不察据以論公過矣牧之佑之孫也立碑按才調集作古碑勛德既下衰文章亦陵夷但見山中石立作路旁碑銘勳悉太公叙德皆仲尼復以多為貴千言直萬資為文彼何人想見下筆時但欲愚者恱不思賢者嗤豈獨賢者嗤仍傳後代疑古石蒼苔字安知是愧詞我聞望江縣麴令撫惸嫠麴令名信陵在官有仁政名不聞京師身殁欲歸葬百姓遮路岐攀轅不得歸留葬此江湄至今道其名男女涕皆垂無人立碑碣唯有邑人知立名按麴信陵貞元元年鮑防下及第以六年作望江令容齊五筆迹其投石祝江祈雨文云必也私欲之求行于邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移于人以害其嵗其為政蓋可想見矣輕肥按才調集作江南旱意氣驕滿路鞍馬光照塵借問何為者人稱是內臣朱紱皆大夫紫綬或一作悉將軍誇赴軍中宴走馬去如雲樽罍溢九醖水陸羅八珍果擘洞庭橘膾切天池鱗食飽心自若酒酣氣益振是嵗江南旱衢州人食人五絃按才調集作五絃琴清歌且罷一作停唱紅袂亦停舞趙叟抱五絃宛轉當胸撫大聲粗若散颯颯風和雨小聲細欲絶切切鬼神語又如鵲報喜轉作猿啼苦十指無定音顚倒宫徴羽坐客聞此聲形神若無主行客聞此聲駐足不能舉嗟嗟俗人耳好今不好古所以緑窗琴日日生塵土歌舞按才調集作傷閿鄉縣囚秦城嵗云暮大雪滿皇州雪中退朝者朱紫盡公侯貴有風雪興富無飢寒憂所營唯第宅所務在追遊朱門車馬客紅燭歌舞樓歡酣促密坐醉暖脫重裘秋官為主人廷尉居上頭日中為樂飲一作一樂夜半不能休豈知閿鄉獄中有凍死囚買花按才調集作牡丹帝城春欲暮喧喧車馬度共道牡丹時相隨買花去貴賤無常價酬直看花數灼灼百朵紅戔戔五束素上張幄幕庇旁織笆籬護水灑復泥封移來色如故家家習為俗人人迷不悟有一田舍翁偶來買花處低頭獨長歎此歎無人諭一叢深色花十户中人賦立名按海虞馮班云白公諷刺詩周詳明直娓娓動人自創一體古人無是蓋出於小雅也贈友五首并序吾友有王佐之才者以致君濟人為已任識者深許之因贈是詩以廣其志云一年十二月每月有常令君出臣奉行謂之握金鏡由兹六氣順以遂萬物性時令一反常生靈受其病周漢德下衰王風始不競又從斬鼂錯諸侯益強盛百里不同禁四時自為政盛夏興土功方春勦人命誰能救其失待君佐邦柄峩峩象魏門懸法彞倫正銀生楚山曲金生鄱溪濵南人棄農業求之多苦辛披砂復鑿石矻矻無冬春手足盡皴胝愛利不愛身畬田既慵斫稻田亦懶耘相攜作游手皆道求金銀畢竟金與銀何殊泥與塵且非衣食物不濟飢寒人棄本以趨末日富而嵗貧所以先聖王棄藏不為珍誰能反古風待君秉國鈞捐金復抵璧勿使勞生民私家無錢爐平地無銅山胡為秋夏稅嵗嵗輸銅錢錢力日已重農力日已殫賤糶粟與麥賤貿絲與棉嵗暮衣食盡焉得無飢寒吾聞國之初有制垂不刋庸必算丁口租必計桑田不求土所無不強人所難量入以為出上足下亦安兵興一變法兵息遂不還使我農桑人憔悴畎畝間誰能革此弊待君秉利權復彼租庸法令如貞觀年京師四方則王化之本根長吏久於政然後風教敦如何尹京者遷次不逡巡請君屈指數十年十五人科條日相矯吏力亦以勤寬猛政不一民心安得淳九州雍為首羣牧之所遵天下率如此何以安吾民誰能變此法待君贊絲綸愼擇循良吏令其長子孫三十男有室二十女有歸近代多離亂婚姻多過期嫁娶既不早生育常苦遲兒女未成人父母已衰羸凡人貴達日多在長大時欲報親不待孝心無所施哀哉三牲養少得及庭闈惜哉萬鍾粟多用飽妻兒誰能正婚禮待君張國維庶使孝子心皆無風樹悲寓意詩五首豫樟生深山七年而後知挺髙二百尺本末皆十圍天子建明堂此材獨中規匠人執斤墨采度將有期孟冬草木枯烈火燎山陂疾風吹猛焰從根燒到枝飬材三十年方成棟梁姿一朝為灰燼柯葉無孑遺地雖生爾材天不與爾時不如糞土英猶有人掇之已矣勿重陳重陳令人悲不悲焚燒苦但悲采用遲赫赫京內史炎炎中書郎昨傳徴拜日恩賜頗殊常貂冠水蒼玉紫綬黃金章佩服身未暖已聞竄遐荒親戚不得别吞聲泣路旁賔客亦已散門前雀羅張富貴來不久倐如瓦溝霜權勢去尤速瞥若石火光不如守貧賤貧賤可久長傳語宦遊者且來歸故鄉促織不成章提壺但聞聲嗟哉蟲與鳥無實有虛名與君定交日久要如弟兄何以示誠信白水指為盟雲雨一為别飛沉兩難并君為得風鵬我為失水鯨音信日已疏恩分日已輕窮通尚如此何况死與生乃知擇交難須有知人明莫將山上松結託水上萍翩翩兩𤣥鳥本是同巢燕分飛來幾時秋夏炎凉變一宿蓬蓽廬一栖明光殿偶因銜泥處復得重相見彼矜杏梁貴此嗟茅棟賤眼看秋社至兩處俱難戀所託各暫時胡為相歎羡婆娑園中樹根株大合圍蠢爾樹間蟲形質一何微孰謂蟲至微蟲一作蠱蠧巳無期孰謂樹至大花葉有衰時花衰夏未實葉病秋先萎樹心半為土觀者安得知借問蟲何在在身不在枝借問蟲何食食心不食皮豈無啄木鳥觜長將何為讀史五首楚懷放靈均國政亦荒淫倣徨未忍决繞澤行悲吟漢文疑賈生謫置湘之隂是時刑方措此去難為心士生一代間誰不有浮沉良時真可惜亂世何足欽乃知汨羅恨未抵長沙深禍患如棼絲其來無端緒馬遷下蠶室嵇康就囹圄抱寃志氣屈忍恥形神沮當彼戮辱時奮飛無翅羽商山有黃綺潁川有巢許何不從之遊超然離網罟山林少羈鞅世路多艱阻寄謝伐檀人愼勿嗟窮處漢日大將軍少為乞食子秦時故列侯老作鋤瓜士春華何暐曄園中發桃李秋風忽蕭條堂上生荆把深谷變為岸桑田成海水勢去未須悲時來何足喜寄言榮枯者反復殊未已含沙射人影雖病人不知巧言搆人罪至死人不疑掇蜂殺愛子掩鼻戮寵姬𢎞恭陷蕭望趙髙謀李斯隂德既必報隂禍豈虛施人事雖可罔天道終難欺明則有刑辟幽則有神祗苟免勿私喜鬼得而誅之季子憔悴時婦見不下機買臣負薪日妻亦棄如遺一朝黃金多佩印衣錦歸去妻不敢視婦嫂強依依富貴家人重貧賤妻子欺奈何貧富間可移親愛志遂使中人心汲汲求富貴又令下人力各競錐刀利隨分歸舍來一取妻孥意和答詩十首并序五年春微之從東臺來不數日又左轉為江陵士曹掾詔下日㑹豫下內直歸而微之已即路邂逅相遇於街衢中自永壽寺南抵新昌里北得馬上話别語不過相勉保方寸外形骸而已因不暇及他是夕足下次於山北寺僕職役不得去命季弟送行且奉新詩一軸致於執事凡二十章率有比興淫文豔韻無一字焉意者欲足下在途諷讀且以遣日時消憂悶又有以張直氣而扶壯心也及足下到江陵寄在路所為詩十七章凡五六千言言有為章有㫖逮於宫律體裁皆得作者風發緘開卷且喜且怪僕思牛僧孺戒不能示他人唯與杓直拒非及樊宗師輩三四人時一吟讀心甚貴重然竊思之豈僕所奉者二十章遽能開足下聰明使之然耶抑又不知足下是行也天將屈足下之道激足下之心使感時發憤而臻於此耶若兩不然者何立意措辭與足下前時詩如此之相逺也僕既羡足下詩又憐足下心盡欲引狂簡而和之屬直宿拘牽居無暇日故不即時如意旬月來多乞病假假中稍閒且摘卷中尤者繼成十章亦不下三千言其間所見同者固不能自異異者亦不能強同同者謂之和異者謂之答并别録和夢遊春詩一章各附於本篇之末餘未和者亦續致之頃者在科試間常與足下同筆硯每下筆時輒相顧共患其意太切而理太周故理太周則辭繁意太切則言激然與足下為文所長在於此所病亦在於此足下來序果有辭犯文繁之說今僕所和者猶前病也待與足下相見日各引所作稍刪其繁而晦其義焉餘具書白和思歸樂山中不栖鳥夜半聲嚶嚶似道思歸樂行人掩泣聽皆疑此山路遷客多南征憂憤氣不散結化為精靈我謂此山鳥本不因人生人心自懷土想作思歸鳴孟嘗平居時娛耳琴泠泠雍門一言感未奏淚沾纓魏武銅雀妓日與歡樂并一旦西陵望欲歌先涕零峽猿亦何意隴水復何情為入愁人耳皆為腸斷聲請看元侍御亦宿此郵亭因聽思歸鳥神氣獨安寧問君何以然道勝心自平雖為南遷客如在長安城云得此道來何慮復何營窮達有前定憂喜無交爭所以事君日持憲立大庭雖有回天力撓之終不傾况始三十餘年少有直名心中志氣大眼前爵祿輕君恩若雨露君威若雷霆退不苟免難進不曲求榮在火辨玉性經霜識松貞展禽任三黜靈均長獨醒獲戾自東洛貶官向南荆再拜辭闕下長揖别公卿荆州又非逺驛路半月程漢水照天碧楚山插雲青江陵橘似珠宜城酒如餳誰謂譴謫去未妨遊賞行人生百嵗內天地暫寓形太倉一稊米大海一浮萍身委逍遙篇心付頭陀經尚達死生觀寧為寵辱驚中懷苟有主外物安能縈任意思歸樂聲聲啼到明和陽城驛商山陽城驛中有歎者誰云是元監察江陵謫去時忽見此驛名良久涕欲垂何故陽道州名姓同於斯憐君一寸心寵辱誓不移疾惡若巷伯好賢如緇衣沉吟不能去意者欲改為改為避賢驛大署於門楣荆人愛羊祜户曹改為辭一字不忍道况兼姓呼之因題八百言言直文甚竒詩成寄與我鏗若金和絲上言陽公行友悌無等夷骨肉同衾裯至死不相離次言陽公迹夏邑始棲遲鄉人化其風少長皆孝慈次言陽公道終日對酒巵兄弟笑相顧醉貌紅怡怡次言陽公節謇謇居諌司誓心除國蠧决死犯天威終言陽公命左遷天一涯道州炎瘴地身不得生歸一一皆實録事事無孑遺凡是為善者聞之惻然悲道州既已矣往者不可追何世無其人來者亦可思願以君子文告彼大樂師附於雅歌末奏之白玉墀天子聞此章教化如法施直諌從如流佞臣惡如疵宰相聞此章政柄端正持進賢不知倦去邪勿復疑憲臣聞此章不敢懷依違諌官聞此章不忍縱詭隨然後告史氏舊史有前規若作陽公傳欲令後世知不勞叙世家不用費文辭但使國史上全録元稹詩答桐花山木多蓊鬱兹桐獨亭亭葉重碧雲片花簇紫霞英是時三月天春暖山雨晴夜色向月淺暗香隨風輕行者多商賈居者悉黎氓無人解賞愛有客獨屏營手攀花枝立足踏花影行生憐不得所死欲揚其聲截為天子琴刻作古人形云待我成器薦之於穆清誠是君子心恐非草木情胡為愛其華而反傷其生老龜被刳腸不如無神靈雄雞自斷尾不願為犧牲况此好顔色花紫葉青青宜遂天地性忍加刀斧刑我思五丁力拔入九重城當君正殿栽花葉生光晶上對月中桂下覆階前蓂泛拂香爐煙隱映斧藻屏為君布緑隂當暑䕃軒楹沉沉緑滿地桃李不敢爭以上四句今本脫落為君發清韻風來如叩瓊泠泠聲滿耳鄭衛不足聽受君封植力不獨吐芬馨助君行春令開花應晴一作清明受君雨露恩不獨含芳榮戒君無戲言剪葉封弟兄受君嵗月功不獨資生成為君長髙枝鳯凰上頭鳴一鳴君萬嵗壽如山不傾再鳴萬人泰泰階為之平如何有此用幽滯在巖坰嵗月不爾駐孤芳坐凋零請向桐枝上為余題姓名待余有勢力移爾獻丹庭和大觜烏烏者種有二名同性不同觜小者慈孝觜大者貪庸觜大命又長生來十餘冬物老顔色變頭毛白茸茸飛來庭樹上初但驚兒童老巫生奸計與烏意潛通云是非凡烏遙見起敬恭千嵗乃一出喜賀主人翁祥瑞來白日神靈占知風隂作北斗使能為人吉凶此烏所止家家産日夜豐上以致壽考下可宜田農主人冨家子身老心童䝉隨巫拜復祝婦姑亦相從殺雞薦其肉敬若禋六宗烏喜張大觜飛接在虛空烏既飽羶腥巫亦饗甘濃烏巫互相利不復兩西東日日營巢窟稍稍近房櫳雖生八九子誰辨其雌雄羣雛又成長衆觜騁殘凶探巢吞燕卵入簇啄蠶蟲豈無乘秋隼羈絆委髙墉但食烏殘肉無施摶擊功亦有能言鸚翅碧觜距紅暫曽說烏罪囚閉在深籠青青窗前栁鬱鬱井上桐貪烏占栖息慈烏獨不容慈烏爾奚為來往何憧憧曉去先晨鼓暮歸後昏鐘辛苦塵土間飛啄禾黍叢得食將母哺飢腸不自充主人憎慈烏命子削彈弓絃續㑹稽竹丸鑄荆山銅慈烏求母食飛下爾庭中數粒未入口一丸已中胸仰天號一聲似欲訴蒼穹反哺日未足非是惜微躬誰能持此寃一為問化工胡然大觜烏竟得天年終答四皓廟天下有道見無道卷懷之此乃聖人語吾聞諸仲尼矯矯四先生同禀希世資隨時有顯晦秉道無磷緇秦皇肆暴虐二世遘亂離先生相隨去商嶺採紫芝君看秦獄中戮辱者李斯劉項爭天下謀臣竟恱隨先生如鸞鶴去入冥冥飛君看齊鼎中燋爛者酈其子房得沛公自謂相遇遲八難掉舌樞三界役心機辛苦十數年晝夜形神疲竟雜霸者道徒稱帝者師子房爾則能此非吾所宜漢髙之季年嬖寵鍾所私冢嫡欲廢奪骨肉相憂疑豈無子房口口舌無所施亦有陳平心心計將何為皤皤四先生髙冠危映睂從容下南山顧眄入東闈前瞻惠太子左右生羽儀却顧戚夫人楚舞無光輝心不畫一計口不吐一詞暗定天下本遂安劉氏危子房吾則能此非爾所知先生道既光太子禮甚卑安車留不住功成棄如遺如彼旱天雲一雨百榖滋澤則在天下雲復歸希夷勿髙巢與由勿尚吕與伊巢由往不返伊吕去不歸豈如四先生出處兩逶迤何必長隱逸何必長濟時由來聖人道無朕不可窺卷之不盈握舒之亘八陲先生道甚明夫子猶或非願子辨其惑為豫吟此詩和雉媒吟君雉媒什一哂復一歎和之一何晚今日乃成篇豈唯鳥有之抑亦人復然張陳刎頸交竟以勢不完至今不平氣塞絶泜水源趙襄骨肉親亦以利相殘至今不善名髙於磨筓山况此籠中雉志在飲啄間稻粱暫入口性已隨人遷身苦亦自忘同族何足言但恨為媒拙不足以自全勸君今日後養鳥養青鸞青鸞一失侣至死守孤單勸君今日後結客結任安主人賔客去獨住在門䦨和松樹亭亭山上松一一生朝陽森聳上參天柯條百尺長漠漠塵中槐兩兩夾康莊婆娑低覆地枝幹亦尋常八月白露降槐葉次第黃嵗暮滿山雪松色鬱青蒼彼如君子心秉操貫冰霜此如小人面變態隨炎凉共知松勝槐誠欲栽道傍糞土種瑶草瑶草終不芳尚可以斧斤伐之為棟梁殺身獲其所為君構明堂不然終天年老死在南岡不願亞枝葉低隨槐樹行答箭鏃矢人職司憂為箭恐不精精則利其鏃錯磨鋒鏑成插以青竹簳羽之赤鴈翎勿言分寸鐵為用乃長兵聞有狗盜者晝伏夜潛行摩弓拭箭鏃夜射不待明一盜既流血百犬同吠聲狺狺嘷不巳主人為之驚盜心憎主人主人不知情反責鏃太利矢人獲罪名寄言控弦者願君少留聽何不向西射西天有狼星何不向東射東海有長鯨不然學仁貴三矢平虜廷不然學仲連一發下燕城胡為射小盜此用無乃輕徒沾一㸃血虛汚箭頭腥和古社廢村多年樹生在古社隈為作妖狐窟心空身未摧妖狐變美女社樹成樓臺黃昏行人過見者心徘徊飢鵰竟不捉老犬反為媒嵗媚少年客十去九不回昨夜雲雨合烈風驅迅雷風拔樹根出雷劈社壇開飛電化為火妖狐燒作灰天明至其所清曠無氛埃舊地葺村落新田闢荒萊始知天降火不必常為災勿謂神默默勿謂天恢恢勿喜犬不捕勿誇鵰不猜寄言狐媚者天火有時來和分水嶺髙嶺峻稜稜細泉流亹亹勢分合不得東西隨所委悠悠草蔓底濺濺石罅裏分流來幾年晝夜兩如此朝宗逺不及去海三千里浸潤小無功山苖長旱死縈紆用無所奔迫流不巳唯作鳴咽聲夜入行人耳有源殊不竭無坎終難止同出而異流君看何所似有似骨肉親𣲖别從兹始又似勢利交波瀾相背起所以贈君詩將君何所比不比山上泉比君井中水有木詩八首并序余嘗讀漢書列傳見佞順媕婀圗身妄國如張禹輩者見惑上蠱下交亂君親如江充輩者見暴狠跋扈壅君樹黨如梁冀輩者見色仁行違先德後賊如王莽輩者又見外狀恢𢎞中無實用者又見附離權勢隨之覆亡者其初皆有動人之才足以惑衆媚主莫不合於始而敗於終也因引風人騷人之興賦有木八章不獨諷前人亦警後代爾有木名弱栁結根近清池風煙借顔色雨露助華滋峩峩白雪毛一作花嫋嫋青絲枝漸密隂自庇轉髙梢四垂截枝扶為杖軟弱不自持折條用樊圃柔脆非其宜為樹信可玩論材何所施可惜金堤地栽之徒爾為有木名櫻桃得地早滋茂葉密獨承日花繁偏受露迎風暗搖動引鳥自一作潛來去鳥啄子難成風來枝莫住低軟易攀玩佳人屢回顧色求桃李饒心向松筠妬好是映墻花本非當軒樹所以姓蕭人曽為伐櫻賦有木秋不凋青青在江北謂為洞庭橘美人自移植上受顧盻恩下勤澆溉力實成乃是枳臭苦不堪食物有似是者真僞何由識美人默無言對之長歎息中含害物意外矯凌霜色仍向枝葉間潛生刺如棘有木名杜梨隂森覆丘壑心蠧已空朽根深尚盤薄媚狐言語巧妖鳥聲音惡憑此為巢穴往來互棲託四傍五六本枝葉相交錯借問因何生秋風吹子落為長社壇下無人敢芟斫幾度野火來風迥回燒不著有木香苒苒山頭生一蕟主人不知名移種近軒闥愛其有芳味因以調麯糵前後曽飲者十人無一活豈徒悔封植兼亦誤采掇試問識藥人始知名野葛年深已滋蔓刀斧不可伐何時猛風來為我連枝拔有木名水柳逺望青童童根株非徑挺柯葉多䝉籠彩翠色如柏鱗皴皮似松為同松柏類得列嘉樹中枝弱不勝雪勢髙常懼風雪壓低還舉風吹西復東柔芳甚楊栁早落先梧桐惟有一堪賞中心無蠧蟲有木名凌霄擢秀非孤標偶依一株樹遂抽百尺條託根附樹身開花寄樹梢自謂得其勢無因有動搖一旦樹摧倒獨立暫飄颻疾風從東起吹折不終朝朝為拂雲花暮為委地樵寄言立身者勿學柔弱苖有木名丹桂四時香馥馥花團夜雪明葉剪春雲緑風影清似水霜枝冷如玉獨占小山幽不容凡鳥宿匠人愛芳直裁截為厦屋幹細力未成用之君自速重任雖大過直心終不曲縱非梁棟材猶勝尋常木立名按韻語陽秋樂天有木八章其六章托弱栁等以諷在位者七章諷附麗權勢者八章曰有木名丹桂蓋自謂也樂天素善李紳而不入德裕黨素善牛僧孺楊虞卿而不入宗閔之黨素善劉禹錫而不入伾文之黨中立不倚峻節凛然自比於桂殆未為過也歎魯二首季桓心豈忠其富過周公陽貨道豈正其權執國命由來富與權不繫才與賢所託得其地雖愚亦獲安彘肥因糞壤鼠穩依社壇蟲獸尚如此豈謂無因緣展禽胡為者直道竟三黜顔子何如人屢空聊過日皆懷王佐道不踐陪臣秩自古無奈何命為時所屈有如草木分天各與其一荔枝非名花牡丹無甘實反鮑明逺白頭吟炎炎者烈火營營者小蠅火不熱貞玉蠅不㸃清冰此苟無所受彼莫能相仍乃知物性中各有能不能古稱怨恨一作報死則人有所懲懲淫或應可在道未為𢎞譬如蜩鷃徒啾啾啅龍鵬宜當委之去寥廓髙飛騰豈能泥塵下區區酬怨憎胡為坐自苦吞悲仍撫膺青冢上有飢鷹號下有枯蓬走茫茫邊雪裏一掬沙培塿傳是昭君墓埋閉蛾睂久凝脂化為泥鉛黛復何有唯有隂怨氣時生墳左右鬱鬱如苦霧不隨骨銷朽婦人無他才榮枯繫妍否何乃明妃命獨懸畫工手丹青一詿誤白黑相紛糾遂使君眼中西施作嫫母同儕傾寵幸異類為配偶禍福安可知美顔不如醜何言一時事可戒千年後特報後來姝不須倚睂首無辭插荆叉嫁作貧家婦不見青冢上行人為澆酒雜感君子防悔尤賢人戒行藏嫌疑逺瓜李言動慎毫芒立教固一作圗如此撫事有非常為君持所感仰面問蒼蒼犬囓桃樹根李樹反見傷老龜烹不爛延禍及枯桑城門自焚熱池魚罹其殃陽貨肆凶暴仲尼畏於匡魯酒薄如水邯鄲開戰場伯禽鞭見血過失由成王都尉身降虜宫刑加子長吕安兄不道都市殺嵇康斯人死已久其事甚昭彰是非不由巳禍患安可防使我千載後涕泗滿衣裳白香山詩集卷二
