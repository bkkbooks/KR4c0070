body:
  text: 白香山詩集卷四十歙縣汪立名編補遺下雜體聨句凡三十首七老會詩刑部尚書致仕太原白居易年七十四并序胡吉劉鄭盧張等六賢皆多年夀余亦次焉偶於東都敝居履道坊合成尚齒之會七老相顧既醉且歡靜而思之此會希有因各賦七言六韻詩一章以紀之或傳諸好事者會昌五年三月二十四日於白家履道宅同宴宴罷賦詩時祕書監狄兼謨河南尹盧貞以年未七十雖與會而不及列七人五百八十四今本作七人五百七十歲拖紫紆朱垂白鬚手裏無金莫嗟歎尊中有酒且歡娛吟成六韻神還壯飲到三杯氣尚粗嵬峨狂歌教婢拍婆娑醉舞遣孫扶天年髙過二疏傳人數多於四皓圖除却三山五天竺三仙山五天竺國多老夀者人間此會更應無前懷州司馬安定胡杲年八十九間居同會在三春大抵愚年最出羣霜鬢不嫌杯酒興白頭仍愛玉爐熏徘徊玩栁心猶健老大看花意却勤鑿落滿斟判酩酊香囊髙挂任氤氲搜神得句題紅葉望景長吟對白雲今日交情何不替齊年同事聖明君衛尉卿致仕馮翊吉皎年八十八休官罷任已間居林苑園亭興有餘對酒最宜花藻發邀歡不厭栁條初低腰醉舞垂緋袖擊築謳歌任褐裾寧用管絃來合雜自親松竹且清虛飛觥酒到須先酌賦詠成詩不住書借問商山賢四皓不知此後更何如前磁州刺史廣平劉真年八十七垂絲今日幸同筵朱紫居身是大年賞景尚知心未退吟詩猶覺力完全間庭飲酒當三月在席揮毫象七賢山茗煮時秋露碧玉杯斟處彩霞鮮臨階花笑如歌妓傍竹松聲當管絃雖未學窮生死訣人間豈不是神仙前右龍武軍長史滎陽鄭據年八十五東洛幽間日暮春邀歡多是白頭賔官班朱紫多相似年紀髙低次第勻聨句每言松竹意停杯多説古今人更無外事來心肺空有清虛入思神醉舞兩回迎勸酒狂歌一曲會娛身今朝何事偏情重同作明時列任臣前侍御史內供奉范陽盧真年八十三三春已盡洛陽宫天氣初晴景象中千朵嫩桃迎曉日萬株垂栁逐和風非論官位皆相似及至年髙亦共同對酒歌聲猶覺妙玩花詩思豈能窮先時共作三朝貴今日猶逢七老翁但願醁醽常滿酌煙霞萬里會應通前永州刺史清河張渾年七十七幽亭春盡共為歡印綬居身是大官遁迹豈勞登逺岫垂絲何必坐溪磻詩聨六韻猶應易酒飲三杯未覺難每況襟懷同宴會共將心事比波瀾風吹野栁垂羅帶日照庭花落綺紈此席不煩鋪錦帳斯筵堪作畫圖看九老圖詩并序會昌五年三月胡吉劉鄭盧張等六賢於東都敝居履道坊合尚齒之會其年夏又有二老年貌絶倫同歸故鄉亦來斯會續命書姓名年齒寫其形貌附於圖右與前七老題為九老圖仍以一絶贈之洛中遺老李元爽年一百三十六歸洛僧如滿年九十五雪作鬚眉雲作衣遼東華表鶴雙歸當時一鶴猶希有何況今逢兩令威新唐書本傳白居易居東都履道里疏沼種樹搆石樓香山鑿八節灘經月不食葷自號香山居士與胡杲吉皎劉真盧真張渾狄兼謨盧貞輩燕集皆髙年不事者人慕之繪為九老圖立名按新書多約略意會之誤紀述頗失實如遺却李元爽及如滿僧而以狄盧為九老謬矣白集今本雖遺九老圖一絶句然而狄盧年未七十雖與會而不及列及詩中七人七賢等語具在則狄盧自不與九老之數明矣此香山千古佳話乃集中僅存公詩因從各本搜考六老詩及後題絶句一首以歸補遺集一字至七字詩唐詩紀事樂天分司東洛朝賢悉會興化池亭送别酒酣各請一字至七字詩以題為韻白居易賦詩詩綺美瓌竒明月夜落花時能助歡笑亦傷別離調清金石怨吟苦鬼神悲天下只應我愛世間唯有君知自從都尉別蘇句便到司空送白辭王起賦花花點綴分葩露初裛月未斜一枝曲水千樹山家戲蝶未成夢嬌鶯語更誇既見東園成徑何殊西子同車漸覺風飄輕似雪能令醉者亂如麻李紳賦月月光輝皎潔耀乾坤靜空闊圓滿中秋玩爭詩哲玉兔鏑難穿桂枝人共折萬象照乃無私瓊臺豈遮君謁抱琴對彈別鶴聲不得知音聲不切令狐楚賦山山聳峻回環滄海上白雲間商老深尋謝公逺攀古巖泉滴滴幽谷鳥關關樹島西連隴塞猿聲南徹荆蠻世人只向簪裾老芳草空餘麋鹿間元稹賦茶茶香葉嫩芽慕詩客愛僧家碾雕白玉羅織紅紗銚煎黃蕊色碗轉麴塵花夜後邀陪明月晨前命對朝霞洗盡古今人不倦將知醉亂豈堪誇魏扶賦愁愁迥野深秋生枕上起眉頭閨閣危坐風塵逺遊巴猿啼不住谷水咽還流送客泊舟入浦思鄉望月登樓煙波早晚長羇旅絃管終年樂五侯韋式郎中賦竹竹臨池似玉裛露靜和煙緑抱節寧改貞心自束渭曲種偏多王家看不足仙杖正驚龍化美實當從鳯熟唯愁吹作別離聲回首駕驂舞陳速張籍司業賦花花落早開賖對酒客興詩家能回遊騎每駐行車宛宛清風起茸茸麗日斜且願相留歡洽惟愁虛棄光華明年攀折知不逺對此誰能更歎嗟范堯佐道士賦書書憑雁寄魚出王屋入匡廬文生益智道著清虛葛洪一萬卷惠子五車餘銀鉤屈曲索靖題橋司馬相如别後莫睽千里信數封緘送到間居宴興化池亭送白二十二東歸聨句東洛言歸去西園告别來白頭青眼客池上手中杯度離瑟殷勤奏仙舟委曲回征輪今欲動賔閣為誰開禹錫坐弄琉璃水行登緑褥苔花低妝照影萍散酒吹醅居易岸蔭新抽竹亭香欲變梅隨遊多笑傲遇勝且徘徊籍澄徹連天鏡潺湲出地雷林塘難共賞鞍馬莫相催度信及魚還樂機忘鳥不猜晚晴槐起露新暑石添苔禹錫擬作雲泥别猶思頃刻陪歌亭珠貫斷飲罷玉峰頽居易雖有消搖志其如磊落才會當重入用此去肯悠哉籍首夏猶清和聨句記得謝家詩清和即此時居易餘花數種在密葉幾重垂度芳謝人人惜隂成處處宜禹錫水萍爭點綴梁燕共追隨行式亂蝶憐疏蘂殘鶯戀好枝籍草香殊未歇雲勢漸多竒居易單服初寧體新篁巳出籬度與春為别近覺日轉行遲禹錫繞樹風光少侵階苔蘚滋行式唯思奉歡樂長得在西池籍薔薇花聨句似錦如霞色連春接夏開禹錫波紅分影入風好帶香來度得地依東閣當階奉上台行式淺深皆有態次第暗相催禹錫滿地愁英落緣堤惜棹回度芳濃濡雨露明麗隔塵埃行式似著胭脂染如經巧婦裁居易奈花無别計只有酒殘杯藉西池落泉聨句東閣聽泉落能令夜興多行式散時猶帶沫淙處却跳波度偏洗磷磷石還驚泛泛鵝籍色青塵不染光白月相和居易噴雪縈松竹攢珠濺芰荷禹錫對吟時合響觸樹更搖柯籍照圃紅分藥侵階緑浸莎居易日斜車馬散餘韻逐鳴珂禹錫杏園聨句杏園千畞欲隨風一醉同人此暫同醉上司空老態忽忘絲鬢裏衰顔宜解酒杯中絳上白二十二曲江日暮殘紅盡翰苑年深舊事空居易上主客二十四年流落者故人相引到花叢禹錫花下醉中聨句共醉風光地花飛落酒杯絳送二十八殘春猶可賞晚景莫相催禹錫送白侍郎酒幸年年有花應嵗嵗開居易送兵部相公且當金韻擲莫遣玉山頽絳送庾閣長髙會彌堪惜良時不易陪承宣送主客誰能拉花住爭換得春回禹錫送吏部我輩尋常有佳人早晚來嗣復送兵部寄言三相府欲散且徘徊居易時户部相公同會喜遇劉二十八偶書兩韻聨句病來佳興少老去舊遊稀笑語縱橫作杯觴絡繹飛度清談如冰玉逸韻貫珠璣髙位當金鉉虛懷似布衣禹錫已榮狂取樂仍任醉忘機捨眷將何適留歡便是歸居易風儀常欲附蛟力自知微願假尊罍末膺門自此依紳劉二十八自汝赴左馮翊不歸丹掖去銅竹漫云云唯喜因過我須知未賀君度詩聞安石詠香見令公熏欲首函關路來披緱嶺雲居易貂蟬公獨步鴛鷺我同羣插羽先飛酒交鋒便戰文紳鎮嵩知表德定鼎為銘勳顧鄙容商洛徴歡候汝墳禹錫頻年多謔浪此夕任喧紛故態猶應在行期未要聞度遊藩榮已久捧袂惜將分詎厭杯行疾唯愁日向曛居易窮陰初莽蒼離思漸氤氲殘雪午橋岸斜陽伊水濆紳上謨尊右掖全略靜東軍萬頃徒稱量滄溟詎有垠禹錫豫自到洛中與樂天為文酒之會時時搆詠樂不可支則慨然共憶夢得而夢得亦分司至止歡愜可知因為聨句成周文酒會吾友勝鄒枚唯憶劉夫子而今又到來度欲迎先倒屣一座便傾杯飲許伯倫石詩推公幹才並以本事居易久曾聆郢唱重喜上燕臺晝話牆隂轉宵歡斗柄回禹錫新聲還共聽故態復相咍遇物皆先賞從花半未開度起時烏帽側散處玉山頽墨客喧東閣文星犯上台居易詠吟君稱首疏放我為魁憶戴何勞訪時夢得分司而來留髠不用猜宴席上老夫暫起樂天密坐不動足夢得奉觴承麴糵落筆捧瓊瑰醉辨無妨側詞鋒不可推此兩韻美令公也居易水軒看翡翠石徑踐莓苔童子能騎竹佳人解詠梅陪遊南宅之境禹錫洛中三可矣鄴下七悠哉自向風光急不須絃管催度樂觀魚踴躍間愛鶴徘徊煙栁青凝黛波萍緑撥醅居易春榆初改火律管又飛灰紅藥多遲發碧松宜亂栽禹錫馬嘶駝陌上鷁泛鳯城隈色色時堪借些些病莫推度涸流尋軋軋餘刃轉恢恢從此知心伏無因敢自媒禹錫室隨親客入席許舊寮陪逸興嵇將阮交情陳與雷此二句屬夢得也居易洪爐思哲匠大厦要羣材他日登龍路應知免曝腮禹錫秋霖即事聨句三十韻蕭索窮秋月蒼茫苦雨天泄雲生棟上行潦入庭前居易送上僕射苔色侵三徑波聲想五絃井蛙爭入户轍鮒亂歸泉起送上中丞太監髙響愁晨坐空階警夜眠鶴鳴猶未巳蟻穴亦頻遷禹錫送上少傅侍郎散漫疏還密空濛斷復連竹霑青玉潤荷滴白珠圓居易地溼灰蛾滅池添水馬憐有苖霑霢霂無月弄潺湲起籬菊潛開秀園蔬已罷鮮斷行隨雁翅孤嘯聳鳶肩禹錫橋柱黏黃菌牆衣點緑錢草荒行藥路沙泛釣魚船居易長者車猶阻髙人榻且懸此思劉台之來也金烏何日見玉爵幾時傳起近井桐先落當簷石欲穿趨風誠有戀披霧邈無緣禹錫以答懸懸之召廩米陳生醭庖薪溼起煙鳴雞潛報曉急景暗雕年居易蓋灑髙松上絲繁細栁邊拂叢時起蝶墮葉乍驚蟬起巾角皆爭墊裙裾别似湔人多蒙翠被馬盡著連乾禹錫好客無來者貧家但悄然溼泥印鶴迹漏壁絡蝸涎蚊聚雷侵室鷗翻浪滿川上樓愁羃羃繞舍厭濺濺起律候今秋矣歡娛久曠焉但令髙興在晴後奉周旋禹錫喜晴聨句苦雨晴何喜喜多於雨時氣收雲物變聲樂鳥烏知居易送上僕射蕙泛光風圃蘭開皎月池千峰分逺近九陌好追隨起送上尚書白日開天路玄陰卷地維餘清在林薄新照入漣漪禹錫碧樹涼先落青蕪溼更滋曬毛經浴鶴曳尾出泥龜居易舞去商羊速飛來野馬遲柱邊無潤礎臺上有遊絲起橋淨行塵息堤長禁栁垂宫城開睥睨觀闕麗罘罳禹錫洛水澄清鎮嵩煙展翠帷梁成虹乍見市散蜃初移居易藉草風猶暖攀條露已晞屋穿添碧瓦牆缺召金鎚起回徹來雙目昏煩去四支霞文晚煥爛星影夕參差禹錫爽助門庭肅寒摧草木衰黃乾向陽菊紅洗得霜梨居易假蓋間誰惜彈絃燥更悲散蹄良馬穩炙背野人宜起洞户晨暉入空庭宿霧披推林出書目傾笥上衣椸禹錫道路行非阻軒車望可期無辭訪圭竇且願見瓊枝居易山閣蓬萊客古以祕書喻蓬萊儲宫羽翼師此言少傅每優陪麗句何暇覿英姿起以酬圭竇之言玩景方搔首懷人尚斂眉因吟仲文什髙興盡於斯禹錫會昌春連宴即事元年寒食日上已暮春天雞黍三家會鶯花二節連居易光風初淡蕩美景漸暄妍簪組蘭亭上車輿曲水邊禹錫松聲添奏樂草色助鋪筵雀舫宜間泛螺杯任漫傳起園蔬香帶露厨栁暗藏煙麗句輕珠玉清談勝管絃居易陌喧金距鬭樹動綵繩懸姹女妝梳豔遊童衣服鮮禹錫圃香知種蕙池暖憶開蓮怪石雲疑觸夭桃火欲然起正歡唯恐散雖醉未思眠嘯傲人間世追隨地上仙居易燕來雙涏涏雁去纍翩翩行樂真吾事尋芳獨我先禹錫滯周慙太史太史公留滯周南今榮示慙古人矣入洛繼先賢此言劉白聲價與二陸爭長矣昔恨多分手今歡謬比肩起病猶陪宴飲老更奉周旋望重青雲客情深白首年居易遍嘗珍饌後許入畫堂前舞袖翻紅炬歌鬟插寶蟬禹錫斷金多感激倚玉貴遷延説史吞顔注論詩笑鄭箋起松筠寒不變膠漆冷彌堅興伴王尋戴謂隨僕射過尚書也榮同隗在燕居易自謂擲盧誇使氣刻燭鬭成篇實藝皆三捷虛名愧六聨禹錫興闌猶舉白話靜每思玄更記歸時好亭亭月正圓起僕射王起來示有三春向晚四者難并之説誠哉是言輒引起題重為聨句疲兵再戰勍敵難降下筆之時辴然自哂走呈僕射兼簡尚書劉禹錫三春今向晚四者昔難并借問低眉坐何如攜手行居易舊遊多過隙新宴且尋盟鸚鵡林須樂麒麟閣未成起分陰當愛惜遲景好逢迎林野薰風起樓臺穀雨晴禹錫牆低山半出池廣水初平橋轉長虹曲舟回小鷁輕居易殘花猶布繡密竹自聞笙欲過芳菲節難忘宴慰情起月輪行似箭時物始如傾見雁隨兄去聽鶯求友聲禹錫蕙長書帶展菰嫩剪刀生坐密衣裳暖堂虛絲管清居易峰巒侵碧落草木近朱明與點非沂水陪膺是洛城白為三川守故云起撥醅爭緑醑飲酪侍朱櫻幾處能留客何人喚解酲禹錫舊儀尊右相新命寵春卿有喜鵲頻語無機鷗不驚居易青林思小隱白雪仰芳名訪舊殊千里登髙賴九城起酇侯司管鑰疏傅傲簪纓綸綍曾同掌煙霄即上征禹錫册庭嘗接武書殿忝連衡蘭室春彌馥松心晚更貞居易琴招翠羽下鈎掣紫鱗呈只願回烏景誰能避兕觥居易方知醉兀兀應是走營營鳯閣鸞臺路從他年少爭居易更呈二公樂天是月長齋鄙夫此時愁臥里閭非逺雲霧難披因以寄懷遂為聨句所期解悶焉敢驚襌五月長齋月文心苦行心蘭蔥不入户薝蔔自成林夢得護戒先辭酒嫌喧亦徹琴塵埃賔位靜香火道場深樂天我靜馴狂象餐餘施衆禽定知於佛佞豈復向書淫夢得闌藥凋紅艷庭槐换緑隂風光徒滿目雲霧未披襟樂天樹為清涼倚池因盥潄臨蘋芳遭燕拂􅘟坼待蜂尋夢得舍下環流水窗中列逺岑苔斑錢剝落石怪玉嶔崟樂天鵲頂迎秋秃鶯喉入夏瘖緑楊垂嫩色綖棘露長針夢得散秩身猶幸趨朝力不任官將方共拙年與病交侵樂天徇樂非時選忘機似陸沈鑒容稱四皓捫腹有三壬夢得攜手慙連璧同心許斷金紫芝雖繼唱前後各在賔客白雪少知音樂天憶罷吳門守相逢楚水潯舟中頻曲宴夜後各加斟夢得濁酒銷殘漏絃聲間逺砧酡顔舞長袖密坐接華簪樂天持論峰巒峻戰文矛戟森笑言誠莫逆造次必相針夢得往事應如昨餘歡迄至今迎君常倒屣訪我輒携衾樂天隂魄初離畢將有雨陽光正在參五月之節待公休一食縱飲共狂吟夢得白香山詩集卷四十
