body:
  text: 白香山詩集巻三十七歙縣汪立名編後集十七律詩凡一百八首春池閒汎緑塘新水平紅檻小舟輕解纜隨風去開襟信意行淺憐清演漾深愛緑澄泓白撲栁飛絮紅浮桃落英古文科斗出新葉剪刀生樹集鶯朋友雲行鴈弟兄飛沈皆適性酣飲自怡情花助銀杯氣松添玉軫聲魚跳何事樂鷗起復誰驚莫唱滄浪曲無塵可濯纓池上寓興二絶濠梁莊惠謾相爭未必人情知物情獺捕魚來魚躍出此非魚樂是魚驚水淺魚稀白鷺飢勞心瞪目待魚時外容閒暇中心苦似是而非誰得知宴後題府中水堂贈盧尹中丞昔余為尹日創造之水齋嵗久漸荒蕪自媿甘棠無一株新酒客來方宴飲舊堂主在重歡娛莫言楊栁枝空老府妓有歌楊栁枝曲者因以名焉直致櫻桃樹已枯府西有櫻桃㕔因樹為名今樹亦枯也從我到君十一尹相看自置府中無自予罷後至中丞凡十一尹也和敏中洛下即事時敏中為殿中分司昨日池塘春草生阿連新有好詩成花園到處鶯呼入驄馬遊時客避行水暖魚多似南國人稀塵少勝西京洛中佳境應無限若欲諳知問老兄送敏中新授户部員外郎西歸千里歸程三伏天官新身健馬翩翩行衝赤日加餐飯上到青雲穩著鞭長慶老郎唯我在客曹故事望君傳前鴻後鴈行難續相去迢迢二十年長慶初予為主客郎中知制誥遷中書舍人去今二十一年也立名按唐書武宗聞居易名欲相之以問李徳裕徳裕言居易病廢敏中文類其兄有器識即除翰林學士時方為庫部郎中未逾三年入相南侍御以石相贈助成水聲因以絶句謝之泉石磷磷聲似琴閒眠靜聽洗塵心莫輕兩片青苔石一夜潺湲直萬金閒居自題戲招宿客水畔竹林邊閒居二十年健常攜酒出病即掩門眠解綬收朝佩褰裳出野船屏除身外物擺落世間縁報曙窗何早知秋簟最先微風深樹裏斜日小樓前渠口添新石籬根㵼亂泉欲招同宿客誰解愛潺湲西亭牆下泉石有聲李留守相公見過池上泛舟舉酒話及翰林舊事因成四韻以獻之引棹尋池岸移尊就菊叢何言濟川後相訪釣船中白首故情在青雲往事空同時六學士五相一漁翁立名按紀事李絳時分司東都五相指絳與裴度崔羣裴垍王播一漁翁公自謂也容齋隨筆云此詩紀元和二年至六年事予以其時考之所謂五相者裴垍王涯杜元穎崔羣及絳也閏九月九日獨飲黄花叢畔緑尊前猶有些些舊管絃偶遇閏秋重九日東籬獨酌一陶然自從九月持齋戒不醉重陽十五年覽盧子䝉侍御舊詩多與微之唱和感今傷昔因贈子䝉題於巻後早聞元九詠君詩恨與盧君相識遲今日逢君開舊巻巻中多道贈微之相看掩淚情難說别有傷心事豈知聞道咸陽墳上樹已抽三丈白楊枝北夢𤨏言云白太保與元相國友善以詩道著名時號元白其集内有哭元相詩云相看掩淚俱無語等句洎自撰墓志云與劉夢得為詩友殊不言元公人疑其隙終也立名按此語在醉吟先生傳中非墓志也傳末曰於時開成三年先生之齒六十有七則是微之殁久矣其所謂如滿為空門友韋楚為山水友夢得為詩友皇甫朗之為酒友皆就當時在洛之人而言非該舉平生也且公晩年哭微之作甚多有夢微之詩云夜來攜手夢同遊晨起盈巾淚莫收又聞歌者唱微之詩云時向歌中聞一句未容傾耳巳傷心感悼悽愴如在初没隙終之語豈不大謬邪又考史傳皆作白少傅即公詩内止有少傅官停語並無稱太保者不知何所本也寒亭留客今朝閒坐石亭中爐火銷殘尊又空冷落若為留客住冰池霜竹雪髯翁新小灘石淺沙平流水寒水邊斜插一漁竿江南客見生鄉思道似嚴陵七里灘和李中丞與李給事山居雪夜同宿小酌憲府觸邪峨豸角𤨏闈駮正犯龍鱗二人當官盛事為時所稱也那知近地齋居客忽作深山同宿人一盞寒燈雲外夜數杯温酎雪中春林泉莫作多時計諫獵登封憶舊臣履道西門二首履道西門有敝居池塘竹樹繞吾廬豪華肥壯雖無分飽暖安閒即有餘行竈朝香炊早飯小園春暖掇新蔬夷齊黄綺誇芝蕨比我盤餐恐不如履道西門獨掩扉官休病退客來稀亦知軒冕榮堪戀其柰田園老合歸跛鼈難隨騏驥足傷禽莫趁鳯皇飛世間認得身人少今我雖愚亦庶㡬偶吟人生變改故無窮昔是朝官今野翁久寄形於朱紫内漸抽身入蕙荷中荷衣蕙帶皆楚詞也無情水任方圓器不繫舟隨去住風猶有鱸魚蓴菜興來春或擬往江東雪夜小飲贈夢得同為嬾慢園林客共對蕭條雨雪天小酌酒巡銷永夜大開口笑送殘年久將時背成遺老多被人呼作散仙呼作散仙應有以曾看東海變桑田嵗暮夜長病中燈下聞盧尹夜宴以詩戲之且為來日張本也榮鬧興多嫌晝短衰閒睡少覺明遲當君秉燭銜杯夜是我停飱一作燈服藥時枕上愁吟堪發病府中歡笑勝尋醫明朝强出須謀樂不擬車公更䛏誰病中數㑹張道士見譏以此荅之亦知數出妨將息不可端居守寂寥病即藥窗眠盡日興來酒席坐通宵賢人易狎須勤飲姹女難禁莫漫燒張道士輸白道士一杯沆瀣便逍遥卯飲短屏風掩臥牀頭烏帽青氊白㲲裘卯飲一杯眠一覺世間何事不悠悠寄題餘杭郡樓兼呈裴使君官歴二十政宦遊三十秋江山與風月最憶是杭州北郭沙堤尾西湖石岸頭緑觴春送客紅燭夜迴舟不敢言遺愛空知念舊遊憑君吟此句題向望濤樓楊六尚書留太湖石在洛下借置庭中因對舉杯寄贈絶句借君片石意何如置向庭中慰索居每就玉山傾一酌興來如對醉尚書喜入新年自詠時年七十一白鬚如雪五朝臣又值新正第七旬老過占他藍尾酒病餘收得到頭身銷磨嵗月成髙位比類時流是幸人大歴年中騎竹馬㡬人得見㑹昌春灘聲碧玉斑斑沙歴歴清流決決響泠泠自從造得灘聲後玉管朱絃可要聽題石泉殷勤傍石繞泉行不說何人知我情漸恐耳聾兼眼暗聽泉看石不分明送王卿使君赴任蘇州因思花迎新使感舊遊寄題郡中木蘭西院一别蘇州十八載時光人事隨年改不論竹馬盡成人亦恐桑田半為海鶯入故宫含意思花迎新使生光彩為報江山風月知至今白使君猶在出齋日喜皇甫十早訪三旬齋滿欲銜杯平旦敲門門未開除却朗之攜一榼的應不是别人來㑹昌二年春題池西小樓花邊春水水邊樓一坐經今四十秋望月橋傾三遍換采蓮船破五囘修園林一半成喬木鄰里三分作白頭蘇李冥蒙隨燭滅陳樊漂泊逐萍流蘇庶子𢎞李中丞道樞及陳樊二妓十餘年皆樓中歌酒中伴或殁或散獨予在焉雖貧眼下無妨樂縱病心中不與愁自笑靈光巋然在春來遊得且須遊酬南洛陽早春見贈物華春意尚遲迴賴有東風晝夜催寒縋栁腰收未得暖熏花口噤初開古詩云口噤不能開欲披雲霧聨襟去先喜瓊琚入袖來久病長齋詩老退爭禁年少洛陽才對新家醖翫自種花香麴親看造芳叢手自栽迎春報酒熟垂老看花開紅蠟半含萼緑油新醱醅玲瓏五六樹瀲灎兩三杯恐有狂風起愁無好客來獨酣還獨語待取月明囘攜酒往朗之莊居同飲慵中又少經過處别後都無勸酒人不挈一壺相就醉若為將老度殘春以詩代書酬慕巢尚書見寄慕巢書中頻切歸休結侣之意故以此荅書意詩情不偶然苦云夢想在林泉願為愚谷煙霞侣思結空門香火縁無媿尚書情眷眷自憐居士病緜緜不知待得心期否老校於君六七年春盡日芳景銷殘暑氣生感時思事坐含情無人開口共誰語有酒囘頭還自傾醉對數叢紅芍藥渴嘗一盌緑昌明蜀茶之名也春歸似遣鶯留語好住園林三兩聲招山僧能入城中乞食否莫辭塵土汚袈裟欲知住處東城下繞竹泉聲是白家夏日與閒襌師林下避暑落景城西塵土紅伴僧閒坐竹泉東緑蘿潭上不見日白石灘邊長有風熱惱漸知隨念盡清涼常願與人同每因毒暑悲親故多在炎方瘴海中是嵗潮韶等郡皆有親友謫居立名按稽古録開成五年楊嗣復貶潮州李珏貶韶州題新澗亭兼酬寄朝中親故見贈何處披襟風快哉一亭臨澗四門開金章紫綬辭腰去白石清泉就眼來自得所宜還獨樂各行其志莫相咍禽魚出得池籠後縱有人呼可更囘病中看經贈諸道侣右眼昏花左足風金箆石水用無功金箆刮眼病見湼槃經磁石水治風見外臺方不如迴念三乗樂便得浮生百病空無子同居草菴下見法華經有妻偕老道場中何煩更請僧為侣月上新歸伴病翁時適談氏女子自太原初歸維摩詰有女名月上也遊豐樂招提佛光三寺竹鞋葵扇白綃巾林野為家雲是身山寺每遊多寄宿都城暫出即經旬漢容黄綺為逋客堯放巢由作外臣昨日制書臨郡縣不談愚谷醉鄉人醉中得上都親友書以予停俸多時憂問貧乏偶乗酒興詠而報之頭白醉昬昬狂歌秋復春一生耽酒客五度棄官人蘇州刑部侍郎河南尹同州刺史太子少傅皆以病免也異世陶元亮前生劉伯倫臥將琴作枕行以鍤隨身嵗要衣三對年支榖一囷園葵烹佐飯林葉埽添薪沒齒甘蔬食揺頭謝搢紳自能抛爵禄終不惱交親但得杯中渌從生甑上塵煩君問生計憂醒不憂貧池畔逐涼風清泉冷竹修修三伏炎天涼似秋黄犬引迎騎馬客青衣扶下釣魚舟衰容自覺宜閒坐蹇步誰能更逺遊料得此身終老處只應林下與灘頭池鶴八絶句并序池上有鶴介然不羣烏鳶雞鵝次第嘲噪諸禽似有所誚鶴亦時復一鳴余非冶長不通其意因戲與贈荅以意斟酌之聊亦自取笑耳雞贈鶴一聲警露君能薄五徳司晨我用多不㑹悠悠時俗士重君輕我意如何鶴荅雞爾爭伉儷泥中鬬我整羽儀松上棲不可遣他天下眼却輕野鶴重家雞烏贈鶴與君白黒太分明縱不相親莫見輕我每夜啼君怨别玉徽琴裏忝同聲琴曲有烏夜啼别鶴怨鶴荅烏吾愛棲雲上華表汝多攫肉下田中吾音中羽汝聲角琴曲雖同調不同别鶴怨在羽調烏夜啼在角調鳶贈鶴君誇名鶴我名鳶君叫聞天我戾天更有與君相似處飢來一種啄腥羶鶴荅鳶無妨自是莫相非清濁髙低各有歸鸞鶴羣中彩雲裏㡬時曾見喘鳶飛鵝贈鶴君因風送入青雲我被人驅向鴨羣雪頸霜毛紅網掌請看何處不如君鶴荅鵝右軍殁後欲何依只合隨雞逐鴨飛未必犧牲及吾輩大都我瘦勝君肥談氏小外孫玉童外翁七十孫三嵗笑指琴書欲遣傳自念老夫今耄矣因思穉子更茫然中郎餘慶鍾羊祜子幼能文似馬遷才與不才爭料得東牀空後且嬌憐談氏初逝送後集往廬山東林寺兼寄雲臯上人附東林寺白氏文集記昔余為江州司馬時常與廬山長老於東林寺經藏中披閲逺大師與諸文士唱和集巻時諸長老請余文集亦今置經藏唯然心許他日致之迨兹餘二十年矣余前後所著文大小合二千九百六十四首勒成六十巻編次既畢納於藏中且欲與二林結他生之縁復曩嵗之志也故自忘其鄙拙焉仍請本寺長老及主藏僧依逺公文集例不借外客不出寺門幸甚太和九年夏太子賔客晉陽縣開國男太原白居易樂天記後集寄將何處去故山迢逓在匡廬舊僧獨有雲臯在三二年來不得書别後道情添㡬許老來筋力又何如來生縁㑹應非逺彼此年過七十餘立名按太和九年公年六十四此云年過七十餘疑此記之後别有寫本寄廬山耳附原記以備參攷客有說客即李浙東也所說不能具録其事近有人從海上迴海山深處見樓臺中有仙龕虚一室多傳此待樂天來荅客說吾學空門非學仙恐君此說是虚傳海山不是我歸處歸即應歸兜率天予晩年結彌勒上生業故云立名按避暑録話載唐人盧肇逸史記李浙東李君稷也㑹昌初為浙東觀察使言有海賈遭風飄海中一大山視其殿牓曰蓬萊㫄一院扃鎻甚嚴花木盈庭中設几案或人告之曰此白樂天院在中國未來耳唐小說事多誕此既自見於樂天詩當不謬也哭劉尚書夢得二首四海齊名白與劉百年交分兩綢繆同貧同病退閒日一死一生臨老頭杯酒英雄君與操曹公曰天下英雄唯使君與操耳文章微婉我知丘仲尼云後世知丘者春秋又云春秋之㫖微而婉也賢豪雖殁精靈在應共微之地下遊今日哭君吾道孤寢門淚滿白髭鬚不知箭折弓何用兼恐脣亡齒亦枯窅窅窮泉埋寳玉駸駸落景挂桑楡夜臺暮齒期非逺但問前頭相見無立名按唐詩紀事禹錫晩年與白傅友善詩筆文章時無在其右者嘗與唱和往來又云禹錫與樂天唱和號劉白唱和集與裴度唱和號汝洛集與令狐楚號彭陽唱和集與李徳裕號吳蜀集禹錫嘗品題樂天詩云郢人斤斲無㾗迹仙人衣裳棄刀尺世人方内欲相從行盡四維無處覓真公之知已也昨日復今辰昨日復今辰悠悠七十春所經多故處却想似前身散秩優游老閒居清淨一作淨潔貧螺杯中有物鶴氅上無塵解佩收朝帶抽簪換野巾風儀與名號別是一生人病瘡門有醫來往庭無客送迎病銷談笑興老足歎嗟聲鶴伴臨池立人扶下砌行脚瘡春斷酒那得有心情遊趙邨杏花趙邨紅杏每年開十五年來看㡬迴七十三人難再到今春來是別花來刑部尚書致仕十五年來洛下居道縁俗累兩何如迷路心迴因向佛宦途事了是懸車全家遯世曾無悶半俸資身亦有餘唯是名銜人不㑹毗耶長者白尚書初致仕後戲酬留守牛相公并呈分司諸寮友南北東西無所羈挂冠自在勝分司看花嘗酒多先到拜表行香盡不知炰筍烹魚飽餐後擁袍枕臂醉眠時報君一語君應笑兼亦無心羨保釐問諸親友七十人難到過三更較稀占花租野寺定酒典朝衣趁醉春多出貪歡夜未歸不知親故口道我是耶非戲問牛司徒抖擻塵纓捋白鬚半酣扶起問司徒不知詔下懸車後醉舞狂歌有例無不與老為期不與老為期因何兩鬢絲纔應免夭促便已及衰羸昨夜夢何在明朝身不知百憂非我所三樂是吾師閉目常閒坐低頭每靜思存神機慮息養氣語言遲行亦攜詩篋眠多枕酒巵自慙無一事少有不安時開龍門八節石灘詩二首并序東都龍門潭之南有八節灘九峭石船筏過此例及破傷舟人檝師推挽束縛大寒之月躶跣水中飢凍有聲聞於終夜予嘗有願力及則救之㑹昌四年有悲智僧道遇適同發心經營開鑿貧者出力仁者施財於戲從古有礙之險未來無窮之苦忽乎一旦盡除去之兹吾所用適願快心拔苦施樂者耳豈獨以功徳福報為意哉因作二詩刻題石上以其地屬寺事因僧故多引僧言見志鐵鑿金鎚殷若雷八灘九石劒稜摧竹篙桂檝飛如箭百筏千艘魚貫來振錫導師憑衆力揮金退傅施家財他時相逐西方去莫慮塵沙路不開七十三翁旦暮身誓開險路作通津夜舟過此無傾覆朝脛從今免苦辛十里叱灘變河漢八寒陰獄化陽春八寒地獄見佛名及湼槃經故以八節灘為比我身雖殁心長在闇施慈悲與後人閒坐婆娑放雞犬嬉戲任兒童閒坐槐陰下開襟向晩風漚麻池水裏曬棗日陽中人物何相稱居然田舍翁酬寄牛相公同宿話舊勸酒見贈每來政事堂中宿共憶華陽觀裏時日暮獨歸愁米盡泥深同出借驢騎交游今日唯殘我富貴當年更有誰彼此相看頭雪白一杯可合重推辭道場獨坐整頓衣巾拂淨牀一缾秋水一鑪香不論煩惱先須去直到菩提亦擬忘朝謁久停收劒珮宴遊漸罷廢壺觴世間無用殘年處祗合逍遥坐道塲偶作寄朗之歴想為官日無如刺史時歡娛接賔客飽暖及妻兒自到東都後安閒更得宜分司勝刺史致仕勝分司何況園林下欣然得朗之仰名同舊識為樂即新知有雪先相訪無花不作期鬬醲乾釀酒誇妙細吟詩里巷千來往都門五别離岐分兩囘首書到一開眉葉落槐亭院氷生竹閣池雀羅誰問訊鶴氅罷追隨身與心俱病容將力共衰老來多健忘唯不忘相思狂吟七言十四韻亦知世是休明世自想身非富貴身但恐人間為長去聲物不如林下作遺民遊依二室成三友住近雙林當四鄰性海澄渟平少浪心田灑埽淨無塵香山閒宿一千夜梓澤連游十六春是客相逢皆故舊無僧每見不殷勤藥停有喜閒銷疾金盡無憂醉忘貧補綻衣裳媿妻女支持酒肉賴交親俸隨日計錢盈貫禄逐年支粟滿囷尚書致仕請半俸百斛亦五十千嵗給禄粟二千可為洛堰魚鮮供取足游邨果熟饋爭新詩章人與傳千首夀命天教過七旬㸃檢一生徼倖事東都除我更無人喜裴濤使君攜詩見訪醉中戲贈忽聞扣户醉吟聲不覺停杯倒屣迎共放詩狂同酒癖與君别是一親情得潮州楊相公繼之書并詩以此寄之詩情書意兩殷勤來自天南瘴海濵初覩銀鈎還啓齒細吟瓊什欲霑巾鳯池隔絶三千里蝸舍沈冥十五春唯有新昌故園月至今分照兩鄉人鳯池屬楊相也蝸舍自謂也宿府池西亭池上平橋橋下亭夜深睡覺上橋行白頭老尹重來宿十五年前舊月明閒眠暖牀斜臥日曛腰一覺閒眠百病銷盡日一餐茶兩椀更無所要到明朝楊栁枝詞雲溪友議居易有妓樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊栁小蠻腰年既髙邁而小蠻方豐豔因楊栁詞以託意云一樹春風千萬枝嫩於金色軟於絲永豐西角荒園裏盡日無人屬阿誰詔取永豐栁植禁苑感賦又云宣宗朝國樂唱前詞上問誰作永豐在何處左右具以對遂因東使命取永豐栁兩枝植於禁中居易感上知其名且好尚風雅又為詩一章一樹衰殘委泥土雙枝榮耀植天庭定知𤣥象今春後栁宿光中添兩星和東都畱守韓琮新栁歌中得翠條逺移金殿種青霄上陽宫女吞聲送不分先歸舞細腰河南尹盧貞和永豐坊西南角園中有垂栁一株柔條極茂白尚書曾賦詩傳入樂府徧流京都近有詔㫖取兩枝植於禁苑乃知一顧增十倍之價非虚言也因此偶成絶句非敢繼和前篇一樹依依在永豐兩枝飛去杳無蹤玉皇曾采人間曲應逐歌聲入九重齋居春久感事遣懐齋戒坐三旬笙歌發四鄰月明停酒夜眼闇看花人賴學空為觀深知念是塵猶思閒語笑未忘舊交情久作龍門主多為兔苑賔水嬉歌盡日雪宴燭通晨事事皆過分時時自問身風光抛得也七十四年春每見吕南二郎中新文輒竊有所歎惜因成長句以詠所懷雙金百鍊少人知縱我知君徒爾為望梅閣老無妨渴二賢詞藻贍麗衆多以予曾忝制誥故呼閣老畫餅尚書不救飢喻無益自戲也白日回頭看又晩青雲舉足躡何遲壯年可惜虚銷擲遣把閒杯吟詠詩歡喜二偈得老加年誠可喜當春對酒亦宜歡心中别有歡喜事開得龍門八節灘眼暗頭旋耳重聽平聲唯餘心口尚醒醒今朝歡喜縁何事禮徹佛名百部經閒居貧活計冠蓋閒居少簞瓢陋巷深稱家開户牖量力置園林儉薄身都慣營為力不任飢烹一斤肉暖臥兩重衾尊有陶潛酒囊無陸賈金莫嫌貧活計更富即勞心贈諸少年少年莫笑我蹉跎聽我狂翁一曲歌入手榮名取雖少關心穩事得還多老慙退馬霑芻秣謂致仕半俸也髙喜歸鴻脫弋羅官給俸錢天與夀些些貧病柰吾何感所見巧者焦勞智者愁愚翁何喜復何憂莫嫌山木無人用大勝籠禽不自由網外老雞因斷尾盤中鮮膾為吞鈎誰人㑹我心中事冷笑時時一掉頭寄黔州馬常侍閒看雙節信為貴樂飲一杯誰與同可惜風情與心力五年抛擲在黔中和李相公畱守題漕上新橋六韻同用黎字選石鋪新路安橋壓古堤似從銀漢下落傍玉川西影定䦨干倒標髙華表齊煙開虹半見月冷鶴雙棲材映䕫龍小功嫌元凱低從容濟世後餘力及黔黎閒居風雨蕭條秋少客門庭冷靜晝多關金羈絡馬近賣却羅袖栁枝尋放還書巻略尋聊取睡酒杯淺把粗開顔眼昬入夜休看月脚重經春不上山心靜無妨喧處寂機忘兼覺夢中閒是非愛惡銷停盡唯寄空身在世間新秋夜雨蟋蟀暮啾啾光陰不少畱松檐半夜雨風幌滿牀秋曙早燈猶在涼初簟未收新晴好天氣誰伴老人遊春眠枕低被暖身安穩日照房門帳未開還有少年春氣味時時蹔到睡中來喜老自嘲面黒頭雪白自嫌還自憐毛龜蓍下老蝙蝠鼠中仙名籍同逋客衣裝類古賢裘輕被白㲲靴暖蹋烏氊周易休開卦陶琴不上絃任從人棄擲自與我周旋鐵馬因疲退鉛刀以鈍全行開第八秩可謂盡天年時俗謂七十已上為開第八秩河陽石尚書破迴鶻迎貴主過上黨射鷺􅠿繪畫為圗偎䝉見示稱歎不足以詩美之按㑹昌三年癸亥正月劉沔大破回鶻迎太和公主以歸石雄劉沔將也塞北虜郊隨手破山東賊壘掉鞭收烏孫公主歸秦地白馬將軍入潞州劒拔青鱗蛇尾活弦抨赤羽火星流須知鳥目猶難漏尚書將入潞府偶逢水鳥鷺􅠿引弓詔射之一發中目三軍踴躍其事上聞下美之縱有天狼豈足憂畫角三聲刁斗曉清商一部管絃秋他時麟閣圖勲業更合何人居上頭自詠老身示諸家屬夀及七十五俸霑五十千夫妻偕老日甥姪聚居年粥美嘗新米袍温換故緜家居雖濩落眷屬幸團圓置榻素屏下移爐青帳前書聽孫子讀湯看侍兒煎走筆還詩債抽衣當藥錢支分閒事了爬背向陽眠自問此心呈諸老伴朝問此心何所思暮問此心何所為不入公門慵斂手不看人面免低睂居士室間眠得所少年場上飲非宜閒談亹亹留諸老美醖徐徐進一巵心未曾求過分事身常少有不安時此心除自謀身外更問其餘盡不如六年立春日人日作二日立春人七日盤蔬餅餌逐時新年方吉鄭猶為少家比劉韓未是貧鄉園節嵗應堪重親故歡遊莫厭頻試作循潮封眼想何由得見洛陽春分司致仕官中吉傅鄭諮議最老韓庶子劉員外尤貧循潮封三郡遷客皆洛下舊遊也立名按公以㑹昌六年八月卒宣宗以詩弔之曰綴玉聨珠六十年誰教冥路作詩仙浮雲不繫名居易造化無為字樂天童子解吟長恨曲胡兒能唱琵琶篇文章已滿行人耳一度思卿一愴然舊唐書謂公卒於大中元年蓋据此詩也然宣宗以㑹昌六年三月即位明年丁夘改元大中李商隱撰公碑及新書皆云卒於六年丙寅又皆云年七十五公生平作詩必紀年而集内無大中詩則舊書所謂大中元年殆誤耳齋居偶作童子裝爐火行添一炷香老翁持麈尾坐拂半張牀巻幔看天色移齋近日陽甘鮮新餅果穩暖舊衣裳止足安生理優閒樂性場是非一以遣動靜百無妨豈有物相累兼無情可忘不須憂老病心是自醫王詠身自中風來三歴閏病風八年凡三閏矣從懸車後㡬逢春周南留滯稱遺老見太史公傳漢上羸殘號半人見習鑿齒傳薄有文章傳子弟斷無書札荅交親餘年自問將何用恐是人間賸長身予與山南英華作荆南王僕射淮南李僕射事歴五朝踰三紀海内年輩今唯三人榮路雖殊交情不替聊題長句寄舉之公垂二相公故交海内只三人二坐巖廊一臥雲老愛詩書還似我榮兼將相不如君百年膠漆初心在萬里煙霄中路分阿閣鸞凰野田鶴何人信道舊同羣讀道徳經𤣥元皇帝著遺文烏角先生仰後塵金玉滿堂非已物子孫委蛻是他人世間盡不關吾事天下無親於我身只有一身宜愛䕶少教冰炭逼心神禽蠱十二章并序莊列寓言風騷比興多假蟲鳥以為筌蹄故詩義始於關雎鵲巢道說先乎鯤鵬蜩鷃之類是也予閒居乗興偶作一十二章頗類志怪放言每章可致一哂一哂之外亦有以自警其衰耄封執之惑焉頃如此作多與故人微之夢得共之微之夢得嘗云此乃九奏中新聲八珍中異味也有㫖哉有㫖哉今則獨吟想二君在目能無恨乎燕違戊巳鵲避嵗兹事因何羽族知疑有鳯皇頒鳥歴一時一日不參差不知其然也燕銜泥常避戊巳日鵲巢口常避太嵗驗之皆信水中科斗長成蛙林下桑蟲老作蛾蛙跳蛾舞仰頭笑焉用鯤鵬鱗羽多齊物也江魚羣從稱妻妾塞雁聨行號弟兄但恐世間真眷屬親疎亦是强為名故名也江沱間有魚每游輒三如媵隨妻一先二後土人號為婢妾魚禮云雁兄弟行蠶老繭成不庇身蜂飢蜜熟屬他人須知年老憂家者恐是二蟲虚苦辛自警也阿閣鵷鸞田舍烏妍蚩貴賤兩懸殊如何閉向深籠裏一種摧頽觸四隅有所感也獸中去聲刀槍多怒吼鳥遭羅弋盡哀鳴羔羊口在縁何事闇死屠門無一聲有所悲也蟭螟殺敵蚊巢上蠻觸交爭蝸角中應似諸天觀下界一微塵内鬭英雄自照也蠨蛸網上罥蜉蝣反覆相持死始休何異浮生臨老日一彈指頃報恩讎誡報也蟻王化飯為臣妾蜾母偸蟲作子孫彼此假名非本物其間何怨更何恩豆苖鹿嚼解烏毒艾葉雀銜奪燕巢鳥獸不曾看本草諳知藥性是誰教嘗獵者說云鹿若中箭發即嚼豆葉食之多消解箭毒多用烏頭故云烏毒又燕惡艾雀欲奪其巢先銜一艾致其窠輒避去因而有之一鼠得仙生羽翼衆鼠相看有羨色豈知飛上未半空已作烏鳶口中食鵞乳養雛遺在水魚心想子變成鱗細微幽隱何窮事知者唯應是聖人鵞放乳水中不能離羣雛從而食之皆飽而去之又如魚想子子成魚並是佛經中說白香山詩集巻三十七
