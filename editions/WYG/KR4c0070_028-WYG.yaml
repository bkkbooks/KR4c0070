body:
  text: 白香山詩集巻二十八歙縣汪立名編後集八律詩凡一百首感悟妄縁題如上人壁自從為騃童直至作衰翁所好隨年異為忙終日同弄沙成佛墖鏘玉謁王宫彼此皆兒戲須臾即色空有營非了義無著是眞宗兼恐勤修道猶應在妄中思子臺有感二首凡題思子臺者皆罪江充予觀禍胎不獨在此偶以二絶句辨之曽家機上聞投杼尹氏園中見掇蠭但以恩情生隙罅何人不解作江充闇生魑魅蠧生蟲何異讒生疑阻中但使武皇心似燭江充不敢作江充賦得邊城角邊角兩三枝霜天隴上兒望鄉相並立向月一時吹戰馬頭皆舉征人手盡垂嗚嗚三奏罷城上展旌旗憶洛中所居忽憶東都宅春來事宛然雪銷行徑裏水上臥房前猒緑栽黄竹嫌紅種白蓮醉敎鶯送酒閒遣鶴看船幸是林園主慙為食禄牽宦情薄似紙鄉思急於弦豈合姑蘇守歸休更待年想歸田園戀他朝市求何事想取邱園樂此身千首惡詩吟過日一壺好酒醉消春歸鄉年亦非全老罷郡家仍未苦貧快活不知如我者人間能有幾多人琴茶兀兀寄形羣動内陶陶任性一生間自抛官後春多醉不讀書來老更閒琴裏知聞唯淥水茶中故舊是䝉山窮通行止長相伴誰道吾今無往還贈楚州郭使君淮水東南第一州山圍雉堞月當樓黄金印綬懸腰底白雪歌詩落筆頭笑看兒童騎竹馬醉攜賓客上仙舟當家美事堆身上何啻林宗與細侯和郭使君題枸把山陽一作隂太守政嚴眀吏一作夜靜人安無犬驚不知靈藥根成狗怪得時聞吠夜聲初到洛下閒遊漢庭重少身宜退洛下閒居迹可逃趁伴入朝應老醜尋春放醉尚粗豪詩攜彩紙新裝巻酒典緋花舊賜袍曽在東方千騎上至今躞蹀馬頭髙醉贈劉二十八使君為我引杯添酒飲與君把箸擊盤歌詩稱國手徒為爾命壓人頭不柰何舉眼風光長寂莫滿朝官職獨蹉跎亦知合被才名折二十三年折太多太湖石煙翠三秋色波濤萬古痕削成青玉片截斷碧雲根風氣通巖穴苔紋䕶洞門三峰具體小應是華山孫過敷水垂鞭欲渡羅敷水處分鳴騶且緩驅秦氏雙蛾久𠖇漠蘇臺五馬尚踟蹰邨童店女仰頭笑今日使君真是愚南院林院無情緒經春不一開楊花飛作穂榆莢落成堆壯氣従中減流年逐後催只應如過客病去老迎來閒詠步月憐清景眠松愛緑隂早年詩思苦晩嵗道情深夜學禪多坐秋牽興暫吟悠然兩事外無處更留心初授祕監拜賜金紫閒吟小酌偶寫所懷紫袍新祕監白首舊書生鬢雪人間壽腰金世上榮子孫無可念産業不能營酒引眼前興詩留身後名閒傾三數酌醉詠十餘聲便是羲皇代先従心太平新昌閒居招楊郎中兄弟紗巾角枕病眠翁忙少閒多誰與同但有雙松當砌下更無一事到心中金章紫綬看如夢皁蓋朱輪别似空暑月貧家何所有客來唯贈北牕風祕省後㕔槐花雨潤新秋地桐葉風翻欲夜天盡日後㕔無一事白頭老監枕書眠松齋偶興置心思慮外滅迹是非間約俸為生計隨官換往還耳煩聞曉角一作鼓眼醒見秋山賴此松檐下朝迴半日閑和楊郎中賀楊僕射致仕後楊侍郎門生合宴席上作業重闗西繼大名恩深闕下遂髙情祥鱣降伴趨庭鯉賀燕飛和出谷鶯范蠡舟中無子弟疏家席上欠門生可憐玉樹連桃李従古無如此㑹榮立名按全唐詩話寶歴中楊於陵僕射入覲其子嗣復率兩牓門生迎扵潼闗宴新昌里第嗣復領諸生翼兩序元白俱在即席賦詩楊汝士詩最後成元白覽之失色詩曰隔座應須賜御屏盡將仙翰入髙𠖇文章舊價畱鸞掖桃李新隂在鯉庭再嵗生徒陳賀宴一時良史盡傳馨當年疏廣雖云盛詎有兹筵醉醁醽其日大醉歸謂其子弟曰吾今日壓倒元白松下琴贈客松寂風初定琴清夜欲闌偶因羣動息試撥一聲看寡鶴當徽怨秋泉應指寒慙君此傾聽本不為君彈秋齋晨起秋齋冷蕭條稱病容清風兩牕竹白露一庭松阮籍謀身拙嵇康向事慵生涯别有處浩氣在心胸塗山寺獨遊野徑行無伴僧房宿有期塗山來去熟唯是馬蹄知登觀音臺望一作賢城百千家似圍棊局十二街如種菜畦遥認㣲㣲入朝火一條星宿五門西登寶應臺北望臨髙始見人寰小對逺方知色界空回首却歸朝市去一稊米落太倉中酬裴相公題興化小池見招長句為愛小塘招散客不嫌老監與新詩山公倒載無妨學范蠡扁舟未要追蓬斷偶飄桃李徑鷗驚誤拂鳯皇池敢辭課拙酬髙韻一勺爭禁萬頃陂閒行五十年來思慮熟忙人應未勝閒人林園傲逸眞成貴衣食單疎不是貧專掌圖書無過地徧尋山水自由身儻年七十猶强健尚得閒行十五春閒出兀兀出門何處去新昌街晩樹隂斜馬蹄知意縁行熟不向楊家即庾家與僧智如夜話嬾鈍尤知命幽棲漸得朋門閑無謁客室靜有禪僧爐向初冬火籠停半夜燈憂勞縁智巧自喜百無能憶廬山舊隠及洛下新居形骸僶俛班行内骨肉勾畱俸禄中無柰攀縁隨手長亦知恩愛到頭空草堂久閉廬山下竹院新抛洛水東自是未能歸去得世間誰要白鬚翁暝寒急景流如箭淒風利似刀暝催雞翅歛寒束樹枝髙縮水濃和酒加綿厚絮袍可憐冬計畢煖卧醉陶陶偶眠一作醉眠放杯書案上枕臂火爐前老愛尋思睡慵多一本作慵便取次眠妻教卸烏帽婢與展青氊便是屏風様何勞畫古賢立名按詩話總龜云元白詞多比圖畫如重屏圖自唐迄今傳焉乃樂天醉眠詩能盡人情物態非筆端有口未易到也詩家以畫為無聲詩誠哉是言華城西北雉堞最髙崔相公首創樓臺錢左丞繼種花果合為勝境題在雅篇歲暮獨遊悵然成詠時華州未除刺史髙居稱君子瀟灑四無鄰丞相棟梁久使君桃李新凝情看麗句駐步想清塵況是寒天客樓空無主人奉使途中戲贈張常侍早風吹土滿長衢驛騎星軺盡疾驅共笑籃轝亦稱使日馳一驛向東都有小白馬乗馭多時奉使東行至稠桑驛溘然而斃足可驚傷不能忘情題二十韻能驟復能馳翩翩白馬兒毛寒一團雪鬃薄萬條絲皁蓋春行日驪駒曉促一作從時雙旌前獨步五馬内偏騎芳草承蹄葉垂楊拂頂枝誇將迎好客惜不換妖姬慢鞚遊蕭寺閒驅醉習池睡來乗作夢興發倚成詩鞭為馴難下鞍縁穏不離北歸還共到東使亦相隨赭白何曽變𤣥黄豈得知嘶風覺聲急蹋雪怪行遲昨夜猶芻秣今朝尚縶維臥槽應不起顧主遂長辭塵滅駸駸迹霜留皎皎姿度闗形未改過隙影難追念倍燕求一作來駿情深項别騅銀收鈎臆帶金卸絡頭羈何處埋竒骨誰家覓敝帷稠桑驛門外吟罷涕雙垂題噴玉泉泉在夀安山下高百餘尺直㵼潭中泉噴聲如玉潭澄色似空練垂青障上珠寫緑盆中溜滴三秋雨寒生六月風何時此巖下來作濯纓翁酬皇甫賓客閒官兼慢使著處易停輪況欲逢新歲仍初見古人冒寒尋到洛待暖始歸秦亦擬同攜手城東略看春種白蓮吳中白藕洛中栽莫戀江南花嬾開萬里攜歸爾知否紅蕉朱槿不將來荅蘇庶子偶作闗東使重陪洛下遊病來従斷酒老去可禁愁款曲偏青眼蹉跎各白頭蓬山閒氣味依約似龍樓荅尉遲少監水閣重宴人情依舊歲華新今日重招往日賓雞黍重回千里駕林園暗換四年春水軒平寫琉璃鏡草岸斜鋪翡翠茵聞道經營費心力忍教成後屬他人時主人欲賣林亭和劉郎中傷鄂姬不獨君嗟我亦嗟西風北雪殺南花不知月夜魂歸處鸚鵡洲頭第幾家姬鄂人也贈東鄰王十三攜手池邊月開襟竹下風驅愁知酒力破睡見茶功居處東西接年顔老少同能來為伴否伊上作漁翁早春同劉郎中寄宣武令狐相公梁園不到一年强遥想清吟對緑觴更有何人能飲酌新添幾巻好篇章馬頭拂柳時回轡豹尾穿花暫亞槍誰引相公開口笑不逢白監與劉郎寄太原李相公聞道北都今一變政和軍樂萬人安綺羅二八圍賓榻組練三千夾將壇蟬鬢應誇丞相少貂裘不覺太原寒世間大有虚榮貴百歲無君一日歡雪中寄令狐相公兼呈夢得兎園春雪梁王㑹想對金罍詠玉塵今日相如身在此不知客右坐何人出使在途所騎馬死改乗肩轝將歸長安偶詠旅懷寄太原李相公驛路﨑嶇泥雪寒欲登籃轝一長歎風光不見桃花騎塵土空畱杏葉鞍喪乗獨歸殊不易脫驂相贈豈為難并州好馬應無數不怕旌旄試覓看有雙鶴畱在洛中忽見劉郎中依然鳴顧劉因為鶴歎二篇寄予予以二絶句答之辭鄉逺隔華亭水逐我來棲緱嶺雲慙媿稻粱長不飽未曽回眼向雞羣荒草院中池水畔銜恩不去又經春見君驚喜雙回顧應為吟聲似主人宿竇使君莊水亭使君何在在江東池柳初黄杏欲紅有興即來閒便宿不知誰是主人翁龍門下作龍門澗下濯塵纓擬作閒人過此生筋力不將諸處用登山臨水詠詩行立名按太平寰宇記伊闕口俗名龍門唐語林白居易葬龍門山河南尹盧貞刻醉吟先生傳立石墓側洛陽人士及四方遊人過者必奠以巵酒塜前方丈之土常成渥姚侍御見過戲贈晩起春寒慵裹頭客來池上偶同遊東臺御史多提舉莫按金章繫布裘履道春居㣲雨灑園林新晴好一尋低風洗池面斜日拆花心暝助嵐隂重春添水色深不如陶省事猶抱有絃琴題洛中第宅水木誰家宅門髙占地寛懸魚挂青甃行馬䕶朱闌春榭籠煙暖秋庭鏁月寒松膠粘琥珀筠粉撲琅玕試問池臺主多為將相官終身不曽到唯展宅圖看寄殷協律多叙江南舊遊五嵗優㳺同過日一朝消散似浮雲琴詩酒伴皆抛我雪月花時最憶君幾度聴雞歌白日亦曽騎馬詠紅裙予在杭州日有歌云聴唱黄雞與白日又有詩云著紅騎馬是何人吳娘暮雨蕭蕭曲自别江南更不聞江南吳二娘曲詞云暮雨蕭蕭郎不歸洛下諸客就宅相送偶題西亭几榻臨池坐軒車冒雪過交親致杯酒僮僕解笙歌流歲行將晩浮榮得幾多林泉應問我不住意如何荅林泉好住舊林泉回頭一悵然漸知吾潦倒深媿爾留連欲作棲雲計須營種黍錢更容求一郡不得亦歸田將發洛中枉令狐相公手札兼辱二篇寵行以長句答之尺素忽驚來梓澤雙金不惜送蓬山八行落泊飛雲雨五字鎗鏦動珮環玉韻乍聴堪醒酒銀鈎細讀當披顔收藏便作終身寳何啻三年懷袖間臨都驛荅夢得六言二首揚子津頭月下臨都驛裏燈前昨日老於前日去年春似今年謝守歸為祕監馮公老作郎官前事不須問著新詩且更吟看喜錢左丞再除華州以詩伸賀左轄輟中臺門東委上才彤襜經宿到絳帳及春開民望懇難奪天心慈易回那知不隔歲重借寇恂來和錢華州題少華清光絕句髙情雅韻三峰守主領清光管白雲自笑亦曽為刺史蘇州肥膩不如君送陜府王大夫金馬門前回劔珮鐵牛城下擁旌旗他時萬一為交代畱取甘棠三兩枝代迎春花招劉郎中幸與松筠相近栽不隨桃李一時開杏園豈敢妨君去未有花時且看來翫迎春花贈楊郎中金英翠蕚帶春寒黄色花中有幾般憑君語向遊人道莫作蔓菁花眼看閑出身外無羈束心中少是非被花留便住逢酒醉方歸人事行時少官曹入日稀春寒遊正好穏馬薄綿衣座上贈盧判官把酒承花花落頻花香酒味相和春莫言不是江南㑹虚白亭中舊主人曲江有感曲江西岸又春風萬樹花前一老翁遇酒逢花還且醉若一作莫論惆悵事何窮杏園花下贈劉郎中怪君把酒偏惆悵曽是貞元花下人自别花來多少事東風二十四回春花前有感兼呈崔相公劉郎中落花如雪鬢如霜醉把一作拾花看益自傷少日為名一作文多檢束長年無興可顚狂四時輪轉春常少百刻支分夜苦長何事同生壬子嵗老於崔相及劉郎余與崔劉年同獨早衰白㣲之就拜尚書居易續除刑部因書賀意兼詠離懷我為憲部入南宫君作尚書鎮浙東老去一時成白首别來七度換春風簪纓假合虚名在筋力銷磨實事空逺地官髙親故少些些談笑與誰同喜與韋左丞同入南省因敘舊以贈之早年同遇陶鈞主利鈍精粗共在鎔憲宗朝與韋同入翰林金劒淬來長透匣鉛刀磨盡不成鋒差肩北省慙非據接武南宫幸再容跛鼈雖遲騏驥疾何妨中路亦相逢伊州老去將何散老愁新教小玉唱伊州亦應不得多年聴未教成時巳白頭早朝鼓動出新昌雞鳴赴建章翩翩穏鞍馬楚楚健衣裳宫漏傳殘夜城隂送早涼月堤槐露氣風燭樺煙香雙闕龍相對千官雁一行漢庭方尚少慚歎鬢如霜荅裵相公乞鶴一作酬裴相公乞予雙鶴警露聲音好沖天相貌殊終宜向遼廓不稱在泥塗白首勞為伴朱門幸見呼不知疎野性解愛鳯池無晩従省歸朝回北闕值清晨晩出南宫送暮春入去丞郎非散秩歸來詩酒是閒人猶思泉石多成夢尚歎簪裾未離身終是不如山下去心頭眼底兩無成北牕閒坐虚牕兩叢竹靜室一爐香門外紅塵合城中白日忙無煩尋道士不要學仙方自有延年術心閒歲月長酬嚴給事聞玉蘂花下有遊仙絶句附康駢劇談録長安業安坊唐昌觀有玉蘂花每發若瓊花瑶樹元和中春物方妍車馬尋玩者相繼忽一日有女子年可十七八衣繡緑衣乘馬峨髻雙鬟無簪珥之飾容色婉娩迥出扵衆従以二女冠三小僕者皆丱頭黄衫端麗無比既下馬以白角扇障面直造花所異香芬馥聞扵數十歩之外觀者以為出自宫掖莫敢逼視竚立良久令小僕取數枝而出將乘馬迴謂黄冠者曰曩有玉峰之約自此可以行矣時觀者如堵咸覺􅃄霏鶴唳景物煇煥舉轡百餘歩有輕風擁塵隨之而去須臾塵滅望之半天矣方悟神仙之逰餘香不散者經月時嚴給事休復元相國劉賓客白醉吟俱有詩嬴女偷乘鳯去時洞中潛歇弄瓊枝不縁啼鳥春饒舌青𤨏仙郎可得知立名按玉蘂辨證載玉蘂事甚詳又附唐人各詩皆言長安唐昌觀而紀事稱嚴休復詩是揚州唐昌觀當誤又遯史云唐人甚重玉蘂花唐昌觀花發致僊女下降元白劉張籍王建與嚴復休有唱和詩李徳裕出牧潤州招隱山觀有此花因有憶翰林院玉蘂之作但不詳其花之狀若何後見周益公集有玉蘂辨證一巻云嘗従招隠致得一本條蔓如荼䕷種之冬凋夏茂柘葉紫莖久之根株合抱成樹花苞初甚㣲經月漸大暮春方八出須如氷綵上綴金粟花心復有碧筒狀類膽缾其中别抽一英出衆須上散為十餘猶刻玉然花名玉蘂以此益公又以為人多與瓊花瑒花相混瓊花即八仙花瑒花即山礬花亦名米囊花並白而實與玉蘂異云按玉蘂即瓊花之說葛常之亦辨其是非京路西來為看秦山雪東去縁尋洛苑春來去騰騰兩京路閑行除我更無人華州西每逢人靜慵多歇不計程行困即眠上得籃轝未能去春風敷水店門前従陜至東京從陜至東京山低路漸平風光四百里車馬十三程花共垂鞭看杯多並轡傾笙歌與談笑隨分自將行送春銀花鑿落従君勸金屑琵琶為我彈不獨送春兼送老更嘗一酌更聴看宿杜曲花下覓得花千樹攜來酒一壺嬾歸兼擬宿未醉豈勞扶但惜春將晩寧愁日漸晡籃轝為臥舍漆盝是行㕑斑竹盛茶櫃紅泥罨飰爐眼前無所闕身外更何須小面琵琶婢蒼頭觱篥奴従君飽富貴曽作此遊無逢舊久别偶相逢俱疑是夢中即今歡樂事放琖又成空繡婦歎連枝花様繡羅襦本擬新年餉小姑自覺逢春饒悵望誰能每日趁功夫鍼頭不解愁睂結線縷難穿淚臉珠雖凭繡牀都不繡同牀繡伴得知無春詞低花樹映小妝樓春入睂心兩㸃愁斜倚闌干背一作臂鸚鵡思量何事不回頭恨詞翠黛睂低歛紅珠淚暗銷従來恨人意不省似今朝山石榴花十二韻煜煜復煌煌花中無比方豔夭宜小院條短稱低廊本是山頭物今為砌下芳千叢相向背萬朶互低昂照灼連朱檻玲瓏映粉牆風來添意態日出助晶光漸綻臙脂蕚猶含琴軫房離披亂剪綵斑駮未勻妝絳燄燈千炷紅裙妓一行此時逢國色何處覓天香恐合栽金闕思將獻玉皇好差青鳥使封作百花王送敏中歸􅃎寧幕六十衰翁兒女悲傍人應笑爾應知弟兄垂老相逢日杯酒臨歡欲散時前路加餐須努力今宵盡醉莫推辭司徒知我難為别直過秋歸未訝遲宴散小宴追涼散平橋步月回笙歌歸院落燈火下樓臺殘暑蟬催盡新秋雁帶一作戴來將何迎睡興臨臥舉殘杯人定人定月朧明香銷枕簟清翠屏遮燭影紅袖下簾聲坐久吟方罷眠初夢未成誰家教鸚鵡故故語相驚池上嫋嫋涼風動淒淒寒露零蘭衰花始白荷破葉猶青獨立棲沙鶴雙飛照水螢若為寥落境仍值酒初醒池牕池晩蓮芳謝牕秋竹意深更無人作伴唯對一張琴花酒香醅淺酌浮如蟻雲鬢新梳薄似蟬為報洛城花酒道莫辭送老二三年題崔常侍濟源莊谷口誰家住雲扃鎻竹泉主人何處去蘿薜換貂蟬籍在金閨内班排玉扆前誠知憶山水歸得是何年認春戲呈馮少尹李郎中陳主簿認得春風先到處西園南面水東頭柳初變後條猶重花未開前枝已稠暗助醉歡尋緑酒潛添睡興著紅樓知君未别陽和意直待春深始擬遊魏堤有懷魏王堤下水聲似使君灘惆悵回頭聴踟蹰立馬看蕩風波眼急翻雪浪心寒憶得瞿塘事重吟行路難柘枝詞柳暗長廊合花深小院開蒼頭鋪錦褥皓腕捧銀杯繡帽珠稠綴香衫袖窄裁將軍拄毬杖看按柘枝來代夢得吟後來變化三分貴同輩凋零大半無世上爭先従盡上聲汝人間鬭在不如吾竿頭巳到應難久局勢雖遲未必輸不見山苗與林葉迎春先緑亦先枯寄荅周協律來詩多敘蘇州舊遊故人敘舊寄新篇惆悵江南到眼前暗想樓臺萬餘里不聞歌吹一周年橋頭誰更看新月池畔猶應泊舊船最憶後庭杯酒散紅屏風掩緑窗眠白香山詩集巻二十八
