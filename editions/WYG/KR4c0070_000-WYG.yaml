front:
  text: 御製讀白居易集
  hash: sha256:642618936c0ba25d7f36dab85a6a0c675696ab1a2d126c481b1f2c82e0224d70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0070_WYG_000-1a, image: WYG1081/WYG1081-0001a.png}
body:
  text: 人咸謂香山之詩傷於易不知其易處正難及也偶讀其集題此儒雅曽聞白樂天漫將率易議前賢但從性地中流出月露風雲總道詮乾隆甲子仲冬御製右謹依恭錄詩初集欽定四庫全書集部二白香山詩集别集類一唐提要臣等謹案白香山詩集四十巻附錄年譜二巻國朝汪立名編唐白居易長慶集七十五巻今存七十一巻其中文三十四巻詩三十七巻立名引宋祁之言謂居易長于詩而他文未能稱是因别刋其詩以成是集又據元稹序謂長慶時所作僅前五十巻其寶厯以後所作不應概名以長慶因即其歸老之地題曰香山叅互衆本重加編次定為長慶集二十巻後集十七巻别集一巻又采摭諸書為補遺二巻而以新定年譜一巻陳振孫舊本年譜一巻併元稹長慶集序一篇及舊唐書本傳冠于首復采諸書之有闗居易詩者各箋註于其下居易集舊有明武定侯家刻本今已罕見世所行者惟蘇州錢氏松江馬氏二本皆頗有顛倒訛舛胡震亨唐音丁籖所録又分體瑣屑往往以一題割𨽻二巻殊為叢脞立名此本考證編排特為精審其所箋釋雖不能篇篇皆備而引據典核亦勝于註書諸家漫衍支離徒溷耳目盖於諸刻之中特為善本焉立名號西亭歙縣人其書成於康熙壬午朱彛尊宋犖皆為之序云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀白香山詩集序昔人謂大厯後以詩名家者靡不由杜出韓之南山白之諷諭其最著矣就二公論之大抵韓得杜之變白得杜之正蓋各得其一體而造乎其極者故夫貫穿聲韵操縱格律肆厥排比終不失尺寸少陵而下亦莫如二公自后山妄斥昌黎已非通論至香山詩辭㫖雖主於暢達要自刻意陶浣而出之使人不復能尋其斤斲之迹當時尤多好之者方牛李之隙贊皇且憾及香山毎束其詩不觀劉賔客以為言則曰見便令人愛將回吾心矣憾之者猶若此好之者宜何如也嗚呼豈非廬陵所謂怨家仇人不能少毁而掩蔽之乎乃世多謬指淺率不經意語為白體甚者且拾東坡誄友之辭至以輕俗同譏抑又過矣今海内風雅駸駸起唐集舊本先後流布注韓集凡五百家白詩日在人口獨無披榛莽而埽蕪穢者徒以公詩視唐人獨富辟如營邱濬壑則日求増拓為快若黄河千里望洋而歎但能考星宿於圖經而不暇躬泝其源流之分合也自惟荒陋無所窺見竊嘗習聞於先生長者之言既不敢附和而又重惜其誤若目之塵翳當去務復其舊而巳世之好公詩者必將辨焉康熈壬午余月古歙汪立名序余好為詩尤喜讀古人書嘗以為詩者載道之文言若止嘲風雪弄花草則於六義盡去矣其後觀唐書至白公樂天傳公所言往往與余合因愛讀其詩不輟乃知公立身本末無不合乎道特餘事作詩人耳公為左拾遺時史載其諫草不一而足皆人所難言嘗殿中面對情辭切至論執強梗憲宗未喻輙進曰陛下誤矣帝變色罷謂李絳云云賴絳救免噫公真古之大臣以道事君者與而或徒以詩人目之豈知公者哉公嘗與元稹書略云大丈夫所守者道所待者時進退出處何往而不自得僕志在兼濟行在獨善奉而始終之則為道言而發明之則為詩又曰今僕之詩人所愛者悉不過雜律詩與長恨歌以下耳時之所重僕之所輕則公之立言載道為何如而豈屑屑嘲風雪弄花草以矜豔麗於雕章者比哉故余嘗讀公諷諭詩見兼濟之志焉讀公閒適詩見獨善之義焉此公所以進退出處無往而不自得也今香山集徧天下顧俗本多訛浸失其舊於是汪西亭氏重編訂而梓之旣蕆事請序於余余惟公之賢史載之公詩之羙元序詳之余能益一語乎哉惟願世之好為詩如余者得公兼濟獨善之志而師之以進於道則於六義也幾矣康熙癸未且月商丘宋犖序詩家好名未有過於唐白傅者旣屬其友元微之排纘長慶集矣而又自編後集為之序復為之記旣以集本付其從子外孫矣而又分貯之東林南禪聖善香山諸寺比於杜元凱峴山碑尤汲汲焉或疑公曠逹不應戚戚於年歳之逾邁沾沾於官秩之遷除計禄奉之損益不知公之進退出處係時事之否泰恒恐後人論世者不得其詳故屢見之篇咏斯則公之微意乎公集自宋李伯珍刋之吴郡何友諒刋之忠州二本均有年譜其後坊刻雜出漸失其舊或以譜非其要置而不錄迄於今紕繆轉甚余友汪君西亭氏患之旣定其巻次正其愆譌因彷國史表補撰年譜一巻書成旣鏤板以行余聞嘗熟毛氏藏有陳伯玉氏白文公譜假而觀之則君所編悉與陳氏合而海圗屏風一篇君力辯非討淮蔡時事騐之陳譜亦同於是人皆服君之考證余乃勸君并刋陳譜示諸學者陳氏有言維揚李徳劭作為年譜而不編年踈略牴牾今者李氏譜亡而陳氏譜復出與君所撰一經一緯互相發明不可謂非斯文之厚幸矣康熙四十二年夏六月幾望南書房舊史秀水朱彛尊序時年七十有五白氏文集自記白氏前著長慶集五十巻元微之為序後集二十巻自為序按各本後序列二十一巻之首者乃序長慶三年至太和二年六載之詩尚未及洛中諸作似非二十巻之序也今姑仍之今又續後集五巻自為記按文獻通考云續後集亡失三巻今本僅七十一巻是又亡一巻矣前後七十五巻詩筆老學菴筆記南朝詞人謂文為筆唐人仍之亦稱杜詩韓筆大小凡三千八百四十首按今本七十一巻凡三千六百八十八首約亡失詩文一百十餘首然此記作於㑹昌五年公七十四嵗明年月始卒集中如六年春及自詠老身等詩皆七十五嵗所作不在此記内是公集又不止於七十五巻矣集有五本一本在廬山東林寺經藏院太和九年夏勒成六十巻合二千九百六十四首有記一本在蘇州南禪寺經藏内開成四年二月二日為七袠合六十七巻凡三千四百八十七首有記一本在東都聖善寺鉢塔院律庫樓開成元年為六十五巻凡三千二百五十首有記一本付姪龜郎一本付外孫談閣童各藏於家傳於後此二本亡考按公自為墓志云前後著文集七十巻合三千七百二十首墓志作於記前故未及七十五巻二本疑即指記中所云其日本新羅諸國及兩京人家傳寫者不在此記又有元白唱和因繼集共十七巻集中有因繼集序劉白唱和集五巻集中有劉白唱和集解洛下遊賞宴集十巻集中有洛中詩序又有洛中集記始於太和三年春訖於開成五年凡十有二年以上皆詩集也其文盡在大集錄出别行於時若集内無而假名流傳者此指七十五巻之外而言皆謬為耳㑹昌五年夏五月一日樂天重記白氏長慶集序白氏長慶集者太原人白居易之所作居易字樂天樂天始言試指之無二字能不悞原注事具樂天與余書内始既言讀書勤敏與他兒異五六嵗識聲韻十五志詩賦二十七舉進士按公貞元十五年舉進士年二十八十六年及第此云二十七傳寫之誤也說詳本傳注貞元末進士尚馳競不尚文就中六籍尤擯落禮部侍郎髙郢始用經藝為進退樂天一舉擢上第明年中拔萃甲科按此序各本皆互異疑有傳寫脫悮如樂天十六年進士第十八年登拔萃科鑿然可據此云二十七舉進士是次年登第為十五年矣明年中拔萃是十六年矣元白書判同年校正同省又同登元和元年制科公作元相墓志云二十四試判入等二十八應制科入三等又元集同州刺史謝表云年二十四登乙科授校書郎二十八䝉制舉首選是首尾凡五年盖貞元十八年壬午至元和元年丙戌相去正是五年若樂天十六年中拔萃去元和元年首尾七年矣以元證白可以知諸本之誤總之舊本為妄人改盡此殆誤以及第之年為判選之年也由是性習相近逺求𤣥珠斬白蛇等賦洎百道判新進士競相傳於京師矣㑹憲宗皇帝册召天下士樂天對詔稱㫖又登甲科未㡬選入翰林掌制誥比比上書言得失因為賀雨詩秦中吟等數十章指言天下事時人比之風騷焉予始與樂天同校秘書前後多以詩章相贈答㑹予譴掾江陵樂天猶在翰林寄予百韻律體及雜體前後數十軸是後各佐江通復相酬寄巴蜀江楚間洎長安中少年遞相倣効競作新詞自謂為元和詩而樂天秦中吟賀雨諷諭等篇時人罕能知者然而二十年間禁省觀寺郵候墻壁之上無不書王公妾婦牛童馬走之口無不道至於繕寫摸勒衒賣於市井或持之以交酒茗者處處皆是原注楊越間多作書摸勒樂天及予雜詩賣於市肆之中也其甚者至於盜竊名姓苟求自售雜亂間厠無可奈何予嘗於平水市中原注鏡湖傍草市名見村校諸童競習歌詠召而問之皆對曰先生教我樂天微之詩固亦不知予之為微之也又雞林賈人求市頗切自云本國宰相毎以百金換一篇其甚偽者宰相輒能辨别之自篇章以來未有如是流傳之廣者長慶四年樂天自杭州刺史以右庶子詔還予時刺㑹稽因得盡徵其文手自排纂成五十巻凡二千一百九十一首按舊書本傳載此序作二千二百五十一首前輩多以前集中集為名予以為皇帝明年當改元長慶訖於是矣因號曰白氏長慶集按長慶四年正月穆宗崩太子即位是為敬宗明年正月改元寳厯序作於長慶四年冬故曰明年當改元即位必踰年改元禮也時本明年下有秋字又刪去訖字矣字誤大凡人之文各有所長樂天之長可以為多矣夫以諷諭之詩長於激閑適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍五字七字百言而下長於情賦贊箴戒之類長於當碑記叙事制誥長於實啓奏表狀長於直書檄詞策剖判長於盡總而言之不亦多乎哉至於樂天之官族景行與予之交分淺深非序文之要也故不盡長慶四年冬十二月十日微之序凡例白氏文集七十一巻内各體詩三十七巻凡二千八百餘首此外猶有集中遺漏者可謂富矣乃宋元以来殊未見有詩集單行槧本宋祁曰居易最長於詩它文未能稱是公與元九書反覆千餘言以自道其詩之所得力而文章顧略焉則公之自喜者已有定論舉其所長不嫌略也新唐書藝文志白氏長慶集七十五巻按公前集為長慶集元稹勘定訖長慶二年冬合五十巻以成於長慶四年明年改元寳厯故得名亦猶之乎前集中集云爾元集具在公之沒去長慶末二十有二年距微之沒亦十有五年從杭州召還及蘓州洛中詩皆在後集奈何以長慶集括公之作乎此誤相承已久至今莫辨良不可解白集相傳以郭武定本為最海虞馮定逺猶謂巳失次第則其他可知春明退朝録云公自勒文集成五十巻後集二十巻皆寫本寄蔵廬山東林寺又蔵龍門香山寺髙駢鎮淮南寄語江西㢘使取東林集而有之香山集經亂亦不復存其後履道宅為普明僧院後唐明宗子從榮又寫本寘院之經蔵今本是也後人亦補東林所蔵皆篇目次第未真與今吴蜀摹板無異而文獻通考又云吴本蜀本編次亦不同又有外集一巻往往皆非自記之舊矣並亡可考郡齋讀書志長慶集七十一巻晁子止曰長慶集五十巻後集二十巻續後集五巻本七十五巻續後集亡三巻按此亦當有七十二巻又云集後有聞李崖州貶二絶固疑非樂天語以編年考之果謬今集後無此詩然則今本之七十一巻又非復晁氏所論之舊矣今本有姑蘓錢考功刻曰白氏文集雲間馬元調刻曰元白長慶集大都從元及白者故獨詳於元前有凡例後有補遺元刻既竣漫鐫白集以附行耳往往前後紊雜既非分體又非編年二本略同而錢為甚目與巻不合巻首所標與巻内不合有律詩巻而雜入古體者有一題小序而冠作通巻之序者有失去詩題竟以小序作題者有本是他人作因公唱和附見者輒易題中字扭為公作甚至刪落字句顛倒前後舛譌未易枚舉今悉從各本校正唐音丁籤載白詩全集鹽官胡氏曰集中詩三十七巻前後為例不一難以彚編今通照後集分體仍備注以存其舊凡編五古二十巻七古二巻新樂府二巻長短句一巻五律五巻五排六巻七律九巻半律七排合一巻五絶一巻七絶七巻合五十四巻繆戾雖稍減於馬錢二本然分體太瑣遂有一題之詩而割裂各巻者且其所注前後集亦頗有誤盖白詩嵗月本井然可考如長慶集公自謂訖二年冬而胡本於三年詩亦注前集公自杭州還始卜居洛中得履道宅乃别杭州等詩並在後集而洛中卜居履道里等詩反注前集雖本相沿之謬要其考據亦不得謂之詳宻矣古人詩多以地名如蘓州栁州樊川丁夘類然今長慶集後集既各自為巻而仍統之曰白香山詩集從其歸老之地也是集依胡本分前後集各本雖不另分二集然並載後集於二十一巻之首且二十巻以上分諷諭間適感傷律詩凡四類以類次巻巻各以年為先後二十一巻以下則但分格律又互有間斷而獨不雜入長慶三年以前詩是後集之起於二十一巻眀矣顧前集八巻及二十巻巻末反雜長慶三年詩者要亦有故嘗考元序與公自序長慶集五十巻後集二十巻各以詩文編次舊本既亡今本盡編文藳於三十七巻後中間取足巻尾未免移補遂失其舊如曲江感秋詩序云元和二年三年四年皆有曲江感秋詩編在第七集巻今本第七巻盡江州詩而所謂第七集巻者皆莫可考西溪叢話云白樂天後集第五十一巻同微之贈别郭虚舟錬師五十韻敘燒丹事甚詳今本此詩在二十一巻可見宋本尚各集詩文次巻未嘗截然列文於後也此非分并之明驗乎今編長慶集二十巻分類仍之後集十七巻各本僅分格律亦仍之合三十七巻公集本有續後集散失難稽其亡據者不敢臆分也集内應制諸詩及試作皆附别巻有列賦後者有列制誥後者本不在三十七巻内盖唐人多以此另為一體也集後又有謡吟歌篇等作文苑英華唐文粹皆入詩選從之都為别集一巻今本遺漏詩甚多他不具論即韋縠才調集所選且有未備者乃從各本蒐輯次為白集補遺二巻合前後别集凡四十巻公生平事略見於新舊唐書其中亦互有詳略第新書多假借字語致本事反以辭晦而年月先後亦不甚詳今備載舊書仍參考異同為一巻宋鋟吴蜀本各有年譜一巻今可考者惟唐詩紀事中寥寥數行不編年而多紕繆丁籖自謂得虞山宋本校刻然年譜亦多襲紀事之誤而文加略焉似未見宋譜者盖舊本之亡久矣竊不自揆參考志傳旁證諸家次為年譜一巻不過約略其出處先後之大㮣俾讀公詩者雖編次失舊猶得按嵗月以考之耳詩中箋釋皆原注間有増入者則為按字以别之但就本詩之可考者而已不復蔓引他書妄託箋注自惟淺陋不足以注古人詩而公詩亦非撏撦餖飣所能摸索也集中字句之訛悉從諸本校對家塾數種之外復假證於呉中舊家蔵書有萬間堂校改本苕溪草堂本最後又得憩閒堂所蔵泰興季侍御依宋刻手校本聚本不一自多互異若銀根亥豕鑿然譌謬抹改固不待言其或意義可通原属疑似則注一作某字於其下以存其舊唐宋詩話㦯因事揚扢引類旁通或考據時地頗足鼓吹風雅今並采録本詩之後又考公集中記序等作凡時事相涉詩文互見者亦因詩附載吟諷之下既挹春華兼登秋實也古人引用諸書必詳根柢出處嘉隆以後此風邈矣是集采用凡一百二十餘家各標原書名目其有邪說流傳不根已甚者亦間為折衷駮正既卒業適秀水朱檢討竹垞先生来探梅西山因過草堂留話竟日疑難相質多所發明既歸復以蔵弆鈔本郵寄廣所未備先生每及表章古人輒津津娓娓商𣙜忘倦衣被後學之功不敢忘也是集緣起本以案頭俗本訛誤偶有考正日注行間漸采小史詩話筆記一二積之窮年不覺盈巻北還杜門重加編訂時家姪陛来泰交讀書小園相與晨夕謬謂此本能洗俗刻蕪穢從㬰剞劂因為予讎校字畫襄成之雅固得附書本傳白居易字樂天太原人北齊五兵尚書建之仍孫建生士通皇朝利州都督士通生志善尚衣奉御志善生温檢校都官郎中温生鍠歴酸棗鞏二縣令鍠生季庚建中初為彭城令時李正已據河南十餘州叛正已宗人洧為徐州刺史季庚說洧以彭城歸國因授朝散大夫大理少卿徐州别駕賜緋魚袋兼徐泗觀察判官歴衢州襄州别駕自鍠至季庚世敦儒業皆以眀經出身季庚生居易初建立功於髙齊賜田於韓城子孫家焉遂移籍同州至温徙於下邽今為下邽人焉居易幼聰慧絶人襟懐宏放年十五六時袖文一篇投著作郎呉人顧况况能文而性浮薄後進文章無可意者覽居易文不覺迎門禮遇曰吾謂斯文遂絶復得吾子矣貞元十四年始以進士就試禮部登科記作貞元十六年髙郢下及第第四人新書但稱貞元中而不紀年考公集中送侯權序及性習相近逺賦注皆云十六年又箴言序云貞元十有五年天子命中書舎人渤海公領禮部貢舉事越眀年春居易以進士舉一上登第然則十四年髙郢猶未領貢舉事也舊書作十四年盖據元序及公與元九書二十七嵗之誤然元序云二十七舉進士舉者在春官試之先一年公與元九書云二十七方從鄉試尚未舉進士也公二十七為貞元十四年今遂云十四年就試禮部是二十六舉進士就鄉試矣亦與書序語不合總之數目字傳寫易誤不編年以考之多相仍繆耳侍郎髙郢擢昇甲科吏部判入等授秘書省校書郎元和元年四月憲宗䇿試制舉人應才識兼茂明於體用科䇿入第四等授盩厔縣尉集賢校理居易文詞富豔尤精于詩筆自讎校至結綬畿甸所著歌詩數十百篇皆意存諷賦箴時之病補政之缺而士君子多之往往流聞禁中章武皇帝納諌思理渇聞讜言二年十一月召入翰林為學士三年五月拜左拾遺新書調盩厔尉月中召入翰林為學士遷左拾遺居易自以逢好文之主非次拔擢欲以生平所貯仰酬恩造拜命之日獻䟽言事曰䝉恩授臣左拾遺依前翰林學士已與崔羣同狀陳謝但言忝冒未吐衷誠今再凟宸嚴伏惟重賜詳覽臣謹按六典左右拾遺掌供奉諷諫凡發令舉事有不便於時不合於道者小則上封大則廷諍其選甚重其秩甚卑所以然者抑有由也大凡人之情位髙則惜其位身貴則愛其身惜位則偷合而不言愛身則苟容而不諫此必然之理也故拾遺之置所以卑其秩者使位未足惜身未足愛也所以重其選者使下不忍負心上不忍負恩也夫位不足惜恩不忍負然後能有闕必規有違必諫朝廷得失無不察天下利病無不言此國朝置拾遺之本意也由是而言豈小臣愚劣暗懦所宜居之哉况臣本鄉校䜿儒府縣走吏委心泥滓絶望烟霄豈意聖慈擢居近職每宴飲無不先預每慶賜無不先霑中廏之馬代其勞内㕑之膳給其食朝慙夕惕已逾半年塵曠漸深憂媿彌劇未申微効又擢清班臣所以授官以来僅經十日食不知味寢不遑安唯思粉身以答殊寵但未獲粉身之所耳今陛下肇臨皇極初授鴻名夙夜憂勤以求致理每施一政舉一事無不合于道便于時者萬一事有不便於時者陛下豈不欲聞之乎萬一政有不合於道者陛下豈不欲知之乎儻陛下言動之際詔令之間小有闕遺稍闗損益臣必宻陳所見􅅗獻所聞但在聖心裁斷而已臣又職在禁中不同外司欲竭愚誠合先陳露伏希天鑒深察赤誠新書四年天子以旱甚下詔有所蠲貸振除災沴居易見詔節未詳即建言乞盡免江淮兩賦以救流瘠且多出宫人憲宗頗采納是時于頔入朝悉以歌舞人内禁中或言普寧公主取以獻皆頔嬖愛居易以為不如歸之無令頔得歸曲天子居易與河南元稹相善同年登制舉按元稹選判已與居易同年寄微之百韻詩注云貞元中與微之同登科第俱授校書郎始相識也是不獨制舉同年矣交情隆厚稹自監察御史謫為江陵府士曹掾翰林學士李絳崔羣上前面論稹無罪居易累䟽切諌曰臣昨縁元稹左降頻已奏聞臣内察事情外聽衆議元稹左降有不可者三何者元稹守官正直人所共知自授御史以来舉奏不避權勢祇如奏李佐公等事多是朝廷親情人誰無私因以挟恨或假公議將報私嫌遂使誣謗之聲上聞天聽臣恐元稹左降已後凡在位者每欲舉職必先以稹為誡無人肯為陛下當官守法無人肯為陛下嫉惡繩愆内外權貴親黨縱有大過大罪者必相容隠而已陛下從此無由得知此其不可者一也昨元稹所追勘房式之事心雖徇公事稍過當既從重罰足以懲違况經謝恩旋又左降雖引前事以為責辭然外議喧喧皆以為稹與中使劉士元爭㕔因此獲罪至於爭㕔事理已具前狀奏陳况聞士元蹋破驛門奪將鞍馬仍索弓箭嚇辱朝官承前巳来未有此事今中官有罪未聞處置御史無過却先貶官逺近聞知實損聖徳臣恐從今已後中官出使縱暴益甚朝官受辱必不敢言縱有被凌辱毆打者亦以元稹為戒但吞聲而已陛下從此無由得聞此其不可二也臣又訪聞元稹自去年已来舉奏嚴礪在東川日枉法沒入平人資産八十餘家又奏王沼違法給券令監軍神柩及家口入驛又奏裴玢違勅徵百姓草又奏韓皋使軍將封杖打殺縣令如此之事前後甚多屬朝廷法行悉有懲罰計天下方鎮皆怒元稹守官今貶為江陵判司即是送與方鎮從此方便報怨朝廷何由得知伏聞徳宗時有崔善貞者告李錡必反徳宗不信送與李錡錡掘坑熾火燒殺善貞曽未數年李錡果反至今天下為之痛心臣恐元稹貶官方鎮有過無人敢言陛下無由得知不法之事此其不可者三也若無此三不可假如朝廷誤左降一御史盖是小事臣安敢瑣瀆聖聽至於再三誠以所損者深所闗者大以此思慮敢不極言疏入不報又淄青節度使李師道進絹為魏徵子孫贖宅新書師道上私錢六百萬為魏徵孫贖故第居易諫曰徵是陛下先朝宰相太宗嘗賜殿材成其正室尤與諸家第宅不同子孫典貼其錢不多自可宜中為之收贖而令師道掠美事實非宜憲宗深然之上又欲加河東王諤平章事居易諫曰宰相是陛下輔臣非賢良不可當此位諤誅剥民財以市恩澤不可使四方之人謂陛下得王諤進奉而與之宰相深無益於聖朝乃止新書是時孫璹以禁衛勞擢鳯翔節度使張奉國定徐州平李錡有功遷金吾將軍居易為帝言宜罷璹進奉國以竦天下忠臣心度支有囚繫閺鄉獄更三赦不得原又奏言父死縶其子夫久繫妻嫁債無償期禁無休日請一切免之奏凡十餘上王承宗拒命上令神䇿中尉吐突承璀為招討使諫官上章者十七八居易面論辭情切至既而又請罷河北用兵凡數千百言皆人之難言者上多聽納唯諌承璀事切上頗不恱新書後對殿中論執强鯁帝未諭輒進曰陛下誤矣帝變色罷謂李絳云云謂李絳曰白居易小子是朕拔擢致名位而無禮於朕朕實難奈絳對曰居易所以不避死亡之誅事無巨細必言者盖酬陛下特力拔擢耳非輕言也陛下欲開諫諍之路不宜阻居易言上曰卿言是也繇是多見聽納五年當改官上謂崔羣曰居易官卑俸薄拘於資地不能超等其官可聽自便奏来居易奏曰臣聞姜公輔為内職求為京府判司為奉親也臣有老母家貧養薄乞如公輔例於是除京兆府户曹參軍六年四月丁母陳夫人之喪退居下邽九年冬入朝授太子左贊善大夫十年七月盜殺宰相武元衡居易首上疏論其寃急請捕賊以雪國恥宰相以宫官非諫職不當先諫官言事㑹有素惡居易者掎摭居易言浮華無行其母因看花墮井而死而居易作賞花及新井詩甚傷名教不宜寘彼周行執政方惡其言事奏貶為江表刺史詔出中書舍人王涯上疏論之言居易所犯狀迹不宜治郡追詔授江州司馬居易儒學之外尤通釋典常以忘懐處順為事都不以遷謫介意在湓城立隠舎於廬山遺愛寺嘗與人書言之曰予去年秋始逰廬山到東西二林間香鑪峯下見雲木泉石勝絶第一愛不能捨因立草堂前有喬松十數株修竹千餘竿青蘿為牆援白石為橋道流水周於舍下飛泉落於簷間紅榴白蓮羅生池砌居易與湊滿朗晦四禪師追永逺宗雷之迹為人外之交每相攜逰詠躋危登險極林泉之幽遂至於翛然順適之際㡬欲忘其形骸或經時不歸或逾月而返郡守以朝貴遇之不之責時元稹在通州篇詠贈答往来不以數千里為逺嘗與稹書因論作文之大㫖曰夫文尚矣三才各有文天之文三光首之地之文五材首之人之文六經首之就六經言詩又首之何者聖人感人心而天下和平感人心者莫先乎情莫始乎言莫切乎聲莫深乎義詩者根情苗言華聲實義上自賢聖下至愚騃微及豚魚幽及鬼神羣分而氣同形異而情一未有聲入而不應情交而不感者聖人知其然因其言經之以六義緣其聲緯之以五音音有韻義有類韻協則言順言順則聲易入類舉則情見情見則感易交於是乎孕大含深貫微洞宻上下通而一氣泰憂樂合而百志熙二帝三王所以直道而行垂拱而理者掲此以為大柄決此以為大竇也故聞元首明股肱良之歌則知虞道昌矣聞五子洛汭之歌則知夏政荒矣言者無罪聞者作誡言者聞者莫不兩盡其心焉洎周衰秦興採詩官廢上不以詩補察時政下不以詩洩道人情用至於諂成之風動救失之道缺於時六義始刓矣國風變為騷辭五言始於蘓李詩騷皆不遇者各繫其志發而為文故河梁之句止於傷别澤畔之吟歸於怨思彷徨抑鬱不暇及他耳然去詩未逺梗槩尚存故興離别則引雙鳬一鴈為喻諷君子小人則引香草惡鳥為比雖義類不具猶得風人之什二三焉於時六義始缺矣晉宋已還得者盖寡以康樂之奥博多溺於山水以淵明之髙古偏放於田園江鮑之流又狹於此如梁鴻五噫之例者百無一二於時六義寖微矣陵夷至於梁陳間率不過嘲風雪弄花草而已噫風雪花草之物三百篇中豈捨之乎顧所用何如耳設如北風其涼假風以刺威虐雨雪霏霏因雪以愍征􅃥棠棣之華感華以諷兄弟采采芣苡美草以樂有子也皆興發於此而義歸於彼反是者可乎哉然則餘霞散成綺澄江靜如練歸花先委露别葉乍辭風之什麗則麗矣吾不知其所諷焉故僕所謂嘲風雪弄花草而已於時六義盡去矣唐興二百年其間詩人不可勝數所可舉者陳子昂有感遇詩二十首鮑防感興詩十五篇又詩之豪者世稱李杜李之作才矣竒矣人不迨矣索其風雅比興十無一焉杜詩最多可傳者千餘首至於貫穿今古覼縷格律盡工盡善又過於李焉然撮其新安石壕潼闗吏蘆子闗花門之章朱門酒肉臭路有凍死骨之句亦不過十三四杜尚如此况不迨杜者乎僕常痛詩道崩壊忽忽憤發或廢食輟寢不量才力欲扶起之嗟乎事有大謬者又不可一二而言然亦不能不粗陳於左右僕始生六七月時乳母抱弄於書屏下有指之字無字示僕者僕雖口未能言心已黙識後有問此二字者雖百十其試而指之不差則知僕宿習之緣已在文字中矣及五六嵗便學為詩九嵗暗識聲韻十五六始知有進士苦節讀書二十已来晝課賦夜課書間又課詩不遑寢息矣以至於口舌成瘡手肘成胝既壯而膚革不豐盈未老而齒髪早衰白瞀然如飛蠅垂珠在眸子中者動以萬數盖以苦學力文之所致又自悲矣家貧多故年二十七方從鄉試既第之後雖専於科試亦不廢詩及授校書郎時已盈三四百首或出示交友如足下輩見皆謂之工其實未窺作者之域耳自登朝来年齒漸長閱事漸多每與人言多詢時務每讀書史多求理道始知文章合為時而著歌詩合為事而作是時皇帝初即位宰府有正人屢降璽書訪人急病僕當此日擢在翰林身是諫官月請諌紙唘奏之間有可以救濟人病禆補時闕而難於指言者輒詠歌之欲稍稍進聞於上上以廣宸聽副憂勤次以酬恩奬塞言責下以復吾平生之志豈圗志未就而悔巳生言未聞而謗已成矣又請為左右終言之凡聞僕賀雨詩衆口籍籍以為非宜矣聞僕哭孔戡詩衆面脉脉盡不恱矣聞秦中吟則權豪貴近者相目而變色矣聞登樂逰園寄足下詩則執政柄者扼腕矣聞宿紫閣邨詩則握軍要者切齒矣大率如此不可徧舉不相與者號為沽譽號為詆訐號為訕謗苟相與者則如牛僧孺之戒焉乃至骨月妻孥皆以我為非也其不我非者舉世不過三兩人有鄧魴者見僕詩而喜無何魴死有唐衢者見僕詩而泣未㡬而衢死其餘即足下足下又十年来困躓若此嗚呼豈六義四始之風天將破壊不可支持耶抑又不知天意不欲使下人病苦聞於上耶不然何有志於詩者不利若此之甚也然僕又自思闗東一男子耳除讀書属文外其他懵然無知乃至書畫碁博可以接羣居之歡者一無通曉即其愚拙可知矣初應進士時中朝無緦麻之親達官無半面之舊䇿蹇步於利足之途張空拳於戰文之塲十年之間三登科第名落衆耳迹昇清貴出交賢俊入侍冕旒始得名於文章終得罪於文章亦其宜也日者聞親友間說禮吏部舉選人多以僕私試賦判為凖的其餘詩句亦往往在人口中僕恧然自媿不之信也及再来長安又聞有軍使髙霞寓者欲聘倡妓妓大誇曰我誦得白學士長恨歌豈同他哉由是増價又足下書云到通州日見江館柱間有題僕詩者何人哉又昨過漢南日適遇主人集衆娱樂他賓諸妓見僕来指而相顧曰此是秦中吟長恨歌主耳自長安抵江西三四千里凡鄉校佛寺逆旅行舟之中往往有題僕詩者士庶僧徒孀婦處女之口毎有詠僕詩者此誠雕篆之戲不足為多然今時俗所重正在此耳雖前賢如淵雲者前輩如李杜者亦未能忘情於其間哉古人云名者公器不可多取僕是何者竊時之名已多既竊時名又欲竊時之富貴使已為造物者肯兼與之乎今之屯窮理固然也况詩人多蹇如陳子昂杜甫各授一拾遺而屯剥至死孟浩然輩不及一命窮悴終身近日孟郊六十終試協律張籍五十未離一太祝彼何人哉况僕之才又不逮彼今雖謫佐逺郡而官品至第五月俸四五萬寒有衣飢有食給身之外施及家人亦可謂不負白氏子矣微之微之勿念我哉僕數月来檢討囊帙中得新舊詩各以類分分為巻目自拾遺来凡所遇所感闗於美刺興比者又自武徳至元和因事立題題為新樂府者共一百五十首謂之諷諭詩英華作諷詩又或退公獨處或移病閑居知足保和吟翫性情者一百首謂之閑適詩又有事物牽於外情理動於中随感遇而形於歎詠者一百首謂之感傷詩又有五言七言長句絶句自百韻至兩韻者四百餘首謂之雜律詩凡為十五巻約八百首異時相見當盡致於執事微之古人云窮則獨善其身達則兼濟天下僕雖不肖常師此語大丈夫所守者道所待者時時之来也為雲龍為風鵬勃然突然陳力以出時之不来也為霧豹為㝠鴻寂兮寥兮奉身而退進退出處何往而不自得哉故僕志在兼濟行在獨善奉而始終之則為道言而發眀之則為詩謂之諷諭詩兼濟之志也謂之閑適詩獨善之義也故覽僕詩者知僕之道焉其餘雜律詩㦯誘於一時一物發於一笑一吟率然成章非平生所尚者但以親朋合散之際取其釋恨佐歡今銓次之間未能刪去他時有為我編集斯文者略之可也微之夫貴耳賤目榮古陋今人之大情也僕不能逺徵古舊如近嵗韋蘇州歌行才麗之外頗近興諷其五言詩又髙雅閑澹自成一家之體今之秉筆者誰能及之然當蘓州在日人亦未甚愛重必待身後人始貴之今僕之詩人所愛者悉不過雜律詩與長恨歌已下耳時之所重僕之所輕至於諷諭者意激而言質閑適者思澹而辭迂以質合迂宜人之不愛也今所愛者並世而生獨足下耳然百千年後安知復無如足下者出而知愛我詩哉故自八九年来與足下小通則以詩相戒小窮則以詩相勉索居則以詩相慰同處則以詩相娱知吾罪吾率以詩也如今年春逰城南時與足下馬上相戲因各誦新豔小律不雜他篇自皇子陂歸昭國里迭吟逓唱不絶聲者二十里餘樊李在傍無所措口知我者以為詩仙不知我者以為詩魔何則勞心靈役聲氣連朝接夕不自知其苦非魔而何偶同人當美景或花時宴罷或月夜酒酣一詠一吟不覺老之將至雖驂鸞鶴逰蓬瀛者之適無以加於此焉又非仙而何微之微之此吾所以與足下外形骸脫蹤迹傲軒鼎輕人寰者又以此也當此之時足下興有餘力且欲與僕悉索還往中詩取其尤長者如張十八古樂府李二十新歌行盧楊二秘書律詩竇七元八絶句博捜精掇編而次之號為元白往還集衆君子得擬議於此者莫不踊躍欣喜以為盛事嗟乎言未終而足下左轉不數月而僕又繼行心期索然何日成就又可為之太息矣僕常語足下凡人為文私於自是不忍於割截或失於繁多其間妍媸益又自惑必待文友有公鑒無姑息者討論而削奪之然後繁簡當否得其中矣况僕與足下為文尤患其多已尚病之况他人乎今且各纂詩筆粗為巻第待與足下相見日各出所有終前志焉又不知相遇是何年相見是何地溘然而至則如之何微之知我心哉潯陽臘月江風苦寒嵗暮鮮歡夜長少睡引筆鋪紙悄然燈前有念則書言無銓次勿以繁雜為倦且以代一夕之話言也居易自敘如此文士以為信然十三年冬量移忠州刺史自潯陽浮江上峡十四年三月元稹㑹居易於峽口停舟夷陵三日時季弟行簡從行三人於峡州西二十里黄牛硤口石洞中置酒賦詩戀戀不能訣南賓郡當峡路之深險處也花木多竒居易在郡為木蓮荔枝圗寄朝中親友各記其狀記荔枝木蓮見後不複録盛傳都下好事者喧然模寫其年冬召還京師拜司門貟外郎明年轉主客郎中知制誥加朝散大夫始著緋新書穆宗好畋逰獻續虞人箴以諷時元稹亦徵還為尚書郎知制誥同在綸閣長慶元年三月穆宗本紀作元年四月此三月當誤受詔與中書舎人王起覆試禮部侍郎錢徽下及第人鄭朗等一十四人十月轉中書舎人新書田布拜魏博節度使命持節宣諭布遺五百縑詔使受之辭曰布父讐國恥未雪人當以物助之乃取其財誼不忍方諭問旁午若悉有所贈則賊未殄布貲竭矣詔聽辭餉十一月穆宗親試制舉人又與賈餗陳岵為考䇿官凡朝廷文字之職無不首居其選然多為排擯不得用其才時天子荒縱不法執政非其人制御乖方河朔復亂居易累上疏論其事天子不能用乃求外任新書是時河朔復亂合諸道兵出討遷延無功賊取弓髙絶糧道深州圍益急居易上言兵多則難用將衆則不一宜詔魏博澤潞定滄四節度使令各守境以省度支貲餉每道各出銳兵三千使李光顔將光顔故有鳯翔徐滑河陽陳許軍無慮四萬可徑薄賊開弓髙糧路合下博解深州三圍與牛元翼合還裴度招討使使悉太原兵西壓境見利乗隙夾攻之間令招諭以動其心未及誅夷必自生變且光是顔久將有威名度為人忠勇可當一面無若二人者於天子荒縱宰相才下責罰失所宜坐視賊無能為居易忠不見聽乃匄外遷七月除杭州刺史俄而元稹罷相自馮翊轉浙東觀察使交契素深杭越鄰境篇詠往来不間浃旬嘗㑹於境上數日而别新書為杭州刺史始築隄捍錢唐湖鍾洩其水溉田千頃復浚李泌六井民賴其汲秩滿除太子左庶子分司東都寳厯中復出為蘇州刺史文宗即位徵拜秘書監賜金紫九月上誕節召居易與僧惟澄道士趙常盈對御講論於麟徳殿居易論難鋒起辭辨泉注上疑宿搆深嗟挹之大和二年正月轉刑部侍郎封晉陽縣男食邑三百戸三年稱病東歸求為分司官尋除太子賓客居易初對䇿髙第擢入翰林䝉英主特達顧遇頗欲奮厲効報苟致身於訏謨之地則兼濟生靈蓄意未果望風為當路者所擠流徙江湖四五年間幾淪蠻瘴自是宦情衰落無意於出處惟以逍遥自得吟詠情性為事大和已後李宗閔李徳裕朋黨事起是非排陷朝昇暮黜天子亦無如之何楊頴士楊虞卿與宗閔善居易妻頴士從父妹也居易愈不自安懼以黨人見斥乃求置身散地冀於逺害凡所居官未嘗終秩率以病免固求分務識者多之五年除河南尹七年復授太子賓客分司初居易罷杭州歸洛陽於履道里得故散騎常侍楊馮宅竹木池館有林泉之致家妓樊素蠻子者能歌善舞居易既以尹正罷歸每獨酌賦詠於舟中因為池上篇池上篇載詩内不複録又効陶􅅗五栁先生作醉吟先生以自况文章曠達皆此類也太和末李訓搆禍衣冠塗地士林傷感居易愈無宦情開成元年除同州刺史辭疾不拜尋授太子少傅進封馮翊縣開國侯四年冬得風病伏枕者累月乃放諸妓女樊蠻等仍自為墓志病中吟詠不輟病中詩序載詩内不複録㑹昌中請罷太子少傅以刑部尚書致仕與香山僧如滿結香火社每肩輿往来白衣鳩杖自稱香山居士大中元年卒時年七十有六贈尚書右僕射新書㑹昌初以刑部尚書致仕六年卒年七十五贈尚書右僕射宣宗以詩弔之遺命薄葬無請諡又云敏中為相請諡有司曰文北夢瑣言牛僧孺初卒未賜諡後白敏中入相乃奏定諡曰簡白居易曰文唐語林大中末諌官獻疏請賜白居易諡上曰何不讀醉吟先生墓表卒不賜諡弟敏中在相位奏立神道碑使李商隠為之按商隠碑文未嘗稱諡亦但云應公之子景受而作設果由敏中奏請何無一字及朝典乎賜諡之說恐未足據也有文集七十五巻經史事類三十巻並行於世長慶末浙東觀察使元稹為居易集序元序載長慶集巻首不複錄人以稹序盡其能事居易嘗寫其文集送江州東西二林寺洛城香山聖善等寺如佛書雜傳例流行之無子以其姪孫嗣遺命不歸下邽按公自譔墓志葬下邽縣臨津里北源李墓碑作葬龍門太平寰宇記白居易影堂在洛陽縣南二十里其為葬洛無疑若遺命則似属穿鑿也可葬於香山如滿師塔之側家人從命而葬焉新書賛云居易譏世人所愛惟雜律詩彼所重我所輕至諷諭意激而言質閒適思澹而辭迂以質合迂宜人之不愛也今視其文信然而杜牧謂纖豔不逞非莊士雅人所為流傳人間子父女母交口教授淫言媟語入人肌骨不可去盖救所失不得不云立名按史筆矛盾如此安所謂識與斷乎且所云纎豔不逞等本非杜牧語葉少藴避暑録話杜牧作李戡墓志載戡詆元白詩語所謂非莊人雅士所為淫言媟語入人肌骨者元稹所不論如樂天諷諭閒適之辭可槩謂淫言媟語耶戡不知何人而牧稱之過甚古今妄人不自量好抑揚予奪而人輒信之類爾觀牧詩纎豔淫媟乃正其所言而不自知也新唐書取為牧語論樂天傳以為救失不得不然盖過矣牧記戡母夢有偉男子持雙兒授之予孔丘以是與爾及生戡因字之天授晁無咎每舉以為戲曰孔夫子乃為人作九子母耶此必戡平日自言者其詭妄不言可知也欽定四庫全書白香山詩集年譜世系按唐宰相世系表白氏出自姬姓周太王五世孫虞仲封於虞為晉所滅虞之公族井伯奚媵伯姬於秦受邑於百里因號百里奚奚生視字孟明古人皆先字後名故稱為孟明視孟明視二子一曰西乞術二曰白乙丙其後以為氏裔孫武安君起賜死杜郵始皇思其功封其子仲於太原故子孫世為太原人二十三世孫後魏太原太守邕邕五世孫建白氏家狀則曰楚殺白公其子奔秦代為名將乙丙已降是也未嘗作虞人及百里奚媵秦語表又以建為後周𢎞農郡守與家狀比齊五兵尚書贈司空不合白敏中大父名鏻與鍠同為温之子乃以鏻為潾凡此皆誤也洪景盧容齋隨筆謂新唐書宰相世系表承用逐家譜牒多所繆誤歐陽公略不削筆恐未可據信哉白公自撰醉吟先生墓志云有三姪長味道巢縣丞次景囘淄州司兵叅軍次晦之舉進士並不詳何人子又云樂天無子以姪孫阿新為之後大中三年李商隠為公墓碑云子景受自頴陽尉典治集賢御書表云景受孟懐觀察使以從子嗣則非阿新明矣按公墓志預作於㑹昌初豈其後復易以從子承祧而遂更其名乎表於景受下猶系二世景受生邦翰司封郎中邦翰生思齊鄭州錄事叅軍行簡子為味道成都少尹今世系並依文集家狀仍載史表異同以備考案直齋陳氏書錄解題曰吳郡守李伯珍刻白集有年譜一巻維揚李璜徳劭譔余病其疎畧牴牾號為年譜而不編年乃别為新譜刋附集首又曰知忠州漢嘉何友諒以居易舊治既刋其文集又作年譜列之集首始余為譜既成妺夫王栐叔守忠錄寄之則忠巳有此譜視余譜詳畧互見亦各有發明按此即所謂吳蜀本也今並亡失無可考惟唐詩紀事畧有譜胡氏丁籤列白集之首者多從其説亦間有異同頗如陳氏所謂疎畧牴牾號為年譜而不編年者大都仍吳本之誤也如貞元十六年本庚辰而訛曰已卯公生壬子嵗是年二十九而訛曰二十八元和三年除左拾遺見本傳又見公奏狀又見奉勅試撰制誥注而訛曰二年除謝狀稱五年五月始授京兆户曹叅軍喪母則在六年四月而訛曰五年喪母賀雨詩云皇帝嗣寳厯元和三年冬自冬及春暮不雨旱爞爞是明屬四年作矣而訛曰三年冬作豈未見自冬及春暮句耶且云為賛善首尾四年尤謬公六年丁母喪九年拜賛善至十年謫潯陽才五年寄元九詩云一病經四年親朋書斷絶然則渭村退居已首尾四年安得五年為賛善哉十四年同知退赴忠州任於峽中遇微之作三游洞序而訛曰三遊洞􅒉㑹昌二年壬戌春致仕官俸初罷詩云七年為少傅公以開成丙辰加少傅至壬戌正是七年而訛曰元年致仕其中繆盭略舉於此既從而訂正之乃益叅考傳志諸家所紀􅄒仍舉公詩之嵗月可考者繫其下次為年譜一巻時代云逺典籍淪亡或失据依寧闕其未確者不敢穿鑿傅㑹而曲為之説也敢以質諸博雅君子古歙汪立名譔欽定四庫全書白香山詩集歙縣汪立名編年譜舊本嵗在𤣥黓敦牂四月余方編刻白香山詩購宋槧年譜未得乃妄為考據譔次年譜一巻眀年五月剞􅩻既竣復從朱檢討竹垞先生所得琴川汲古閣毛氏故所蔵香山宋譜即直齋陳氏譔本不特編年繫事與余譜略同而其辨論海圗屏風詩為諷王承宗事作及元白隙終之繆之類無不暗合相去數百年如與古人晤對質疑亦大快事也始余為譜頗極駮史傳紀事諸書譌誤或者怪之獲見是書自幸可藉以白穿鑿杜譔之疑遂欲削去所譔獨留陳本而竹垞先生以為二譜一縱一横體格本異且互有詳略不嫌並存又因其得之既刻之後遂附次新譜非敢進今而退古也譜既曰未嘗賜諡而猶稱白文公年譜者從新史耳若其引据詩話雖已采錄重惜古本未忍裁節並仍其舊康熙癸未六月汪立名記白文公年譜公名居易字樂天白氏系出白起為秦將死杜郵始皇思其功封其子於太原故子孫世為太原人二十三世孫邕為後魏太原太守邕五世孫建北齊五兵尚書賜田於韓城因家焉始移籍同州建生士通唐利州都督生志善尚衣奉御生温檢校都官郎中徙華州下邽遂為下邽人生鍠鞏縣令生季庚襄州別駕公皇考也見舊史傳新史宰相世系表及公所述鞏縣府君事狀其不同者表稱虞公族百里奚媵秦穆姬生孟眀視視生二子曰西乞術白乙丙其後以為氏而事狀稱楚大子建之子勝號白公其子奔秦代為秦將白乙以降是也如表言則白出姬姓如狀言則出芈姓按左氏傳晉敗秦于殽獲百里孟明視西乞術白乙丙孟眀氏百里謂為奚之子可也術丙與孟眀號為三帥烏知其為孟眀之子邪且萬無父子三人並將之理此其為說固巳疎矣若事狀則又合白乙白勝為一族白乙為秦穆將去白勝㡬二百年而云白乙以降則反以為白勝之後裔又何其考之不詳也元和姓纂載風俗通以白乙為嬴姓盖亦以其為秦人意之爾姓纂復泛舉秦白起楚白勝周白圭漢白生等數人而皆不能言其自出大抵世祀緜邈譜諜散亡惟當用春秋見聞傳聞之義斷自近始若必逺推古昔傅㑹本支則固不能亡牴牾矣代宗大厯七年壬子正月二十日公始生於鄭州新鄭縣東郭宅見公自為墓誌新鄭公祖鞏縣府君所居也杭蘓集本皆作六年嵗在辛亥而公嘗有詩云何事同生壬子嵗老於崔相及劉郎謂崔羣劉禹錫皆同庚則非辛亥明矣集本誤也生六七月乳母抱立屏下指之無二字百試不差見公與元九書八年癸丑是嵗鞏縣府君卒於新鄭九年甲寅十年乙夘十一年丙辰十二年丁巳與元九書云年五六嵗便學為詩十三年戊午十四年已未徳宗建中元年庚申與元九書云年九嵗始識聲韻二年辛酉三年壬戌四年癸亥興元元年甲子貞元元年乙丑二年丙寅公年十五有江南送北客寄徐州兄弟詩自此始有文見於集公父襄州府君建中初令彭城東平叛命與李洧謀以徐州歸國就擢本州別駕至是猶在徐公時遊江南故以詩寄兄弟也然公未仕以前家常在徐豈以府君嘗有功於徐故耶集中又有宿桐廬館詩避難越中江樓望歸詩除夜寄弟妹詩大抵皆南逰所作但莫能考其嵗月爾盖公自少往来江南侍其兄官浮梁遂以宣州解及第既第復至宣城集中是以多江南詩也三年丁夘與元九書云年十五六始知有進士舊史云年十五六時袖詩謁顧况况迎門禮謁曰吾謂斯文遂絶今復得子矣摭言云况謔公曰長安物貴居大不易及讀原上草詩野火燒不盡春風吹又生乃曰有句如此居亦何難四年戊辰有王昭君二絶所謂君王若問妾顔色莫道不如宫裏時者也時年十七五年已巳有病中作詩是嵗初置中和節集有中和節頌未及第時所作而序云臣某忝就賓貢之列則未必作於是年也六年庚午七年辛未八年壬申九年癸酉十年甲戌五月襄州府君卒於襄陽官舎府君自徐徙佐衢又徙襄公有逰襄陽懐孟浩然詩或是随侍時作十一年乙亥十二年丙子十三年丁丑十四年戊寅十五年已夘公兄幼文為浮梁主簿留家於此公實從之有將之饒州江浦夜泊詩云身病向畨陽家貧寄徐州當作於此時是嵗舉進士於宣州試射中正鵠賦窗中列逺岫詩公預薦送有傷逺行賦云分微禄以歸養自鄱陽而歸洛陽又云今我来兮秋風其凉盖公既被薦乃歸省而其家當復自徐徙寓洛也十六年庚辰二月十四日中書舎人髙郢下第四人及第試性習相近逺賦玉水記方流詩摭言云攜謁校書郎李逢吉初不為意及覽賦頭云下自人上達君咸徳以慎立而性由習分大竒之元稹為集序云貞元末進士尚馳競髙郢始用經蓺為進退樂天一舉擢上第明年㧞萃甲科由是性習相近逺求𤣥珠斬白蛇等賦及百道判新進士競相傳於京師矣摭言又云時年二十七有詩曰慈恩塔下題名處十七人中最少年按舊史貞元十四年始以進士試禮部擢甲科公生壬子至戊寅恰二十七嵗與摭言合今以集考之實不然試賦既眀著嵗月而箴言序云十五年天子命渤海公領禮部貢舉事明年春一上登第又送侯權序亦云十五年秋予始舉進士與侯生俱為宣城守所貢眀年春予中春官第則其非十四年審矣盖公與元九書自言年二十七方從鄉賦集序因之摭言之誤殆由此然書但云從鄉賦爾不云及第也李璜舊譜云樂天年二十九猶未第故有詩云此生知負少年春不展愁眉欲三十時貞元十五年也眀年始登第按十五年公方二十八其曰欲三十者大約言之便以為二十九亦誤矣及第後有留別同年詩云及第未為貴拜親方始榮又有憶舊山與同年賀坐主拜太常冬日宴鄭家亭等詩有哀二良文為陸長源鄭通誠作也序云十五年隴西薨浹辰而師亂十六年夏南陽薨翌日而難作隴西董晉南陽張建封也汴徐之變陸鄭皆戎倅死焉十七年辛巳祭符離六兄文云去年春居易南逰兄亦東適黟歙之間欣然一覿又在宣州祭烏江十五兄文云及兄辭滿淮南薄逰江東居易亦以行邁忽逆旅而逢盖公及第後即逰江南復至宣城有敘徳書情四十韻上宣歙崔中丞云幸穿楊逺葉謬折桂髙枝又云磨鉛重剸割䇿蹇再奔馳相馬須憐痩呼鷹正及飢當是此年所作詩意欲求辟舉者崔中丞名衍十八年壬午有詩云何况鏡中年又逼三十二時年三十一也舊譜以為校書時作非是十九年癸未以㧞萃選登科時鄭珣瑜為吏部李商隠撰公墓碑云前進士避祖諱選書判抜萃盖公祖名鍠與宏同音言所以不應宏辭也摭言云白公試宏詞賦考落以賦有不知我者謂我斬白蛇知我者謂我斬白帝也登科之人賦皆無聞白公之賦傳於天下按公未嘗試宏詞此賦或是行巻所作摭言誤也始仕為校書郎集有代書寄微之百韻首云憶昔貞元嵗初登典校司身名同日授心事一言知注云貞元中與微之同登科俱授校書始相識公及第於是四年年三十二矣嵗有養竹記許昌令壁記及記畫二十年甲申汎渭賦序云右丞相髙公之掌貢舉也予以鄉貢進士舉及第左丞相鄭公之領選部也予以書判㧞萃選登科十九年天子並命二公對掌鈞軸眀年春予為校書郎始徙家秦中卜居於渭上盖公未仕時家多在徐至是始居秦又有八漸偈二月在東都作當是迎家時也又燕子樓詩序云予為校書郎時逰徐泗間張尚書宴予酒酣出盼盼以佐歡歡甚予因贈詩云醉嬌勝不得風裊牡丹花意亦在此年燕子樓事世傳為張建封按建封死在貞元十六年且其官為司空非尚書也尚書乃其子愔麗情集誤以為建封爾此雖細事亦可以正千載傳聞之謬順宗永貞元年乙酉有感時詩云不覺眀鏡中忽年三十二勿言身未老冉冉行將至憲宗元和元年丙戌罷校書郎四月應材識兼茂明於體用科入第四等是時順宗未葬以制舉人皆先朝所召命宰相監試元稹入第三等䇿林序云與微之俱應制舉閉戸累月揣摩當代之事造成䇿目七十五門微之首登科予次焉授盩厔尉代書百韻詩云東垣君諌爭西邑我驅馳謂微之拜拾遺也權攝昭應早秋書事亦云丹殿子司諌赤縣我徒勞墓碑云以對䇿語切不得為諌官然第四等自當入赤尉謂語切不得入第三等乃可也有北樓望山醉中歸盩厔等詩長恨歌二年丁亥有曲江早秋詩云我年三十六冉冉復旦暮碑云試進士取蕭澣為第一事畢帖集賢校理月中由右銀臺召入翰林院試文明日以所試制加涇原段佑遂為學士時十一月也入院後有寄題盩厔雙松詩云忽奉宣室召徵為文苑臣舊譜以爲與哥舒大詩不知何據是嵗元稹母鄭氏死公為墓銘又有祭楊氏夫人文公維私之眷每深公姨也公夫人𢎞農郡君於虞卿汝士為從兄弟三年戊子四月二十八日授左拾遺有謝官状與學士崔羣同進羣時遷庫部貟外郎五月有初授拾遺獻書舊譜云二年上書授拾遺又一年年三十七公時在諌省命寓直集賢殿月中召為學士按公二年自校理入翰林明年為諌官既拜乃上書不知譜所云何為乖誤若此有論制科人狀時牛僧孺皇甫湜李宗閔對䇿切直宰相李吉甫泣訴於上考官韋貫之等皆坐貶故公極論之公時亦為考覆官唐朋黨之禍盖始此而公與李徳裕不咸亦始此又有論王鍔除官裴均進奉等狀四年已丑有賀雨詩自去冬旱至春始得雨有徳宗賢妃韋氏墓誌有論魏徵舊宅状論吐突承璀職名狀有海圗屏風詩時方討王承宗公意不然故借巨鼇以風是嵗生女曰金鑾五年庚寅寒食詩云忽因時節驚年㡬四十如今欠一年有金鑾女晬日詩有論元稹左降狀請罷恒州兵二狀四月求京兆府判司得士曹參軍有謝官狀公在諌省數言事忤憲宗意其論吐突承璀尤不恱至有小子無禮之語賴李絳救解及當改官喻崔羣使求自便又俾中人梁守謙宣㫖於是有陳情狀盖亦承上意爾舊譜謂在翰苑久不遷故求補外者非也有初除戶曹喜而言志詩未㡬退居渭上有寄禮部崔侍郎翰林錢舎人一百韻云五年同晝夜一別似參商自二年為學士至此五年崔謂崔羣嘗同狀謝官故又云共詞加寵命合表謝恩光也又有適意詩云三年作諌官復多尸素羞一朝歸渭上泛如不繫舟又隠几詩云行年三十九嵗暮日斜時又歸田詩云三十為近臣腰間鳴佩玉四十為野夫田中學鋤穀盖自小諌為戶曹但解諌職而巳至是則併翰苑皆解去是必移疾求退而史失載爾但集有拜裴垍李絳張𢎞靖武元衡韋貫之五相制考裴垍相在元和三年公正居翰苑絳以六年相元衡八年𢎞靖貫之九年皆當公退閑憂居之日此又不可曉也是嵗金鑾女死有詩云衰病四十身嬌癡三嵗女又云病来纔十日養得巳三年六年辛夘有沐浴詩云自問今年㡬春秋四十初又栽松詩云如何過四十種此數寸枝又白髮詩云况今我四十春雪詩云元和嵗在夘六年春二月此即韓愈集所謂辛夘年雪也四月五日太夫人陳氏卒始鞏縣府君窆新鄭襄州府君窆襄陽至是皆遷䕶於下邽以十一月八日襄事而陳夫人祔焉有白氏事狀二道七年壬辰有秋日詩云下有獨立人年来四十一八年癸巳二月有陳府君夫人白氏及弟金剛奴墓誌夫人公之祖姑且外祖母也金剛奴公之幼弟公既卜葬祖禰至是亦遷祔焉又有祭金剛奴文是嵗除喪九月有記異冬有村居苦寒詩九年甲午有重到華陽舊居詩云若為重入華陽院病鬢愁心四十三華陽觀公應制舉時所居也有遊悟真寺詩云元和九年秋八月月上弦冬除右賛善大夫有酬盧秘書早朝寄李二十助教詩舊譜云自渭南丁憂至十年喪除為賛善按丁憂在六年八年除喪又二年乃拜官耳十年乙未有贈杓直詩云已年四十四又為五品官杓直李建也醉中却寄元九詩云蒲池村裏匆匆别灃水橋邉兀兀回時微之量移通州司馬三月三十日與公別於灃上見十四年夷陵相遇詩序又是冬在江州與元九書亦云今年春逰城南時與足下馬上相戲各誦新豔小律又云言未終而足下左轉不數月而僕又繼行微之自江陵移通州即令達州也曷不自江陵徑入蜀豈嘗追赴京師而後改授乎有白牡丹詩云應似東宫白賛善被人還喚作朝官六月盜殺宰相武元衡公首上䟽請急捕賊以雪國恥宰相以非諌職言事惡之㑹有惡公者言其母看花堕井死而作賞花及新井詩貶江州刺史中書舎人王涯言其新犯不可復理郡又改司馬宰相韋貫之張𢎞靖也舊譜併及裴度非是度方為中丞亦遇盜不死既愈迺相耳新井之事世莫知其實史氏亦不辨其有無獨髙彦休闕史言之甚詳公母有心疾因悍妬得之及嫠家苦貧公與弟不獲安居常索米丐衣於鄰郡邑母晝夜念之病益甚公随計宣州母因憂憤發狂以葦刀自剄人救之得免後徧訪醫藥㦯發或瘳常恃二壯婢厚給衣食俾扶衛之一旦稍怠斃於坎井時裴晉公為三省本㕔對客京兆府申堂狀至四坐驚愕薛給事存誠曰某所居與白鄰聞其母久苦心疾呌呼往往達於鄰里坐客意稍釋他日晉公獨見夕拜謂曰前時衆中之言可謂存朝廷大體矣夕拜正色曰言其實也非大體也由是晉公信其事後除河南尹刑部侍郎皆晉公所擬凡曰墜井必恚恨也隕穫也凡曰看花必怡暢也閑適也安有怡暢閑適之際遽致顛沛廢墜之事樂天長於情無一春無詠花之什因欲黻藻其罪又驗新井篇是尉盩厔時作隔官三政不同時矣彦休所記大略如此聞之東都聖善寺老僧僧故佛光和尚弟子也今考集中亦無所謂新井詩者意其刪去然則公母死以心疾固人倫之大不幸而傅致詩篇以成讒謗則憸壬媢嫉者為之也故刪述彦休之語以告来者赴貶所有初出藍田過望秦嶺發商州等詩再到襄陽有訪問舊居詩宿鄂州有夜聞歌者詩初到江州有詩云樹木凋疎山雨後又江樓聞砧詩云江人授衣晚十月始聞砧當是秋末冬初始到也有謫居詩云面痩頭斑四十四逺謫江州爲郡吏臘月有與元九書舊史本傳全載十一年丙申二月十日有送春歸詩秋送客湓浦有琵琶引又有始逰廬山詩八月二十日夢微之詩四十五詩云或擬廬山下来春結草堂有與楊虞卿書答崔侍郎書云自到潯陽㦯已周嵗十二年丁酉草堂成三月二十七日始居之有記有祭匡山廬山神文有潯陽春詩云四十六時三月盡寫真詩云我昔三十六寫貌在丹青我今四十六衰顇在江城四月有遊大林寺序閏五月公兄幼文卒有祭浮梁大兄文幼文為浮梁主簿在貞元十五年今二十年矣而以舊官終未識中間何以不調也十三年戊戌七月八日有司馬㕔壁記云予佐是郡行四年矣有浩歌行云不覺身年四十七十二月二十日除忠州刺史有荷聖澤及謝崔相公初著刺史緋詩十四年已亥春發江州有别草堂及潯陽宴別等詩三月十一日至夷陵遇微之停舟三宿有詩有三逰洞序時微之自通州移虢州長史而公弟知退同行三人始逰故目為三遊洞知退名行簡二十八日到忠州有謝上表有登東樓寄楊萬州及西樓夜東樓晩郡齋即事等詩州有白蓮花命道士毋邱元志寫為圗作二絶句末云天教抛擲在深山傳於都下除夜有詩云明朝四十九十五年庚子初春有東坡種花詩二月有郡中春燕詩寒食夜詩云四十九年身老日一百五夜月明天是嵗正月二十八日憲宗崩有酬李相公詩云涕淚滿襟君莫怪甘泉侍從最多時時初聞國哀也夏有荔枝圗序冬召為司馬貟外郎有初脫刺史緋别東坡發白狗黄牛峽等詩十二月二十八日除主客郎中知制誥穆宗長慶元年辛丑正月四日有舉楊嗣復自代狀三月與中書舎人王起覆試錢徽下及第人有論事宜狀時以鄭朗等十四人謂之子弟不當在選中宰相段文昌學士李紳以嘱託不行元稹以私憾共唱其事内出孤竹管賦題重試不能成文徽等皆坐貶公意大抵欲從寛也李建死公為墓碑謂之善人碑又有同元稹祭杓直文十月為中書舎人有新昌新居書事云冒寵巳三遷歸朝始二年三遷謂司門主客中書也是嵗公弟行簡授拾遺從弟敏中及第皆有詩二年壬寅正月有論行營事宜状七月十日有曲江感秋詩云元和二年秋我年三十七長慶二年秋我年五十一中間十四年六年居譴黜是月除杭州刺史舊史云時河朔復亂數上書論其事天子不能用遂求外任盖穆宗荒縱宰相王播蕭俛杜元頴崔植等皆齷齪無逺略宜公之不樂居朝也墓碑云貶杭州杭江南大藩不得言貶有初罷中書舎人詩時汴軍亂逐李愿汴路不通故由襄漢赴任有路次藍溪題内鄉縣及經商山鄧州漢江重到江州等詩十月一日到任有謝上表有初到郡政衙退等詩語林云替嚴貟外休復休復有時名公喜為之代三年癸卯有立春後五日等詩又二月五日花下忙云二月五日花如雪五十二人頭似霜七月有祈皋亭神文八月有祭龍文禱仇王神文冷泉亭記九月有遊恩徳寺泉洞詩是時元稹自同州至浙東有喜為鄰郡先寄微之詩過杭有席上及留别贈答詩既至越微之有􅑞州宅詩所謂謫居猶得住蓬莱者公答之云知君暗數江南郡除却錢塘總不如自是兩郡常以詩筒往来故有詩云為向兩川郵吏道莫辭来往逓詩筒舊譜謂元九已在越者非也除夜有寄微之詩云明朝半百又加三四年甲辰三月有錢塘湖石記五月有祭浙江文是月除右庶子有除官去未間及三年為刺史詩留題靈隠天竺留贈微之等詩至洛求分司有寄牛相公及分司詩始卜居履道坊得故散騎常侍楊憑宅有卜居詩云遂就無塵坊仍求有水宅未請中庶禄且脫雙驂易注云買宅價不足以兩馬償之又有移家詩云移家入新宅罷郡有餘資又有履道新居二十韻盖公平生從仕至是始有俸餘於是定居于洛以為終焉之計唐語林云公罷杭俸多留官庫繼守者公用不足則假而復填如是五十餘年及黄巢至郡文籍多焚其俸乃亡公自言罷郡有餘資而猶有寄留官庫者豈亦如今世有事例而法不應得者乎公宅地方十七畝屋室三之一水五之一竹九之一而島樹橋道間之池上篇序言之詳矣至後唐為普明禪院有秦王從榮所施大字經蔵及寫公集寘蔵中洛人但曰大字寺其園張氏得其半為㑹隠園水竹尚在寺中有公石刻甚多見宋敏求河南志李格非洛陽名園記其南鄰即崔家池故有題新居寄宣州崔相公詩崔相羣也河南志於履道坊亦載羣宅而云今不知所在公之居猶可識者不獨以名重亦以有水竹且為佛廬故也敬宗寳厯元年乙巳三月四日除蘓州刺史二十九日發東都有别洛城東花詩和汴州令狐相公答劉和州賈常州寄微之等詩五月五日到任有謝表七月有呉郡詩石記有九日詩云前年九日餘杭郡呼賓命宴清白堂去年九日到東洛今年九日来吴鄉有赴洞庭及揀貢橘詩盖以貢橘為名逰太湖也或者唐守臣修貢皆當躬親如湖常貢茶故事邪有寄微之詩云五宿澄波皓月中有霓裳羽衣歌云玲瓏空侯謝好箏陳寵觱栗沈平笙清絃脆管纖纖手教得霓裳一曲成末云李娟張態君莫嫌亦擬随宜且教取玲瓏以下杭妓名娟態蘓妓名唐語林云官妓髙玲瓏謝好好巧於應對善歌舞居易在杭樂於蘓詩有使君全未厭錢塘之句張君房脞說云髙玲瓏餘杭歌者樂天作郡日賦歌與之云罷胡琴掩秦瑟玲瓏再拜歌初畢末云玲瓏玲瓏奈老何使君歌了汝更歌元微之在越厚幣邀至月餘使盡歌所唱之曲作詩送行兼寄樂天云休遣玲瓏唱我詞我詞都是寄君詩冬有西樓喜雪夜宴詩京兆元少尹文集序二年丙午嵗日家宴詩云嵗盞復推藍尾酒春盤先占膠牙餳正月三日閒行詩云赤欄三百六十橋花前歎云前嵗花前五十二今嵗花前五十五有百日假滿詩盖欲移病歸洛故也劉禹錫有白太守行云聞有白太守抛官歸舊谿公答云昨乞百日告起吟五篇詩去年到郡時麥穂黄離離今年去郡日稻花白霏霏舊譜云劉與公為代非也夢得時在和州歲暮罷歸洛與公相遇於揚楚間其為蘇州乃在大和六年齊雲晚望詩云欲辭南國去重上北城看九月全無熱西風亦未寒河亭晚望詩郡靜官初罷鄉遥信未回明朝是重九誰勸菊花盃是九月猶在郡公之去蘓盖在秋冬之交有自問行何遲詩除日有答夢得同發楚州詩是冬弟行簡死文宗大和元年丁未宿滎陽詩云生長在滎陽少長辭鄉曲去時十一二今年五十六公生於新鄭自蘓還道過之初到洛陽有閑遊詩三月召為秘書監有初除賜金紫詩舊譜云袐丞大悮有秘書省後㕔詩十月有三教論文宗誕日與僧惟澄道士趙常盈麟徳殿講論也二年戊申正月除刑部侍郎有文集後序云二年秋余春秋五十有七是嵗大有年有詔賜百官出城觀稼詩和微之五十七三首又和除夜詩云君提七郡籍我按三尺書盖微之在越凡七年除夜知退大祥有祭文三年已酉春以病免官除太子賓客分司有喜除賓客詩將至東都有寄令狐留守詩云惜逢金谷三春盡盖以春暮至洛也歸履道宅詩云今日是長歸自是迄公薨凡十八年在洛終不渝長歸之語舊史云太和後宗閔徳裕朋黨事起頴士虞卿與宗閔善居易妻頴士從父妹也居易懼以黨人見斥乃求置身散地凡所居官未嘗終秩率以病免識者多之有劉白唱和集解有偶作詩云身為三品官年巳五十八夏有祭韋相公文䖏厚也有池上篇是冬與元稹各生子有賀微之詩又有自嘲詩云五十八翁方有後靜思堪喜亦堪嗟又阿崔詩云豈料鬢成雪方看掌弄珠四年庚戌有三月三十日詩云半百過九年豔陽殘一日有同李翺祭李司徒文李絳也是嵗遇害於興元十二月除河南尹有醉中除尹敕到詩有除夜詩云火銷燈盡天眀後便是平頭六十人五年辛亥有六十拜河南尹詩不凖擬身年六十詩府中夜賞詩阿崔年三嵗死有哭崔兒詩報微之晦叔及酬夢得詩七月元稹薨有哭微之詩十月有祭文六年壬子春有贈分司諸公詩寒食宴逰贈馮李二尹詩府酒五絶夏有沃州禪院記六月有薦韋晏李楚狀秋七月有元稹墓誌八月一日有修香山寺記寺在龍門山後魏熙平元年建公自為庶子賓客分司數往逰焉慨然有葺完之願及是為微之誌墓潤筆之直六七十萬義不受以施此寺開成五年又為作經蔵盖嘗自稱香山居士云康駢劇談録曰盧簡辭逰伊水别墅方冬霰雪微下忽有蓑笠牽蓬艇中有白衣與衲僧同坐船後以小竈安桐甑而炊烹魚煑茗泝流吟嘯使人問之乃白傅同佛光往香山也冬劉禹錫除蘇州過洛留十五日朝觴夕詠頗極平生之歡各賦數篇視草而别崔羣薨有祭崔相文有憶舊遊詩寄劉蘓州有贈崔常侍晦叔詩十二月四日有答崔賓客詩云今嵗日餘二十六来嵗年登六十二又有二十三日呈晦叔云案頭厯日雖未盡向後惟殘六七行七年癸丑元日勸酒詩云三盃藍尾酒一楪膠牙餳此對嘗再用之又云夢得君知否俱過本命年公與夢得皆壬子生也有早春醉吟詩寄太原令狐公及劉蘓州又醉送李二十常侍赴鎮浙東詩李紳也公嘗有詩云悶勸迂辛酒閒吟短李詩時李自夀陽分司甫至洛而刺越有春題府㕔詩云潦倒三川守因循涉四年四月罷河南尹歸履道舊第有解印出公府詩五首及罷府歸舊居再授賓客分司等詩七月崔𤣥亮卒有哭晦叔詩又有微之敦詩晦叔相繼長逝巋然自傷因成二絶劉蘇州寄釀酒糯米李常侍寄楊栁枝舞衫有詩謝之八年甲寅有早春憶蘇州寄夢得詩有感春詩云心情多少在六十二三人寒食日有翫半開花詩贈皇甫郎中有家釀新熟詩六十三翁頭雪白假如醒黠欲何為三月裴度為東都留守有侍中晉公欲到東洛先䝉書問期宿龍門詩七月有洛詩序云自三年春至八年夏在洛凡五周嵗作詩四百三十六首是嵗有溧水令白君墓誌銘府君名季康敏中之父至今溧水城隍神相傳為白君也九年乙卯有覽鏡喜老詩云行年六十四安得不衰老夏有崔晦叔墓誌有東林寺文集記集凡六十巻九月除同州刺史不拜有詠懐詩十月改授太子少傅分司有詩云承華東署三分務履道西池七遇春於是劉禹錫自汝州移同州實與公為代有喜見劉同州詩劉集亦有酬公詩云舊託松心契新交竹使符也十一月有詠史詩云彼為葅醢几上肉我作鸞皇天外飛又有二十日獨逰香山感事詩云當君白首同歸日是我青山獨往時時新有甘露之禍初江州之貶王涯有力焉說者因是謂公幸之惟東坡蘓公云樂天豈幸人之禍者哉盖悲之也以愚觀之其悲涯輩之禍而幸已之不與者乎鸞皇盖自况也公又嘗有詩云今日憐君嶺南去當時笑我洛中来未知為何人作亦此意也開成元年丙辰有春逰詩云我年六十五走若下坡輪有春盡日天津橋醉吟詩呈李尹時李紳自分司新除尹閏五月有聖善寺文集記凡六十五巻秋劉禹錫分司有喜夢白馮翊歸洛詩十月有皇甫鏞墓誌銘是嵗楊虞卿死於䖍州有哭師皋詩楊汝士授東川有代妻戲兄嫂詩二年丁巳春有感事詩云無憂六十六年春又有六十六詩云五十八歸来今来六十六又云七十欠四嵗此生何足論有落齒辭三月三日尹李待價唘留守裴侍中修禊合宴於舟中有詩十二韻待價李珏也有蘇州南禪寺蔵記有聞新蟬贈夢得詩五月裴度尹太原牛僧孺為留守有同夢得牛相初到小飲見貽詩三年戊午春有櫻桃花下有感而作詩有醉吟先生傳北夢瑣言云白公與元相友善集有詩云相看掩淚俱無語別有傷心事豈知想得咸陽原上樹已抽三丈白楊枝洎自撰墓誌云與彭城劉夢得為詩友不言元公時人疑其隙終也按此非墓誌語乃醉吟傳中語時元之亡久矣其言與僧如滿為空門友韋楚為山水友皇甫朗之為酒友皆一時見在人則其於詩友自不應復及死者又嘗為劉白唱和集序且與劉書云微之先我去矣詩敵之勍者非夢得而誰此尤可證公與元同升科第俱負直聲中嵗復俱蹇連晚而元撓節速化得罪清議公獨終始如一二人賢否固不可概論而其交情死生不渝觀香山寺記尚欲結他生縁風誼之美可厲薄俗掩淚傷心之句㫖意甚哀而或者臆度疑似乃有隙終之論小人之不樂成人之美如是哉有題河南内㕔詩云盃嘗七尹酒盖自罷河南六年換七尹酒味皆不同七尹者嚴休復王質鄭澣李紳李珏裴璘韋長也除夜有詩云七十期漸近萬縁心巳忘四年已未有四年春詩云又入開成第四春二月有蘓州南禪院集記凡六十七巻十月旦得風痺疾有病中詩十首并序鬻駱馬别栁枝詩在焉别詩云明日放歸歸去後世間應不要春風而又有不能忘情吟云駱反厩素反閨又云素兮素兮為我歌楊栁枝與爾歸醉鄉去来按劉禹錫和公詩云春盡絮飛留不得随風好去落誰家公又戲答云栁老春深日又斜任它飛入别人家他日又有春随樊子一時歸之句則是栁枝竟去也意其初疾欲放而復留至明年乃春去耳有白蘋洲五亭記稱十月十五日則病後所作也五年庚申有病入新正强起迎春寄思黯及病後寒食等詩三月三十日有燕罷感事吟詩云病與樂天相伴住春随樊子一時歸按不能忘情吟序云妓有樊素者年二十餘綽綽有歌舞態善唱楊栁曲人多以曲名之其辭曰素事主十年凡三千有六百日公年五十八自刑部侍郎分司歸洛至六十八而得疾於是十年矣當是初歸洛時得之公嘗有楊栁枝詞八首又有楊栁枝二十韻自注云楊栁枝洛下新聲也洛之小妓有善歌者詞章音韻聽可動人故賦之本事集云白尚書姬人樊素善歌小蠻善舞嘗為詩云櫻桃樊素口楊栁小蠻腰白公年邁而小蠻方豐豔因為楊栁枝以寄意曰一樹春風萬萬枝嫩於金色軟於絲永豐坊裏東南角盡日無言属阿誰如本事集之說則樊素小蠻為二人以集考之不見此二句詩亦無所謂小蠻者而栁枝即樊素也舊譜引公詩兩枝楊栁小樓中嫋娜多年伴醉翁兩枝楊栁必非一人又有九日代羅樊二妓招舒著作云羅敷斂雙袂楚姬獻一盃意所謂兩枝楊栁者然皆臆說未必然也又按劉禹錫有寄小樊詩云終須買取名春草又憶春草詩云河南大尹頻出難只得池塘十步看府門閉後滿街月幾處逰人草頭歇則春草似是府妓又公喜見劉同州詩云應須為春草五馬立踟蹰夢得答云今朝停五馬不是為羅敷注云前章所言春草白君之舞妓也然則春草與栁枝似各是一人偶同姓樊爾漫詳及之資雅話公又嘗有詩云菱角執笙簧谷兒抹琵琶紅綃信手舞紫綃随意歌注云菱谷紅紫皆小蠻名也是秋有病後獨宿香山二絶云更過今年年七十十一月有香山洛中集記凡十巻武宗㑹昌元年辛酉春有病後喜過劉家等五絶又偶吟呈夢得云且喜開年滿七旬為李紳作家廟碑云開成㑹昌之際當在此時有百日假滿少傅官停自喜言懐詩除刑部尚書致仕時李徳裕初用事也有官俸初罷諭親故詩戲酬牛相呈諸寮友詩與夢得同致仕裴賓客王尚書飲詩云四箇老人三百嵗有逸老詩云我初五十八息老雖非早一閑十三年所得亦不少皤然七十翁亦足稱夀考是嵗李程為留守過公池上汎舟話及翰林舊事公有詩云同時六學士五相一漁翁五相謂李吉裴垍崔羣及程也與公皆元和初學士舊譜以為李逢吉非是考翰林記逢吉未嘗為學士考河南志其為留守乃大和中也二年壬戌有喜入新年自詠云大厯年中騎竹馬㡬人得見㑹昌春有宿府中水堂贈盧尹中丞詩云從我到君十一尹相看自置府来無前巳見七尹外有髙銖孫簡盧貞并公為十一人有香山寺寫真詩三月五日齋素畢開素有贈妻𢎞農郡君詩有達哉樂天行秋劉禹錫卒有哭夢得詩又有感舊為李杓直元微之崔晦叔及夢得作皆執友也有送敏中為戶部貟外郎詩云前鴻後鴈行相續相去迢迢二十年注云長慶初為主客貟外郎到今二十年嵗暮聞盧尹夜宴以詩戲之為来日張本云府中歡笑勝尋常明朝强出須謀樂三年癸亥送王使君赴蘓州詩云一别蘓州十八載公以寳厯丙午去蘇於今十八年四年甲子有逰趙村杏花詩云七十三人難再到今春来是别花来有問諸親友詩云七十人難到過三更較稀有開龍門八節灘九硝詩云七十三翁旦暮身誓開險路作通津五年乙丑有齋居春夕感事遣懐詩云風光抛得也七十四年春三月二十一日與前懐州司馬胡杲衛尉卿吉晈前右觀武軍長史鄭據慈州刺史劉真御史盧貞永州刺史張渾及公共七人為齒㑹於履道宅詩云七人五百七十嵗秘書監狄兼謩河南尹盧貞以年未七十雖預㑹而不及列故又稱九老㑹是㑹盖有兩盧貞也夲朝洛中九老㑹蓋倣此而司馬公未七十預㑹亦用狄監盧尹故事云六年丙寅有自詠示諸家属詩云夀及七十五俸霑五十千有立春日人日詩又有詠身詩云自中風来三厯閏盧尹和公永豐坊栁詩公亦和云定知天象今春後栁宿光中添兩星按本事集云宣宗聞唱是詞問永豐所在及何人所作因東使命取兩枝植於禁中宣宗以是嵗三月即位藉曰於㑹昌為叔父且有宿憾然亦不當於授受危疑之際聞歌植栁如是其急者盧貞為尹在四年七月或只是五年春武宗在位時事以本事集指為宣宗故記之於此八月公薨贈尚書左僕射有自為墓誌銘公卒之嵗新史及墓碑所載皆同獨舊史云大中元年年七十六非也當以墓碑為定公自喪阿崔終身無子墓誌云以姪孫阿新為後又云三姪曰味道景回晦之世系表載公子景受以從子繼碑亦云大中三年景受自頴陽尉典治集賢書奉太夫人楊氏来京師命客取文刻碑按公舎其姪而以姪孫為後既不可解而所謂阿新者即景受乎則昭穆為失次不然則治命終不用耶碑云十一月葬龍門而墓誌云葬於華州下邽祔先塋也則治命亦本不於龍門賈氏談錄云四方過者必奠巵酒冡前方丈常成泥濘墓誌又云毋請太常諡毋建神道碑新史云敏中為相請諡曰文賈氏談錄云有司請賜諡上曰何不取醉吟先生墓表看卒不賜諡弟敏中奏立神道碑據此則但立碑而未嘗賜諡也新史當別有據新史又云宣宗以詩弔之今其詩見摭言略云綴玉聮珠三千首誰教㝠路作詩仙舊譜云李徳裕貶崖州公有詩三首其一云樂天嘗任蘇州日要勒須教用禮儀從此結成千萬恨這回果中白家詩六年四月徳裕貶崖而公之卒不記其月按此盖未嘗見神道碑而此詩集中無有見於漁隠叢話謂考之元和録居易年長於徳裕視徳裕為晩進徳裕為浙西觀察使居易刺蘓州徳裕以使職自居不少假借居易不得巳以軍禮見及其貶也故為詩云元和錄者世不見其書不知漁隠從何得之也徳裕以四月罷相為江陵尹其自潮貶崖盖在明年之冬公薨固巳久矣審如詩意則為幸灾快忿非青山獨往之比故穎濱蘇公力辨之以爲刻核太甚樂天不至此也盖不待考其年月而可知其偽矣况年月復甚明白舊譜何其不深考耶要之小說所載自難盡信公與徳裕本無深怨盖自元和中其父吉甫為相而牛僧孺李宗閔對䇿切直吉甫泣訴於憲宗考官坐貶而公嘗上書救之李絳與吉甫友叶而公又與絳善其後牛李與徳裕迭為相其黨亦迭為軒輊楊虞卿汝士與宗閔尤厚號黨魁而公夫人虞卿從妹矣故徳裕惡公武宗聞公名欲召以為相徳裕言居易衰病其弟敏中文詞不減居易且有器識遂以為翰林學士孫光憲北夢瑣言云劉禹錫大和中與徳裕同在東都分司禹錫謁德裕曰曽得白居易文集否徳裕曰累有相示未嘗一披今為吾子覽之既唘復巻曰吾於斯人不足久矣其文章精絶何必覽之但恐回吾之心其見抑也如此楊虞卿牛僧孺公皆宻友也其不引翼義在於斯按唐朋黨之禍始於元和之初而極於大和開成㑹昌之際三十年間士大夫無賢不肖出此必入彼未有能自脫者權位逼軋福禍伏倚大則身死家滅小亦不免萬里投荒獨公超然利害之外雖不登大位而能以名節始終惟其在朋黨之時不累於朋黨故也故元稹裴度之深仇也公雖厚於稹而亦親於晉公晉公在位公為丞郎李宗閔牛僧孺之死黨也公雖厚於僧孺而未嘗昵於宗閔僧孺當國公方自杭州求分司李紳徳裕之至交也公雖惡於徳裕而與紳唱酬往来情分極不薄公於交逰無所適莫可見於此矣然則公之論牛李自是舉諌爭之職而非以内私交其師皋慕巢厚善自是篤姻婭之好而非以徇權勢公能信於裴度李紳而不能信於徳裕何哉晉公之徳量固非公垂之比而文饒之忌刻又在公垂之上其進敏中以抑居易自以為得䇿及其失勢擠之而下石焉者乃其所謂有器識者也自古朋黨雖起於小人之傾危而成於小人之剛􅄶以文饒之才略號稱賢相而不免禍者其心未能休休有容故也然文饒雖惡公不過使之不為相而公亦卒無他禍詩云既眀且哲以保其身白公有焉嗚呼可不謂賢乎白公文集行於世者皆有年譜與集並行得以考其平生之出處嵗月之後先吴門所刋白氏長慶集首載李璜徳劭所為譜闕參政樓公稱之以属諌議李公訪求而刻焉紹定庚寅余始得其本而觀之既曰譜矣而不繫年其疎略抵捂有不可枚舉者闕攻媿號博洽不知何獨取此家居無事因取新舊史實録等書及諸家傳記所載參稽互考别為此譜自其始生之年以及考終之嵗次第審訂粗得詳確猶恨孤學謏聞未必能逃目睫之譏不敢傳之他人惟以自備觀覽而已孟夏十有二日譜成直齋陳振孫伯玉父立名按今白集錢考功本並依吴門宋刋獨無李璜譜不知何時刪去就直齋所訾可以槩見其舛謬豈特日不知有史傳即白公文集亦似從未省覽者吳本之年譜如此無怪其編次之荒唐乃爾也近世購書家但重宋本略不鑒別幸而李譜不傳陳氏駮正之書尚在設以彼易此亦將据宋刻而信之否乎顧白公以元和五年庚寅除京兆户曹六年辛夘丁母陳太君喪始歸渭村時年四十故歸田詩云四十為野夫也直齋乃以此詩係之五年且云移疾求退然陳太君以六年卒於長安宣平里第猶自京兆府申堂狀安得先一年歸渭村又香山九老不及如滿李爽及七十致仕並略有異同語詳新譜及九老圗詩後要之直齋考据精確多詳人所不能詳其他自不嫌疎略也白文公年譜跋香山居士長慶集舊刊於郡之思白堂因以一帙遺湖南林漕復書乃以陳直齋所編年譜見嘱謂有文集而無年譜不㡬於缺典乎得此喜為完書鋟梓以冠於集首亦可以訂香山之出處云端平甲午重午漢國趙善書白香山詩集年譜舊本
