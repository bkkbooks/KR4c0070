body:
  text: 白香山詩集巻三十四歙縣汪立名編後集四律詩凡九十八首從同州刺史改授太子少傅分司承華東署三分務履道西池七過春歌酒優游聊卒嵗園林蕭灑可終身留侯爵秩誠虚貴疏受生涯未苦貧月俸百千官二品朝廷雇我作閒人張良疏受並為太子少傅奉和裴令公新成午橋莊緑野堂即事舊徑開桃李新池鑿鳯皇只添丞相閣不改午橋荘逺處塵埃少閒中日月長青山為外屏緑野是前堂引水多隨勢栽松不趁行年華翫風景春事看農桑花妒謝家妓蘭偷荀令香遊絲飄酒席瀑布濺琴牀巢許終身穩蕭曹到老忙千年落公便進退處中央時裴加中書令立名按裴度本傳太和八年留守東都九年進中書令自是中官用事衣冠道䘮度以年及懸車王綱板蕩不復以出處為意東都立第於集賢里築山穿池竹木叢萃有風亭水榭梯橋架閣島嶼回環極都城之勝既又於午橋創制别墅花木萬株中起涼臺暑館名曰緑野堂引甘水貫其中釃引脈分映帶左右度視事之隟與詩人白居易劉禹錫酣宴終日髙歌放言以詩酒琴書自樂自題小草亭新結一茅茨規模儉且卑土階全壘塊山木半留皮隂合連藤架叢香近菊籬壁宜藜杖倚門稱荻簾垂窗裏風清夜檐間月好時留連嘗酒客勾引坐禪師伴宿雙棲鶴扶行一侍兒緑醅量琖飲紅稻約升炊齷齪豪家笑酸寒富室欺陶廬閒自愛顔巷陋誰知螻蟻謀深穴鷦鷯占小枝各隨其分足焉用有餘為自詠細故隨縁盡衰形具體微鬭閒僧尚鬧較瘦鶴猶肥老遣寛裁韤寒教厚絮衣馬從銜草輾雞任啄籠飛要愛天和在無令物性違自餘君莫問何是復何非新亭病後獨坐招李侍郎公垂新亭未有客竟日獨何為趁暖泥茶竈防寒夾竹籬頭風初定後眼暗欲明時淺把三分酒閒題數句詩應須置兩榻一榻待公垂閒臥寄劉同州輭褥短屏風昬昬醉臥翁鼻香茶熟後腰暖日陽中伴老琴長在迎春酒不空可憐閒氣味唯欠與君同殘酌晩餐閑傾殘酒後煖擁小爐時舞看新翻曲歌聴自作詞魚香肥潑火飯細滑流匙除却慵饞外其餘盡不知喜見劉同州夢得紫綬白髭鬚同年二老夫論心共牢落見面且歡娱酒好攜來否詩多記得無應須為春草五馬少踟蹰裴令公席上贈别夢得年老官髙多别離轉難相見轉相思雪銷酒盡梁王起便是鄒枚分散時尋春題諸家園林聞健朝朝出乘春處處尋天供閒日月人借好園林漸以狂為態都無悶到心平生身得所未省似而今又題一絶貌隨年老欲何如興遇春牽尚有餘遥見人家花便入不論貴賤與親疎家園三絶滄浪峽水子陵灘路逺江深欲去難何似家池通小院卧房階下插魚竿籬下先生時得醉甕頭吏部暫偷閒何如家醖雙魚榼雪夜花時長在前鴛鴦怕捉竟難親鸚鵡雖籠不著人何似家禽雙白鶴閒行一步亦隨身立名按雲仙襍記白氏履道里宅有池水可泛舟樂天每㑹賓客繞船以百十油囊懸酒炙沈水中隨船而行一物盡則左右又進之藏盤筵於水底也老來生計老來生計君看取白日遊行夜醉吟陶令有田唯種黍鄧家無子不留金人間榮耀因縁淺林下幽閒氣味深煩慮漸銷虛白長一年心勝一年心早春題少室東巖三十六峰晴雪銷嵐翠生月留三夜宿春引四山行逺草初含色寒禽未變聲東巖最髙石唯我有題名早春即事眼重朝眠足頭輕宿酒醒陽光滿前户雪水半中庭物變隨天氣春生逐地形北簷梅晚白東岸栁先青蔥壠抽羊角松巢墮鶴翎老來詩更拙吟罷少人聴歎春風兼贈李二十侍郎二絶樹根雪盡催花發池岸氷消放草生唯有鬚霜依舊白春風於我獨無情道場齋戒今初畢酒伴歡娱久不同不把一杯來勸我無情亦得似春風春來頻與李二賓客郭外同遊因贈長句風光引步酒開顔送老消春嵩洛間朝踏落花相伴出暮隨飛鳥一時還我為病叟誠宜退君是才臣豈合閒可惜濟時心力在放教臨水復登山二月二日二月二日新雨晴草芽菜甲一時生輕衫細馬春年少十字津頭一字行奉和令公緑野堂種花緑野堂開占物華路人指道令公家令公桃李滿天下何用堂前更種花清明日登老君閣望洛城贈韓道士風光煙火清明日歌哭悲歡城市間何事不隨東洛水誰家又葬北邙山中橋車馬長無已下渡舟航亦不閒冡墓纍纍人擾擾遼東悵望鶴飛還三月三日畫堂三月初三日絮撲窗紗燕拂簷蓮子數杯嘗冷酒柘枝一曲試春衫階臨池面勝看鏡户映花藂當下簾指㸃樓南翫新月玉鈎素手兩纖纖雨中聴琴者彈别鶴操雙鶴分離一何苦連隂雨夜不堪聞莫教遷客孀妻聴嗟歎悲啼䛏殺君酬鄭二司録與李六郎中寒食日相過同宴見贈二人並是同年偶因冷節㑹嘉賓况是平生心所親迎接須矜疏傅老祗供莫笑阮家貧杯盤狼藉宜侵夜風景闌珊欲過春相對喜歡還悵望同年只有此三人喜與楊六侍御同宿岸幘靜言明月夜匡牀閒臥落花朝二三月裏饒春睡七八年來不早朝濁水清塵難㑹合髙鵬低鷃各逍遥眼看又上青雲去更卜同衾一兩宵殘春詠懐贈楊慕巢侍郎位逾三品日太子少傅位三品年過六旬時予今年六十五不道官班下其如筋力衰猶憐好風景轉重舊親知少壯難重得歡娱且强為興來池上酌醉出袖中詩靜話開襟久閒吟放琖遲落花無限雪殘鬢幾多絲莫說傷心事春翁易酒悲閒居春盡閒泊池舟靜掩扉老身慵出客來稀愁應暮雨留教住春被殘鶯喚遣歸揭甕偷嘗新熟酒開箱試著舊生衣冬裘夏葛相催促垂老光隂速似飛春盡日天津橋醉吟呈李尹侍郎宿雨洗天津無泥未有塵初晴迎早夏落照送殘春興發詩隨口狂來酒寄身水邊行嵬峨橋上立逡巡疏傅心情老吳公政化新三川徒有主風景屬閒人池上逐涼二首青苔地上消殘暑緑樹隂前逐晩涼輕屐單衫薄紗帽淺池平岸庳藤牀簪纓怪我情何薄泉石諳君味甚長徧問交親為老計多言宜靜不宜忙窗間睡足休髙枕水畔閒來上小船櫂遣秃頭奴子撥茶教纖手侍兒煎門前便是紅塵地林外無非赤日天誰信好風清簟上更無一事但翛然香山避暑二絶六月灘聲如猛雨香山樓北暢師房夜深起凭闌干立滿耳潺湲滿面涼紗巾草履竹疎衣晩下香山蹋翠微一路涼風十八里臥乗籃轝睡中歸老夫七八年來遊洛都三分逰伴二分無風前月下花園裏處處唯殘个老夫世事勞心非富貴人生實事是歡娱誰能逐我來閒坐時共酣歌傾一壺香山下卜居老須為老計老計在抽簪山下初投足人間久息心亂藤遮石壁絶澗護雲林若要深藏處無如此處深無長物莫訝家居窄無嫌活計貧只縁無長物始得作閒人青竹單牀簟烏紗獨幅巾其餘皆稱是亦足奉吾身宿香山寺酬廣陵牛相公見寄來詩云惟羨東都白居士月明香積問禪師時牛相公三表乞退有詔不許手札八行詩一篇無由相見但依然君匡聖主方行道我事空王正坐禪支許徒思遊白月䕫龍未放下青天應須且為蒼生住猶去懸車十四年牛相公今年五十七以詩代書寄户部楊侍郎勸買東鄰王家宅勸君買取東鄰宅與我衡門相並開雲映嵩峰當户牖月和伊水入池臺林園亦要趁閒置筋力應須及健囘莫學因循白賓客欲年六十始歸來贈談客上客清談何亹亹幽人閒思自寥寥請君休說長安事厀上風清琴正調初入香山院對月太和六年秋作老住香山初到夜秋逢白月正圓時從今便是家山月試問清光知不知題龍門堰西澗東岸菊藂西岸栁栁隂烟合菊花開一條秋水琉璃色闊狹纔容小舫囘除却悠悠白少傅何人解入此中來秋霖中奉裴令公見招早出赴㑹馬上先寄六韻雨暗三秋日泥深一尺時老人平旦出自問欲何之不是尋醫藥非干送别離素書傳好語絳帳赴佳期續借桃花馬催迎楊栁姬只愁張録事罰我怪來遲嘗酒聴歌招客一甕香醪新插篘雙鬟小妓薄能謳管絃漸好新教得羅綺雖貧免外求世上貪忙不覺苦人間除醉即須愁不知此事君知否君若知時從我逰八月三日夜作露白月微明天涼景物清草頭珠顆冷樓角玉鈎生氣爽衣裳健風疎砧杵鳴夜衾香有思秋簟冷無情夢短眠頻覺宵長起暫行燭凝臨曉影蟲怨欲寒聲槿老花先盡蓮凋子始成四時無了日何用歎衰榮病中贈南鄰覓酒頭痛牙疼三日臥妻看煎藥婢來扶今朝似校擡頭語先問南鄰有酒無曉眠後寄楊户部軟綾腰褥薄綿被涼冷秋天穩暖身一覺睡眠殊有味無因寄與早朝人秋雨夜眠涼冷三秋夜安閒一老翁臥遲燈滅後睡美雨聲中灰宿温缾火香添暖被籠曉晴寒未起霜葉滿階紅喜夢得自馮翊歸洛兼呈令公上客新從左輔囘髙陽興助洛陽才已将四海聲名去又占三春風景來甲子等頭憐共老文章敵手莫相猜鄒枚未用爭詩酒且飲梁王賀喜杯齋戒滿夜戲招夢得紗籠燈下道場前白日持齋夜坐禪無復更思身外事未能全盡世間縁明朝又擬親杯酒今夕先聞理管絃方丈若能來問疾不妨兼有散花天和令公問劉賓客歸來稱意無之作水南秋一半風景未蕭條皁葢廻沙苑藍轝上洛橋閒嘗黄菊酒醉唱紫芝謡稱意那勞問請錢不早朝酬夢得窮秋夜坐即事見寄燄細燈将盡聲遥漏正長老人秋向火小女夜縫裳菊悴籬經雨萍銷水得霜今冬暖寒酒先擬共君嘗偶於維陽牛相公處覓得箏箏未到先寄詩來走筆戲荅來詩云但愁封寄去魔物或驚禪楚匠饒巧思秦箏多好音如能惠一面何啻直雙金玉柱調須品朱絃染要深㑹教魔女弄不動是禪心荅夢得秋庭獨坐見贈林梢隱映夕陽殘庭際蕭疎夜氣寒霜草欲枯蟲思急風枝未定鳥棲難容衰見鏡同惆悵身健逢杯且喜歡應是天教相暖熱一時垂老與閒官長齋月滿攜酒先與夢得對酌醉中同赴令公之宴戲贈夢得齋公前日滿三旬酒榼今朝一拂塵乘興還同訪戴客解酲仍對姓劉人病心湯沃寒灰活老面生花朽木春若怕平原怪先醉知君未慣吐車茵奉酬淮南牛相公思黯見寄二十四韻每對雙闗分敘兩意白老忘機客牛公濟世賢鷗棲心戀水鵬舉翅摩天累就優閒秩連操造化權貧司甚蕭灑榮路自喧闐望苑三千日台階十五年是人皆棄忘何物不陶甄居易三任宫寮皆分司東都於兹八載思黯出入外内凡十五年皆同平章事藍轝逰嵩嶺油幢鎮海壖竹篙撐釣艇金甲擁樓船雪夜尋僧舍春朝列妓筵長齋儼香火密宴簇花鈿自覺閑勝鬧遥知醉笑禪是非分未定㑹合杳無縁我正思楊府君應望洛川西來風嫋嫋南去鴈連連日落龍門外潮生瓜步前秋同一時盡月共兩鄉圓舊眷交歡在新文氣調全慙無白雪曲難荅碧雲篇金谷詩誰賞蕪城賦衆傳珠應哂魚目鉛未伏龍泉逺訊驚魔物深情寄酒錢霜紈一百疋玉柱十三絃思黯逺寄箏來先寄詩云但愁封寄去魔物或驚禪仍與酒資同至楚醴來尊裏秦聲一作箏送耳邊何時紅燭下相對一陶然吳祕監每有美酒獨酌獨醉但蒙詩報不以飲招輒此戲酬兼呈夢得蓬山仙客下煙霄對酒唯吟獨酌謡不怕道狂揮玉爵記云飲玉爵者弗揮亦曾乘興換金貂吴監前任散騎常侍君稱名士誇能飲王孝伯云但常無事讀離騷痛飲即可稱名士我是愚夫可見招獨酌謡云愚夫子不招賴有伯倫為醉伴何愁不解傲松喬酬夢得霜夜對月見懐淒清冬夜景揺落長年情月帶新霜色碪和逺鴈聲暖憐爐火近寒覺被衣輕枕上酬佳句詩成夢不成初冬月夜得皇甫澤州手札并詩數篇因遣報書偶題長句清泠玉韻兩三章落箔銀鈎七八行心逐報書懸鴈足夢尋來路繞羊腸水南地空多明月山北天寒足早霜履道所居在水南澤州在太行之北地也最恨潑醅新熟酒迎冬不得共君嘗雪中酒熟欲攜訪吳監先寄此詩新雪對新酒憶同傾一杯自然須訪戴不必待延枚雪賦云延枚叟陳榻無辭解袁門莫嬾開笙歌與談笑隨事自将來酬令公雪中見贈訝不與夢得同相訪雪似鵝毛飛散亂人披鶴氅立徘徊鄒生枚叟非無興唯待梁王召即來題酒甕呈夢得若無清酒兩三甕爭向白鬚千萬莖麴糵消愁真得力光隂催老苦無情凌煙閣上功無分伏火爐中藥未成更擬共君何處去且來同作醉先生附醉吟先生傳醉吟先生者㤀其姓字鄉里官爵忽忽不知吾為誰也宦逰三十載将老退居洛下所居有池五六畝竹數千竿喬木數十株臺榭舟橋具體而微先生安焉家雖貧不至寒餒年雖老未及耄性嗜酒耽琴淫詩凡酒徒琴侣詩客多與之逰逰之外棲心釋氏通學小中大乗法與嵩山僧如滿為空門友平泉客韋楚為山水友彭城劉夢得為詩友安定皇甫朗之為酒友每一相見欣然㤀歸洛城内外六七十里間凡觀寺丘墅有泉石花竹者靡不逰人家有美酒鳴琴者靡不過有圖書歌舞者靡不觀自居守洛川韋布衣家以宴逰召者亦時時往每良辰美景或雪朝月夕好事者相過必為之先拂酒罍次開詩篋酒既酣乃自授琴操宫聲弄秋思一徧若興發命家僮調法部絲竹合奏霓裳羽衣一曲若歡甚又命小妓歌楊栁枝新詞十數章放情自娱酩酊而後巳往往乗興履及隣杖於鄉騎逰都邑肩舁適野舁中置一琴一枕陶謝詩數巻舁竿左右懸雙酒壺尋水望山率情便去抱琴引酌興盡而返如此者凡十年其間日賦詩約千餘首嵗釀酒約數百斛而十年前後賦釀者不與焉妻孥弟姪慮其過也或譏之不應至於再三乃曰凡人之性鮮得中必有所偏好吾非中者也設不幸吾好利而貨殖焉以至於多藏潤屋賈禍危身柰吾何設不幸吾好博奕一擲數萬傾財破産以至於妻子凍餒柰吾何設不幸吾好藥損衣削食鍊鉛燒汞以至於無所成有所誤柰吾何今吾幸不好彼而自適於杯觴諷詠之間放則放矣庸何傷乎不猶愈於好彼三者乎此劉伯倫所以聞婦言而不聴王无功所以逰醉鄉而不還也遂率子弟入酒房環釀甕箕踞仰面長吁太息曰吾生天地間才與行不逮於古人逺矣而富於黔婁夀於顔淵飽於伯夷樂於榮啓期健於衛叔寶幸甚幸甚餘何求哉若舍吾所好何以送老因自吟詠懐詩云抱琴榮啓樂縱酒劉伶達放眼看青山任頭生白髪不知天地内更得幾年活從此到終身盡為閒日月吟罷自哂揭甕潑醅又引數杯兀然而醉既而醉復醒醒復吟吟復飲飲復醉醉吟相仍若循環然繇是得以幻夢身世浮雲富貴幕席天地瞬息百年陶陶然昬昬然不知老之将至古所謂得全於酒者故自號為醉吟先生於時開成三年先生之齒六十有七鬚盡白髪半秃齒雙缺而觴詠之興猶未衰顧謂妻子云今之前吾適矣今之後吾不自知其興何如迂叟一辭魏闕就商賓散地閒居八九春初時被目為迂叟近日蒙呼作隠人冷暖俗情諳世路是非閒論任交親應須繩墨機闗外安置疎愚鈍滯身洛下閒居寄山南令狐相公已收身向園林下猶寄名於禄仕間不鍛嵇康彌嬾靜無金疏傅更貧閒支分門内餘生計謝絶朝中舊往還唯是相君㤀未得時思漢水夢巴山惜春贈李尹春色有時盡公門終日忙兩衙但不闕一醉亦何妨芳樹花團雪衰翁鬢撲霜知君倚年少未苦惜風光對酒勸令公開春逰宴時泰嵗豐無事日功成名遂自由身前頭更有㤀憂日向上應無快活人自去年來多事故從今日去少交親宜須數數謀歡㑹好作開成第二春與夢得偶同到敦詩宅感而題壁山東纔副蒼生願漢書云山東出相川上俄驚逝水波履道淒涼新第宅敦詩宅在履道修造初成宣城零落舊笙歌崔家妓樂多歸宣州也園荒唯有薪堪采門冷兼無雀可羅今日相逢一作隨偶同到傷心不是故經過楊六尚書新授東川節度使代妻戲賀兄嫂二絶劉綱與婦共升仙弄玉隨夫亦上天何似沙哥領崔嫂碧油幢引向東川金花銀椀饒君用罨畫羅衣盡一作任嫂裁覓一作嫁得黔婁為妹壻可能空寄蜀茶來立名按楊汝士字慕巢小字沙哥開成中以尚書出鎮東川時族昆弟嗣復鎮西川對擁旄節世榮其門公即尚書妹壻也閒逰即事郊野逰行熟邨園次第過驀山尋浥澗蹋水渡伊河寒食青青草春風瑟瑟波逢人共杯酒隨馬有笙歌勝事經非少芳辰過亦多還須自知分不老擬如何六十六七十欠四嵗此生那足論每因悲物故還且喜身存安得頭長黒爭教眼不昬交逰成拱木婢僕見曽孫痩覺腰金重衰憐鬢雪緐将何理老病應付與空門池上早春即事招夢得老更驚年改閒先覺日長晴熏榆莢黒春染栁梢黄雲破山呈色氷融水放光低平穩船舫輕暖好衣裳白角三升榼紅茵六尺牀偶逰難得伴獨醉不成狂我有中心樂君無外事忙經過莫慵嬾相去兩三坊因夢得題公垂所寄蠟燭因寄公垂照梁初日光相似出水新蓮豔不如却寄兩條君領取明年雙引入中書宰相入朝舉雙燭餘官各一令公南莊花栁正盛欲偷一賞先寄二篇最憶樓花千萬朶偏憐隄栁兩三株擬提社酒攜邨妓擅入朱門莫怪無映樓桃花拂堤垂栁荘上最勝絶處故舉以為對可惜亭臺閒度日欲偷風景暫逰春只愁花裏鶯饒舌飛入宫城報主人春夜宴席上戲贈裴淄州九十不衰真地仙裴年九十不衰羸六旬猶健亦天憐予自謂也今年相遇鶯花月此夜同歡歌酒筵四座齊聲和絲竹兩家隨分鬭金鈿留君到曉無他意圖向君前作少年贈夢得年顔老少與君同眼未全昬耳未聾放醉臥為春日伴趁歡行入少年叢尋花借馬煩川守弄水偷船惱令公聞道洛城人盡怪呼為劉白二狂翁晩春欲攜酒尋沈四著作先以六韻寄之病容衰慘澹芳景晩蹉跎無計留春得爭能柰老何篇章慵報荅杯讌喜經過顧我酒狂久負君詩債多沈前後惠詩十餘首春來多醉竟未酬荅今故云爾敢辭攜緑蟻只願見青蛾最憶陽闗唱真珠一串歌沈有謳者善唱西出陽闗無故人詞三月三日祓禊洛濵并序逰才調集作祓禊日于斗門亭開成二年三月三日河南尹李待價珏以人和嵗稔将禊於洛濱前一日啓留守裴令公令公明日召太子少傅白居易太子賓客蕭籍李仍叔劉禹錫前中書舍人鄭居中國子司業裴惲河南少尹李道樞倉部郎中崔晉司封員外郎張可績駕部員外郎盧言虞部員外郎苗愔和州刺史裴儔淄州刺史裴洽檢校禮部員外郎楊魯士四門博士談𢎞謩等一十五人合宴於舟中由斗亭厯魏堤抵津橋登臨泝㳂自晨及暮簪組交映歌笑間發前水嬉而後妓樂左筆研而右壺觴望之若仙觀者如堵盡風光之賞極逰泛之娛美景良辰賞心樂事盡得於今日矣若不記録謂洛無人晉公首賦一章鏗然玉振顧謂四座繼而和之居易舉酒抽毫奉十二韻以獻座上作三月草萋萋黄鶯歇又啼栁橋晴有絮沙路潤無泥禊事修初畢逰人到欲齊金鈿耀桃李絲管駭鳬鷖轉岸廻船尾臨流簇馬蹄鬧翻揚子渡蹋破魏王堤妓接謝公宴詩陪荀令題舟同李膺泛醴為穆生攜水引春心蕩花牽醉眼迷塵街從鼓動煙樹任鴉棲舞急紅腰軟一作凝歌遲翠黛低夜歸何用燭新月鳯樓西同夢得暮春寄賀東西川二楊尚書龍節對持真可愛鴈行相接更堪誇兩川風景同三月千里江山屬一家魯衛定知聮氣色潘楊亦覺有光華予與二公皆忝姻戚應憐洛下分司伴冷宴閒逰老看花立名按晁氏法藏碎金云樂天進退以義風流髙爽與禹錫逰人謂之劉白而不陷入司馬黨與元稹逰人謂之元白而不陷北司黨又與楊虞卿為姻家而不陷牛李黨又葉少藴云樂天與虞卿為姻家而不累於楊與微之僧孺相厚善而不黨於元牛為裴晉公所愛重而不因晉公以進與李文饒素不樂而不為文饒所深害者處世如是人亦足矣推其所由得惟不汲汲於進而志在於退是以能安於去就愛憎之際每裕然有餘也喜小樓西新栁抽條一行弱栁前年種數尺柔條今日新漸欲拂他騎馬客未多遮得上樓人須教碧玉羞睂黛莫與紅桃作麴塵為報金堤千萬樹饒伊未敢苦爭春晩春酒醒尋夢得料合同惆悵花殘酒亦殘醉心㤀老易醒眼别春難獨出雖慵嬾相逢定喜歡還攜小蠻去試覓老劉看小蠻酒榼名也感事服氣崔常侍晦叔燒丹鄭舍人居中常期生羽翼那忽化灰塵每遇淒涼事還思潦倒身唯知趁杯酒不解鍊金銀睡適三尸性慵安五藏神無憂亦無喜六十六年春和裴令公南莊絶句裴云野人不識中書令喚作陶家與謝家陶廬僻陋那堪比謝墅幽微不足攀何似嵩峰三十六長隨申甫作家山宅西有流水牆下構小樓臨翫之時頗有幽趣因命歌酒聊以自娱獨醉獨吟偶題五絶句伊水分來不自由無人解愛為誰流家家抛向牆根底唯我栽蓮起小樓水色波文何所似麴塵羅帶一條斜莫言羅帶春無主自置樓來屬白家日灎水光揺素壁風飄樹影拂朱闌皆言此處宜絃管試奏霓裳一曲看霓裳試罷唱梁州紅袖斜翻翠黛愁應是遥聞勝近聴行人欲過盡回頭獨醉還須得歌舞自娛何必要親賓當時一部清商樂亦不長将樂外人偶作藍輿出即㤀歸舍柴户昬猶未掩闗聞客病時慙體健見人忙處覺心閒清涼秋寺行香去和暖春城拜表還木雁一篇須記取致身才與不才間同夢得酬牛相公初到洛中小飲見贈時牛相公初罷揚州節度就拜東都留守淮南揮手抛紅斾洛下回頭向白雲政事堂中老丞相制科場裏舊将軍宫城煙月饒全占關塞風光請半分詩酒放狂猶得在莫欺白叟與劉君幽居早秋閒詠幽僻囂塵外清涼水木間臥風秋拂簟步月夜開闗且得身安泰從他世險艱但休爭要路不必入深山軒鶴留何用泉魚放不還誰人知此味臨老十年閒和令狐僕射小飲聴阮咸掩抑復淒清非琴不是箏還彈樂府曲别占阮家名古調何人識初聞滿座驚落盤珠厯厯揺珮玉琤琤似勸杯中物如含林下情時移音律改豈是昔時聲燒藥不成命酒獨醉白髪逢秋王去聲丹砂見火空不能留姹女爭免作衰翁賴有杯中緑能為面上紅少年心不逺只在半酣中立名按丹陽集韓退之作李干墓志云余不知服食之説自何起殺人不可計而其尚之益至臨死乃悔而退之乃躬自蹈之以至於死白樂天所謂退之服硫黄一病訖不痊是也陳後山作嗟哉行云張生服石奴下潦上乾如渴烏韓子作志還自屠白笑未竟人復吁蓋為此也然樂天與刑部李侍郎詩金丹同學都無益姹女丹砂燒即飛則樂天深知服食之無驗其肯以身試藥以自斃乎則白笑未竟人復吁之句末必然爾送盧郎中赴河東裵令公幕别時暮雨洛橋岸到日涼風汾水波荀令見君應問我為言秋草閉門多送李滁州君於覺路深留意我亦禪門薄致功未悟病時須去病已知空後莫依空白衣臥疾嵩山下皁蓋行春楚水東誰道三年千里别兩心同在道場中長齋月滿寄思黯一日不見如三月一月相思如七年似隔山河千里地仍當風雨九秋天明朝齋滿相尋去挈榼抱衾同醉眠冬夜對酒寄皇甫十霜殺中庭草氷生後院池有風空動樹無葉可辭枝十月苦長夜百年强半時新開一缾酒那得不相思嵗除夜對酒衰翁嵗除夜對酒思悠然草白經霜地雲黄欲雪天醉依香枕坐慵傍暖爐眠洛下閒來久明朝是十年白香山詩集巻三十四
