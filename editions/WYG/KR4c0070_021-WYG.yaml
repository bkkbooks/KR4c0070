body:
  text: 白香山詩集巻二十一歙縣汪立名編後集一格詩凡八十九首立名按唐人詩集中無號格詩者即大厯以還有齊梁格元白格元和格葫蘆轆轤進退諸格多兼律詩而言不專主古體也顧格詩之義雖亡考而見諸公之文章者可證元少尹集序宗簡河南人自舉進士厯御史府尚書郎訖京亞尹二十年著格詩若干首律詩若干首賦述銘記等若干首合三十巻由是觀之格者但别於律詩之謂公前集既分古調樂府歌行以類各次於諷諭閒適感傷之巻後集不復分類别巻遂統稱之曰格詩耳時本於十一巻之首格詩下復繫歌行雜體字是以格詩另為古詩之一體矣豈元少尹生平獨不為歌行雜體乎况公後序但曰邇来復有格律詩洛中集記亦曰分司東都及兹十二年其間賦格律詩凡八百首初未嘗及歌行雜體者固以格字該舉之也又時本三十六巻首作半格詩附律詩半者本謂巻内半是格詩而附以律詩云爾乃直標半格詩而注附律詩於其旁是又將以半格詩另為一體矣其誤不幾於眇者之捫燭揣籥以為日乎今後集既别格律詩次巻巻首但標格詩律詩不復承譌以留疑案後集凡十七巻首巻即各各本之二十一巻也胡氏丁籖自此巻以下皆作後集本雖巻第相次而並列後序於此巻且編例與前集二十巻判然不同既格律分巻復前後互間不可据依今編一巻至五巻並格詩六巻至十七巻並律詩而畧為詮訂其失次者按後集起長慶三年春即到杭州之明年故杭州詩半在律巻獨古詩則首蘇州旬假命宴一首不及杭州作此蓋删并時誤簡前集巻尾也今並歸入或曰元序成於長慶四年十月而公自序乃曰訖二年冬似相牴牾不知古人詩文必反覆勘定然後成集豈朝脱槀而夕就編者耶况公以四年夏自杭州召還除庶子分司東都使長慶集訖於四年冬則除官赴闕留别西湖諸律詩何以舊編後集而不入前集乎公自記有續後集五巻讀書志云亡失三巻書録解題云亡失四巻要皆兼詩文而言則所闕之巻其為詩為文並不可考鹽官胡氏直謂續後集詩止一巻近於宋本錄附各體後然續後集者公晩年最後之詩若胡氏所錄如送劉郎中刺蘇州在太和五年不盡是續集詩而㑹昌末年諸作又巳收後集蓋巻次刪并其舊自不可復尋姑以集中逸詩錄諸補遺而未敢据疑似之説以分之也郡齋暇日辱常州陳郎中使君早春晩坐水西館書事詩十六韻見寄亦以十六韻酬之新年多暇日晏起褰簾坐睡足心更慵日髙頭未裹徐傾下藥酒稍爇煎茶火誰伴寂寥身無絃琴在左遥思毘陵館春深物嫋娜波拂黄栁梢風揺白梅朶衙門排曉㦸鈴閣開朝鎻太守水西来朱衣垂素舸良辰不易得佳㑹無由果五馬正相望雙魚忽前墮魚中獲瑰寳持玩何磊砢一百六十言字字靈珠顆上申心欵曲下叙時轗軻才富不如君道孤還似我敢辭官逺慢且貴身安妥勿復問榮枯𡨕心無不可官舎髙樹換新葉隂隂覆地隅何言太守宅有似幽人居太守卧其下閑慵兩有餘起嘗一甌茗行讀一巻書早梅結青實殘櫻落紅珠穉女弄庭果嬉戲牽人裾是日晩彌静巢禽下相呼嘖嘖護兒鵲啞啞母子烏豈惟云鳥爾吾亦引吾雛吾雛吾雛字阿羅阿羅纔七齡嗟吾不才子憐爾無弟兄撫養雖驕騃性識頗聰明學母畫眉様效吾詠詩聲我齒今欲墮汝齒昨始生我頭髪盡落汝頂髻初成老幼不相待父衰汝孩嬰緬想古人心慈愛亦不輕蔡邕念文姬于公歎緹縈敢求得汝力但未忘父情題小橋前新竹招客鴈齒小紅橋垂檐低白屋橋前何所有苒苒新生竹皮開坼褐錦節露抽青玉筠翠如可餐粉霜不忍觸閑吟聲未巳幽翫心難足管領好風煙輕欺凡草木誰能有月夜伴我林中宿為君傾一杯狂歌竹枝曲病中逢秋招客夜酌不見詩酒客卧来半月餘合和新藥草尋檢舊方書晩霽煙景度早凉窗户虚雪生衰鬢久秋入病心初卧簟蘄竹冷風襟邛葛疎夜来身較健小飲復何如醉歌示妓人商玲瓏罷胡琴掩秦瑟玲瓏再拜歌初畢誰道使君不解歌聴唱黄雞與白日黄雞催曉丑時鳴白日催年酉時沒腰間紅綬繫未穩鏡裏朱顔㸔巳失玲瓏玲瓏柰老何使君歌了汝更歌立名按堯山堂外紀云玲瓏餘杭歌者樂天作郡日賦歌與之時微之在越州聞之厚幣邀去月餘始遣還贈之詩兼寄樂天云休遣玲瓏唱我詞我詞多是寄君詩明朝又向江頭别月落潮平是去時按公霓裳羽衣歌云移領錢唐第二年始有心情問絲竹玲瓏箜篌謝好筝陳寵觱栗沈平笙是此詩亦作於長慶三年各本誤入前集今改正席上答微之我住浙江西君去浙江東勿言一水隔便與千里同富貴無人勸君酒今宵為我盡杯中蘇州李中丞以元日郡齋感懐詩寄微之及予輙依來篇七言八韻走筆奉答兼呈微之白首餘杭白太守落魄抛名來巳久一辭渭北故園春再把江南新嵗酒杯前笑歌徒勉强鏡裏形容漸衰朽領郡慙當潦倒年鄰州喜得平生友長洲草接松江岸曲水花連鏡湖口老去還能痛飲無春來曽作閒逰否憑鶯傳語報李六倩鴈將書與元九莫嗟一日日催人且貴一年年入手食飽食飽拂枕卧睡足起閒吟淺酌一杯酒緩彈數聲一作弄琴既可暢情性亦足傲光隂誰知名利盡無復長安心嚴十八郎中在郡日改制東南樓因名清輝未立標榜徴歸郎署予既到郡性愛樓居宴逰其間頗有幽致聊成十韻兼戲寄嚴嚴郎制兹樓立名曰清輝未及署花榜遽徴還粉闈去來三四年塵土登者稀今春新太守灑埽施簾幃院栁煙婀娜檐花雪霏微㸔山倚前户待月闢東扉碧窓戞瑶瑟朱欄飄舞衣燒香巻幕坐風燕雙雙飛君作不得住我來幸因依始知天地間靈境有所歸南亭對酒送春含桃實已落紅薇花尚薫冉冉三月盡晩鶯城上聞獨持一杯酒南亭送殘春半酣忽長歌歌中何所云云我五十餘未是苦老人刺史二千石亦不為賤貧天下三品官多老於我身同年登第者零落無一分親故半為鬼僮僕多見孫念此聊自解逢酒且歡欣翫新庭樹因詠所懐靄靄四月初新樹葉成隂動揺風景麗蓋覆庭院深下有無事人竟日此幽尋豈惟翫時物亦可開煩襟時與道人語或聼詩客吟度春足芳色入夜多鳴禽偶得幽閒境遂忘塵俗心始知真隱者不必在山林仲夏齋戒月仲夏齋戒月三旬斷腥羶自覺心骨爽行起身翩翩始知絶粒人四體更輕便初能脱病患久必成神仙禦冦馭冷風赤松游紫煙常疑此説謬今乃知其然我年過半百氣衰神不全已垂兩鬢絲難補三丹田但減葷血味稍結清浄縁脱巾且修養聊以終天年除官去未間除官去未間半月恣逰討朝尋霞外寺暮宿波上島新樹少於松平湖半連草躋攀有次第賞翫無昏早有時騎馬醉兀兀𡨕天造窮通與生死其柰吾懐抱江山信為美齒髪行將老在郡誠未厭歸鄉去亦好三年為刺史二首三年為刺史無政在人口惟向郡城中題詩十餘首慙非甘棠詠豈有思人不三年為刺史飲氷復食檗惟向天竺山取得兩片石此抵有千金無乃傷清白别萱桂使君竟不住萱桂徒栽種桂有留人名萱無忘憂用不如江畔月步步來相送自餘杭歸宿淮口作為郡已多暇猶少勤吏職罷郡更安閒無所勞心力舟行明月下夜泊清淮北豈止吾一身舉家同燕息三年請禄俸頗有餘衣食乃至僮僕間皆無凍餒色行行弄雲水步步近鄉國妻子在我前琴書在我側此外吾不知於焉心自得舟中李山人訪宿日暮舟悄悄煙生水沈沈何以延宿客夜酒與秋琴來客道門子來自嵩髙岑軒軒舉雲貌豁豁開清襟得意言語斷入𤣥滋味深黙然相顧哂心適而忘心洛下卜居三年典郡歸所得非金帛天竺石兩片華亭鶴一隻飲啄供稻粱包裹用茵席誠知是勞費其柰心愛惜逺從餘杭郭同到洛陽陌下擔拂雲根開籠展霜翮貞姿不可雜髙性宜其適遂就無塵坊仍求有水宅東南得幽境樹老寒泉碧池畔多竹隂門前少人迹未請中庶禄且脱雙驂易買履道宅價不足因以兩馬償之豈獨為身謀安吾鶴與石洛中偶作自此後在東都作五年職翰林四年涖潯陽一年巴郡守半年南宮郎二年直綸閣三年刺史堂凡此十五載有詩千餘章境興周萬象土風備四方獨無洛中作能不心悢悢今為春官長始來逰此鄉徘徊伊澗上睥睨嵩少旁遇物輙一詠一詠傾一觴筆下成釋憾巻中同補亡往往顧自哂眼昏鬢蒼蒼不知老將至猶自放詩狂贈蘇少府籍甚二十年今日方欵顔相送嵩洛下論心杯酒間何為一作河亞嬾出入府寮多閉關蒼髪彼此老白日尋常閒朝欲擕手出暮思聨騎還何當挈一榼同宿龍門山移家入新宅移家入新宅罷郡有餘貲既可避燥濕復免憂寒飢疾平未還假官閒得分司幸有禄俸在而無職役覊清旦盥漱畢開軒巻簾幃家人及雞犬隨我亦熈熈取興不過一作或寄酒放情或作一作不過詩何必苦修道此即是無為外累信已遣中懐時有思有思一何逺黙坐低雙眉十載囚竄客萬里征戍兒春朝鏁籠鳥冬夜支牀龜驛馬走四蹄痛酸無歇期磑牛封兩目昏閉何人知誰能脫放去四散任所之各得適其性如吾今日時琴置琴曲几上慵坐但含情何煩故揮弄風絃自有聲鶴人各有所好物固無常宜誰謂爾能舞不如閑立時自詠夜鏡隱白髪朝酒發紅顔可憐假年少自笑湏臾間朱砂賤如土不解燒為丹𤣥鬢化為雪未聞休得官咄哉箇丈夫心性何墮頑但遇詩與酒便忘寢與餐髙聲發一吟似得詩中仙引滿飲一琖盡忘身外縁昔有醉先生席地而幕天于今居處在許我當中眠眠罷又一酌酌罷又一篇回靣顧妻子生計方落然誠知此事非又過知非年豈不欲自改改即心不安且向安處去其餘皆老閒林下閒歩寄皇甫庶子扶杖起病初策馬力未任既嬾出門去亦無客來尋以此遂成閒閒步繞園林天曉煙景澹樹寒鳥雀深一酌池上酒數聲竹間吟寄言東曹長當知幽獨心晏起鳥鳴庭樹上日照屋檐時老去慵轉極寒來起尤遲厚薄被適性髙低枕得宜神安體穩暖此味何人知睡足仰頭坐兀然無所思如未鑿七竅若都遺四肢緬想長安客早朝霜滿衣彼此各自適不知誰是非池畔二首結構池西廊疏理池東樹此意人不知欲為待月處持刀􅜩宻竹竹少風來多此意人不㑹欲令池有波春葺新居江州司馬日忠州刺史時栽松滿後院種栁䕃前墀彼皆非吾土栽種尚忘疲况兹是我宅葺藝固其宜平旦領僕使乗春親指揮移花夾暖室徙竹覆寒池池水變緑色池芳動清輝尋芳弄水坐盡日心熈熈一物苟可適萬縁都若遺設如宅門外有事吾不知贈言捧籯獻千金彼金何足道臨觴贈一言此言真可寳流光我巳晩適意君不早况君春風面柔促如芳草二十方長成三十向衰老鏡中桃李色不得十年好胡為坐脈脈不肯傾懐抱泛春池白蘋湘渚曲緑篠剡溪口各在天一涯信美非吾有如何此庭内水竹交左右霜竹百千竿煙波六七畆泓澄動階砌澹泞映户牖蛇皮細有紋鏡面清無垢主人過橋來雙童扶一叟恐汚清泠波塵纓先抖擻波上一葉舟舟中一尊酒酒開舟不繫去去隨所偶或繞蒲浦前或泊桃島後未撥落杯花低衝拂面栁半酣迷所在倚榜兀回首不知此何處復是人寰否誰知始疏鑿幾主相傳受楊家去云逺田氏將非久天與愛水人終焉落吾手此池始楊常侍開鑿中間田氏為主予今有之蒲浦桃島皆池上所有郡齋旬假始命宴呈座客示郡寮自此後在蘇州作公門日兩衙公假月三旬衙用決簿領旬以㑹親賔公多及私少勞逸常不均况為劇郡長安得閒宴頻下車巳二月開筵始今晨初黔軍㕑突一拂郡榻塵既備獻酬禮亦具水陸珍萍醅箬溪醑水膾松江鱗侑食樂懸動佐歡妓席陳風流吳中客佳麗江南人歌節㸃隨袂舞香遺在茵清奏凝未闋酡顔氣已春一作朱顔酡巳春衆賔勿遽起郡寮且逡廵無輕一日醉用犒九日勤微彼九日勤何以治吾民微此一日醉何以樂吾身附吳郡詩石記貞元初韋應物為蘇州牧房孺復為杭州牧皆豪人也韋嗜酒每與賔友一醉一詠其風流雅韻多播於吳中或目韋房為詩酒仙時予始年十四五旅二郡以幼賤不得與逰宴尤覺其才調髙而郡守尊以當時心言異日蘇杭苟獲一郡足矣及今自中書舍人間領二州去年脱杭印今年佩蘇印既醉於彼又吟於此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始願及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髪非又可嗟矣韋在此州歌詩甚多有郡宴詩云兵衛森畫㦸燕寢凝清香最為警䇿今刻此篇於石傳貽將來因以予旬宴一章亦附於後雖雅俗不類各詠一時之志偶書石背且償其初心焉寳厯元年七月二十日蘇州刺史白居易題題西亭朝亦視簿書暮亦視簿書簿書視未竟蟋蟀鳴坐隅始覺芳嵗晩復嗟塵務拘西園景多暇可以少躊躇池鳥澹容與橋栁髙扶疎煙蔓嫋青薜水花披白蕖何人造兹亭華敞綽有餘四檐軒鳥翅複屋羅蜘蛛直廊扺曲房􅌄窱深且虚修竹夾左右清風來徐徐此宜宴嘉賔鼓瑟吹笙竽荒滛即不可廢曠將何如幸有酒與樂及時歡且娱忽其解郡印他人來此居郡中西園閒園多芳草春夏香靡靡深樹足佳禽旦暮鳴不巳院門閉松竹庭徑穿蘭芷愛彼池上橋獨來聊徙倚魚依藻長樂鷗見人暫起有時舟隨風盡日蓮照水誰知郡府内景物閑如此始悟諠静縁何嘗繫逺邇北亭卧樹緑晩隂合池凉朝氣清蓮開有佳色鶴唳無凡聲惟此閒寂境愜我幽獨情病假十五日十日卧兹亭明朝吏呼起還復視黎甿一葉落煩暑欎未退涼飇潛已起寒温與盛衰遞相為表裏蕭蕭秋林下一葉忽先委勿言一葉微揺落從此始崔湖州贈紅石琴薦煥如錦文無以答之以詩酬謝赬錦支緑綺韻同相感深千年古澗石八月秋堂琴引出山水思助我金玉音人間無可比比我與君心九日宴集醉題郡樓兼呈周殷二判官前年九日在餘杭今本作餘杭郡呼賓命宴虚白堂去年九日到東洛今年九日來吳鄉兩邊蓬鬢一時白三處菊花同色黄一日日知添老病一作態一年年覺惜重陽江南九月未揺落栁青蒲緑稻穟香姑蘇臺榭倚蒼靄太湖山水含清光可憐假日好天色公門吏静風景涼榜舟鞭馬取賔客掃樓拂席排壺觴胡琴錚鏦指撥刺吳娃美麗一作吳娃細麗眉眼長笙歌一曲思凝絶金鈿再拜光低昻日脚欲落備燈燭風頭漸髙加酒漿觥琖艷翻菡萏葉舞鬟擺落茱萸房半酣憑檻起四顧七堰八門六十坊逺近髙低寺間出東西南北橋相望水道脈分棹鱗次里閭棊布城冊方人煙樹色無隙罅十里一片青茫茫自問有何才與政髙㕔大館居中央銅魚今乃澤國節刺史是古吳都王郊無戎馬郡無事門有棨㦸腰有章盛時儻來合慙媿壯嵗忽去還感傷從事醒歸應不可使君醉倒亦何妨請君停杯聼我語此語真實非虛狂五旬已過不為夭七十為期蓋是常須知菊酒登髙㑹從此多無二十場同微之贈别郭虚舟錬師五十韻我為江司馬君為荆判司俱當愁悴日始識虚舟師師年三十餘白晳好容儀專心在鉛汞餘力工琴棊静彈絃數聲閒飲酒一巵因指塵土下蜉蝣良可悲不聞姑射上千嵗氷雪肌不見遼城外古今冡纍纍嗟我天地間有術人莫知得可逃死籍不唯走三尸授我參同契其辭妙且微六一閟扄鐍子午守雄雌我讀隨日悟心中了無疑黄芽與紫車謂其坐致之自負因自歎人生號男兒若不佩金印即合翳玉芝髙謝人間世深結山中期泥壇方合矩鑄鼎員中規鑪槖一以動瑞氣紅輝輝齋心獨歎拜中夜偷一窺二物正訢合厥狀何怪奇綢繆夫婦體狎獵魚龍姿簡寂館鐘後紫霄峯曉時心塵未浄潔火候遂參差萬壽覬刀圭千功失毫釐先生彈指起姹女隨煙飛始知縁㑹間隂隲不可移藥竈今夕罷詔書明日追追我復追君次第承恩私官雖小大殊同立白玉墀我直紫微闥手進賞罰詞君侍玉皇座口含生殺機直躬易媒孽浮俗多瑕疵轉徙今安在越嶠吳江湄一提支郡印一建連帥旗何言四百里不見如天涯秋風旦夕來白日西南馳雪霜各滿鬢朱紫徒為衣師從廬山洞訪舊來於斯尋君又覓我風馭紛逶迤帔裾曵黄絹鬚髪垂青絲逢人但斂手問道亦頷頤孤雲難久留十日告將歸欵曲話平昔殷勤勉衰羸後㑹杳何許前心日磷緇俗家無異物何以充别資素牋一百句題附元家詩朱頂鶴一隻與師雲間騎雲間鶴背上故情若相思時時摘一句唱作步虚詞霓裳羽衣舞歌和微之按今本無舞字我昔元和侍憲皇曽陪内宴宴昭陽千歌萬舞一作百武不可數就中最愛霓裳舞舞時寒食春風天玉鈎欄下香案前案前舞者顔如玉不著人家俗衣服虹裳霞帔步揺冠鈿瓔纍纍佩珊珊娉婷似不任羅綺顧聼樂懸行復止磬簫筝笛遞相攙擊擫彈吹聲邐迤凡法曲之初衆樂不齊惟金石絲竹次第發聲霓裳序初亦復如此散序六奏未動衣陽臺宿雲慵不飛散序六徧無拍故不舞也中序擘騞初入拍秋竹竿裂春氷圻中序始有拍亦名拍序飄然轉旋迴雪輕嫣然縱送游龍驚小垂手後栁無力斜曵裾時雲欲生四句皆霓裳舞之初態煙蛾斂畧不勝態風袖低昻如有情上元㸃鬟招蕚緑王母揮袂别飛瓊許飛瓊蕚緑華皆女仙也繁音急節十二徧跳珠撼玉何鏗錚霓裳曲十二徧而終翔鸞舞了却收翅唳鶴曲終長引聲凡曲将畢皆聲拍促速唯霓裳之末長引一聲也當時乍見驚心目凝視諦聼殊未足一落人間八九年耳冷不曽聞此曲湓城但聽山魈語巴峽惟聞杜鵑哭予自江州司馬轉忠州刺史移領錢唐第二年始有心情問絲竹玲瓏箜篌謝好筝陳寵觱栗沈平笙清絃脆管纎纎手教得霓裳一曲成自玲瓏已下皆杭之妓名虚白亭前湖水畔前後祇應三度按便除庶子抛却來聞道如今各星散今年五月至蘇州朝鐘暮角催白頭貪㸔案牘常侵夜不聽笙歌直到秋秋來無事多閒悶忽憶霓裳無處問聞君部内多樂徒問有霓裳舞者無答云七縣十萬户無人知有霓裳舞唯寄長歌與我來題作霓裳羽衣譜四幅花牋碧間紅霓裳實録在其中千姿萬狀分明見恰與昭陽舞者同眼前髣髴覩形質昔日今朝想如一疑從魂夢呼召來似著丹青圖寫出我愛霓裳君合知發於歌詠形於詩君不見我歌云驚破霓裳羽衣曲長恨歌云又不見我詩云曲愛霓裳未拍時錢塘詩云由來能事皆有主楊氏創聲君造譜開元中西涼府節度楊敬述造君言此舞難得人須是傾城可憐女吳妖小玉飛作煙夫差女小玉死後形見於王其母抱之霏微若煙霧散空越艶西施化為土嬌花巧笑久寂寥娃館苧蘿空處所如君所言誠有是君試從容聽我語若求國色始翻傳但恐人間廢此舞妍蚩優劣寧相逺大都只在人擡舉李娟張態君莫嫌亦擬隨宜且教取娟態蘇妓之名立名按夢溪筆談葉法善引明皇入月宮聞仙樂及上歸但記其半遂於笛中寫之㑹西涼府都督楊敬述進婆羅門曲與其聲調相符遂以月中所聞為散序用敬述所進為其腔而名霓裳羽衣曲其説出鄭嵎津陽門詩注與公自注不同又蒲州逍遥樓楯上有唐人横書類梵字相傳是霓裳譜字訓不通莫知是非或謂今燕部有獻仙音曲乃其遺聲然霓裳本謂之道調法曲今獻仙音乃小石調耳未知孰是韻語陽秋霓裳羽衣舞始於開元盛於天寳今寂不傳矣賴有白詩可見一二爾虹裳二句言所飾之服也散序二句及繁音二句言所奏之曲也而唐㑹要謂破陣樂赤白桃李花望瀛霓裳羽衣總名法曲今世所傳望瀛亦十二徧散序無拍曲終亦長引聲若樂奏望瀛亦可髣髴其遺意云小童薛陽陶吹觱栗歌和浙西李大夫作剪削乾蘆挿寒竹九孔漏聲五音足近來吹者誰得名關璀老死李衮生衮今又老誰其嗣薛氏樂童年十二指㸃之下師授聲含嚼之間天與氣潤州城髙霜月明吟霜思月欲發聲山頭江一作水底何悄悄猿聲不喘魚龍聽翕然聲作疑管裂詘然聲盡疑刀截有時婉一作脆軟無筋骨有時頓挫生稜節急聲員轉促不斷轢轢轔轔似珠貫緩聲展引長有條有條直直如筆描下聲乍墜石沈重髙聲忽舉雲飄蕭明旦公堂陳宴席主人命樂娛賔客一作僚碎絲細竹徒紛紛宫調一聲雄出羣衆音覼縷不落道有如部伍隨將軍嗟爾陽陶方穉齒下手發聲巳如此若教頭白吹不休但恐聲名壓關李立名按李徳裕有霜夜對月聽小童陽陶吹觱栗歌羅隱詩平泉上相東征日曽為陽陶吹觱栗吳江太守㑹稽侯相次三篇皆俊逸太守謂公㑹稽侯謂元也然元相集中巳失此詩桂苑叢談云咸通中姑藏公自梁移鎮淮海郡寡勝逰之地且風亭月觀既巳荒凉於戲馬臺連玉鈎道開剏池沼建亭臺既畢號曰賞心有浙右小校薛陽陶監押度支運米入城公喜其姓名試詢之果是舊人及問往日蘆管之事有朱崖陸暢元白所撰歌篇一軸公益喜之以蘆管奏於兹亭其管絶微每一觱栗管中常容三管聲聲如天際自然來云啄木曲按才調集文苑英華並作四不如酒莫買寳剪刀虚費千金直我有心中愁知君剪不得莫磨解結錐虚勞人氣力我有腸中結知君解不得莫染紅絲線徒誇好顔色我有雙淚珠知君穿不得莫近紅爐火炎氣徒相逼我有兩鬢霜知君消不得刀不能剪心愁錐不能解腸結線不能穿淚珠火不能消鬢雪不如飲此神聖杯萬念千憂一時歇題靈巖寺寺即吳館娃宫鳴屧廊硯池采香徑遺迹在焉娃宫屧廊尋已傾硯池香徑又欲平二三月時但草緑幾百年來空月明使君雖老頗多思􅂝觴領妓處處行今愁古恨入絲竹一曲涼州無限情直自當時到今日中間歌吹更無聲雙石蒼然兩片石厥狀怪且醜俗用無所堪時人嫌不取結從胚渾始得自洞庭口萬古遺水濱一朝入吾手擔舁來郡内洗刷去泥垢孔黒煙痕深罅青苔色厚老蛟蟠作足古劍挿為首忽疑天上落不似人間有一可支吾琴一可貯吾酒峭絕髙數尺坳泓容一斗五絃倚其左一杯置其右窪樽酌未空玉山頽巳久人皆有所好物各求其偶漸恐少年塲不容垂白叟迴頭問雙石能伴老夫否石雖不能言許我為三友宿東亭曉興温温土爐火耿耿紗籠燭獨抱一張琴夜入東齋宿窗聲度殘漏簾影浮初旭頭癢曉梳多眼昏春睡足負暄檐宇下散歩池塘曲南鴈去未逥東風來何速雪依瓦溝白草繞牆根緑何言萬户州太守常幽獨日漸長贈周殷二判官日漸長春尚早牆頭半露紅蕚枝池岸新鋪緑芽草蹋草攀枝仰頭歎何人知此春懐抱年顔盛壯名未成官職欲髙身巳老萬莖白髪真堪恨一片緋衫何足道賴得君来勸一杯愁開悶破心頭好花前歎前嵗花前五十二今年花前五十五嵗課年功頭髪知從霜成雪君㸔取五年前在杭州有詩云五十二人頭似霜幾人得老莫自嫌樊李吳韋盡成土樊絳州宗師李諫議景儉吳饒州丹韋侍郎顗皆舊往還相次䘮逝南州桃李北州梅且喜年年作花主花前置酒誰相勸容坐唱歌滿起舞容滿皆妓名也欲散重拈花細㸔争知明日無風雨自詠五首朝亦隨羣動暮亦隨羣動榮華瞬息間求得將何用形骸與冠蓋假合相戲弄何異睡著人不知夢是夢一家五十口一郡十萬户出為差科頭入為衣食主水旱合心憂饑寒須手撫何異食蓼蟲不知苦是苦公私頗多事衰憊殊少歡迎送賔客嬾鞭笞黎庶難老耳倦聲樂病口厭杯盤既無可戀者何以不休官一日復一日自問何留滯為貪逐日俸擬作歸田計亦須隨豐約可得無限劑若待足始休休官在何嵗官舎非我廬官園非我樹洛中有小宅渭上有别墅既無婚嫁累幸有歸休處歸去誠已遲猶勝不歸去和微之聽妻彈别鶴操因為解釋其義依韻加四句義重莫若妻生離不如死誓將死同穴其柰生無子商陵廹禮教婦出不能止舅姑明旦辭夫妻中夜起起聞雙鶴别若與人相似聽其悲唳聲亦如不得巳青田八九月遼城一萬里徘徊去住雲嗚咽東西水寫之在琴曲聽者酸心髓况當秋月彈先入憂人耳怨抑掩朱絃沈吟停玉指一聞無兒歎相念兩如此無兒雖薄命有妻偕老矣幸免生别離猶勝商陵氏題故元少尹集後二首黄壤詎知我白頭徒憶君惟將老年淚一灑故人文遺文三十軸軸軸金玉聲龍門原上土埋骨不埋名和微之四月一日作四月一日天花稀葉隂薄泥新燕影忙蜜熟蜂聲樂麥風低冉冉稻水平漠漠芳節或蹉跎逰心稍牢落春華信為美夏景亦未惡颭浪嫩青荷重欄晩紅藥吳宫好風月越郡多樓閣兩地誠可憐其奈久離索吳中好風景二首吳中好風景八月如三月水荇葉仍香木蓮花未歇海天微雨散江郭纎埃滅暑退衣服乾潮生船舫活兩衙漸多暇亭午初無熱騎吏語使君正是逰時節吳中好風景風景無朝暮曉色萬家煙秋聲八月樹舟移管絃動橋擁旌旗駐改號齊雲樓重開虎邱路况當豐嵗熟好是歡逰處州民勸使君且莫抛官去答劉禹錫白太守行吏滿六百石昔賢輙去之秩登二千石今我方罷歸我秩訝巳多我歸慙已遲猶勝塵土下終老無休期卧乞百日告起吟五篇詩謂将罷官自詠五首朝與府吏别暮與州民辭去年到郡時麥穗黄離離今年去郡日稻花白霏霏為郡巳周嵗半嵗罹旱饑襦袴無一片甘棠無一枝何乃老與幼泣别盡霑衣下慙蘇人淚上媿劉君辭白太守行劉禹錫聞有白太守抛官歸舊谿蘇州十萬户盡作嬰兒啼太守駐行舟閶門草萋萋揮袂謝啼者依然兩眉低朱户非不崇我心如重狴華池非不清意在寥廓栖夸者竊所怪賢者黙思齊我為太守行題在隱起珪别蘇州浩浩姑蘇民欎欎長洲城來慙荷寵命去媿無能名青紫行將吏班白列黎甿一時臨水拜十里隨舟行餞筵猶未收征櫂不可停稍隔煙樹色尚聞絲竹聲悵望武邱路沈吟滸水亭還鄉信有興去郡能無情夘時酒佛法贊醍醐仙方誇沆瀣未如夘時酒神速功力倍一杯置掌上三咽入腹内煦若春貫腸暄如日炙背豈獨肢體暢仍加志氣大當時遺形骸竟日忘冠帶似逰華胥國疑反混元代一性既完全萬機皆破碎半醒思往來往來吁可怪寵辱憂喜間惶惶二十載前年辭紫闥今嵗抛皁蓋去矣魚返泉超然蟬離蜕是非莫分别行止無疑礙浩氣貯胷中青雲委身外捫心私自語自語誰能㑹五十年來心未如今日泰况兹杯中物行坐長相對自問行何遲前月發京口今辰次淮涯二旬四百里自問行何遲還鄉無他計罷郡有餘資進不慕富貴退未憂寒飢以此易過日騰騰何所為逢山輙倚櫂遇寺多題詩酒醒夜深後睡足日髙時眼底一無事心中百不知想到京國日嬾放亦如斯何必冐風水促促赴程歸除日答夢得同發楚州共作千里伴俱為一郡逥嵗隂中路盡鄉思先春來山雪晩猶在淮氷晴欲開歸歟吟可作休戀主人杯問楊瓊古人唱歌兼唱情今人唱歌惟唱聲欲説向君君不㑹試將此語問楊瓊立名按元微之和樂天示楊瓊詩注楊瓊本名播少為江陵酒妓去年姑蘇遇瓊叙舊及今見樂天此篇然則此詩亦蘇州作也有感三首鬢毛巳斑白衣綬方朱紫窮賤當壯年富榮臨暮齒車輿紅塵合第宅青煙起彼來此須去品物之常理第宅非吾廬逆旅暫留止子孫非我有委蜕而巳矣有如蠶造繭又似花生子子結花暗凋繭成蠶老死悲哉可柰何舉世皆如此莫養痩馬駒莫教小妓女後事在目前不信君㸔取馬肥快行走妓長能歌舞三年五嵗間巳聞換一主借問新舊主誰樂誰辛苦請君大帶上把筆書此語往事勿追思追思多悲愴來事勿相迎相迎亦惆悵不如兀然坐不如塌然卧食來即開口睡來即合眼二事最關身安寢加餐飯忘懐任行止委命隨修短更若有興來狂歌酒一盞宿滎陽生長在滎陽少小辭鄉曲迢迢四十載復到滎陽宿去時十一二今年五十六追思兒戲時宛然猶在目舊去失處所故里無宗族豈惟變市朝兼亦遷陵谷獨有溱洧水無情依舊緑經溱洧落日駐行騎沈吟懐古情鄭風變巳盡溱洧至今清不見士與女亦無芍藥名就花枝就花枝移酒海今朝不醉明朝悔且算歡娱逐日來任他容鬢隨年改醉翻衫袖抛小令笑擲骰盤呼大采自量氣力與心情三五年間猶得在喜雨圃旱憂葵堇農旱憂禾菽人各有所私我旱憂松竹松乾竹焦死眷眷在心目灑葉溉其根汲水勞僮僕油雲忽東起涼雨淒相續似面洗垢塵如頭得膏沭千柯習習潤萬葉欣欣緑十日澆灌功不如一霢霂方知宰生靈何異活草木所以聖與賢同心調玉燭題道宗上人十韻并序普濟寺律大德宗上人法堂中有故相國鄭司徒歸尚書陸刑部元少尹及今吏部鄭相中書韋相錢左丞詩覽其題皆與上人唱酬閲其人皆朝賢省其文皆義語予始知上人之文為義作為法作為方便智作為解脱性作不為詩而作也知上人者云爾恐不知上人者謂為䕶國法振靈一皎然之徒與故予題二十句以解之如來説偈贊菩薩著論議是故宗律師以詩為佛事一音無差别四句有詮次欲使第一流皆知不二義精潔霑戒體閒澹藏禪味從容恣語言縹緲離文字旁延邦國彦上達王公貴先以詩句牽後令入佛智人多愛師句我獨知師意不似休上人空多碧雲思寄皇甫賔客名利既兩忘形體方自遂卧掩羅雀門無人驚我睡睡足抖擻衣閒歩中庭地食飽摩挲腹心頭無一事除却𤣥晏翁何人知此味寄庾侍郎一雙華亭鶴數片太湖石巉巉蒼玉峯矯矯青雲翮是時嵗云暮澹薄煙景夕庭霜封石稜池雪印鶴迹幽致竟誰别閒静聊自適懐哉庾順之好是今宵客寄崔少監微微西風生稍稍東方明入秋神骨爽琴曉絲桐清彈為古宫調玉水寒泠泠自覺絃指下不是尋常聲須㬰羣動息掩琴坐空庭直至日出後猶得心和平惜哉意未已不使崔君聽醉題沈子明壁不愛君池東十叢菊不愛君池南萬竿竹愛君簾下唱歌人色似芙蓉聲似玉我有陽關君未聞若聞亦應愁煞君勸酒勸君一杯君莫辭勸君兩杯君莫疑勸君三杯君始知面上今日老昨日心中醉時勝醒時天地迢迢自長久白赤烏相趁走身後堆金拄北斗不如生前一尊酒君不見春明門外天欲明喧喧歌哭半死生逰人駐馬出不得白轝紫車争路行歸去來頭已白典錢將用買酒喫落花留春春不住春歸人寂莫厭風風不定風起花蕭索既興風前歎重命花下酌勸君賞緑醅教人拾紅蕚桃飄紅燄燄梨墮雪漠漠獨有病眼花春風吹不落對鏡吟白頭老人照鏡時掩鏡沈吟吟舊詩二十年前一莖白如今變作滿頭絲余二十年前嘗有詩云白髪生一莖朝來明鏡裏勿言一莖少滿頭從此始今則滿頭矣吟罷廻頭索杯酒醉來屈指數親知老於我者多窮賤設使身存寒且飢少於我者半為土墓樹已抽三五枝我今幸得見頭白禄俸不薄官不卑眼前有酒心無苦只合歡娛不合悲耳順吟寄敦詩夢得三十四十五慾牽七十八十百病纒五十六十卻不惡恬澹清静心安然已過愛貪聲利後猶在病羸昏耄前未無筋力尋山水尚有心情聽管絃閒開新酒嘗數盞醉憶舊詩吟一篇敦詩夢得且相勸不用嫌他耳順年别氊帳火爐憶昨臘月天北風三尺雪年老不禁寒夜長安可徹賴有青氊帳風前自張設復此紅火爐雪中相暖熱如魚入淵水似免藏深穴婉軟蟄鱗蘇温燉凍肌活方安隂慘夕遽變陽和節無柰時候遷豈是恩情絶毳䈴逐日巻香燎隨灰滅離恨屬三春佳期在十月但令此身健不作多時别六年春贈分司東都諸公時為河南尹我為同州牧内媿無才術忝擢恩已多遭逢幸非一偶當榖賤嵗適值民安日郡縣獄空虚鄉閭盗奔逸其間最幸者朝客多分秩行接鴛鷺羣坐成芝蘭室時聯拜表騎間動題詩筆夜雪秉燭逰春風攜榼出花教鶯㸃檢栁付風排比法酒澹清漿含桃嫋紅實洛童調去聲金管盧女鏗瑶瑟黛慘歌思深腰凝舞拍密每因同醉樂自覺忘衰疾始悟肘後方不如杯中物生涯隨日過世事何時畢老子苦乖慵希君數牽率九日代羅樊二妓招舒著作齊梁格羅敷斂雙袂樊姬獻一杯不見舒員外秋菊為誰開憶舊逰寄劉蘇州憶舊逰舊逰安在哉舊逰之人半白首舊逰之地多蒼苔江南舊逰凡幾處就中最憶吳江隈長洲苑緑栁萬樹齊雲樓春酒一杯閶門曉嚴旗鼓出皋橋夕鬧船舫逥修蛾慢臉燈下醉急管繁絃頭上催六七年前狂爛熳三千里外思徘徊李娟張態一春夢周五殷三歸夜臺虎邱月色為誰好娃宫花枝應自開賴得劉郎解吟詠江山氣色合歸來娟態蘇州妓名周殷蘇州從事答崔賔客晦叔十二月四日見寄來篇云共相呼喚醉歸來今嵗日餘二十六來嵗年登六十二尚不能憂眼下身因何更算人間事居士忘筌黙黙坐先生枕麴昏昏睡早晩相從歸醉鄉醉鄉去此無多地勸我酒勸我酒我不辭請君歌歌莫遲歌聲長辭亦切此辭聽者堪愁絶洛陽女兒面似花河南大尹頭如雪贈韋處士六年夏大熱旱驕陽連毒暑動植皆枯槁旱日乾密雲炎煙焦茂草少壯猶困苦况予病且老既無白栴檀何以除熱惱華嚴經云以白栴檀塗身能除一切熱惱而得清凉也汗巾束頭鬢羶食熏襟抱始覺韋山人休糧散髪好除官赴闕留贈微之去年十月半君來過浙東今年五月盡我發向關中兩鄉黙黙心相别一水盈盈路不通從此津人應省事寂寥無復遞詩筒立名按此詩乃長慶四年公去杭州留别微之作各本誤入律詩巻内既編後摘出因附後集一巻之末雜言不可入律詩説見第三巻白香山詩集巻二十一
