body:
  text: 白香山詩集巻三十三歙縣汪立名編後集三律詩凡八十首讀老子言者不如知者黙此語吾聞於老君若道老君是知者縁何自著五千文讀莊子莊生齊物同歸一我道同中有不同遂性逍遥雖一致鸞凰終校勝蛇蟲讀禪經須知諸相皆非相若住無餘却有餘言下忘言一時了夢中說夢兩重虚空花豈得兼求果陽燄如何更覓魚攝動是禪禪是動不禪不動即如如立名按瀛奎律髓逰戲三昧不可以詩律拘佛語陽燄者謂逺地日光如見水然以對空花與夢幻泡影譬喻正同感興二首吉凶禍福有來由但要深知不要憂只見火光燒潤屋不聞風浪覆虚舟名為公器無多取利是身災合少求雖異匏𤓰難不食大都食足早宜休魚能深入寜憂釣鳥解髙飛豈觸羅熱處先爭炙手去悔時其柰噬臍何尊前誘得猩猩血幕上偷安燕燕窠我有一言君記取世間自取苦人多問鶴烏鳶爭食雀爭窠獨立池邊風雪多盡日蹋氷翹一足不鳴不動意如何代鶴荅鷹爪攖雞雞肋折鶻拳蹵鴈鴈頭垂何如斂翅水邊立飛上雲松棲穩枝閒臥有所思二首向夕褰簾臥枕琴微涼入户起開襟偶因明月清風夜忽想遷臣逐客心何處投荒初恐懼誰人繞澤正悲吟始知洛下分司坐一日安閒直萬金權門要路是一作足身災散地閒居少禍胎今日憐君嶺南去當時笑我洛中來蟲全性命縁無毒木盡天年為不才大抵吉凶多自致李斯一去二疎廻立名按此詩作於太和九年時李訓鄭注用事絲恩髪怨必報盡逐二李之黨徳裕既外貶注又素惡京兆尹楊虞卿搆貶䖍州宗閔論救亦坐貶公於楊本姻親史稱其惡縁黨人斥亟求分司東都故有當時笑我洛中來之句也權門要路及李斯等蓋指宗閔耳可見公不特不附宗閔亦并不私虞卿久已潔身於二黨之外矣晩年恬退遇人患難憫然歎息多見於詩如聞甘露之變之類要非幸人之禍也甘露之變在是年冬韻語陽秋樂天作八漸偈云苦既非真悲亦是假則世間悲歡人我必能忘情李徳裕於樂天不免有隙李貶崖州樂天作三絶快之其一篇云樂天嘗任蘇州日要勒須教用禮儀従此結成千萬恨今朝果中白家詩以唐史考之徳裕之貶在宣宗大中年樂天死已久非樂天之詩明矣按此三絶集中不載不知何人考正刪去其見諸小史者亦僅此一首晁子止云聞李崖州貶絶句其言淺俗似幸其禍敗者余固疑非樂天語及以編年考之崖州貶時樂天歿将踰年或曰浮屠某作也喜閒蕭灑伊嵩下優游黄綺間未曾一日悶已得六年閒魚鳥為徒侣煙霞是往還伴僧禪閉目迎客笑開顔興發宵遊寺慵時晝掩關夜來風月好悔不宿香山詩酒琴人例多薄命予酷好三事雅當此科而所得已多為幸斯甚偶成狂詠聊寫媿懐愛琴愛酒愛詩客多賤多貧多苦辛中散歩兵終不貴孟郊張籍過於貧一之已歎闗於命三者何堪并在身只合飄零隨草木誰教凌厲出風塵榮名厚禄二千石樂飲閒逰三十春可得無厭時咄咄猶言薄命不如人寄明州于駙馬使君三絶句有花有酒有笙歌其柰難逢親故何近海饒風春足雨白鬚太守悶時多平陽音樂隨都尉留滯三年在浙東吳越聲邪無法用莫教偷入管絃中何郎小妓歌喉好嚴老呼為一串珠嚴尚書與子駙馬詩云莫惜歌喉一串珠海味腥鹹損聲氣聴看猶得斷腸無閒臥薄食當齋戒散班同隠淪佛容為弟子天許作閒人唯置牀臨水都無物近身清風散髪臥兼不要紗巾春早秋初因時即事兼寄浙東李侍郎春早秋初晝夜長可憐天氣好年光和風細動簾帷暖清露微凝枕簟涼窗下曉眠初減被池邊晩坐乍移牀閑從蕙草侵階緑靜任槐花滿地黄理曲管絃聞後院熨衣燈火映深房四時新景何人别遥憶多情李侍郎新秋喜涼過得炎蒸月尤宜老病身衣裳朝不潤枕簟夜相親樓月纖纖早波風嫋嫋新光隂與時節先感是詩人初夏閑吟兼呈韋賓客孟夏清和月東都閒散官體中無病痛眼下未飢寒世事聞常悶交游見即歡杯觴留客切妓樂取人寛雪鬢隨身老雲心著䖏安此中殊有味試說向君看哭崔二十四常侍崔好酒放歌㤀懐生死知疾不起自為誌文貂冠初别九重門馬鬛新封四尺墳薤露歌詞非白雪旌銘官爵是浮雲伯倫每置隨身鍤元亮先為自祭文莫道髙風無繼者一千年内有崔君奉酬侍中夏中雨後逰城南荘見示八韻島樹間林巒雲收雨氣殘四山嵐色重五月水聲寒老鶴兩三隻新篁千萬竿化成天竺寺移得子陵灘心覺閒彌貴身縁健更歡帝將風后待人作謝公看甪里年雖老髙陽興未闌佳辰不見召爭免趁杯盤來詩云何䖏趁杯盤送兖州崔大夫駙馬赴鎮戚里誇為賢駙馬儒家認作好詩人魯侯不得辜風景沂水年年有暮春少年問少年怪我問如何何事朝朝醉復歌號作樂天應不錯憂愁時少樂時多問少年千首詩堆青玉案十分酒寫去聲白金盂囘頭却問諸年少作箇狂夫得了無代琵琶弟子謝女師曹供奉寄新調弄譜琵琶師在九重城忽得書來喜且驚一紙展看非舊譜四絃翻出是新聲㽔賓掩抑嬌多怨散水玲瓏峭更清珠顆淚霑金捍撥紅妝弟子不勝情㽔賓散水皆新調名代林園戲贈裴侍中新修集賢宅成池館甚盛數往逰宴醉歸自戲耳南院今秋遊宴少西坊近日往來頻假如宰相池亭好作客何如作主人戲荅林園豈獨西坊來往頻偷閑處處作遊人衡門雖是棲遲地不可終朝鏁老身重戲贈集賢池館從他盛履道林亭勿自輕往往歸來嫌窄小年年為主莫無情重戲答小水低亭自可親大池髙館不闗身林園莫妒裴家好憎故憐新豈是人早秋登天宫寺閣贈諸客天宫閣上醉蕭辰絲管閒聴酒慢巡為向涼風清景道今朝屬我兩三人曉上天津閣閑望偶逢盧郎中張員外攜酒同傾上陽宫裏曉鐘後天津橋頭殘月前空濶境疑非下界飄颻身似在寥天星河隠映初生日樓閣葱籠半出煙此處相逢傾一琖始知地上有神仙八月十五日夜同諸客翫月月好共傳唯此夜境閒皆道是東都嵩山表裏千重雪洛水髙低兩顆珠清景難逢宜愛惜白頭相勸强歡娱誠知亦有來年㑹保得晴明强健無對晩開夜合花贈皇甫郎中移晚校一月花遲過半年紅開杪秋日翠合欲昬天白露滴未死涼風吹更鮮後時誰肯顧唯我與君憐醉逰平泉狂歌箕踞酒尊前眼不看人面向天洛客最閒唯有我一年四度到平泉題贈平泉韋徴君拾遺附薦韋楚狀伊闕山平泉處士韋楚右件人隠居樂道獨行善身斂跡市朝息機名利况家傳簪組兄在班行而楚獨棲山卧雲練氣年絶粒滋味不接於口塵埃不染其心二十餘不改其樂志齊箕潁節類顔原搢紳之間多所稱歎臣為尹正合具薦論雖飛鴻入𠖇自㤀飲啄而白駒在谷亦貴縶維倘蒙寘彼周行縻之好爵降羔鴈之禮命助鵷鷺之羽儀足以厚貞退之風遏躁進之俗兹亦盛事有裨聖朝太和六年六月二十六日河南尹臣白居易狀奏箕潁千年後唯君得古風位留丹陛上身入白雲中躁静心相背髙低跡不同籠雞與梁燕不信有𠖇鴻立名按全唐詩話李徳裕平泉荘去洛三十里東南即徴士韋楚拾遺别墅楚老風韻髙致雅好山水徳裕為相時以白衣擢諌署後歸平泉造門訪之楚老走避山谷李有詩云昔日銜黄紙余慙在鳯池今來招隐士恨不見瓊枝其品格髙逸可以想見酬皇甫郎中對新菊花見憶愛菊髙人吟逸韻悲秋病客感衰懐黄花助興方攜酒紅葉添愁正滿階居士葷腥今已斷仙郎杯杓為誰排媿君相憶東籬下擬廢重陽一日齋夜宴醉後留獻裴侍中九燭臺前十二姝主人留醉任歡娛翩翻舞袖雙飛蝶宛轉歌聲一索珠坐久欲醒還酩酊夜深初散又踟蹰南山賓客東山妓此㑹人間曾有無和韋庶子逺坊赴宴未夜先歸之作兼呈裴員外促席留歡日未曛逺坊歸思已紛紛無妨按轡行乘月何必逃杯走似雲銀燭忍抛楊栁曲金鞍潛送石榴帬到時常晚歸時早笑樂三分校一分集賢池荅侍中問主人晩入皇城宿問客徘徊何所須池月幸閒無用處今宵能借客遊無楊栁枝二十韻楊栁枝洛下新聲也洛之小妓有善歌之者詞章音韻聴可動人故賦之小妓攜桃葉新聲蹋栁枝妝成剪燭後醉起拂衫時繡履嬌行緩花筵笑上遲身輕委廻雪羅薄透凝脂笙引簧頻煖箏催柱數移樂童翻怨調才子與妍詞便想人如樹先將髪比絲風條揺兩帶煙葉貼雙睂口動櫻桃破鬟低翡翠垂枝柔腰嫋娜荑嫩手葳㽔唳鶴晴呼侣哀猿夜叫兒玉敲音厯厯珠貫字纍纍袖為收聲㸃釵因赴節遺重重徧頭别一一拍心知塞北愁攀折江南苦别離黄遮金谷岸緑映杏園池春惜芳華好秋憐顔色衰取來歌裏唱勝向笛中吹曲罷那能别情多不自持纏頭無别物一首斷腸詩荅皇甫十郎中秋深酒熟見憶煙景冷蒼茫秋深夜夜霜為思池上酌先覺甕頭香未暇傾巾漉還應染指嘗醍醐慙氣味琥珀讓晶光若許陪歌席須容散道場月終齋戒畢猶及菊花黄老去老去媿妻兒冬來有勸詞煖寒從飲酒衝冷少吟詩戰勝心還壯齋勤體校羸由來世間法損益合相隨送宗實上人遊江南忍辭洛下縁何事擬向江南住幾時每過渡頭應問法無妨菩薩是船師和同州楊侍郎誇柘枝見寄細吟馮翊使君詩憶作餘杭太守時君有一般輸我事柘枝看校十年遲冬初酒熟二首霜緐脆庭栁風利剪池荷月色曉彌苦鳥聲寒更多秋懐久寥落冬計又如何一甕新醅酒萍浮春水波酒熟無來客因成獨酌謡人間老黄綺地上散松喬忽忽醒還醉悠悠暮復朝殘年多少在盡付此中銷送姚杭州赴任因思舊遊二首與君細話杭州事為我留心莫等閒閭里固宜勤撫恤樓臺亦要數躋攀笙歌縹緲虚空裏風月依稀夢想間且喜詩人重管領遥飛一琖賀江山渺渺錢塘路幾千想君到後事依然靜逢竺寺猨偷橘閒看蘇家女采蓮故妓數人憑問訊新詩兩首倩留傳舍人雖健無多興老校當時八九年杭民至今呼余為白舍人寄李相公漸老只謀歡雖貧不要官唯求造化力試為駐春看冬日平泉路晩歸山路難行日易斜煙邨霜樹欲棲鴉夜歸不到應閒事熱飲三杯即是家利仁北街作草色斑斑春雨晴利仁坊北面西行踟蹰立馬縁何事認得張家歌吹聲洛陽堰閑行洛陽堰上新晴日長夏門前欲暮春遇酒即酤逢樹歇七年此地作閑人過永寜邨杏野桃緐似雪行人不醉為誰開賴逢山縣盧明府引我花前勸一杯往年稠桑曽喪白馬題詩㕔壁今來尚存又復感懷更題絶句路傍埋骨蒿草合壁上題詩塵蘚生馬死七年猶悵望自知無乃太多情羅敷水野店東頭花落處一條流水號羅敷芳魂豔骨知何處春草茫茫墓亦無路逢青州王大夫赴鎮立馬贈别大斾擁金羈書生得者稀何勞問官職豈不見光輝赫赫人爭看翩翩馬欲飛不期一作欺前嵗尹駐節語依依前年春予為河南尹王為少尹和楊同州寒食乾坑㑹後聞楊工部欲到知予與工部有宿酲夜飲歸常晩朝眠起更遲舉頭中酒後引手索茶時拂枕青長袖欹簪白接䍦宿酲無興味先是肺神知和劉汝州酬侍中見寄長句因書集賢坊勝事戲而問之洛川汝海封畿接履道集賢來往頻一復時程雖不逺百餘步地更相親汝去洛程一宿履道集賢兩宅相去一百三十步朱門陪宴多投轄青眼留歡任吐茵聞道郡齋還有酒花前月下對何人池上二絶山僧對棊坐局上竹隂清映竹無人見時聞下子聲小娃撐小艇偷采白蓮回不解藏蹤迹浮萍一道開白羽扇素是自然色圓因裁製功颯如松起籟飄似鶴翻空盛夏不銷雪終年無盡風引秋生手裏藏月入懐中麈尾斑非匹蒲葵陋不同何人稱相對清痩白鬚翁五月齋戒罷宴徹樂聞韋賓客皇甫郎中飲㑹亦稀又知欲擕酒饌出齋先以長句呈謝妓房匣鏡滿紅埃酒庫封缾生緑苔居士爾時縁護戒車公何事亦停杯散齋香火今朝散開素盤筵後日開隨意往還君莫怪坐禪僧去飲徒來閒園獨賞因夢得所寄蠭鶴之詠因成此篇以和之午後郊園靜晴來景物新雨添山氣色風借水精神永日若為度獨遊何所親仙禽狎君子芳樹倚佳人蟻鬭王爭肉蝸移舍逐身蝶雙知伉儷蠭分見君臣蠢蠕形雖小逍遥性即均不知鵬與鷃相去幾微塵種栁三詠白頭種松桂早晩見成林不及栽楊栁明年便有隂春風為催促副取老人心從君種楊柳夾水意如何準擬三年後青絲拂緑波仍教小樓上對唱柳枝歌更想五年後千千條麴塵路傍深映月樓上暗藏春愁殺閒遊客聞歌不見人立名按姚寛叢語唐人詠栁使麴塵字者極多禮記月令薦鞠衣於上帝吿桑事注云如鞠塵色周禮内司服鞠衣鄭司農云鞠衣黄桑服也色如麴塵象桑葉始生此用之栁又象其花絮之穗耳偶吟好官病免曽三度散地歸休已七年老自退閒非世棄貧蒙强健是天憐韋荆南去留春服王侍中來乞酒錢便得一年生計足與君美食復甘眠池上即事移牀避日依松竹解帶當風挂薜蘿鈿砌池心緑蘋合粉開花面白蓮多久隂新霽宜絲管苦熱初涼入綺羅家醖缾空人客絶今宵爭柰月明何南塘暝興水色昬猶白霞光暗漸無風荷揺破扇波月動連珠蟋蟀啼相應鴛鴦宿不孤小僮頻報夜歸步尚踟蹰小宅小宅里閭接疎籬雞犬通渠分南巷水窗借北家風庾信園殊小陶潛屋不豐何勞問寛窄寛窄在心中諭親友適情處處皆安樂大抵園林勝市朝煩鬧榮華猶易過優閒福禄更難銷自憐老大宜疎散却被交親歎寂寥終日相逢不相見兩心相去一何遥龍門送别皇甫澤州赴任韋山人南遊隼旟歸洛知何日鶴駕還嵩莫過春惆悵香山雲水冷明朝便是獨遊人劉蘇州寄釀酒糯米李浙東寄楊栁枝舞衫偶因嘗酒試衫輒成長句寄謝之栁枝謾踏試雙袖桑落初香嘗一杯金屑醅濃吳米釀銀泥衫穩越娃裁舞時已覺愁睂展醉後仍教笑口開慙媿故人憐寂寞三千里外寄歡來詔授同州刺史病不赴任因詠所懐同州慵不去此意復誰知誠愛俸錢厚其如身力衰可憐病判案何似醉吟詩勞逸懸相逺行藏決不疑徒煩人勸諌只合自尋思白髪來無限青山去有期野心惟怕鬧家口莫愁飢賣却新昌宅聊充送老資寄楊六侍郎時楊初授户部予不赴同州西户最榮君好去左馮雖穩我慵來秋風一箸鱸魚膾張翰揺頭喚不回韋七自太子賓客再除祕書監以長句賀而餞之韋往年嘗與予同為祕監離筵莫愴且同歡共賀新恩拜舊官屈就商山伴麋鹿好歸芸閣狎鵷鸞落星石上蒼苔古畫鶴㕔前白露寒老監姓名題一作應在壁相思試為拂塵看酒熟憶皇甫十新酒此時熟故人何日來自從金谷别不見玉山頺疎索栁花盌寂寥荷葉杯今冬問氊帳雪裏為誰開九年十一月二十一日感事而作其日獨逰香山寺禍福茫茫不可期大都早退似先知當君白首同歸日是我青山獨往時顧索素琴應不暇憶牽黄犬定難追麒麟作脯龍為醢何似泥中曵尾龜立名按東坡志林樂天為王涯所䜛謫江州司馬甘露之禍樂天在洛適逰香山寺有白首同歸二句不知者以為幸之也樂天豈幸人之禍者哉蓋悲之也按白首同所歸乃阮籍石崇臨刑時語太和九年甘露事李訓鄭注舒元輿王涯賈餗皆被害味詩中同歸句本就事而言不専指王涯也公自蘇州召還秩位漸崇見機引退宦官之禍固早計及者何至追憾王涯况公之遷謫本由宦官惡之附宦官者成之豈反以中人誅夷士大夫為快幸禍之説葢出章子厚諺所謂以小人心度君子腹耳即事重題重裘煖帽寛氊履小閣低窗深地壚身穩心安眠未起西京朝士得知無將歸渭邨先寄舍弟一年年覺此身衰一日日知前事非詠月嘲風先要減登山臨水亦宜稀子平嫁娶貧中畢元亮田園醉裏歸為報阿連寒食下與吾釀酒埽柴扉看嵩洛有歎今日看嵩洛囘頭歎世間榮華急如水憂患大於山見苦方知樂經忙始愛閒未聞籠裏鳥飛出肯飛還詠懐隨縁逐䖏便安閒不入朝廷不住山心似虚舟浮水上身同宿鳥寄林間尚平婚嫁了無累馮翊符章封却還時阿羅初嫁及同州官吏放歸處分貧家殘活計匹如身後莫相闗立名按芥隠筆記詩中用而今匹如些些耳冷妒他欺我生憎勿留羸垂温暾皆樂天語相欺有底也自也知差㡳斬新遮莫皆出杜詩又云鬭在出樂天詩詠老贈夢得與君俱老也自問老何如眼澀夜先卧頭慵朝未梳有時扶杖出盡日閉門居嬾照新磨鏡休看小字書情於故人重迹共少年疎唯是閒談興相逢尚有餘白香山詩集巻三十三
