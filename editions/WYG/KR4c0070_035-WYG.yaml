body:
  text: 白香山詩集巻三十五歙縣汪立名編後集五律詩凡七十五首寄獻北都留守裵令公并序一從英華増今本遺此行誤以序為題司徒令公分守東洛移鎮北都一心勤王三月成政形容盛徳實在歌詩況辱知音敢不先唱輒奉五言四十韻寄獻以抒下情天上中台正人間一品髙中書令上應中台司徒官一品休明值堯舜勲業過蕭曹始擅文三捷進士及第博學制䇿連登三科終兼武六韜動人名赫赫憂國意忉忉盪一作伐蔡擒封豕吳元濟也平齊斬巨鼇李斯道也兩河收土宇四海定波濤寵重移宫籥自東都留守授北京留守恩新換閫旄保釐東宅靜周公召公東治洛宅守護北門牢晉國封疆闊并州士馬豪胡兵驚赤幟邊雁避烏號令下流如水仁霑澤似膏路喧歌五袴軍醉感單醪将校森貔武賓僚儼雋髦客無煩夜柝吏不犯秋毫神在臺駘助魂亡獫狁逃徳星銷彗孛霖雨滅腥臊烽戍髙臨代闗河逺控洮汾雲晴漠漠朔吹冷颾颾豹尾交牙㦸虯鬚捧佩刀通天白犀帶照地紫麟袍羌管吹楊栁燕姬酌蒲萄蒲萄酒出太原銀含鑿落琖金屑琵琶槽遥想從軍樂應㤀報國勞紫微留北闕中書令即紫㣲令也緑野寄東臯緑野堂在東都午橋荘也忽憶前時㑹多慙下客叨清宵陪讌話美景從逰遨花月還同賞琴詩雅自操朱絃拂宫徴洪筆振風騷近竹開方丈依林架桔橰春池八九曲畫舫兩三艘徑滑苔粘屐潭深水没篙緑絲縈岸栁紅粉映樓桃皆午橋荘中景物之佳者為穆先陳醴居易毎十齋日在㑹常蒙以二勒湯代酒也招劉共藉糟劉夢得也舞鬟金翡翠歌頸玉蠐螬盛徳終難退明時豈易遭公雖慕張范張良范蠡帝未舍伊臯眷戀心方結踟蹰首巳搔鸞凰上寥廓燕雀任蓬蒿欲獻文狂簡徒煩思鬱陶可憐四百字輕重抵鴻毛和東川楊慕巢尚書府中獨坐感戚在懐見寄十四韻慕巢感戚䖍州弟喪逝感巳之榮盛有歸洛之意故敘而和之也我是知君者君今意若何窮通時不定苦樂事相和東蜀歡殊渥西江歎逝波只縁榮貴極翻使感傷多行斷風驚鴈慕巢及楊九楊十前年來兄弟三人各在一處年侵日下坡片心休慘戚雙鬢已蹉跎紫綬黄金印青幢白玉珂老将榮補貼愁用道消磨外府饒杯酒中堂有綺羅應須引滿飲何不放狂歌錦水通巴峽香山對洛河将軍馳鐵馬少傅步銅駝深契憐松竹髙情憶薜蘿懸車年甚逺未敢故一作放相過分司洛中多暇數與諸客宴逰醉後狂吟偶成十韻因招夢得賓客兼呈思黯竒章公性與時相逺身将世兩㤀寄名朝士籍寓興少年場老豈無談笑貧猶有酒漿隨時來伴侣逐日用風光數數逰何爽些些病未妨天教榮啓樂人恕接輿狂改業為逋客移家住醉鄉不論招夢得兼擬誘竒章要路風波險權門市井忙世間無可戀不是不思量小嵗日喜談氏外孫女孩滿月今旦夫妻喜他人豈得知自嗟生女晩敢訝見孫遲物以稀為貴情因老更慈新年逢吉日滿月乞名時因名引珠桂燎熏花果蘭湯洗玉肌懐中有可抱何必是男兒閒吟贈皇甫郎中親家翁新與皇甫結姻誰能嗟歎光隂暮豈復憂愁活計貧忽忽不知頭上事時時猶憶眼中人早為良友非交勢晩接嘉姻不失親最喜兩家㛰嫁畢一時抽得尚平身夢得臥病攜酒相尋先以此寄病來知少客誰可以為娛日晏開門未秋寒有酒無自宜相慰問何必待招呼小疾無妨飲還須挈一壺酬思黯戲贈同用狂字鍾乳三千兩金釵十二行妒他心似火欺我鬢如霜思黯自誇前後服鍾乳三千兩甚得力而歌舞之妓頗多來詩謔予羸老故戲荅之慰老資歌笑銷愁仰酒漿眼看狂不得狂得且須狂立名按朱翌猗覺寮雜記樂天詩鍾乳三千兩金釵十二行以言聲妓之多蓋用古樂詞云頭上金釵十二行足下絲履五文章是一人頭插十二釵耳非聲妓之多十二重行也又戲荅絶句來句云不是道公狂不得恨公逢我不教狂狂夫與我兩相㤀故態些些亦不妨縱酒放歌聊自樂接輿爭解教人狂令狐相公與夢得交情素深眷予分亦不淺一聞薨逝相顧泫然旋有使來得前月未歿之前數日書及詩寄贈夢得哀吟悲歎寄情於詩詩成示予感而繼和緘題重叠語殷勤存歿交親自此分前月使來猶理命今朝詩到是遺文銀鉤見晩書無報玉樹埋深哭不聞最感一行絶筆字尚言千萬樂天君令狐與夢得手札後云見樂天君為伸千萬之誠也洛下雪中頻與劉李二賓客宴集因寄汴州李尚書水南水北總一作雪紛紛雪裏歡逰莫厭頻日日多一作暗來唯老病年年少去是交親碧氊帳暖梅花溼紅燎爐香竹葉春今日鄒枚俱在洛梁園置酒召何人看夢得題荅李侍郎詩詩中有文星之句因戲和之看題錦繡報瓊瓌俱是人天第一才好遣文星守躔次亦須防有客星來閒適俸禄優饒官不卑就中閒適是分司風光暖助逰行䖏雨雪寒供飲宴時肥馬輕裘還且有麄歌薄酒亦相隨微躬所要今皆得只是蹉跎得校遲戲荅思黯思黯有能箏者以此戲之何時得見十三絃待取無雲有月天願得金波明似鏡鏡中照出月中仙酬裴令公贈馬相戲裴詩云君若有心求逸足我還留意在名姝葢引妾換馬戲意亦有所屬也安石風流無柰何欲将赤驥換青娥不辭便送東山去臨老何人與唱歌新嵗贈夢得暮齒忽将及同心私自憐漸衰宜減食已喜更加年紫綬行聯被籃轝出比肩與君同甲子嵗酒合誰先立名按容齋隨筆有嵗旦飲酒一則云今人元日飲屠酥酒自小者起相傳已久然固有來處漢李膺杜密以黨人同繫獄值元日於獄中飲酒曰正旦從小起時鏡新書晉董勛云正旦飲酒先從小者以小者得嵗故先酒賀之老者失時故後飲酒初學記載四民月令云正旦進酒次第當從小起以年小者起先樂天元日舉酒詩與君同甲子嵗酒合誰先又嵗假内命酒一篇云嵗酒先拈辭不得被君推作少年人顧況詩手把屠蘇讓少年東坡亦云但把窮愁博長健不辭最後飲屠酥早春持齋荅皇甫十見贈正月晴和風景新紛紛巳有醉逰人帝城花笑長齋客三十年來負早春戲贈夢得兼呈思黯雙鬢莫欺今老矣傳曰今老矣無能為也一杯莫笑便陶然陳郎中處為髙户裴使君前作少年陳商郎中酒户涓滴裴洽使君年九十餘顧我獨狂多自哂與君同病最相憐月終齋滿誰開素須䛏竒章置一筵早春憶逰思黯南荘因寄長句南荘勝處心常憶借問軒車早晩逰美景難㤀竹廊下好風爭柰栁橋頭氷消見水多於地雪霽看山盡入樓若待春深始同賞鶯殘花落却堪愁酬皇甫十早春對雪見贈漠漠復雰雰東風散玉塵明催竹窗曉寒退栁園春緑醖香堪憶紅爐煖可親忍心三兩日莫作破齋人奉和思黯自題南荘見示兼呈夢得謝家别墅最新竒山展屏風花夾籬曉月漸沈橋脚底晨光初照屋梁時臺頭有酒鶯呼客水面無塵風洗池除却吟詩兩閒客此中情狀更誰知送蘄春李十九使君赴郡可憐官職好文詞五十専城未是遲曉日鏡前無白髪春風門外有紅旗郡中何處堪攜酒席上誰人解和詩唯共交親開口笑知君不及洛陽時自題酒庫野鶴一辭籠虚舟長任風送愁還鬧處移老入閑中身更求何事天将富此翁此翁何處富酒庫不曽空劉仁軌詩云天将富此翁以一醉為富也寒食日寄楊東川不知楊六逢寒食作音佐底歡娱過此辰兜率寺髙宜望月嘉陵江近好逰春蠻旗似火行隨馬蜀妓如花坐繞身不使黔婁夫婦看誇張富貴向何人醉後聴唱桂華曲詩云遥知天上桂華孤試問嫦娥更要無月宫幸有閒田地何不中央種兩株此曲韻怨切聴輒感人故云爾桂華詞意苦丁寜唱到嫦娥醉便醒此是人一作世間腸斷曲莫教不得意人聴酬夢得以予五月長齋延僧徒絶賓友見戲十韻賓客嬾逢迎翛然池館清簷閒空燕語林靜未蟬鳴葷血還一作初休食杯觴亦罷傾三春多放逸五月暫修行香印朝煙細紗燈夕燄明交遊諸長老師事古先生竺乾古先生也禪後心彌寂齋來體更輕不唯忘肉味兼擬滅風情蒙以聲聞待難将戲論爭虚空若有佛靈運恐先成立名按老學菴筆記云唐髙祖實録武徳二年正月甲子下詔自今每年正月五月九月十直日並不得行刑所在公私宜斷屠殺此三長月斷屠殺之始也唐士大夫如白居易輩蓋有遇此三齋月謝客専延緇流作佛事者今法至此月亦減去食羊錢葢其遺制又和令公新開龍泉晉水二池舊有潢汚泊今為白水塘詩云方塘含白水笙歌聞四面樓閣在中央春變煙波色晴添樹木光龍泉信為美莫忘午橋荘早夏曉興贈夢得窗明簾薄透朝光臥整巾簪起下牀背壁燈殘經宿燄開箱衣帶隔年香無情亦任他春去不醉爭銷得晝長一部清商一壺酒與君明日暖新堂春日題乾元寺上方最髙峰亭危亭絶頂四無鄰見盡三千世界春但覺虚空無障礙不知髙下幾由旬廻看官路三條線却望都城一片塵賓客暫逰無半日王侯不到便終身始知天造空閒境不為忙人富貴人奉和思黯相公以李蘇州所寄太湖石竒狀絶倫因題二十韻見示兼呈夢得錯落復崔嵬蒼然玉一堆峰駢仙掌出罅坼劒門開峭頂髙危矣盤根下壯哉精神欺竹樹氣色壓亭臺隠起磷磷狀凝成瑟瑟胚廉稜露鋒刃清越扣瓊瑰岌嶫形将動巍峨勢欲摧竒應潛鬼怪靈合蓄雲雷黛潤霑新雨斑明㸃古苔未曽棲鳥雀不肯染塵埃尖削琅玕筍窪剜瑪瑙罍海神移碣石畫障簇天台在世為尤物如人負逸才渡江一葦載入洛五丁推出處雖無意升沈亦有媒媒為李蘇州拔從水府底置向相庭隈對稱吟詩句看宜把酒杯終隨金礪用不學玉山頽疏傅心偏愛園公眼屢廻共嗟無此分虚管太湖來居易與夢得俱典姑蘇而不獲此石附太湖石記古之達人皆有所嗜𤣥晏先生嗜書嵇中散嗜琴靖節先生嗜酒今丞相竒章公嗜石石無文無聲無臭無味與三物不同而公嗜之何也衆皆怪之余獨知之昔故友李生名約有云苟適吾意其用則多誠哉是言適意而巳公之所嗜可知之矣公以司徒保釐河洛治家無珍産奉身無長物惟東城置一第南郭營一墅精葺宫宇慎擇賓客性不易合居常寡徒游息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉今公之所嗜者甲也先是公之僚吏多鎮守湖知公之心惟石是好乃鈎深致逺獻瑰納竒四五年間纍纍而至公於此物獨不廉讓東第南墅列而致之富哉石乎厥状非一有盤坳秀出如靈丘鮮雲者有端險挺立如真官神人者有縝潤削成如珪瓚者有廉稜銳劌如劒㦸者又有如虯如鳯若跧若動将翔将踴如鬼如獸若行若驟将竦将鬬風烈雨晦之夕洞穴開􅥾若欱雲散雷嶷嶷然有可望而畏之者煙霽景麗之旦巖㟧霮䨴若拂嵐撲黛靄靄然有可狎而翫之者昏曉之交名狀不可提要而言則三山五岳百洞千壑覼縷簇縮盡在其中百仞一拳千里一瞬坐而得之此所以為公適意之用也嘗與公迫觀熟察相顧而言豈造物者有意於其間乎将胚腪凝結偶然而成功乎然而自一成不變以來不知幾千年或委海隅或淪湖底髙者僅數仞重者殆千鈞一旦不鞭而來無脛而至爭竒騁怪為公眼中之物公又待之如賓友親之如賢哲重之如寳玉愛之如兒孫不知精意有所召邪将尤物有所歸邪孰不為而來邪必有以也石有大小其數四等以甲乙丙丁品之毎品有上中下各刻於石隂曰牛氏石甲之上丙之中乙之下噫是石也百千載後散在天壤之内轉徙隠見誰復知之欲使将來與我同好者觀斯石覽斯文知公之嗜石之目按公此記本集未載出事文類聚奉和思黯相公雨後林園四韻見示新晴夏景好復此池邊地煙樹緑含滋水風清有味便成林下隠都忘門前事騎吏引歸軒始知身富貴晩夏閒居絶無賓客欲尋夢得先寄此詩魚筍朝餐飽蕉紗暑服輕欲為窗下寢先傍水邊行晴引鶴雙舞秋生蟬一聲無人解相訪有酒共誰傾老更諳時事閒多見物情只應劉與白二叟自相迎寄李蘄州下車書奏龔黄課動筆詩傳鮑謝風江郡謳謡誇杜母洛城歡㑹憶車公笛愁春盡梅花裏簟冷秋生薤葉中蘄州出好笛并薤葉簟不道蘄州歌酒少使君難稱與誰同酬思黯相公晩夏雨後感秋見贈暮去朝來無歇期炎涼暗向雨中移夜長祗合愁人覺秋冷先應痩客知兩幅彩箋揮逸翰一聲寒玉振清辭無憂無病身榮貴何故沈吟亦感時久雨閒悶對酒偶吟淒淒苦雨暗銅駝嫋嫋涼風起漕河自夏及秋晴日少從朝至暮悶時多鷺臨池立窺魚笱隼傍林飛拂雀羅賴有杯中神聖物百憂無柰十分何雨後秋涼夜來秋雨後秋氣颯然新團扇先辭手生衣不著身更添砧引思難與簟相親此境誰偏覺貧閑老痩人酬夢得早秋夜對月見寄吾衰寡情趣君病嬾經過其柰西樓上新秋明月何庭蕪淒白露池色澹金波況是初長夜東城砧杵多題謝公東山障子賢愚共在浮生内貴賤同趨羣動間多見忙時巳衰病少聞健日肯休閒鷹飢受緤從難退鶴老乘軒亦不還唯有風流謝安石拂衣攜妓入東山謝楊東川寄衣服年年衰老交逰少處處蕭條書信稀惟有巢兄不相㤀春茶未斷寄秋衣詠懐寄皇甫朗之老大多情足往還招僧待客夜開闗學調氣後衰中健不用心來鬧處閒養病未能辭薄俸㤀名何必入深山與君别有相知分同置身於木鴈間東城晩歸一條笻杖懸龜榼雙角吳童控馬銜晩入東城誰識我短靴低帽白蕉衫與夢得沽酒閒飲且約後期少時猶不憂生計老後誰能惜酒錢共把十千酤一斗相看七十欠三年閒徴雅令窮經史醉聴清吟勝管絃更待菊黄家醖熟共君一醉一陶然與牛家妓樂雨後合宴玉管清絃聲旖旎翠釵紅袖坐參差兩家合奏洞房夜八月連隂秋雨時歌臉有情凝睇久舞腰無力轉裠遲人間歡樂無過此上界西方即不知和楊六尚書喜兩弟漢公轉吳興魯士賜章服命賔開宴用慶恩榮賦長句見示華筵賀客日紛紛劒外歡娱洛下聞朱紱寵光新照地彤襜喜氣逺凌雲榮聯花萼詩難和樂助塤篪酒易醺感羨料應知我意今生此事不如君自詠鬚白面微紅醺醺半醉中百年隨手過萬事轉頭空臥疾痩居士行歌狂老翁仍聞好事者将我畫屏風夢得相過援琴命酒因彈秋思偶詠所懐兼寄繼之待價二相府閒居靜侣偶相招小飲初酣琴欲調我正風前弄秋思君應天上聴雲韶雲韶雅曲上多與宰相同聴之時和始見陶鈞力物遂方知盛聖朝雙鳯棲梧魚在藻飛沈隨分各逍遥九月八日酬皇甫十見贈君方對酒綴詩章我正持齋坐道場處處追遊雖不去時時吟詠亦無妨霜蓬舊鬢三分白露菊新花一半黄惆悵東籬不同醉陶家明日是重陽慕巢尚書書云室人欲為置一歌者非所安也以詩相報因而和之東川已過二三春南國須求一兩人富貴大都多老大歡娱太半為親賓如愁翠黛應堪重買笑黄金莫訴貧他日相逢一杯酒尊前還要落梁塵杪秋獨夜無限少年非我伴可憐清夜與誰同歡娱牢落中心少親故凋零四面空紅葉樹飄風起後白鬚人立月明中前頭更有蕭條物老菊衰蘭三兩叢憑李睦州訪徐凝山人凝即睦州之民也郡守輕詩客鄉人薄釣翁解憐徐處士唯有李郎中立名按紀事樂天為杭州刺史令訪牡丹獨開元寺僧惠澄近於京師得之植於庭時春景方深惠澄設油幕覆其上㑹凝自富春來未識白先題詩曰此花南地知誰種慙媿僧閑用意栽海燕解憐頻睥睨胡蠭未識更徘徊虛生芍藥徒勞妒羞殺玫瑰不敢開惟有數苞紅萼在含芳只待舍人來白尋到寺看花乃命徐同醉而歸時張祜榜舟而至二生各希首薦白曰二君論文若廉之鬭䑕穴勝負在於一戰也遂試長劒倚天外賦餘霞散成綺詩試訖解送凝為元祜次耳祜曰祜詩有地勢遥尊岳河流側讓闗又題金山寺詩曰樹影中流見鐘聲兩岸聞雖綦毋潛云墖影挂清漢鐘聲扣白雲此句未為佳也凝曰美則美矣爭如老夫今古長如白練飛一條界破青山色凝遂擅場祜歎曰榮辱糺紛亦何常也遂行歌而邁凝亦鼓枻而歸自是二生不隨鄉試矣白又以祜宫調四句皆數對未足竒也後杜牧守秋浦與祜為詩酒友酷吟祜宫詞以白有非祜之論常不平之乃為詩以髙之曰睫在眼前人不見道於身外更何求誰人得似張公子千首詩輕萬户侯又曰如何故國三千里虚唱歌詞滿六宫杜盛言其美者欲以苟異於白而曲成於張也蘇州故吏江南故吏别來久今日池邊識我無不獨使君頭似雪華亭鶴死白蓮枯蓮鶴皆蘇州同來得楊湖州書頗誇撫民接賓縱酒題詩因以絶句戲之豈獨愛民兼愛客不唯能飲又能文白蘋洲上春傳語栁使君輸楊使君附白蘋洲五亭記湖州城東南二百步抵霅溪連汀洲一名白蘋梁吴興守栁惲於此賦詩云汀洲採白蘋因以為名也前不知幾千萬年後又數百載有名無亭鞠為荒澤至大厯十一年顔魯公真卿為刺史始剪榛導流作八角亭以游息焉旋屬災潦荐至沼湮臺圯後又數十載萎蕪隙地至開成三年𢎞農亭楊君為刺史乃疏四渠濬二池樹三園搆五卉木荷竹舟橋廊室洎逰宴息宿之具靡不備焉觀其架大溪跨長汀者謂之白蘋亭介二園閟百卉者謂之集芳亭面廣池目列岫者謂之山光亭翫晨曦者謂之朝霞亭狎清漣者謂之碧波亭五亭間開萬象迭入嚮背俯仰勝無遁形毎至汀風春溪月秋花緐鳥啼之旦蓮開水香之夕賓友集歌吹作舟棹徐動觴詠半酣飄然怳然逰者相顧咸曰此不知方外也人間也又不知蓬瀛崐閬復何如哉時予守官在洛陽楊君緘書齎圖請予為記予按圖握筆心存目想覼縷梗槩十不得其二三大凡地有勝境得人而後發人有心匠得物而後開境心相遇固有時邪蓋是境也實栁守濫觴之顔公推輪之揚君繪素之三賢始終能事畢矣楊君前牧舒舒人治今牧湖湖人康康之由革弊興利若改茶法變稅書之類是也利興故府有羨財政成故居多暇日是以餘力濟髙情成勝槩三者旋相為用豈偶然哉昔謝栁為郡樂山水多髙情不聞善政龔黄為郡憂黎庶有善政不聞勝槩兼而有者其吾友楊君乎君名漢公字用乂恐年祀久逺來者不知故名而字之時開成四年十月十五日記天宫閣秋晴晩望洛城秋霽後梵閣暮登時此日風煙好今秋節候遲霞光紅泛豔樹影碧參差莫慮言歸晩牛家有宿期酬夢得暮秋晴夜對月相憶霽月光如練盈庭復滿池秋深無熱後夜淺未寒時露葉圑荒菊風枝落病棃相思嬾相訪應是各年衰同夢得和思黯見贈來詩中先敘三人同讌之歡次有歎鬢髪漸衰嫌孫子催老之意因酬妍唱兼吟鄙懐醉伴騰騰白與劉何朝何夕不同逰留連燈下明猶飲斷送尊前倒即休催老莫嫌孫穉長加年須喜鬢毛秋教他伯道爭存活無子無孫亦白頭聴歌管妙絃清歌入雲老人合眼醉醺醺誠知不及當年聴猶覺聞時勝不聞三年冬隨事鋪設小堂寢處稍似穩暖因念衰病偶吟所懐小宅非全陋中堂不甚卑聊堪㑹親族足以貯妻兒暖帳迎冬設温爐向夜施裘新青兔褐褥軟白猿皮似鹿眠深草如雞宿穩枝逐身安枕席隨事有屏帷病致衰殘早貧營活計遲由來蠶老後方是蠒成時初冬即事呈夢得青氊帳暖喜微雪紅地爐深宜早寒走筆小詩能和否潑醅新酒試嘗看僧來乞食因留宿客到開尊便共歡臨老交親零落盡希君恕我取人寛自罷河南已換七尹每一入府悵然舊逰因宿内㕔偶題西壁兼呈韋尹常侍每日河南府依然似到家杯嘗七尹酒七尹酒味不同備嘗之矣樹看十年花即府中新果園且健須歡喜雖衰莫歎嗟迎門無故吏侍坐有新娃暖閣謀宵宴寒庭放晩衙主人留宿定一任夕陽斜天寒晩起引酌詠懐寄許州王尚書汝州李常侍葉覆氷池雪滿山日髙慵起未開關寒來更亦無過醉老後何由可得閑四海故交唯許汝十年貧健是樊蠻相思莫忘櫻桃㑹一放狂歌一破顔櫻桃花時數與許汝二君歡㑹甚樂四年春栁梢黄嫩草芽新又入開成第四春近日放慵多不出少年嫌老可相親分司吉傅頻過舍致仕崔卿擬卜鄰時輩推遷年事到往還多是白頭人白髮白髮生來三十年而今鬚鬢盡皤然歌吟終日如狂叟衰疾多時似痩仙八戒夜持香火印三元朝念蘂珠篇其餘便被春收拾不作閒逰即醉眠追歡偶作追歡逐樂少閒時補貼平生得事遲何處花開曽後看誰家酒熟不先知石樓月下吹蘆管金谷風前舞栁枝十聴春啼變鶯舌三嫌老醜換蛾睂樂天一過難知分猶自咨嗟兩鬢絲蘆菅栁枝巳下皆十年來洛中之事公垂尚書以白馬見寄光潔穩善以詩謝之翩翩白馬稱金羈領綴銀花尾曵絲毛色鮮明人盡愛性靈馴善主偏知免将妾換慙來處試使奴牽欲上時不蹶不驚行步穩最宜山簡醉中騎西樓獨立身著白衣頭似雪時時醉立小樓中路人廻顧應相怪十一年來見此翁書事詠懐官俸将生計雖貧豈敢嫌金多輸陸賈酒足勝陶潛陶潛詩云常苦酒不足牀暖僧敷坐樓晴妓巻簾日遭齋破用每月常持十齋春賴閏加添是年閏正月也老向歡彌切狂於飲不廉十年閒未足亦恐涉無厭酬夢得比萱草見贈來篇云唯君比萱草相見可㤀憂杜康能散悶萱草解㤀憂借問萱逢杜何如白見劉老衰勝少夭閑樂笑忙愁試問同年内何人得白頭問皇甫十苦樂心由我窮通命任他坐傾張翰酒行唱接輿歌榮盛傍看好優閑自適多知君能斷事勝負兩如何早春獨登天宫閣天宫日暖閣門開獨上迎春飲一杯無限逰人遥怪我縁何最老最先來送蘇州李使君赴郡二絶句憶抛印綬辭吳郡衰病當時巳有餘今日賀君兼自喜八廻看換舊銅魚予自罷蘇州及兹換八刺史矣館娃宫深春日長館娃宫今靈巖寺也烏鵲橋髙秋夜涼烏鵲橋在蘇州南門風月不知人世變奉君直似奉吳王長洲曲新詞茂苑綺羅佳麗地女湖桃李豔陽時心奴巳死胡容老後輩風流是阿誰白香山詩集巻三十五
