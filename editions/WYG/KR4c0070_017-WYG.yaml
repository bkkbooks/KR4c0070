body:
  text: 白香山詩集巻十七歙縣汪立名編長慶集十七律詩五言七言凡一百首江南謫居十韻自哂沈冥客曾為獻納臣壯心徒許國薄命不如人纔展凌雲翅俄成失水鱗葵枯猶向日蓬斷欲一作即辭春澤畔長愁地天邊欲老身蕭條殘活計冷落舊交親草合門無徑煙銷甑有塵憂方知酒聖貧始覺錢神虎尾難容足羊腸易覆輪行藏與通塞一切任陶鈞江樓夜吟元九律詩成三十韻昨夜江樓上吟君數十篇詞飄朱檻底韻墮渌江前清楚音諧律精微思入𤣥收將白雪麗奪盡碧雲妍寸截金為句雙雕玉作聨八風淒間發五彩爛相宣氷扣聲聲冷珠排字字圓文頭交比繡筋骨輭於綿澒湧同波浪錚鏦過管絃醴泉流出地鈞樂下從天神鬼聞如泣魚龍聽似禪星廻疑聚集月落為留連鴈感無鳴者猿愁亦悄然交流遷客淚停住賈人船闇被歌姬乞潛聞思婦傳斜行題粉壁短巻冩紅箋肉味經時忘頭風當日痊老張知定伏短李愛應顛張十八籍李二十紳皆工律詩故云道屈才方振身閒業始專天敎聲烜赫理合命迍邅顧我文章劣知他氣力全功夫雖共到巧拙尚相懸各有詩千首俱抛海一邊白頭吟處變青眼望中穿酬答朝妨食披尋夜廢眠老償文債負宿結字因縁每歎陳夫子陳子昂著感興詩稱於世常嗟李謫仙賀知章謂李白為謫仙名髙折人爵思苦減天年陳竟無官李亦早夭不得當時遇空令後代憐相悲今若此湓浦與通川潯陽嵗晩寄元八郎中庾三十二員外閱水年將暮燒金道未成丹砂不肯死白髪自須生病肺慙杯滿衰顔忌鏡明春深舊鄉夢嵗晩故交情一别浮雲散雙瞻列宿榮螭頭階下立龍尾道前行封事頻聞奏除書數見名虚懷事僚友平步取公卿漏盡雞人報朝囘幼女迎可憐白司馬老大在湓城元九以緑絲布白輕容見寄製成衣服以詩報知緑絲文布素輕容珍重京華手自封貧友逺勞君寄附病妻親為我裁縫袴花白似秋雲薄衫色青於春艸濃欲著却休知不稱折腰無復舊形容立名按齊東野語元微之寄白輕容樂天製而為衣而詩中容字乃為流俗妄改為庸又作􅀈褣葢不知其所出也唐類苑輕容無花薄紗也王建宫詞嫌羅不著愛輕容周賀詩蜀煙飛重錦峽雨潤輕容按容字之改葢以末句有容字耳不知唐人用字異義不嫌重押也清明日送韋侍御貶䖍州寂寞清明日蕭條司馬家留餳和冷粥出火煑新茶欲别能無酒相留亦有花南遷更何處此地已天涯九江春望淼茫積水非吾土飄泊浮萍是我身身外信縁為活計眼前隨事覓交親爐煙豈異終南色湓草寧殊渭北春此地何妨便終老匹如元是九江人香爐峰上多煙湓水岸邊足草因而記之立名按韻語陽秋云樂天鑪煙湓草二句葢不忘蔡渡舊居也老杜偶題云故山迷白閣秋水憶黄陂不忘秦中舊居也東坡横翠閣詩已見西湖懷濯錦更看横翠隱峨睂亦此意晩題東林寺雙池向晩雙池好初晴百物新裊枝翻翠羽濺水躍紅鱗萍泛同遊子蓮開當麗人臨流一惆悵還憶曲江春贈内子白髪方興歎青蛾亦伴愁寒衣補燈下小女戲床頭闇澹屏幃故淒凉枕席秋貧中有等級猶勝嫁黔婁送客春遊嶺南二十韻因序嶺南方物以贈之并擬㣲之送崔二十二之作已訝遊何逺仍嗟别太頻離容君蹙促贈語我殷勤迢遞天南面蒼茫海北漘訶陵國分界交趾郡為鄰蓊鬱三光晦温暾四氣勻隂晴變寒暑昏曉錯星辰瘴地難為老蠻陬不易馴土民稀白首洞主盡黄巾戰艦猶驚浪戎軍未息塵時黄家賊方動紅旗圍卉服紫綬裹文身麫苦桄榔裛漿酸橄欖新牙檣迎海舶銅鼓賽江神不凍貪泉暖無霜毒草春雲煙蟒蛇氣刀劒鱷魚鱗路足羇棲客官多謫逐臣天黄生􅄓母􅄓母如斷虹欲大風即見雨黑長楓人楓人因夜雷雨輒闇長數丈廻使先傳語征軒早返輪須防杯裏蠱南方蠱毒多置酒中莫愛槖中珍北與南殊俗身將貨孰親嘗聞君子誡憂道不憂貧立名按輟耕録南人方言曰溫暾者得懷暖也王建宮詞新晴草色暖温暾瀛奎律髓大抵中唐人多善言風土如西北風沙酪漿氊幄之區東南水國蠻島彞洞之外無不曲盡其妙樂天送人遊嶺南詩亦可謂曲盡南中之俗矣自題功名宿昔人多許寵辱斯須自不知一旦失恩先左降三年隨例未量移馬頭覓角生何日石火敲光住幾時前事是身俱若此空門不去欲何之自悲火宅煎熬地霜松摧折身因知羣動内易死不過人尋郭道士不遇郡中乞假來相訪洞裏朝元去不逢看院祇留雙白鶴入門惟見一青松藥爐有火丹應伏雲碓無人水自舂廬山中雲母多故以水碓擣練俗呼為雲碓欲問叅同契中事更期何日得從容潯陽春三首元和十二年作春生春生何處闇周遊海角天涯徧始休先遣和風報消息續教啼鳥說來由展張草色長河畔㸃綴花房小樹頭若到故園應覔我為傳淪落在江州春來春來觸動故鄉情忽見風光憶兩京金谷蹋花香騎入曲江碾草鈿車行誰家緑酒歡連夜何處紅樓睡失明獨有不眠不醉客經春冷坐古湓城春去一從澤畔為遷客兩度江頭送暮春白髪更添今日鬢青衫不改去年身百川未有囘流水一老終無却少人四十六時三月盡送春爭得不殷勤夢微之十二年八月二十日夜晨起臨風一惆悵通川湓水斷相聞不知憶我因何事昨夜三更夢見君贈韋鍊師潯陽遷客為居士身似浮雲心似灰上界女仙無嗜慾何因相顧兩徘徊共疑過去人間世曾作誰家夫婦來問劉十九緑螘新醅酒紅泥小火爐晚來天欲雪能飲一杯無得行簡書聞欲下峽先以此寄朝來又得東川信欲取春初發梓州書報九江聞蹔喜路經三峽想還愁瀟湘瘴霧加餐飯灎澦驚波穩泊舟欲寄兩行迎爾淚長江不肯向西流南湖早春風廻雲斷雨初晴返照湖邊暖復明亂㸃碎紅山杏發平鋪新緑水蘋生翅低白鴈飛仍重舌澀黄鸝語未成不道江南春不好年年衰病減心情元十八從事南海欲出廬山臨别舊居有戀泉聲之什因以投和兼伸别情賢侯辟士禮從容莫戀泉聲問所從雨露初承黄紙詔煙霞欲别紫霄峰傷弓未息新驚鳥得水難留久卧龍我正退藏君變化一杯可易得相逢題韋家泉池泉落青山出白雲縈邨繞郭幾家分自從引作池中水深淺方圓一任君醉中對紅葉臨風杪秋樹對酒長年人醉貌如霜葉雖紅不是春遣懷羲和走馭趁年光不許人間日月長遂使四時都似電爭教兩鬢不成霜榮銷枯去無非命壯盡衰來亦是常已共身心要約定窮通生死不驚忙㸃額魚龍門㸃額意何如紅尾青鬐却返初見說在天行雨苦為龍未必勝為魚聞龜兒詠詩憐渠已解詠詩章揺膝支頤學二郎莫學二郎吟太苦纔年四十鬢如霜對酒未濟卦中休卜命叅同契裏莫勞心無如飲此銷愁物一餉愁銷直萬金東牆夜合樹去秋為風雨所摧今年花時悵然有感碧荑紅縷今何在風雨飄將去不囘惆悵去年牆下地今春惟有薺花開病起病不出門無限時今朝强出與誰期經年不上江樓醉勞動春風颺酒旗夢亡友劉太白同遊彰敬寺三千里外卧江州十五年前哭老劉昨夜夢中彰敬寺死生魂魄蹔同遊與果上人殁時題此訣别兼簡二林僧社本一作願結菩提香火社為嫌煩惱電泡身不須惆悵從師去先請西方作主人贈寫真者子騁丹青日予當醜老時無勞役神思更畫病容儀迢遞麒麟閣圖功未有期區區尺素上焉用寫真為劉十九同宿時淮冦初破紅旗破賊非吾事黄紙除書無我名惟共嵩陽劉處士圍棊賭酒到天明十二年冬江西温暖喜元八寄金石稜一作凌到因題此詩今冬臘候不嚴凝暖霧温風氣上騰山脚崦中纔有雪江流慢處亦無氷欲將何藥防春瘴只有元家金石稜閒意不爭榮耀任沈淪日與時疏共道親北省朋僚音信斷東林長老往還頻病停夜食閒如社慵擁朝裘暖似春漸老漸諳閒氣味終身不擬作忙人送友人上峽赴東川辟命見說瞿塘峽斜銜一作横灎澦根難於尋鳥道險過上龍門羊角風頭急桃花水色渾山廻若鼇轉舟入似鯨吞岸合愁天斷波跳恐地翻憐君經此去為感主人恩夜送孟司功潯陽白司馬夜送孟功曹江闇管絃急樓明燈火髙湖波翻似箭霜草殺如刀且莫開征棹隂風正怒號衰病老辭遊冶尋花伴病别荒狂舊酒徒更恐五年三嵗後些些談笑亦應無題詩屏風絶句并序十二年冬微之猶滯通州予亦未離湓上相去萬里不見三年鬱鬱相念多以吟詠自解前後辱微之寄示之什殆數百篇雖藏篋中永以為好不若置之座右如見所思繇是掇律句中短小麗絶者凡一百首題録合為一屏風舉目㑹心叅若其人在於前矣前輩作事多出偶然則安知此屏不為好事者所傳異日作九江一故事爾因題絶句聊以奬之相憶采君詩作障自書自勘不辭勞障成定被人爭寫從此南中紙價髙答微之微之於閬州西寺手題予詩予又以微之百篇題此屏上各以絶句相報答之君寫我詩盈寺壁我題君句滿屏風與君相遇知何處兩葉浮萍大海中偶宴有懷遇興尋文客因歡命酒徒春遊憶親故夜㑹似京都詩思閒仍在鄉愁醉蹔無狂來欲起舞慙見白髭鬚山中酬江州崔使君見寄眷眄情無限優容禮有餘三年為郡吏一半許山居酒熟心相待詩來手自書庾樓春好醉明日且囘車山枇杷深山老去惜年華況對東溪野枇杷火樹風來翻絳燄瓊枝日出曬紅紗囘看桃李都無色映得芙蓉不是花爭奈結根深石底無因移得到人家聞李尚書拜相因以長句寄賀微之憐君不久在通川知己新提造化權䕫卨定求才濟世張雷應辨氣衝天那知淪落天涯日正是陶鈞海内年肯向泥中抛折劒不收重鑄作龍泉嵗暮窮隂急景坐相催壯齒韶顔去不囘舊病重因年老發新愁多是夜長來膏明自爇縁多事鴈黙先烹為不才禍福細尋無㑹處不如且進手中杯雨中赴劉十九二林之期及到寺劉已先去因以四韻寄之雲中臺殿泥中路既阻同遊嬾却還將謂獨愁猶對雨不知多興已尋山纔應行到千峰裏只校來遲半日間最惜杜鵑花爛熳春風吹盡不同攀薔薇正開春酒初熟因招劉十九張大夫崔二十四同飲甕頭竹葉經春熟階底薔薇入夏開似火淺深紅壓架如餳氣味緑粘臺試將詩句相招去倘有風情或可來明日早花應更好心期同醉卯時杯李白墓采石江邊李白墳繞田無限草連雲可憐荒隴窮泉骨曾有驚天動地文但是詩人多薄命就中淪落不過君對酒漫把參同契難燒伏火砂有時成白首無處問黄芽幻世如泡影浮生抵眼花惟將緑醅酒且替紫河車戲答諸少年顧我長年頭似雪饒君壯嵗氣如雲朱顔今日雖欺我白髪他時不放君風雨晩泊苦竹林邊蘆葦叢停舟一望思無窮青苔撲地連春雨白浪掀天盡日風忽忽百年行欲半茫茫萬事坐成空此生飄蕩何時定一縷鴻毛天地中題崔使君新樓憂人何處可銷憂碧甃紅闌湓水頭從此潯陽風月夜崔公樓替庾公樓山中戲問韋侍御我抱棲雲志君懷濟世才常吟反招隱那得入山來贈曇禪師夢中作五年不入慈恩寺今日尋師始一來欲知火宅焚燒苦方寸如今化作灰寄微之帝城行樂日紛紛天畔窮愁我與君秦女笑歌春不見巴猿啼哭夜嘗聞何處琵琶絃似語誰家卨墮髻如雲人生多少歡娛事那獨千分無一分醉吟二首空王百法學未得姹女丹砂燒即飛事事無成身老也醉鄉不去欲何歸兩鬢千莖新似雪十分一琖欲如泥酒狂又引詩魔發日午悲吟到日西曉寢轉枕重安寢囘頭一欠伸紙窻明覺曉布被煖知春莫强疎慵性須安老大身雞鳴猶獨睡不博早朝人答元八郎中楊十二博士身覺一作學浮雲無所著心同止水有何情但知瀟灑疎朝市不要﨑嶇隱姓名盡日觀魚臨澗坐有時隨鹿上山行誰能抛得人間事來共騰騰過此生湖亭與行簡宿潯陽少有風情客招宿湖亭盡却囘水檻虚凉風月好夜深惟共阿怜來按阿怜行簡小字也八月十五日夜湓亭望月昔年八月十五夜曲江池畔杏園邊今年八月十五夜湓浦沙頭水館前西北望鄉何處是東南見月幾囘圓臨風一嘆無人㑹今夜清光似往年贈江客江栁影寒新雨地塞鴻聲急欲霜天愁君獨向沙頭宿水繞蘆花月滿船殘暑招客雲截山腰斷風驅雨脚囘早隂江上散殘暑日中來却取生衣著重拈小簟開誰能淘晩熱閒飲兩三杯潯陽秋懷贈許明府霜紅二林葉風白九江波暝色投煙鳥秋聲帶雨荷馬閒無處出門冷少人過鹵莽還鄉夢依稀望闕歌共思除醉外無計奈愁何試問陶家酒新篘得幾多九日醉吟有恨頭還白無情菊自黄一為州司馬三見嵗重陽劒匣塵埃滿籠禽日月長身從漁父笑門任雀羅張問疾因留客聽吟偶置觴歎時論倚伏懷舊數存亡奈老應無計治愁或有方無過學王績惟以醉為鄉立名按老學菴筆記白詩四十著緋軍司馬及一為州司馬此音司字作入聲讀又芥隱筆談白詩燕姬酌蒲桃金屑琵琶槽蒲琵字皆從仄聲問韋山人山甫身名身事兩蹉跎試就先生問若何從此神仙學得否白鬚雖有未為多送蕭鍊師步虚詞十首巻後以二絶繼之欲上瀛州臨别時贈君十首步虚詞天仙若愛應相問向道江州司馬詩花紙瑶緘松墨字把將天上共誰開試呈王母如堪唱發遣雙成更取來贈李兵馬使身得貳師餘氣槩家藏都尉舊詩章江南别有樓船將燕頷虯鬚不姓楊題遺愛寺前溪松偃亞長松樹侵臨小石溪靜將流水對髙共逺峰齊翠葢煙籠密花幢雪壓低與僧清影坐借鶴穩枝棲筆寫形難似琴偷韻易迷暑天風摵摵一作瑟瑟晴夜露凄凄獨憇依為舍閒行繞作蹊棟梁君莫採留著伴幽棲廬山草堂夜雨獨宿寄牛二李七庾三十二員外丹霄攜手三君子白髪垂頭一病翁蘭省花時錦帳下廬山雨夜草菴中終身膠漆心應在半路雲泥迹不同惟有無生三昧觀榮枯一照兩成空聞揚十二新拜省郎遥以詩賀文昌新入有光輝紫界宮牆白粉圍曉日雞人傳漏箭春風侍女護朝衣雪飄歌句髙難和鶴拂煙霄老慣飛官職聲名俱入手近來詩客似君稀頃曾有贈楊詩落句云不用更教詩過好折君官職是詩名今故云俱入手三月三日懷微之良時光景長虚擲壯嵗風情已闇銷忽憶同為校書日每年同醉是今朝贈韋八辭君嵗久見君初白髪驚嗟兩有餘容鬢别來今至此心情料取合何如曾同曲水花亭醉亦共華陽竹院居豈料天南相見夜哀猿瘴霧宿匡廬春江閒步贈張山人江景又妍和牽愁發浩歌晴沙金屑色春水麴塵波紅簇交枝杏青含巻葉荷藉莎憐輭暖憩樹愛婆娑書信朝賢斷知音野老多相逢不閒語爭奈日長何春聽琵琶兼簡長孫司户四絃不似琵琶聲亂寫真珠細撼鈴指底商風悲颯颯舌頭胡語苦醒醒如言都尉思京國似訴明妃厭虜庭遷客共君相勸諫春腸易斷不須聽吳宮詞一入吳王殿無人覩翠蛾樓髙時見舞宮靜夜聞歌半露胷如雪斜廻臉似波妍媸各有分誰敢妒恩多送韋侍御量移金州司馬時予官獨未出春歡雨露同霑澤冬歎風霜獨滿衣留滯多時如我少遷移好處似君稀卧龍雲到須先起蟄燕雷驚尚未飛莫恨東西溝水别滄溟長短擬同歸自到潯陽生三女子因詮真理用遣妄懷宧途本自安身拙世累由來向老多逺謫四年徒已矣晚生三女擬如何預愁嫁娶真成患細念因縁盡是魔賴學空王治苦法須抛煩惱入頭陀江西裴常侍以優禮見待又蒙贈詩輒敘鄙誠用伸感謝一從簪笏事金貂每借温顔放折腰長覺身輕離泥滓忽驚手重捧瓊瑶馬因囘顧雖增價桐遇知音已半焦他日秉鈞如見念壯心直氣未全銷自江州司馬授忠州刺史仰荷聖澤聊書鄙誠炎瘴抛身逺泥塗索脚難網初鱗撥刺籠久翅摧殘雷電頒時令陽和變嵗寒遺簪承舊念剖竹授新官鄉覺前程近心隨外事寛生還應有分西笑問長安除忠州寄謝崔相公提拔出泥知力竭吹嘘生翅見情深劒鋒缺折難衝斗桐尾燒焦豈望琴感舊兩行年老淚酬恩一寸嵗寒心忠州好惡何須問鳥得辭籠不擇林初除官蒙裴常侍贈鶻銜瑞草緋袍魚袋因謝惠貺兼抒離情新授銅符未著緋因君裝束始光輝惠深范叔綈􅂁贈榮過蘇秦佩印歸魚綴白金隨步躍鶻銜紅綬繞身飛明朝戀别朱門淚不敢多垂恐汙衣洪州逢熊孺登靖安院裏辛夷下醉笑狂吟氣最粗莫問别來多少苦低頭看取白髭鬚初著刺史緋答友人見贈故人安慰善為辭五十專城道未遲徒使花袍紅似火其如蓬鬢白成絲且貪薄俸君應惜不稱衰容我自知銀印可憐將底用只堪歸舍嚇妻兒又答賀客銀章蹔假為專城賀客來多嬾起迎似挂緋衫衣架上朽株枯竹有何榮别草堂三絶句正聽山鳥向陽眠黄紙除書落枕前為感君恩須蹔起爐峰不擬住多年久眠褐被為居士忽挂緋袍作使君身出草堂心不出廬山未要動一作勒移文三間茅舍向山開一帶山泉繞舍廻山色泉聲莫惆悵三年官滿却歸來鍾陵餞送翠幕紅筵髙在雲歌鐘一曲萬家聞路人指㸃滕王閣看送忠州白使君潯陽宴别此後忠州路上作鞍馬軍城外笙歌祖帳間乘潮發湓口帶雪别廬山暮景牽行色春寒散醉顔共嗟炎瘴地盡室得生還戲贈户部李廵官好語一作去民曹李判官少貪公事且謀歡男兒未死爭能料莫作忠州刺史看行次夏口先寄李大夫連山斷處大江流紅斾逶迤鎮上遊幕下翺翔秦御史軍前奔走漢諸侯曾陪劒履升鸞殿欲謁旌幢入鶴樓假著緋袍君莫笑恩深始得向忠州重贈李大夫早接清班登玉陛同承别詔直金鑾鳯巢閣上容身穩鶴鏁籠中展翅難流落多年應是命量移逺郡未成官慙君獨不欺顦顇猶作銀臺舊眼看對鏡吟閒看明鏡坐清晨多病姿容半老身誰論情性乖時事自想形骸非貴人三殿失恩宜放棄九宮推命合漂淪如今所得須甘分腰佩銀龜朱兩輪江州赴忠州至江陵以來舟中示舍弟五十韻昔作咸秦客常思江海行今來仍盡室此去又專城典午猶為幸分憂固是榮簈篂州乘送艛艓驛船迎共載皆妻子同遊即弟兄寧辭浪迹逺且貴賞心并雲展帆髙掛飈馳櫂迅征泝流從漢浦循路轉荆衡山逐時移色江隨地改名風光近東早水木向南清夏口煙孤起湘川雨半晴日煎紅浪沸月射白砂明北渚寒留雁南枝暖待鶯駢朱桃露萼㸃翠栁含萌亥市魚鹽聚神林鼓笛鳴壺漿椒葉氣歌曲竹枝聲繫纜憐沙靜垂綸愛岸平水餐紅粒稻野茹紫花菁甌泛茶如乳臺粘酒似餳膾長抽錦縷藕脆削瓊英容易來千里斯須進一程未曾勞氣力漸覺有心情卧穩添春睡行遲帶酒醒忽愁牽世網便欲濯塵纓早接文場戰曾爭翰苑盟掉頭稱俊造翹足取公卿且昧隨時義徒輸報國誠衆排恩易失偏壓勢先傾虎尾憂危切鴻毛性命輕燭蛾誰救護蠶繭自纒縈斂手辭雙闕囘眸望兩京長沙抛賈誼漳浦卧劉楨鶗鴂鳴還歇蟾蜍破又盈年光同激箭鄉思極揺旌潦倒親知笑衰羸舊識驚烏頭因感白魚尾為勞赬劒學將何用丹燒竟不成孤舟萍一葉雙鬢雪千莖老見人情盡閒思物理精如湯探冷熱似博鬭輸贏險路應須避迷途莫共爭此心知止足何物要經營玉向泥中潔松經雪後貞無妨隱朝市不必謝寰瀛但在前非悞期無後患嬰多知非景福少語是元亨晦即全身藥明為伐性兵昏昏隨世俗蠢蠢學黎甿鳥以能言􅀈龜縁入夢烹知之一何晩猶足保餘生題岳陽樓岳陽城下水漫漫獨上危樓凭曲闌春岸緑時連夢澤夕波一作陽紅處近長安猿攀樹立啼何苦鴈㸃湖飛渡亦難此地惟堪畫圖障華堂張與貴人看入峽次巴東不知逺郡何時到猶喜全家此去同萬里王程三峽外百年生計一舟中巫山暮足霑花雨隴水春多逆浪風兩片紅旌數聲鼓使君艛艓上巴東立名按容齋隨筆杜子美詩夜足霑沙雨春多逆水風樂天巫山隴水二句全用之十年三月三十日别微之於灃上十四年三月十一日夜遇微之於峽中停舟夷陵三宿而别言不盡者以詩終之因賦七言十七韻以贈且欲記所遇之地與相見之時為他年會話張本也附三遊洞序平淮西之明年冬予自江州司馬授忠州刺史微之自通州司馬授虢州長史又明年春各祇命之郡與知退偕行三月十日叅㑹於夷陵翌日微之反櫂送予至下牢戍又翌日將别未忍引舟上下者久之酒酣聞石間泉聲因舍櫂進䇿步入缺岸初見石如疊如削其怪者如引臂如垂幢次見泉如㵼如灑其竒者如懸練如不絶綫遂相與維舟巖下率僕夫芟蕪刈翳梯危縋滑休而復上者凡四焉仰睇俯察絶無人迹但水石相薄磷磷鑿鑿跳珠濺玉驚動耳目自未訖戍愛不能去俄而峡山昏黒雲破月出光氣含吐互相明滅晶熒玲瓏象生其中雖有敏口不能名狀既而夕不寐迨旦將去憐竒惜别且歎且言知退曰斯境勝絶天地間其有幾乎如之何俯通津緜嵗代寂寥委置䍐有到者予曰借此喻彼可為長太息豈獨是哉豈獨是哉微之曰誠哉是言矧吾人難相逢斯境不易得今兩偶於是得無述乎請各賦古調詩二十韻書於石壁仍命予序而紀之又以吾三人始遊故因為三遊洞洞在峽州上二十里北峰下兩崖相廞間欲將來好事者知故備書其事灃水店頭春盡日送君上馬謫通川夷陵峽口明月夜此處逢君是偶然一别五年方見面相攜三宿未廻船坐從日暮惟長歎語到天明竟未眠齒髮蹉跎將五十關河迢遞過三千生涯共寄滄江上鄉國俱抛白日邊往事渺茫都似夢舊遊零落半歸泉醉悲灑淚春杯裏吟苦支頤曉燭前莫問龍鍾惡官職且聽清脆好詩篇微之别來有新詩數百篇麗絶可愛别來只是成詩癖老去何曾更酒顛各限王程須去住重開離宴貴留連黄牛渡北移征櫂白狗崖東巻别筵黄牛白狗皆峽中地名即與微之遇别之所也神女臺雲閒繚繞使君灘水急潺湲風淒暝色愁楊栁月弔宵聲哭杜鵑萬丈赤幢潭底日一條白練峽中天君還秦地辭炎徼我向忠州入瘴煙未死㑹應相見在又知何地復何年立名按集中但載此序而其詩已缺焉即元集亦無此詩可見元白詩亡失者多矣因其與十七韻同時故附存原序備考題峽中石上巫女廟花紅似粉昭君邨栁翠於睂誠知老去風情少見此爭無一句詩立名按雲溪友議樂天除忠州刺史自峽沿流赴郡時秭歸縣繁知一聞樂天將過巫山先于神女祠粉壁大書曰忠州刺史今才子行到巫山必有詩為報髙唐神女道速排雲雨候清詞白公覩題悵然邀知一至曰厯山劉郎中禹錫三年理白帝欲作一詩於此怯而不為罷郡經過悉去千餘詩但留四章而巳此四章者乃古今之絶唱也而人造次不合為之沈佺期詩巫山髙不極合沓狀竒新闇谷疑風雨幽崖若鬼神月明三峽曙潮滿九江春為問陽臺客應知入夢人王無競詩神女向髙唐巫山下夕陽徘徊作行雨婉孌逐荆王電影江前落雷聲峽外長霽雲無處所臺館曉蒼蒼皇甫冉詩巫峽見巴東迢迢出半空雲藏坤女館雨到楚王宮朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中李端詩巫山十二重皆在碧巖中㢠廻合雲藏日霏㣲雨帶風猿聲寒度水樹色暮連空悲向髙唐去千秋見楚宮白公但吟此四篇與繁生同濟卒不賦詩白香山詩集巻十七
