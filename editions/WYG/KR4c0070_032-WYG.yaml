body:
  text: 白香山詩集巻三十二歙縣汪立名編後集二律詩凡九十六首七年元日對酒五首慶弔經過嬾逢迎跪拜遲不因時節日豈覺此時衰衆老憂添嵗余衰喜入春年開第七秩屈指幾多人三杯藍尾酒一楪膠牙􅄳除却崔常侍無人共我爭今朝吳與洛相憶一欣然夢得君知否俱過本命年余與蘇州劉郎中同壬子嵗今年六十二同嵗崔何在同年杜又無余與吏部崔相公甲子同嵗與循州杜相公及第同年秋冬二人俱逝應無藏避處只有且歡娛七年春題府㕔潦倒守三川因循渉四年推誠廢鉤距示恥用蒲鞭以此稱公事將何銷俸錢雖非好官職嵗久亦妨賢早春醉吟寄太原令狐相公蘇州劉郎中雪夜閒逰多秉燭花時蹔出亦提壺别來少遇新詩敵老去難逢舊飲徒大振威名降北虜勤行惠化活東吳不知歌酒騰騰興得似河南醉尹無洛下送牛相公出鎮淮南北闕至東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白鬚無一莖萬人開路看百吏立班迎閫外君彌重尊前我亦榮何須身自得将相是門生元和初牛相公應制䇿登第三等余為翰林考覈官箏雲髻飄蕭緑花顔旖旎紅雙眸剪秋水十指剥春蔥楚豔為門閥秦聲是女工甲明銀玓瓅柱觸玉玲瓏猨苦啼嫌月鶯嬌語䛏風移愁来手底送恨入絃中趙瑟清一作情相似胡琴鬧一作調不同慢彈廻斷鴈急奏轉飛蓬霜珮鏘還委氷泉咽復通珠聮千拍碎刀截一聲終綺麗精神定矜能意態融歇時情不斷休去思無窮燈下青春夜一作清歌夜尊前白首翁且聴應得在老耳未多聾洛中春逰呈諸親友莫歎年将暮須憐嵗又新府中三遇臘洛下五逢春春樹花珠顆春塘水麴塵春娃無氣力春馬有精神詠春逰一時之態並轡鞭徐動連盤酒慢巡經過舊鄰里追逐好交親笑語銷閑日酣歌送老身一生歡樂事亦不少於人酬舒三員外見贈長句自請假來多少日五旬光景佀須臾巳判到老為狂客不分當春作病夫楊栁花飄新白雪櫻桃子綴小紅珠頭風不敢多多飲能酌三分相勸無将歸一絶欲去公門返野扉預思泉竹巳依依更憐家醖迎春􅌻一甕醍醐待我歸罷府歸舊居自此後重授賓客歸履道宅作陋巷乘籃入朱門挂印廻腰間抛組綬纓上拂塵埃屈曲閒池沼無非手自開青蒼好竹樹亦是眼看栽石片擡琴匣松枝閣酒杯此生終老處昨日却歸來睡覺偶吟官初罷後歸來夜天欲明前睡覺時起坐思量更無事身心安樂更誰知問支琴石疑因星隕空中落歎被泥埋澗底沈天上定應勝地上支機未必及支琴提攜拂拭知恩否雖不能言合有心自喜身慵難勉强性拙易遲廻布被辰時起柴門午後開忙驅能者去閒逐鈍人來自喜誰能㑹無才勝有才裴常侍以題薔薇架十八韻見示因廣為三十韻以和之託質依髙架攢華對小堂晩開春去後獨秀院中央霽景朱明早芳時白晝長穠因天與色麗共日爭光剪碧排千萼研朱染萬房煙條塗石緑粉蘂撲雌黄根動彤雲涌枝揺赤羽翔九微燈炫轉七寶帳熒煌淑氣熏行徑清隂接歩廊照梁迷藻梲耀壁變雕牆爛若叢然火殷於葉得霜臙脂含臉笑蘇合裛衣香浹洽濡晨露玲瓏漏夕陽合羅排勘纈醉暈淺深妝乍見疑廻面遥看誤斷腸風朝舞飛燕雨夜泣蕭娘桃李慙無語芝蘭讓不芳山榴何細碎石竹苦尋常蕙慘偎䦨避蓮羞映浦藏怯教蕉葉戰妒得栁花狂豈可輕嘲詠應須痛比方畫屏風自展繡繖蓋誰張翠錦挑成字丹砂印著行猩猩凝血㸃瑟瑟蹙金匡散亂萎紅片尖纖嫩紫芒觸僧飄毳褐留妓冒羅裳寡和陽春曲多情騎省郎縁誇美顔色引出好文章東顧辭仁里語曰里仁為美又裴君所居名仁和里西歸入帝鄉假如君愛殺留著莫移将裴君題詩之次而常侍詔到唱和未竟而軒騎西歸故云感舊詩巻夜深吟罷一長吁老淚燈前溼白鬚二十年前舊詩巻十人酬和九人無酬李二十侍郎筍老蘭長花漸稀衰翁相對惜芳菲殘鶯著雨慵休囀落絮無風凝不飛行掇木芽供野食坐牽蘿蔓挂朝衣十年分手今同醉醉未如泥莫道歸和夢得夢得來詩云謾讀圖書四十車年年為郡老天涯一生不得文章力百口空為飽煖家綸閣沈沈無寵命蘇臺籍籍有能聲豈唯不得清文力但恐空傳冗吏名郎署廻翔何水部江湖留滯謝宣城所嗟非獨君如此自古才難共命爭贈草堂宗密上人吾師道與佛相應念念無為法法能口藏宣傳十二一作五部心臺照耀百千燈盡離文字非中道長住虚空是小乘少有人知菩薩行世間只是重髙僧喜照密閒實四上人見過紫袍朝士白髯翁與俗乖疎與道通官秩三廻分洛下交逰一半在僧中臭帑古孥字世界終須出香火因縁久願同齋後将何充供養西軒泉石北窗風贈皇甫六張十五李二十三賓客昨日三川新罷守今年四皓盡分司幸陪散秩閒居日好是登山臨水時家未苦貧常醖酒身雖衰病尚吟詩龍門泉石香山月早晩同逰報一期微之敦詩晦叔相次長逝巋然自傷因成二絶并失鵷鸞侣空留麋鹿身只應嵩洛下長作獨逰人長夜君先去殘年我幾何秋風滿衫淚泉下故人多池上閒詠青莎臺上起書樓緑藻潭中繫釣舟日晩愛行深竹裏月明多上小橋頭蹔嘗新酒還成醉亦出中門便當逰一部清商聊送老白鬚蕭颯管絃秋涼風歎昨夜涼風又颯然螢飄葉墜卧牀前逢秋莫歎須知分已過潘安三十年和髙僕射罷節度讓尚書授少保分司喜遂游山水之作暫辭八座罷雙旌便作登山臨水行能以忠貞酬重任不將富貴礙髙情朱門出去簪纓從絳帳歸來歌吹迎鞍轡鬧裝光滿馬何人信道是書生送考功崔郎中赴闕稱意新官又少年秋涼身健好朝天青雲上了無多路却要徐驅穩著鞭送楊八給事赴常州無嗟别青𤨏且喜擁朱輪五十得三品百千無一人須勤念黎庶莫苦憶交親此外無過醉毗陵何限春立名按容齋隨筆太和七年以李徳裕為相文宗與論朋黨事時給事中楊虞卿蕭澣中書舍人張元夫依附權要上干執政下撓有司上惡之於是出楊刺常州蕭刺鄭州張刺汝州皆李宗閔客也他日上復言及朋黨宗閔曰臣素知之故虞卿輩皆不與美官徳裕曰給事中中書舍人非美官而何宗閔失色然則虞卿之刺毗陵乃為朝廷所逐耳聞歌者唱微之詩新詩絶筆聲名歇舊巻生塵篋笥深時向歌中聞一句未容傾耳已傷心醉送李二十常侍赴鎮浙東靖安客舍花枝下共脱青衫典濁醪今日洛橋還醉别金杯翻汙麒麟袍喧闐夙駕君脂轄酩酊離筵我藉糟好去商山紫芝伴珊瑚鞭動馬頭髙醉别程秀才五度龍門㸃額廻却縁多藝復多才貧泥客路粘難出愁鎻鄉心掣不開何必更遊京國去不如且入醉鄉來吳絃楚調瀟湘弄為我殷勤送一杯程生善琴尤能沉湘曲自詠白衣居士紫芝仙半醉行歌半坐禪今日維摩兼飲酒當時綺季不請平聲錢等閒池上留賓客隨事燈前有管絃但問此身銷得否分司氣味不論年把酒思閒事二首把酒思閒事春愁誰最深乞錢羈客面落第舉人心月下低睂立燈前抱厀吟憑君勸一醉勝與萬黄金把酒思閒事春嬌何䖏多試鞍新白馬弄鏡小青娥掌上初教舞花前欲按歌憑君勸一醉勸了問如何衰荷白露凋花花不殘涼風吹葉葉初乾無人解愛蕭條境更繞衰叢一匝看池上送考功崔郎中兼别房竇二妓文昌列宿徴還日洛浦行雲放散時鵷鷺上天花逐水無因再㑹白家池自問依仁臺廢悲風晩履信池荒宿草春晦叔亭臺在依仁微之池館在履信自問老身騎馬出洛陽城裏覓何人送陳許髙僕射赴鎮敦詩說禮中軍帥重士輕財大丈夫常與師徒同苦樂不教親故隔榮枯花鈿坐繞黄金印絲竹行隨白玉壺商皓老狂唯愛醉時時能寄酒錢無青氊帳二十韻合聚千羊毳施張百子弮司馬遷書云張空弮骨盤邊栁健色染塞藍鮮北製因戎剏南移逐虜遷汰音闥風吹不動禦雨溼彌堅有頂中央聳無隅四嚮圓旁通門豁爾内密氣温然逺别闗山外初安庭户前影孤明月夜價重苦寒年軟煖圍氊毯鎗摐束管絃最宜霜後地偏稱雪中天側置低歌座平鋪小舞筵閒多揭簾入醉便擁袍眠鐵檠移燈背銀囊帶火懸深藏曉蘭燄暗貯宿香煙獸炭休親近狐裘可棄捐研温融凍墨缾煖變春泉蕙帳徒招隠茅菴浪坐禪貧僧應歎羨寒士定留連賓客於中接兒孫向後傳王家誇舊物未及此青氊王子敬語偷兒青氊我家舊物荅夢得秋日書懐見寄幸免非常病甘當本分衰眼昏燈最覺腰痩帶先知樹葉霜紅日髭鬚雪白時悲愁縁欲老老過却無悲同諸客題于家公主舊宅平陽舊宅少人逰應是遊人到即愁布一作舂穀鳥啼桃李院絡絲蟲怨鳯皇樓臺傾滑石猶殘砌簾斷真珠不滿鉤聞道至今蕭史在髭一作鬢鬚雪白向明州立名按周益公英華辨證于家公主憲宗之女永昌公主下嫁頔之子季友元和間卒追封梁國諡惠康于頔家河南後徙京兆居易所題舊宅在洛中言公主已亾而蕭史尚在後又有寄明州于駙馬使君詩云留滯三年在浙東及海味腥鹹之語皆指明州也英華作韶州是誤以于季友為于琮也琮尚宣宗廣徳公主在大中十三年居易歿巳久至貶韶州則在咸通十三年相去更逺矣荅夢得八月十五日夜翫月見寄南國碧雲客東京白首翁松江初有月伊水正無風逺思兩鄉斷清光千里同不知娃館上何似石樓中其夜余在龍門石樓上望月初冬早起寄夢得起戴烏紗帽行披白布裘爐温先煖酒手冷未梳頭早起一作景煙霜白初寒鳥雀愁詩成遣誰和還是寄蘇州秋夜聴髙調涼州樓上金風聲漸𦂳月中銀字韻初調促張絃柱吹髙管一曲涼州入泬寥香山寺二絶空山寂靜老夫閒伴鳥隨雲往復還家醖滿缾書滿架半移生計入香山愛風巖上攀松葢戀月潭邊坐石稜且共雲泉結縁境他生當作此山僧送舒著作重授省郎赴闕三嵗相依在洛都逰花宴月飽歡娛惜别笙歌多怨咽願留軒葢少踟蹰劒磨光彩依前出鵬舉風雲逐後驅從此求閒應不得更能重醉白家無同諸客嘲雪中馬上妓珊瑚鞭嚲馬踟蹰引手低蛾索一盂腰為逆風成弱栁面因衝冷作凝酥銀箆穩篸烏羅帽花襜宜乘叱撥駒雪裏君看何所似王昭君妹寫真圖喜劉蘇州恩賜金紫遥想賀宴以詩慶之海内姑蘇太守賢恩加章綬豈徒然賀賓喜色欺杯酒醉妓歡聲遏管絃魚珮葺鱗光照地鶻銜瑞帶勢衝天莫嫌鬢上些些白金紫由來稱長年藍田劉明府攜酎相過與皇甫郎中卯時同飲醉後贈之臘月九日煖寒客卯時十分空腹杯𤣥晏舞狂烏帽落藍田醉倒玉山頺貌偷花色老蹔去歌蹋栁枝春暗來不為劉家賢聖物愁翁笑口大難開劉蘇州以華亭一鶴逺寄以詩謝之老鶴風姿異衰翁詩思深素毛如我鬢丹頂似君心松際雪相映雞羣塵不侵殷勤逺來意一隻重千金早春憶蘇州寄夢得吳苑四時風景好就中偏好是春天霞光曙後殷於火山色晴來嫩似煙士女笙歌宜月下使君金紫稱花前誠知歡樂堪留戀其柰離鄉已四年嘗新酒憶晦叔二首尊裏看無色杯中動有光自君抛我去此物共誰嘗世上强欺弱人間醉勝醒自君抛我去此語更誰聴負春病來道士教調氣老去山僧勸坐禪孤負春風楊栁曲去年斷酒到今年池上閒吟二首髙卧閒行自在身池邊六見栁條新幸逢堯舜無為日得作羲皇向上人四皓再除猶且健三川罷守未全貧莫愁客到無供給家醖香濃野菜春非莊非宅非蘭若竹樹池亭十畝餘非道非僧非俗吏褐裘烏帽閉門居夢逰信意寜殊蝶心樂身閒便是魚雖未定知生與死其間勝負兩何如早春招張賓客久雨初晴天氣新風煙草樹盡欣欣雖當冷落衰殘日還有陽和暖活身池色溶溶藍染水花光燄燄火燒春商山老伴相收拾不用隨他年少人營閑事自笑營閑事従朝到日斜澆畦引泉脈埽徑避蘭芽暖變牆衣色晴催木筆花桃根知酒渴晩送一甌茶感春老思不禁春風光照眼新花房紅鳥觜池浪碧魚鱗倚櫂誰為伴持杯自問身心情多少在六十二三人春池上戲贈李郎中滿池春水何人愛唯我廻看指似君直似挼藍新汁色與君南宅染羅帬翫半開花贈皇甫郎中八年寒食日池東小樓上作勿訝春來晩無嫌花發遲人憐全盛日我愛半開時紫蠟粘為蔕紅蘇㸃作㽔成都新夾纈梁漢碎臙脂樹杪真珠顆牆頭小女兒淺深妝駮落髙下火參差蝶戲爭香朶鶯啼選穩枝好教郎作伴合共酒相隨醉翫無勝此狂嘲更讓誰猶殘少年興未似老人詩西日憑輕照東風莫殺去聲一作㬠吹明朝應爛熳後夜即離披林下遥相憶尊前暗有期銜杯嚼蘂思唯我與君知池邊栁老香絲宛荷新鈿扇圓殘春深樹裏斜日小樓前醉遣收杯杓閒聴理管絃池邊更無事看補采蓮船家釀新􅌻每嘗輒醉妻姪等勸令少飲因成長句以諭之君應怪我朝朝飲不説向君君不知身上幸無疼痛處甕頭正是撇嘗時劉妻勸諫夫休醉王姪分疏叔不癡六十三翁頭雪白假如醒黠欲何為送常秀才下第東歸東歸多旅恨西上少知音寒食看花眼春風落日心百憂當二月一醉直千金到處公卿席無辭酒琖深且遊手裏一杯滿心中百事休春應唯仰醉老更不禁愁弄水廻船尾尋花信馬頭眼看筋力減逰得且須逰題王家莊臨水栁亭弱栁縁堤種虚亭壓水開條疑逐風去波欲上階來翠羽偷魚入紅腰學舞囘春愁正無緒爭不盡殘杯題令狐家木蘭花膩如玉指塗朱粉光似金刀剪紫霞從此時時春夢裏應添一樹女郎花拜表回閒逰玉珮金章紫花綬紵衫藤帶白綸巾晨興拜表稱朝士晩出逰山作野人達磨傳心令息念𤣥元留語遣同塵八關淨戒齋銷日一曲狂歌醉送春酒肆法堂方丈室其間豈是兩般身西街渠中種蓮曡石頗有幽致偶題小樓朱檻低牆上清流小閣前雇人栽菡萏買石造潺湲影落江心月聲移谷口泉閒看巻簾坐醉聴掩窗眠路笑淘官水家愁費料錢是非君莫問一對一翛然晩春閒居楊工部寄詩楊常州寄茶同到因以長句荅之宿酲寂寞眠初起春意䦨珊日又斜勸我加餐因早筍恨人休醉是殘花閒吟工部新來句渴飲毘陵逺到茶兄弟東西官職冷門前車馬向誰家玉泉寺南三里澗下多深紅躑躅䋣豔殊常感惜題詩以示逰者玉泉南澗花竒怪不似花叢似火堆今日多情唯我到每年無故為誰開寜辭辛苦行三里更與留連飲兩杯猶有一般孤負事不將歌舞管絃來早服雲母散曉服雲英潄井華寥然身若在煙霞藥銷日晏三匙飯酒渴春深一椀茶每夜坐禪觀水月有時行醉翫風花淨名事理人難解身不出家心出家三月晦日晩聞鳥聲晩來林鳥語殷勤似惜風光説向人遣脱破袍勞報暖催酤美酒敢辭貧聲聲勸醉應須醉一嵗唯殘半日春早夏遊平原回夏早日初長南風草木香肩輿頗平穩澗路甚清涼紫蕨行看採青梅旋摘嘗療飢兼解渴一琖冷雲漿宿天竺寺囘野寺經三宿都城復一還家仍念㛰嫁身尚繫官班蕭灑秋臨水沈吟晩下山長閒猶未得逐日且偷閒侍中晉公欲到東洛先蒙書問期宿龍門思往感今輒獻長句昔蒙興化池頭送太和三年春居易授賓客分司東來特蒙侍中於興化里池上宴送今許龍門潭上期聚散但慙長見念榮枯安敢道相思功成名遂來雖久雲臥山遊去未遲聞説風情筋力在只如初破蔡州時奉和晉公侍中蒙除留守行及洛師感恱發中斐然成詠之作鸞鳯翺翔在寥廓貂蟬蕭灑出埃塵致成堯舜昇平代收得䕫龍强健身抛擲功名還史冊分張歡樂與交親商山老皓雖休去終是留侯門下人送劉五司馬赴任硤州兼寄崔使君位下才髙多怨天劉兄道勝獨恬然貧於揚子兩三倍老過榮公六七年筆研莫抛留壓案簞瓢従陋也銷錢郡丞自合當優禮何況夷陵太守賢菩提寺上方晩眺樓閣髙低樹淺深山光水色暝沈沈嵩煙半巻青綃幕伊浪平鋪緑綺衾飛鳥滅時宜極目逺風來處好開襟誰知不離簪纓内長得逍遥自在心楊栁枝詞八首六么水調家家唱白雪梅花䖏䖏吹古歌舊曲君休聴聴取新翻楊栁枝陶令門前四五樹亞夫營裏百千條何似東都正二月黄金枝映洛陽橋依依嫋嫋復青青勾引春風無限情白雪花䋣空撲地緑絲條弱不勝鶯紅版江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂蘇州楊栁任君誇更有錢塘勝館娃若解多情尋小小緑楊深處是蘇家蘇家小女舊知名楊栁風前别有情剥條盤作銀環様巻葉吹為玉笛聲葉含濃露如啼眼枝嫋輕風似舞腰小樹不禁攀折苦乞君留取兩三條人言栁葉似愁睂更有愁腸似栁絲栁絲挽斷腸牽斷彼此應無續得期浪淘沙詞六首一泊沙來一泊去一重浪滅一重生相攪相淘無歇日㑹教山海一時平白浪茫茫與海連平沙浩浩四無邊朝去暮來淘不住遂令東海變桑田青草湖中萬里程黄梅雨裏一人行愁見灘頭夜泊䖏風翻暗浪打船聲借問江潮與海水何似君情與妾心相恨不如潮有信相思始覺海非深海底飛塵終有日山頭化石豈無時誰道小郎抛小婦船頭一去沒囘期隨波逐浪到天涯遷客生還有幾家却到帝鄉重富貴請君莫㤀浪淘沙白香山詩集巻三十二
