body:
  text: 白香山詩集巻五歙縣汪立名編長慶集五閑適古調詩五十三首常樂里閑居偶題十六韻兼寄劉十五公輿王十一起吕二炅吕四熲崔十八𤣥亮元九稹劉三十二敦質張十五仲元時為校書郎帝都名利場雞鳴無安居獨有嬾慢者日髙頭未梳工拙性不同進退迹遂殊幸逢太平代天子好文儒小才難大用典校在秘書三旬兩入省因得養頑疎茅屋四五間一馬二僕夫俸錢萬六千月給亦有餘既無衣食牽亦少人事拘遂使少年心日日常晏如勿言無知已躁靜各有徒蘭臺七八人出處與之俱旬時阻談笑旦夕望軒車誰能讐校間解帶臥吾廬窗前有竹翫門外有酒沽何以待君子數竿對一壺立名按樂天養竹記貞元十九年春居易以㧞萃選及第授校書郎始於長安求假居處得常樂里故闗相國私弟之東亭而處之明日履及於亭之東南隅見叢竹於斯盖公以十八年冬登抜萃科此正初為校書郎時也答元八宗簡同遊曲江後明日見贈長安千萬人出門各有營唯我與夫子信馬悠悠行行到曲江頭反照草樹明南山好顔色病客有心情水禽翻白羽風荷嫋翠莖何必滄浪去即此可濯纓時景不重來賞心難再并坐愁紅塵裏夕鼓鼕鼕聲歸來經一宿世慮稍復生賴聞瑶華唱再得塵襟清感時朝見日上天暮見日入地不覺明鏡中忽年三十四勿言身未老冉冉行将至白髪雖未生朱顔已先悴人生詎幾何在世猶如寄雖有七十期十人無一二今我猶未悟往往不適意胡為方寸間不貯浩然氣貧賤非不惡道在何足避富貴非不愛時來當自致所以達人心外物不能累唯當飲美酒終日陶陶醉斯言勝金玉佩服無失墜首夏同諸校正遊開元觀因宿翫月我與二三子䇿名在京師官小無職事閑於為客時沉沉道觀中心賞期在兹到門車馬迴入院巾杖隨清和四月初樹木正華滋風清新葉影鳥戀殘花枝向夕天又晴東南餘霞披置酒西廊下待月盃行遲須臾金魄生若與吾徒期光華一照耀殿角一作樓殿相參差終夜清景前笑歌不知疲長安名利地此興幾人知永崇里觀居季夏中氣候煩暑自此收蕭颯風雨天蟬聲暮啾啾永崇里巷靜華陽觀院幽軒車不到處滿地槐花秋年光忽冉冉世事本悠悠何必待衰老然後悟浮休真隱豈長逺至道在冥搜身雖世間住心與虚無遊朝飢有蔬食夜寒有布裘幸免凍與餒此外復何求寡慾雖少病樂天心不憂何以明吾志周易在床頭早送舉人入試夙駕送舉人東方猶未明自謂出太早已有車馬行騎火髙低影街鼔參差聲可憐早朝者相看意氣生日出塵埃飛群動互營營營營各何求無非利與名而我常晏起虚住長安城春深官又滿日有歸山情招王質夫自此後詩為盭厔尉時作濯足雲水客折腰簪笏身諠閒跡相背十里别經旬忽因乗逸興莫惜訪囂塵窗前故栽竹與君為主人祇役駱口因與王質夫同遊秋山偶題三韻石擁百泉合雲破千峰開平生煙霞侣此地重徘徊今日勤王意一半為山來見蕭侍御憶舊山草堂詩因以繼和琢玉以為架綴珠以為籠玉架絆野鶴珠籠鏁冥鴻鴻思雲外天鶴憶松上風珠玉信為美鳥不戀其中臺中蕭侍御心與鶴鴻同晩起慵冠豸閑行猒避驄昨見憶山詩詩思浩無窮歸夢杳何處舊居茫水東秋閑杉桂林春老芝术叢自云別山後離抱常忡忡衣繡非不榮持憲非不雄所樂不在此悵望草堂空病假中南亭閑望欹枕不視事兩日門掩闗始知吏役身不病不得閑閑意不在逺小亭方丈間西簷竹梢上坐見太白山遥媿峰上雲對此塵中顔仙遊寺獨宿沙鶴上堦立潭月當戸開此中留我宿兩夜不能迴幸與靜境遇喜無歸侣催從今獨遊後不擬共人來前庭凉夜露簟色似玉風幌影如波坐愁樹葉落中庭明月多官舍小亭閑望風竹散清韻煙槐凝綠姿日髙人吏去閑坐在茅茨葛衣禦時暑蔬飯療朝飢持此聊自足心力少營為亭上獨吟罷眼前無事時數峰太白雪一巻陶潛詩人心各自是我是良在兹迴謝爭名客甘從君所嗤早秋獨夜井梧一作桐凉葉動鄰杵秋聲發獨向簷下眠覺來半床月聴彈古淥水琴曲名聞君古淥水使我心和平欲識慢流意為聴疎汎聲西窗竹隂下竟日有餘清松齋自題時為翰林學士非老亦非少年過三紀餘非賤亦非貴朝登一命初才小分易足心寛體長舒充腸皆美食容䣛即安居况此松齋下一琴數帙書書不求甚解琴聊以自娛夜直入君門晩歸臥吾廬形骸委順動方寸付空虚持此将過日自然多晏如昏昏復黙黙非智亦非愚冬夜與錢貟外同直禁中夜深草詔罷霜月凄凛凛欲臥煖殘杯燈前相對飲連鋪青縑被對置通中枕髣髴百餘宵與君同此寢和錢貟外禁中夙興見示窗白星漢曙窗暖燈火餘坐巻朱裏幕看封紫泥書窅窅鍾漏盡曈曈霞景初樓臺紅照耀松竹青扶疎君愛此時好迴頭特謂余不知上清界曉景復何如夏日獨直寄蕭侍御憲臺文法地翰林清切司鷹猜課野鶴驥徳責山麋課責雖不同同歸非所宜是以方寸内忽忽暗相思夏日獨上直日長何所為澹然無他念虚靜是吾師形委有事牽心與無事期中臆一以曠外累都若遺地貴身不覺意閑境來隨但對松與竹如在山中時情性聊自適吟詠偶成詩此意非夫子餘人多不知松聲修竹里張家宅南亭作月好好獨坐雙松在前軒西南微風來潛入枝葉間蕭寥發為聲半夜明月前寒山颯颯雨秋琴泠泠絃一聞滌炎暑再聴破昏煩竟夕遂不寐心體俱翛然南陌車馬動西鄰歌吹繁誰知兹簷下滿耳不為喧禁中門嚴九重靜窗幽一室閑好是修心處何必在深山贈吳丹巧者力苦勞智者心苦憂英華作巧者力若勞智者心若愁愛君無巧智終嵗閑悠悠嘗登御史府亦佐東諸侯手操紏謬簡心運决勝籌宦途似風水君心如虚舟汎然而不有進退得自由今來脱豸冠時往侍龍樓官曹稱心靜居處隨跡幽冬負南簷一作榮日支體甚温柔夏臥北窗風枕席如凉秋南山入舍下酒甕在床頭人間有閒地何必隱林邱顧我愚且昧勞生殊未休一入金門直星霜三四周主恩信難報近地徒乆留終當乞閑官退與夫子遊初除戸曹喜而言志詔授户曹掾捧詔感君恩感恩非為已祿養及吾親弟兄俱簮笏新婦儼衣巾羅列髙堂下拜慶正紛紛俸錢四五萬月可奉晨昏廪祿二百石嵗可盈倉囷喧喧車馬來賀客滿我門不以我為貪知我家内貧置酒延賔客客容亦歡欣笑云今日後不復憂空尊答云如君言願君少逡廵我有平生志醉後為君陳人生百嵗期七十有幾人浮榮及虚位皆是身之賔唯有衣與食此事粗闗身苟免飢寒外餘物盡浮雲立名按容齋五筆白樂天仕宦從壯至老凡俸祿多寡之數悉載於詩雖波及他人亦然其立身亷清家無餘積可以槩見秋居書懷門前少賔客階下多松竹秋景下西牆凉風入東屋有琴慵不弄有書閑不讀盡日方寸中澹然無所欲何須廣居處不用多積蓄文室可容身斗儲可充腹况無治道術坐受官家祿不種一株桑不鋤一隴穀終朝飽飯飡卒嵗豐衣服持此知媿心自然易為足禁中曉臥因懷王起居遲遲禁漏盡悄悄暝鵶喧夜雨槐花落微凉臥北軒曙燈殘未滅風簾閑自翻每得一靜境思與故人言養拙鐵柔不為劒木曲不為轅今我亦如此愚䝉不及門甘心謝名利滅跡歸丘園坐臥茅茨中但對琴與尊身去韁鏁累耳辭朝市喧逍遥無所為時窺五千言無憂樂性塲寡慾清心源始知不才者可以探道根寄李十一建外事牽我形外物誘我情李君別來乆􅄶恡從中生憶昨訪君時立馬叩柴荆有時君未起稚子喜先迎連步笑出門衣翻冠或傾掃階苔紋綠拂榻藤隂清家醖及春熟園葵乘露烹看山東亭坐待月南原行門靜唯鳥語坊逺少鼓聲相對盡日言不及利與名分手來幾時明月三四盈別時殘花落及此新蟬鳴芳嵗忽已晩離抱悵未平豈不思命駕吏職坐相縈前時君有期訪我來山城心賞乆云阻言約無自輕相去幸非逺走馬一日程旅次華州贈袁右丞渭水綠溶溶華山青崇崇山水一何麗君子在其中才與世㑹合物隨誠感通徳星降人福時雨助嵗功化行人無訟囹圄千日空政順氣亦和黍稷三年豐客自帝城來驅馬出闗東愛此一郡人如見太古風方今天子心憂人正忡忡安得天下守盡得如袁公酬楊九𢎞貞長安病中見寄伏枕君寂寂折腰我營營所嗟經時别相去一宿程攜手昨何時昆明春水平離郡來幾日太白夏雲生之子未得意貧病客帝城貧堅志士節病長髙人情隱几自恬淡閉門無送迎龍臥心有待鶴瘦貎彌清清機發為文投我如振瓊何以慰飢渴捧之吟一聲禁中寓直夢遊仙遊寺西軒草詔暇松竹深寂寂月出清風來忽似山中夕因成西南夢夢作遊仙客覺聞宮漏聲猶謂山泉滴贈王山人聞君減寝食日聴神仙説暗待非常人潛求長生訣言長本對短未離生死轍假使得長生才能勝夭折松樹千年朽槿花一日歇畢竟共虚空何須誇嵗月彭殤徒自異生死終無别不如學無生無生即無滅秋山乆病曠心賞今朝一登山山秋雲物冷稱我清羸顔白石臥可枕青蘿行可攀意中如有得盡日不欲還人生無幾何如寄天地間心有千載憂身無一日閑何時解塵􅃠此地來掩闗贈能七倫澗松髙百尋四時寒森森臨風有清韻向日無曲隂如何時俗人但賞桃李林豈不知堅貞芳馨誘其心能生學為文氣髙功亦深手中一百篇句句披沙金苦節二十年無人振陸沉今我尚貧賤徒為爾知音題楊頴士西亭靜得亭上境逺諧塵外蹤憑軒東南望鳥滅山重重竹露冷煩襟杉風清病容曠然宜真趣道與心相逢即此可遺世何必蓬壺峰題贈鄭秘書徵君石溝溪隱居鄭生常隱天台徴起而仕今復謝病隱於此溪鄭君得自然虚白生心胸吸彼沆瀣精凝為氷雪容大君貞元初求賢致時雍蒲輪入翠微迎下天台峰赤城别松喬黄閤交䕫龍俯仰受三命從容辭九重出籠鶴翩翩歸林鳳嗈嗈在火辨良玉經霜識貞松新居寄楚山山碧溪溶溶丹竈燒煙煴黄精花丰茸蕙帳夜琴淡桂尊春酒濃時人不到處苔石無塵蹤我今何為者趨世身龍鍾不向林壑訪無由朝市逢終當解塵纓一作􅃠卜築來相從及第後歸覲留別諸同年十年常苦學一上謬成名擢第未為貴賀親方始榮時輩六七人送我出帝城軒車動行色絲管舉離聲得意減別恨半酣輕逺程翩翩馬蹄疾春日歸鄉情清夜琴興月出鳥栖盡寂然坐空林是時心境閑可以彈素琴清泠由木性恬淡隨人心心積和平氣木應正始音響餘羣動息曲罷秋夜深正氣感元化天地清沉沉効陶潛體詩十六首并序余退居渭上杜門不出時屬多雨無以自娛會家醖新熟雨中獨飲往往酣醉終日不醒嬾放之心彌覺自得故得於此而有以忘於彼者因詠陶淵明詩適與意㑹遂傚其體成十六篇醉中狂言醒輒自哂然知我者亦無隱焉不動者厚地不息者髙天無窮者日月長在者山川松柏與龜鶴其壽皆千年嗟嗟羣物中而人獨不然早出向朝市暮已歸下泉形質及夀命危脆若浮煙堯舜與周孔古來稱聖賢借問今何在一去亦不還我無不死藥萬萬隨化遷所未定知者修短遲速間幸及身健日當歌一尊前何必待人勸念此自為歡翳翳踰月隂沉沉連日雨開簾望天色黄雲暗如土行潦毁我墉疾風壞我宇蓬莠生庭院泥塗失場圃邨深絶賔客窗晦無儔侣盡日不下床跳鼃時入户出門無所往入室還獨處不以酒自娛塊然與誰語朝飲一杯酒冥心合元化兀然無所思日髙尚閑臥暮讀一巻書㑹意如嘉話欣然有所遇夜深猶獨坐又得琴上趣安絃有餘暇復多詩中狂下筆不能罷唯兹三四事持用度晝夜所以隂雨中經旬不出舍始悟獨住一作往人心安時亦過東家采桑婦雨來苦愁悲簇蠶北堂前雨冷不成絲西家荷鋤叟雨來亦怨咨種豆南山下雨多落為萁而我獨何幸醖酒本無期及此多雨日正遇新熟時開瓶瀉尊中玉液黄金脂持翫巳可恱歡嘗有餘滋一酌發好容再酌開愁眉連延四五酌酣暢入四肢忽然遺我物誰復分是非是時連夕雨酩酊無所知人心苦顛倒反為憂者嗤朝亦獨醉歌暮亦獨醉睡未盡一壺酒已成三獨醉勿嫌飲太少且喜歡易致一盃復兩盃多不過三四便得心中適盡忘身外事更復强一盃陶然遺萬累一飲一石者徒以多為貴及其酩酊時與我亦無異笑謝多飲者酒錢徒自費天秋無片雲地靜無纖塵團團新晴月林外生白輪憶昨隂霖天連連三四旬賴逢家醖熟不覺過朝昏私言雨霽後可以罷餘尊及對新月色不醉亦愁人床頭殘酒榼欲盡味彌淳攜置南簷下舉酌自殷勤清光入盃杓白露生衣巾乃知隂與晴安可無此君我有樂府詩成來人未聞今宵醉有興狂詠驚四鄰獨賞猶復爾何况有交親中秋三五夜明月在前軒臨觴忽不飲憶我平生歡我有同心人邈邈崔與錢我有忘形友迢迢李與元或飛青雲上或落江湖間與我不相見於今三四年我無縮地術君非馭風仙安得明月下四人來晤言良夜信難得佳期杳無緣明月又不駐漸下西南天豈無他時㑹惜此清景前家醖飲已盡村中無酒沽坐愁今夜醒其奈秋懷何有客忽叩門言語一何佳云是南村叟挈榼來相過且喜尊不燥安問少與多重陽雖已過籬菊有殘花歡來苦晝短不覺夕陽斜老人勿遽起且待新月華客去有餘趣竟夕獨酣歌原生衣百結顔子食一簞歡然樂其志有以忘飢寒今我何人哉徳不及先賢衣食幸相屬胡為不自安况兹清渭曲居處安且閑榆栁百餘樹茅茨十數間寒負簷下日熱濯澗底泉日出猶未起日入已復眠西風滿村巷清涼八月天但有雞犬聲不聞車馬喧時傾一尊酒坐望東南山稚姪初學歩牽衣戲我前即此自可樂庶幾顔與原湛湛尊中酒有功不自伐不伐人不知我今代其説良将臨大敵前驅千萬卒一簞投河飲赴死心如一壯士磨匕首勇憤氣咆􅣋一酣忘報讐四體如無骨東海殺孝婦天旱踰年月一酌酹其魂通宵雨不歇咸陽秦獄氣寃痛結為物千嵗不肯散一沃亦銷失况兹兒女恨及彼幽憂疾快飲無不消如霜得春日方知麴糵靈萬物無與匹煙霞一作雲隔𤣥圃風波限瀛洲我豈不欲往大海路阻脩神仙但聞説靈藥不可求長生無得者舉世如蜉蝣逝者不重迴存者難乆留踟蹰未死間何苦懷百憂念此忽内熱坐看成白頭舉盃還獨飲顧影自獻酬心與口相約未醉勿言休今朝不盡醉知有明朝不不見郭門外纍纍墳與邱月明愁殺人黄蒿風颼颼死者若有知悔不秉燭遊吾聞潯陽郡昔有陶徵君愛酒不愛名憂醒不憂貧嘗為彭澤令在官纔八旬愀然忽不樂掛印著公門口吟歸去來頭戴漉酒巾人吏留不得直入故山雲歸來五栁下還以酒養真人間榮與利擺落如泥塵先生去已乆紙墨有遺文篇篇勸我飲此外無所云我從老大來竊慕其為人其他不可及且傚醉昏昏楚王疑忠臣江南放屈平晉朝輕髙士林下棄一作非劉伶一人常獨醉一人常獨醒醒者多苦志醉者多歡情歡情信獨善苦志竟何成兀傲甕間臥憔悴澤畔行彼憂而此樂道理甚分明願君且飲酒勿思身後名有一燕趙士言貌甚竒瓌日日酒家去脫衣典數盃問君何落魄一作拓云僕生草萊地寒命且薄徒抱王佐才豈無濟時䇿君門乏良媒三獻寢不報遲遲空手迴亦有同門生先升青雲梯貴賤交道絶朱門叩不開及歸種禾黍三嵗旱為灾入山燒黄白一旦化為灰蹉跎五十餘生世苦不諧處處去不得却歸酒中來南巷有貴人髙蓋駟馬車我問何所苦四十垂白鬚荅云君不知位重多憂虞北里有寒士甕牖繩為樞出扶桑藜杖入臥蝸牛廬散賤無憂患心安體亦舒東鄰有富翁藏貨徧五都東京收粟帛西市鬻金珠朝營暮計算晝夜不安居西舍有貧者匹婦配匹夫布裙行賃舂短褐坐傭書以此求口食一飽欣有餘貴賤與貧富髙下雖有殊憂樂與利害彼此不相踰是以逹人觀萬物同一途但未知生死勝負兩何如遲疑未知間且以酒為娛濟水澄而潔河水渾而黄交流列四瀆清濁不相傷太公戰牧野伯夷餓首陽同時號賢聖進退不相妨謂天不愛民胡為生稻粱謂天果愛民胡為生豺狼謂神福善人孔聖竟栖皇謂神禍淫人暴秦終霸王顔回與黄憲何辜早夭亡蝮蛇與鴆鳥何得夀延長物理不可測神道亦難量舉頭仰問天天色但蒼蒼唯當多種黍日醉手中觴立名按捫蝨新話山谷常謂白樂天栁子厚皆作詩效淵明而子厚為近然以予觀之子厚語近而氣不近樂天學近而語不近各得其一白香山詩集巻五
