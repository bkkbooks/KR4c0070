  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0070_WYG_008-1a, image: WYG1081/WYG1081-0113a.png}
body:
  text: 白香山詩集巻八歙縣汪立名編長慶集八閑適古調詩二十七首長慶二年七月自中書舍人出守杭州路次藍溪作太原一男子自顧庸且鄙老逢不次恩洗拔出泥滓既居可言地願助朝廷理伏閣三上章戅愚不稱㫖聖人存大體優貸容不死鳳詔停舍人魚書除刺史㝠懐齊寵辱委順隨行止我自得此心于兹十年矣餘杭乃名郡郡郭臨江氾已想海門山潮聲來入耳昔予貞元末羇旅曽逰此甚覺太守尊亦諳魚酒美因生江海興毎羡滄浪水尚擬拂衣行况今兼禄仕青山峰巒接白日煙塵起東道既不通改轅遂南指自秦窮楚越浩蕩五千里聞有賢主人而多好山水是行頗為愜所歴良可紀策馬渡藍溪勝遊從此始初出城留别朝從紫禁歸暮出青門去勿言城東陌便是江南路揚鞭簇車馬揮手辭親故我生本無鄉心安是歸處過駱山人野居小池駱生棄官居此二十餘年茅覆環堵亭泉添方丈沼紅芳照水荷白頸觀魚鳥拳石苔蒼翠尺波煙杳渺但問有意無勿論池大小門前車馬路奔走無昬曉名利驅人心賢愚同擾擾善哉駱處士安置身心了何乃獨多君丘園居者少宿清源寺往謫潯陽去夜憩輞溪曲今為錢唐行重經兹寺宿爾來幾何歳溪草二八緑不見舊房僧蒼然新樹木虚空走日月世界遷陵谷我生寄其間孰能逃倚伏隨縁又南去好住東廊竹宿藍溪對月按英華作宿藍橋題月昨夜鳳池頭今夜藍溪一作溪橋口明月本無心行人自囘首新秋松影下半夜鐘聲後清影不宜昏聊將茶代酒自秦望赴五松驛馬上偶睡睡覺成吟長途發已久前館行未至體倦目已昏瞌然遂成睡右袂尚垂鞭左手暫委轡忽覺問僕夫纔行百步地形神分處所遲速相乖異馬上幾多時夢中無限事誠哉達人語百齡同一寐鄧州路中作蕭蕭誰家村秋梨葉半赤漠漠誰家園秋韭花初白路逢故里物使我嗟行􅃥不歸渭北村又作江南客去鄉徒自苦濟世終無益自問波上萍何如澗中石朱藤杖紫驄馬一本無馬字吟拄上山之上騎下山之下江州去日朱藤杖忠州歸日紫驄馬天生二物濟我窮我生合是栖栖者桐樹館重題堦前下馬時梁上題詩處慘淡病使君蕭踈老松樹自嗟還自哂又向杭州去過紫霞蘭若我愛此山頭及此三登歴紫霞舊精舍寥落空泉石朝市日喧隘雲林長悄寂猶存住寺僧肯有歸山客感舊紗㡌㡌即故李侍郎所贈昔君烏紗㡌贈我白頭翁㡌今在頂上君已歸泉中物故猶堪用人亡不可逢岐山今夜月墳樹正秋風思竹窗不憶西省松不憶南宫菊西省大院有松南宫本㕔有菊唯憶新昌堂蕭蕭北窗竹窗間枕簟在來後何人宿馬上作處世非不遇榮身頗有餘勲為上柱國爵乃朝大夫自問有何才兩入承明廬又問有何政再駕朱輪車矧余東山人自惟朴且疎彈琴復有酒但慕􅄞阮徒闇被鄉里薦誤上賢能書一列朝士籍遂為世􅃠拘髙有罾繳憂下有陷穽虞毎覺宇宙窄未嘗心體舒蹉跎二十年頷下生白鬚何言左遷去尚獲專城居杭州五千里往若投淵魚雖未脱簪組且來汎江湖吳中多詩人亦不少酒沽髙聲詠篇什大笑飛杯盂五十未全老尚可且歡娛用兹送日月君以為何如秋風起江上白日落路隅囘首語五馬去矣勿踟蹰秋蝶秋花紫䝉䝉秋蝶黄茸茸花低蝶新小飛戲叢西東日暮凉風來紛紛花落叢夜深白露冷蝶已死叢中朝生夕俱死氣類各相從不見千年鶴多棲百丈松登商山最髙頂髙髙此山頂四望唯煙雲下有一條路通達楚與秦或名誘其心或利牽其身乘者與一作及負者來去何紛紜我亦斯人徒未能出囂塵七年三往復何得笑他人枯桑道傍老枯樹枯來非一朝皮黄外尚活心黑中先焦有似多憂者非因外火燒山路偶興筋力未全衰僕馬不至弱又多山水趣心賞非寂寞捫蘿上煙嶺蹋石穿雲壑谷鳥晚仍啼洞花秋不落提籠復􅂝榼遇勝時停泊泉憇茶數甌嵐行酒一酌獨吟還獨嘯此興殊未惡假使在城時終年有何樂山雉五步一啄草十步一飲水適性遂其生時哉山梁雉梁上無罾繳梁下無鷹鸇雌雄與羣雛皆得終天年嗟嗟籠下雞及彼池中鴈既有稻梁恩必有犧牲患初下漢江舟中作寄兩省給舍秋水淅紅粒朝煙烹白鱗一食飽至夜一卧安達晨晨無朝謁勞夜無直宿勤不知兩掖客何似扁舟人尚想到郡日且稱守土臣猶須副憂寄恤隠安疲民朞年庻報政三年當退身終使滄浪水濯吾纓上塵自蜀江至洞庭湖口有感而作江從西南來浩浩無旦夕長波逐若㵼連山鑿如劈千年不壅潰萬里無墊溺不爾民為魚大哉禹之績導岷既艱逺距海無咫尺胡為不訖功湖一作餘水斯委積洞庭與青草大小兩相敵混合萬丈深淼茫千里白毎歳秋夏時浩大吞七澤水族窟穴多農人土地窄我今尚嗟歎禹豈不愛惜邈未究其由想古觀遺跡疑自苗人頑恃險不終􅃥帝亦無奈何留患與今昔水流天地内如身有血脈滯則為疽疣治之在鍼石安得禹復生為唐水官伯手提倚天劍重來親指畫疏河似剪紙決壅如一作同裂帛滲作膏腴田蹋平魚鼈宅龍宫變閭里水府生禾麥坐添百萬户書我司徒籍初領郡政衙退登東樓作自此後詩到杭州後作鰥􅑏心所念簡牘手自操何言符竹貴未免州縣勞賴是餘杭郡臺榭遶官曹凌晨親政事向晚恣遊遨山冷㣲有雪波平未生濤水心如鏡面千里無纎毫直下江最闊近東樓更髙煩襟與滯念一望皆遁逃清調吟索索風戒寒沉沉日藏耀勸君飲濁醪聽我吟清調芳節變窮隂朝光成夕照與君生此世不合長年少今晨從此遊一作過明日安能料若不結跏禪即須開口笑狂歌詞明月照君席白露霑我衣勸君酒杯滿聽我狂歌詞五十已後衰二十已前癡晝夜又分半其間幾何時生前不歡樂死後有餘貲焉用黄墟下珠衾玉匣為郡亭平旦起視事亭午卧掩闗除親簿領外多在琴書前況有虚白亭坐見海門山潮來一凭檻賔至一開筵終朝對雲水有時聽管絃持此聊過日非忙亦非閑山林太寂寞朝闕空喧煩唯兹郡閣内囂静得中間詠懐昔為鳳閣郎今為二千石自覺不如今人言不如昔昔雖居近宻終日多憂惕有詩不敢吟有酒不敢喫今雖在疎逺竟歳無牽􅃥飽食坐終朝長歌醉通夕人生百年内疾速如過隙先務身安閒次要心歡適事有得而失物有損而益所以見道人觀心不觀跡立春後五日立春後五日春態紛婀娜白日斜漸長碧雲低欲墮殘冰拆玉片新萼排紅顆遇物盡欣欣愛春非獨我迎芳後園立就暖前檐坐還有惆悵心欲别紅爐火郡中即事漫漫潮初平熙熙春日至空闊逺江山晴明好天氣外有適意物中無繫心事數篇對竹吟一杯望雲醉行攜杖扶力卧讀書取睡久養病形骸深諳閒氣味遥思九城陌擾擾趨名利今朝是隻一作雙日朝謁多軒騎寵者防悔尤權者懐憂畏為報髙車蓋恐非真富貴立名按今本此下尚有古詩三十餘首乃長慶三年以後詩不在元相勘定之長慶集者今考正歸入後集閑適詩本四巻此巻雖巻尾不足不欲刪併巻數所以存其舊也白香山詩集巻八
