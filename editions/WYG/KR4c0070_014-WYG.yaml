body:
  text: 白香山詩集巻十四歙縣汪立名編長慶集十四律詩五言七言凡九十六首翰林中送獨孤二十七起居罷職出院碧落留雲住青冥放鶴還銀臺向南路從此到人間重尋杏園忽憶芳時頻酩酊却尋醉處重徘徊杏花結子春深後誰解多情又獨來曲江獨行自此後詩在翰林時作獨來獨去何人識厩馬朝衣野客心閒愛無風水邊坐楊花不動樹隂隂同李十一醉憶元九花時同醉破春愁醉折花枝當酒籌忽憶故人天際去計程今日到凉一作梁州立名按本事詩元和四年三月元稹為御史鞫獄梓潼樂天兄弟送别後旬日與李侍郎建閒遊曲江及慈恩寺飲酣作此詩後旬日得元書果以是日至褒仍寄詩曰夢君兄弟曲江頭也到慈恩院院遊驛吏喚人排馬去忽驚身在古梁州千里神遇若合符契同錢員外題絶粮僧巨川三十年來坐對山唯將無事化人間齋時往往聞鐘笑一食何如不食閒絶句代書贈錢員外欲尋秋景閒行去君病多慵我興孤可惜今朝山最好强能騎馬出來無晩秋有懷鄭中舊隱天髙風嫋嫋鄉思繞關河寥落歸山夢殷勤採蕨歌病添心寂寞愁入鬢蹉跎晚樹蟬鳴少秋階日上多長閒羨雲鶴久别媿煙蘿其奈丹墀上君恩未報何禁中九日對菊花酒憶元九元九詩云不是花中偏愛菊此花開盡更無花賜酒盈杯誰共持宮花滿把獨相思相思只傍花邊立盡日吟君詠菊詩送王十八歸山寄題仙遊寺曾於太白峰前住數到仙遊寺裏來黑水澄時潭厎出白雲破處洞門開林間暖酒燒紅葉石上題詩掃緑苔惆悵舊遊無一作那復到菊花時節待君廻答張籍因以代書憐君馬瘦衣裘薄許到江東訪鄙夫今日正閒天又暖可能扶病暫來無曲江早春曲江栁條漸無力杏園伯勞初有聲可憐春淺遊人少好傍池邊下馬行見元九悼亡詩因以此寄夜淚闇銷明月幌春腸遥斷牡丹庭人間此病治無藥唯有楞伽四巻經寒食夜無月無燈寒食夜夜深猶立闇花前忽因時節驚年幾四十如今欠一年杏園花落時招錢員外同醉花園欲去去應遲正是風吹狼藉時近西數樹猶堪醉半落春風半在枝重題西明寺牡丹時元九在江陵往年君向東都去曾歎花時君未㢠廻今年况作江陵别惆悵花前又獨來只愁離别長如此不道明年花不開同錢員外禁中夜直宮漏三聲知半夜好風凉月滿松筠此時閒坐寂無語藥樹影中唯兩人禁中夜作書與元九心緒萬端書兩紙欲封重讀意遲遲五聲宫漏初鳴後一㸃窻燈欲滅時立名按元和十二年公在江州作書與微之封題有詩昔憶封書與君夜金鑾殿後欲明天今夜封書在何處廬山菴裏曉燈前即指此書也八月十五日夜禁中獨直對月憶一作寄元九銀臺金闕夕沈沈獨宿相思在翰林三五夜中新月色二千里外故人心渚宫東面煙波冷浴殿西頭鐘漏深猶恐清光不同見江陵卑濕足秋隂寄陳式五兄年來白髪兩三莖憶别君時髭未生惆悵料君應滿鬢當初是我十年兄庾順之以紫霞綺逺贈以詩答之千里故人心鄭重一端香綺紫氛氳開緘日映晚霞色滿幅風生秋水紋為褥欲裁憐葉破製裘將剪惜花分不如縫作合歡被寤寐相思如對君送元八歸鳳翔莫道岐州三日程其如風雪一身行與君况是經年别蹔到城來又出城雨雪放朝因懷微之歸騎紛紛滿九衢放朝三日為泥塗不知雨雪江陵府今日排衙得免無詠懷嵗去年來塵土中眼看變作白頭翁如何辦得歸山計兩頃村田一畆宮聞微之江陵卧病以大通中散碧腴垂雲膏寄之因題四韻已題一帖紅消散又封一合碧雲英憑人寄向江陵去道路迢迢一月程未必能治江上瘴且圖遥慰病中情到時想得君拈得枕上開看眼蹔明酬錢員外雪中見寄松雪無塵小院寒閉門不似住長安煩君想我看心坐報道心空無可看重酬錢員外雪中重寄雪山偈問答殷勤四句中本立空名縁破妄若能無妄亦無空獨酌憶微之時對所贈盞獨酌花前醉憶君與君春别又逢春惆悵銀杯來處重不曾盛酒勸閒人微之宅殘牡丹殘紅零落無人賞雨打風摧花不全諸處見時猶悵望况當元九小亭前新磨鏡衰容當一作常晩櫛秋鏡偶新磨一與清光對方知白髪多鬢毛從幻化心地付頭陀任意渾成雪其如似夢何感髪落昔日愁頭白誰知未白衰眼前一作看應落盡無可變成絲八月十五日夜聞崔大員外翰林獨直對酒翫月因懷禁中清景偶題是詩秋月髙懸空碧外仙郎靜翫禁闈間嵗中唯有今宵好海内無如此地閒皓色分明雙闕牓清光深到九門關遥聞獨醉還惆悵不見金波照玉山酬王十八見寄秋思太白峰頭雪晴憶仙遊洞口雲未報皇恩歸未得慙君為寄北山文立春日酬錢員外曲江同行見贈下直遇春日垂鞭出禁闈兩人攜手語千里看山歸栁色早黄淺水紋新緑微風光向晩好車馬近南稀機盡笑相顧不驚鷗鷺飛和錢員外青龍寺上方望舊山舊峰松雪舊溪雲悵望今朝遥屬君共道使臣非俗吏南山莫動北山文宴周皓大夫光福宅座上作何處風光最可憐妓堂階下砌臺前軒車擁路光照地絲管入門聲沸天緑蕙不香饒桂酒紅櫻無色讓花鈿野人不敢求他事唯借泉聲一作流泉伴醉眠惜牡丹花二首一首翰林院北㕔花下作一首新昌竇給事中宅南亭花下作惆悵階前紅牡丹晩來唯有兩枝殘明朝風起應吹盡夜惜衰紅把火看寂寞萎紅低向雨離披破豔散隨風晴明一作天落地猶惆悵何况飄零泥土中答元奉禮同宿見贈相逢俱歎不閒身直日常多齋日頻曉鼓一聲分散去明朝風景屬何人答馬侍御見贈謬入金門侍玉除煩君問我意何如蟠木詎堪明主用籠禽徒與故人疎苑花似雪同隨輦宮月如睂伴直廬淺薄求賢思自代嵇康莫寄絶交書上巳日恩賜曲江宴㑹即事賜歡仍許醉此㑹興如何翰苑主恩重曲江春意多花低羞豔妓鸎散讓清歌共道昇平樂元和勝永和夜惜禁中桃花因懷錢員外前日歸時花正紅今夜宿時枝半空坐惜殘芳君不見風吹狼藉月明中答劉戒之早秋别墅見寄凉風木槿籬暮雨槐花枝併起新秋思為得故人詩避地鳥擇木入一作升朝魚在池城中與山下喧靜闇相思凉夜有懷念别感時節早蛩聞一聲風簾夜凉入露簟秋意生燈盡夢初罷月斜天未明闇凝無限思起傍藥欄行秋思病眠夜少夢閒立秋多思寂寞餘雨晴蕭條早寒至鳥棲紅葉樹月照青苔地何况鏡中年又過三十二禁中聞蛩悄悄禁門閉夜深無月明西窻獨闇坐滿耳新蛩聲秋蛩切切闇窻下喓喓深草裏秋天思婦心雨夜愁人耳春夜喜雪有懷王二十二夜雪有佳趣幽人出書帷微寒生枕席輕素封階墀坐罷楚絃曲起吟班扇詩明宜滅燭後凈愛巻簾時窻引曙色早庭銷春氣遲山隂應有興不卧待徽之酬和元九東川路詩十二首十二篇皆因新境追憶舊事不能一一曲敘但隨而和之唯予與元知之耳駱口驛舊題詩拙詩在壁無人愛鳥汙苔侵文字殘唯有多情元侍御繡衣不惜拂塵看南秦雪往嵗曾為西邑吏慣從駱口到南秦三時雲冷多飛雪二月山寒少有春我思舊事猶惆悵君作初行定苦辛仍賴愁猿寒不呌若聞猿呌更愁人山枇杷花二首萬重青嶂蜀門口一樹紅花山頂頭春盡憶家歸未得低紅如解替君愁葉如裙色碧綃淺花似芙蓉紅粉輕若使此花兼解語推囚御史定違程江樓月嘉陵江曲曲江池明月雖同人别離一宵光景潛相憶兩地隂晴逺不知誰料江邊懷我夜正當池畔望君時今朝共語方同悔不解多情先寄詩亞枝花山郵花木似平陽愁殺多情驄馬郎還似昇平池畔坐低頭向水自看妝江上笛江上何人夜吹笛聲聲似憶故園春此時聞者堪頭白况是多愁少睡人嘉陵夜有懷二首露濕墻花春意深西廊月上半床隂憐君獨卧無言語惟我知君此夜心不明不闇朦朧一作朧朧月非暖非寒慢慢風獨卧空牀好天氣平明閒事到心中夜深行百牢關外夜行客三殿角頭宵直人莫道近臣勝逺使其如同是不閒身望驛臺三月三十日靖安宅裏當窻栁望驛臺前撲地花兩處春光同日盡居人思客客思家江岸棃花棃花有意一作思縁和葉一樹江頭惱殺君最似孀閨少年婦白妝素袖碧紗裙感元九悼亡詩因為代答三首答謝家最小偏憐女嫁得梁鴻六七年躭書愛酒日髙眠雨荒春浦惟生草雪壓朝厨未有煙身病憂來縁女少家貧忘却為夫賢誰知厚俸今無分枉向秋風吹紙錢答騎馬入空臺君入空臺去朝往暮還來我入泉臺去泉門無復開鰥夫仍繫職稚女未勝哀寂寞咸陽道家人覆墓㢠廻答山驛夢入君旅夢來千里閉我幽魂欲二年莫忘平生行坐處後堂階下竹叢前和元九與吕二同宿話舊感贈見君新贈吕君詩憶得同年行樂時爭入杏園齊馬首潛過栁曲鬭蛾睂八人雲散俱遊宦七度花開盡别離聞道秋孃猶且在至今時復問微之憶元九眇眇江陵道相思逺不知近來文巻裏半是憶君詩蕭員外寄新蜀茶蜀茶寄到但驚新渭水煎來始覺珍滿甌似乳堪持翫况是春深酒渴人寄上大兄巳後詩在邽林居作秋鴻過盡無書信病戴紗巾強出門獨上荒臺東北望日西愁立到黄昏病中哭金鑾子小女子名豈料吾方病翻悲汝不全卧驚從枕上扶哭就燈前有女誠為累無兒豈免憐病來纔十日養得已三年慈淚隨聲迸悲傷一作腸遇物牽故衣猶架上殘藥尚頭邊送出深村巷看封小墓田莫言三里地此别是終天寄内桑條初緑即為别柿葉半紅猶未歸不如村婦知時節解為田夫秋擣衣病氣自知氣發每因情情在何由氣得平若問病根深與淺此身應與病齊生歎元九不入城中一作門來五載同時班列盡官髙何人牢落猶依舊唯有江陵元士曹眼暗早年勤倦看書苦晚嵗悲傷出淚多眼損不知都自取病成方悟欲如何夜昏乍似燈將滅朝闇長疑鏡未磨千藥萬方治不得唯應閉目學頭陀得袁相書穀苗深處一農夫面黑頭斑手把鋤何意使人猶識我就田來送相公書病中作病來城裏諸親故厚薄親疎心總知唯有蔚章於我分深於同在翰林時感化寺見元九劉三十二題名處微之謫去千餘里太白無來十一年今日見名如見面塵埃壁上破窻前遊悟真寺廻山下别張殷衡世縁未了住不得孤負青山心共知愁君又入都門去即是紅塵滿眼時邨居寄張殷衡金氏邨中一病夫生涯濩落性靈迂唯看老子五千字不蹋長安十二衢藥銚夜傾殘酒暖竹床寒取舊氊鋪聞君欲發江東去能到茅菴訪别無病中得樊大書荒邨破屋經年卧寂絶無人問病身惟有東都樊著作至今書信尚殷勤開元九詩書巻紅箋白紙兩三束半是君詩半是書經年不展縁身病今日開看生蠧魚晝卧枹枕無言語空房獨悄然誰知盡日卧非病亦非眠夜坐庭前盡日立到夜燈下有時坐徹明此情不語何人㑹時復長吁一兩聲暮立黄昏獨立佛堂前滿地槐花滿樹蟬大抵四時心總苦就中腸斷是秋天有感絶絃與斷絲猶有却續時惟有衷腸斷無應續得期答友問似玉童顔盡如霜病鬢新莫驚身頓老心更老於身村夜霜艸蒼蒼蟲切切村南村北行人絶獨出門前望野田月明蕎麥花如雪聞蟲暗蟲唧唧夜緜緜况是秋隂欲雨天猶恐愁人暫得睡聲聲移近卧床前寒食夜有懷寒食非長非短夜春風不熱不寒天可憐時節堪相憶何况無燈各早眠贈内漠漠闇苔新雨地微微涼露欲秋天莫對月明思往事損君顔色減君年得錢舍人書問眼疾春來眼闇少心情㸃盡黄連尚未平唯得君書勝得藥開緘未讀眼先明還李十一馬傳語李君勞寄馬病來唯拄一作著杖扶身縱擬强騎無出處却將牽與趂朝人九日寄行簡摘得菊花攜得酒遶村騎馬思悠悠下邽田地平如掌何處登髙望梓州夜坐斜月入前楹迢迢夜坐情梧桐上階影蟋蟀近床聲曙傍窻間至秋從簟上生感時因憶事不寢到雞鳴邨居二首田園莽蒼經春早籬落蕭條盡日風若問經過談笑者不過田舍白頭翁門閉仍逢雪厨寒未起煙貧家重寥落半為日髙眠早春雪散因和氣冰開得暖光春銷不得處惟有鬢邊霜王昭君二首時年十七滿面胡沙滿鬢風睂銷殘黛臉銷紅愁苦辛勤憔悴盡如今却似畫圖中漢使却廻憑寄語黄金何日贖蛾睂君王若問妾顔色莫道不如宮裏時立名按詩人玉屑古人作昭君詞多矣余獨愛樂天一絶其意優游而不廹切然樂天賦此詩年甚少白香山詩集巻十四
