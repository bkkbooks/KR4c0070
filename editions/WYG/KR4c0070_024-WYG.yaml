body:
  text: 白香山詩集巻二十四歙縣汪立名編後集四格詩凡八十六首題裴晉公女几山刻石詩後并序裴侍中晉公岀討淮西時過女几山下刻石題詩末句云待平賊壘報天子莫指仙山示武夫果如所言剋期平賊由是淮蔡迄今底寧殆二十年人安生業夫嗟歎不足則詠歌之故居易作詩二百言繼題公之篇末欲使采詩者修史者後之往來觀者知公之功德本末前後也何處畫功業何處題詩篇麒麟髙閣上女几小山前爾後多少時四朝二十年賊骨化為土賊壘犂為田一從賊壘平陳蔡民晏然騾軍成牛戸蔡寇號騾子軍陳蔡間農驍鋭者人畜牛者呼為牛户鬼火變人煙生子已嫁娶種桑亦絲綿皆云公之德欲報無由縁公今在何處守都鎮三川舊宅留永樂新居開集賢公今在何官被衮珥貂蟬戰袍破猶在髀肉生欲圓襟懐轉蕭灑氣力轉精堅登山不拄杖上馬能掉鞭利澤浸入地福降自升天昔號天下將今稱地上仙勿追赤松逰勿拍洪崖肩商山有遺老可以奉周旋洛陽有愚叟洛陽有愚叟白黒無分别浪迹雖似狂謀身亦不拙㸃檢盤中飯非精亦非糲㸃檢身上衣無餘亦無闕天時方得所不寒復不熱體氣正調和不飢仍不渴閒將酒壺出醉向人家歇野食或烹鮮寓眠多擁褐抱琴榮啓樂荷鍤劉伶達放眼㸔青山任頭生白髪不知天地内更得幾年活從此到終身盡為閒日月飽食閒坐紅粒陸渾稻白鱗伊水魴庖童呼我食飯熱魚鮮香箸箸適我口匙匙充我腸八珍與五鼎無復心思量捫腹起盥潄下階振衣裳繞庭行數匝却上檐下牀箕踞擁裘坐半身在日暘可憐飽暖味誰肯來同嘗是嵗太和八兵銷時漸康朝廷重經術草澤捜賢良堯舜求理切夔龍啓沃忙懐才抱智者無不走遑遑惟此不才叟頑慵戀洛陽飽食不出門閒坐不下堂子弟多寂寞僮僕少精光衣食雖充給神意不揚揚為爾謀則短為吾謀甚長立名按周益公必大云居易以長慶二年過漢江詩云秋水淅紅稻朝煙烹白鱗今復云紅粒陸渾稻白鱗伊水魴蓋於一飲食間黙寓忠愛不忘君之意所謂造次必於是者時文宗雖恭儉儒雅而中人之禍巳萌其云朝廷重經術草澤捜賢良蓋謂不能用劉蕡也又云堯舜求理切夔龍啓沃忙言上雖鋭意於治而王涯等為相非徒無益也又云懐才抱智者無不走遑遑指李訓鄭注等也明年而甘露之亂果作居易其知幾乎閒居自題門前有流水牆上多髙樹竹徑繞荷池縈逥百餘步波閒戲魚鼈風静下鷗鷺寂無城市喧渺有江湖趣吾廬在其上偃卧朝復暮洛下安一居山中亦慵去時逢過客愛問是誰家住此是白家翁閉門終老處覽鏡喜老今朝覽明鏡鬚鬢盡成絲行年六十四安得不衰羸親屬惜我老相顧興歎咨而我獨微笑此意何人知笑罷仍命酒掩鏡捋白髭爾輩且安坐從容聽我詞生若不足戀老亦何足悲生若苟可戀老即生多時不老即須夭不夭即須衰晩衰勝早夭此理决不疑古人亦有言浮生七十稀我今欠六嵗多幸或庶幾儻得及此限何羡榮啓期當喜不當歎更傾酒一巵風雪中作嵗暮風動地夜寒雪連天老夫何處宿煖帳温爐前兩重褐綺衾一領花茸氊粥熟呼不起日髙安穩眠是時心與身了無閒事牽以此度風雪閒居來六年忽思逺逰客復想早朝士蹋凍侵夜行凌寒未明起心為身君父身為心臣子不得身自由皆為心所使我心既知足我身自安止方寸語形骸我應不負爾對琴酒西窻明且暖晩坐巻書帷琴匣拂開後酒缾添滿時角尊白螺琖玉軫黄金徽未及彈與酌相對巳依依泠泠秋泉韻貯在龍鳳池油油春雲心一杯可致之自古有琴酒得此味者稀祗應康與籍及我三心知雪中晏起偶詠所懐兼呈張常侍韋庶子皇甫郎中雜言窮隂蒼蒼雪雰雰雪深沒脛泥埋輪東家典錢歸礙夜南家貰米出凌晨我獨何者無此弊複帳重衾暖若春怕寒放嬾不肯動日髙睡足方頻伸缾中有酒爐有炭甕中有飯庖有薪奴温婢飽身晏起致兹快活良有因上無臯陶伯益廊廟才的不能匡君輔國活生民下無巢父許由箕頴操又不能食薇飲水自苦辛君不見南山悠悠多白雲又不見西京浩浩惟紅塵紅塵鬧熱白雲冷好於冷熱中間安置身三年徼倖忝洛尹兩任優穩為商賓非賢非愚非智慧不富不貴不賤貧冉冉老去過六十騰騰閒來經七春不知張韋與皇甫私喚我作何如人和裴侍中南園静興見示池館清且幽髙懐亦如此有時簾動風盡日橋照水靜將鶴為伴閒與雲相似何必學畱侯崎嶇覔松子春寒今朝春氣寒自問何所欲酥煖薤白酒乳和地黄粥豈惟厭饞口亦可調病腹助酌有枯魚佐餐兼㫖蓄省躬念前哲醉飽多慙忸君不聞靖節先生尊長空廣文先生飯不足菩提寺上方晩望香山寺寄舒員外晩登西寳刹晴望東精舎反照轉樓臺輝輝似圖畫氷浮水明滅雪壓松偃亞石閣僧上來寒汀雁飛下西京鬧於市東洛閒如社曽憶舊逰無香山明月夜二月一日作贈韋七庶子園杏紅蕚坼庭蘭紫芽出不覺春巳深今朝二月一去冬病瘡痏將養遵醫術今春入道場清淨依僧律嘗聞聖賢語所慎齋與疾遂使愛酒人停杯一百日明朝二月二疾平齋復畢應須挈一壺尋花覔韋七犬鳶晩來天氣好散歩中門前門前何所有偶覩犬與鳶鳶飽凌風飛犬暖向日眠腹舒穩貼地翅凝去聲髙摩天上無羅弋憂下無羈鎖牽見彼物遂性我亦心適然心適復何為一詠逍遥篇此仍著於適適疑作迹尚未能忘言夢劉二十八因詩問之昨夜夢夢得初覺思踟躕忽忘來汝郡猶疑在吳都吳都三千里汝郡二百餘非夢亦不見近與逺何殊尚能齊近逺焉用論榮枯但問寢與食近日兩何如病後能吟否春來曽醉無樓臺與風景汝又何如蘇相思一相報勿復慵為書閒吟貧窮汲汲求衣食富貴營營役心力人生不富即貧窮光陰易過閒難得我今幸在窮富間雖在朝廷不入山㸔雪尋花翫風月洛陽城裏七年閒西行衣裘不單薄車馬不羸弱藹藹三月天閒行亦不惡壽安流水館硤石青山郭官道栁隂隂行宫花漠漠常聞俗間語有錢在處樂我雖非富人亦不苦寂寞家僮解絃管騎從􅂝杯杓時向春風前歇鞍開一酌東歸翩翩平肩舁中有醉老夫膝上展詩巻竿頭懸酒壺食宿無定程僕馬多緩驅臨水歇半日望山傾一盂藉草坐嵬峩並上聲攀花行踟躕風將景共暖體與心同舒始悟有營者居家如在途方知無繫者在道如安居前夕宿三堂三堂在虢今旦逰申湖申湖在陜殘春三百里送我歸東都途中作早起上肩舁一杯平旦醉晩憩下肩舁一覺殘春睡身不經營物心不思量事但恐綺與里只如吾氣味小臺新樹低如帳小臺平似掌六尺白藤牀一莖青竹杖風飄竹皮落苔印鶴迹上幽境與誰同閒人自來往睡後茶興憶楊同州昨晩飲太過嵬峩並上聲連宵醉今朝餐又飽爛熳移時睡睡足摩挲眼眼前無一事信脚繞池行偶然得幽致婆娑緑陰樹斑駁青苔地此處置繩牀傍邊洗茶器白瓷甌甚潔紅爐炭方熾沬下麴塵香花浮魚眼沸盛來有佳色咽罷餘芳氣不見楊慕巢誰人知此味題文集櫃破柏作書櫃櫃牢柏復堅收貯誰家集題云白樂天我生業文字自幼及老年前後七十巻小大三千篇誠知終散失未忍遽棄捐自開自鏁閉置在書帷前身是鄧伯道世無王仲宣只應分付女留與外孫傳旱熱二首彤雲散不雨赫日吁可畏端坐猶揮汗出門豈容易忽思公府内青衫折腰吏復想驛路中紅塵走馬使征夫更辛苦逐客彌顦顇日入尚趨程宵分不遑寐安知北窻叟偃卧風颯至簟拂碧龍鱗扇揺白鶴翅豈惟身所得兼示心無事誰言苦熱天元有清涼地勃勃旱塵氣炎炎赤日光飛禽颭將墜行人渴欲狂壯者不耐飢飢火燒其腸肥者不禁熱喘息汗如漿此時方自悟老瘦亦何妨肉輕足健逸髪少頭清涼薄食不飢渴端居省衣裳數匙粱飯冷一領綃衫香持此聊過日焉知畏景長偶作二首戰馬春放歸農牛冬歇息何獨徇名人終身役心力來者殊未已去者不知還我今悟已晩六十方退閒猶勝不悟者老死紅塵間名無髙與卑未得多健羡事無小與大已得多厭賤如此常自苦反此或自安此理知甚易此道行甚難勿信人虚語君當事上㸔池上作西溪南潭皆池中勝處也西溪風生竹森森南潭萍開水沈沈叢翠萬竿湘岸色空碧一泊松江心浦派縈逥誤逺近橋島向背迷登臨澄瀾方丈若萬頃倒影咫尺如千尋泛然獨逰邈然坐坐念行心思古今菟裘不聞有泉沼西河亦恐無雲林豈如白翁退老地樹髙竹密池塘深華亭雙鶴白矯矯太湖四石青岑岑眼前盡日更無客膝上此時惟有琴洛陽冠蓋自相索誰肯來此同抽簪何處堪避暑何處堪避暑林間背日樓何處好追涼池上隨風舟日髙飢始食食竟飽還逰逰罷睡一覺覺來茶一甌眼明見青山耳醒聞碧流脱韤閒濯足解巾快搔頭如此來幾時已經六七秋從心至百骸無一不自由拙退是其分榮耀非所求雖被世間笑終無身外憂此語君莫怪静思吾亦愁如何三伏月楊尹謫䖍州詔下昨日詔下去罪人今日詔下得賢臣進退者誰非我事世間寵辱常紛紛我心與世兩相忘時事雖聞如不聞但喜今年飽飯喫洛陽禾稼如秋雲更傾一尊歌一曲不獨忘世兼忘身七月一日作七月一日天秋生履道里閒居見清景髙興從此始林間暑雨歇池上涼風起橋竹碧鮮鮮岸莎青靡靡蒼然古磐石清淺平流水何言中門前便是深山裏雙僮侍坐卧一杖扶行止飢聞麻粥香渴覺雲湯美胡麻粥雲母湯平生所好物今日多在此此外更何思市朝心已矣開襟開襟何處好竹下池邊地餘熱體猶煩早涼風有味黄萎槐蘂結紅破蓮房墜無柰每年秋先來入衰思自賓客遷太子少傅分司頭上漸無髪耳間新有毫形容逐日老官秩隨年髙優饒又加俸閒穩仍分曹飲食免藜藿居處非蓬蒿何言家尚貧銀榼提緑醪勿謂身未貴金章照紫袍誠合知止足豈宜更貪饕黙然心自問於國有何勞自在杲杲冬日光明暖真可愛移榻向陽坐擁裘仍解帶小奴搥我足小婢搔我背自問我為誰胡然獨安泰安泰良有以與君論梗概心了事未了飢寒廹於外事了心未了念慮煎於内我今實多幸事與心和㑹内外及中間了然無一礙所以日陽中向君言自在詠史九年十一月作按太和九年丼露之變事載年譜秦磨利刀斬李斯齊燒沸鼎烹酈其可憐黄綺入商洛閒卧白雲歌紫芝彼為葅醢几上盡此作鸞皇天外飛去者逍遥來者死乃知禍福非天為因夢有悟交友淪歿盡悠悠勞夢思平生所厚者昨夜夢見之夢中幾許事枕上無多時欵曲數杯酒從容一局棊棊酒皆夢中所見事初見韋尚書𢎞景金紫何輝輝中遇李侍郎建笑言甚怡怡終為崔常侍𤣥亮意色苦依依一夕三改變夢心不驚疑此事人盡怪此理誰得知我粗知此理聞於竺乾師識行妄分别智隱迷是非若轉識為智菩提其庶幾春逰上馬臨出門出門復逡巡囘頭問妻子應怪春逰頻誠知春逰頻其柰老大身朱顔去復去白髪新更新請君屈十指為我數交親大限年百嵗幾人及七旬我今六十五走若下坂輪假使得七十祗有五度春逢春不逰樂但恐是癡人題天竺南院贈閒元旻清四上人雜芳澗草合繁緑巖樹新山深景候晩四月有餘春竹寺過微雨石徑無纎塵白衣一居士方袍四道人地是佛國土人非俗交親城中山下别相送亦殷勤哭師臯南康丹旐引魂逥洛陽籃轝送葬來北邙原邊草樹一作尹村畔月苦煙愁夜過半妻孥兄弟號一聲十二人腸一時斷往者何人送者誰樂天哭别師臯時平生分義向人盡今日哀寃惟我知我知何益徒垂淚籃轝逥竿馬逥轡何日重聞埽市歌誰家收得琵琶妓師臯醉後善歌埽市詞又有小妓工琵琶不知今落在何處蕭蕭風樹白楊花蒼蒼露草青蒿氣更就墳邊哭一聲與君此别終天地隱几贈客宦情本澹薄年貌又老醜紫綬與金章於予亦何有有時獨隱几荅音墖然無所偶卧枕一巻書起嘗一杯酒書將引昏睡酒用扶衰朽客到忽已酣脱巾坐搔首疎頑倚老病容恕慙交友忽思莊生言亦擬鞭其後夏日作葛衣疎且單紗帽輕復寛一衣與一帽可以過炎天止於便吾體何必被羅紈宿雨林筍嫩晨露園葵鮮烹葵炮嫩筍可以備朝餐止於適吾口何必飫腥羶飯訖盥漱已捫腹方果然婆娑庭前步安穩窻下眠外養物不費内歸心不煩不費用難盡不煩神易安庶幾無夭閼得以終天年晩涼偶詠日下西牆西風來北窻北中有逐涼人單牀獨棲息飄蕭過雲雨揺曵歸飛翼新葉多好陰初筠有佳色幽深小池館優穩閒官職不愛勿復論愛亦不易得酬牛相公宫城早秋寓言見示兼呈夢得時夢得有疾七月中氣後金與火交争一聞白雪唱暑退清風生碧樹未揺落寒蟬始悲鳴夜涼枕簟滑秋燥衣巾輕疏受老慵出劉楨疾未平何人伴公醉新月上宫城小臺晩坐憶夢得汲泉灑小臺臺上無纎埃解帶面西坐輕襟隨風開晩涼閒興動憶同傾一杯月明候柴户藜杖何時來種桃歌食桃種其核一年核生芽二年長枝葉三年桃有花憶昨五六嵗灼灼盛芬華迨兹八九載有減而無加去春已稀少今春漸無多明年後年後芳意當如何命酒樹下飲停杯拾餘葩因桃忽自感悲吒成狂歌狂言示諸姪世欺不識字我忝攻文筆世欺不得官我忝居班秩人老多病苦我今幸無疾人老多憂累我今婚嫁畢心安不移轉身泰無牽率所以十年來形神閒且逸况當垂老嵗所要無多物一裘煖過冬一飯飽終日勿言舎宅小不過寢一室何用鞍馬多不能騎兩匹如我優幸身人中十有七如我知足心人中百無一傍觀愚亦見當已賢多失不敢論他人狂言示諸姪偶以拙詩數首寄呈裴少尹侍郎䝉以盛製四篇一時酬和重投長句美而謝之投君之文甚荒蕪數篇價直一束芻報我之章何璀璨纍纍四貫驪龍珠毛詩三百篇後得文選六十巻中無一麋麗龜絶報賽五鹿連柱難支梧髙興獨因秋日盡清吟多與好風俱銀鈎金錯兩殊重宜上屏風張座隅立秋夕涼風忽至炎暑稍消即事詠懐寄汴州節度使李二十尚書嫋嫋檐樹動好風西南來紅釭霏微滅碧幌飄颻開披襟有餘涼拂簟無纎埃但喜煩暑退不惜光陰催河秋稍清淺月午方徘徊或行或坐卧體適心悠哉美人在浚都旌旗繞樓臺雖非滄溟阻難見如蓬萊蟬吟節又換鴈送書未逥君位日寵重我年日摧頽無因風月下一舉平生杯英華作一與共持杯開成二年夏聞新蟬贈夢得十年來常與夢得索居同在洛下每聞蟬多有寄答今喜以此篇唱之十載與君别常感新蟬鳴今年共君聽同在洛陽城噪處知林静聞時覺景清涼風忽嫋嫋秋思先秋生殘槿花邊立老槐隂下行雖無索居恨還動長年情且喜未聾耳年年聞此聲題牛相公歸仁里宅新成小灘平生見流水見此轉留連况此朱門内君家新引泉伊流決一帶洛石砌千拳與君三伏月滿耳作潺湲深處碧粼粼淺處清濺濺碕岸束嗚咽沙汀散淪漣翻浪雪不盡澄波空共鮮兩崖灔澦口一泊瀟湘天曽作天南客漂流六七年何山不倚杖何水不停船巴峽聲心裏松江色眼前今朝小灘上能不思悠然春日閒居三首陶云愛吾廬吾亦愛吾屋屋中有琴書聊以慰幽獨是時三月半花落庭蕪緑舎上晨鳩鳴窻間春睡足睡足起閑坐景晏方櫛沐今日非十齋庖童饋魚肉飢來恣餐歠冷熱隨所欲飽竟快搔爬筋骸無檢束豈徒暢肢體兼欲遺耳目便可傲松喬何假杯中渌廣池春水平羣魚恣游泳新林緑陰成衆鳥欣相鳴叶韻時我亦蕭灑適無累與病魚鳥人則殊同歸於遂性緬思山梁雉時哉感孔聖聖人不得所慨然歎時命我今對鱗羽取樂成謡詠得所仍得時吾生一何幸勞者不覺歌歌其勞苦事逸者不覺歌歌其逸樂意問我逸如何閒居多興味問我樂如何閒官少憂累又問俸厚薄百千隨月至又問年幾何七十行欠二所得皆過望省躬良可媿馬閒無羈絆鶴老有禄位設自為化工優饒只如是安得不歌詠黙黙受天賜小閣閒坐閣前竹蕭蕭閣下水潺潺拂簟巻簾坐清風生其間静聞新蟬鳴逺見飛鳥還但有巾挂壁而無客叩關二疏返故里四老歸舊山吾亦適所願求閑而得閑逰平泉宴浥澗宿香山石樓贈座客逸少集蘭亭季倫宴金谷金谷太繁華蘭亭闕絲竹何如今日㑹浥澗平泉曲杯酒與管絃貧中隨分足紫鮮林筍嫩紅潤園桃熟采摘助盤筵芳滋盈口腹閒吟暮雲碧醉藉春草緑舞妙艷流風歌清叩寒玉古詩惜晝短勸我令秉燭是夜勿言歸相擕石樓宿池上幽境裊裊過水橋微微入林路幽境深誰知老身閒獨步行行何所愛遇物自成趣平滑青盤石低密緑陰樹石上一素琴樹下雙草屨此是榮先生坐禪三樂處夏日閒放時暑不出門亦無賓客至靜室深下簾小庭新埽地褰裳復岸幘閒傲得自恣朝景枕簟清乘涼一覺睡午餐何所有魚肉一兩味夏服亦無多蕉紗三五事資身旣給足長去聲物徒煩費若比簞瓢人吾今太富貴和思黯居守獨飲偶醉見示六韻時夢得和篇先成頗為麗絶因添兩韻繼而美之宮漏滴漸䦨城烏啼復歇此時若不醉爭柰千門月主人中夜起妓燭前羅列歌袂黙收聲舞鬟低赴節絃吟玉柱品酒透金杯熱朱顔忽已酡清奏猶未闋妍詞黯先唱逸韻劉繼發鏗然雙雅音金石相磨戛和夢得洛中早春見贈七韻衆皆賞春色君獨憐春意春意竟如何老夫知此味燭餘減夜漏衾暖添朝睡恬和臺上風虛潤池邊地開遲花養豔語嬾鶯含思似訝隔年齋如勸迎春醉何日同宴逰心期二月二此日出齋故云櫻桃花下有感而作開成三年春季美周賓客南池者藹藹美周宅櫻繁春日斜一為洛下客十見池上花爛熳豈無意為君占年華風光饒此樹歌舞勝諸家失盡白頭伴長成紅粉娃停杯兩相顧堪喜亦堪嗟白頭伴紅粉娃皆有所屬洗竹布裘寒擁頸氊履温承足獨立氷池前久㸔洗霜竹先除老且病次去纎而曲翦棄猶可憐琅玕十餘束青青復籊籊頗異凡草木依然若有情逥顧語僮僕小者截魚竿大者編茅屋勿作彗與箕而令糞土辱新沭浴形適外無恙心恬内無憂夜來新沭浴肌髪舒且柔寛裁夾烏帽厚絮長白裘裘温裹我足帽暖覆我頭先進酒一杯次舉粥一甌半酣半飽時四體春悠悠是月嵗陰暮慘冽天地愁白日冷無光黄河凍不流何處征戍行何人羇旅逰窮途絶糧客寒獄無燈囚勞生彼何苦遂性我何優撫心但自媿孰知其所由三年除夜晰晰燎火光氲氲臘酒香嗤嗤童穉戲迢迢嵗夜長堂上書帳前長幼合成行以我年最長次第來稱觴七十期漸近萬縁心已忘不惟少歡樂兼亦無悲傷素屏應居士青衣侍孟光夫妻老相對各坐一繩牀顧虎頭畫維摩居士圖白衣素屏也自題小園不鬬門館華不鬬林園大但鬬為主人一坐十餘載逥㸔甲乙第列在都城内素垣夾朱門藹藹遥相對主人安在哉富貴去不逥池乃為魚鑿林乃為禽栽何如小園主拄杖閒即來親賓有時㑹琴酒連夜開以此聊自足不羡大池臺病中晏坐有酒病不飲有詩慵不吟頭眩平聲罷垂釣手痺休援琴竟日悄無事所居閒且深外安支離體中養希夷心窻户納秋景竹木澄夕陰宴坐小池畔清風時動襟戒藥促促急景中蠢蠢微塵裏生涯有分限愛戀無終巳早夭羡中年中年羡暮齒暮齒又貪生服食求不死朝呑太陽精夕吸秋石髓徼福反成災藥誤者多矣以之資嗜慾又望延甲子天人陰隲間亦恐無此理域中有真道所説不如此後身始身存吾聞諸老氏贈夢得前日君家飲昨日王家宴今日過我廬三日三㑹面當歌聊自放對酒交相勸為我盡一杯與君發三願一願世清平二願身强健三願臨老頭數與君相見逸老莊子云勞我以生逸我以老息我以死也白日下駸駸青天髙浩浩人生在其中適時即為好勞我以少壯息我以衰老順之多吉壽違之或凶夭我初五十八息老雖非早一閑十三年所得亦不少况加禄仕後衣食常温飽又從風疾來女嫁男婚了胷中一無事浩氣凝襟抱飄若雲信風樂於魚在藻桑榆坐已暮鐘漏行將曉皤然七十翁亦足稱壽考筋骸本非實一束芭蕉草眷屬偶相依一夕同棲鳥去何有顧戀住亦無憂惱生死尚復然其餘安足道是故臨老心𡨕然合𤣥造立名按倪思云樂天平生詩文旣髙立朝忠直而有用為郡守多遺愛處謫地不少挫屈於牛李與之逰不為所汚亦不致賈禍晩年優游分司有林泉聲伎之奉是真可慕羡也遇物感興因示子弟聖擇狂夫言俗信老人語我有老狂詞聽之吾語汝吾觀器用中劍鋭鋒多傷吾觀形骸内骨勁齒先亡寄言處世者不可苦剛強龜性愚且善鳩心鈍無惡人賤拾支牀鶻欺擒煖脚寄言立身者不得全柔弱彼固罹禍難此未免憂患平聲于何保終吉強弱剛柔間上遵周孔訓旁鑒老莊言不惟鞭其後亦要軛其先首夏南池獨酌春盡雜英歇夏初芳草深薰風自南至吹我池上林緑蘋散還合赬鯉跳復沈新葉有佳色殘鶯猶好音依然謝家物池酌對風琴慙無康樂作秉筆思沈吟境勝才思劣詩成不稱心官俸初罷親故見憂以詩諭之七年為少傅品髙俸不薄乘軒已多慙况是一病鶴又及懸車嵗筋力轉衰弱豈以貧是憂尚為名所縛今春始病免纓組初擺落蜩甲有何知雲心無所著囷中殘舊榖可備嵗飢惡園中多新蔬未至食藜藿不求安師卜不問陳生藥但對丘中琴時開池上酌信風舟不繫掉尾魚方樂親友不我知而憂我寂寞安與陳皆洛下藝術精者閒居偶吟招鄭庶子皇甫郎中自哂此迂叟少迂老更迂家計不一問園林聊自娱竹間琴一張池上酒一壺更無俗物到但與秋光俱古石蒼錯落新泉碧縈紆焉用車馬客即此是吾徒猶有所思人各在城一隅杳然愛不見搔首方踟躕𤣥晏風韻逺子真雲貌孤誠知厭朝市何必憶江湖能來小澗上一聽潺湲無亭西牆下伊渠水中置石激流潺湲成韻頗有幽趣以詩記之嵌巉嵩石峭皎潔伊流清立為逺峯勢激作寒玉聲夾岸羅密樹面灘開小亭忽疑嚴子瀨流入洛陽城是時羣動息風靜微月明髙枕夜悄悄滿耳秋泠泠終日臨大道何人知此情此情苟自愜亦不要人聽閒題家池寄王屋張道士有石白磷磷有水清潺潺有叟頭似雪婆娑乎其間進不趨要路退不入深山深山太濩落要路多險艱不如家池上樂逸無憂患有食適吾口有酒酡吾顔恍惚遊醉鄉希夷造𤣥關五千言下悟十二年來閑富者我不顧貴者我不攀惟有天壇子時來一往還李盧二中丞各創山居俱誇勝絶然去城稍逺來往頗勞敝居新泉實在宇下偶題十五韻聊戲二君龍門蒼石壁李所有也浥澗碧潭水盧所有也各在一山隅迢迢幾十里清鏡碧屏風惜哉信為美愛而不得見亦與無相似聞君每來去矻矻事行李脂轄復裹糧心力頗勞止未如吾舎下石與泉甚邇鑿鑿復濺濺晝夜流不已洛石千萬拳襯波鋪錦綺海珉一兩片激瀨含宫徴緑宜春濯足淨可朝漱齒繞砌紫鱗游拂簾白鳥起何言履道叟便是滄浪子君若趁歸程請君先到此願以潺湲聲洗君塵土耳北窻竹石一片瑟瑟石數竿青青竹向我如有情依然㸔不足况臨北窻下復近西塘曲筠風散餘清苔雨含微緑有妻亦衰老無子方煢獨莫掩夜窻扉共渠相伴宿飲後戲示弟子吾為爾先生爾為吾弟子孔門有遺訓復坐吾告爾先生饌酒食弟子服勞止孝敬不在他在兹而已矣欲我少憂愁欲我多歡喜無如醖好酒酒須多且㫖㫖即賓可留多即罍不恥吾更有一言爾宜聽入耳人老多憂貧人病多憂死我今雖老病所憂不在此憂在半酣時尊空座客起閑坐㸔書貽諸少年雨砌長寒蕪風庭落秋果窻間有閒叟盡日㸔書坐書中見往事厯厯知福禍多取終厚亡疾驅必先􅑁勸君少干名名為錮身鏁勸君少求利利是焚身火我心知已久吾道無不可所以雀羅門不能寂寞我夢上山時足疾未平夜夢上嵩山獨􅂝藜杖出千巖與萬壑遊覽皆周畢夢中足不病健似少年日旣悟神返初依然舊形質始知形神内形病神無疾形神兩是幻夢悟俱非實晝行雖蹇澀夜步頗安逸晝夜旣平分其間何得失對酒閑吟贈同老者人生七十稀我年幸過之逺行將盡路春夢欲覺時家事口不問世名心不思老旣不足歎病亦不能治扶侍仰婢僕將養信妻兒飢飽進退食寒暄加減衣聲妓放鄭衛裘馬脱輕肥百事盡除去尚餘酒與詩興來吟一篇吟罷酒一巵不獨適情性兼用扶衰羸雲液灑六腑陽和生四肢於中我自樂此外吾不知寄問同老者舎此將安歸莫學蓬心叟胷中殘是非晩起閒行皤然一老子擁裘仍隱几坐穩夜忘眠卧安朝不起起來無可作閉目時叩齒靜對銅爐香暖漱銀缾水午齋何儉潔餅與蔬而已西寺講楞伽閒行一隨喜香山居士寫真詩并序元和五年予為左拾遺翰林學士奉詔寫真於集賢殿御書院時年三十七㑹昌二年罷太子少傅為白衣居士又寫真於香山寺藏經堂時年七十一前後相望殆將三紀觀今照昔慨然自歎者久之形容非一世事幾變因題六十字以寫所懐立名按公生於壬子三十七嵗為元和三年丁亥若五年庚寅則年三十九矣此五年當誤况序中云前後相望殆將三紀時年七十一為㑹昌二年壬戌自丁亥至壬戌計三十五年與將三紀之語正合三五字形易誤其為傳寫之誤無疑也昔作少學士圖形入集賢今為老居士寫貌寄香山鶴毳變𤣥髪雞膚換朱顔前形與後貌相去三十年勿歎韶華子俄成皤叟仙請㸔東海水亦變作桑田二年三月五日齋畢開素當食偶吟贈妻𢎞農郡君睡足肢體暢晨起開中堂初旭泛簾幕微風拂衣裳二婢扶盥櫛雙童舁簟牀庭東有茂樹其下多陰涼前月事齋戒昨日散道場以我久蔬素加籩仍異糧魴鱗白如雪蒸炙加桂薑稻飯紅似花調沃新酪漿佐以脯醢味間之椒薤芳老憐口尚美病喜鼻聞香嬌騃三四孫索哺繞我傍山妻未舉案饞叟已先嘗憶同牢􅈟初家貧共糟糠今食且如此何必烹豬羊况觀姻族間夫妻半存亡偕老不易得白頭何足傷食罷酒一杯醉飽吟又狂緬想梁髙士樂道喜文章徒誇五噫作不解贈孟光不出門彌月不出門永日無來賓食飽更拂牀睡覺一嚬伸輕箑白鳥羽新簟青箭筠方寸方丈室空然兩無塵披衣腰不帶散髪頭不巾袒跣北窻下葛天之遺民一日亦自足况得以終身不知天壤内目我為何人感舊并序故李侍郎杓直長慶元年春薨元相公微之太和六年秋薨崔侍郎晦叔太和七年夏薨劉尚書夢得㑹昌二年秋薨四君子予之執友也二十年間凋零共盡惟予衰病至今獨存因詠悲懐題為感舊晦叔墳荒草巳陳夢得墓溼土猶新微之捐館將一紀杓直歸丘二十春城中雖有故第宅庭蕪園廢生荆榛篋中亦有舊書札紙穿字蠧成灰塵平生定交取人窄屈指相知惟五人四人先去我在後一枝蒲栁衰殘身豈無晩嵗新相識相識面親心不親人生莫羡苦長命命長感舊多悲辛送毛仙翁江州司馬時作立名按此詩舊編後集當是從後追憶錄入者毛仙翁能預决人休咎或晩年思其言有驗遂存此詩耳餘並附詳詩後仙翁已得道混迹尋巖泉肌膚氷雪瑩衣服雲霞鮮紺髪絲並緻齠容花共妍方瞳㸃𤣥漆髙步凌非一作飛煙幾見桑海變莫知龜鶴年所憩九清外所逰五岳巔軒昊舊為侶松􅔬難比肩每嗟人世人役役如狂顛孰能脱羈鞅盡遭名利牽貌隨嵗律換神逐光陰遷惟余負憂譴顦顇湓江壖衰鬢忽霜白愁腸如火煎羇旅坐多感徘徊私自憐晴眺五老峯玉洞多神仙何當憫湮厄授道安虚孱我師惠然來論道窮重𤣥浩蕩八溟濶志泰心超然形骸旣無束得䘮亦都捐豈識椿菌異那知鵬鷃懸丹華旣相付促景定當延𤣥功曷可報感極惟勤拳霓旌不肯駐又歸武夷川語罷倐然别孤鶴升遥天賦詩敘明德永續步虚篇附紀事韓愈云仙翁姓毛氏名于姬與韓為族愈末年為弟也相識於潮陽逆旅叙宗焉察其言不由乎孔聖道不由乎老莊教而以慧性知人爵禄厚薄壽命長短發言如騁駟囁嚅持疑於脣吻間即信乎異人也若古之許負輩不足言矣然兄言果有證愈自典袁州從袁州除國子祭酒後主兵部事續拜京兆尹又改吏部郎中若如言即埽茅屋俟兄一日歡笑亦不朽之名也酒酣留詞走筆而成不能采其文章之要也時元和十四年巳亥四月十六日族弟門人韓愈序裴度云仙翁嗇神胎元抱和含真穆然道風煦然如春追駐穉色將數百年光陰自駛寒暑不易鑪鎚之間物無不化養之在我得之自然牛僧孺云僧孺見仙翁兄深仰其為真人也又云兄不離世間而出世間浩蕩乎嗜慾之境蹂躪乎人情之囿三事五侯躬擁彗于門獲禮東仙翁者為榮不獲禮為羞元稹云余亷問浙嵗毛仙翁惠然來顧越之人士識之者咸相與言曰仙翁嘗與葉法善吳筠逰於稽山迨兹多厯年所而風貌愈少盖神仙者流也余因得執弟子之禮師其道焉語多不能盡載時李翺王起令狐楚鄭李程楊李宗閔楊崔郾李益澣於陵嗣復劉沈傅師張崔元畧有栁公綽其李紳禹錫仲方各詩篇詠神異達哉樂天行達哉達哉白樂天分司東都十三年七旬纔滿冠已掛半禄未及車先懸或伴遊客春行樂或隨山僧夜坐禪二年忘却問家事門庭多草廚少煙庖童朝告鹽米盡侍婢暮訴衣裳穿妻孥不悦甥姪悶而我醉卧方陶然起來與爾畫生計薄産處置有後先先賣南坊十畆園次賣東郭五項田然後兼賣所居宅髣髴獲緡二三千半與爾充衣食費半與吾供酒肉錢吾今已年七十一眼昏鬚白頭風眩但恐此錢用不盡即先朝露歸夜泉未歸且住亦不惡飢餐樂飲安穩眠死生無可無不可達哉達哉白樂天能無媿十兩新綿褐披行暖似春一團香絮枕倚坐穩於人婢僕遣他嘗藥酒兒孫與我拂衣巾迴㸔左右能無媿養活枯殘廢退身白香山詩集巻二十四
