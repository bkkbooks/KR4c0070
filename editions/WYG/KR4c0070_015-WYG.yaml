body:
  text: 白香山詩集巻十五歙縣汪立名編長慶集十五律詩五言七言九十九首渭邨退居寄禮部崔侍郎翰林錢舍人詩一百韻聖代元和嵗閒居渭水陽不才甘命舛多幸遇時康朝野分倫序賢愚定否臧重文疎卜式尚少棄馮唐由是推天運從兹樂性場籠禽放髙翥霧豹得深藏世慮休相擾身謀且自强猶須務衣食未免事農桑薙草通三徑開田占一坊晝扉扃白版夜碓掃黄粱隙地治場圃閒時糞土疆枳籬編刺夾薤壟擘科秧穡力嫌身病農心願嵗穰朝衣典杯酒佩劒博牛羊困倚栽松鍤饑提採蕨筐引泉來後澗移竹下前岡生計雖勤苦家資甚渺茫塵埃常滿甑錢帛少盈囊弟病仍扶杖妻愁不出房傳衣念襤褸一作繿縷舉案笑糟糠犬吠邨胥閙蟬鳴織婦忙納租看縣帖輸粟問軍倉夕歇攀邨樹秋行遶野塘雲容隂慘澹月色冷悠揚蕎麥鋪花白棠棃間葉黄早寒風摵摵新霽月蒼蒼園菜迎霜死庭蕪過雨荒簷空愁宿鷰壁闇思啼螿眼為㸔書損肱因運甓傷病骸渾似木老鬢欲成霜少睡知年長端憂覺夜長舊遊多廢忘往事偶思量忽憶煙霄路常陪劒履行登朝思檢束入閣學趨蹌命偶風雲㑹恩覃雨露霶沾枯發枝葉磨鈍起鋒鋩崔閣連鑣騖錢兄接翼翔齊竽混韶夏燕石厠琳琅同日升金馬分宵直未央共詞加寵命合表謝恩光廐馬驕初跨天厨味始嘗朝晡頒餅餌寒暑賜衣裳對秉鵞毛筆俱含雞舌香青縑衾薄絮朱裏幕髙張晝食恒連案宵眠每並床差肩承詔㫖連署進封章起艸偏同視疑文最共詳滅私容㸃竄窮理析毫芒便共輸肝膽何曾異肺腸慎微參石奮決密與張湯禁闥青交𤨏宮垣紫界牆井欄排菡蓞簷瓦鬭鴛鴦樓額題鳷鵲池心浴鳯凰風枝萬年動温樹四時芳宿露凝金掌晨暉上璧璫砌筠塗緑粉庭果滴紅漿曉從朝興慶春陪宴柏梁傳呼鞭索索拜舞珮鏘鏘仙仗環雙闕神兵闢兩廂火翻紅尾斾冰卓白竿槍滉瀁經魚藻深沉近浴堂分庭皆命婦對院即儲皇貴主冠浮動親王轡閙裝金鈿相照耀朱紫間熒煌毬簇桃花騎歌廵竹葉觴窪銀中貴帯昂黛内人妝賜禊東城下頒酺曲水傍尊罍分聖酒妓樂借仙倡淺酌看紅藥徐吟把緑楊宴㢠廻過御陌行歇入僧房白鹿原東郭一作脚青龍寺北廊望春花景暖避暑竹風凉下直閒如社尋芳醉似狂有時還後到無處不相將雞鶴初雖雜蕭蘭久乃彰來燕隗貴重去魯孔恓惶聚散期難定飛沉勢不常五年同晝夜一别似參商屈折孤生竹銷摧百鍊鋼途窮任憔悴道在肯徬徨一作慞惶尚念遺簪折仍憐病雀瘡䘏寒分賜帛救餒減餘糧藥物來盈裹書題寄滿箱殷勤翰林主珍重禮闈郎喣沫誠多謝摶扶豈所望提攜勞氣力吹簸不飛揚拙劣才何用龍鍾分自當妝嫫徒費黛磨甋詎成璋習隱將時背干名與道妨外身宗老氏齊物學蒙莊疎放遺千慮愚蒙守一方樂天無怨歎倚命不劻勷憤懣胸須豁交加臂莫攘珠沉猶是寶金躍未為祥泥尾休揺掉灰心罷激昂漸閒親道友因病事醫王息亂歸禪定存神入坐亡斷癡求慧劒濟苦得慈航不動為吾志無何是我鄉可憐身與世從此兩相忘立名按公此詩押二房字又夢遊春押二行字路次藍溪押二水字遊悟真寺押二槃字學林新編云子美飲中八仙歌三十二句押二船字二眠字二天字三前字又北征一篇押二日字贈汝陽王押二陵字喜薛璩岑參遷官押二萍字寄賈岳州嚴巴州兩閣老押二騫字如此類重韻甚多然非剏為葢有所本文選曹子建美女篇押二難字謝靈運述祖德詩押二人字阮嗣宗詠懷押二歸字江淹雜體押二門字王仲宣從軍押二人字古人詩自有體格子美亦傚古人之作耳韓退之寄孟郊押二奥字此日足可惜押二光字二江字詩人如此疊用韻者甚多不可具舉意到即押耳奚足怪蘇詩送江公忽憶釣臺歸洗耳又曰亦念人生行樂耳注曰二耳義不同故得重用蓋子瞻自不必注也容齋隨筆樂天渭村退居詩敘翰苑之親近可見唐時宫禁與外廷不至相隔故杜詩户外昭容紫袖垂雙瞻御座引朝儀又云舍人退食收封事宫女開函近御筵而學士獨稱内相至於與命婦分庭見貴主冠服内人黛妝假仙倡以佐酒他司無比也酬盧秘書二十韻時初奉詔除贊善大夫謬厯文塲選慙非翰苑才雲霄髙蹔致毛羽弱先摧識分忘軒冕知歸返艸萊杜陵書積蠧豐獄劒生苔晦厭鳴雞雨春驚震蟄雷舊恩收墜履新律動寒灰鳯詔容徐起鵷行許重陪衰顔雖拂拭蹇步尚徘一作低徊睡少鐘偏警行遲漏苦催風霜趂朝去雨一作泥雪拜陵㢠廻上感君猶念傍慙友或推石頑鐫費匠一作力女醜嫁勞媒倐忽青春度奔波白石一作日頽性將時共背病與老俱來聞有蓬壺客知懷杞梓材世家標甲第官職滯靈臺筆盡鉛黄㸃詩成錦繡堆甞思豁雲霧忽喜訪塵埃心為論文合睂因勸善開不勝珍重意滿袖寫瓊瓌題盧秘書夏日新栽竹二十韻湘竹初封植盧生此考槃久持霜節苦新託露根難等度須當砌疎稠要滿欄買憐分薄俸栽稱作閒官葉剪藍羅碎莖抽玉琯端幾聲清淅瀝一簇緑檀欒未夜青嵐入先秋白露團一作漙拂肩揺翡翠熨手弄琅玕韻透窻風起隂鋪砌月殘炎天聞覺冷窄地見疑寛梢動勝揺扇枝低好掛冠碧籠煙羃羃珠灑雨珊珊晚一作曉籜晴雲展隂芽蟄虺蟠愛從抽馬䇿惜未截魚竿松韻徒煩聽桃夭不足觀梁慙當家杏臺陋本司蘭古詩云盧家蘭室杏為梁又秘書府即蘭臺也撐撥詩人興勾牽酒客歡靜連蘆簟滑涼拂葛衣單豈止消時暑應能保嵗寒莫同凡艸木一種夏中看渭村酬李二十見寄百里音書何太遲暮秋把得暮春詩栁條緑日君相憶梨葉紅時我始知莫歎學官貧冷落猶勝村客病支離形容意緒遥看取不似華陽觀裏時初授贊善大夫早朝寄李二十助教病身初謁青宫日衰貌新垂白髪年寂寞曹司非熱地蕭條風雪是寒天逺坊早起常侵鼓瘦馬行遲苦費鞭一種共君官職冷不如猶得日髙眠欲與元八卜鄰先有是贈平生心迹最相親欲隱墻東不為身明月好同三徑夜緑楊宜作兩家春每因暫出猶思伴豈得安居不擇鄰可獨終身數相見子孫長作隔墻人遊城南留元九李二十晚歸老遊春飲莫相違不獨花稀人亦稀更勸殘杯看日影猶應趂得鼓聲歸廣宣上人以應制詩見示因以贈之詔許上人居安國寺紅樓院以詩供奉道林談論惠休詩一到人天一作間便作師香積筵承紫泥詔昭陽歌唱碧雲詞紅樓許住請銀鑰翠輦陪行蹋玉墀惆悵甘泉曾侍從與君前後不同時重過秘書舊房因題長句時為贊善大夫閣前下馬思徘徊第二房門手自開昔為白面書郎去今作蒼頭一作鬚贊善來吏人不識多新補松竹相親是舊栽應有題墻名姓在試將衫袖拂塵埃重到城七絶句見元九容貌一日減一日心情十分無九分每逢陌路猶嗟歎何况今朝是見君髙相宅青苔故里懷恩地白髪新生抱病身涕淚雖多無哭處永寧門館屬他人張十八諫垣幾見遷遺補憲府頻聞轉殿監獨有詠詩張太祝十年不改舊官銜劉家花劉家墻上花還發李十門前艸又春處處傷心心始悟多情不及少情人裴五莫怪相逢無笑語感今思舊㦸門前張家伯仲偏相似每見清揚一惘然仇家酒年年老去歡情少處處春來感事深時到仇家非愛酒醉時心勝醒時心恒寂師舊遊分散人零落如此傷心事幾條㑹逐禪師坐禪去一時滅盡定中消靖安北街贈李二十榆莢抛錢栁展睂兩人並馬語行遲還似往年安福寺共君私試却廻時重傷小女子學人言語凭牀行嫩似花房脆似瓊纔知恩愛迎三嵗未辨東西過一生汝異下殤應殺禮吾非上聖詎忘情傷心自歎鳩巢拙長墮春雛養不成過顔處士墓向墳通一作道徑没荒榛滿室詩書積闇塵長夜肯教黄壤曉悲風不許白楊春簞瓢顔子生仍促布被黔婁死更貧未㑹悠悠上天意惜將富壽與何人題周皓大夫新亭子二十二韻東道常為主南亭别待賓規模何日創景致一時新廣砌羅紅藥疎窻䕃緑筠鏁開賓閣曉梯上妓樓春置醴寧三爵加籩過八珍茶香飄紫筍膾縷落紅鱗輝赫車輿閙珍竒鳥獸馴獼猴看􅇫馬鸚鵡喚家人錦額簾髙巻銀花琖慢廵勸甞光禄酒許看洛川神周兼光禄卿有家妓數十人斂翠凝歌黛流香動舞巾裙翻繡鸂鶒梳䧟鈿麒麟笛怨音含楚箏嬌語帶秦侍兒催畫燭醉客吐文茵投轄多連夜鳴珂便達晨入朝紆紫綬待漏擁朱輪貴介交三事光榮照四鄰甘濃將奉客穩煖不縁身十載歌鐘地三朝節鉞臣愛才心倜儻敦舊禮殷勤門以招賢盛家因好事貧始知豪傑意富貴為交親賦得聽邊鴻驚風吹起塞鴻羣半拂平沙半入雲為問昭君月下聽何如蘇武雪中聞見楊𢎞貞詩賦因題絶句以自諭賦句詩章妙入神未年三十即無身常嗟薄命形憔悴若比𢎞貞是幸人病中早春今朝枕上覺頭輕强起堦前試脚行羶膩斷來無氣力風痰惱得少心情煖銷霜瓦津初合寒減冰渠凍不成唯有愁人鬢間雪不隨春盡逐春生送人貶信州判官地僻山深古上饒土風貧薄道程遥不唯遷客須恓屑見說居人也寂寥溪畔毒沙藏水弩城頭枯樹下山魈若於此郡為卑吏刺史㕔前又折腰曲江醉後贈諸親故郭東邱墓何年客江畔風光幾日春只合殷勤逐杯酒不須疎索向交親中天或有長生藥下界應無不死人除却醉來開口笑世間何事更關身和元八侍御升平新居四絶句時方與元八十鄰看花屋忽驚映樹新開屋却似當簷故種花可惜年年紅似火今春始得屬元家累土山堆土漸髙山意出終南移入户庭間玉峰藍水應惆悵恐見新山忘舊山元八舊居在藍田山髙亭亭脊太髙君莫拆東家留取當西山好看落日斜銜處一片春嵐映半環松樹白金換得青松樹君既先栽我不栽幸有西風易憑仗夜深偷送好聲來醉後却寄元九蒲池村裏匆匆别灃水橋邊兀兀廻行到城門殘酒醒萬重離恨一時來重寄一作重寄元九蕭散弓驚鴈分飛劒化龍悠悠天地内不死㑹相逢李十一舍人松園飲小酎酒得元八侍御詩敘云在臺中推院有鞠獄之苦即事書懷因酬四韻愛酒舍人開小酌能文御史寄新詩亂松園裏醉相憶古柏㕔前忙不知早夏我當逃暑日晩衙君是慮囚時惟因清夜無公事新艸亭中好一期元於升平宅新立艸亭重到華陽觀舊居憶昔初年三十二當時秋思已難堪若為重入華陽院病鬢愁心四十三答勸酒莫怪近來都不飲幾囘因醉却沾巾誰料平生狂酒客如今變作酒悲人題王侍御池亭朱門深鎻春池滿岸落薔薇水浸莎畢竟林塘誰是主主人來少客來多聽水部吳員外新詩因贈絶句朱紱仙郎白雪歌和人雖少愛人多明朝說向一作與詩家道水部如今不姓何雨夜憶元九天隂一日便堪愁何况連宵雨不休一種雨中君最苦偏梁閣道向通州雨中攜元九詩訪元八侍御微之詩巻憶同開假日多應不入臺好句無人㻣共詠衝泥蹋水就君來贈楊秘書巨源楊嘗有贈盧洺州詩云三刀夢益州一箭取遼城由是知名早聞一箭取遼城相識雖新有故情清句三朝誰是敵白鬚四海半為兄貧家薙艸時時入瘦馬尋花處處行不用更教詩過好折君官職是聲名和武相公感韋令公舊池孔雀同用深字索寞少顔色池邊無主禽難收帶泥翅易結著人心頂毳落殘碧尾花銷闇金放歸飛不得雲海故巢深寄生衣與微之因題封上淺色縠衫輕似霧紡花紗袴薄於雲莫嫌輕薄但知著猶恐通州熱殺君白牡丹白花冷淡無人愛亦占芳名道牡丹應似東宫白贊善被人還喚作朝官夢舊别來老大苦修道鍊得離心成死灰平生憶念消磨盡昨夜因何入夢來戲題盧秘書新移薔薇風動翠條腰嫋娜露垂紅萼淚闌干移他到此須為主不别花人莫使看立名按韻語陽秋云樂天詩多說别花如紫薇花詩世間少有别花人薔薇花詩不别花人莫使看今好事之家竒花多矣所謂别花人未之見也鮑溶作仙壇花詩寄袁德師侍御有欲求御史更分别之句豈謂是耶曲江夜歸聞元八見訪自入臺來見面稀班中遥得揖容輝早知相憶來相訪悔待江頭明月歸苦熱題恒寂師禪室人人避暑走如狂獨有禪師不出房可是禪房無熱到但能心靜即身凉微之到通州日授館未安見塵壁間有數行字讀之即僕舊詩其落句云渌水紅蓮一朶開千花百艸無顔色然不知題者何人也微之吟歎不足因綴一章兼録僕詩本同寄省其詩乃是十五年前初及第時贈長安妓人阿軟絶句緬思往事杳若夢中懐舊感今因酬長句十五年前似夢遊曾將詩句結風流偶助笑歌嘲阿軟可知傳誦到通州昔教紅袖佳人唱今遣青衫司馬愁惆悵又聞題處所雨淋江館破墻頭得微之到官後書備知通州之事悵然有感因成四章來書子細說通州州在山根峽岸頭四面千重火雲合中心一道瘴江流蟲蛇白晝攔官道蚊蚋一作蟆黄昏撲郡樓何罪遣君居此地天髙無處問來由匼匝巔山萬仞餘人家應似甑中居寅年籬下多逢虎亥日山頭始賣魚衣斑梅雨長須熨米澀畬田不解鉏努力安心過三考已曾愁殺李尚書李實尚書先貶此州身殁於彼處立名按瀛奎律髓予讀至此乃知古人初無忌諱元微之貶移通州司馬今蜀之開州也未為甚惡樂天在江州乃引死人事寄詩足見前輩真情人稀地僻醫巫少夏旱秋霖瘴瘧多老去一身須愛惜别來四體得如何侏儒飽笑東方朔薏苡讒憂馬伏波莫遣沈愁結成病時時一唱濯纓歌通州海内恓惶地司馬人間冗長去聲官傷鳥有弦驚不定卧龍無水動應難劒埋獄厎誰深掘松偃霜中盡冷看舉目爭能不惆悵髙車大馬滿長安病中答招飲者顧我鏡中悲白髪盡津上聲君花下醉青春不縁眼痛兼身病可是尊前第二人鷰子樓三首并序徐州故張尚書有愛妓曰盼盼善歌舞雅多風態予為校書郎時遊徐泗間張尚書宴予酒酣出盼盼以佐歡歡甚予因贈詩云醉嬌勝不得風嫋牡丹花盡歡而去爾後絶不相聞迨兹僅一紀矣昨日司勲員外郎張仲素績之訪予因吟新詩有燕子樓三首詞甚婉麗詰其由為盼盼作也績之從事武寧軍累年頗知盼盼始末云尚書既没歸葬東洛而彭城有張氏舊第第中有小樓名燕子盼盼念舊愛而不嫁居是樓十餘年幽獨塊然于今尚在予愛績之新詠感彭城舊遊因同其題作三絶句滿窻明月滿簾霜被冷燈殘拂卧床燕子樓中霜月夜秋來只為一人長鈿暈羅衫色似煙幾囘欲著即澘然自從不舞霓裳曲疊在空箱十一年今春有客洛陽囘曾到尚書墓上來見說白楊堪作柱爭教紅粉不成灰附關盼盼燕子樓詩樓上殘燈伴曉霜獨眠人起合歡床相思一夜情多少地角天涯未是長劒北邙松柏鎻愁煙燕子樓中思悄然自理履歌塵絶紅袖香消二十年適看鴻鴈岳陽囘又覩𤣥禽逼社來瑶瑟玉簫無意緒任從蛛網任從灰感故張僕射諸妓黄金不惜買蛾睂揀得如花三四枝歌舞教成心力盡一朝身去不相隨立名按堯山堂外紀云此詩為諷昐盼而作盼盼得詩反覆讀之泣曰自我公薨背妾非不能死恐百載之後人以我公重色有從死之妾是玷我公清範也乃答白公詩曰自守空房恨斂睂形同春後牡丹枝舍人不㑹人深意訝道泉臺不去隨旬日不食而死初貶官過望秦嶺自此後詩江州路上作草草辭家憂後事遲遲去國問前途望秦嶺上囘頭立無限秋風吹白鬚藍橋驛見元九詩詩中云江陵歸時逢春雪藍橋春雪君歸日秦嶺秋風我去時每到驛亭先下馬循墻遶柱覔君詩韓公堆寄元九韓公堆北澗西頭冷雨凉風拂面秋努力南行少惆悵江州猶似勝通州發商州商州館裏停三日待得妻孥相逐行若比李三猶自勝兒啼婦哭不聞聲時李固言新没武關南見元九題山石榴花見寄往來同路不同時前後相思兩不知行過關門三四里榴花不見見君詩紅鸚鵡商山路逢安南逺進紅鸚鵡色似桃花語似人文章辯慧皆如此籠檻何年出得身題四皓廟卧逃秦亂起安劉舒巻如雲得自由若有精靈應笑我不成一事謫江州罷藥自學坐禪休服藥從他時復病沉沉此身不要全强健强健多生人我心白鷺人生四十未全衰我為愁多白髪垂何故水邊雙白鷺無愁頭上亦垂絲襄陽舟夜下馬襄陽郭移舟漢隂驛秋風截江起寒浪連天白本是多愁人復此風波夕江夜舟行煙澹月濛濛舟行夜色中江鋪滿槽水帆展半檣風呌曙嗷嗷鴈啼秋唧唧蟲只應催此客早作白鬚翁紅藤杖交親過滻别車馬到江廻惟有紅藤杖相隨萬里來江上吟元八絶句大江深處月明時一夜吟君小律詩應有水仙潛出聽翻將唱作步虚詞途中感秋節物行揺落年顔坐變衰樹初黄葉日人欲白頭時鄉國程程逺親朋處處辭惟憐一作殘病與老一步不相離登郢州白雪樓白雪樓中一望鄉青山簇簇水茫茫朝來渡口逢京使說道煙塵近洛陽時淮西冦未平舟夜贈内三聲猿後垂鄉淚一葉舟中載病身莫凭水窻南北望月明月暗總愁人逢舊我梳白髪添新恨君掃青蛾減舊容應被傍人怪惆悵少年離别老相逢臼口阻風十日洪濤白一作波浪塞江津處處邅㢠廻事事迍世上方為失途客江頭又作阻風人魚鰕遇雨腥盈鼻蚊蚋和煙癢滿身老大光隂能幾日等閒臼口坐經旬浦中夜泊暗上江隄還獨立水風霜氣夜稜稜囘看深浦停舟處蘆荻花中一㸃燈盧侍御與崔評事為予於黄鶴樓致宴宴罷同望江邊黄鶴古時樓勞致華筵待我遊楚思淼茫雲水冷商聲清脆管絃秋白花浪濺頭陀寺紅葉林籠鸚鵡洲總是平生未行處醉來堪賞醒堪愁舟中讀元九詩把君詩巻燈前讀詩盡燈殘天未明眼痛滅燈猶暗坐逆風吹浪打船聲舟行阻風寄李十一舍人扁舟厭泊煙波上輕䇿閒尋浦嶼間虎蹋青泥稠似印風吹白浪大於山且愁江郡何時到敢望京都幾嵗還今日料君朝退後迎寒新酎煖開顔雨中題衰栁濕屈青條折寒飄黄葉多不知秋雨意更遣欲如何題王處士郊居半依雲渚半依山愛此令人不欲還負郭田園八九頃向陽茅屋兩三間寒松縱老風標在埜鶴雖饑飲啄閒一卧江村來早晩著書盈帙鬢毛斑嵗晩旅望朝來暮去星霜換隂慘陽舒氣序牽萬物秋霜能壞色四時冬日最凋年烟波半露新沙地鳥雀群飛欲雪天向晩蒼蒼南北望窮隂旅思兩無邊晏坐閒吟昔為京洛聲華客今作江湖潦倒翁意氣銷磨群動裏形骸變化百年中霜侵殘鬢無多黑酒伴衰顔只蹔紅賴學禪門非想定千愁萬念一時空題李山人厨無煙火室無妻籬落蕭條屋舍低每日將何療饑渴井華雲粉一刀圭讀莊子去國辭家謫異方中心自怪少憂傷為尋莊子知歸處認得無何是本鄉江樓偶宴贈同座南浦閒行罷西樓小宴時望湖凭檻乆待月放杯遲江果嘗盧橘山歌聽竹枝相逢且同樂何必舊相知放言五首并序元九在江陵時有放言長句詩五首韻髙而體律意古而詞新予每詠之甚覺有味雖前輩深於詩者未有此作惟李頎有云濟水至清河自濁周公大聖接輿狂斯句近之矣予出佐潯陽未届所任舟中多暇江上獨吟因綴五篇以續其意耳朝真暮偽何人辨古往今來厎事無但愛莊一作􅆇生能詐聖可知寗子解佯愚艸螢有耀終非火荷露雖團豈是珠不取燔柴兼照乘可憐光彩亦何殊世途倚伏都無定塵網牽纒卒未休禍福迴還車轉轂榮枯反覆手藏鉤龜靈未免刳膓患馬失應無折足憂不信君看奕棋者輸贏須待局終頭贈君一法決狐疑不用鑽龜與祝蓍試玉要燒三日滿真玉燒三日不熱辨材須待七年期豫章木生七年而後知周公恐懼流言日一作後王莽謙恭未簒時向使當時一作初身便死一生真偽復誰知誰家第宅成還破何處親賔哭復歌昨日屋頭堪炙手今朝門外好張羅北邙未省留閒地東海何曽有定波莫笑賤貧誇富貴共成枯骨兩如何泰山不要欺毫末顔子無心羨老彭松樹千年終是朽槿花一日自為榮何須戀世常憂死亦莫嫌身漫厭生生去死來都是幻幻人哀樂繫何情嵗暮道情二首壯日苦曾驚嵗月長年都不惜光隂為學空門平等法先齊老少死生心半故青衫半白頭雪風吹面上江樓禪功自見無人覺合是愁時亦不愁讀李杜詩集因題巻後翰林江左日員外劍南時不得髙官職仍逢苦亂離暮年逋客恨浮世謫仙悲吟詠流千古聲名動四夷文塲供秀句樂府待新辭天意君須㑹人間要好詩賀監知章目李白為謫仙人強酒若不坐禪銷妄想即須行醉放狂歌不然秋月春風夜爭那閒思往事何獨樹浦雨夜寄李六郎中忽憶兩家同里巷何曾一處不追隨閒遊預算分朝日靜語多同待漏時花下放狂衝黑飲燈前起坐徹明棋可知風雨孤舟夜蘆葦叢中作此詩聽崔七妓人箏花臉雲鬟坐玉樓十三絃裏一時愁憑君向道休彈去白盡江州司馬頭望江州江迴望見雙華表知是潯陽西郭門猶去孤舟一作城三四里水煙沙雨欲黄昏初到江州潯陽欲到思無窮庾亮樓南湓口東樹木凋疎山雨後人家低濕水煙中菰蔣餧馬行無力蘆荻編房卧有風遥見朱輪來出郭相迎勞動使君公醉後題李馬二妓行揺雲髻花鈿節應似霓裳趂管絃豔動舞裙渾是火愁凝歌黛欲生煙有風縱道能迴雪無水何由忽吐蓮疑是兩般心未決雨中神女月中仙盧侍御小妓乞詩座上留贈鬱金香汗裛歌巾山石榴花染舞裙好似文君還對酒勝於神女不歸雲夢中那及覺時見宋玉荆王應羨君白香山詩集巻十五
