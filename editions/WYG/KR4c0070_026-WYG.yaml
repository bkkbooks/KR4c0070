body:
  text: 白香山詩集巻二十六歙縣汪立名編後集六律詩凡六十八首元㣲之除浙東觀察使喜得杭越鄰州先贈長句按以下並與㣲之和答稽山鏡水歡遊地犀帶一作角金章榮貴身官職比君雖較小封疆與我且為鄰郡樓對翫千峰月一作對望千山月江界平分兩岸春杭越風光詩酒主相看更合與何人荅㣲之上船後畱别燭下尊前一分手舟中岸上兩迴頭歸來虚白堂中夢合眼先應到越州荅㣲之西陵驛見寄煙波盡處一㸃白應是西陵古驛臺知在臺邊望不見暮潮空送渡船迴荅㣲之誇越州州宅賀上人回得報書大誇州宅似仙居厭看馮翊風沙久喜見蘭亭煙景初日出旌旗生氣色月明樓閣在空虚知君暗數江南郡除却餘杭盡不如微之重誇州居其落句有西州羅刹之謔因嘲兹石聊以寄懷按咸淳臨安志秦望山近東南有大石崔嵬横截江濤商船海舶經此多風浪傾覆因呼羅刹君問西州城下事醉中疊紙為君書嵌空石面標羅刹壓捺潮頭敵子胥神鬼曾鞭猶不動波濤雖打欲何如誰知太守心相似抵滯堅頑兩有餘張十八員外以新詩二十五首見寄郡樓月下吟翫通夕因題卷後封寄㣲之秦城南省清秋夜江郡東樓明月時去我三千六百里得君二十五篇詩陽春曲調髙難和澹水交情老始知坐到天明吟未足重封轉寄與㣲之酬㣲之微之題云郡務稍簡因得整集舊詩并連綴刪削封章諫草繁委箱笥僅踰百軸偶成自歎兼寄樂天滿袠塡箱唱和詩少年為戲老成悲聲聲麗曲敲寒玉句句妍辭綴色絲吟翫獨當明月夜傷嗟同是白頭時由來才命相磨折天遣無兒欲怨誰微之句云天遣兩家無嗣子欲將文字付誰人故以此答之微之整集舊詩及文筆為百軸以七言長句寄樂天樂天次韻酬之餘思未盡加為六韻海内聲華併在身篋中文字絶無倫美微之也遥知獨對封章草忽憶同為獻納臣走筆往來盈巻軸予與微之前後寄和詩數百篇近代無如此多有也除官遞互掌絲綸予除中書舍人微之撰制詞微之除翰林學士予撰制詞制從長慶詞髙古微之長慶初知制誥文格高古始變俗體繼者效之也詩到元和體變新衆稱元白為千字律詩或號元和格各有文姬才穉齒蔡邕無兒有女琰字文姬俱無通子繼餘塵陶潛小兒名通子琴書何必求王粲與女猶勝與外人荅㣲之詠懷見寄閤中同直前春事船裏相逢昨日情分袂二年勞夢寐並牀三宿話平生紫㣲北畔辭宫闕滄海西頭對郡城聚散窮通何足道醉來一曲放歌行酬㣲之誇鏡湖我嗟身老嵗方徂君更官髙興轉孤軍門郡閤曽閒否禹穴耶溪得到無酒琖省陪波巻白骰盆思共彩呼盧一泓鏡水誰能羨自有胸中萬頃湖㣲之詩云孫園虎寺隨宜看不必遥遥羨鏡湖故以此戲言荅之雪中即事荅微之連夜江雲黄慘澹平明山雪白糢糊銀河沙漲三千里梅嶺花排一萬株北市風生飄散麫東樓日出照凝酥誰家髙士闗門户何處行人失道途舞鶴庭前毛稍定擣衣碪上練新鋪戲團穉女呵紅手愁坐衰翁對白鬚壓瘴一州除疾苦呈豐萬井盡歡娛潤含玉徳懷君子寒助霜威憶大夫莫道煙波一水隔何妨氣候兩鄉殊越中地暖多成雨還有瑶臺瓊樹無醉封詩筒寄㣲之一生休戚與窮通處處相隨事事同未死又鄰滄海郡無兒俱作白頭翁展睂只仰三杯後代面唯憑五字中為向兩州郵吏道莫辭來去逓詩筒除夜寄㣲之鬢毛不覺白毿毿一事無成百不堪共惜盛時辭闕下同嗟除夜在江南家山泉石尋常憶世路風波子細諳老校扵君合先退明年半百又加三早春西湖閒遊悵然興懷憶與微之同賞因思在越官重事殷鏡湖之遊或恐未暇偶成十八韻寄㣲之上馬復呼賓湖邊景氣新管絃三數事騎從十餘人立換登山屐行攜漉酒巾逢花看當妓遇草坐為茵西日籠黄柳東風蕩白蘋小橋裝雁齒輕浪甃魚鱗畫舫牽徐轉銀船酌慢巡野情遺世累醉態任天眞彼此年將老平生分最親髙天従所願逺地得為鄰雲樹分三驛煙波限一津翻嗟寸步隔却厭尺書頻浙右稱雄鎮山隂委重臣貴垂長紫綬榮駕大朱輪出動刀槍隊歸生道路塵雁驚弓易散鷗怕鼔難馴百吏瞻相面千夫捧擁身自然閒興少應負鏡湖春答㣲之見寄時在郡樓對雪可憐風景浙東西先數餘杭次㑹稽禹廟未勝天竺寺錢湖不羨若耶溪擺塵野鶴春毛暖拍水沙鷗溼翅低更對雪樓君愛否紅闌碧甃㸃銀泥得湖州崔十八使君書喜與杭越鄰郡因成長句代賀兼寄㣲之三郡何因此結縁貞元科第忝同年故情歡喜開書後舊事思量在眼前越國封疆呑碧海杭城樓閣入青煙吳興卑小君應屈為是蓬萊最後仙貞元初同登科崔君名最在後當時崔自詠云人間不㑹雲間事應笑蓬萊最後仙立名按紀事崔元亮刺湖州時白公刺杭元㣲之以觀察刺越有唱和詩號三州唱和集早春憶㣲之昏昏老與病相和感物思君歎復歌聲早雞先知夜短色濃柳最占春多沙頭雨染斑斑草水面風驅瑟瑟波可道眼前光景惡其如難見故人何重寄别㣲之憑仗江波寄一詞不須惆悵報微之猶勝往嵗峽中别灔澦堆邊招手時看常州柘枝贈賈使君按此下自杭州歸洛詩莫惜新衣舞柘枝也従塵汚汗霑垂料君即却歸朝去不見銀泥衫故時汴河路有感三十年前路孤舟重往還繞身新眷屬舉目舊鄉闗事去唯畱水人非但見山啼襟與愁鬢此日兩成斑立名按長慶二年公以中書舍人除杭州刺史謝表云汴路未通取襄陽路赴任水陸七千餘里然則汴河路猶屬貞元末未應制䇿以前所經故曰三十年前路也埇橋舊業别業埇城北抛來二十春改移新徑路變換舊邨鄰有稅田疇薄無官弟姪貧田園何用問强半屬他人茅城驛汴河無景思秋日又淒淒地薄桑麻瘦邨貧屋舍低早苗多間草濁水半和泥最是蕭條處茅城驛向西河隂夜泊憶微之憶君我正泊行舟望我君應上郡樓萬里月明同此夜黄河東面海西頭杭州迴舫自别錢唐山水後不多飲酒嬾吟詩欲將此意憑迴棹報與西湖風月知途中題山泉決決涌巖穴濺濺出洞門向東應入海從此不歸源似葉飄辭樹如雲斷别根吾身亦如此何日返鄉園欲到東洛得楊使君書因以此報向公心切向財疎淮上休官洛下居三郡政能従獨步十年生計復何如使君灘上久分手别駕渡頭先得書且喜平安又相見其餘外事盡空虚洛下寓居秋館清涼日書因解悶看夜窗幽獨處琴不為人彈遊宴慵多廢趨朝老漸難禪僧敎斷酒道士勸休官渭曲莊猶在錢唐俸尚殘如能便歸去亦不至飢寒味道叩齒晨興秋院靜焚香𠖇坐晩牕深七篇眞誥論仙事一巻檀經說佛心此日盡知前境妄多生曽被外塵侵自嫌習性猶殘處愛詠閑詩好聽琴好聽琴本性好一作愛絲桐塵機聞即空一聲來耳裏萬事離心中清暢堪銷疾恬和好養䝉尤宜聴三樂安慰白頭翁愛詠詩辭章諷詠成千首心行歸依向一乗坐倚繩牀閒自念前生應是一詩僧酬皇甫庶子見寄掌綸不稱君應笑典郡無能我自知别詔忽驚新命出同僚偶與夙心期春坊瀟灑優閒地秋鬢蒼浪老大時獨占二疏應未可龍樓見擬覓分司臥疾閒官臥疾絶經過居處蕭條近洛河水北水南秋月夜管絃聲少杵聲多逺師東宫白庶子南寺逺襌師何處遥相見心無一事時問逺師葷羶停夜食吟詠散秋懷笑問東林老詩應不破齋小院酒醒酒醒閒獨步小院夜深涼一領新秋簟三間明月廊未收殘琖杓初換熱衣裳好是幽眠處松隂六尺牀贈侯三郎中老愛東都好寄身足泉多竹少埃塵年豐最喜唯貧客秋冷先知是瘦人幸有琴書堪作伴苦無田宅可為鄰洛中縦未長居得且與蘇田遊過春求分司東都寄牛相公十韻忽忽心如夢星星鬢似絲縦貧長有酒雖老未抛詩儉薄身都慣疎頑性頗宜飰粗餐亦飽被煖起常遲萬里歸何得三年伴是誰華亭鶴不去天竺石相隨余罷杭州得華亭鶴天竺石同載而歸王尹貰將馬田家賣與池開門閒坐日繞水獨行時嬾慢交㳺許衰羸相府知官寮幸無事可惜不分司酬楊八君以曠懷宜靜境我因蹇步稱閒官閉門足病非髙士勞作雲心鶴眼看履道新居二十韻履道坊西角官河曲北頭林園四鄰好風景一家秋門閉深沈樹池通淺沮秋夜反溝拔青松直上鋪碧水平流籬菊黄金合窗筠緑玉稠疑連紫陽洞似到白蘋洲僧至多同宿賓來輒少畱豈無詩引興兼有酒銷憂移榻臨平岸攜茶上小舟果穿聞鳥啄萍破見魚遊地與塵相逺人將境共幽汎潭菱㸃鏡沈浦月生鈎廚曉煙孤起庭寒雨半收老飢初愛粥瘦冷早披裘洛下招新隠秦中㤀舊遊辭章畱鳯閣班籍寄龍樓病愜官曹靜閒慙俸禄優琴書中有得衣食外何求濟世才無取謀身智不周應須共心語萬事一時休九日思杭州舊遊寄周判官及諸客忽憶郡南山頂上昔時同醉是今辰笙歌委曲聲延耳金翠動揺光照身風景不隨宫相去歡娛應逐使君新江山賓客皆如舊唯是當筵換主人秋晩煙景澹濛濛池邊㣲有風覺寒蛬近壁知暝鶴歸籠長貎隨年改衰情與物同夜來霜厚薄梨葉半低紅分司散秩畱司殊有味最宜病拙不才身行香拜表為公事碧洛青嵩當主人巳出閒遊多到夜却歸慵卧又經旬錢唐五馬畱三匹還擬騎遊攪擾春河南王尹初到以詩代書先問之别來王閣老三歳似須臾鬢上斑多少杯前興有無官從分𦂳慢情莫問榮枯許入朱門否籃輿一病夫池西亭朱闌映晩樹金魄落秋池還似錢唐夜西樓月出時臨池閒臥小竹圍庭匝平池與砌連閒多臨水坐老愛向陽眠營役抛身外幽奇送枕前誰家臥牀脚解繫釣魚船吾廬吾廬不獨貯妻兒自覺年侵身力衰眼下營求容足地心中準擬挂冠時新昌小院松當户履道幽居竹繞池莫道兩都空有宅林泉風月是家資題新居寄宣州崔相公所居南鄰即崔家池門庭有水巷無塵好稱閒官作主人冷似雀羅雖少客寛於蝸舍足容身疏通竹徑將迎月掃掠莎臺欲待春濟世料君歸未得南園北曲謾為鄰憶杭州梅花因敘舊遊寄蕭協律三年閒悶在餘杭曽為梅花醉幾場伍相廟邊緐似雪孤山園裏麗如妝蹋隨遊騎心長惜折贈佳人手亦香賞自初開直至落歡因小飲便成狂薛劉相次埋新壠沈謝雙飛出故鄉薛劉二客沈謝二妓皆當時歌酒之侣歌伴酒徒零散盡唯殘頭白老蕭郎病中辱張常侍題集賢院詩因以繼和天禄閣中開甘泉侍從回圖書皆帝籍寮友盡仙才騎省通中掖龍樓隔上臺猶憐病宫相詩寄洛陽來早春晩歸晩歸騎馬過天津沙白橋紅返照新草色連延多隙地鼓聲閒緩少忙人還如南國饒溝水不似西京足路塵金谷風光依舊在無人管領石家春贈楊使君曽嗟放逐同巴峽且喜歸還㑹洛陽時命到來須作用功名未立莫思量銀銜叱撥欺風雪金屑琵琶費酒漿更待城東桃李發共君沈醉兩三場贈皇甫庶子何因散地共徘徊人道君才我不才騎少馬蹄生易蹶用稀印鏁澀難開妻知年老添衣絮婢報天寒撥酒醅更媿小胥諮拜表單衫衝雪夜深來池上竹下作穿籬繞舍碧逶迤十畮閑居半是池食飽牕間新睡後脚輕林下獨行時水能性澹為吾友竹解心虚即我師何必悠悠人世上勞心費目覔親知閑出覓春戲贈諸郎官年來數出覓風光亦不全閑亦不忙放鞚體安騎穏馬隔袍身暖照晴陽迎春日日添詩思送老時時放酒狂除却髭鬚白一色其餘未伏少年郎别春爐暖閣春初入温爐興稍闌晩風猶冷在夜火且畱看獨宿相依久多情欲别難誰能共天語長遣四時寒夢行簡天氣姸和水色鮮閒吟獨步小橋邊池塘草緑無佳句虚臥春牕夢阿連題新居呈王尹兼簡府中三掾敝宅須重葺貧家乏羨財橋憑川守造樹倩府寮栽朱版新猶溼紅英暖漸開仍期更攜酒倚檻看花來雲和非琴非瑟亦非箏撥柱推絃調未成欲散白頭千萬恨只消紅袖兩三聲春老欲隨年少强遊春自覺風光不屬身歌舞屏風花障上幾時曽畫白頭人春雪過皇甫家晩來籃轝雪中回喜遇君家門正開唯要主人青眼待琴詩談笑自將來崔侍御以孩子三日示其所生詩見示因以二絶句和之洞房門上挂桑弧香水盆中浴鳯雛還似初生三日魄嫦娥滿月即成珠愛惜肎將同寳玉喜歡應勝得王侯弄璋詩句多才思愁殺無兒老鄧攸與皇甫庶子同遊城東閑遊何必多徒侣相勸時時舉一杯博望苑中無職役建春門外足池臺緑油剪葉蒲新長紅蠟粘枝杏欲開白馬朱衣兩宫相可憐天氣出城來洛城東花下作記得舊詩章花多數洛陽舊詩云洛陽城東面今來花似雪又云更待城東桃李發又云花滿洛陽城及逢枝似雪已是鬢成霜向後光隂促從前事意忙無因重年少何計駐時芳欲送愁離面須傾酒入腸白頭無藉在醉倒亦何妨晩春寄㣲之并崔湖州洛陽陌上少交親履道城邊欲暮春崔在吳興元在越出門騎馬覓何人城東閒行因題尉遲司業水閣閑繞洛陽城無人知姓名病乗籃轝出老著茜衫行處處花相引時時酒一傾借君溪閣上醉詠兩三聲寄皇甫七孟夏愛吾廬陶潛語不虚花尊飄落酒風案展開書鄰女偷新果家僮漉小魚不知皇甫七池上興何如訪皇甫七上馬行數里逢花傾一杯更無停泊處還是覓君來白香山詩集巻二十六
