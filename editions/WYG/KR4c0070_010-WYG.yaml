body:
  text: 白香山詩集巻十歙縣汪立名編長慶集十感傷古調詩七十八首朱陳村徐州古豐縣有村曰朱陳去縣百餘里桑麻青氛氲機梭聲札札牛驢走紜紜女汲澗中水男採山上薪縣逺官事少山深人俗淳有財不行商有丁不入軍家家守村業頭白不出門生為村之民死為村之塵田中老與㓜相見何欣欣一村唯兩姓世世為婚姻其村唯朱陳二姓而已親疎居有族少長游有羣黄雞與白酒歡㑹不隔旬生者不逺别嫁娶先近鄰死者不逺𦵏墳墓多遶村既安生與死不苦形與神所以多夀考往往見𤣥孫我生禮義鄉少小孤且貧徒學辨是非秖自取辛勤世法貴名教士人重冠婚以此自桎梏信為大謬人十歳解讀書十五能屬文二十舉秀才三十為諫臣下有妻子累上有君親恩承家與事國望此不肖身憶昨旅遊初迨今十五春孤舟三適楚羸馬四經秦晝行有飢色夜寢無安魂東西不暫住來往若浮雲離亂失故鄉骨月多散分江南與江北各有平生親平生終日别逝者隔年聞朝憂卧至暮夕哭坐達晨悲火燒心曲愁霜侵鬢根一生苦如此長羡村中民讀鄧魴詩塵架多文集偶取一巻披未及㸔姓名疑是陶潛詩㸔名知是君惻惻令我悲詩人多蹇厄近日誠有之京兆杜子羙猶得一拾遺襄陽孟浩然亦聞鬢成絲嗟君兩不如三十在布衣擢第禄不及新婚妻未歸少年無疾患溘死於路岐天不與爵夀唯與好文詞此理勿復道巧歴不能推寄元九自此後在渭村作晨雞纔發聲夕雀俄歛翼晝夜往復來疾如出入息非徒改年貌漸覺無心力自念因念君俱為老所逼君年雖校少顦顇謫南國三年不放歸炎瘴消顔色山無殺草霜水有含沙蜮健否逺不知書多隔年得願君少愁苦我亦加飱食各保金石軀以慰長相憶秋夕葉聲落如雨月色白似霜夜深方獨卧誰為拂塵牀夜雨我有所念人隔在逺逺鄉我有所感事結在深深腸鄉逺去不得無日不曕望腸深解不得無夕不思量况此殘燈夜獨宿在空堂秋天殊未曉風雨正蒼蒼不學頭陀法前心安可忘秋霽金火不相待炎涼雨中變秋晴有殘蟬巢冷無留燕沉吟巻長簟愴惻収團扇向夕稍無泥閒歩青苔院月出砧杵動家家𢷬秋練獨對多病妻不能理針線冬衣殊未製夏服行將綻何以迎早秋一杯聊自勸歎老三首晨興照青鏡形影兩寂寞少年辭我去白髪隨梳落萬化成於漸漸衰㸔不覺但恐鏡中顔今朝老於昨人生少滿百不得長歡樂誰㑹天地心千齡與龜鶴吾聞善醫者今古稱扁鵲萬病皆可治唯無治老藥我有一握髪梳理何稠直昔似𤣥雲光今如素絲色匣中有舊鏡欲照先歎息自從頭白來不欲明磨拭鵶頭與鶴頸至老常如墨獨有人鬢毛不得終身黒前年種桃核今歳成花樹去歳新嬰兒今年已學步但驚物長成不覺身衰暮去矣欲何如少年留不住因書今日意徧寄諸親故壯歳不歡娛長年當悔悟送兄弟囘雪夜日晦雲氣黄東北風切切時從村南還新與兄弟别離襟淚猶濕㢠廻馬嘶未歇欲歸一室坐天隂多無月夜長火消盡歳暮雨凝結寂寞滿爐灰飄零上堦雪對雪畫寒灰殘燈明復滅灰死如我心雪白如我髪所遇皆如此頃刻堪愁絶㢠廻念入坐忘轉憂作禪恱平生洗心法正為今宵設溪中早春南山雪未盡隂嶺留殘白西澗冰已消春溜含新碧東風來幾日蟄動萌草坼潛知陽和功一日不虚擲愛此天氣暖來拂溪邉石一坐欲忘歸暮禽聲嘖嘖蓬蒿隔桑棗隠映煙火夕歸來問夜飱家人烹薺麥同友人尋澗花聞有澗底花貰得村中酒與君來校遲已逢揺落後臨觴有遺恨悵望空溪口記取花發時期君重攜手我生日日老春色年年有且作來歳期不知身健否登村東古冡髙低古時冢上有牛羊道獨有最髙頭悠哉此懐抱囘頭向村望但見荒田草村人不愛花多種栗與棗自來此村住不覺風光好花少鶯亦稀年年春暗老夢裴相公五年生死隔一夕魂夢通夢中如往日同直金鑾宫髣髴金紫色分明冰玉容勤勤相眷意亦與平生同既寤知是夢憫然情未終追想當時事何殊昨夜中自我學心法萬縁成一空今朝為君子流涕一沾胷晝寢坐整白單衣起穿黄草屨朝飱盥漱畢徐下堦前步暑風㣲變候晝刻漸加數院静地隂隂鳥鳴新葉樹獨行還獨卧夏景殊未暮不作午時眠日長安可度别行簡時行簡辟盧坦劍南東川府漠漠病眼花星星愁鬢雪筋骸已衰憊形影仍分訣梓州二千里劍門五六月豈是逺行時火雲燒棧熱何言巾上淚乃是腸中血念此早歸來莫作經年别觀兒戲齠齔七八歳綺紈三四兒弄塵復鬬草盡日樂嬉嬉堂上長年客鬢間新有絲一㸔竹馬戲毎憶童騃時童騃饒戲樂老大多憂悲静念彼與此不知誰是癡歎常生西村常氏子卧病不須㬰前旬猶訪我今日忽云殂時我病多暇與之同野居園林青藹藹相去數里餘村鄰無好客所遇唯農夫之子何如者往還猶勝無于今亦已矣可為一長吁寄元九一病經四年親朋書信斷窮通合一作各易交自笑知何晚元君在荆楚去日雖云逺彼獨是何人心如石不轉憂我貧病身書來唯勸勉上言少愁苦下道加飱飯憐君為謫吏窮薄家貧褊三寄衣食資數盈二十萬豈是貪衣食感君心繾綣念我口中食分君身上暖不因身病久不因命多蹇平生親友心豈得知深淺以鏡贈别人言似明月我道勝明月明月非不明一年十二缺豈如玉匣裏如水常澄澈月破天暗時圓明獨不歇我慙貌醜老繞鬢斑斑雪不如贈少年廻照青絲髪因君千里去持此將為别城上對月期友人不至古人惜晝短勸令秉燭遊况此迢迢夜明月滿西樓復有尊一作盈尊中酒置在城上頭期君君不至人月兩悠悠照水煙波白照人肌髪秋清光正如此不醉即須愁念金鑾子二首衰病四十身嬌癡三歳女非男猶勝無慰情時一撫一朝舍我去魂影無處所况念天札時嘔啞初學語始知骨月愛乃是憂悲聚唯思未有前以理遣傷苦忘懐日已久三度移寒暑今日一傷心因逢舊乳母立名按芥隠筆談樂天多用淵明詩如衰病四十身嬌癡三歳女非男猶勝無慰情時一撫正用陶詩弱女雖非男慰情良勝無淵明有五男兒此詩或作於未得子之前也與爾為父子八十有六旬忽然又不見邇來三四春形質本非實氣聚偶成身恩愛元是妄縁合暫為親念兹庶有悟聊用遣悲辛暫將理自奪不是忘情人對酒人生一百歳通計三萬日何况百歳人人間百無一賢愚共零落貴賤同埋沒東岱前後魂北邙新舊骨復聞藥誤者為愛延年術又有憂死者為貪政事筆藥誤不得老憂死非因疾誰言人最靈知得不知失何如㑹親友飲此杯中物能沃煩慮消能陶真性出所以劉阮輩終年醉兀兀渭村雨歸渭水寒漸落離離蒲稗苗閒傍沙邉立㸔人刈葦苕近水風景冷晴明猶寂寥復兹夕隂起野思重蕭條蕭條獨歸路暮雨濕村橋諭懐黒頭日已白白面日已黒人生未死間變化何終極常言在已者莫若形與色一朝改變來止遏不能得况彼身外事悠悠通與塞喜友至留宿村中少賔客柴門多不開忽聞車馬至云是故人來况值風雨夕愁心正悠哉願君且同宿盡此手中杯人生開口笑百年都幾囘西原晚望花菊引閑行一作步行上西原路原上晚無人因髙聊四顧南阡有煙火北陌連墟墓村鄰何蕭疎近者猶百步吾廬在其下寂寞風日暮門外轉枯蓬籬根伏寒兎故園汴水上離亂不堪去近歳始移家飄然此村住新屋五六間古槐八九樹便是衰病身此生終老處感鏡羙人與我别留鏡在匣中自從花顔去秋水無芙蓉經年不開匣紅埃覆青銅今朝一拂拭自顧顦顇容照罷重惆悵背有雙盤龍村居卧病三首戚戚抱羸病悠悠度朝暮夏木纔結隂秋蘭已含露前日巢中卵化作雛飛去昨日穴中蟲蛻為蟬上樹四時未嘗歇一物不暫住唯有病客心沉然獨如故新秋久病客起步村南道盡日不逢人蟲聲徧荒草西風吹白露野緑秋仍早草木猶未傷先傷我懐抱朱顔與𤣥鬢强健幾時好况為憂病侵不得依年老種黍三十畝雨來苗漸大種薤二十畦秋來欲堪刈望黍作冬酒留薤為春菜荒村百物無待此養衰瘵葺廬備隂雨補褐防寒歳病身知幾時且作明年計沐浴經年不沐浴塵垢滿肌膚今朝一澡濯衰痩頗有餘老色頭鬢白病形支體虚衣寛有賸帶髪少不勝梳自問今年幾春秋四十初四十已如此七十復何如栽松二首小松未盈尺心愛手自移蒼然澗底色雲濕煙霏霏栽植我年晚長成君性遲如何過四十種此數寸枝得見成隂否人生七十稀愛君抱晚節憐君含直文欲得朝朝見堦前故種君知君死則已不死㑹凌雲病中友人相訪卧久不記日南窗昏復昏蕭條草簷下寒雀朝夕聞强扶牀前杖起向庭中行偶逢故人至便當一逢迎移榻就斜日披裘倚前楹閒談勝服藥稍覺有心情自覺二首四十未為老憂傷早衰惡前歳二毛生今年一齒落形骸日損耗心事同蕭索夜寢與朝飱其間味亦薄同歳崔舍人容光方灼灼始知年與貌衰盛隨憂樂畏老老轉逼憂病病彌縛不畏復不憂是除老病藥朝哭心所愛暮哭心所親親愛零落盡安用身獨存幾許平生歡無限骨肉恩結為腸間痛聚作鼻頭辛悲來四支緩泣盡雙眸昏所以年四十心如七十人我聞浮圖教中有解脫門置心為止水視身如浮雲斗擻垢穢衣度脫生死輪胡為戀此苦不去猶逡廵囘念發𢎞願願此現在身但受過去報不結將來因誓以智慧水永洗煩惱塵不將恩愛子更種悲憂根夜雨有念以道治心氣終歳得晏然何乃戚戚意忽來風雨天既非慕榮顯又不恤飢寒胡為悄不樂抱膝殘燈前形影暗相問心黙對以言骨肉能幾人各在天一端吾兄寄宿州吾弟客東川南北五千里吾身在中間欲去病未能欲住心不安有如波上舟此縛而彼牽自我向道來于今六七年鍊成不二性消盡千萬縁唯有恩愛火往往猶熬煎豈是藥無効病多難盡蠲寄楊六楊攝萬年縣尉予為贊善大夫青宫官冷静赤縣事繁劇一閒復一忙動作經時隔清觴久廢酌白日頓虚擲念此勿踟蹰悄然心不適豈無舊交結久别或遷易亦有新往還相見多形迹唯君於我分堅久如金石何况老大來人情重姻戚㑹稀歳月急此事真可惜幾囘開口笑便到髭鬚白公門苦鞅掌盡一作晝日無閒隙猶冀乘暝來静言同一夕送春三月三十日春歸日復暮惆悵問春風明朝應不住送春曲江上眷眷東西顧但見撲水花紛紛不知數人生似行客兩足無停步日日進前程前程幾多路兵刀與水火盡可違之去唯有老到來人間無避處感時良為已獨倚池南樹今日送春心心如别親故哭李三去年渭水曲秋時訪我來今年常樂里春日哭君囘哭君仰問天天意安在哉若必奪其夀何如不與才落然身後事妻病女嬰孩别李十一後重寄自此後詩在江州路上作秋日正蕭條驅車出蓬蓽囘望青門道目極心鬱鬱豈獨戀鄉土非關慕簪紱所愴别李君平生同道術俱承金馬詔聫秉諫臣筆共上青雲梯中途一相失江湖我方往朝廷君不出蕙帶與華簪相逢是何日初出藍田路作停驂問前路路在一作指秋雲裏蒼蒼縣南道一作山去一作險途從此始絶頂忽盤上一作上盤衆山皆下視下視千萬峰峰頭如浪起朝經韓公坂夕次藍橋水潯陽僅一作近四千始行七十里人煩馬蹄跙勞苦已一作又如此仙娥峰下作我為東南行始登商山道商山無數峰最愛仙娥好參差樹若插匼匝雲如抱渇望寒玉泉香聞紫芝草青崖屏削碧白石牀鋪縞向無如此物安足留四皓感彼私自問歸山何不早可能塵土中還隨衆人老㣲雨夜行漠漠秋雲起稍稍一作悄悄夜寒生但覺衣裳濕無㸃亦無聲再到襄陽訪問舊居昔到襄陽日髯髯初有髭今過襄陽日髭鬢半成絲舊遊都是一作似夢乍到忽如歸東郭蓬蒿宅荒涼今屬誰故知多零落閭井亦遷移獨有秋江水煙波似舊時寄㣲之三首江州望通州天涯與地末有山萬丈髙有江千里濶間之以雲霧飛鳥不可越誰知千古險為我二人設通州君初到鬱鬱愁如結江州我方去迢迢行未歇道路日乖隔音信日斷絶因風欲寄語地逺聲不徹生當復相逢死當從此别君遊襄陽日我在長安住今君在通州我過襄陽去襄陽九里郭樓雉連雲樹顧此稍依依是君舊遊處蒼茫蒹葭水中有潯陽路此去更相思江西少親故去國日已逺喜一作稀逢物似人如何含此意江上坐思君有如河嶽氣相合方氛氲狂風吹中絶兩處成孤雲風廻終有時雲合豈無因努力各自愛窮通我爾身舟中雨夜江雲暗悠悠江風冷修修夜雨滳船背夜浪打船頭船中有病客左降向江州夜聞歌者宿鄂州夜泊鸚鵡洲秋江月澄徹一作江月秋澄澈鄰船有歌者發調堪愁絶歌罷繼以泣泣聲通復咽尋聲見其人有婦顔如雪獨倚帆檣立娉婷十七八夜淚似真珠雙雙墮明月借問誰家婦歌泣何凄切一問一沾襟一作巾低眉終一作竟不説江樓聞砧江州作江人授衣晚十月始聞砧一夕髙樓月萬里故園心宿東林寺經窗燈燄短僧爐火氣深索落廬山夜風雪宿東林憶洛下故園時淮汝冦我未滅潯陽遷謫地洛陽離亂年煙塵三川上炎瘴九江邉鄉心坐如此秋風仍颯然贈别崔五朝送南去客暮迎北來賔孰云當大路少遇心所親勞者念息肩熱者思濯身何如愁獨日忽見平生人平生已不淺是日重殷勤問從何處來及此江亭春江天春多隂夜月隔重雲移尊樹問飲燈照花紛紛一㑹不易得餘事何足云明旦又分手今夕且歡欣春晚寄㣲之三月江水闊悠悠桃花波年芳與心事此地共蹉跎南國方譴謫中原正兵戈眼前故人少頭上白髪多通州更迢遞春盡復如何漸老今朝復明旦不覺年齒暮白髪逐梳落朱顔辭鏡去當春頗愁寂對酒寡歡趣遇境多愴辛逢人益敦故形質屬天地推遷從不住所怪少年心銷磨落何處送㓜史淮右冦未散江西歳再徂故里干戈地行人風雪途此時與爾别江畔立踟蹰夜雪已訝衾枕冷復見窗户明夜深知雪重時聞折竹聲寄行簡鬱鬱眉多歛黙黙口寡言豈是願如此舉目誰與歡去春爾西征從事巴蜀間今春我南謫抱疾江海壖相去六千里地絶天邈然十書九不達何以開憂顔渇人多夢飲飢人多夢飱春來夢何處合眼到東川首夏孟夏百物滋動植一時好麋鹿樂深林蟲蛇喜豐草翔禽愛宻葉游鱗恱新藻天和遺漏處而我獨枯槁一身在天末骨肉皆逺道舊國無來人冦戎塵浩浩沉憂竟何益秖自勞懐抱不如放身心冥然任天造潯陽多羙酒可使杯不燥湓魚賤如泥烹炙無昏早朝飯山下寺暮醉湖中島何必歸故鄉兹焉可終老孟夏思渭村舊居寄舍弟嘖嘖雀引雛稍稍筍成竹時物感人情憶我故鄉曲故園渭水上十載事樵牧手種榆栁成隂隂覆墻屋兎隠豆苗肥鳥一作犬鳴桑椹熟前年當此時與爾同遊矚詩書課弟姪農圃資童僕日暮麥登場天晴蠶拆簇㺯泉南澗坐待月東亭宿興發飲數杯悶來棊一局一朝忽分散萬里仍覊束井鮒思反泉籠鶯悔出谷九江地卑濕四月天炎燠苦雨初入梅瘴雲稍含毒泥秧水畦稻灰種畬田粟已訝殊歳時仍嗟異風俗閒登郡樓望日落江山緑歸雁拂鄉心平湖斷人目殊方我漂泊舊居君幽獨何時同一瓢飲水心亦足早蟬六月初七日江頭蟬始鳴石楠深葉裏薄暮兩三聲一催衰鬢色再動故園情西風殊未起秋思先秋生憶昔在東掖宫槐花下聽今朝無限思雲樹遶湓城感情中庭曬服玩忽見故鄉履昔贈我者誰東鄰嬋娟子因思贈時語特用結終始永願如履綦雙行復雙止自吾謫江都漂蕩三千里為感長情人提攜同到此今朝一惆悵反覆㸔未已人隻履猶雙何曽得相似可嗟復可惜錦表繡為裏况經梅雨來色黯花草死南湖晚秋八月白露降湖中水芳老旦夕秋風多衰荷半傾倒手攀青楓樹足蹋黄蘆草慘淡老容顔零一作冷落秋懐抱有兄在淮楚有弟在蜀道萬里何時來煙波白浩浩郡㕔有樹晚榮早凋人不識名因題其上潯陽郡㕔後有樹不知名秋先梧桐落春後桃李榮五月始萌動八月已凋零左右皆松桂四時鬱青青豈量雨露恩沾濡不均平榮枯各有分天地本無情顧我亦相類早衰向晚成形骸少多病三十不豐盈毛鬢早改變四十白髭生誰教兩蕭索相對此江城感秋懐㣲之葉下湖又波秋風此時至誰知濩落心先納蕭條氣推移感流歳漂泊思同志昔為煙霄侣今作泥塗吏白鷗毛羽弱青鳳文章異各閒一作閉一籠中歳晚同顦顇因沐感髪寄朗上人二首年長身轉慵百事一作年無所欲乃至頭上髪經年方一沐沐稀髪苦落一沐仍半秃短鬢經霜蓬老面辭春木强年過猶近衰相來何速應是煩惱多心焦血不足漸少不滿把漸短不盈尺况兹短少中日夜落復白既無神仙術何除老死籍秖有解脫門能度衰苦厄掩鏡望東寺降心謝禪客衰白何足言剃落猶不惜早蟬月出先照山風生先動水亦如早蟬聲先入閒人耳一聞愁意結再聽鄉心起渭上新一作村蟬聲先聽渾相似衡門有誰聽日暮槐花裏苦熱喜凉經時苦炎熱一作暑心體但煩倦白日一何長清秋不可見歳功成者去天數極則變潛知寒燠間遷次如乘傳火雲忽朝歛金風俄夕扇枕簟遂清凉筋骸稍輕健因思望月侣好卜迎秋宴竟夜無客來引杯還自勸早秋晚望兼呈韋侍御九派繞孤城城髙生逺思人煙半在船野水多於地穿霞日脚直驅鴈風頭利去國來幾時江上秋三至夫君亦淪落此地同飄寄憫黙向隅心摧頽觸籠翅且謀眼前計莫問胷中事潯陽酒甚濃相勸時時醉司馬宅雨徑緑蕪合霜園紅葉多蕭條司馬宅門巷無人過唯對大江水秋風朝夕波司馬㕔獨宿荒凉滿庭草偃亞侵簷竹府吏下㕔簾家僮開被幞數聲城上漏一㸃窗間燭官曹冷似冰誰肯來同宿夢與李七庾三十三同訪元九夜夢歸長安見我故親友損之在我左順之在我右云是二月天春風出攜手同過靖安里下馬尋元九元九正獨坐見我笑開口還指西院花仍開北亭酒如言各有故似惜歡難久神合俄頃間神離欠伸後覺來疑在側求索無所有殘燈影閃墻斜月光穿牖天明西北望萬里君知否老去無見期踟蹰搔白首秋槿風露颯已冷天色亦黄昏中庭有槿花榮落同一晨秋開已寂寞夕殞何紛紜正憐少顔色復歎不逡廵感此因念彼懐哉聊一陳男兒老富貴女子晚婚姻頭白始得志色衰方事人後時不獲已安得如青春答元郎中楊員外喜烏見寄四十四字成南宫鴛鴦地何忽烏來止故人錦帳郎聞烏笑相視疑烏報消息望我歸鄉里我歸應待烏頭白慙媿元郎誤歡喜白香山詩集巻十
