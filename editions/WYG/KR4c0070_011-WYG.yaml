body:
  text: 白香山詩集巻十一歙縣汪立名編長慶集十一感傷古體五言凡五十三首初入峽有感上有萬仞山下有千丈水蒼蒼兩崖間闊狹容一葦瞿塘呀直㵼灧澦屹中峙未夜黑岩昏無風白浪起大石如刀劒小石如牙齒一步不可行況千三百里自峽州至忠州灘險相繼凡一千三百里苒蒻竹篾􅜺音念欹危檝師趾一跌無完舟吾生繫於此常聞仗忠信蠻貊可行矣自古漂沉人豈盡非君子況吾時與命蹇舛不足恃常恐不才身復作無名死過昭君村村在歸州東北四十里靈珠産無種彩雲出無根亦如彼姝子生此遐陋村至麗物難掩遽選入君門獨美衆所嫉終棄於塞垣唯此希代色豈無一顧恩事排勢須去不得由至尊白黑既可變丹青何足論竟埋代北骨不返巴東魂慘淡晩雲水依稀舊鄉園妍姿化已久但有村名存村中有遺老指㸃為我言不取往者戒恐貽來者寃至今村女面燒灼成瘢㾗自江州至忠州前在潯陽日已歎賔朋寡忽忽抱憂懷出門無處寫今來轉深僻窮峽巔山下五月斷行舟灧堆正如馬巴人類猿狖矍鑠滿山野敢望見交親喜逢似人者初到忠州登東樓寄萬州楊八使君山束邑居窄峽牽氣候偏林巒少平地霧雨多隂天隱隱煑鹽火漠漠燒畬煙賴此東樓夕風月時翛然憑軒望所思目斷心涓涓背春有去鴈上水無來船我懷巴東守本是關西賢平生巳不淺流落重相憐水梗漂萬里籠禽囚五年新恩同雨露逺郡鄰山川書信雖往復封疆徒接連其如美人面欲見杳無縁郡中鄉路音信斷山城日月遲欲知州近逺階前摘荔枝西樓夜悄悄復悄悄城隅隱林杪山郭燈火稀峽天星漢少年光東流水生計南枝鳥月没江沉沉西樓殊未曉東樓曉脉脉復脉脉東樓無宿客城暗雲霧多峽深田地窄宵燈尚留燄晨禽初展翮欲知山髙低不見東方白寄王質夫憶始識君時愛君世縁薄我亦吏王畿不為名利著春尋仙遊洞秋上雲居閤樓觀水潺潺龍潭花漠漠吟詩石上坐引酒泉邊酌因話出處心心期老巖壑忽從風雨别遂被簪纓縳君作出山雲我為入籠鶴籠深鶴憔悴山逺雲飄泊去處雖不同同負平生約今來各何在老去隨所託我守巴南城君佐征西幕年顔漸衰颯生計仍蕭索方含去國愁且羡從軍一作君樂舊遊疑是夢往事思如昨相憶春又深故山花正落南賔郡齋即事寄楊萬州山上巴子城山下巴江水中有窮獨人强名為刺史時時竊自哂刺史豈如是倉粟餧家人黄縑裹妻子忠州刺史已下悉以畬田粟給禄食黄絹支俸莓苔翳冠帶霧雨霾樓雉衙鼔暮復朝郡齋卧還起囘頭一作首望南浦亦在煙波裏而我復何嗟夫君猶滯此招蕭處士峽内豈無人所逢非所思門前亦有客相對不相知仰望但雲樹俯顧惟妻兒寢食起居外端然無所為東郊蕭處士聊可與開睂能飲滿杯酒善吟長句詩庭前吏散後江畔路乾時請君􅂝竹杖一赴郡齋期庭槐南方饒竹樹唯有青槐稀十種七八死縱活亦支離何此郡庭下一株獨華滋䝉䝉碧煙葉嫋嫋黄花枝我家渭水上此樹䕃前墀忽向天涯見憶在故園時人生有情感遇物牽所思樹木猶復爾況見舊親知送客囘晩興城上雲霧開沙頭風浪定參差亂山出淡泞平江淨行客舟已逺居人酒初醒嫋嫋秋竹梢巴蟬聲似磬東樓竹瀟灑城東樓遶樓多修竹森然一萬竿白粉封青玉巻簾睡初覺欹枕看未足影轉色入樓牀席生浮緑空城絶賔客向夕彌幽獨樓上夜不歸此君留我宿九日登巴臺黍香酒初熟菊暖花未開閒聽竹枝曲淺酌茱萸杯去年重陽日漂泊湓城隈今嵗重陽日蕭條巴子臺旅鬢尋巳白鄉書久不來臨觴一搔首座客亦徘徊東城尋春老色日上面歡情日去心今既不如昔後當不如今今猶未衰甚每事力可任花時仍愛出酒後尚能吟但恐如此興亦隨日消沉東城春欲老勉强一來尋江上送客江花已萎絶江草已消歇逺客何處歸孤舟今日發杜鵑聲似哭湘竹斑如血共是多感人仍為此中别桐花春令有常候清明桐始發何此巴峽中桐花開十月豈伊物理變信是土宜别地氣反寒暄天時倒生殺草木堅强物所禀固難奪風候一參差榮枯遂乖刺況吾北人性不耐南方熱强羸壽夭間安得依時節早祭風伯因懷李十一舍人逺郡雖褊陋時祀奉朝經夙興祭風伯天氣曉㝠㝠導騎與從吏引我出東坰水霧重如雨山火髙於星忽憶早朝日與君趨紫庭步登龍尾道却望終南青一别身向老所思心未寧至今想在耳玉音尚玲玲花下對酒二首藹藹江氣春南賔閏正月梅櫻與桃杏次第城上發紅房爛簇火素豔紛團雪香惜委風飄愁牽壓枝折樓中老太守頭上新白髪冷淡病心情暄和好時節故園音信斷逺郡親賔絶欲問花前尊依然為誰設引手攀紅櫻紅櫻落似霰仰首看白日白日走如箭年芳與時景頃刻猶衰變況是血肉身安能長强健人心苦迷執慕貴憂貧賤愁色常在睂歡容不上面況吾頭半白把鏡非不見何必花下杯更待他人勸不二門兩眼日將闇四肢漸衰瘦束帶賸昔圍穿衣妨去聲寛袖流年似江水奔注無昏晝志氣與形骸安得長依舊亦曾登玉陛舉措多紕繆至今金闕籍名姓獨遺漏亦曾燒大藥消息乖火候至今殘丹砂燒乾不成就行藏事兩失憂惱心交鬭化作顦顇翁抛身在荒陋坐看老病逼須得醫王救唯有不二門其間無夭壽我身我身何所似似彼孤生蓬秋霜剪根斷浩浩隨長風昔游秦雍間今落巴蠻中昔為意氣郎今作寂寞一作寥翁外貌雖寂寞中懷頗冲融賦命有厚薄委心任窮通通當為大鵬舉翅摩蒼穹窮則為鷦鷯一枝足自容苟知此道者身窮心不窮哭王質夫仙遊寺前别别來十年餘生别猶怏怏死别復何如客從梓潼來道君死不虛驚疑心未信欲哭復踟蹰踟蹰寢門側聲發淚亦俱衣上今日淚篋中前月書憐君古人風重有君子儒篇詠陶謝輩風流嵇阮徒出身既蹇迍一作連生世仍須臾誠知天至高安得不一呼江南有毒蠎江北有妖狐皆享千年壽多於王質夫不知彼何德不識此何辜東坡種花二首持錢買花樹城東坡上栽但購有花者不限桃杏一作李梅百果參雜種千枝次第開天時有早晩地力無高低紅者霞豔豔白者雪皚皚遊蜂逐不去好鳥亦栖来前有長流水下有小平臺時拂臺上石一舉風前杯花枝䕃我頭花蕊落我懷獨酌復獨詠不覺日平西巴俗不愛花竟春無人來唯此醉太守盡日不能廻東坡春向暮樹木一作下今何如漠漠花落盡翳翳葉生初一作初紓每日領童僕荷鋤仍決一作鑿渠剗土壅其本引泉溉其枯小樹低數尺大樹長丈餘封植來幾時髙下齊扶疎養樹既如此養民亦何殊將欲茂枝葉必先救根株云何救根株勸農均賦租云何茂枝葉省事寛刑書移此為郡政庶幾甿俗蘇立名按二老堂詩話蘇文忠公不輕許可獨敬愛樂天屢形詩篇葢其文章皆主辭達而忠厚好施剛直盡言與人有情於物無著大略相似謫居黄州始號東坡其原必起於樂天忠州之作也登城東古臺迢迢東郊上有土青崔嵬不知何代物疑是巴王臺巴歌久無聲巴宫没黄埃靡靡春草合牛羊縁四隈我來一登眺目極心悠哉始見江山勢峰疊水環廻憑高視聽曠向逺胷襟開唯有故園念時從東北來哭諸故人因寄元九昨日哭寢門今日哭寢門借問所哭誰無非故交親偉卿既長往質夫亦幽淪屈指數年世收涕自思身彼皆少於我先為泉下人我今頭半白焉得身久存好懷元郎中相識二十春昔見君生子今聞君抱孫存者盡老大逝者已成塵早晩升平宅開睂一見君郡中春宴因贈諸客僕本儒家子待詔金馬門塵忝親近地孤負聖明恩一旦奉優詔萬里牧逺人可憐島夷帥自稱為使君身騎牂牁馬口食巴江鱗闇淡緋衫故斕斑白髪新是時嵗二月玉厯布春分頒條示皇澤命宴及良辰冉冉趨府吏蚩蚩聚州民有如蟄蟲鳥亦應天地春薰草席鋪座藤枝酒注尊中庭無平地高下隨所陳蠻鼓聲坎坎巴女舞蹲蹲使君居上頭掩口語衆賔勿笑風俗陋勿欺官府貧蜂巢一作窠與蟻穴隨分有君臣開元寺東池早春池水暖温暾水清波瀲灩簇簇青泥中新蒲葉如劍梅房小白裹栁彩輕黄染順氣草薰薰適情鷗汎汎舊遊成夢寐往事隨陽焱芳物感幽懷一動平生念東澗種栁野性愛栽植植栁水中坻乘春持斧斫裁截而樹之長短既不一高下隨所宜倚岸埋大幹臨流插小枝松柏不可待楩柟固難移不如種此樹此樹易榮滋無根亦可活成隂況非遲三年未離郡可以見依依種罷水邊憩仰頭閒自思富貴本非望功名須待時不種東溪栁端坐欲何為卧小齋朝起視事畢晏坐飽食終散步長廊下退卧小齋中拙政自多暇幽情誰與同孰云二千石心如田野翁步東坡朝上東坡步夕上東坡步東坡何所愛愛此新城樹種植當嵗初滋榮及春暮信意取次栽無行亦無數緑隂斜景轉芳氣微風度新葉鳥下來萎花蝶飛去閒攜斑竹杖徐曵黄麻屨欲識往來頻青苔成白路立名按容齋隨筆東坡居黄州始自稱東坡居士其意葢專慕樂天而然如贈冩真李道士云他時要指集賢人知是商山老居士贈善相程傑云我似樂天君記取華顛賞遍洛陽春送程懿叔云我甚似樂天但無素與蠻入侍邇英云定似香山老居士世縁終淺道縁深去杭州云出處依稀似樂天敢將衰朽較前賢則公之所以景仰者不止一再言之非東坡之名偶爾暗合也徵秋稅畢題郡南亭髙城直下視蠢蠢見巴蠻安可施政教尚不通語言且喜賦斂畢幸聞閭井安豈伊循良化賴此豐登年案牘既簡少池館亦清閒秋雨簷果落夕鐘林鳥還南亭日瀟灑偃卧恣踈頑螡蟆巴徼炎毒早二月蚊蟆生咂膚拂不去遶耳薨薨聲斯物頗微細中人初甚輕如有膚受譖久則瘡痏成痏成無奈何所要防其萌麽蟲何足道潛喻儆人情登龍昌上寺望江南山懷錢舍人騎馬出西郭悠悠欲何之獨上髙寺去一與白雲期虛檻晩蕭洒前山碧參差忽似青龍閤同望玉峰時因詠松雪句永懷鸞鶴姿六年不相見況乃隔榮衰昔常與錢舍人登青龍寺上方同望藍田山各有絶句錢詩云偶來上寺因髙望松雪分明見舊山立名按一統志樂天在忠州嘗植栁龍昌寺傍栁盛則寺興栁衰則寺敗僧䕶此栁比之甘棠云郊下西日照高樹樹頭子規鳴東風吹野水水畔江蘺生盡日看山立有時尋澗行兀兀長如此何許似專城遣懷樂往必悲生泰來由否極誰言此數然吾道何終塞嘗求詹尹卜拂龜竟黙黙亦曾仰問天天但蒼蒼色自兹唯委命名利心雙息近日轉安閒鄉園亦休憶囘看世間苦苦在求不得我今無所求庶離憂悲域嵗晚霜降水返壑風落木歸山冉冉嵗將晏物皆復本源何此南遷客五年猶未還命迍分巳定日乆心彌安亦嘗心與口靜念私自言去國固非樂歸鄉未必歡何須自生苦捨易求其難負冬日杲杲冬日出照我屋南隅負暄閉目坐和氣生肌膚初似飲醇醪又如蟄者蘇外融百骸暢中適一念無曠然忘所在心與虚空俱委順山城雖荒蕪竹樹有嘉色郡俸誠不多亦足充衣食外累由心起心寧累自息尚欲忘家鄉誰能算官職宜懷齊逺近委順隨南北歸去誠可憐天涯住亦得宿溪翁時初除郎官赴朝衆心愛金玉衆口貪酒肉何如溪上翁飲瓢亦自足溪南刈薪草溪北修墻屋嵗種一頃田春驅兩黄犢於中甚安適此外無營欲溪畔偶相逢庵中遂同宿辭翁向朝市問我何官禄虚言笑殺翁郎官應列宿重過壽泉憶與楊九别時因題店壁商州南十里有水名壽泉湧出石崖下流經山店前憶昔相送日我去君言還寒波與老淚此地共潺湲一去厯萬里再來經六年形容已變改處所猶依然他日君過此殷勤吟此篇西掖早秋直夜書意自此後中書舍人時作凉風起禁掖新月生宫沼夜半秋暗來萬年枝嫋嫋炎凉遞時節鐘鼓交昏曉遇聖惜年衰報恩愁力小素餐無補益朱紱虛纒繞冠葢栖野雲稻梁養山鳥量能私自省所得已非少五品不為賤五十不為夭若無知足心貪求何日了庭松堂下何所有十松當我階亂立無行次高下亦不齊髙者三丈長下者十尺低有如野生物不知何人栽接以青瓦屋承之白沙臺朝昏有風月燥濕一作􅏫湿無塵泥疎韻秋槭槭一作瑟瑟凉隂夏凄凄春深微雨夕滿葉珠蓑蓑一作漼漼嵗暮大雪天壓枝玉皚皚四時各有趣萬木非其儕去年買此宅多為人所咍一家二十口移轉就松來移來一作近松有何得但得煩襟開即此是益友豈必交賢才顧我猶俗士冠帶走塵埃未稱為松主時時一媿懷竹窻常愛輞川寺竹窻東北廊一别十餘載見竹未曾忘今春二月初卜居在新昌未暇作廐庫且先營一堂開窻不糊紙種竹不依行意取北簷下窻與竹相當遶屋聲淅淅逼人色蒼蒼煙通杳靄氣月透玲瓏光是時三伏天天氣熱如湯獨此竹窻下朝廻解衣裳輕紗一幅巾小簟六尺牀無客盡日靜有風終夜凉乃知前古人言事頗諳詳清風北窻卧可以傲羲皇同韓侍郎遊鄭家池吟詩小飲野艇容三人晩池流浼浼悠然依棹坐水思如江海宿雨洗沙塵晴風蕩煙靄殘陽上竹樹枝葉生光彩我本偶然來景物如相待白鷗驚不起緑芡行堪採齒髪雖已衰性靈未云改逢詩遇杯酒尚有心情在晩歸有感朝弔李家孤暮問崔家疾時李十一侍郎諸子尚居憂崔二十二員外三年卧病囘馬獨歸來低睂心鬱鬱平生所善者多不過六七如何十年間零落三無一劉曾夢中見元向花前失劉三十二校書殁後嘗夢見之元八少尹今春櫻桃花時長逝漸老與誰遊春城好風日曲江感秋二首并序元和二年三年四年予每嵗有曲江感秋詩凡三篇編在第七集巻按今本第七巻乃江州詩而所謂第七集者已莫可考可見編次之大非其舊矣是時予為左拾遺翰林學士無何貶江州司馬忠州刺史前年遷主客郎中知制誥未周嵗授中書舍人今遊曲江又值秋日風物不改人事屢變況予中否後遇昔壯今衰慨然感懷復有此作噫人生多故不知明年秋又何許也時二年七月十日云耳元和二年秋我年三十七長慶二年秋我年五十一中間十四年六年居譴黜窮通與榮悴委運隨外物遂師廬山逺重弔湘江屈夜聽竹枝愁秋看灩堆没近辭巴郡印又秉綸闈筆晩遇何足言白髪映朱紱消沉昔意氣改換舊容質獨有曲江秋風煙如往日疎蕪南岸草蕭颯西風樹秋到未一作來幾時蟬聲又無數沙平緑茸合蓮落青房露今日臨望時往年感秋處池中水依舊城上山如故獨我鬢間毛昔黑今垂素榮名與壯齒相避如朝暮時命始欲來年顔已先去當春不歡樂臨老徒驚悞故作詠懷詩題於曲江路翫松竹二首龍蛇隱大澤麋鹿遊豐艸栖鳯安於梧潛魚樂於藻吾亦愛吾廬廬中樂吾道前松後修竹偃卧可終老各附其所安不知他物好坐愛前簷前卧愛北窻北窻竹多好風簷松有嘉色幽懷一以合俗念隨縁息在爾雖無情於予即有得乃知性相近不必動與植衰病無趣因吟所懷朝飱多不飽夜卧常少睡自覺寢食間都無少年味平生好詩酒今亦將捨棄酒唯下藥飲無復曾歡醉詩多聽人吟自不題一字病姿與一作引衰相日夜相繼至况當尚少朝彌慙居近侍終當求一郡聚少漁樵費合口便歸山不問人間事逍遥詠亦莫戀此身亦莫厭此身此身何足戀萬刼煩惱根此身何足厭一聚虛空塵無戀亦無厭始是逍遥人白香山詩集巻十一
