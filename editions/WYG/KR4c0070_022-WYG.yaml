body:
  text: 白香山詩集巻二十二歙縣汪立名編後集二格詩凡六十首和微之詩二十三首并序微之又以近作二十三首寄來命僕繼和其間瘀絮四百字車斜二十篇者流皆韻劇辭殫瓌竒怪譎又題云奉煩只此一度乞不見辭意欲定霸取威置僕於窮地耳大凡依次用韻韻同而意殊約體為文文成而理勝此足下素所長者僕何有焉今足下果用所長過䝉見窘然敵則氣作急則計生四十三章麾埽並畢不知大敵以為如何夫劚石破山先觀鑱迹發矢中的兼聽弦聲以足下來章惟求相困故老僕報語不覺大誇况曩者唱酬近來因繼已十六巻凡千餘首矣其為敵也當今不見其為多也從古未聞所謂天下英雄惟使君與操耳戲及此者亦欲三千里外一破愁顔勿示他人以取笑誚樂天白和晨霞此後在上都作君歌仙氏真我歌慈氏真慈氏發真念念此閻浮人左命大迦葉右召桓提因千萬化菩薩百億諸鬼神上自非想頂下及風水輪胎卵溼化類蠢蠢難具陳𢎞願在救㧞大悲忘辛勤無論善不善豈間寃與親抉開生盲眼擺去煩惱塵燭以智慧日灑之甘露津千界一時度萬法無與鄰借問晨霞子何如朝玉宸和送劉道士逰天台聞君夢逰仙輕舉超世雰握持尊皇節統衛吏兵軍靈旂星月象天衣龍鳯紋佩服交帶籙諷吟蘂珠文閬宫縹緲間鈞樂依稀聞齋心謁西母膜拜朝東君煙霏子晉裾霞爛麻姑裠倐忽别真侶悵望隨歸雲人生同大夢夢與覺誰分况此夢中夢悠哉何足云假如金闕頂設使銀河濆旣未出三界猶應在五藴飲嚥日月精茹嚼沆瀣芬尚是色香味六塵之所熏仙中有天一作大仙首出夢幻羣慈光一照燭奥法相烟煴不知萬齡暮不見三光曛一性自了了萬縁徒紛紛苦海不能漂劫火不能焚此是竺乾教先生垂典墳和櫛沐寄道友櫛沐事朝謁中門初動關盛服去尚早假寐須臾間鐘聲發東寺夜色藏南山停驂待五漏人馬同時閒髙星粲金粟落月沈玉環出門向闕路坦坦無阻艱始出里北閈稍轉市西闤晨燭照朝服紫爛復朱殷由來朝廷士一入多不還因循擲白日積漸凋朱顔青雲巳難致碧落安能攀但且知止足尚可銷憂患和祝蒼華蒼華髪神名日居復月諸環逥照下土使我𤣥雲髪化為素絲縷稟質本羸劣養生仍莽鹵痛飲困連宵悲吟飢過午遂令頭上髪種種無尺五根稀比黍苖梢細同釵股豈是乏膏沐非關櫛風雨最為悲傷多心焦衰落苦餘者能有幾落者不可數秃似鵲填河墮如烏解羽蒼華何用祝苦辭亦休吐匹如剃頭僧豈要巾冠主和我年三首我年五十七榮名得幾許甲乙三道科蘇杭兩州主才能本淺薄心力虚勞苦何能隨衆人終老於塵土我年五十七歸去誠巳遲厯官十五政數若珠纍纍野萍始賓薦場苖初縶維因讀管蕭書竊慕大有為及遭榮遇來乃覺才力羸黄紙詔頻草朱輪車載脂妻孥及僕使皆免寒與飢省躬私自媿知我者微之永懐山陰守未遂嵩陽期如何坐留滯頭白江之湄我年五十七榮名得非少報國竟何如謀身猶未了昔嘗速官謗恩大而懲小一黜鶴辭軒七年魚在沼將枯鱗再躍經鎩翮重矯白日上昭昭青雲髙𣺌𣺌平生頗同病老大宜相曉紫綬足可榮白頭不為夭夙懐慕箕潁晩節期松篠何當闕下來同拜陳情表和三月三十日四十韻送春君何在君在山陰署憶我蘇杭時春逰亦多處為君歌往事豈敢一作取辭勞慮莫怪言語狂須知酬答遽江南臘月半水凍凝如瘀寒景尚蒼茫和風已吹嘘女牆城似竈雁齒橋如鋸魚尾上奫淪草芽生沮洳律遲太簇管日緩羲和馭布澤木龍催迎春土牛助雨師習習灑雲將飄飄翥四野萬里晴千山一時曙杭土麗且康蘇民富而庶善惡有懲勸剛柔無吐茹兩衙少辭牒四境稀書疏俗以勞倈安政因閒暇著仙亭日登眺虎邱時逰豫望仙亭在杭虎邱寺在蘇尋幽駐旌軒選勝逥賓御舟移溪鳥避樂作林猨覻池古莫耶沈石竒羅刹踞劍池在蘇州羅刹石在杭州水苖泥易耨畬粟灰難鉏紫蕨抽出畦白蓮埋在淤萎花紅帶黯濕葉黄含菸楚辭云葉菸色而就黄鏡動波颭菱雪逥風旋絮手經攀桂馥齒為嘗梅楚坐并船脚敧行多馬蹄跙聖賢清濁醉水陸鮮肥飫魚膾芥醬調水葵鹽䜴絮敇慮反雖微五袴歌幸兔兆人詛但令樂不荒何必逰無倨吳苑僕尋罷越城公尚據舊逰幾客存新宴誰人與莫空文舉酒强下何曽箸江上易優逰城中多毁譽分應當自盡一作畫事勿求人恕我既無子孫君仍畢婚娶久為雲雨别終擬江湖去范蠡有扁舟陶潛有籃轝兩心苦相憶兩口遥相語最恨七年春春來各一處和寄樂天賢愚類相交人情之大率然自古今來幾人號膠漆近聞屈指數元某與白乙旁愛及弟兄中權避家室松筠與金石未足喻堅密在車如輪轅在身如肘腋又如風雲㑹天使相召匹不似勢利交有名而無實頃我在杭歲值君之越日望愁來儀遲宴惜流景疾坐耀黄金帶酌酡赬玉質酣歌口不停狂舞衣相拂平生賞心事施展十未一㑹笑始啞啞離嗟乃唧唧餞筵纔收拾征櫂遽排比後恨苦緜緜前歡何卒卒居人色慘淡行子心紆欎風袂去時揮雲帆望中失宿酲和别思目眩心忽忽病魂黯然銷老淚淒其出别君只如昨芳嵗換六七俱是官家身後期難自必籍田賦云難望嵗而自必和寄問劉白時夢得與樂天方舟西上正與劉夢得醉笑大開口適值此詩來歡喜君知否遂令髙巻幕兼遣重添酒起望㑹稽雲東南一囬首愛君金玉句舉世誰人有功用隨日新資材本天授吟哦不能散自午將及酉遂留夢得眠匡牀宿東牖和新樓北園偶集從孫公度周廵官韓秀才盧秀才范處士小飲鄭侍御判官周劉二從事皆先歸聞君新樓宴下對北園花主人既賢豪賓客皆才華初筵日未髙中飲景已斜天地為幕席富貴如泥沙嵇劉陶阮徒不足置齒牙卧甕鄙畢卓落帽嗤孟嘉芳草供枕藉亂鶯助喧譁醉鄉得道路狂海無津涯一嵗春又盡百年期不賖同醉君勿辭獨醒古所嗟銷愁若沃雪破悶如割𤓰稱觴起為夀此樂無以加歌聲凝貫珠舞袖飄亂麻相公謂四座今日非自誇有奴善吹笙有婢彈琵琶十指纎若筍雙鬟黳如鵶履舄起交雜杯盤散紛拏歸去勿擁遏倒載逃難遮明日宴東武後日逰若邪豈獨相公樂謳歌千萬家和除夜作君賦此詩夜窮陰嵗之餘我和此詩日微和春之初老知顔狀改病覺支體虚頭上毛髪短口中牙齒疎一落老病界難逃生死墟况此促促世與君多索居君在浙江東榮駕方伯輿我在魏闕下謬乘大夫車妻孥常各飽奴婢亦盈廬惟是利人事比君全不如我統十郎官君領百吏胥我掌四曹局君管十鄉閭君為父母君大惠在資儲我為刀筆吏小惡乃誅鉏君提七郡籍我按三尺書俱已佩金印嘗同趨玉除外寵信非薄中懐何不攄恩光未報答日月空居諸磊落嘗許君跼促應笑予所以自知分欲先歌歸歟和知非因君知非問詮較天下事第一莫若禪第二無如醉禪能泯人我醉可忘榮悴與君次第言為我少畱意儒教重禮法道家飬神氣重禮足滋彰養神多避忌不如學禪定中有甚深味曠廓了如空澄凝勝於睡屏除黙黙念銷盡悠悠思春無傷春心秋無感秋淚坐成真諦樂如受空王賜既得脱塵勞兼應離慙媿除禪其次醉此説非無謂一酌機即忘三杯性咸遂逐臣去室婦降虜敗軍帥思苦膏火煎憂深扄鏁祕須憑百杯沃莫惜千金費便似罩中魚脱飛生兩翅勸君雖老大逢酒莫迴避不然即學禪兩途同一致和望曉休吟稽山曉聽詠秦城旦雞鳴初有聲宿鳥猶未散丁丁漏向盡鼕鼕鼓過半南山青沈沈東方白漫漫街心若流水城角如斷岸星河稍隅落宫闕方輪煥朝車雷四合騎火星一貫赫奕冠蓋盛熒煌朱紫爛沙堤亘蟇池子城東北低下處舊號蝦蟇池市路繞龍斷白日忽照耀紅塵紛散亂貴教過客避榮任行人㸔祥煙滿虚空春色無邉畔鵷行候晷刻龍尾登霄漢臺殿暖宜攀風光晴可翫草鋪地茵褥雲巻天幃幔鶯雜佩鏘鏘花繞一作饒衣粲粲何言終日樂獨起臨風歎歎我同心人一别春七換相望山隔礙欲去官羈絆何日到江東超然似張翰和李勢女減一分太短増一分太長不朱面若花不粉肌如霜色為天下艷心乃女中郎自言重不幸家破身未亡人各有一死此死職所當忍將先人體與主為疣瘡妾死主意快從此兩無妨願信赤心語速即白刃光南郡忽感激却立捨鋒鋩撫背稱阿姊歸我如歸鄉竟以恩信待豈止猜妒忘由來几上肉不足揮干將南郡死巳久骨枯墓蒼蒼願於墓上頭立石鐫此章勸戒天下婦不令陰勝陽和酬鄭侍御東陽春悶放懐追越逰見寄君得嘉魚置賓席樂如南有嘉魚時勁氣森爽竹竿竦妍文煥爛芙蓉披載筆在幕名已重補衮於朝官尚卑一緘疏入掩谷永三都賦成排左思自言拜辭主人後離心蕩颺風前旗東南門館别經嵗春眼悵望秋心悲已上叙嘉魚昨日嘉魚來訪我方駕同出何所之樂逰原頭春尚早百舌新語聲椑椑日趁花忙向南坼風催栁急從東吹流年􅐞恍不饒我美景鮮妍來為誰紅塵三條界阡陌碧草千里鋪郊畿餘霞斷時綺幅裂斜雲展處羅文紕暮鐘逺近聲互動暝鳥髙下飛追隨酒酣將歸未能去悵然逥望天四垂生何足養稽著論途何足泣楊漣洏胡不花下伴春醉滿酌緑酒聽黄鸝嘉魚㸃頭時一歎聽我此言不知疲語終興盡各分散東西軒騎分逶迤此詩勿遣閒人見見恐與他為笑資白首舊寮知我者憑君一詠向周師周判官師範蘇杭舊判官去範字叶韻和自勸二首稀稀疎疎繞籬竹窄窄狹狹向陽屋屋中有一曝背翁委置形骸如土木日暮半爐麩炭火夜深一盞紗籠燭不知有益及民無二十年來食官禄就暖移盤檐下食防寒擁被帷中宿秋官月俸八九萬豈徒遣爾身温足勤操丹筆念黄沙莫使飢寒囚滯獄急景凋年急於水念此攬衣中夜起門無宿客共誰言煖酒挑燈對妻子自飲數杯妻一盞餘酌分張與兒女微酣静坐未能眠風霰蕭蕭打窗紙自問有何才與術入為丞郎出刺史争知夀命短復長豈得營營心不止請㸔韋孔與錢崔半月之間四人死韋中書孔京兆錢尚書崔華州十五日間相次而逝和雨中花真宰倒持生殺柄閒物命長人短命松枝上鶴蓍下龜千年不死仍無病人生不得似龜鶴少去老來同旦暝何異花開旦暝間未落仍遭風雨横草得經年萊一作菜連月惟花不與多時節一年三百六十日花能幾日供攀折桃李無言難自訴黄鶯解語憑君説鶯雖為説不分明葉底枝頭謾饒舌和晨興因報問龜兒冬旦寒慘澹雲日無晶輝當此嵗暮感見君晨興詩君詩亦多苦苦在兄逺離我苦不在逺纏緜肝與脾西院病孀婦後牀孤姪兒黄昏一慟後夜半十起時病眼兩行血衰鬢萬莖絲咽絶五藏脈痩消一作消滲百骸脂雙目失一目四肢斷兩肢不如溘然逝安用半活為誰謂荼檗苦荼檗甘如飴誰謂湯火熱湯火冷如澌前時君寄詩憂念問阿龜喉燥聲氣室經年無報辭及覩晨興句未吟先涕垂因兹漣漣際一吐心中悲茫茫四海間此苦惟君知去我四千里使我告訴誰仰頭向青天但見鴈南飛憑鴈寄一語為我達微之弦絶有續膠樹斬可接枝惟我中腸斷應無連得期和朝囬與王錬師逰南山下藹藹春景餘峩峩夏雲初躞蹀退朝騎飄颻隨風裾晨從四丞相入拜白玉除暮與一道士出尋青溪居吏隱本齊致朝野孰云殊道在有中適機忘無外虞但媿煙霄上鸞鳳為吾徒又慙雲水間鷗鶴不我疎坐傾數杯酒卧枕一巻書興酣頭兀兀睡覺心于于以此送日月問師為何如和嘗新酒空腹嘗新酒偶成夘時醉醉來擁褐裘直至齋時睡睡酣不語笑真寢無夢寐殆欲忘形骸詎知屬天地酲餘和未散起坐澹無事舉臂一欠伸引琴彈秋思和順之琴者陰陰花院月耿耿蘭房燭中有弄琴人聲貌俱如玉清泠石泉引澹泞風松曲遂使君子心不愛凡絲竹感舊寫真李放寫我真寫來二十載莫問真何如畫亦銷光彩朱顔與𤣥鬢日夜改復改無嗟貌遽非且喜身猶在授太子賓客歸洛自此後東都作南省去拂衣東都來掩扉病將老齊至心與身同歸白首外縁少紅塵前事非懐哉紫芝叟千載心相依秋池二首身閒無所為心閒無所思况當故園夜復此新秋池岸闇鳥棲後橋明月出時菱風香散漫桂露光參差静境多獨得幽懐竟誰知悠然心中語自問來何遲朝衣薄且健晩簟清仍滑社近燕影稀雨餘蟬聲歇閒中得詩境此境幽難説露荷珠自傾風竹玉相戞誰能一同宿共翫新秋月暑退早凉歸池邊好時節中隱大隱住朝市小隱入邱樊邱樊太冷落朝市太囂諠不如作中隱隱在畱司官似出復似處非忙亦非閒不勞心與力又免飢與寒終嵗無公事隨月有俸錢君若好登臨城南有秋山君若愛逰蕩城東有春園君若欲一醉時出赴賓筵洛中多君子可以恣歡言君若欲髙卧但自深掩關亦無車馬客造次到門前人生處一世其道難兩全賤即苦凍餒貴則多憂患惟此中隱士致身吉且安窮通與豐約正在四者間問秋光殷卿領北鎮崔尹開南幕外事信為榮中懐未必樂何如不才者兀兀無所作不引窗下琴即舉池上酌澹交惟對水老伴無如鶴自適頗從容旁觀誠濩落身心轉恬泰煙景彌澹泊逥首語秋光東來應不錯引泉一為止足限二為衰疾牽邴罷不因事陶歸非待年歸來嵩洛下閉户何翛然静埽林下地閒疏池畔泉伊流狹似帶洛石大如拳誰教明月下為我聲濺濺竟夕舟中坐有時橋上眠何用施屏障水竹繞牀前知足吟和崔十八未貧作不種一隴田倉中有餘粟不采一枝桑箱中有餘服官閒離憂責身泰無羈束中人百户税賓客一年禄尊中不乏酒籬下仍多菊是物皆有餘非心無所欲吟君未貧作因歌知足曲自問此時心不足何時足立名按避暑録話云樂天自刑部侍郎以病求分司時年纔五十八自是蓋不復出中間一為河南尹期年輙去再除同州刺史不拜雍容無事順適其意而滿足其欲者十有六年方太和開成㑹昌之間天下變故所更不一元稹以廢黜死李文饒以讒嫉死雖裵晉公猶懐疑畏而牛僧孺李宗閔皆不免萬里之行所謂李逢吉令狐楚李珏之徒泛泛非素與㳺者其氷炭低昻未嘗有虚日顧樂天所得豈不多哉酬集賢劉郎中對月見寄兼懐元浙東月在洛陽天天髙浄如水下有白頭人擥衣中夜起思逺鏡亭上光深書殿裏眇然三處心相去各千里太湖石逺望老嵯峨近觀怪嶔崟纔髙八九尺勢若千萬尋嵌空華陽洞重疊匡山岑邈矣仙掌迥呀然劍門深形質冠今古氣色通晴隂未秋已瑟瑟欲雨先沈沈天姿信為異時用非所任磨刀不如礪𢷬帛不如砧何乃主人意重之如萬金豈伊造物者獨能知我心偶作二首擾擾貪生人幾何不夭閼遑遑愛名人幾何能貴達伊余信多幸拖紫垂白髪身為三品官年已五十八筋骸雖早衰尚未苦羸惙資産雖不豐亦不甚貧竭登山力猶在遇酒興時發無事日月長不羈天地闊安貧有處所適意無時節解帶松下風抱琴池上月人間所重者相印將軍鉞謀慮繫安危威權主生殺焦心一身苦炙手旁人熱未必方寸間得如吾快活立名按青箱雜記白詩無事日月長不羈天地闊此達者之詞也孟東野詩出門即有礙誰謂天地寛此褊狹者之詞也然則天地何嘗礙郊自礙耳日出起盥櫛振衣入道場寂然無他念但對一爐香日髙始就食食亦非膏粱精粗隨所有亦足飽充腸日午脱巾簪燕息窗下牀清風颯然至卧可致羲皇日西引杖屨散步逰林塘或飲茶一盞或吟詩一章日入多不食有時惟命觴何以送閒夜一曲秋霓裳一日分五時作息率有常自喜老後健不嫌閒中忙是非一以貫身世交相忘若問此何許此是無何鄉葺池上舊亭池月夜淒涼池風曉蕭颯欲入池上冬先葺園中閤向暖窗户開迎寒簾幕合苔封舊瓦木水照新朱蠟軟火深土壚香膠小瓷榼中有獨宿翁一燈對一榻崔十八新池愛君新小池池色無人知見㡳月明夜無波風定時忽㸔不似水一泊稀琉璃翫止水動者樂流水靜者樂止水利物不如流鑒形不如止淒清早霜降淅瀝微風起中面紅葉開四隅緑萍委廣狹八九丈灣環有涯涘淺深三四尺洞徹無表裏静分鶴翹足澄見魚掉尾迎眸洗眼塵隔胷蕩心滓定將禪不别明與誠相似清能律貪夫澹可交君子豈惟空狎翫亦取相倫擬欲識静者心心源只如此聞崔十八宿予新昌敝宅時予亦宿崔家依仁新亭一宵偶同兩興暗合因而成詠聊以寫懐陋巷掩敝廬髙居敞華屋新昌十株松依仁萬莖竹松前月臺白竹下風池緑君向我齋眠我在君亭宿平生有微尚彼此多幽獨何必本主人兩心聊自足日長日長晝加餐夜短朝餘睡春來寢食間雖老猶有味林塘得芳景園曲生幽致愛水多棹舟惜花不埽地幸無眼下病且向尊前醉身外何足言人間本無事三月三十日作今朝三月盡寂寞春事畢黄鳥漸無聲朱櫻新結實臨風獨長歎此歎意非一半百過九年艷陽殘一日隨年減歡笑逐日添衰疾且遣花下歌送此杯中物慵不能架上非無書眼慵不能㸔匣中亦有琴手慵不能彈腰慵不能帶頭慵不能冠午後恣情寢午時隨事餐一餐終日飽一寢至夜安飢寒亦閒事况乃不飢寒晨興宿鳥動前林晨光上東屋銅爐添早香紗籠滅殘燭頭醒風稍愈眼飽睡初足起坐兀無思叩齒三十六何以解宿齋一杯雲母粥朝課平甃白石渠静埽青苔院池上好風來新荷大如扇小亭中何有素琴對黄巻蘂珠諷數篇秋思彈一徧從容朝課畢方與客相見天竺寺七葉堂避暑鬱鬱復鬱鬱伏熱何時畢行入七葉堂煩暑隨步失檐雨稍霏微窗風正蕭瑟清宵一覺睡可以銷百疾立名按咸淳臨安志下天竺寺有七葉堂載公此詩是亦杭州作編者誤入洛下詩耳然集中前後倒置者甚多未能盡正也香山寺石樓潭夜浴炎光晝方熾暑氣宵彌毒揺扇風甚微褰裳汗霢霂起向月下行來就潭中浴平石為浴牀窪石為浴斛綃巾薄露頂草屨輕乘足清涼詠而歸歸上石樓宿嗟髪落朝亦嗟髪落暮亦嗟髪落落盡誠可嗟盡來亦不惡旣不勞洗沐又不煩梳掠最宜溼暑天頭輕無髻縛脱置垢巾幘解去塵纓絡銀缾貯寒泉當頂傾一勺有如醍醐灌坐受清涼樂因悟自在僧亦資於剃削安穩眠家雖日漸貧猶未苦飢凍身雖日漸老幸無急病痛眼逢鬧處合心向閒時用既得安穩眠亦無顛倒夢池上夜境晴空星月落池塘澄鮮淨緑表裏光露簟清瑩迎夜滑風襟瀟灑先秋涼無人驚處野禽下新睡覺時幽草香但問塵埃能去否濯纓何必問滄浪書紳仕有職役勞農有畎畆勤優哉分司叟心力無苦辛嵗晩頭又白自問何欣欣新酒始開瓮舊榖猶滿囷吾嘗靜自思往往夜達晨何以送吾老何以安吾貧嵗計莫如榖飽則不干人日計莫如醉醉則兼忘身誠知有道理未敢勸交親恐為人所哂聊自書諸紳秋逰平泉贈韋處士閒襌師秋景引閒步山逰不知疲杖藜捨輿馬十里與僧期昔嘗憂六十四體不支持今來已及此猶未苦衰羸予往年有詩云三十氣大壯胷中多是非六十年太老四體不支持今故云心興遇境發身力因行知尋雲到起處愛泉聽滴時南村韋處士西寺閒禪師山頭與澗底聞健且相隨逰坊口懸泉偶題石上時為河南尹濟源山水好老尹知之久常日聽人言今秋入吾手孔山刀劍立沁水龍蛇走危磴上懸泉澄灣轉坊口虚明見深底淨緑無纎垢仙櫂浪悠揚塵纓風抖擻巖寒松柏短石古莓苔厚錦座纓髙低翠屏張左右雖無安石妓不乏文舉酒談笑逐身來管絃隨事有時逢杖錫客或值垂綸叟相與澹忘歸自辰將及酉公門欲返駕溪路猶逥首早晩重來逰心期罷官後對火翫雪平生所心愛愛火兼憐雪火是臘天春雪為陰夜月鵝毛紛正墮獸炭敲初折盈尺白鹽寒滿爐紅玉熱稍宜杯酌動漸引笙歌發但識歡來由不知醉時節銀盤堆栁絮羅袖摶瓊屑共愁明日銷便作經年别六年寒食洛下宴逰贈馮李二少尹豐年寒食節美景洛陽城三尹皆强健七日盡晴明東郊蹋青草南園攀紫荆風坼海榴艷露墜木蘭英假開春未老宴合日屢傾珠翠混花影管絃藏水聲佳㑹不易得良辰亦難并聽吟歌暫輟看舞杯徐行米價賤如土酒味濃於餳此時不盡醉但恐負平生殷勤二曹長各捧一銀觥苦熱中寄舒員外何堪日衰病復此時炎燠厭對俗杯盤倦聽凡絲竹藤牀鋪晩雪角枕截寒玉安得清痩人新秋夜同宿非君固不可何夕枉髙躅閒夕一聲早蟬發數㸃新螢度蘭釭耿無烟筠簟清有露未歸後房寢且下前軒步斜月入低廊涼風滿髙樹放懐常自適遇境多成趣何法使之然心中無細故寄情灼灼早春梅東南枝最早持來翫未足花向手中老芳香銷掌握悵望生懐抱豈無後開花念此先開好舒員外逰香山寺數日不歸兼辱尺書大誇勝事時正值坐衙慮囚之際走筆題長句以贈之香山石樓倚天開翠屏壁立波環逥黄菊繁時好客到碧雲合處佳人來謂遣英蒨二妓與舒君同逰酡顔一笑夭桃綻清吟數聲寒玉哀軒騎逶遲櫂容與畱連三日不能逥白頭老尹府中坐早衙纔退暮衙催庭前堦上何所有纍囚成貫案成堆豈無池塘長秋草亦有絲竹生塵埃今日清光昨夜月竟無人來勸一杯早冬逰王屋自靈都抵陽臺上方望天壇偶吟成章寄温谷周尊師中書李相公霜降山水清王屋十月時石泉碧漾漾巖樹紅離離朝為靈都逰暮有陽臺期飄然世塵外鸞鶴如可追忽念公程盡復慙身力衰天壇在天半欲上心遲遲嘗聞此逰者隱客與損之各抱貴仙骨俱非泥垢姿二人相顧言彼此稱男兒若不為松喬即須作臯夔今果如其語光彩雙葳蕤一人佩金印一人翳玉芝我來髙其事詠歎偶成詩為君題石上欲使故山知醉中重畱夢得劉郎劉郎莫先起蘇臺蘇臺隔雲水酒琖來從一百分馬頭去便三千里白香山詩集巻二十二
