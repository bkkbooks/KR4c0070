body:
  text: 白香山詩集巻三十六歙縣汪立名編後集十六律詩凡一百首病中詩并序開成已未嵗余蒲桞之年六十有八冬十月甲寅旦始得風痺之疾體癏目眩左足不支蓋老病相乗時而至耳余早棲心釋梵浪迹老莊因疾觀身果有所得何則外形骸而内忘憂恚先禪觀而後順醫治旬月以還厥疾少間杜門髙枕澹然安閒吟諷興來亦不能遏因成十五首題為病中詩且貽所知兼用自廣昔劉公幹病漳浦謝康樂臥臨川咸有篇章抒詠其志今引而序之者慮不知我者或加誚焉初病風六十八衰翁乗衰百病攻朽株難免蠹空穴易來風肘痺宜生栁頭旋劇轉蓬恬然不動處虚白在胷中枕上作風疾侵凌臨老頭血凝筋滯不調柔甘從此後支離臥賴是從前爛漫遊迴思往事紛如夢轉覺餘生杳若浮浩氣自能充靜室驚飈何必蕩虚舟腹空先進松花酒膝冷重裝桂布裘若問樂天憂病否樂天知命了無憂荅閒上人來問因何風疾一牀方丈向陽開勞動文殊問疾來欲界凡夫何足道四禪天始免風災色界四天初禪具三災二禪無火災三禪無水災四禪無風災病中五絶句世間生老病相隨此事心中久自知今日行年將七十猶須慙媿病來遲方寸成灰鬢作絲假如强健亦何為家無憂累身無事正是安閒好病時李君墓上松應拱元相池頭竹盡枯多幸樂天今始病不知合要苦治無李元昔子執友也杓直少子八嵗即世已九年微之少予七年薨巳八年矣今予始病得非幸乎目昬思寢即安眠足軟妨行便坐禪身作醫王心是藥不勞和扁到門前交親不要苦相憂亦擬時時强出遊但有心情何用脚陸乗肩輿水乗舟送嵩客登山臨水分無期泉石煙霞今屬誰君到嵩陽吟此句與教三十六峰知罷灸病身佛說將何喩變滅須臾豈不聞莫遣淨名知我笑休將火艾灸浮雲維摩經云是身如浮雲須臾變滅也賣駱馬五年花下醉騎行臨賣囘頭嘶一聲項籍顧騅猶解飲樂天别駱豈無情别栁枝兩枝楊栁小樓中嫋娜多年伴醉翁明日放歸歸去後世間應不要春風立名按瀛奎律髓樂天為病風痺遣二妾故有是作觴詠罷來賔閣閉笙歌散後妓房空亦病中所賦又明年有去歳樓中别栁枝自註云樊蠻也二妓者皆以栁枝目之云就暖偶酌戲諸詩酒舊侣低屏軟褥臥藤牀舁向前軒就日陽一足任他為外物三杯自要沃中腸頭風若見詩應愈齒折仍誇笑不妨細酌徐吟猶得在舊遊未必便相忘嵗暮呈思黯相公皇甫朗之及夢得尚書嵗暮皤然一老夫十分流輩九分無莫嫌身病人扶侍猶勝無身可遣扶自解房傳往世為禪客世傳房太尉前生為禪僧與婁師徳友善慕其為人故今生有婁之遺風也王道前生應畫師王右丞詩云宿世是詞客前身應畫師我亦定中觀宿命多生債負是歌詩不然何故狂吟詠病後多於未病時巳上病中十五首嵗暮病懐贈夢得時與夢得同患足疾十年四海故交親零落唯殘兩病身共遣數奇從是命同教步蹇有何因眼隨老減嫌長夜體待陽舒望早春新樂堂前舊池上相過亦不要他人雪後過集賢裴令公舊宅有感梁王捐館後枚叟過門時有淚人還泣無情雪不知臺亭留盡在賔客散何之唯有蕭條雁時來下故池酬夢得貧居詠懐見贈嵗陰生計兩蹉跎相顧悠悠醉且歌廚冷難留烏止屋詩云瞻烏爰止于誰之屋言烏多止富家之屋也門閑可與雀張羅病添莊舄吟聲苦貧欠韓康藥債多日望揮金賀新命來篇云若有金揮勝二疏俸錢依舊又如何時夢得罷賔客除祕監禄俸略同故云酬夢得見喜疾瘳暖臥摩綿褥晨一作寒傾藥酒螺昬昬布裘底病醉睡相和末疾徒云爾傳云風淫末疾末謂四肢餘年有㡬何須知差與否相去校無多夜聞箏中彈瀟湘送神曲感舊縹緲巫山女歸來七八年殷勤湘水曲留在十三絃苦調吟還出深情咽不傳萬重雲水思今夜月明前感蘇州舊舫畫梁朽折紅窗破獨立池邊盡日看守得蘇州船舫爛此身爭合不衰殘感舊石上字閑撥船行尋舊池幽情往事復誰知太湖石上鐫三字十五年前陳結之立名按容齋五筆云初讀樂天感石上舊字詩有陳結之並無所經見全不可曉後觀其對酒有感寄李郎中詩往年江外抛桃葉去嵗樓中别栁枝注云桃葉結之也栁枝樊素也然後結之義始明見敏中初到邠寧秋日登城樓詩詩中頗多鄉思因以寄和從殿中侍御史出副邠寧想爾到邊頭蕭條正值秋二年貧御史八月古邠州絲管聞雖樂風沙見亦愁望鄉心若苦不用數登樓齋戒每因齋戒斷葷腥漸覺塵勞染愛輕六賊定知無氣色三尸應恨少恩情酒魔降伏終須盡詩債填還亦欲平從此始堪為弟子竺乾師是古先生戲禮經老僧香火一爐燈一盞白頭夜禮佛名經何年飲著聲聞酒直到如今醉未醒近見慕巢尚書詩中屢有歎老思退之意又於洛下新置郊居然寵寄方深歸心太速因以長句戲而諭之近見詩中歎白鬚遥知閫外憶東都煙霞偷眼窺來久富貴粘身擺得無新置林園猶濩落未終㛰嫁且踟躕應須待到懸車嵗然後東歸伴老夫對鏡偶吟贈張道士抱元閒來對鏡自思量年貌衰殘分所當白髮萬莖何所怪丹砂一粒不曾嘗眼昬久被書料理肺渴多因酒損傷今日逢師雖巳晩枕中治老有何方病入新正枕上驚新嵗花開念舊歡是身老所逼非意病相干風月情猶在杯觴興漸闌便休心未伏更試一春看臥疾來早晩臥疾來早晩懸懸將十旬婢能尋本草犬不吠醫人酒甕全生醭歌筵半委塵風光還欲好爭向枕前春强起迎春戲寄思黯杖策人扶廢病身晴和强起一迎春他時蹇跛縱行得笑殺平原樓上人夢得前所酬篇有錬盡美少年之句因思往事兼詠今懷重以長句荅之鍊盡少年成白首憶初相識到今朝昔饒春桂長先折今伴寒松取後凋昔登科第夢得多居先今同暮年洛下為老伴生事縱貧猶可過風情雖老未全銷聲華寵命人皆得若箇如君歴七朝夢得貞元中及今凡仕七朝也病後寒食故紗絳帳舊青氊藥酒醺醺引醉眠斗擻敝袍春晩後摩挲病脚日陽前行無筋力尋山水坐少精神聴管絃抛却風光負寒食曾來未省似今年老病相仍以詩自解榮枯憂喜與彭殤都似人間戲一場蟲臂鼠肝猶不怪雞膚鶴髮復何傷昨因風發甘長往今遇陽和又小康春暖來風痺稍退也還似逺行裝束了遲迴且住亦何妨皇甫郎中親家翁赴任絳州宴送出城贈别慕賢入室交先定結援通家好復成新婦不嫌貧活計嬌孫同慰老心情洛橋歌酒今朝散絳路風煙㡬日行欲識離羣相戀意為君扶病出都城春暖風痺宜和暖春來脚校輕鶯留花下立鶴引水邊行髮少嫌巾重顔衰訝鏡明不論親與故自亦昧平生殘春晩起伴客笑談掩户下簾朝睡足一聲黄鳥報殘春披衣岸幘日髙起兩角青衣扶老身䇿杖强行過里巷引杯閒酌伴親賔莫言病後妨談笑猶恐多於不病人送唐州崔使君侍親赴任連持使節歴專城獨賀崔君最慶榮烏府一抛霜簡去朱輪四從板輿行崔郎中從殿中連典四郡皆侍親赴任發時止許沙鷗送到日方乗竹馬迎唯慮郡齋賔友少數杯春酒共誰傾春晩詠懷贈皇甫朗之豔陽時節又蹉跎遲暮光陰復若何一嵗中分春日少百年通計老時多多中更被愁牽引少裏一作處兼遭病折磨賴有銷憂治悶藥君家醲酎我狂歌春盡日宴罷感事獨吟開成五年三月三十日作五年三月今朝盡客散筵空獨掩扉病共樂天相伴住春隨樊素一時歸閒聴鶯語移時立思逐楊花觸處飛金帶縋腰衫委地年年衰瘦不勝衣病中辱崔宣城長句見寄兼有觥綺之贈因以四韻總而酬之劉楨病發經春臥謝脁詩來盡日吟三道舊誇收片玉昔子考制策崔君登科也一章新喜獲雙金信題霞綺緘情重酒試銀觥表分深科第門生滿霄漢嵗寒少得似君心前有别栁枝絶句夢得繼和云春盡絮飛留不得隨風好去落誰家又復戲荅栁老春深日又斜任他飛向别人家誰能更學孩童戲尋逐春風捉栁花池上早夏水積春塘晩陰交夏木䋣舟船如野渡籬落似江邨靜拂琴牀席香開酒庫門慵閒無一事時弄小嬌孫談氏外孫生三日喜是男偶吟成篇兼戲呈夢得玉芽珠顆小男兒羅薦蘭湯浴罷時芣苢春來盈女手梧桐老去長孫枝慶傳媒氏燕先賀喜報談家烏預知明日貧翁具雞黍應須酬賽引雛詩前年談氏外孫女初生夢得有賀詩云從此引鵷鶵今幸是男前言似有徵故云開成大行皇帝輓歌詞四首奉敕撰進御宇恢皇化傳家叶至公華夷臣妾内堯舜弟兄中制度移民俗文章變國風開成與貞觀實録事多同晏駕辭雙闕靈儀出九衢上雲歸碧落下席葬蒼梧蓂晩餘堯歴龜新啓夏圖三朝連棣萼從古帝王無嚴恭七月禮哀慟萬人心地感勝秋氣天愁結夕陰鼎湖龍漸逺濛汜日初沈唯有雲韶樂長留治世音化成同軌表清平恩結連枝感聖明帝與九齡雖吉夢山呼萬嵗是虚聲月低儀仗辭蘭路風引笳簫入柏城老病龍髯攀不及東周退傅最傷情時熱少見客因詠所懷冠櫛心多嬾逢迎興漸㣲況當時熱甚幸遇客來稀濕灑池邊地涼開竹下扉露牀青篾簟風架白蕉衣院靜留僧宿樓空放妓歸衰殘强歡宴此事久知非宣州崔大夫閣老忽以近詩數十首見示吟諷之下竊有所喜因成長句寄題郡齋謝𤣥暉殁吟聲寢郡閣寥寥筆研閒無復新詩題壁上虚教逺岫列窗間謝宣城郡内詩云窗中列逺岫忽驚歌雪今朝至必恐文星昨夜還再喜宣城章句動飛觴遥賀敬亭山謝又有題敬亭山詩並見文選中足疾足疾無加亦不瘳緜春歴夏復經秋開顔且酌尊中酒代歩多乗池上舟幸有眼前衣食在兼無身後子孫憂應須學取陶彭澤但委心形任去留晩池汎舟遇景成詠贈吕處士岸淺橋平池面寛飄然輕棹汎澄瀾風宜扇引開懐入樹愛舟行仰臥看别境客稀知不易能詩人少詠應難惟憐吕叟時相伴同把磻溪舊釣竿夢微之夜來攜手夢同遊晨起盈巾淚莫收漳浦老身三度病咸陽宿草八囘秋君埋泉下泥銷骨我寄人間雪滿頭阿衞韓郎相次去夜臺茫昧得知不阿衞微之小男韓郎微之愛壻感秋詠意炎涼遷次速如飛又脫生衣著熟衣繞壁暗蛩無限思戀巢寒燕未能歸須知流輩年年失莫歎衰容日日非舊語相傳聊自慰世間七十老人稀老病幽獨偶吟所懐眼漸昬昬耳漸聾滿頭霜雪半身風已將心出浮雲外維摩經云是身如浮雲也猶寄形於逆旅中觴詠罷來賔閣閉笙歌散後妓房空世縁俗念消除盡别是人間清淨翁和楊尚書罷相後夏日遊永安水亭兼招本曹楊侍郎同行道行無喜退無憂舒巻如雲得自由良冶動時為哲匠巨川濟了作虚舟竹亭陰合偏宜夏水檻風涼不待秋遥愛翩翩雙紫鳯入同官署出同遊在家出家衣食支吾㛰嫁畢從今家事不相仍夜眠身是投林鳥朝飯心同乞食僧清唳數聲松下鶴寒光一㸃竹間燈中宵入定跏趺坐女喚妻呼多不應夜涼露白風清庭户涼老人先著夾衣裳舞腰歌袖抛何處唯對無絃琴一張繼之尚書自余病來寄遺非一又䝉覽醉吟先生傳題詩以美之今以此篇用伸酬謝衰殘與世日相踈惠好唯君分有餘茶藥贈多因病久衣裳寄早及寒初所寄贈之物皆及時交情鄭重金相似詩韻清鏘玉不如醉傳狂言人盡笑獨知我者是尚書五年秋病後獨宿香山寺三絶句經年不到龍門寺今夜何人知我情還向暢師房裏宿新秋月色舊灘聲飲徒歌伴今何在雨散雲飛盡不迴從此香山風月夜祗應長是一身來石盆泉畔石樓頭十二年來晝夜遊更過今年年七十假如無病亦宜休題香山新經堂招僧煙滿秋堂月滿庭香花漠漠磬泠泠誰能來此尋真諦白老新開一藏經偶題鄧公公即給事中珽之子也飢窮老病退居此邨偶因攜酒尋邨客聊復迴車訪薜蘿且值雪寒相慰問不妨春暖更經過翁居山下年空老我得人間事校多一種共翁頭似雪翁無衣食又如何早入皇城贈王留守僕射津橋殘月曉沈沈風露淒清禁署深城栁宫槐謾揺落悲愁不到貴人心寄題廬山舊草堂兼呈二林寺道侣三十年前草堂主而今雖在鬢如絲登山尋水應無力不似江州司馬時漸伏酒魔休放醉猶殘口業未抛詩君行過到鑪峰下為報東林長老知此詩憑錢知進侍御往題草堂中也改業先生老去飲無興居士病來閒有餘猶覺醉吟多放逸不如禪坐更清虚予先有醉吟先生傳今故云柘枝紫袖教丸藥羯鼓蒼頭遣種蔬却被山僧戲相問一時改業意何如山下留别佛光和尚勞師送我下山行此别何人識此情我已七旬師九十當知後㑹在他生山中五絶句遊嵩陽見五物各有所感感興不同隨興而吟因成五絶嶺上雲嶺上白雲朝未散田中青麥旱將枯自生自滅成何事能逐東風作雨無石上苔漠漠斑斑石上苔幽芳靜緑絶纖埃路傍凡草榮遭遇曾得七香車輾來林下樗香檀文桂苦雕鐫生理何曾得自全知我無材老樗否一枝不損盡天年澗中魚海水桑田欲變時風濤翻覆沸天池鯨吞蛟鬬波成血深澗游魚樂不知洞中蝙蝠千年鼠化白蝙蝠黒洞深藏避􅃠羅逺害全身誠得計一生幽暗又如何自戲三絶句閒臥獨吟無人酬和聊假身心相戲往復偶成三章心問身心問身云何泰然嚴冬暖被日髙眠放君快活知恩否不早朝來十一年身報心心是身王身是宫君今居在我宫中是君家舍君須愛何事論恩自說功心重荅身因我疎慵休罷早遣君安樂嵗時多世間老苦人何限不放君閑柰我何立名按齊東野語陶靖節作形影相贈神釋之詩謂貴賤賢愚莫不營營惜生故極陳形影之苦而以神辨自然以釋其惑樂天因之作心問身身荅心詩坡翁又從而賦六言曰淵明形神自我樂天身心於物而今月下三人他日當成㡬佛㑹昌元年春五絶句病後喜過劉家忽憶前年初病後此生甘分不銜杯誰能料得今春事又向劉家飲酒來贈舉之僕射今春與僕射三為寒食之㑹雞毬􅄳粥屢開筵談笑謳吟間管絃一月三囘寒食㑹春光應不負今年盧尹賀夢得㑹中作病聞川守賀筵開起伴尚書飲一杯任意少年長笑我老人自覓老人來題朗之槐亭春風可惜無多日家醖唯殘軟半瓶猶望君歸同一醉籃轝早晩入槐亭勸夢得酒誰人功畫麒麟閣何客新投魑魅鄉兩處榮枯君莫問殘春更醉兩三場過裴令公宅二絶裴令公在日常同聴楊栁枝歌每遇雪天無非招宴二物如故因成感情風吹楊栁出牆枝憶得同歡共醉時每到集賢坊北過不曾一度不低眉梁王舊館雪濛濛愁殺鄒枚二老翁此句兼屬夢得假使明朝深一尺亦無人到兎園中百日假滿少傅官停自喜言懷長告今朝滿十旬從兹蕭灑便終身老嫌手重抛牙笏病喜頭輕換角巾疏傅不朝懸組綬尚平無累畢婚姻人言世事何時了我是人間事了人早熱畏景又加旱火雲殊未收籬暄飢有雀池涸渴無鷗岸幘頭仍痛褰裳汗亦流若為當此日遷客向炎州時楊李二相各貶潮韶題崔少尹上林坊新居坊靜居新深且幽忽疑縮地到滄洲宅東籬缺嵩峰出堂後池一作門開洛水流髙下三層盤野徑沿洄十里泛漁舟若能為客烹雞黍願伴田蘇日日遊新澗亭煙蘿初合澗新開閒上西亭日㡬回老病歸山應未得且移泉石就身來對酒有懷寄李十九郎中往年江外抛桃葉結之也去嵗樓中别栁枝樊蠻也寂寞春來一杯酒此情唯有李君知吟君舊句情難忘風月何時是盡時李君嘗有悼故妓詩云直應人世無風月始是心中忘却時今故云楊六尚書頻寄新詩詩中多有思閑相就之志因書鄙意報而諭之君年殊未及懸車未合將閒逐老夫身健正宜金印綬位髙方稱白髭鬚若論塵事何由了但問雲心自在無進退是非俱是夢丘中闕下亦何殊偶吟自慰兼呈夢得予與夢得甲子同今俱七十且喜同年滿七旬莫嫌衰病莫嫌貧已為海内有名客又占世間長命人耳裏聲聞新将相眼前失盡故交親尊榮富夀難兼得閒坐思量最要身寄潮州楊繼之相府潮陽俱夢中夢中何者是窮通他時事過方應悟不獨榮空辱亦空雪暮偶與夢得同致仕裴賔客王尚書飲黄昬慘慘雪霏霏白首相歡醉不歸四箇老人三百嵗裴年九十餘王八十餘予與夢得俱七十合三百餘嵗可謂希有之㑹也人間此㑹亦應稀雪朝乗興欲詣李司徒留守先以五韻戲之夜寒生酒思曉雪引詩情熱飲一兩盞冷吟三五聲鋪花憐地凍銷玉畏天晴好拂烏巾出宜披鶴氅行梁園應有興何不召鄒生贈思黯前以履道新小灘詩寄思黯報章云請向歸仁砌下看思黯歸仁宅亦有小灘為憐清淺愛潺湲一日三回到水邊若道歸仁灘更好主人何故别三年聽歌六絶句聽都子歌詞云試問嫦娥更要無都子新歌有性靈一聲格轉已堪聽更聽唱到嫦娥字猶有樊家舊典刑樂世一名六幺管急絃一作絲䋣拍漸稠緑腰宛轉曲終頭誠知樂世聲聲樂老病人聽未免愁水調第五徧乃五言調調韻最切五言一遍最殷勤調少情多似有因不㑹當時翻曲意此聲腸斷為何人想夫憐王維右丞詞云秦州一半夕陽開此句尤佳玉管朱絃莫急催容聽歌送十分杯長愛夫憐第二句請君重唱夕陽開何滿子開元中滄州有歌者何滿子臨刑進此曲以贖死上竟不免世傳滿子是人名臨就刑時曲始成一曲四調一作詞歌八疊從頭便是斷腸聲離别難緑楊陌上送行人馬去車迴一望塵不覺别時紅淚盡歸來無淚可可紇反霑巾閒樂坐安臥穩輿平肩倚杖披衫繞四邊空腹三杯卯後酒曲肱一覺醉中眠更無忙苦吟閒樂恐是人間自在天白香山詩集巻三十六
