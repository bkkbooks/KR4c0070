body:
  text: 白香山詩集卷三歙縣汪立名編長慶集三諷諭新樂府上二十首新樂府并序元和四年為左拾遺時作立名按元稹集有和李校書新題樂府上陽白髮人華原磬等十二首序云豫友李公垂貺豫樂府新題二十首雅有所謂不虛為文豫取其病時之尤急者列而和之蓋十二而已云云語未嘗及白而此序中又不言和李作當是因李作而推廣者爰于題下間采元李注以實原注所未備序曰凡九千二百五十二言斷為五十篇篇無定句句無定字繫於意不繫於文首句標其目卒章顯其志詩三百之義也其辭質而徑欲見之者易諭也其言直而切欲聞之者深誡也其事核而實使采之者傳信一作有徴也其體順而肆可以播於樂章歌曲也總而言之為君為臣為民為物為事而作不為文而作也七德舞美撥亂陳王業也武德中天子始作秦王破陳樂以歌太宗之功業貞觀初太宗重制破陳樂舞圗詔魏徵虞世南等為之歌詞名七德舞自龍朔已後詔郊廟享宴皆先奏之七德舞七德歌傳自武德至元和元和小臣白居易觀舞聽歌知樂意樂終稽首陳其事太宗十八舉義兵白旄黃鉞定兩京擒充戮竇四海清二十有四功業成二十有九即帝位三十有五致太平功成理定何神速速在推心置人腹亡卒遺骸散帛收貞觀初詔收天下陳死骸骨致祭而瘞埋之尋又散帛以求之也飢人賣子分金贖貞觀二年大飢人有鬻男女者詔出御府金帛盡贖之還其父母魏徵夢見天子一作子夜泣魏徵疾亟太宗夢與徵別既寤流涕是夕徵卒故御製碑文云昔殷宗得良弼於夢中今朕失賢臣於覺後張謹哀聞辰日哭張公謹卒太宗為之舉哀有司奏日在辰隂陽所忌不可哭上曰君臣義重父子之情也情發於中安知辰日遂哭之慟怨女三千放出宮太宗嘗謂侍臣曰婦人幽閉深宫情實可愍今將出之任求伉儷於是令左丞戴胄給事中杜正倫於掖庭宮西門揀出數千人盡放歸死囚四百來歸獄貞觀六年親録囚徒死罪者三百九十人放出歸家令明年秋來就刑應期畢至詔悉原之剪鬚燒藥賜功臣李績嗚咽思殺身李績常疾醫云得龍鬚燒灰方可療之太宗自剪鬚燒灰賜之服訖而愈績叩頭泣涕而謝含血吮瘡撫戰士思摩奮呼乞效死李思摩嘗中矢太宗親為吮血不獨一作則知不獨善戰善乘時以心感人人心歸爾來一百九十載天下至今歌舞之歌七德舞七德聖人有作垂無極豈徒耀神武豈徒誇聖文太宗意在陳王業王業艱難示子孫法曲美列聖正華聲也元宗雜彜歌不能無所刺焉法曲法曲歌大定積德重熙有餘慶永徽之人舞而詠永徽之時有貞觀遺風故髙宗制一戎大定樂曲法曲法曲舞霓裳政和世理音洋洋開元之人樂且康霓裳羽衣曲起於開元盛於天寶也法曲法曲歌堂堂堂堂之慶垂無疆中宗肅宗復鴻業唐祚中興萬萬葉永隆元年太常丞李嗣貞善審音律能知興衰云近者樂府有堂堂之曲再言之者唐祚再興之兆也法曲法曲雜一作合夷歌夷聲邪亂華聲和以亂干和天寶末明年胡塵犯宮闕法曲雖似失雅音蓋諸夏之聲也故歷朝行焉明皇雖雅好度曲然未嘗使蕃漢雜奏天寶十三載始詔諸道調法曲與胡部新聲合作識者深異之明年冬而安祿山反乃知法曲本華風苟能審音與政通一從胡曲相參錯不辨興衰與哀樂願求牙曠正華音不令夷夏相交侵二王後明祖宗之意也二王後彼何人介公酅公為國賔周武隋文之子孫古人有言天下者非是一人之天下周亡天下傳于隋隋人失之唐得之唐興十葉嵗二百介公酅公世為客明堂太廟朝享時引居賔位備威儀備威儀助郊祭髙祖太宗之遺制不獨興滅國不獨繼絶世欲令嗣位守文君亡國子孫取為戒海漫漫戒求仙也海漫漫直下無砥旁無邊雲濤煙浪最深處人傳中有三神山山上多生不死藥服之羽化為天仙秦皇漢武信此語方士年年采藥去蓬萊今古但聞名煙水茫茫無覔處海漫漫風浩浩眼穿不見蓬萊島不見蓬萊不敢歸童男丱女舟中老徐福文成多誑誕上元太一虛祈禱君看驪山頂上茂陵頭畢竟悲風吹蔓草何况𤣥元聖祖五千言不言藥不言仙不言白日升青天立部伎刺雅樂之替也太常選坐部伎無性識者退入立部伎又選立部伎絶無性識者退入雅樂部則雅樂之聲可知矣立部伎鼓笛喧雙舞劎跳七丸嫋巨索掉長竿太常部伎有等級堂上者坐堂下立堂上坐部笙歌清堂下立部鼓笛鳴笙歌一曲一作聲衆側耳鼓笛萬曲無人聽立部賤坐部貴坐部退為立部伎擊鼓吹笛和雜戲立部又退何所任始就樂懸操雅音雅音替壞一至此長令爾輩調宫徵圜丘后土郊祀時言將此樂感神祇欲望鳯來百獸舞何異北轅將適楚工師愚賤安足云太常三卿爾何人華原磬刺樂工非其人也天寶中始廢泗濵磬用華原石代之詢諸磬人則曰故老云泗濵磬下調之不能和得華原石考之乃和由是不改華原磬華原磬古人不聽今人聽泗濵石泗濵石今人不擊古人擊今人古人何不同用之捨之由樂工樂工雖在耳如壁不分清濁即為聾梨園弟子調律呂知有新聲不如古古稱浮磬出泗濵立辨致死聲感人宫懸一聽華原石君心遂亡封疆臣果然胡冦從燕起武臣少肯封疆死始知樂與時政通豈聽鏗鏘而已矣磬襄入海去不歸長安市兒為樂師華原磬與泗濵石清濁兩音誰得知上陽白髮人愍怨曠也天寶五載已後楊貴妃専寵後宫人無復進幸矣六宫有美色者輒置别所上陽是其一也貞元中尚存焉上陽人上陽人紅顔暗老白髮新緑衣監使守宫門一閉上陽多少春𤣥宗末嵗初選入入時十六今六十同時采擇百餘人零落年深殘此身憶昔吞悲别親族扶入車中不教哭皆云入內便承恩臉似芙蓉胸似玉未容君王得見面已被楊妃遙側目妬令潛配上陽宫一生遂向空房宿宿空房舊本皆作床秋夜長夜長無寐天不明耿耿殘燈背壁影蕭蕭暗雨打窗聲春日遲日遲獨坐天難暮宮鶯百囀愁厭聞梁燕雙栖老休妬鶯歸燕去長悄然春往秋來不記年唯向深宮望明月東西四五百回圓今日宮中年最老大家遙賜尚書號小頭鞋履窄衣裳青黛㸃眉眉細長外人不見見應笑天寶末年時世一作樣籹上陽人苦最多少亦苦老亦苦少苦老苦兩如何君不見昔時呂向美人賦天寶末有密采豔色者當時號花鳥使呂向獻美人賦以諷之又不見今日上陽宫人白髮歌胡旋女戒近習也天寶末康居國獻之胡旋女胡旋女心應絃手應鼓絃鼓一聲雙袖舉回雪飄颻一作風飄飄轉蓬舞左旋右轉不知疲千匝萬周無已時人間物類無可比奔車輪緩旋風遲曲終再拜謝天子天子為之微啓齒胡旋女出康居徒勞東來萬里餘中原自有胡旋者鬭妙爭能爾不如天寶季年時欲變臣妾人人學圎轉中有太真外祿山二人最道能胡旋梨花園中冊作妃金雞障下養為兒祿山胡旋迷君眼兵過黃河疑未反貴妃胡旋惑君心死棄馬嵬念更深從兹地軸天維轉五十年來制不禁胡旋女莫空舞數唱此歌悟明主新豐折臂翁戒邊功也新豐老翁八十八頭鬢眉鬚皆似雪𤣥孫扶向店前行左一作右臂憑肩右一作左臂折問翁臂折來幾年兼問致折何因緣翁云貫屬新豐縣生逢聖代無征戰慣聽梨園歌管聲一作唯聽驪宫歌吹聲不識旗槍與弓箭無何天寶大徴兵尸有三丁㸃一丁㸃得驅將何處去五月萬里雲南行聞道雲南有瀘水椒花落時瘴煙起大軍徒涉水如湯未過一作戰十人二三死村南村北哭聲哀一作悲兒別爺娘夫別妻皆云前後征蠻者千萬人行無一回是時翁年二十四兵部牒中有名字夜深不敢使人知偷將一作自把大石槌折臂張弓簸旗俱不堪從兹使免征雲南骨碎筋傷非不苦且圖揀退歸鄉土此臂折來六十年一肢雖廢一身全至今風雨隂寒夜直到天明痛不眠痛不眠終不悔且喜老身今獨在不然當時瀘水頭身死魂孤骨不收應作雲南望鄉鬼萬人冢上哭呦呦雲南有萬人冢即鮮于仲通李密曾覆軍之所今冢猶存老人言君聽取君一作何不聞開元宰相宋開府不賞邊功防黷武開元初突厥數犯邊時天武軍牙將郝靈筌出使因引特勒回鶻部落斬突厥默啜獻首于闕下自謂有不世之功時宋璟為相以天子年少好武恐徼功者生心痛抑其黨逾年始授郎將靈筌遂慟哭嘔血而死又不聞天寶宰相楊國忠欲求恩幸立邊功邊功未立生人怨請問新豐折臂翁天寶末楊國忠為相重搆閣羅鳯之役募人討之前後發二十餘萬衆去無返者又捉人連枷赴役天下怨哭人不聊生故祿山得乘人心而盜天下元和初而折臂翁猶存因備歌之太行路借夫婦以諷君臣之不終也太行之路能摧車若比君心一作人心下同是坦途巫峽之水能覆舟若比君心是安流君心好惡苦不常好生毛羽惡生瘡與君結髮未五載豈期牛女為參商古稱色衰相棄背當時美人猶怨悔何况如今鸞鏡中妾顔未改君心改為君薰衣裳君聞蘭麝不馨香為君盛容飾君看珠翠無顔色行路難難重陳人生莫作婦人身百年苦樂由他人行路難難於山險於水不獨人家夫與妻近代君臣亦如此君不見左納言右納史朝承恩暮賜死行路難不在水不在山只在人情反覆間司天臺引古以警今也司天臺仰觀俯察天人際羲和死來職事廢官不求賢空取藝昔聞西漢元成間下陵上替謫見天北辰微暗少光色四星煌煌如火赤耀芒動角射三台上台半滅中台坼是時非無太史官眼見心知不敢言明朝趨入明光殿唯奏慶雲壽星見天文時變兩如斯九重天子不得知不得知安用臺髙百尺為捕蝗刺長吏也捕蝗捕蝗誰家子天熱日長飢欲死興元兵久一作革傷隂陽和氣蠱蠧化為蝗始自兩河及三輔荐食如蠶飛似雨雨飛蠶食千里間不見青苗空赤土河南長吏言憂農課人晝夜捕蝗蟲是時粟斗錢三百蝗蟲之價與粟同捕蝗捕蝗竟何利徒使飢人重勞費一蝗雖死百蝗來豈將人力競天災我聞古之良吏有善政以政驅蝗蝗出境又聞貞觀之初道欲昌文皇仰天吞一蝗一人有慶兆民賴是嵗雖蝗不為害貞觀二年太宗吞蝗蟲事具貞觀實録昆明春思王澤之廣被也貞元中始漲之昆明春昆明春春池岸古春流新影浸南山青滉漾波沉西日紅奫淪往年因旱靈池竭龜尾曵塗魚喣沫詔開八水注恩波千介萬鱗同日活今來淨淥水照天游魚鱍鱍蓮田田洲香杜若抽心短沙暖鴛鴦鋪翅眠動植飛沉性皆遂皇澤如春無不被漁者仍豐網罟資貧人又獲菰蒲利詔以昆明近帝城官家不得收其征菰蒲無租魚無稅近水之人感君惠感君惠獨何人吾聞率土皆王民逺民何踈近何親願推此惠及天下無逺無近同一作皆欣欣吳興山中罷榷茗鄱陽坑裏休稅銀天涯地角無禁利熙熙同似昆明春城鹽州美聖謨而誚邊將也貞元壬申嵗特詔城之城鹽州城鹽州城在五原原上頭蕃東節度鉢闡布忽見新城當要路金鳥飛傳贊普聞建牙傳箭集羣臣君臣赭面有憂色皆言勿謂唐無人自築鹽州十餘載左衽氊裘不犯塞晝牧牛羊夜捉生長去新城百里外諸邊急警勞戍人唯此一道無煙塵靈夏潛安誰復辨秦原暗通何處見鄜州驛路好馬來長安藥肆黃蓍賤城鹽州鹽州未城天子憂德宗按圗自定計非關將略與廟謀吾聞髙宗中宗世北虜猖狂最難制韓公創築受降城三城鼎峙屯漢兵東西亘絶數千里耳冷不聞胡馬聲如今邊將非無䇿心笑韓公築城壁相看養冦為身謀各握强兵固恩澤願分今日邊將恩褒贈韓公封子孫誰能將此鹽州曲翻作歌詞聞至尊道州民美臣遇主也道州民多侏儒長者不過三尺餘市作矮奴年進奉號為道州任土貢任土貢寧若斯不聞使人生别離老翁哭孫母哭兒一自陽城來守郡不進矮奴頻詔問城云臣按六典書任土貢有不貢無道州水土所生者只有矮民無矮奴吾君感悟璽書下嵗貢矮奴宜悉罷道州民老者幼者何欣欣父兄子弟始相保從此得作良人身道州民民到于今受其賜欲說使君先下淚仍恐兒孫忘使君生男多以陽為字馴犀感為政之難終也貞元丙戌嵗南海進馴犀詔納苑中至十三年冬大寒馴犀死矣立名按李紳傳作貞元丙子且貞元至甲申乙酉而止無丙戌年此注當屬傳寫之誤也馴犀馴犀通天犀軀貌駭人角駭雞海蠻聞有明天子驅犀乘傳來萬里一朝得謁大眀宫歡呼拜舞自論功五年馴養始堪獻六譯語言方得通上嘉人獸俱來逺蠻館四方犀入苑䬴以瑶芻鎖以金故鄉迢遞君門深海鳥不知鐘鼓樂池魚空結江湖心馴犀生處南方熱秋無白露冬無雪一入上林三四年又逢今嵗苦寒月飲冰臥霰苦踡局角骨凍傷鱗甲縮犀有回紋毛如鱗身項有肉甲增馴犀死蠻兒啼向闕再拜顔色低奏乞生歸本國去恐身凍死似馴犀君不見建中初馴象生還放林邑建中元年詔盡出苑中馴象放歸南方也君不見貞元末馴犀凍死蠻兒泣所嗟建中異貞元象生犀死何足言五絃彈惡鄭之奪雅也五絃彈五絃彈聽者傾耳心寥寥趙璧知君入骨愛五絃一一為君調第一第二絃索索秋風拂松疏韻落第三第四絃泠泠夜鶴憶子籠中鳴第五絃聲最掩抑隴水凍咽流不得五絃並奏君試聽凄凄切切復錚錚鐵擊珊瑚一兩曲氷寫玉盤千萬聲鐵聲殺冰聲寒今本遺此六字不聫貫矣殺聲入耳膚血憯寒氣中人肌骨酸曲終聲盡欲半日四座相對愁無言座中有一逺方士唧唧咨咨聲不已自歎今朝初得聞始知孤負平生耳唯憂趙璧白髮生老死人間無此聲逺方士耳一作爾聽五絃信為美吾聞正始之音不如是正始之音其若何朱絃疏越清廟歌一彈一唱再三歎曲淡節稀聲不多融融曵曵召元氣聽之不覺心平和人情重今多賤古古琴有絃人不撫更從趙璧藝成來二十五絃不如五蠻子朝刺將驕而相備位也增李傳云貞元末蜀中始通蠻酋蠻子朝泛皮船兮渡繩橋來自巂州道路遙入界先經蜀川一作道過蜀將收功先表賀臣聞雲南六詔蠻東連牂牱西接蕃六詔星居初瑣碎合為一詔漸强大開元皇帝雖聖神唯蠻倔强不來賔鮮于仲通六萬卒征蠻一陳全軍沒至今西洱河岸邊箭孔刀痕滿枯骨天寶十三載鮮于仲通統兵六萬討雲南王閣羅鳯于西洱河全軍覆沒也誰知今日慕華風不勞一人蠻自通誠由陛下休明德亦賴微臣誘諭功德宗省表知如此笑令中使迎蠻子蠻子導從者誰何摩挲俗羽雙隈伽清平官持赤藤杖大將軍繫金呿嗟皮帶也增異牟尋男尋閣勸特敇召對延英殿上心貴在懷逺蠻引臨玉座近天顔冕旒不垂親勞徠賜衣賜食移時對移時對不可得大臣相看有羡色可憐宰相拖紫佩金章朝日唯聞對一刻驃國樂欲王化之先邇後逺也貞元十七年來獻之驃國樂驃國樂出自大海西南角雍羌之子舒難陀來獻南音奉正朔德宗立仗御紫庭黈纊不塞為爾聽玉螺一吹椎髻聳銅鼓一擊文身踊珠纓炫轉星宿搖花鬘斗藪龍蛇動曲終王子啓聖人臣父願為唐外臣左右歡呼何翕習至尊德廣之所及須臾百辟詣閣門俯伏拜表賀至尊伏見驃人獻新樂請書國史傳子孫時有擊壤老農父暗測君心間獨語聞君政化甚聖明欲感人心致太平感人在近不在遠太平由實非由聲觀身理國國可濟君如心兮民如體體生疾苦心憯悽民得和平君愷悌貞元之民若未安驃樂雖聞君不歡貞元之民苟無病驃樂不來君亦聖驃樂驃樂徒喧喧不如聞此芻蕘言縳戎人逹窮民之情也元云近制西邊每擒蕃酋例皆傳置南方不加勦戮縛戎人縛戎人耳穿面破驅入秦天子矜憐不忍殺詔徙東南吳與越黃衣小使録姓名領出長安乘遞行身被金瘡面多瘠扶病徒行日一驛朝餐飢渴費杯盤夜臥腥臊汚牀席忽逢江水憶交河垂手齊聲一作唱嗚咽歌其中一虜語諸虜爾苦非多我苦多同伴行人因借問欲說喉中氣憤憤自云鄉管一作貫本涼原大歷年中沒落蕃一落蕃中四十載身一作遣著皮裘繫毛帶唯許正朝一作朔服漢儀斂衣整巾潛一作雙淚垂誓心密定歸鄉計不使蕃中妻子知有李如暹者蓬子將軍之子也嘗沒蕃中自云蕃法唯正嵗一日許唐人之沒蕃者服唐衣冠由是悲不自勝遂密定歸計也暗思幸有殘筋骨一作力更恐年衰歸不得蕃候嚴兵鳥不飛脫身冒死奔逃歸晝伏宵行經大漠雲隂月黑風沙惡驚藏青冢寒草疏偷度黃河夜冰薄忽聞漢軍鼙鼓聲路旁走出再拜迎游騎不聽能漢語將軍遂縳作蕃生配向江南卑濕地定無存恤空防備念此吞聲仰訴天若為辛苦度殘年涼原鄉井不得見胡地妻兒虛棄捐沒蕃被囚思漢土歸漢被劫為蕃虜早知如此悔歸來兩地寧如一處苦縛戎人戎人之中我苦辛自古此寃應未有漢心漢語吐蕃身白香山詩集卷三
