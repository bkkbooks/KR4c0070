body:
  text: 白香山詩集卷二十歙縣汪立名編長慶集二十律詩五言七言凡四十首初罷中書舍人自慙拙宦叨清貫還有癡心怕素餐或望君臣相獻替可圖妻子免飢寒性疏豈合承恩久命薄元知濟事難分寸寵光酬未得不休更擬覓何官宿陽城驛對月自此後詩赴杭州路中作親故尋回駕妻孥未出關鳯皇池上月送我過商山商山路有感并序前年夏豫自忠州刺史除書歸闕時刑部李十一侍郎户部崔二十員外亦自澧果二郡守徵還相次入闕皆同此路今年豫自中書舍人授杭州刺史又由此途出二君已逝豫獨南行追歎興懷慨然成詠後來有與豫杓直虞平遊者見此短什能無惻惻乎儻未忘情請為繼和長慶二年七月三十日題於內鄉縣南亭云爾憶昨徵還日三人歸路同此生都是夢前事旋成空杓直泉埋玉虞平燭過風惟殘樂天在頭白向江東重感停驂歇路隅重感一長吁擾擾生還死紛紛榮又枯困支青竹杖間捋白髭鬚莫嘆身衰老交遊半已無逢張十八員外籍旅思正茫茫相逢此路傍曉嵐林葉暗秋露草花香白髮江城守青衫水部郎客亭同宿處忽似夜歸鄉赴杭州重宿棣華驛見楊八舊詩感題一絶往恨今愁應不殊題詩梁下又踟蹰羡君猶夢見兄弟我到天明睡亦無立名按公自忠州赴闕有棣華驛見楊八夢兄弟詩寓言題僧劫風火起燒荒宅苦海波生蕩破船力小無因救焚溺清涼山下且安禪內鄉縣一本無縣字村路作日下風髙野路涼緩驅疲馬暗思鄉渭村秋物應如此棗赤梨紅稻穗黃路上寄銀匙與阿龜謫宦心都慣辭鄉去不難緣留龜子住涕淚一闌干小子須嬌養鄒婆為好看銀匙封寄汝憶我即加餐立名按毛晃增修禮部韻略闌干流貌白居易詩玉容寂寞淚闌干又眼腔謂之闌干遁叟詩話闌干出曹子建月落參橫北斗闌干注橫斜貌象斗之將沒也而淚之闌干不但言其橫流更有借用泛瀾之意然作橫斜解自雅山泉煎茶有懷坐酌泠泠水看煎瑟瑟塵無由持一碗寄與愛茶人郢州贈别王八使君昔是詩狂客今為酒病夫強吟翻悵望縱醉不歡娛鬢髮三分白交親一半無郢城君莫厭猶較近京都吉祥寺見錢侍郎題名雲雨三年别風波萬里行愁來一作秋心正蕭索況見故人名重到江州感舊遊題郡樓十一韻掌綸知是忝剖竹信為榮才薄官仍重思深責尚輕昔徴從典午今出自承明鳯詔休揮翰漁歌欲濯纓還乘小艛艓一作艇却到古湓城醉客臨江待禪僧出郭迎青山滿眼在白髮半頭生又校三年老何曾一事成重過蕭寺宿再上庾樓行雲水新秋思閭閻舊日情郡民猶認得司馬詠詩聲贈江州李十使君員外十二韻我本江湖上悠悠任運身朝隨賣藥一作采樵客暮伴釣一作打魚人迹為燒丹隱家緣嗜酒貧經過剡溪雪尋覓武陵春豈有疏狂性堪為侍從臣仰頭驚鳯闕下口觸龍鱗劒佩辭天上風波向海濱非賢虛偶聖無屈敢一作可求伸昔去曾同日今來即後塵元和末余與李員外同日黜官今又相次出為刺史中年俱白髮左宦各朱輪長短才雖異榮枯事略均殷勤李員外不合不相親題别遺愛草堂兼呈李十使君李亦廬山人常隱白鹿洞曾住爐峰下書堂對藥臺斬新蘿徑合依舊竹窗開砌水親開決池荷手自栽五年方暫至一宿又須回縱未長歸得猶勝不到來君家白鹿洞聞道亦生苔立名按遁叟詩話白樂天用斬新亦出杜斬新花蘂未應飛斬字正形容其新在可解不可解之間重題泉石尚依依林疏僧亦稀何年辭水閣今夜宿雲扉謾獻長楊賦虛拋薜荔衣不能成一事贏得白頭歸夜泊旅望少睡多愁客中宵起望鄉沙明連浦月帆白滿船霜近海江彌濶迎秋夜更長煙波三十宿猶未到錢唐九江北岸遇風雨黃梅縣邊黃梅雨白頭浪裏白頭翁九江濶處不見岸五月盡時多惡風人間穩路應無限何事拋身在一作來此中舟中晚起日髙猶掩水窗眠枕簟清涼八月天泊處或依酤酒店宿時多伴釣魚船退身江海應無用憂國朝廷自有賢且向錢唐湖上去冷吟間醉二三年秋寒雪鬢年顔老霜庭景氣秋病看妻檢藥寒遣婢梳頭身外名何有人間事且休淡然方寸內惟擬學虛舟初到郡齋寄錢湖州李蘇州聊取二郡一哂故有落句之戲俱來滄海郡半作白頭翁謾道風煙接何曾笑語同吏稀秋稅畢客散晚亭一作庭空霽後當樓月潮來滿座風霅溪殊冷僻茂苑太繁雄惟此一作有錢唐郡間忙恰得中對酒自勉五十江城守停杯一自思頭仍未盡白官亦不全卑榮寵尋過分歡娛已校遲肺傷雖怕酒心健尚誇詩醉舞吳娘袖春歌蠻子詞猶堪三五嵗相伴醉花時郡樓夜宴留客北客勞相訪東樓為一開褰簾待月出把火看潮來豔聽一作唱竹枝曲香傳蓮子杯寒天殊未曉歸騎且遲迥回醉題候仙亭蹇步垂朱綬華纓映白鬚何因駐衰老只有且歡娛酒興還應在詩情可便無登山與臨水猶未要人扶東院松下軒廊竹下房暖簷晴日滿繩牀淨名居士經三卷榮啓先生琴一張老去齒衰嫌橘醋病來肺渴覺茶香有時間酌無人伴獨自騰騰入醉鄉虛白堂虛白堂前衙退後更無一事到中心移牀就日簷間卧卧詠間詩側枕琴間夜詠懷因招周協律劉薛二秀才世名檢束為朝士心性疏慵是野夫髙置寒燈如客店深藏夜火似僧爐香濃酒熟能嘗否冷淡詩成肯和無若厭雅吟須俗飲妓筵勉力為君鋪晚興極浦收殘雨髙城駐落暉山明虹半出松暗鶴雙歸將吏隨衙散文書入務稀間吟倚新竹筠粉汗朱衣衰病老與病相仍華簪髮不勝行多朝散藥睡少夜停燈祿食分供鶴朝衣減施僧性多移不得郡政謾如繩病中對病鶴同病病夫憐病鶴精神不損翅翎傷未堪再舉摩霄漢只合相隨覓稻粱但作悲吟和嘹唳難將俗貌對昂藏惟應一事宜為伴我髮君毛俱似霜夜歸半醉間行湖岸東馬鞭敲鐙轡瓏璁萬株松樹青山上十里沙堤明月中樓角漸移當路影潮頭欲過滿江風歸來未放笙歌散畫戟門開蠟燭紅立名按西湖蘇白堤相傳二公始築新書亦云居易為杭州刺史始築堤捍錢唐湖此公初到杭州詩巳有十里沙堤句又錢唐湖石函記但云修築河堤加髙數尺别杭民詩注云增築湖隄築不自公始明矣或以公詩有緑楊陰裏白沙隄為白隄所自來然公詩如護江隄白踏晴沙亦用白沙不獨湖堤也汛公所修湖隄在湖之東北接連下湖舊志近昭慶有石函橋溜水橋是其故址即李泌設閘泄水引灌六井處今杭人率指蘇堤之西為白隄益不相陟又有指石徑塘為白隄者不知張祐已有斷橋荒蘚合之句矣白詩誰開湖寺西南路草緑裙腰一道斜自注云孤山寺在湖州中草緑時望如裙腰正指今石徑塘也蘇公請開西湖絶不及築隄事但詳見本傳墓志方輿勝覽元祐間蘇子瞻築隄湖上自南山抵北山夾道植栁林子中榜曰蘇公隄章子厚詩天面長虹一線痕直通南北兩山春後吕惠卿奏毁之乾道作新隄自南山淨慈寺前直抵北山湖分為兩遊人大舟不能達於北山紹興中始造二髙橋出北山達於大佛頭舟行往來始無礙咸淳臨安志嗣守林希榜曰蘇公堤邦人祠公堤上郡守吕惠卿奏毁之堤間齧於水郡常隨時修治訖罔克久咸淳五年朝廷給錢增築然則蘇堤亦非治築之舊矣臘後嵗前遇景詠意海梅半白栁微黃凍水初融日欲長度臘都無苦霜霰迎春先有好風光郡中起晚聽衙鼓城上行慵倚女牆公事暫間身且健使君殊未厭餘杭白髮雪髮隨梳落霜毛繞鬢垂加添老氣味改變舊容儀不肯長如漆無過總作絲最憎明鏡裏黑白半頭時錢湖州以箬下酒李蘇州以五酘酒相次寄到無因同飲聊詠所懷勞將箬下忘憂物寄與江城愛酒翁鐺腳三州何處會甕頭一盞幾時同傾如竹葉盈尊緑飲作桃花上面紅莫怪殷勤最相憶曾陪西省與南宮立名按馬永卿云蘇秀道中有地名五木出佳酒故人以五木名之樂天詩序有箬下酒五酘酒酘字與羖同乃今之羊羔兒酒也詳其詩意當以五羔為之以是酒名故從酉云樂天詩云竹葉盈尊緑謂箬下酒取竹有緑之意也桃花上面紅謂五酘酒取桃花五葉也後人不知轉其名為五木蓋失之矣檢韻中酘字與竇同音注云重釀酒也吳郡志白居易有謝李蘇州寄五酘酒詩今里人釀酒麴米與漿水已入甕翌日又以米投之有至一再投者謂之酘其酒則清冽異常今謂之五酘是米五酘之邪按二説各異以作酘字者為近也花樓望雪命宴賦詩連天際海白皚皚好上髙樓望一回何處更能分道路此時兼不認池臺萬重雲樹山頭翠百尺花樓江畔開素壁聨題分韻句紅爐巡飲暖寒杯氷鋪湖水銀為面風卷汀沙玉作堆絆惹舞人春豔曵勾留醉客夜徘徊輸將虛白堂前鶴失却樟亭驛後梅别有故情偏憶得曾經窮苦照書來晚嵗壯嵗忽已去浮榮何足論身為百口長官是一州尊不覺白雙鬢徒言朱兩轓病難施郡政老未答君恩嵗暮别兄弟年衰無子孫惹愁諳世網治苦賴空門攬帶知腰瘦看燈覺眼昏不緣衣食繫尋合返邱園宿竹閣晚坐松簷下宵眠竹閣間清虛當服藥幽獨抵歸山巧未能勝拙忙應不及間無勞别修道即此是玄關嵗暮枉衢州張使君書并詩因以長句報之西州彼此意何如官職蹉跎嵗月除浮石潭邊停五馬望濤樓上得雙魚萬言舊手才難敵張曾應萬言登科五字新題思有餘貧薄詩家無好物反投桃李報瓊琚和薛秀才尋梅花同飲見贈忽驚林下發寒梅便試花前飲冷杯白馬走迎詩客去紅筵鋪待舞人來歌聲怨處微微落酒氣醺時旋旋開若到嵗寒無雨雪猶應醉得兩三回立名按後集五卷有尋去年梅花有感詩云馬上同攜今日杯湖邊共覓去年梅又云尊前百事皆依舊點檢惟無薛秀才正指此詩也且自注云去年與薛景文同賞今年長逝是薛秀才即薛景文唐托言乃以馬上同攜今日杯一首為元相公作云在浙東時賓府有薛書記飲酒醉後因爭令擲注子擊傷相公猶子遂出幕醒來乃作十離詩上獻元後思之有作故曰檢點惟無薛秀才事文類聚蜀伎薛濤初為連帥所喜因事獲罪怒而逺之作十離詩以獻連帥遂復喜焉按十離詩卑靡羞澀自是兒女子乞憐語托言之説未足據也附十離詩犬離主馴擾朱門四五年毛香足淨主人憐無端咬著親情客不得紅絲毯上眠筆離手越管宣毫始稱情紅箋紙上撒花瓊都緣用久鋒頭盡不得羲之手裏擎馬離廄雪耳紅毛淺碧蹄追風曾到日東西為驚王貌郎君墜不得華軒更一嘶鸚鵡離籠隴西獨自一孤身飛去飛來上錦茵都緣出去無方便不得籠中再喚人燕離巢出入朱門未忍拋主人常愛語交交銜泥穢汚珊瑚簟不得梁間更壘巢珠離掌皎潔圓明內外通清光似照水晶宮都緣一點瑕相穢不得終宵在掌中魚離池戲躍蓮池四五秋常搖朱尾弄綸鈎無端擺動芙蓉朵不得清波更一遊鷹離主爪利如鋒眼似鈴平原捉兔稱髙情無端竄向青雲外不得君王手上擎竹離亭蓊鬱新栽四五行常將貞節負秋霜為緣春筍鑽牆破不得垂隂覆玉堂鏡離臺鑄㵼黃金鑑始開初生三五月徘徊為遭無限塵蒙蔽不得華堂上玉臺與諸客空腹飲隔宿書招客平明飲暖寒麴神寅日合酒聖卯時歡促膝才飛白酡顔已渥丹碧籌攢米碗紅袖拂骰盤醉後歌尤異狂來舞不難拋杯語同坐莫作老人看立名按各本於二十一卷之首並載後序是以前二十卷還長慶集矣乃第八卷及二十卷猶雜入長慶三年詩蓋誤以為前集之終於長慶耳豈公自序中訖長慶二年冬之語都不省視邪按公以長慶二年七月除杭州時汴河未通取襄陽路赴杭十月至任則小嵗日對酒以下詩皆長慶三年春作也今悉校歸後集白香山詩集卷二十
