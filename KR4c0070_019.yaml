body:
  text: 白香山詩集巻十九歙縣汪立名編長慶集十九律詩五言七言凡九十八首吟元郎中白鬚詩兼飲雪水茶因題壁上吟詠霜毛句閒嘗雪水茶城中展睂處只是有元家吳七郎中山人待制班中偶贈絶句金馬東門隻日開漢庭待詔重仙才第三松樹非華表那得遼東鶴下來和張十八祕書謝裴相公寄馬齒齊臕一作膘足毛頭膩祕閣張郎叱撥駒洗了頷花翻假錦走將蹄汗蹋真珠青山乍見曾驚否紅粟難賖得飽無丞相寄來應有意遣君騎去上雲衢答山侣頷下髭鬚半是絲光隂向後幾多時非無解挂簪纓意未有支持伏臘資冒熱衝寒徒自取隨行逐隊欲何為更慙山侣頻傳語五十歸來道未遲早朝思退居霜嚴月苦欲明天忽憶閒居思浩然自問寒燈夜半起何如暖被日髙眠惟慙老病披朝服莫慮飢寒計俸錢隨有隨無且歸去擬求豐足是何年曲江亭晩望曲江岸北凭闌干水面陰生日脚殘塵路行多緑袍故風亭立久白鬚寒詩成闇著閒心記山好遥偷病眼看不被馬前提省印何人信道是郎官初除主客郎中知制誥與王十一李七元九三舍人中書同宿話舊感懷閒宵靜話喜還悲聚散窮通不自知巳分雲泥行異路忽驚雞鶴宿同枝紫垣曹署榮華地白髪郎官老醜時莫怪不如君氣味此中來校十年遲西省對花憶忠州東坡新花樹因寄題東樓每看闕下丹青樹不忘天邊錦繡林西掖垣中今日眼南賓樓上去年心花含春意無分别物感人情有淺深最憶東坡紅爛熳野桃山杏水林檎寄題忠州小樓桃花再遊巫峽知何日總是秦人說向誰長憶小樓風月夜紅闌干上一作外兩三枝中書連直寒食不歸因憶元九去嵗清明日南巴古郡樓今年寒食夜西省鳯池頭并上新人直難隨舊伴遊誠知視草貴未免對花愁鬢髪莖莖白光陰寸寸流經春不同宿何異在忠州春憶二林寺舊遊因寄朗滿晦三上人一别東林三度春每春常似憶情親頭陀㑹裏為逋客供奉班中作老臣清淨久辭香火伴塵勞難索幻泡身最慙僧社題牆一作名處十八人名一作中空去聲一人和元少尹新授官官穩身應㤗春風信馬行縱忙無苦事雖病有心情厚禄兒孫飽前驅道路榮花時八十直無暇賀元兄朝囘和元少尹絶句朝客朝囘囘望好盡紆朱紫佩金銀此時獨與君為伴馬上青袍惟兩人重和元少尹鳯閣舍人京亞尹白頭俱未著緋衫南宮起請無消息朝散何時得入銜中書夜直夢忠州閣下燈前夢巴南城裏一作底遊覓花來渡口尋寺到山頭江色分明緑猿聲依舊愁禁鐘驚睡覺惟不上東樓醉後酒後髙歌且放狂門前閒事莫思量猶嫌小户長先醒不得多時住醉鄉待漏入閣書事奉贈元九學士閣老衙排宣政仗門啓紫宸關彩筆停書命花甎趂立班稀星㸃銀礫殘月墮金鐶暗漏猶傳水明河漸下山從東分地色向北仰天顔碧縷爐煙直紅垂斾尾閒綸闈慙並入翰苑忝先攀笑我青袍故饒君茜綬殷詩仙歸洞裏酒病滯人間好去鴛鸞侶沖天便不還立名按李肇國史補宰相相呼為元老或曰堂老兩省相呼為閣老六典云中書舍人在省以年深一人為閣老晩春重到集賢院官曹清切非人境風日鮮明是洞天滿砌荆花鋪紫毯隔牆榆莢撒青錢前時謫去三千里此地辭來十四年虚薄至今慙舊職院一作殿名擡舉號為賢紫薇花絲綸閣下文章靜鐘鼓樓中刻漏長獨坐黄昏誰是伴紫薇花對紫微郎卜居遊宦京都二十春貧中無處可安貧長羨蝸牛猶有舍不如碩䑕解藏身且求容立錐頭地免似漂流木偶人但道吾廬心便足敢辭湫隘與嚻塵題新居寄元八青龍岡北近西邊移入新居便泰然冷巷閉門無客到暖檐移榻向陽眠階墀一作庭寛窄纔容足牆壁髙低粗及肩莫羨昇平元八宅自思買用幾多錢登龍尾道南望憶廬山舊隱龍尾道邊來一望香爐峰下去無因青山舉眼三千里白髪平頭五十人自笑形骸紆組綬將何言語掌絲綸君恩壯健猶難報況被年年老逼身馮閣老處見與嚴郎中酬和詩因戲贈絶句乍來天上宜清浄不用囘頭望故山縱有舊遊君莫憶塵心起即墮人間見于給事暇日上直寄南省諸郎官詩因以戲贈倚作天仙弄地仙誇張一日抵千年黄麻敕勝長生籙白紵詞嫌内景篇雲彩誤居青𤨏地一作雪貌莫居青𤨏地風流合在紫微天東曹漸去西垣近鶴駕無妨更著鞭題新昌所居宅小人煩悶泥深馬鈍頑街東閒處住日午熱時還院窄難栽竹牆髙不見山惟應方寸内此地覓寛閒西省北院新構小亭種竹開窻東通騎省與李常侍隔窻小飲因題四韻結託白鬚伴因依青竹叢題詩新壁上過酒小窻中深院晩無日虚檐涼有風金貂醉看好囘首紫垣東酬元郎中同制加朝散大夫書懷見贈命服雖同黄紙上官班不共紫垣前青衫脫早差三日白髪生遲校九年曩者定交非勢利老來同病是詩篇終身擬作卧雲伴逐月須收燒藥錢五品足為婚嫁主緋袍著了好歸田初著緋戲贈元九晩遇縁才拙先衰被病牽那知垂白日始是著緋年身外名徒爾人間事偶然我朱君紫綬猶未得差肩和韓侍郎苦雨潤氣凝柱礎䋣聲注瓦溝闇留窻不曉涼引簟先秋葉溼蠶應病泥稀燕亦愁仍聞放朝夜誤出到街頭連雨風雨暗蕭蕭雞鳴暮復朝碎聲籠苦竹冷翠落芭蕉水鳥投檐宿泥蛙入户跳仍聞蕃客見明日欲追朝初加朝散大夫又轉上柱國紫微今日煙霄地赤嶺前年泥土身得水魚還動鱗鬛乘軒鶴亦長精神且慙身忝官階貴未敢家嫌活計貧柱國勲成私自問有何功德及生人行簡初授拾遺同早朝入閤因示十二韻夜色尚蒼蒼槐隂夾路長聽鐘出長樂傳鼓到新昌宿雨沙隄潤秋風樺燭香馬驕欺地輭人健得天涼待漏排閶闔停珂擁建章爾隨黄閣老吾次紫微郎並入連稱籍齊趨對折方鬭班花接萼綽立雁分行近職誠為美微才豈合當綸言難下筆諫紙易盈箱老去何僥倖時來不料量惟求致身地相誓答恩光立名按困學紀聞給事中屬門下省開元曰黄門省故曰黄閣左拾遺亦東省之屬故曰爾隨黄閣老近世用為宰輔事則又出漢舊儀丞相聽事門曰黄閣義也立秋日登樂遊園獨行獨語曲江頭囘馬遲遲上樂遊蕭颯涼風與衰鬢誰教計㑹一時秋新秋早起有懷元少尹秋來轉覺此身衰晨起臨階盥潄時漆匣鏡明頭盡白銅缾水冷齒先知光陰縱惜留難住官職雖榮得已遲老去相逢無别計强開笑口展愁睂夜箏紫袖紅絃明月中自彈自感闇低容絃凝指咽聲停處别有深情一萬重妻初授邑號告身𢎞農舊縣授新封鈿軸金泥誥一通我轉官階常自媿君加邑號有何功花牋印了排窠溼錦幖裝來耀手紅倚得身名便慵墮日髙猶睡緑窻中送客南遷我說南中事君應不願聽曾經身困苦不覺語丁寧燒處愁雲夢波時憶洞庭春畬煙勃勃秋瘴露冥冥蚊蚋經冬活魚龍欲雨腥水蟲能射影山鬼解藏形穴掉巴蛇尾林飄鴆鳥翎颶風千里黑䕭徐廉切山菜也草四時青客似驚絃雁舟如委浪萍誰人勸言笑何計慰漂零慎勿琴離膝長須酒滿缾大都從此去宜醉不宜醒暮歸不覺百年半何曾一日閒朝隨燭影出暮趂鼓聲還甕裏非無酒牆頭亦有山歸來長困卧早晩得開顔寄遠欲忘忘未得欲去去無由兩腋不生翅二毛空滿頭坐看新落葉行上最髙樓暝色無邊際茫茫盡眼愁舊房遠壁秋聲蟲絡絲入檐新影月低睂牀帷半故簾旌斷仍是初寒欲夜時錢侍郎使君以題廬山草堂詩見寄因酬之殷勤江郡守悵望掖垣郎慙見新瓊什思歸舊草堂事隨心未得名與道相妨若不休官去人間到老忙寄山僧時年五十眼看過半百早晚埽巖扉白首誰留一作能住青山自不歸百千萬劫障四十九年非㑹擬抽身去當風抖擻衣慈恩寺有感時杓直初逝居敬方病自問有何惆悵事寺門臨入却遲㢠廻李家哭泣元家病柿葉紅時獨自來酬嚴十八郎中見示口厭含香握厭蘭紫微青𤨏舉頭看忽驚鬢後蒼浪髮未得心中本分官夜酌滿容花色暖秋吟切骨玉聲寒承明長短君應入莫憶家江七里灘寄王祕書霜菊花萎日風梧葉碎時怪來秋思苦縁詠祕書詩中書寓直繚繞宮牆圍禁林一作苑半開閶闔曉沉沉天晴更覺南山近月出方知西掖深病對詞頭慙彩筆老看鏡面媿華簪自嫌野物將何用土木形骸麋鹿心自問黑花滿眼絲滿頭早衰因病病因愁宦途氣味巳諳盡五十不休何日休曲江獨行招張十八曲江新嵗後氷與水相和南岸猶殘雪東風未有波偶遊身獨自相憶意如何莫待春深去花時鞍馬多新居早春二首靜巷無來客深居不出門鋪沙葢苔面埽雪擁松根漸暖宜閒步初晴愛小園覓花都未有唯覺樹枝緐地潤東風暖閒行蹋草穿呼童遣移竹留客伴嘗茶霤滴檐氷盡塵浮隟日斜新居未曾到鄰里是誰家新昌新居書事四十韻因寄元郎中張博士冒寵已三遷歸朝始二年囊中貯餘俸郭外買閒田狐兔同三徑蒿萊共一壥新園聊剗穢舊屋且扶顛檐漏移傾瓦梁攲換蠧椽平治繞臺路整頓近階甎巷狹開容駕牆低壘過肩門閭堪駐葢堂室可鋪筵丹鳯樓當後青龍寺在前市街塵不到官樹影相連省吏嫌坊遠豪家笑地偏敢勞賓客訪或望子孫傳不覓他人愛惟將自性便等閒栽樹木隨分占風煙逸致因心得幽期遇境牽松聲疑澗底草色勝河邊虚澗氷銷地晴和日出天苔行滑如簟莎坐軟於緜簾每當山巻帷多待月褰籬東花掩映窻北竹嬋娟迹慕青門隱名慙紫禁仙假歸思晩沐朝去戀春眠拙薄才無取疎慵職不專題牆書命筆酤酒率分錢柏杵舂靈藥銅瓶潄暖泉鑪香穿葢散籠燭隔紗然陳室何曾埽陶琴不要絃屏除俗事盡養活道情全尚有妻孥累猶為組綬纒終須抛爵禄漸擬斷腥羶大抵宗莊叟私心事竺乾浮榮水劃字真諦火生蓮梵部經十二𤣥書字五千是非都付夢語黙不妨禪博士官猶冷中郎病巳痊多同僻處住久結靜中縁緩步㩦卭杖徐吟展蜀箋老宜閒語話悶憶好詩篇蠻榼來方瀉䝉茶到始煎無辭數相見鬢髪各蒼然喜敏中及第偶示所懷自知羣從為儒少豈料詞塲中第頻桂折一枝先許我楊穿三葉盡驚人予進士及第行簡次之敏中又次之轉於文墨須留意貴向煙霄早致身莫學爾兄年五十蹉跎始得掌絲綸立名按唐摭言王起長慶中再主文柄意欲以第一人處敏中恨其與賀拔惎為友惎有文而落魄因密令親知述意俾敏中與惎絶而惎造門敏中悉以實告乃曰一第何門不致奈何輕負至交相與歡醉或語起起曰我比只得敏中今當更取惎矣遂以第一人處惎而敏中居二焉久不見韓侍郎戲題四韻以寄之近來韓閣老疎我我心知户大嫌甜酒才髙笑小詩靜吟乖月夜閒醉曠花時還有愁同處春風滿鬢絲寄白頭陀近見頭陀伴云師老更慵性靈閒似鶴顔狀古於松山裏猶難覓人間豈易逢仍聞移住處太白最髙峰和韓侍郎題楊舍人林池見寄渠水暗流春凍解風吹日炙不成凝鳯池冷暖君諳在二月因何更有氷勤政樓西老栁半朽臨風樹多情立馬人開元一株栁長慶二年春偶題閣下㕔靜愛青苔院深宜白髪翁貌將松共瘦心與竹俱空暖有低檐日春多颺幕風平生閒境界盡在五言中余與故刑部李侍郎早結道友以藥術為事與故京兆元尹晩為詩侣有林泉之期周嵗之間二君長逝李住曲江北元居昇平西追感舊遊因貽同志從哭李來傷道氣自亡元後減詩情金丹同學都無益水竹鄰居竟不成月夜若為遊曲水花時那忍到昇平如年七十身猶在但恐傷心無處行送馮舍人閣老往襄陽紫微閣底送君囘第二㕔簾下不開莫戀漢南風景好峴山花盡早歸來莫走柳條詞送别南陌傷心别東風滿把春莫欺楊栁弱勸酒勝於人酬韓侍郎張博士雨後遊曲江見寄小園新種紅櫻樹閒繞花行便當遊何必更隨鞍馬隊衝泥蹋雨曲江頭元家花今日元家宅櫻桃發幾枝稀稠與顔色一似去年時失却東園主春風可得知代人贈王員外好在王員外平生記得不共賖黄叟酒同上莫愁樓靜接殷勤語狂隨爛熳遊那知今日眼相見冷於秋惜小園花曉來紅萼凋零盡但見空枝四五株前日狂風昨夜雨殘芳更合得存無蕭相公宅遇自遠禪師有感而贈宦途堪笑不勝悲昨日榮華今日衰轉似秋蓬無定處長於春夢幾多時半頭白髪慙蕭相滿面紅塵問逺師應是世間縁未盡欲抛官去尚遲疑草詞畢遇芍藥初開因詠小謝紅藥當階翻詩以為一句未盡其狀偶成十六韻罷草紫泥詔起吟紅藥詩詞頭封送後花口坼開時坐對鈎簾久行觀步履遲兩三叢爛熳十二葉參差背日房微斂當階朶旋攲釵葶抽碧股粉蘂撲黄絲動蕩情無限低斜力不支周廻看未足比諭語難為勾漏丹砂裹僬僥火燄旗彤雲賸根蔕絳幘欠纓緌況有晴風度仍兼宿露垂疑香熏罨畫似淚著燕脂有意留連我無言怨思誰應愁明月落如恨隔年期菡萏泥連萼玫瑰刺繞枝等量無勝者惟眼與心知喜張十八博士除水部員外郎老何殁後吟聲絶雖有郎官不愛詩無復篇章傳道路空留風月在曹司長嗟博士官猶屈亦恐騷人道漸衰今日聞君除水部喜於身得省郎時與沈楊二舍人閣老同食敕賜櫻桃翫物感恩因成十四韻清曉趨丹禁紅櫻降紫宸驅禽養得熟和葉摘來新圓轉盤傾玉鮮明籠透銀内園題兩字西掖賜三臣熒惑晶華赤醍醐氣味真如珠未穿孔似火不燒人杏俗難為對桃頑詎可倫肉嫌盧橘厚皮笑茘枝皴瓊液酸甜足金丸大小勻偷須防曼倩惜莫擲安仁手擘纔離核匙抄半是津甘為舌上露煖作腹中春已懼長尸禄仍驚數食珍最慙恩未報飽餵不才身送嚴大夫赴桂州地壓坤方重官兼憲府雄桂林無瘴氣柏署有清風山水衙門外旌旗艛艓中大夫應絶席詩酒與誰同春夜宿直三月十四夜西垣東北廊碧梧葉重疊紅藥樹低昻月砌漏幽影風簾飄闇香禁中無宿客誰伴紫微郎夏州宿直人少庭宇曠夜涼風露清槐花滿院氣松子落階聲寂寞一作黙挑燈坐沈吟蹋月行年衰自無趣不是厭承明七言十二句贈駕部吳郎中七兄時早夏朝歸閉齋獨處偶題此什四月天氣和且清緑槐陰合沙堤平獨騎善馬銜鐙穩初著單衣支體輕退朝下直少徒侣歸舍閉門無送迎風生竹夜窻間卧月照松時臺上行春酒冷嘗三數盞曉琴閒弄十餘聲幽懷靜境何人别惟有南宮老駕兄玉真張觀主下小女冠阿容綽約小天仙生來十六年姑山半峰雪瑶水一枝蓮晩院花留立春窻月伴眠廻眸雖欲語阿母在傍邊龍花寺主家小尼郭代公愛姬薛氏㓜嘗為尼小名仙人子頭青睂眼細十四女沙彌夜靜雙林怕春深一食飢步慵行道困起晩誦經遲應似仙人子花宮未嫁時訪陳二曉垂朱綬帶晚著白綸巾出去為朝客歸來是野人兩餐聊過日一榻足容身此外皆閒事時時訪老陳晩亭逐涼送客出門後移牀下砌初趂涼行繞竹引睡卧看書老更為官拙慵多向事疎松窻倚藤杖人道似僧居曲江憶李十一李君殁後共誰遊栁岸荷亭兩度秋獨繞曲江行一匝依前還立水邊愁江亭翫春江亭乘曉閱衆芳春妍景麗草樹光日消石桂緑嵐氣風墜木蘭紅露漿水蒲漸展書帶葉山榴半含琴軫房何物春風吹不變愁人依舊鬢蒼蒼聞夜砧誰家思婦秋擣帛月苦風淒砧杵悲八月九月正長夜千聲萬聲無了時應到天明頭盡白一聲添得一莖絲板橋路梁苑城西二十里一渠春水栁千條若為此地今重過十五年前舊板橋曾共玉顔橋上别不知消息到今朝青門栁青青一樹傷心色曾入幾人離恨中為近都門多送别長條折盡減春風棃園弟子白頭垂涙話棃園五十年前雨露恩莫問華清今日事滿山紅葉鏁宮門暮江吟一道殘陽鋪水中半江瑟瑟半江紅可憐九月初三夜露似真珠月似弓思婦睂春風揺蕩自東來折盡櫻桃綻盡梅惟餘思婦愁睂結無限春風吹不開怨詞奪寵心那慣尋思倚殿門不知移舊愛何處作新恩寒閨怨寒月沈沈洞房靜真珠簾外梧桐影秋霜欲下手先知燈底裁縫剪刀冷秋房夜雲露青天月漏光中庭立久却歸房水窻席冷未能卧挑盡殘燈秋夜長采蓮曲菱葉縈波荷颭風荷花深處小船通逢郎欲語低頭笑碧玉搔頭落水中鄰女娉婷十五勝天仙白日姮娥旱地蓮何處閒教鸚鵡語碧紗窻下繡牀前閨婦斜凭繡牀愁不動紅綃帶緩緑鬟低遼陽春盡無消息夜合花前日又西移牡丹栽金錢買得牡丹栽何處辭叢别主來紅芳堪惜還堪恨百處移將百處開立名按容齋隨筆歐陽公牡丹釋名云牡丹初不載文字唐人如沈宋元白之流皆善詠花當時有一花之異者彼必形於篇什而寂寞無傳焉惟劉夢得有詠魚朝恩宅牡丹詩但云一叢千朶而已亦不云其美且異也予按白公集有白牡丹一篇十四韻秦中吟買花一章凡百言樂府牡丹芳一篇三百四十七字絶道花之妖艷又寄微之百韻云唐昌玉蘂㑹崇敬牡丹期又醉歸盩厔詩云數日非關王事𦂳牡丹花盡始歸來元微之有入永壽寺看牡丹八韻和樂天秋題牡丹叢三韻然則元白未嘗無詩唐人未嘗不重此花也按歐公不應為此無稽語必妄人偽託如宋人東坡事實朱文公云閩中鄭昂偽為之者也聽夜箏有感江州去日聽箏夜白髪新生不願聞如今格是頭成雪彈到天明亦任君立名按容齋隨筆樂天詩云如今格是頭成雪彈到天明亦任君微之詩隔是身如夢頻來不為名格與隔二字義同格是猶言巳是也今本以不解格字遂改作況是頭成雪不成語矣古人文集多為妄人改盡可歎琵琶絃清撥刺語錚錚背却殘燈就月明賴是心無惆悵事不然爭奈子絃聲和殷協律琴思秋水蓮冠春草裙依稀風調似文君煩君玉指分明語知是琴心佯不聞後宮詞雨露由來一㸃恩爭能徧布及千門三千宫女臙脂面幾箇春來無淚痕聽彈湘妃怨玉軫朱絃瑟瑟徽吳娃徵調奏湘妃分明曲裏愁雲雨似道蕭蕭郎不歸江南新詞有云暮雨蕭蕭郎不歸閒坐煖擁紅爐火閒搔白髪頭百年慵裏過萬事醉中休有室同摩詰無兒比鄧攸莫論身在日身後亦無憂不睡燄短寒缸盡聲長曉漏遲年衰自無睡不是守三尸白香山詩集巻十九
