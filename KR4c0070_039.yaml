body:
  text: 白香山詩集巻三十九歙縣汪立名編補遺上格律詩凡五十五首勸酒以下出文苑英華昨與美人對尊酒朱顔如花腰似栁今與美人傾一杯秋風颯颯頭上來年光似水向東去兩鬢不禁白日催東鄰起樓髙百尺璇題照日光相射珠翠無非二八人盤筵何啻三千客鄰家儒者方下帷夜誦古書朝忍飢身年三十未入仕仰望東鄰安可期一朝逸翮乗風勢金牓髙張登上第春闈未了冬登科九萬摶風誰與繼不逾十稔居台衡門前車馬紛縱横人人仰望在何處造化筆頭雲雨生東鄰髙樓色未改主人一作父云亡息猶在金玉車馬一不存朱門更有何人待牆垣反鎻長安春樓臺漸漸屬西鄰松篁薄暮亦棲鳥一作鳴棲鳥桃李無情還笑人憶昔東鄰宅初搆雲甍彩棟皆非舊瑇瑁筵前翡翠棲芙蓉池上鴛鴦鬭日往月來凡㡬秋一衰一盛何一作皆悠悠但教帝里笙歌在池上年年醉五侯南陽小將張彥硤口鎮稅人場射虎歌海内昔年狎太平横目穰穰何崢嶸天生天殺豈天怒忍使朝朝餵猛虎關東驛路多丘荒行人最忌稅人場張彥雄特制殘暴見之叱起如叱羊鳴弦霹靂越幽阻往往依林猶旅拒草際旋看委錦茵腰間不更一作見抽白羽老饕巳斃衆雛恐童穉揶揄皆自勇忠良效順勢亦然一劎猜狂敢輕動有文有武方為國不是英雄伏不得試徵張彥作將軍㡬箇將軍願策勲陰雨潤葉濡枝浹四方濃雲來去勢何長曠然寰宇清風滿救旱功髙暑氣涼喜雨西北油然雲勢濃須臾霶沛雨飄空頓疎萬物焦枯意定看秋郊稼穡豐過故洛城故城門前春日斜故城門裏無人家市朝欲認不知處漠漠野田飛草花立名按太平寰宇記故洛城在洛陽縣二十里東西七里南北九里内宫殿臺觀府藏寺舍魏晉之代凡有一萬一千二百一十九門自永嘉之亂劉曜入洛陽元帝渡江官署里閭鞠為茂草至後魏孝文帝幸洛陽巡故宫遂詠黍離之詩羣臣侍從無不感愴誚失婢牓出唐詩紀事宅院小牆卑坊門帖牓遲舊恩慙自薄前事悔難追籠鳥無常主風花不戀枝今宵在何處惟有月明知立名按劉賔客集有和樂天誚失婢牓者詩云把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子即隨劉武威新知正相樂從此脫青衣堯山堂外紀唐人有誚失婢牓詩原情寄嘲云撫養在香閨嬌癡教不依縱然桃葉寵打得栁花飛曉露空調粉春羅枉賜衣内家方妒殺好處任從歸偸鎻出深閨風花何所依想因乗月去難道綽天飛燭暗新垂淚香凝舊舞衣恩情如不斷還向夢中歸揭牓諱因依千聲叫不歸頭盤紅縷髻身著紫羅衣夾帶無金玉窩藏有是非請君看賞格惆悵信音稀江南喜逢蕭九徹因話長安舊遊戲贈五十韻出才調集憶昔嬉遊伴多陪歡宴場寓居同永樂幽㑹共平康師子尋前曲聲兒出内坊花深態奴宅竹錯得憐堂庭晩開紅藥門閑蔭緑楊經過悉同巷居處盡連牆時世髙梳髻風流澹作妝戴花紅石竹帔暈紫㯽榔鬢動懸蟬翼釵垂小鳯行拂胷輕粉絮煖手小香囊選勝移銀燭邀歡舉玉觴爐煙凝麝氣酒色注鵝黄急管停還奏䋣絃慢更張雪飛迴舞袖塵起繞歌梁舊曲翻調笑新聲打義揚名情推阿軌巧語許秋孃風暖春將暮星迴夜未央宴餘添粉黛坐久換衣裳結伴歸深院分頭入洞房綵帷開翡翠羅薦拂鴛鴦留宿爭牽袖貪眠各占牀緑窗籠水影紅壁背燈光索鏡收花鈿邀人解袷襠暗嬌妝靨笑私語口脂香怕聽鐘聲坐羞明映縵藏眉殘蛾翠淺鬟解緑雲長聚散知無定憂歡事不常離筵開夕宴别騎促晨裝去住青門外留連滻水傍車行遥寄語馬駐共相望雲雨分何處山川共異方野行初寂寞店宿乍恓惶別後嫌宵永愁來厭嵗芳㡬看花結子頻見露為霜嵗月何超忽音容坐渺茫往還書斷絶來去夢遊揚自我辭秦地逢君客楚鄉常嗟異岐路忽喜共舟航話舊堪垂淚思鄉數斷腸愁雲接巫峽淚竹近瀟湘月落江湖闊天髙節候涼浦深煙渺渺沙冷月蒼蒼紅葉江楓老青蕪驛路荒野風吹蟋蟀湖水浸菰蔣帝路何由見心期不可忘舊遊千里外往事十年强春晝提壺飲秋林摘橘嘗强歌還自感縱飲不成狂永夜長相憶逢君各共傷殷勤萬里意幷寫贈蕭郎贈薛濤出張為主客圖蛾睂山勢接雲霓欲逐劉郎北路迷若似剡中容易到春風猶隔武陵溪立名按唐詩紀事張為唐末江南人作詩人主客圖序曰若主人門下處其客者以法度一則也以白居易為廣大教化主上入室楊乗入室張祜羊士諤元稹升堂盧仝顧況沈亞之及門費冠卿皇甫松殷堯藩施肩吾周元範況元膺徐凝朱可名陳標董翰卿以孟雲卿為髙古奥逸主上入室韋應物入室李賀杜牧李餘劉猛李涉胡幽正升堂李觀賈馳李宣古曹鄴劉駕孟遲及門陳潤韋楚老以李益為清竒雅正主上入室蘇郁入室劉畋僧清塞盧林于鵠楊洵美張籍楊巨源楊敬之僧無可姚合升堂方干馬戴任蕃賈島厲元項斯薛濤及門僧良乂潘誠于武陵詹雄衛準僧志定喩島朱慶餘以孟郊為清竒僻苦主上入室陳陶周朴及門劉得仁李溟以鮑溶為博解宏拔主上入室李羣玉入室司馬退之張為以武元衡為瓌竒美麗主上入室劉禹錫入室趙嘏長孫佐輔曹唐升堂盧頻陳羽許渾張蕭逺及門張陵章孝標雍陶周祚袁不約圖凡八十四人每人各采其集警句酬令狐留守尚書見贈十韻長慶清風在夔龍燮理餘太和膏雨降周召保釐初嵩少當宫署伊瀍入禁渠曉關開玉兎夕鑰納銀魚舊眷憐移疾新吟念索居離聲雙白雁行色一籃轝罷免無餘俸休閒有敝廬慵於嵇叔夜渴似馬相如酒每䝉酤我詩鄭箋云酤賣也音沽詩嘗許起子洛中歸計定一半為尚書聽蘆管幽咽新蘆管淒涼古竹枝似臨猿峽唱疑在雁門吹調為髙多切聲縁小乍遲麤豪嫌觱篥細妙勝參差雲水巴南客風沙隴上兒屈原收淚夜蘇武斷腸時仰秣胡駒聽驚棲越鳥知何言胡越異聞此一同悲送滕庶子致仕歸婺州春風秋月攜歌酒八十年來翫物華已見曾孫騎竹馬猶聽侍女唱梅花入鄉不杖歸時健出郭乗軺到處誇兒著繡衣身衣錦東陽門户勝滕家送劉郎中赴任蘇州仁風膏雨去隨輪勝境歡遊到逐身水驛路穿兒店月花船棹入女湖春語兒店女墳湖皆勝地也宣城獨詠窗中岫栁惲單題汀上蘋何似姑蘇詩太守吟詩相繼有三人領吳郡日劉嘗贈予詩云蘇州刺史例能詩西掖今來替左司故有三人之戲耳立名按語兒即禦兒吳越分境越國西北置禦兒與吳分為界通典注云在嘉興縣南有地名禦兒也國語曰吾用禦兒臨之今俗作語字又吳改禾興為嘉興隋廢唐武徳四年復置九年省入吳縣貞觀八年復置屬蘇州女墳湖吳地記云吳王葬女取土成湖又郡國志王女墳在郭西云闔廬食蒸魚嘗半而與女女怒自殺闔廬痛之葬於國西閭門外文石為槨金鼎玉杯銀尊珠襦悉以送女又記云以水澆墳因名女墳湖白蘋州在湖州霅溪之東南去州一里洲上有魯公顔真卿芳菲亭内有梁太守栁惲詩云汀洲采白蘋日暮江南春因以為名以上並出太平寰宇記福先寺雪中餞劉蘇州送君何處展離筵大梵王宫大雪天庾嶺梅花落歌管謝家栁絮撲金田亂從紈袖交加舞醉入籃轝取次眠却笑召鄒兼訪戴只持空酒駕空船除夜言懷兼贈張常侍三百六旬今夜盡六十四年明日催不用歎身隨日老亦須知夀逐年來加添雪興憑氊帳消殺春愁付酒杯唯恨詩成君去後紅箋紙巻為一作共誰開送張常侍西歸二年花下為閒伴一旦尊前棄老夫西午橋街行悵望南龍興寺立踟躕洛城久住留情否省騎重歸稱意無出鎮歸朝但相訪此身應不離東都和河南鄭尹新嵗對雪白雪吟詩鈴閣開故情新興兩徘徊昔經勤苦照書巻今助歡娛飄酒杯楚客難酬郢中曲吳公兼占洛陽才銅街金谷春知否又有詩人作尹來吹笙内人出家雨露難忘君念重電泡易滅妾身輕金刀已剃頭然髮佛經云若救頭然玉管休吹腸斷聲新戒珠從衣裏得初心蓮向火中生道場夜半香花冷猶在燈前禮佛名立名按鄭良孺詩話唐女妓入宜春院謂之内人亦曰前頭人謂在上前也骨肉居教坊謂之内人家有請俸其得幸者謂之十家蓋家雖多亦以十家呼之醉中見微之舊巻有感今朝何事一霑襟檢得君詩醉後吟老淚交流風病眼春箋揺動酒杯心銀鉤塵覆年年暗玉樹泥埋日日深聞道墓松髙一丈更無消息到如今夀安歇馬重吟春衫細薄馬蹄輕一日遲遲進一程野棗花含新蜜氣山禽語帶破匏聲垂鞭晩就槐陰歇低倡閒衝栁絮行忽憶家園須速去櫻桃欲熟筍應生贈張處士山人羅襟蕙帶竹皮巾雖到塵中不染塵每見俗人多慘澹惟逢美酒即殷勤浮雲心事誰能㑹老鶴風標不可親世說三生如不謬共疑巢許是前身池畔閒坐兼呈侍中池畔最平處樹陰新合時移牀解衣帶坐任清風吹舉棹鳥先覺垂綸魚未知前頭何所有一巻晉公詩初冬即事憶皇甫十冷竹風成韻荒街葉作堆欲尋聨句巻先飲煖寒杯㡌為迎霜戴爐因試火開時時還有客終不當君來小庭寒夜寄夢得庭小同蝸舍門閒稱雀羅火將燈共盡風與雪相和老睡隨年減衰情向夕多不知同病者爭柰夜長何西還夀安路西歇馬槐陰歇鞍馬栁絮惹衣巾日晩獨歸路春深多思人去家纔百里為客只三旬已念紗窓下應生寳瑟塵雨中訪崔十八肩轝仍挈榼莫怪就君來秋雨經三宿無人勸一杯夢得得新詩池上今宵風月涼閒教少樂理霓裳集仙殿裏新詞到便播笙歌作樂章初見劉二十八郎中有感欲話毗陵君反袂欲言夏口我霑衣誰知臨老相逢日悲歎聲多語笑稀夜題玉泉遇客多言愛山水逢僧盡道厭囂塵玉泉潭畔松間宿要且經年無一人立名按太平寰宇記玉泉山在河南縣東南四十里山内有玉泉寺近見西湖志收此詩誤以為杭州之玉泉也拜表早出贈皇甫賔客一月一回同拜表莫辭侵早過中橋老於君者應無數猶趁西京十五朝贈鄭尹府池東北舊亭臺久別長思醉一回但請主人空埽地自攜杯酒管絃來别楊同州後却寄潘驛橋南醉中别下邽邨北醒時歸春風怪我君知否楡葉楊花撲面飛狐泉店前作野狐泉上栁花飛逐水東流便不歸花水悠悠兩無意因風吹落偶相依贈盧績餘杭縣裏盧明府虚白亭中白舍人今日相逢頭似雪一杯相勸送殘春與裴華州同過敷水戲贈使君五馬且踟躕馬上能聽絶句無每過桑間試留意何妨後代有羅敷閒遊欲笑隨情酒逐身此身雖老未辜春春來㸃檢閒遊數猶自多於年少人招韜光禪師出潛說友咸淳臨安志白屋炊香飯葷膻不入家瀘泉澄葛粉洗手摘藤花青芥除黄葉紅薑帶紫芽命師相伴食齋罷一甌茶立名按咸淳臨安志法安院在靈隱寺西天福二年吳越王建舊額廣嚴唐長慶中有詩僧結菴於院之西自號韜光常與樂天倡和又云白侍郎長慶四年正旦請韜光齋以詩招之即白屋炊香飯一首也韜光不赴齋以詩報白云山僧野性好林泉毎向巖阿倚石眠不解栽松陪玉勒惟能引水種金蓮白雲乍可來青嶂明月難教下碧天城市不能飛錫去恐妨鶯囀翠樓前和栁公權登齊雲樓以下出范成大吳郡志樓外春晴百鳥鳴樓中春酒美人傾路傍花日添衣色雲裏天風散珮聲向此髙吟誰得意偶來閒客獨多情佳時莫起興亡恨游樂今逢四海清毛公壇毛公壇上片雲閒得道何年去不還千載鶴翎歸碧落五湖空鎮萬重山立名按范成大吳郡志毛公壇福地在洞庭山漢劉根得道處根既仙身生緑毛人或見之故名之曰毛公靈巖寺館娃宫畔千年寺水闊雲多客到稀聞說春來更惆悵百花深處一僧歸白雲泉天平山上白雲泉雲自無心水自閒何必奔衝山下去更添波浪向人間立名按方輿勝覽天平山在城西二十里巍然特髙羣峰拱揖郡之鎮也山上有白雲泉為吳中第一水寄韜光禪師出東坡題䟦一山門一作分作兩山門兩寺原從一寺分東澗水流西澗水南山雲起北山雲前臺花發後臺見上界鐘聲下界聞遥想吾師行道處天香桂子落紛紛立名按方輿勝覽䖍州有天竺寺在水東三里東坡天竺寺詩香山居士留遺跡一首序云予年十二先君自䖍州歸謂予言近城山中天竺寺有白樂天親書一山門作兩山門詩筆勢奇逸墨蹟如新今四十年予來訪之則詩已亡有刻石存耳感涕不巳而作是詩又東坡書樂天此詩後云唐韜光禪師自錢唐天竺來住是山樂天守蘇日以此詩寄之慶歴中先君遊此猶見樂天真蹟後四十七年軾南遷過䖍復經此寺徒見石刻而已紹聖元年八月十七日是此詩固寄䖍州也但韜光禪師本住靈隱故詩中有天香桂子語咸淳臨安志靈山之陰北澗之陽即靈隠寺靈山之南南澗之陽即天竺寺二澗流水號錢源泉遶寺峰南北而下至峰前合為一澗有橋號合澗又云靈隠天竺兩山由一門而入又云東坡䖍州天竺寺詩引云云據此則樂天詩非為杭作故舊志不收但坡公贈杭州上天竺辨才二詩一云想見南北山花發前後臺一云南北一山門上下兩天竺又皆采白詩語姑附著於此以俟知者要之白詩自是寄杭州後韜光移錫與詩俱去故遺跡在䖍耳和夢得夏至憶蘇州呈盧賔客以下出泰興季氏手校宋本憶在蘇州日常諳夏至筵糉香筒竹嫩炙脆子鵞鮮水國多臺榭吳風尚管絃每家皆有酒無處不過船交印君相次褰帷我在前此鄉俱老矣東望共依然予與劉盧三人前後相次典蘇州今同分司老於洛下洛下麥秋月江南梅雨天齊雲樓上事已上十三年曲江細草岸西東酒旗揺水風樓臺在花杪鷗鷺下煙中翠幄晴相接芳洲夜暫空何人賞秋景興與此時同嵗夜詠懷兼寄思黯徧數故交親何人得六旬與思黯夢得數還淪沒者少過得六十今年已入手餘事豈關身老自無多興春應不揀人陶窗與𢎞閣風景一時新寒食日過棗糰店寒食棗糰店春低楊栁枝酒香留客住鶯語和人詩困立攀花久慵行上馬遲若為將此意前字與僧期宿張雲舉院不食胡麻飯杯中自得仙隔房一作籬招好客可室致芳筵美一作家醖香醪嫩時新異果鮮夜深唯畏曉坐穩不一作豈思眠棊罷嫌無敵詩成媿在前明朝題壁上誰得衆人傳惜花可憐夭一作妍豔正當時剛被狂風一夜吹今日流鶯來舊處百般言語泥一作啼空枝七夕煙霄微月澹長空銀漢秋期萬古同㡬許歡情與離恨年年幷在此宵中宿誠禪師山房題贈不出孤峰上人間四十秋視身如傳舍閱世任東流法為因縁立心從次第脩中宵問真偈有住是吾憂新池數日自穿鑿引泉來近陂尋渠通咽處繞岸待清時深好求魚養閒堪與鶴期幽聲聽難盡入夜睡常遲南池蕭條微雨絶荒岸抱清源入舫山侵塞分泉道接邨秋聲依樹色月影在蒲根淹泊方難遂他宵關夢魂宿池上泉來從絶壑亭敞在中流竹密無空岸松長可絆舟蟪蛄潭上夜河漢島前秋異夕期新漲攜琴却此遊翻經臺出咸淳臨安志一㑹靈山猶未散重翻貝葉有來由是名精進纔開眼巖石無端亦㸃頭立名按潛說友咸淳臨安志天竺寺翻經臺謝靈運與僧於此將北本湼槃經翻為南本寄題上强山精舍寺出王象之輿地紀勝今湖州石刻尚存慣遊山水住南州行盡天台及虎丘惟有上强精舍寺最堪遊處未曾遊立名按湖州歸安縣上强山精舍寺有唐人題詩刻石白居易李伯藥髙知周錢起郎士元皆有詩王象之輿地紀勝精舍院在歸安縣施渚青州刺史管聚捨宅為院白樂天寄題詩云云句學織繚綾功未多亂投機杼錯抛梭莫教宫錦行家見把此文章殺笑他如今不重文章事莫把文章誇向人立名按盧氏雜話云盧氏子合下第步出都門投逆旅有一人續至吟詩云云盧愕然憶是白居易詩問之曰某世織綾錦以薄藝投本行皆云如今花様與前不同且東歸去白香山詩集巻三十九
