body:
  text: 白香山詩集巻七歙縣汪立名編長慶集七閑適古調詩六十一首舟行江州路上作自此後詩為江州司馬時作帆影日漸髙閑眠猶未起起問鼓枻人已行三十里船頭有行竈炊稻烹紅鯉飽食起婆娑盥漱秋江水平生滄浪意一旦來遊此何况不失家舟中載妻子湓浦早冬潯陽孟冬月草木未全衰秪抵長安陌涼風八月時日西湓水曲獨行吟舊詩蓼花始零落蒲葉稍離披但作城中想何異曲江池江州雪新雪滿前山初晴好天氣日西騎馬出忽有京都意城栁方綴花簷氷纔結穗須臾風日暖處處皆飄墜行吟賞未足坐歎銷何易猶勝嶺南㸔雰雰不到地題潯陽樓常愛陶彭澤文思何髙𤣥又怪韋江州詩情亦清閒今朝登此樓有以知其然大江寒見底匡山青倚天深夜湓浦月平旦鑪峰煙清輝與靈氣日夕供文篇我無二人才孰為來其間因髙偶成句俯仰媿江山訪陶公舊宅幷序予夙慕陶淵明為人往歳渭上閒居常有效陶體詩十六首今遊廬山經柴桑過栗里思其人訪其宅不能黙黙又題此詩云垢塵不汚玉靈鳳一作龜不啄羶嗚呼陶靖節生彼晉宋間心實有所守口終不能言永惟孤竹子拂衣首陽山夷齊各一身窮餓未為一作能難先生有五男與之同飢寒腸中食不充身上衣不完連徴竟不起斯可謂真賢我生君之後相去五百年毎讀五栁傳目想心拳拳昔嘗詠遺風著為十六篇今來訪故宅森一作叅若君在前不慕尊有酒不慕琴無絃慕君遺榮利老死在一作此丘園柴桑古村落栗里舊山川不見籬下菊但餘墟中煙子孫雖無聞族氏猶未遷毎逢姓陶人使我心依然北亭廬宫山下州湓浦沙邉宅宅北倚髙岡迢迢數千尺上有青青竹竹間多白石茅亭居上頭豁達門四闢前楹巻簾箔北牖施床席江風萬里來吹我涼淅淅日髙公府歸巾笏隨手擲脫衣恣搔首坐卧任所適時傾一杯酒曠望湖天夕口詠獨酌謡目送歸飛翮慚無出塵操未免折腰役偶獲此閒居謬似髙人跡汎湓水四月未全熱麥涼江氣一作風秋湖山處處好最愛湓水頭湓水從東來一派入江流可憐似縈帶中有隨風舟命酒一臨泛舍鞍揚棹謳放㢠廻岸旁馬去逐波間鷗煙浪始𣺌𣺌風襟亦悠悠初疑上河漢中若尋瀛洲汀樹緑拂地沙草芳未休青蘿與紫葛枝蔓垂相樛繫䌫步平岸囬頭望江州城雉映水見隠隠如蜃樓日入意未盡將歸復少留到官行半歳今日方一遊此地來何暮可以冩吾憂答故人故人對酒歎歎我在天涯見我昔榮遇念我今蹉跎問我為司馬官意復如何答云且勿歎聽我為君歌我本蓬蓽人鄙賤劇泥沙讀書未百巻信口嘲風花自從筮仕來六命三登科顧慚虚劣姿所得亦已多散員足庇身薄俸可資家省分輙自媿豈為不遇耶煩君對杯酒為我一咨嗟官舍内新鑿小池簾下開小池盈盈水方積中底鋪白沙四隅甃青石勿言不深廣但足一作取幽人適泛灩㣲雨朝泓澄明月夕豈無大江水波浪連天白未如床席間方丈深盈尺清淺可狎弄昏煩聊漱滌最愛曉暝時一片秋天碧宿簡寂觀巖白雲尚屯林紅葉初隕秋光引閒步不知行一作身逺近夕投靈洞宿卧覺塵機泯名利心既忘市朝夢亦盡暫來尚如此况乃終身隠何以療夜飢一匙雲母粉讀謝靈運詩吾聞達士道窮通順冥數通乃朝廷來窮即江湖去謝公才廓落與世不相遇壯志鬱不用須有所洩處洩為山水詩逸韻諧竒趣大必籠天海細不遺草樹豈惟翫景物亦欲攄心素往往即事中未能忘興諭因知康樂作不獨在章句北亭獨宿悄悄壁下床紗籠耿殘燭夜半獨眠覺疑在僧房宿約心黒鬢絲雪侵青袍塵土涴兀兀復騰騰江城一上佐朝就髙齋上熏然負暄卧晚下小池前澹然臨水坐已約終身心長如今日過晚望江城寒角動沙洲夕鳥還獨坐一作在髙亭上西南望逺山早春雪消氷又釋景和風復暄滿庭田地濕薺葉生墻根官舍悄無事日西斜掩門不開莊老巻欲與何人言春寢何處春暄來㣲和生血氣氣熏肌骨暢東窗一昏睡是時正月晦假日無公事爛熳不能休自午將及未緬思少健日甘寢常自恣一從衰疾來枕上無此味睡起晏坐後亭晝眠足起坐春景莫新覺眼猶昏無思心正住淡寂歸一性虚閒遺萬慮了然此時心無物可譬喻本是無有鄉亦名不用處行禪與坐忘同歸無異路道書云無何有之鄉禪經云不用處二者殊名而同歸詠懐盡日松下坐有時池畔行行立與坐卧中懐淡無營不覺流年過亦任白髪生不為世所薄安得遂閒情春遊西林按舊本皆作二林寺寺下馬西一作二林寺翛然進輕策朝為公府吏莫作靈山客二月匡廬北冰雪始消釋陽叢抽茗芽隂竇洩泉􅎃熙熙風土暖靄靄雲嵐積散作萬壑春凝為一氣碧身閒易澹泊官散無牽廹緬彼十八人古今同此適昔永逺宗雷等十八賢同隠於二林寺是年淮冦起處處興兵革智士勞思謀戎臣苦征役獨有不才者山中弄泉石出山吟朝詠遊仙詩暮歌采薇曲卧雲坐白石山中十五宿行隨出洞水囘别緑巖竹早晚重來遊心期瑶草緑歳暮已任時命去亦從歳月除中心一調伏外累盡空虚名宦意已矣林泉計何如擬近東林寺溪邉結一廬聞早鶯日出眠未起屋頭聞早鶯忽如上林曉萬年枝上鳴憶為近臣時秉筆直承明春深視草暇旦暮聞此聲今聞在何處寂寞潯陽城鳥聲信如一分别在人情不作天涯意豈殊禁中聽栽杉勁葉森利劍孤莖挺端標纔髙四五尺勢若干青霄移栽東窗前愛爾寒不凋病夫卧相對日夕閒蕭蕭昨為山中樹今為簷下條雖然遇賞翫無乃近塵囂猶勝澗谷底埋沒隨衆樵不見鬱鬱松委質山上苖過李生蘋小蒲葉短南湖春水生子近湖邉住静境稱髙情我為郡司馬散拙無所營使君知野性衙退任閒行行擕小榼去一作出逢花輙獨傾半酣到子舍下馬叩柴荆何以引我步繞籬竹萬莖何以醒我酒吳音吟一聲須臾進野飯飯稻茹芹英白甌青竹筯儉潔無羶腥欲去復徘徊夕鴉已飛鳴何當重遊此待君湖水平詠意常聞南華經巧勞智憂愁不如無能者飽食但遨遊平生愛慕道今日近此流自來潯陽郡四序忽已周不分物黒白但與時沉浮朝飱夕安寢用是為身謀此外即閒放時尋山水幽春遊慧逺寺秋上庾公樓或吟詩一章或飲茶一甌身心一無繫浩浩如虚舟富貴亦有苦苦在心危憂貧賤亦有樂樂在身自由食笋此州乃竹鄉春笋滿山谷山夫一作翁折盈抱一作把抱一作將來早市鬻物以多為賤雙錢易一束置之炊甑中與飯同時熟紫籜拆故錦素肌擘新玉毎日遂加飱一作只此一蔬食經旬不思肉久為京洛客此味常不足且食勿踟蹰南風吹作竹遊石門澗石門無舊徑披榛訪遺跡時逢山水秋清輝如古昔常聞慧逺輩題詩此巖壁雲覆莓苔封蒼然無處覔蕭踈野生竹崩剝多年石自從東晉後無復人遊歴獨有秋澗聲潺湲空旦夕立名按石門澗有兩處一在江州太平寰宇記石門澗在廬山西懸崖對聳形如闗當雙石之間懸流數丈有一石可坐二十許人一在杭州西湖咸淳臨安志武林山石門澗陸羽二寺記云南有巉巖舊有卧龍石横澗石慈雲法師種松於此然詩中有慧逺題詩語自是江州作西湖志亦収此詩誤也招東鄰小榼二升酒新簟六尺床能來夜話否池畔欲秋涼題元十八溪亭亭在廬山東南五老峰下怪君不喜仕又不遊州里今日到幽居了然知所以宿君石溪亭潺湲聲滿耳飲君螺盃酒醉卧不能起見君五老峰益悔居城市愛君三男兒始歎身無子余方鑪峰下結室為居士山北與山東往來從此始香鑪峰下新置草堂即事詠懐題於石上附樂天草堂記匡廬竒秀甲天下山山北峰曰香鑪峰北寺曰遺愛寺介峰寺間其境勝絶又甲廬山元和十一年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因面峰腋寺作為草堂明年春草堂成三間兩柱二室四牖廣袤豐殺一稱心力洞北户來隂風防徂暑也敞南甍納陽日虞祁寒也木斵而已不加丹牆圬而已不加白墄階用石羃窗用紙竹簾紵幃率稱是焉堂中設木榻四素屏二漆琴一張儒道佛書各三兩巻樂天既來為主仰觀山俯聽泉傍睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適内和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰是居也前有平地輪廣十文中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮白魚又南抵石澗夾澗有古松老杉大僅十人圍髙不知幾百尺修柯戞雲低枝拂潭如幢竪如蓋張如龍蛇走松下多灌叢蘿蔦葉蔓駢織承翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤塊雜木異草蓋覆其上緑隂䝉䝉朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可以永日堂東有瀑布水懸三尺㵼階隅落石渠曉如練色夜中如環珮琴筑聲堂西倚北崖右趾以剖竹架空引崖上泉脈分綫懸自簷注砌纍纍如貫珠霏㣲如雨露滴瀝飄灑隨風逺去其四傍耳目杖屨可及者春有錦繡谷花夏有石門澗雲秋有虎谿月冬有鑪峰雪隂晴顯晦昏旦含吐千變萬狀不可殫紀覼縷而言故云甲廬山者噫凡人豐一屋華一簀而起居其間尚不免有驕穏之態今我為是物主物至致知各以類至又安得不外適内和體寧心恬哉昔永逺宗雷軰十八人同入此山老死不反去我千載我知其心以是哉矧予自思從㓜迨老若白屋若朱門凡所止雖一日二日輙覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦蹇剥來佐江郡郡守以優容而撫我廬山以靈勝待我是天與我時地與我所卒獲所好又何以求焉尚以冗員所覊餘累未盡或往或來未遑寧處待予異時弟妹婚嫁畢司馬歳秩滿出處行止得以自遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虗范陽張允中南陽張深之東西二林寺長老湊朗滿晦堅等凡二十有二人具齋施茶果以落之因為草堂記香鑪峰北面遺愛寺西偏白石何鑿鑿清流亦潺潺有松數十株有竹千餘竿松張翠繖蓋竹倚青琅玕其下無人居惜哉多歳年有時聚猿鳥終日空風煙時有沉冥子姓白字樂天平生無所好見此心依然如獲終老地忽乎不知還架巖結茅宇劚壑開茶園何以洗我耳屋頭飛落泉何以淨我眼砌下生白蓮左手擕一壺右手挈五絃傲然意自足箕踞於其間興酣仰天歌歌中聊寄言言我本野夫誤為世網牽時來昔捧日老去今歸山倦鳥得茂樹涸魚反清源舍此欲焉往人間多險艱立名按東坡志林樂天作廬山草堂蓋亦燒丹也欲成而爐敗來日忠州刺史除書到乃知世間出世間事不兩立也此説要有所考然觀其題草堂云紙閣蘆簾著孟光又云兼將夀天任乾坤則坡公之語亦未必盡然也草堂前開一池養魚種荷日有幽趣淙淙三峽水浩浩萬頃陂未如新塘上㣲風動漣漪小萍加汎汎初蒲正離離紅鯉二三寸白蓮八九枝遶水欲成徑護隄方插籬已被山中客呼作白家池白雲期黄石巖下作三十氣太壯胷中多是非六十身太老四體不支持四十至五十正是退閒時年長識命分心慵少營為見酒興猶在登山力未衰吾年幸當此且與白雲期登香爐峰頂迢迢香爐峰心存耳目想終年牽物役今日方一往攀蘿蹋危石手足勞俯仰同遊三四人兩人不敢上上到峰之頂目眩心一作神怳怳髙低有萬尋闊狹無數丈不窮視聽界焉識宇宙廣江水細如繩湓城小於掌紛吾何屑屑未能脫塵鞅歸去思自嗟低頭入蟻壤答崔侍郎錢舍人書問因繼以詩旦暮兩蔬食日中一閒眠便是了一日如此已三年心不擇時適足不揀地安窮通與逺近一貫無兩端常見今之人其心或不然在勞則念息處静已思喧如是用身心無乃自傷殘坐輸憂惱使一作便安得形神全吾有二道友藹藹崔與錢同飛青雲路獨墮黄泥泉歳暮物萬變故情何不遷應為平生心與我同一源帝鄉逺於日美人髙在天誰謂萬里别常若在目前泥泉樂者魚雲路遊者鸞勿言雲泥異同在逍遥間因君問心地書後偶成篇慎勿説向人人多笑此言烹葵昨卧不夕食今起乃朝飢貧厨何所有炊稻烹秋葵紅粒香復軟緑英滑且肥飢來止於飽飽後復何思一作飽復何所思憶昔榮遇日迨今窮退時今亦不凍餒昔亦無餘資口既不减食身又不减衣撫心私自問何者是榮衰勿學常人意其間分是非小池二首晝倦前齋熱晚愛小池清映林餘景沒近水㣲涼生坐把蒲葵扇閒吟三兩聲有意不在大湛湛方丈餘荷側㵼清露萍開見遊魚毎一臨此坐憶歸青溪居掩闗我心忘世久世亦不我干遂成一無事因得長掩闗掩闗來幾時髣髴二三年著書已盈帙生子欲能言始悟身易老復悲世多艱廻顧趨時者役役塵壤間歳莫竟何得不如且安閑弄龜羅有姪始六歳字之為阿龜有女生三年其名曰羅兒一始學笑語一能誦歌詩朝戲抱我足夜眠枕我衣汝生何其晚我年行已衰物情小可念人意老多慈酒美竟須壊月圓終有虧亦如恩愛縁乃是憂惱資舉世同此累吾安能去之截樹種樹當前軒樹髙柯葉繁惜哉逺山色隠此䝉籠間一朝持斧斤手自截其端萬葉落頭上千峰來面前忽似决雲霧豁達覩青天又如所念人久别一欵顔始有清風至稍見飛鳥還開懐東南望目逺心遼然人各有偏好物莫能兩全豈不愛柔條不如見青山望江樓上作江畔百尺樓樓前千里道憑髙望平逺亦足舒懐抱驛路使憧憧闗防兵草草及兹多事日猶覺閒人好我年過不惑休退誠非早從此拂塵衣歸山未為老題座隅手不任執殳肩不能荷鋤量力揆所用曽不敵一夫幸因筆硯功得升仕進途歴官凡五六禄俸及妻孥左右有兼僕出入有單車自奉雖不厚亦不至飢劬若有人及此傍觀為何如雖賢亦為幸况我鄙且愚伯夷古賢人魯山亦其徒時哉無奈何俱化為餓殍元魯山山居阻水食絶而終念彼益自媿不敢忘斯須平生榮利心破滅無遺餘猶恐塵妄起題此於座隅昔與㣲之在朝日同蓄休退之心迨今十年淪落老大追尋前約且結後期往子為御史伊余忝拾遺皆逢盛明代俱登清近司余繫玉為珮子曵繡為衣從容香煙下同侍白玉墀朝見寵者辱暮見安者危紛紛無退者相顧令人悲宦情君早厭世事我深知常於顯榮日已約林泉期况今各流落身病齒髪衰不作卧雲計擕手欲何之待君女嫁後及我官滿時稍無骨月累粗有漁樵資歳晚青山路白首期同歸垂釣臨水一長嘯忽思十年初三登甲乙第一入承明廬浮生多變化外事有盈虚今來伴江叟沙頭坐釣魚晚燕百鳥乳雛畢秋燕獨蹉跎去社日已近銜泥意如何不悟時節晚徒施工用多人間事亦爾不獨燕營窠贖雞清晨臨江望水禽正諠繁鳬雁與鷗鷺游颺戲朝暾適有鬻雞者挈之來逺村飛鳴彼何樂窘束此何寃喔喔十四雛罩縛同一樊足傷金距蹜頭搶花冠翻經宿廢飲啄日髙詣屠門遲廻未死間飢渇欲相吞常慕古人道仁信及魚豚見兹生惻隠贖放雙林園開籠解索時雞雞聽我言與爾鏹三百小惠何足論莫學䘖環雀﨑嶇謾報恩秋日懐杓直時杓直出牧澧州晚來天色好獨出江邉步憶與李舍人曲江相近住常云遇清景必約同幽趣若不訪我來還須覔君去開眉笑相見把手期何處西寺老胡僧南園亂松樹攜持小酒榼吟詠新詩句同出復同歸從朝直至暮風雨忽消散江山眇囬互潯陽與涔陽相望空雲霧心期自乖曠時景還如故今日郡齋中秋光誰共度食後食罷一覺睡起來兩甌茶舉頭㸔日影已復西南斜樂人惜日促憂人厭年賖無憂無樂者長短任生涯齊物二首青松髙百尺一作丈緑蕙低數寸同此大塊間長短各有分長者不可退短者不可進若用此理推窮通兩無悶椿夀八千春槿花不經宿中間復何有冉冉孤生竹竹身三年老竹色四時緑雖謝椿有餘猶勝槿不足山下宿獨到山下宿静向月中行何處水邉碓夜舂雲母聲題舊冩真圖我昔三十六冩貌在丹青我今四十六衰顇卧江城豈止十年老曽與衆苦并一照舊圖畫無復昔儀形形影黙相顧如弟對老兄况使他人見能不昧平生羲和鞭日走不為我少停形骸屬日月老去何足驚所恨凌煙閣不得畫功名閒居肺病不飲酒眼昏不讀書端然無所作身意閒有餘雞棲籬落晚雪映林木疎幽獨已云極何必山中居對酒示行簡今旦一尊酒歡暢何怡怡此樂從中來他人安得知兄弟唯二人逺别恒苦悲今春自巴峽萬里平安歸復有雙㓜妹筓年未結褵昨日嫁娶畢良人皆可依憂念兩消釋如刀斷覊縻身輕心無繫忽欲凌空飛人生苟有累食肉常如飢我心既無苦飲水亦可肥行簡勸爾酒停盃聽我辭不歎鄉國逺不嫌官禄㣲但願我與爾終老不相離詠懐冉牛與顔淵卞和與馬遷或罹天夭一作六極或被人刑殘顧我信為幸百骸且完全五十不為夭吾今欠數年知分心自足委順身常安故雖窮退日而無戚戚顔昔有榮先生從事於其間今我不量力舉心欲攀援窮通不由己歡戚不由天命即無奈何心可使泰然且務由已者省躬諒非難勿問由天者天髙難與言夜琴蜀桐木性實楚絲音韻清調慢彈且緩夜深十數聲入耳淡無味愜心潛有情自弄還自罷亦不要人聽山中獨吟人各有一癖我癖在章句萬縁皆已消此病獨未去毎逢美風景或對好親故髙聲詠一篇怳若與神遇自為江上客半在山中住有時新詩成獨上東巖路身倚白石崖手攀青桂樹狂吟驚林壑猿鳥皆窺覷恐為世所嗤故就無人處達理二首何物壯不老何時窮不通如彼音與律宛轉還為宫我命獨何薄多悴而少豐當壯已先衰暫泰還長窮我無奈命何委順以待終命無奈我何方寸如虚空瞢然與化俱混然與俗同誰能坐自苦齟齬於其中舒姑化為泉牛哀病作虎或栁生肘間或男變為女鳥獸及水木本不與民伍胡然生變遷不待死歸土百骸是已物尚不能為主况彼時命間倚伏何足數時來不可遏命去焉能取唯當養浩然吾聞達人語湖亭晚望殘水湖上秋泬寥湖邉晚蕭瑟登亭望湖水水縮湖底出清渟得早霜明滅浮殘日流注隨地勢窪㘭無定質泓澄白龍卧宛轉青蛇屈破鏡折劍頭光芒又非一久為山水客見盡幽竒物及來湖亭望此狀難談悉乃知天地間勝事殊未畢郭虚舟相訪朝暖就南軒暮寒歸後屋晚酌一作酒一兩盃夜棋三數局寒灰埋暗火曉熖凝殘燭不嫌貧冷人時來同一宿白香山詩集巻七
