body:
  text: 白香山詩集卷二十五歙縣汪立名編後集五律詩凡八十四首小嵗日對酒吟錢湖州所寄詩獨酌無多興間吟有所思一杯新嵗酒兩句故人詩楊栁初黃日髭鬚半白時蹉跎春氣味彼此老心知錢唐湖春行孤山寺北賈亭西水面初平雲腳低幾處早鶯爭暖樹誰家新燕啄春泥亂花漸欲迷人眼淺草才能沒馬蹄最愛湖東行不足緑楊陰裏白沙堤題靈隱寺紅辛夷花戲酬光上人紫粉筆含尖火焰紅燕脂染小蓮花芳情香思知多少惱得山僧悔出家重向火火銷灰復死疏棄已經旬豈是人情薄其如天氣春風寒忽再起手冷重相親却就紅爐坐心如逢故人候仙亭同諸客醉作謝安山下空攜妓栁惲洲邊只賦詩爭一作不及湖亭今日會一作醉嘲花咏水贈蛾眉城上城上鼕鼕鼓朝衙復晚衙為君慵不出落盡繞城花早行林下披衣未冠櫛晨起入前林宿露殘花氣朝光新葉陰傍松人迹少隔竹鳥聲深間倚小橋立傾頭時一吟送李校書趁寒食歸義興山居大見騰騰詩酒客不憂生計似君稀到舍將何作寒食滿船惟載樹陰歸題孤山寺山石榴花示諸僧衆山榴花似結紅巾容艷新妍占斷春色相故開行道地香塵擬觸坐禪人瞿曇弟子君知否恐是天魔女化身獨行暗誦黃庭經在口間攜青竹杖隨身晚花新筍堪為伴獨入林行不要人二月五日花下作二月五日花如雪五十二人頭似霜聞有酒時須笑樂不關身事莫思量羲和趁日沈西海鬼伯驅人葬北邙只有且來花下醉從人笑道老顛狂戲題木蘭花紫房日照燕脂拆素豔風吹膩粉開怪得獨饒脂粉態木蘭曽作女郎來清明日觀妓舞聽客詩看舞顔如玉聽詩韻似金綺羅從許笑絃管不妨吟可惜春風老無嫌酒盞深辭花送寒食并在此時心西湖晚歸回望孤山寺贈諸客栁湖松島蓮花寺晚動歸橈出道場盧橘子低山雨重栟一作棕櫚葉戰水風涼煙波淡蕩搖空碧樓殿參差倚夕陽到岸請君回首望蓬萊宫在海中央湖中自照重重照影看容鬢不見朱顔見白絲失却少年無覔處泥他湖水欲何為贈蘇鍊師兩鬢蒼然心浩然松窗深處藥爐前攜將道士通宵語忘却花時盡日眠明鏡懶開長在匣素琴欲弄半無絃猶嫌莊子多詞句只讀逍遙六七篇杭州春望望海樓明照曙霞城東樓名望海樓護江隄白踏晴沙濤聲夜入伍員廟栁色春藏蘇小家紅袖織綾誇柿蒂杭州出柿蒂花者尤佳也青旗酤酒趁梨花其俗釀酒趁梨花時熟號為梨花春誰開湖寺西南路草緑裙腰一道斜孤山寺路在湖洲中草緑時望如裙腰立名按能改齋漫録云劉次莊樂府解題曰錢塘蘇小歌蘇小非唐人世見樂天夢得詩多稱詠遂謂之同時耳按郭茂倩所編引廣題曰蘇小小錢塘名娼也蓋南齊時人西陵在錢塘江之西故古詞云何處結同心西陵松柏下飲散夜歸贈諸客鞍馬夜紛紛香街起暗塵回鞭招飲妓分火送歸人風月應堪惜杯觴莫厭頻明朝三月盡忍不送殘春湖亭晚歸盡日湖亭卧心間事亦稀起因殘醉醒坐待晚涼歸松雨飄藤帽江風透葛衣栁堤行不厭沙軟絮飛飛東樓南望八韻不厭東南望江樓對海門風濤生有信天水合無痕鷁帶雲帆動鷗和雪浪翻魚鹽聚為市煙火起成村日腳金波碎峯頭鈿點繁送秋千里雁報暝一聲猿已豁煩襟悶仍開病眼昏郡中登眺處無勝此東軒醉中酬殷協律泗水城邉一分散浙江樓上重逰陪揮鞭二十年前别命駕三千里外來醉袖放狂相向舞愁眉和笑一時開留君夜住非無分且盡青娥紅燭臺孤山寺遇雨拂波雲色重灑葉雨聲繁水鷺一作鳥雙飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留船在寺門樟亭雙櫻樹南館西軒兩樹櫻春條長足夏陰成素華朱實今雖盡碧葉風來别有情湖上夜飲郭外迎人月湖邊醒酒風誰留使君飲紅燭在舟中贈沙鷗老逼教垂白官科遣著緋形骸雖有纍方寸却無機遇酒多先醉逢山愛晚歸沙鷗不知我猶避隼旟飛餘杭形勝餘杭形勝四方無州傍青山縣枕湖繞郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇州西靈隱山上有夢謝亭即是杜明浦夢謝靈運之所因名客兒也蘇小小本錢塘妓人也獨有使君年太老風光不稱白髭鬚江樓夕望招客海天東望夕茫茫山勢川形濶復長燈火萬家城四畔星河一道水中央風吹古木晴天雨月照平沙夏夜霜能就江樓銷暑否比君茅舍校清涼新秋病起一葉落梧桐年光半又空秋多上階日涼足入懷風病瘦形如鶴愁焦鬢似蓬損心詩思裏伐性酒狂中華蓋何曽惜金丹不致功猶須自慙愧得作白頭翁木芙蓉花下招客飲晚涼思飲兩三杯召得江頭酒客來莫怕秋無伴醉物水蓮花盡木蓮開悲歌白頭新洗鏡新磨老逼身來不奈何耳裏頻聞故人死眼前惟覺少年多塞鴻遇暖猶回翅江水因潮亦反波獨有衰顔留不得醉來無計但悲歌江樓晚眺景物鮮奇吟玩成篇寄水部張籍員外淡煙疏雨間斜陽江色鮮明海氣涼蜃散雲收破樓閣虹殘水照斷橋梁風翻白浪花千片雁點青天字一行好著丹青圖寫一作畫取題詩寄與水曹郎夜招周協律兼答所贈滿眼雖多客開眉復向誰少年非我伴秋夜與君期落魄俱耽酒殷勤共愛詩相憐别有意彼此老無兒重酬周判官秋愛冷吟春愛醉詩家眷屬酒家仙若教早被浮名繫可得間逰三十年飲後夜醒黃昏飲散歸來卧夜半人扶強起行枕上酒容和睡醒樓前海月伴潮生將歸梁燕還重宿欲滅窗燈却復明直至曉來猶妄想耳中如有管絃聲代賣薪女贈諸妓亂蓬為鬢布為巾一作裙曉踏寒山自負薪一種錢唐江畔女著紅騎馬是何人立名按堯山堂外紀云唐時杭妓承應燕會皆得騎馬以從奉和李大夫題新詩二首各六韻因巖亭箕潁人窮獨蓬壺路阻難何如兼吏隱復得事躋攀巖樹羅階下江雲貯棟間似移天目石疑入武丘山清景徒堪賞皇恩肯放間遙知興未足即被詔徴還忘筌亭翠巘公門對朱軒野徑連只開新户牖不改舊風煙虛室間生白髙情淡入玄酒容同座勸詩借屬城傳自笑滄江畔遙思絳帳前亭臺隨處有爭敢比忘筌余以長慶二年冬十月到杭州明年秋九月始與范陽盧賈汝南周元範蘭陵蕭悅清河崔求東萊劉方輿同逰恩德寺泉洞竹石籍甚久矣及兹目擊果愜心期因自嗟云到郡周嵗方來入寺半日復去俯視朱綬仰睇白雲有愧於心遂留絶句雲水埋藏恩德洞一作寺簪裾束縛使君身暫來不宿歸州去應被山呼作俗人早冬十月江南天氣好可憐冬景似春華霜輕未殺萋萋草日暖初乾漠漠沙老柘葉黃如嫩樹寒櫻枝白是狂花此時却羡間人醉五馬無由入酒家嵗假內命酒贈周判官蕭協律共知欲老流年急且喜新正假日頻鬬健此時相勸醉偷間何處共尋春腳隨周叟行猶疾頭比蕭翁白未勻嵗酒先拈辭不得被君推作少年人與諸客携酒尋去年梅花有感馬上同携今日杯湖邊共覔去春梅年年只是人空老處處何曽花不開詩思又牽吟詠發酒酣間喚管絃來尊前百事皆依舊點檢惟無薛秀才去年與薛景文同賞今年長逝醉送李協律赴湖南辟命因寄沈八中丞富陽山底樟亭畔立馬停舟飛酒盂曽共中丞情繾綣暫留協律語踟蹰紫微星北承恩去青草湖南稱意無不羡君官羡君幕幕中收得阮元瑜內道場永歡上人就郡見訪善説維摩經臨别請詩因以此贈五夏登壇內殿師水為心地玉為儀正傳金粟如來偈何用錢唐太守詩苦海出來應有路靈山别後可無期他生莫忘今朝會虛白亭中法樂時見李蘇州示男阿武詩自感成詠遙羡青雲裏祥鸞正引雛自憐滄海外老蚌不生珠正月十五日夜月嵗熟人心樂朝逰復夜逰春風來海上明月在江頭燈火家家市笙歌處處樓無妨思帝里不合厭杭州題州北路傍老栁樹皮枯緣受風霜久條短為經攀折頻但見半衰當此路不知初種是何人雪花零碎逐年減栁葉稀疏隨分新莫道老株芳意少逢春猶勝不逢春題清頭陀頭陀獨宿寺西峯百尺禪菴半夜鐘煙月蒼蒼風瑟瑟更無雜樹對山松自歎二首形羸自覺朝餐減睡少偏知夜漏長實事漸消虛事在銀魚金帶繞腰光二毛曉落梳頭懶兩眼春昏點藥頻惟有間行猶得在心情未到不如人湖上醉中代諸妓寄嚴郎中笙歌杯酒正歡娛忽憶仙郎望帝都借問連宵直南省何如盡日醉西湖蛾眉别久心知否雞舌含多口厭無還有些些惆悵事春來山路見蘼蕪立名按堯山堂外紀云唐宋間郡守新到營妓皆出境而迎既去猶得以鱗鴻往返靦不為異自詠悶發每吟詩引興興來兼酌酒開顔欲逢假日先招客正對衙時亦望山勾檢簿書多鹵莽隄防官吏少機關誰能頭白勞心力人道無才也是間晚興草淺馬翩翩新晴薄暮天栁條春拂面衫袖醉垂鞭立語花隄上行吟水寺前等間消一日不覺過三年早興晨光出照屋梁明初打開門鼓一聲犬上階眠知地濕鳥臨窗語報天晴半銷宿酒頭仍重新脫冬衣體乍輕睡覺心空思想盡近來鄉夢不多成竹樓宿小書樓下千竿竹深火爐前一盞燈此處與誰相伴宿燒丹道士坐禪僧湖上招客送春泛舟欲送殘春招酒伴客中誰最有風情兩瓶箬下新求得一曲霓裳初教成時崔湖州寄新箬下酒來樂妓按霓裳羽衣曲初畢排比管絃行翠袖指麾船舫點紅旌慢牽好向湖心去恰似菱花鏡上行戲醉客莫言魯國書生懦莫把杭州刺史欺醉客請君開眼望緑楊風下有紅旗紫陽花招賢寺有山花一樹無人知名色紫氣香芳麗可愛頗類仙物因以紫陽花名之何年植向仙壇上早晚移栽到梵家雖在人間人不識與君名作紫陽花祭社宵興燈前偶作城頭傳鼓角燈下整衣冠夜鏡藏鬚白秋泉漱齒寒欲將間送老須著病辭官更待年終後支持歸計看間卧盡日前軒卧神間境亦空有山當枕上無事到心中簾卷侵牀日屏遮入座風望春春未到應在海門東新春江次浦乾潮未應堤濕凍初消粉片妝梅朵金絲刷栁條鴨頭新緑水雁齒小紅橋莫怪珂聲碎春來五馬驕春題湖上湖上春來似畫圖亂峯圍繞水平鋪松排山面千重翠月點波心一顆珠碧毯線頭抽早稻青羅裙帶展新蒲未能拋得杭州去一半勾留是此湖失鶴失為庭前雪飛因海上風九霄應得侶三夜不歸籠聲斷碧雲外影沈明月中郡齋從此後誰伴白頭翁自歎宴逰寢食漸無味杯酒管絃徒繞身賓客歡娛僮僕飽始知官職為他人同諸客攜酒早看櫻桃花曉報櫻桃發春攜酒客過緑餳粘盞杓紅雪壓枝柯天色晴明少人生事故多停杯替花語不醉擬如何栁絮三月盡時頭白日與春老別更依依憑鶯為向楊花道絆惹春風莫放歸早飲湖州酒寄崔使君一榼扶頭酒澄泓瀉玉壺十分蘸甲酌瀲灔滿銀盂捧出光華動嘗看氣味殊手中稀琥珀舌上冷醍醐瓶裏有時盡江邊無處酤不知崔太守更有寄來無病中書事三載卧山城間知節物情鶯多過春語蟬不待秋鳴氣嗽因寒發風痰欲雨生病身無所用唯解卜隂晴與微之唱和來去常以竹筒貯詩陳協律美而成篇因以此答㨂得琅玕截短筒緘題章句寫心胸隨風每喜飛如鳥渡水常憂化作龍粉節堅如太守信霜筠冷稱大夫容煩君贊詠心知愧魚目驪珠同一封醉戲諸妓席上爭飛使君酒歌中多唱舍人詩不知明日休官後逐我東山去是誰立名按全唐詩話云樂天刺杭攜數妓還洛陽後却還錢唐夢得調之云其那錢唐蘇小小憶君淚黯石榴裙公此詩巳露其意矣北院北院人稀到東窗地最偏竹煙行竈上石壁卧房前性拙身多暇心慵事少緣還如病居士惟置一牀眠酬周協律五十錢唐守應為送老官濫蒙辭客愛猶作近臣看鑿落愁須飲琵琶悶遣彈白頭雖強醉不似少年歡題石山人騰騰兀兀在人間貴賤賢愚盡往還羶膩筵中唯飲酒歌鐘會處獨思山存神不許三尸住混俗無妨兩鬢斑除却餘杭白太守何人更解愛君間詩解新篇日日成不是愛聲名舊句時時改無妨悅性情但令長守郡不覔却歸城祗擬江湖上吟哦過一生立名按平園周必大曰香山詩語平易疑若信手而成者間觀遺稿則竄定實多觀此詩信然乃有偽造不經語以隂刺公者如墨客揮犀云樂天每作詩令一老嫗解之嫗曰解則録之不解則不復集故唐末之弊至於俚其意不過欲竭力形容一俗字耳且毋論其他試舉公晚年長律其根柢之博立格鍊句之妙果皆老嫗所能解否邪其説之邪謬真可付一噱也潮早潮才落晚潮來一月周流六十回不獨光隂朝復暮杭州老去被潮催聞歌妓唱嚴郎中詩因以絶句寄之嚴前為郡守已留舊政布中和又付新詞與艷歌但是人家有遺愛就中蘇小感恩多柘枝妓平鋪一合錦筵開連擊三聲畫鼓催紅蠟燭移桃葉起紫羅衫動柘枝來帶垂鈿胯花腰重帽轉金鈴雪面回看即曲終留不住雲飄雨送向陽臺急樂世辭一作急世樂正抽碧線繡紅羅忽聽黃鶯斂翠蛾秋思冬愁春悵望大都不稱意時多天竺寺送堅上人歸廬山錫杖登髙寺香爐憶舊峯偶來舟不繫忽去鳥無蹤豈要留離偈寧勞動别容與師俱是夢夢裏暫相逢留題郡齋吟山歌水嘲風月便是三年官滿時春為醉眠多閉閣秋因晴望暫褰帷更無一事移風俗惟化州民解詠詩别州民耆老遮歸路壺漿滿别筵甘棠無一樹那得淚潸然稅重多貧户農飢足旱田唯留一湖水與汝救凶年今春增築錢唐湖堤貯水以防天旱故云附錢唐湖石記錢唐湖事刺史要知者四條具列如左錢唐湖一名上湖周回三十里北有石函南有筧凡放水溉田每減一寸可溉十五餘頃一復時可溉五十餘頃先須别選公勤軍吏二人立於田次與本所由田戶據頃畝定日時量尺寸節限而放之若嵗旱百姓請水須令經州陳狀刺史自便押帖所由即日與水若待狀入司符下縣縣帖鄉鄉差所由動經旬日雖得水而旱田苖無所及也大抵此州春多雨秋多旱若隄防如法蓄泄及時即瀕湖千餘頃田無凶年矣自錢唐至鹽官界應溉夾官河田湖放湖入河從河入田準鹽鐵使舊法又須先量湖水淺深待溉田畢却還本水尺寸往往旱甚即湖水不充今年修築湖隄髙加數尺水亦隨加即不啻足矣脫或不足即更決臨平湖添注官河又有餘矣雖非澆田時若官河乾淺但放湖水添注可以立通舟船俗云決放湖水不利錢唐縣官縣官多假他詞以惑刺史云魚龍無所託或云菱茭失其利且魚龍與生民之命孰急菱茭與稻梁之利孰多斷可知矣又云放湖即郭內六井無水亦妄也且湖底髙井管低湖中又有泉數十眼湖耗則泉涌雖盡竭湖水而泉用有餘况前後放湖終不至竭而云井無水謬矣其郭中六井李泌相公典郡日所作甚利於人與湖相通中有隂竇往往堙塞亦宜數察而通理之則雖大旱而井水常足湖中有無稅田約十數項湖淺則田出湖深則田沒田戶多與所由計會盜泄湖水以利私田其石函南筧并諸小筧闥非澆田時並須封閉築塞數令巡檢小有漏泄罪責所由即無盜泄之弊矣又若霖雨三日巳上即往往隄決須所由巡守預為之防其筧之南舊有缺岸若水暴漲即於缺岸泄之又不減兼於石函南筧泄之防隄潰也大約水去石函口一尺為限過此須泄之豫在郡三年仍嵗逢旱湖之利害盡究其由恐來者要知故書於石欲讀者易曉故不文其言長慶四年三月十日杭州刺史白居易記留題天竺靈隱兩寺在郡六百日入山十二回宿因月桂落醉為海榴開天竺嘗有月中桂子落靈隱多海石榴花也黃紙除書到青宫詔命催僧徒多悵望賓從亦徘徊寺暗煙埋竹林香雨落梅别橋憐白石辭洞戀青苔石橋在天竺明洞在靈隱漸出松間路猶飛馬上杯誰教冷泉水送我下山來附冷泉亭記東南山水餘杭郡為最就郡言靈隱寺為尤由寺觀冷泉亭為甲亭在山下水中央寺西南隅髙不倍尋廣不纍丈而撮草奇得要地搜勝概物無遁形春之日吾愛其薰薰木欣欣可以𨗳和納粹暢人血氣夏之夜吾愛其泉渟渟風泠泠可以蠲煩析酲起人心情山樹為蓋巖石為屏雲從棟出水與階平坐而玩之者可濯足於牀下卧而狎之者可垂釣於枕上矧又潺湲潔徹粹冷柔滑若俗士若道人眼耳之塵心舌之垢不待盥滌見輒除去潛利隂益可勝言哉斯所以最餘杭而甲靈隱也杭自郡城抵四封叢山復湖易為形勝先是領郡者有相里君造虛白亭有韓僕射臯作候仙亭有裴庶子棠棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇最後作此亭於是五亭相望如指之列可謂佳境殫矣能事畢矣後來者雖有斂心巧目無所加焉故吾繼之述而不作長慶三年八月十三日記西湖留别征途行色慘風煙祖帳離聲咽管絃翠黛不須留五馬皇恩只許住三年緑藤隂下鋪歌席紅藕花中泊妓船處處回頭盡堪戀就中難别是湖邊重題别東樓東樓勝事我偏知氣象多隨昏旦移湖卷衣裳白重疊山張屏障緑參差海仙樓塔晴方出江女笙簫夜始吹春雨星攢尋蟹火秋風霞颭弄濤旗餘杭風俗每寒食雨後夜涼家家持燭尋蟹動盈萬人每嵗八月迎濤弄水者悉舉旗幟焉宴宜雲髻新梳後曲愛霓裳未拍時太守三年嘲不盡郡齋空作百篇詩别周軍事主人頭白官仍冷去後憐君是底人試謁會稽元相去不妨相見却殷勤白香山詩集卷二十五
