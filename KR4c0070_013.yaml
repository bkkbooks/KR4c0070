body:
  text: 白香山詩集巻十三歙縣汪立名編長慶集十三律詩五言七言凡九十二首代書詩一百韻寄微之憶在貞元嵗初昇典校司身名同日授心事一言知貞元中與微之同登科第俱授秘書省校書郎始相識也肺腑都無隔形骸兩不覊疎狂屬年少閒散為官卑分定金蘭契言通藥石規交賢方汲汲友直每偲偲有月多同賞無盃不共持秋風拂琴匣夜雪巻書帷髙上慈恩塔幽尋皇子陂唐昌玉蕊㑹崇敬牡丹期唐昌觀玉蕊崇敬寺牡丹花時多與微之有期笑勸迂辛酒閒吟短李詩辛大立度性迂嗜酒李二十紳形短能詩故當時有迂辛短李之號儒風愛敦質佛理賞𤣥師劉三十二敦質有儒風庾七𤣥師談佛理有可賞者度日曾無悶通宵靡不為雙聲聨律句八面數宫棊雙聲聨句八面宫棊皆當時事往往遊三省騰騰出九逵寒銷直城路春到曲江池樹暖枝條弱山晴彩翠竒峰攢石緑㸃栁惹麴塵絲岸草煙鋪地園花雪壓枝早光紅照耀新溜碧逶迤幄幕侵堤布盤筵占地施徴伶皆一作求絶藝選一作迎妓悉一作選名姬鉛黛凝春態一作豔金鈿耀水嬉風流誇墮髻時世鬭啼眉貞元末城中復為墮馬髻啼眉妝密坐隨歡促華尊逐勝移香飄歌袂動翠落舞釵遺籌插紅螺椀觥飛白玉巵打嫌調笑易飲訝巻波遲抛打曲有調笑令飲酒曲有巻白波殘席諠譁散歸鞍酩酊騎駝顔烏㡌側醉袖玉鞭垂紫陌傳鐘鼓紅塵塞路岐幾時曾蹔别何處不相隨荏苒星霜換廻環節候推兩衙多請告三考欲成資運啓千年聖天成萬物宜皆當少壯日同惜盛明時光景嗟虛擲雲霄竊暗窺攻文朝矻矻講學夜孜孜䇿目穿如扎時與微之集䇿略之目其數至百十毫鋒銳若錐時與微之各有纎鋒細管筆攜以就試相顧輒笑目為毫錐繁張獲鳥網堅守釣魚坻謂自冬至夏頻改試期竟與微之堅待制試也並受䕫龍薦齊陳鼂董詞萬言經濟略三䇿一作道太平基中第爭無敵專場戰不疲輔車排勝陳掎角搴降旗並謂同鋪席共筆硯雙闕紛容衞千僚儼等衰謂制舉人欲唱第之時也恩隨紫泥降名向白麻披既在髙科選還從好爵縻東垣君諫諍西邑我驅馳元和元年同登制科微之拜拾遺予授盭厔尉再喜登烏府多慙侍赤墀四年微之復拜監察予為拾遺學士也官班分内外遊處遂參差每列鵷鸞序偏瞻獬豸姿簡威霜凜冽衣彩繡葳㽔正色摧强禦剛腸嫉喔咿常憎持禄位不擬保妻兒養勇期除惡輸忠在滅私下鞲驚燕雀當道懾狐狸南國人無怨東臺吏不欺微之使東川奏寃八十餘家詔從而平之因分司東都理寃多定國切諫甚辛毘造次行於是平生志在兹道將心共直言與行兼危水暗波翻覆山藏路嶮巇未為明主識已被倖臣疑木秀遭風折蘭芳遇霰萎千鈞勢易壓一柱力難榰騰口因成痏吹毛遂得疵憂來吟貝錦謫去詠江蘺邂逅塵中遇殷勤馬上辭賈生離魏闕王粲向荆夷水過清源寺山經綺里祠心揺漢皋珮淚墮峴亭碑並途中所經厯者驛路縁雲際城樓枕水湄思鄉多繞澤望闕獨登陴林晚青蕭索江平緑渺瀰野秋鳴蟋蟀沙冷聚鸕鷀官舍黄茅屋人家苦竹籬白醪充夜酌紅粟備晨炊寡鶴摧風翮鰥魚失水鬐闇雛啼渴旦凉葉墜相思此四句兼含微之鰥居之思一㸃寒燈滅三聲曉角吹藍衫經雨故驄馬卧霜羸念涸誰濡沫嫌醒自歠醨耳垂無伯樂舌在有張儀負氣衝星劒傾心向日葵金言自銷鑠玉性肯磷緇伸屈須看蠖窮通莫問龜定知身是患應用道為醫想子今如彼嗟予獨在斯無憀一作悰當嵗杪有夢到天涯坐阻連襟帶行乖接履綦潤銷衣上霧香散室中芝念逺傷遷貶驚時嘆别離素書三往復明月七盈虧自與微之别經七月三度得書舊里非難到餘歡不易追樹依興善老草傍靖安衰㣲之宅在靖安坊西近興善寺前事思如昨中懷寫向誰北村尋古柏南宅訪辛夷開元觀西北院即隋時龍村佛堂有古柏一株至今存焉微之宅中有辛夷兩樹常與微之遊息其下此日空搔首何人共解頤病多知夜永年長覺秋悲不飲長如醉加飱亦似飢狂吟一千字因使寄微之附元稹上令狐相公書云江湖間多有新進小生不知天下文有宗主妄相倣傚又從而失遂至有支離褊淺之調皆目為元和體某又與同門友白居易友善居易雅能為詩就中愛驅駕文字窮極聲韻或為千言或為五百言律詩以相投寄小生自審不能有以過之往往戲排舊韻别創新詞名為次韻蓋欲以難相挑耳江湖間為詩者或相倣傚或力不足則至于顛倒語言重複首尾韻同於等不異於篇亦目為元和詩體而司文者考變異之由往往歸咎於某嘗以為雕蟲小事不足自明也立名按計敏夫紀事樂天詩悶勸迂辛酒閒吟短李詩迂辛辛邱度也邱度之子一日自云辛氏子來見李二十紳曰小子每憶白二十二丈詩悶勸疇昔酒閒吟二十丈詩紳笑曰辛大有此狂兒吾敢不存舊又云微之守浙東樂天守蘇臺遞筒唱和内一聨云有月多同賞無杯不共持兩地暗合按杭越唱和在長慶中此元和五年寄江陵詩有功不知何所据而云然也和鄭元一作方及第後秋歸洛下閒居同髙侍郎下隔年及第勤苦成名後優遊得意間玉憐同匠琢桂恨隔年攀山靜豹難隱谷幽鸎蹔還微吟詩引步淺酌酒開顔門逈暮臨水窻深朝對山雲衢日相待莫誤許身閒與諸同年賀座主侍郎新拜太常同宴蕭尚書亭子座主於蕭尚書下及第得羣字韻寵新卿典禮㑹盛客徴文不失遷鶯侣因成賀燕羣池臺一作塘晴間雪冠葢暮和雲共仰曾攀處年深桂尚薰立名按容齋五筆樂天詩有宴蕭尚書亭子一篇注云座主於蕭尚書下及第余考登科記樂天以正元十六年庚辰中書舍人髙郢下第四人登科郢以寶應二年癸卯禮部侍郎蕭昕下第九人登科迨郢拜太常時幾四十年矣昕自癸卯放進士之後二十四年丁卯又以禮部尚書再知貢舉可謂夀俊觀白公所賦可見唐世舉子之尊尚主司也正元即貞元避廟諱作正東都冬日㑹諸同年宴鄭家林亭得先字盛時陪上第暇日㑹羣賢桂折因同樹鸎遷各異年賔階紛組珮妓席儼花鈿促膝齊榮賤差肩次後先助歌林下水銷酒雪中天他日升沉者無忘共此筵立名按唐時新進士期集讌㑹之名甚多主司具慶曰大相識主司在偏侍曰次相識主司有兄弟曰小相識又有聞喜櫻桃月燈打毬牡丹看佛牙其大者為關宴唐摭言狀元與同年相見後便推一人為録事舊例率以狀元為録事其餘主宴主酒主樂探花主茶之類咸以其日辟之國史補既㨗列名於慈恩寺塔謂之題名大醼於曲江亭子謂之曲江㑹亦謂之關讌讌後同年各有所之亦謂之離宴敘德書情四十韻上宣歙崔中丞宣州薦送及第後重投此書元聖生乘運忠賢出應期還將稽古力助立太平基土控吳兼越州連歙與池山河地襟帶軍鎮國藩維廉察安江甸澄清肅海夷股肱分外守耳目付中司楚老歌來暮秦人詠去思望如時雨至福似嵗星移政靜民無訟刑行吏不欺撝謙驚主寵隂德畏人知白玉慙温色朱繩讓直辭行為時領袖言作世蓍龜盛幕招賢士連營訓銳師光華下鵷鷺氣色動熊羆出入麾幢引登臨劒㦸隨好風迎解榻美景待搴帷晴野霞飛綺春郊栁宛絲城烏驚畫角江鴈避紅旗藉草朱輪駐攀花紫綬垂山宜謝公屐洲稱栁家詩酒氣和芳杜絃聲亂子規分毬齊馬首列舞匝蛾眉醉惜年光晩歡憐日影遲廻塘排玉棹歸路擁金覊自顧龍鍾者嘗䝉噢咻之仰山塵不讓涉海水難為身忝鄉人薦名因國士推提攜増善價拂拭長妍姿射䇿端心術遷喬整羽儀幸穿楊逺葉謬折桂髙枝佩德潛書帶銘仁闇勒肌飭躬趨館舍拜手挹階墀霄漢程雖在風塵迹尚卑敝衣羞布素敗屋厭茅茨養乏晨昏膳居無伏臘資盛時貧可恥壯嵗病堪嗤擢第名方立躭書力未疲磨鉛重剸割策蹇再奔馳相馬須憐瘦呼鷹正及飢扶揺重即事㑹有答恩時和渭北劉大夫借便秋遮虜寄朝中親友巨鎮為邦屏全材作國楨韜鈐漢上將文墨魯諸生豹虎關西卒金湯渭北城寵深初受棨威重正揚兵陳占山河布軍諳水草行夏苗侵部落宵遁失藩營雲隊攢戈㦸風行巻斾旌堠空烽火滅氣勝鼓鼙鳴胡馬辭南牧周師罷北征廻頭問天下何處有欃槍題故曹王宅宅在檀溪甲第何年置朱門此地開山當賔閣出溪繞妓堂廻覆井桐新長䕃窻竹舊栽池荒紅菡蓞砌老緑莓苔捐館梁王去思人楚客來西園飛葢處依舊月徘徊自江陵之徐州路上寄兄弟岐路南將北離憂弟與兄關河千里别風雪一身行夕宿勞鄉夢晨裝慘旅情家貧憂後事日短念前程煙鴈翻寒渚霜烏聚古城誰憐陟岡者西楚望南荆酬哥舒大見贈去年與哥舒等八人同登科第今敘㑹散之意去嵗歡遊何處去一作好曲江西岸杏園東花下忘歸因美景尊前勸酒是春風各從微宦風塵裏共度流年離别中今日相逢愁又喜八人分散兩人同和談校書秋夜感懐呈朝中親友遥夜凉風楚客悲清砧繁漏月髙時秋霜似鬢年空長春草如袍位尚卑詞賦擅名來已久煙霄得路去何遲漢廷卿相皆知己不薦揚雄欲薦誰感秋寄逺惆悵時節晩兩情千里同離憂不散處庭樹正秋風鷰影動歸翼蕙香銷故叢佳期與芳嵗牢落兩成空春題華陽觀觀即華陽公主故宅有舊内人存焉帝子吹簫逐鳯皇空留仙洞號華陽落花何處堪惆悵頭白宮人掃影堂秋雨中贈元九不堪紅葉青苔地又是凉風暮雨天莫怪獨吟秋思苦比君校近二毛年城東閒遊寵辱憂歡不到情任他朝市自營營獨尋秋景城東去白鹿原頭信馬行答韋八麗句勞相贈佳期恨有違一作佳音悵有違早知留酒待悔不趂花歸春盡緑醅老雨多紅萼稀今朝如一醉猶得及芳菲華陽觀桃花時招李六拾遺飲華陽觀裏仙桃發把酒看花心自知爭忍開時不同醉明朝後日即空枝和友人洛中春感莫悲金谷園中月莫歎天津橋上春若學多情尋往事人間何處不傷神送張南簡入蜀昨日詔書下求賢訪陸沉無論能與否皆起徇名心君獨南遊去雲山蜀路深寄陸補闕前年同登科忽憶前年科第後此時雞鶴蹔同群秋風惆悵須吹散雞在中庭鶴在雲華陽觀中八月十五日夜招友翫月人道中秋明月好欲邀同賞意如何華陽洞裏秋壇上今夜清光此處多曲江憶元九春來無伴閒遊少行樂三分減二分何况今朝杏園裏閒人逢盡不逢君立名按摭言曲江遊賞雖云自神龍以來然盛於開元之末國史補曲江大㑹此為下第舉人邇來漸侈靡皆為上例所占向之下第舉人不復預矣又云勅下後人置皮袋例以圗章酒器錢絹實其中逢花即飲故張籍詩云無人不借花園宿到處皆攜酒器行其皮囊狀元録事同㸃撿闕一則罰金曲江之宴行市羅列闤闠為之半空公卿家以是日揀選東床車馬闐塞莫可殫述太平寰宇記曲江池漢武帝所造名為宜春苑其水曲折有似廣陵之江故名之韋述記云漢為樂遊苑於曲江池乃世祖設以校文之所唐以進士每年登科第賜宴於此葢不忘校文之義也過劉三十二故宅不見劉君來近逺門前兩度滿枝花朝來惆悵宣平過栁巷當頭第一家下邽莊南桃花村南無限桃花發唯我多情獨自來日暮風吹紅滿地無人解惜為誰開三月三十日題慈恩寺慈恩春色今朝盡盡日徘徊倚寺門惆悵春歸留不得紫藤花下漸黄昏立名按吳光淵鑑誡録長安慈恩寺浮圖起開元至大和之嵗舉子前名登遊題紀者衆矣文宗朝元稹白居易劉禹錫唱和千百首傳於京師誦者稱美凡所至寺觀臺閣林亭或歌或詠之處向來名公詩板潛自撤之葢有媿於數公之詠也㑹元白因侍香於慈恩寺塔下忽覩章先輩八元所留之句命僧拂去埃塵二公移時吟味盡日不厭悉令除去諸家之詩唯留章公一首而巳樂天曰不謂嚴維出此弟子由是二公竟不為之詩流自慈恩息筆矣章公詩曰十層突瓦在虛空四十門開面面風却怪鳥飛平地上自驚人語半天中廻梯暗踏如穿洞絶頂初攀似出籠落日鳯城佳氣合滿城春樹雨濛濛看惲家牡丹花戲贈李二十香勝燒蘭紅勝霞城中最數令公家人人散後君須看歸到江南無此花春中與盧四周諒華陽觀同居性情嬾慢好相親門巷蕭條稱作鄰背燭共憐深夜月蹋花同惜少年春杏壇住僻雖宜病芸閣官微不救貧文行如君尚憔悴不知霄漢待何人自城東至以詩代書戲招李六拾遺崔二十六先輩青門走馬趂心期惆悵歸來已校遲應過唐昌玉蕊後猶當崇敬牡丹時蹔遊還憶崔先輩欲醉先邀李拾遺尚殘半月芸香俸不作歸粮作酒貲盭厔縣北樓望山自此後詩為畿尉時作一為趨走吏塵土不開顔孤負平生眼今朝始見山縣西郊秋寄贈馬造紫閣峰西清渭東野煙深處夕陽中風荷老葉蕭條緑水蓼殘花寂寞紅我厭宦遊君失意可憐秋思兩心同别韋蘇州百年愁裏過萬感醉中來惆悵城西别愁眉兩不開戲題新栽薔薇時尉盭厔移根易地莫憔悴野外庭前一種春少府無妻春寂寞花開將爾當夫人酬王十八李大見招遊山自憐幽㑹心期阻復媿嘉招書信頻王事牽身去不得滿山松雪屬他人縣南花下醉中留劉五百嵗幾廻同酩酊一年今日最芳菲願將花贈天台女留取劉郎到夜歸宿楊家楊氏弟兄俱醉卧披衣獨起下髙齋夜深不語中庭立月照藤花影上堦醉中留别楊六兄弟三月二十日别春初攜手春深散無日花間不醉狂别後何人堪共醉猶殘十日好風光醉中歸盭厔金光門外昆明路半醉騰騰信馬㢠廻數日非關王事繫牡丹花盡始歸來遊雲居寺贈穆三十六地主亂峰深處雲居路共蹋花行獨惜春勝地本來無定主大都山屬愛山人和王十八薔薇澗花時有懷蕭侍御兼見贈霄漢風塵俱是繫薔薇花委故山深憐君獨向澗中立一把紅芳三處心再因公事到駱口驛今年到時夏雲白去年來時秋樹紅兩度見山心有媿皆因王事到山中期李二十文略王十八質夫不至獨宿仙遊寺文略也從牽吏役質夫何故戀囂塵始知解愛山中宿千萬人中無一人酬趙秀才贈新登科諸先輩莫羨蓬萊鸞鶴侣道成羽翼自生身君看名在丹臺者盡是人間修道人過天門街雪盡終南又欲春遥憐翠色對紅塵千車萬馬九衢上廻首看山無一人惜玉蕊花有懷集賢王校書起芳意將闌風又吹白雲離葉雪辭枝集賢讎校無閒日落盡瑶花君不知立名按周必大玉蕊辨證唐人甚重玉蕊花故唐昌觀有之集賢院有之翰林院亦有之皆非凡境也春送盧秀才下第遊太原謁嚴尚書未將時㑹合且與俗浮沈鴻養青冥翮蛟潛雲雨心煙郊春别逺風磧暮程深墨客投何處并州舊翰林長安送栁大東歸白社覊遊伴青門逺别離浮名相引住歸路不同歸送文暢上人東遊得道即無著隨縁西復東貌依年臘老心到夜禪空山宿馴溪虎江行濾水蟲悠悠塵客思春滿碧雲中社日關路作晚景函關路凉風社日天青巖新有鷰紅樹欲無蟬愁立驛樓上厭行官堠前蕭條秋興苦漸近二毛年重到毓材宅有感欲入中門淚滿巾庭花無主兩廻春軒窻簾幕皆依舊只是空堂欠一人亂後過流溝寺九月徐州新戰後悲風殺氣滿山河唯有流溝山下寺門前依舊白雲多歎髪落多病多愁心自知行年未老髪先衰隨梳落去何須惜不落終須變作絲留别吳七正字成名共記甲科上署吏同登芸閣間唯是塵心殊道性秋蓬常轉水長閒除夜宿洺州家寄關西住身為河北遊蕭條嵗除夜旅泊在洺州邯鄲冬至夜思家邯鄲驛裏逢冬至抱膝燈前影伴身想得家中夜深坐還應說著逺行人冬至夜懷湘靈豔質無由見寒衾不可親何堪最長夜俱作獨眠人遊仙遊山闇將心地出人間五六年來人怪閒自嫌戀著未全盡猶愛雲泉多在山見尹公亮新詩偶贈絶句袖裏新詩十首餘吟看句句是瓊琚如何持此將干謁不及公卿一字書長安閒居風竹煙松晝掩關意中長似在深山無人不怪長安住何獨朝朝暮暮閒早春獨遊曲江時為校書郎散職無覊束羸驂少送迎朝從直城出春傍曲江行風起池東暖雲開山北晴冰銷泉脈動雪盡草芽生露杏紅初拆煙楊緑未成影遲新度鴈聲澀欲啼鶯閑地心俱靜韶光眼共明酒狂憐性逸藥效喜身輕慵慢疎人事幽棲逐野情廻看芸閣笑不似有浮名秘書省中憶舊山厭從薄宦校青簡悔别故山思白雲猶喜蘭臺非傲吏歸時應免動移文凉夜有懷自此後詩並未應舉時作凉風吹枕席白露濕衣裳好是相親夜漏遲天氣凉送武士曹歸蜀士曹即武中丞兄花落鳥嚶嚶南歸稱野情月宜秦嶺宿春好蜀江行鄉路通雲棧郊扉近錦城烏臺陟岡送人羨别時榮江南送北客因憑寄徐州兄弟書時年十五故園望斷欲何如楚水吳山萬里餘今日因君訪兄弟數行鄉淚一封書賦得古原草送别離離一作咸陽原上草一嵗一枯榮野火燒不盡春風吹又生逺芳侵古道晴翠接荒城又送王孫去萋萋滿别情立名按堯山堂外紀白樂天初至京以所業謁顧著作况况覩姓名熟視曰長安來貴居大不易及披巻首篇曰咸陽原上草一嵗一枯榮野火燒不盡春風吹又生乃嘆賞曰道得箇語居亦何難前言戲之耳因為延譽聲名遂振又云長安冰雪至夏月則價等金璧白詩名動閭閻每需冰雪論筐取之不復償價日日如是旅次景空寺宿幽上人院不與人境接寺門開向山暮鐘寒鳥聚秋雨病僧閒月隱雲樹外螢飛廊宇間幸投花界宿暫得靜心顔長安正月十五日諠諠車騎帝王州覊病無心逐勝遊明月春風三五夜萬人行樂一人愁過髙將軍墓原上新墳委一身城中舊宅有何人妓堂賔閣無歸日野草山花又欲春門客空將感恩淚白楊風裏一霑巾宿桐廬館同崔存度醉後作江海漂漂共旅遊一尊相勸散窮愁夜深醒後愁還在雨滴梧桐山館秋江樓望歸時避難在越中滿眼雲水色月明樓上人旅愁春入越鄉夢夜歸秦道路通荒服田園隔虜塵悠悠滄海畔十載避黄巾除夜寄弟妹感時思弟妹不寐百憂生萬里經年别孤燈此夜情病容非舊日歸思逼新正早晚重歡㑹覊離各長成感芍藥花寄正一上人今日階前紅芍藥幾花欲老幾花新開時不解比色相落後始知如幻身空門此去幾多地欲把殘花問上人晚秋閒居地僻門深少送迎披衣閒坐養幽情秋庭不掃攜藤杖閒蹋梧桐黄葉行秋暮郊居書懷郊居人事少晝卧對林巒窮巷厭多雨貧家愁早寒葛衣秋未換書巻病仍看若問生涯計前溪一釣竿為薛台悼亡半死梧桐老病身重泉一念一傷神手攜稚子夜歸院月冷房空不見人途中寒食路傍寒食行人盡一作絶獨占春愁在路傍馬上垂鞭愁不語風吹百草野田香題流溝寺古松煙葉蔥蘢蒼麈尾霜皮剥落紫龍鱗欲知松老看塵壁死却題詩幾許人感月悲逝者存亡感月一澘然月色今宵似往年何處曽經同望月櫻桃樹下後堂前代鄰叟言懷人生何事心無定宿昔如今意不同宿昔愁身不得老如今恨作白頭翁自河南經亂關内阻飢兄弟離散各在一處因望月有感聊書所懷寄上浮梁大兄於潛七兄烏江十五兄兼示符離及下邽弟妹時難年荒世業空弟兄覊旅各西東田園寥落干戈後骨肉流離道路中弔影分為千里鴈辭根散作九秋蓬共看明月應垂淚一夜鄉心五處同寒閨夜夜半衾裯冷孤眠嬾未能籠香銷盡火巾淚滴成冰為惜影相伴通宵不滅燈寄湘靈淚眼凌寒凍不流每經髙處即廻頭遥知别後西樓上應凭闌干獨自愁冬至宿楊梅館十一月中長至夜三千里外逺行人若為獨宿楊梅館冷枕單床一病身臨江送夏瞻瞻年七十餘悲君老别我霑巾七十無家萬里身愁見舟行風又起白頭浪裏白頭人冬夜示敏巢時在東都宅爐火欲銷燈欲盡夜長相對百憂生他時諸處重相見莫忘今宵燈下情客中守嵗在栁家莊守嵗尊無酒思鄉淚滿巾始知為客苦不及在家貧畏老偏驚節防愁預惡春故園今夜裏應念未歸人問淮水自嗟名利客擾擾在人間何事長淮水東流亦不閒宿樟亭驛夜半樟亭驛愁人起望鄉月明何所見潮水白茫茫及第後憶舊山偶獻子虚登上第却吟招隱憶中林春蘿秋桂莫惆悵縱有浮名不繫心題李次雲窻竹不用裁為鳴鳯管不須截作釣魚竿千花百草凋零後留向紛紛雪裏看花下自勸酒酒琖酌來須滿滿花枝看即落紛紛莫言三十是年少百嵗三分已一分題李十一東亭相思夕上松臺立蛩思蟬聲滿耳秋惆悵東亭風月好主人今夜在鄜州春村二月村園暖桑間戴勝飛農夫舂舊榖蠶妾擣新衣牛馬因風逺雞豚過社稀黄昏林下路鼓笛賽神歸題施山人野居得道應無著謀生亦不妨春泥秧稻暖夜火焙茶香水巷風塵少松齋日月長髙閒真是貴何處覔侯王白香山詩集巻十三
