body:
  text: 白香山詩集卷二十七歙縣汪立名編後集七律詩凡一百一首除蘇州刺史别洛城東花亂雪千花落新絲兩鬢生老除吳郡守春别洛陽城江上今重去城東更一行别花何用伴勸酒有殘鶯奉和汴州令狐令公二十二韻同用淹字客有東征者夷門一落帆二年方得到五日未為淹相府領鎮隔年居易方到既到陪奉遊宴凡經五日在浚旌重葺遊梁館更添心因好善樂貌為禮賢謙俗阜知敦勸民安見察廉仁風扇平聲道路隂雨膏去聲閭閻文律操將柄兵機釣得鈐碧幢油葉葉一作業業紅斾火襜襜景象春加麗威容曉助嚴槍森赤豹尾纛吒黑龍髯門靜塵初斂城昏日半銜選幽開後院占勝坐前簷平展絲頭毯髙褰錦額簾雷捶柘枝鼓雪擺胡音鶻騰衫髮滑歌叉墜妝光舞汗霑回燈花簇簇過酒玉纖纖饌盛盤心殢醅濃盞底粘陸珍熊掌爛海味蟹螯鹹福履千夫祝形儀四座一作海瞻羊公長在峴傅説莫歸巖蓋祝者之詞意也眷愛人人遍風情事事兼猶嫌客不醉同賦夜猒猒船夜援琴鳥棲魚不動月照夜江深身外都無事舟中只有琴七絃為益友兩耳是知音心靜即聲淡其間無古今答劉和州禹錫換印雖頻命未通歷陽湖上又秋風不教才展休明代為罰詩爭造化功我亦思歸田舍下君應厭臥郡齋中好相收拾為間伴年齒官班約略同渡淮淮水東南闊無風渡亦難孤煙生乍直逺樹望多圓春浪棹聲急夕陽帆影殘清流宜映月今夜重吟看赴蘇州至常州答賈舍人杭城隔歲轉蘇臺還擁前時五馬回厭見簿書先眼合喜逢杯酒暫睂開未酬恩寵年空去欲立功名命不來一别承明三領郡甘從人道是粗才去嵗罷杭州今春領吳郡慙無善政聊寫鄙懷兼寄三相公為問三丞相如何秉國鈞那將最劇郡付與苦慵人豈有吟詩客堪為持節臣不才空飽暖無惠及飢貧昨臥南城月今行北境春鉛刀磨欲盡銀印換何頻杭老遮車轍吳童掃路塵虛迎復虛送慙見兩州民宣武令狐相公以詩寄贈傳播吳中聊奉短章用申酬謝新詩傳詠忽紛紛楚老吳娃耳遍聞盡解呼為好才子不知官是一作在上將軍辭人命薄多無位戰將功髙少有文謝朓篇章韓信鉞一生雙得不如君自詠形容瘦薄詩情苦豈是人間有相人只合一生眠白屋何因三度擁朱輪金章未佩雖非貴銀榼常攜亦不貧唯是無兒頭早白被天磨折恰平均吟前篇因寄微之君顔貴茂不清羸君句雄華不苦悲何事遣君還似我髭鬚早白亦無兒紫薇花紫薇花對紫微翁名目雖同貌不同獨占芳菲當夏景不將顔色託春風潯陽官舍雙髙樹興善僧庭一大叢何似蘇州安置處花堂闌下月明中自到郡齋僅經旬日方專公務未及宴遊偷間走筆題二十四韻兼寄常州賈舍人湖州崔郎中仍呈吳中諸客渭北離鄉客江南守土臣涉途初改月入境巳經旬甲郡標天下環封極海濵版圖十萬户兵籍五千人自顧才能少何堪寵命頻冒榮慙印綬虛奬負絲綸除蘇州制云藏于已為道義施于物為政能在公形骨鯁之志闔境有袴襦之樂候病須通脈防流要塞津救煩無若靜補拙莫如勤削使科條簡攤令賦役均以兹為報效安敢不躬親襦袴提於手韋弦佩在紳敢辭稱俗吏且願活疲民常常州未徴黃霸湖湖州猶借寇恂愧無鐺腳政河北三郡相鄰皆有善政時謂鐺腳刺史見唐書徒忝犬牙鄰制誥誇黃絹美賈常州也詩篇占白蘋美崔吳興也銅符拋不得自謂也瓊樹見無因警寐鐘傳夜催衙鼓報晨唯知對胥吏未暇接親賓色變雲迎夏聲殘鳥過春麥風非逐扇梅雨異隨輪武寺山如故武邱寺也王樓月自新郡內東南樓名也池塘間長草絲竹廢生塵暑遣燒神酎晴教曬舞茵待還公事了亦擬樂吾身題籠鶴經旬不飲酒踰月未聞歌豈是風情少其如塵事多虎邱慙客問娃館妒人過莫笑籠中鶴相看去幾何答客問杭州為我踟蹰停酒盞與君約略説杭州山名天竺堆青黛湖號錢塘㵼緑油大屋簷多裝鴈齒小航船亦畫龍頭所嗟水路無三百官繫何因得再遊立名按唐語林居易自中書舍人為杭州刺史替嚴員外休復休復有時名居易喜為之代時吳興守錢徽吳郡守李穰皆文學士悉生平舊友日以詩酒寄贈官妓商玲瓏謝好好巧於應對善歌舞後元相鎮會稽參其酬唱每以筒竹盛詩來往居易在杭樂于蘇而詩有使君全未厭錢唐之句及罷俸錢多留官庫繼守者公用不足則假而復填如是五十餘年及黃巢至郡文籍多焚燒其俸遂亡登閶門間望閶門四望鬱蒼蒼始覺州雄土俗強十萬夫家供課稅五千子弟守封疆闔閭城碧鋪秋草烏鵲橋紅帶夕陽處處樓前飄管吹家家門外泊舟航雲埋虎寺山藏色月耀娃宫水放光曽賞錢塘兼一作嫌茂苑今來未敢苦誇張代諸妓贈送周判官妓筵今夜别姑蘇客棹明朝向鏡湖莫泛扁舟尋范蠡且隨五馬覓羅敷蘭亭月破能回否娃館秋涼却到無好與使君為老伴歸來休染白髭鬚秋寄微之十二韻娃館松江北稽城浙水東屈君為長吏伴我作衰翁旌斾知非逺煙雲望不通忙多對酒榼興少閲詩筒此在杭州兩浙唱和詩贈答於筒中往來者淡白秋來日疏涼雨後風餘霞數片綺新月一張弓影滿衰桐樹香凋晚蕙叢飢啼春穀鳥寒怨絡絲蟲覽鏡頭雖白聽歌耳未聾老愁從此遣醉笑與誰同清旦方堆案黃昏始退公可憐朝暮景消在兩衙中池上早秋荷芰緑參差新秋水滿池早涼生北檻殘照下東籬露飽蟬聲懶風乾柳意衰過潘二十歲何必更愁悲立名按姑蘇志北池又名後池在木蘭堂後韋白有詩池中有塢塢上有白公手植槐郡西亭偶詠常愛西亭面北林公私塵事不能侵共間作伴無如鶴與老相宜只有琴莫遣是非分作界須教吏隱合為心可憐此道人皆見但要修行功用深故衫暗淡緋衫稱老身半披半曵出朱門袖中吳郡新詩本襟上杭州舊酒痕殘色過梅看向盡故香因洗嗅猶存曽經爛熳三年著欲棄空箱似少恩郡中夜聽李山人彈三樂風琴秋拂匣月户夜開關榮啓先生樂姑蘇太守間傳聲千古後得意一時間却怪鍾期耳唯聽水與山東城桂三首并序桂樂府解題作華曲蘇之東城古吳都城也今為樵牧之場有桂一株生於城下惜其不得地因賦三絶以唁之子墮本從天竺寺根盤今在闔閭城當時應逐南風落落向人間取次生舊説杭州天竺寺每歲秋中有月桂子墮霜雪一作雪霰壓多雖不死荆榛長疾欲相埋常憂落在樵人手賣作蘇州一束柴遙知天上桂花孤試問嫦娥更要無月宫幸有間田地何不中央種兩株聞行簡恩賜章服喜成長句寄之吾年五十加朝散爾亦今年賜服章齒髮恰同知命嵗官銜俱是客曹郎豫與行簡俱年五十始著緋皆是主客郎官榮傳錦帳花聯蕚彩動綾袍鴈趁行緋多以雁銜瑞莎為之也大抵著緋宜老大莫嫌秋鬢數莖霜立名按容齋隨筆唐人重章服故杜子美有銀章付老翁朱紱負平生扶病垂朱紱句樂天詩言銀緋處亦最多即行簡夢得加章服亦有詩記其事喚笙歌露墜萎花槿風吹敗葉荷老心歡樂少秋眼感傷多芳歲今如此衰翁可奈何猶應不如醉試遣喚笙歌對酒吟一拋學士筆三佩使君符未換銀青綬唯添雪白鬚公門衙退掩妓席客來鋪履舄從相近謳吟任所須金銜嘶五馬鈿帶舞雙姝不得當年有猶勝到老無合聲歌漢月齊手拍吳歈今夜還先醉應煩紅袖扶偶飲三盞醺醺四體融妓亭簷下夕陽中千聲方響敲相續一曲雲和戛未終今日心情如往日秋風氣味似春風唯憎小吏尊前報道去衙時水五筒早發赴洞庭舟中作閶門曙色欲蒼蒼星月髙低宿水光棹舉影搖燈燭動舟移聲拽管絃長漸看海樹紅生日遙見包山白帶霜出郭巳行十五里唯消一曲慢霓裳宿湖中水天向晚碧沈沈樹影霞光重疊深浸月冷波千頃練苞霜新橘萬株金幸無案牘何妨醉縱有笙歌不廢吟十隻畫船何處宿洞庭山腳太湖心揀貢橘書情洞庭貢橘揀宜精太守勤王請自行珠顆形容隨日長瓊漿氣味得霜成登山敢惜駑駘力望闕難伸螻蟻情疏賤無由親跪獻願憑朱實表丹誠立名按范石湖吳郡志緑橘出洞庭東西山比常橘特大未霜深緑色臍間一點先黃味巳全可噉故名緑橘又有平橘比緑橘差小純黃方可噉故品稍下芝田録云韋蘇州寄橘詩云書後欲題三百顆洞庭須待滿林霜蓋南史有人題書尾曰洞庭霜橘三百顆韋正用其事王右軍帖亦云奉橘三百枚霜未降不可多得禹貢揚州厥包橘柚錫貢洞庭揚州分也其貢橘久矣夜泛陽塢入眀月灣即事寄崔湖州湖山處處好淹留最愛東灣北塢頭掩映橘林千點火泓澄潭水一盆油龍頭畫舸銜眀月鵲腳紅旗蘸碧流為報茶山崔太守與君各是一家遊嘗羡吳興每春茶山之遊洎入太湖羡意減矣故云泛太湖書事寄微之煙渚雲帆處處通飄然舟似入虛空玉杯淺酌巡初匝金管徐吹曲未終黃夾纈林寒有葉碧琉璃水淨無風避旗飛鷺翩翻白驚鼓跳魚撥刺紅澗雪壓多松偃蹇巖泉滴久石玲瓏書為故事留湖上所見勝景多記在湖中石上吟作新詩寄浙東軍府威容從道盛江山氣色定知同報君一事君應羡五宿澄波皓月中題新館曽為白社羇遊子今作朱門醉飽身十萬户州尤覺貴三千石祿敢言貧重裘每念單衣士兼味常思旅食人新館寒來多少客欲回歌酒暖風塵西樓喜雪命宴宿雲黃慘淡曉雪白飄颻散麵遮槐市堆花壓柳橋四郊鋪縞素萬室甃瓊瑶銀榼攜桑落金爐上麗譙光迎舞妓動寒近醉人銷歌樂雖盈耳慙無五袴謡新栽梅池邊新種七株梅欲到花時點檢來莫怕長洲桃李妒今年好為使君開酬劉和州戲贈錢塘山水接蘇臺兩地褰帷愧不才政事素無爭學得風情舊有且將來雙蛾解珮啼相送五馬鳴珂笑却回不似劉郎無景行長拋春恨在天台戲和賈常州醉中二絶句聞道毗陵詩酒興近來積漸學姑蘇罨頭新令從偷去刮骨清吟得似無越調管吹留客曲吳吟詩送暖寒杯娃宫無限風流事好遣孫心暫學來歲暮寄微之三首微之别久能無歎知退書稀豈免愁甲子百年過半後光隂一嵗欲終頭池氷曉合膠船底樓雪晴消露瓦溝自覺歡情隨日減蘇州心不及杭州榮進雖頻退亦頻與君才命不調勻若不九重中掌事即須千里外拋身紫垣南北廳曽對滄海東西郡又鄰唯欠結廬嵩洛下一時歸去作間人白頭歲暮苦相思除却悲吟無可為枕上從妨一夜睡燈前讀盡十年詩讀前後唱和詩龍鍾校正騎驢日憔悴通江司馬時通州江州若並如今是全活紆朱拖紫且開睂歲日家宴戲示弟姪等兼呈張侍御二十八丈殷判官二十三兄弟妹妻孥小姪甥嬌癡弄我助歡情嵗盞後推藍尾酒春盤先勸膠牙餳形骸潦倒雖堪歎骨肉團圓亦可榮猶有誇張少年處笑呼張丈喚殷兄立名按洪景盧云白詩用膠牙餳出荆楚嵗時記言其堅固如膠也藍尾酒殊不可曉河東記載申屠澄與路旁茅舍中老父嫗及處女環火而坐嫗自外挈酒壺至曰以君冒寒且進一杯澄因揖遜曰始自主人翁即巡澄當婪尾蓋以藍為婪當婪尾者謂最在後飲也石林燕語云唐人言藍尾多不同藍多作啉為貪啉之意出于侯白酒律謂酒巡匝末坐者連飲三杯為藍尾蓋末坐逺酒行到常遲故連飲以慰之然白公三杯之句只謂酒之巡數耳安有連飲者哉正月三日間行黃鸝巷口鶯欲語烏鵲河頭氷欲消黃鸝坊名烏鵲河名緑浪東西南北水紅闌三百九十橋蘇之官橋大數鴛鴦蕩漾雙雙翅楊柳交加萬萬條借問春風來早晚只從前日到今朝夜歸逐勝移朝宴留歡放晚衙賓僚多謝客騎從半吳娃到處銷春景歸時及月華城隂一道直燭焰兩行斜東吹先催柳南霜不殺花臯橋夜酤酒燈火是誰家自歎豈獨年相迫兼為病所侵春來痰氣動老去嗽聲深眼暗猶操筆頭斑未挂簪因循過日月真是俗人心郡中間獨寄微之及崔湖州少年賓旅非吾輩晚嵗簪纓束我身酒散更無同宿客詩成長作獨吟人蘋洲會面知何日鏡水離心又一春兩處也應相憶在官髙年長少情親小舫小舫一艘新造了輕裝梁柱庳安蓬深坊靜岸遊應遍淺水低橋去盡通黃柳影籠隨棹月白蘋香起打頭風慢牽欲傍櫻桃泊借問誰家花最紅馬墜強出贈同座足傷遭馬墜腰重倩人擡祗合窗間臥何由花下來坐依烏皆反桃葉妓行呷地黃杯強出非他意東風落盡梅夜聞賈常州崔湖州茶山境會想羡歡宴因寄此詩遙聞境會茶山夜珠翠歌鍾俱繞身盤下中分兩州界燈前合音閣作一家春青娥遞舞應爭妙紫筍齊嘗各鬭新自歎花時北窗下蒲黃酒對病眠人時馬墜損腰正勸蒲黃酒酬微之開拆新樓初畢相報末聯見戲之作海山鬱鬱石稜稜新豁髙居正好登南臨贍部三千界東對蓬宫十二層報我樓成秋望月把君詩讀夜回燈無妨却有他心眼妝點亭臺即不能病中多雨逢寒食水國多隂常懶出老夫饒病愛間眠三旬卧度鶯花月一半春消風雨天薄暮何人吹觱篥新晴幾處縛鞦韆綵繩芳樹長如舊唯是年年換少年清明夜好風朧月清明夜碧砌紅軒刺史家獨繞回廊行復歇遙聽絃管暗看花蘇州柳金谷園中黃嫋娜曲江亭畔碧婆娑一作毿娑老來處處遊行遍不似蘇州柳最多絮撲白頭條拂面使君無計奈春何三月二十八日贈周判官一春惆悵殘三日醉問周郎憶得無柳絮送人鶯勸酒去年今日别東都偶作紅杏初生葉青梅巳綴枝闌珊花落後寂寞酒醒時坐悶低睂久行慵舉足遲少年君莫怪頭白自應知重答劉和州來萹云蘇州刺史例能詩西掖吟來替左司又云若共吳王鬭百草不如唯是欠西施分無佳麗敵西施敢有文章替左司隨分笙歌聊自樂等間篇詠被人知花邊妓引尋香徑月下僧留宿劒池可惜當時好風景吳王應不解吟詩采香徑在館娃宫奉送三兄少年曽管二千兵晝聽笙歌夜斫營自反邱園頭盡白每逢旗鼓眼猶明杭州暮醉連牀臥吳郡春逰並馬行自愧阿連官職慢只教兄作使君兄城上夜宴留春不住登城望惜夜相將秉燭遊風月萬家河兩岸笙歌一曲郡西樓詩聽越客吟何苦酒被吳娃勸不休從道人生都是夢夢中歡笑亦勝愁重題小舫贈周從事兼戲微之細篷青篾織魚鱗小眼紅窗襯麴塵闊狹才容從事座髙低恰稱使君身舞筵須揀腰輕女仙棹難勝骨重人不似鏡湖廉使出髙檣大艑鬧驚春吳櫻桃含桃最説出東吳香色鮮穠氣味殊洽恰舉頭千萬顆婆娑拂面兩三株鳥偷飛處銜將火人摘爭時踏破珠可惜風吹兼雨打明朝後日即應無春盡勸客酒林下春將盡池邊日半斜櫻桃落砌顆夜合隔簾花嘗酒留間客行茶使小娃殘杯勸不飲留醉向誰家仲夏齋居偶題八韻寄微之及崔湖州腥血與葷蔬停來一月餘肌膚雖瘦損方寸任清虛體適通宵坐頭慵隔日梳眼前無俗物身外即僧居水榭風來逺松廊雨過初褰簾放巢燕投食施池魚久别間遊伴頻勞問疾書不知湖與越吏隱興何如官宅紅紫共紛紛祗承老使君移舟木蘭棹行酒石榴裙水色窗窗見花香院院聞戀他官舍住雙鬢白如雲六月三日夜聞蟬荷香清露墜柳動好風生微月初三夜新蟬第一聲乍聞愁北客靜聽憶東京我有竹林宅别來蟬再鳴不知池上月誰撥小船行蓮石青石一兩片白蓮三四枝寄將東洛去心與物相隨石倚風前樹蓮栽月下池遙知安置處預想發榮時領郡來何逺還鄉去巳遲莫言千里别歲晚有心期眼病二首散亂空中千片雪蒙籠物上一重紗縱逢晴景如看霧不是春天亦見花巳上四句皆病眼中所見者僧説客塵來眼界醫言風眩在肝家兩頭治療何曽瘥藥力微茫佛力賖眼藏損傷來巳久病根牢固去應難醫師盡勸先停酒道侣多教早罷官案上謾鋪龍樹論盒中虛撚決眀丸人間方藥應無益爭得金箆試刮看題東武一作虎邱寺六韻香剎看非逺祗園入始深龍蟠松矯矯玉立竹森森怪石千僧坐靈池一劒沈海當亭兩面山在寺中心酒熟憑花勸詩成倩鳥吟寄言軒冕客此地好抽簪夜遊西武一作虎邱寺八韻不厭西邱寺間來即一過舟船轉雲島樓閣出煙蘿路入青松影門臨白月波魚跳驚秉燭猿覷怪鳴珂搖曳雙紅斾娉婷十翠娥容滿蟬態等十妓從遊也香花助羅綺鐘梵避笙歌領郡時將久遊山數幾何一年十二度非少亦非多詠懷蘇杭自昔稱名郡牧守當今當好官兩地江山踏得遍五年風月詠將一作來殘幾時酒盞曽拋却何處花枝不把看白髮滿頭歸得也詩情酒興漸闌珊重詠日覺雙眸暗年驚兩鬢蒼病應無處避老更不宜忙徇俗心情少休官道理長今秋歸去定何必重思量百日假滿心中久有歸田計身上都無濟世才長告初從百日滿故鄉元約一年回馬辭轅下頭髙舉鶴出籠中翅大開但拂衣行莫回顧的無官職趁人來九日寄微之眼暗頭風事事妨繞籬新菊為誰黃間遊日久心慵倦痛飲年深肺損傷吳郡兩回逢九月越州四度見重陽怕飛杯酒多分數厭聽笙歌舊曲章蟋蟀聲寒初過雨茱萸色淺未經霜去秋共數登髙會又被今年減一場題報恩寺好是清涼地都無繫絆身晚晴宜野寺秋景屬間人淨石堪敷座寒泉可濯巾自慙容鬢上猶帶郡庭塵晚起臥聽鼕鼕衙鼓聲起遲睡足長心情華簪脫後頭雖白堆案拋來眼較明間上籃輿乘興出醉回花舫信風行眀朝更濯塵纓去聞道松江水最清自思益寺次楞伽寺作朝從思益峰遊後晚到楞伽寺歇時照水姿容雖巳老上山筋力未全衰行逢禪客多相問坐倚漁舟一自思猶去懸車十五載休官非早亦非遲松江亭攜樂觀漁宴宿震澤平蕪岸松一作吳江落葉波在官常夢想為客始經過水面排罾網船頭簇綺羅朝盤膾紅鯉夜燭舞青娥雁斷知風急潮平見月多一作湖平得月多繁絲一作絃與促管不解和漁歌宿靈巖寺上院髙髙白月上青林客去僧歸獨夜深葷血屏除唯對酒歌鍾放散只留琴更無俗物當人眼但有泉聲洗我心最愛曉亭東望好太湖煙水緑沈沈酬别周從事二首腰痛拜迎人客倦眼昏勾押簿書難辭官歸去緣衰病莫作陶潛范蠡看洛下田園久拋擲吳中歌酒莫留連嵩陽雲樹伊川月巳較歸遲四五年武邱寺路去年重開寺路桃李蓮荷約種數千株自開山寺路水陸往來頻銀勒牽驕馬花船載麗人芰荷生欲遍桃李種仍新好住湖堤上長留一道春齊雲樓晚望偶題十韻兼呈馮侍御周殷二協律樓在蘇州潦倒宦情盡蕭條芳歲闌欲辭南國去重上北城看復疊江山壯平鋪井邑寬人稠過揚府坊鬧半長安插霧峰頭沒穿霞日腳殘水光紅漾漾樹色緑漫漫約略留遺愛殷勤念舊歡病拋官職易老别友朋難九月全無熱西風亦未寒齊雲樓北面半日憑闌干立名按姑蘇志齊雲樓在郡治後子城上相傳即古月華樓吳地記唐恭王所造白公有詩亦云改號齊雲樓蓋取西北有髙樓上與浮雲齊之義據此則自樂天始也河亭晴望九月八日風轉雲頭斂煙銷水面開晴虹橋影出秋雁櫓聲來郡靜官初罷鄉遙信未回明朝是重九誰勸菊花杯留别微之干時久與本心違悟道深知前事非猶厭勞形辭郡印那將趁伴著朝衣五千言裏教知足三百篇中勸式微少室雲邊伊水畔比君較老合先歸自喜自喜天教我少緣家徒行計兩翩翩身兼妻子都三口鶴與琴書共一船僮僕減來無冗食資糧算外有餘錢攜將貯作邱中費猶免飢寒得數年武邱寺路宴留别諸妓銀泥裙映錦障泥畫舸停橈馬簇蹄清管曲終鸚鵡語紅旗影動䮂䮧一作䮂馯又作發汗嘶漸消醉色朱顔淺欲語離情翠黛低莫忘使君吟詠處女墳湖北虎邱西立名按遁叟云白詩有䮂䮧嘶廣韻䮂䮧蕃大馬也音薄寒亦有直作薄寒者又云白詩女墳湖北武邱西英華辨證云女墳真娘墓也此非是皮陸女墳湖詩自注吳王葬女之所按吳越春秋闔閭葬女閶門西郭舞白鶴市中令萬人隨觀即其事也江上對酒二首酒助疏頑性琴資緩慢情有慵將送老無智可勞生忽忽忘機坐倀倀任運行家鄉安處是那獨在神京久貯滄浪意初辭桎梏身昏昏常帶酒默默不應人坐穩便箕踞眠多愛欠伸客來存禮數始著白綸巾望亭驛酬别周判官何事出長洲連宵飲不休醒應難作别歡漸少於愁燈火穿村市笙歌上驛樓何言五十里巳不屬蘇州見小姪龜兒詠燈詩并臘娘製衣因寄行簡巳知臘子能裁服復報龜兒解詠燈巧婦才人常薄命莫教男女苦多能酒筵上答張居士但要前塵減無妨外相同雖過酒肆上不離道場中絃管聲非實花鈿色是空何人知此意唯有淨名翁鸚鵡隴西鸚鵡到江東養得經年觜漸紅常恐思歸先剪翅每因餵食暫開籠人憐巧語情雖重鳥憶髙飛意不同應似朱門歌舞妓深藏牢閉後房中聽琵琶妓彈略略腕軟撥頭輕新教略略成四絃千遍語一曲萬重情法向師邊得能從意上生莫欺江外手别是一家聲寫新詩寄微之偶題卷後寫了吟看滿卷愁淺紅箋紙小銀鉤未容寄與微之去巳被人傳到越州吳宫辭淡紅花帔淺檀蛾睡臉初開似剪波坐對珠籠間理曲琵琶鸚鵡語相和寶歷二年八月三十日夜夢後作塵纓忽解誠堪喜世網重來未可知莫忘全吳館中夢嶺南泥雨步行時與夢得同登棲靈塔半月悠悠在廣陵何樓何塔不同登共憐筋力猶堪在上到棲靈第九層夢蘇州水閣寄馮侍御揚州驛裏夢蘇州夢到花橋水閣頭覺後不知馮侍御此中昨夜共誰遊立名按吳郡志戴顒宅北禪寺唐司勳郎中陸洟嘗居之有花橋水閣喜罷郡五年兩郡亦堪嗟偷出遊山走看花自此光隂為已有從前日月屬官家尊前免被催迎使枕上休聞報坐衙睡到午時歡到夜回看官職是泥沙答次休上人來篇云聞有餘霞千萬首何妨一句乞間人姓白使君無麗句名休座主有新文禪心不合生分别莫愛餘霞嫌碧雲白香山詩集卷二十七
