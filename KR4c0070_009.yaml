body:
  text: 白香山詩集卷九歙縣汪立名編長慶集九感傷古調詩五十五首西明寺牡丹花時憶元九前年題名處今日看花來一作藝香吏三見牡丹開豈獨花堪惜方知老暗催何況尋花伴東都去未回詎知紅芳側春盡思悠哉立名按李肇國史補京城貴遊尚牡丹三十餘年矣每春暮車馬若狂以不耽玩為耻執金吾鋪官圍外寺觀種以求利一本有直數萬者元和末韓令始至長安居第有之命斸去曰吾豈效兒女子邪傷楊𢎞貞顔子昔短一作知命仲尼惜其賢楊生亦好學不幸復徒然一作今復然誰識天地意獨與龜鶴一作蛇年權攝昭應早秋書事寄元拾遺兼呈李司録夏閏秋候早七月風騷騷渭川煙景晚驪山宫殿髙丹殿子司諫赤縣我徒勞相去半日程不得同遊遨到官來十日覽鏡生二毛可憐趨走吏塵土滿青袍郵傳擁兩驛簿書堆六曹為問綱紀掾何必使鉛刀新栽竹佐邑意不適閉門秋草生何以娛野性種竹百餘莖見此溪上色憶得山中情有時公事暇盡日繞欄行勿言根未固勿言隂未成已覺庭宇內稍稍有餘清最愛近窗卧秋風枝有聲秋霖中過一作遇尹縱之仙遊山居慘慘八月暮連連三日霖邑居尚愁寂況乃在山林林下有志士苦學惜光隂歲晚千萬慮併入方寸心巖鳥共旅宿草蟲伴愁吟秋天床席冷雨夜燈火深憐君寂寞意攜酒一相尋寄江南兄弟分散骨肉戀趨馳名利牽一奔塵埃馬一泛風波船忽憶分手時憫默秋風前别來朝復夕積日成七年花落城中池春深江上天登樓東南望鳥滅煙蒼然相去復幾許道里近三千平地猶難見况乃隔山川曲江早秋二年作秋波紅蓼水夕照青蕪岸獨信馬蹄行曲江池四畔早涼晴後至殘暑暝來散方喜炎燠銷復嗟時節換我年三十六冉冉昏復旦人夀七十稀七十新過半且當對酒笑勿起臨風歎寄題盩厔廳前雙松兩松自仙遊山移植縣廳憶昨為吏日折腰多苦辛歸家不自適無計慰心神手栽兩樹松聊以當去聲嘉賔乘春日一溉生意漸欣欣清韻度秋在緑茸隨日新始憐澗底色不憶城中春有時晝掩關雙影對一身盡日不寂寞意中如三人忽奉宣室詔徴為文苑臣間來一惆悵恰似别交親一作情早知煙翠前攀玩不逡巡悔從白雲裏移爾落囂塵翰林院中感秋懷王質夫王居仙遊山何處感時節新蟬禁中聞宫槐有秋意風夕花紛紛寄迹鵷鷺行歸心鷗鶴羣唯有王居士知豫憶白雲何日仙遊寺潭前秋見君禁中月海上明月出禁中清一作秋夜長東南樓殿白稍稍上宫墻淨落金塘水明浮玉砌霜不比人間見塵土汚清光贈賣松者一束蒼蒼色知從澗底來斸掘經幾日枝葉滿塵埃不買非他意城中無地栽初見白髮白髮生一莖朝來明鏡裏勿言一莖少滿頭從此始青山方逺别黃綬初從仕未料容鬢間蹉跎忽如此别元九後詠所懷零落桐葉雨蕭條槿花風悠悠早秋意生此幽澗中况與故人别中懷正無悰勿云不相送心到青門東相知豈在多但問同不同同心一人去坐覺長安空禁中秋宿風翻朱一作來裏幕雨冷通中枕耿耿背斜燈秋牀一人寢早秋曲江感懷離離暑雲散嫋嫋涼風起池上秋又來荷花半成子朱顔自銷歇白日無窮已人夀不如山年光急於水青蕪與紅蓼歲歲秋相似去歲此悲秋今秋復來此寄元九身為近密拘心為名檢縛月夜與花時少逢杯酒樂唯有元夫子間來同一酌把手或酣歌展眉時笑謔今春除御史前月之東洛别來未開顔塵埃滿尊杓蕙風晚香盡槐雨餘花落秋意一蕭條離容兩寂寞况隨白日老共負青山約誰識相念心鞲鷹與籠鶴春暮寄元九梨花結成實燕卵化為雛時物又若此道情復何如但覺日月促不嗟年歲徂浮生都是夢老小亦何殊唯與故人别江陵初謫居時時一相見此意未全除早梳頭夜沐早梳頭窗明秋鏡曉颯然握中髮一沐知一少年事漸蹉跎世緣方繳繞不學空門法老病何由了未得無生心白頭亦為夭出關路山川函谷路塵土遊子顔蕭條去國意秋風生故關别舍弟後月夜悄悄初别夜去住兩盤桓行子孤燈店居人明月軒平生共貧苦未必日成歡及此暫為别懷抱已憂煩况是庭葉盡復思山路寒如何為不念馬瘦衣裳單新豐路逢故人塵土長路晚風煙廢宫秋相逢立馬語盡日此橋頭知君不得意鬱鬱來西遊惆悵新豐店何人識馬周金鑾子晬日晬將遂切子生一歲曰晬行年欲四十有女曰金鑾生來始周歲學坐未能言慙非達者懷未免俗情憐從此纍身外徒云慰目前若無夭折患則有婚嫁牽使我歸山計應遲十五年立名按雲仙雜記樂天女金鑾十歲忽書北山移文示家人樂天方買終南紫石欲開文士傳遂輟以勒之青龍寺早夏塵埃經小雨地髙倚長坡日西寺門外景氣含清和間有老僧立靜無凡客過殘鶯意思盡新葉隂涼多春去來幾日夏雲忽嵳峩朝朝感時節年鬢暗蹉跎胡為戀朝市不去歸煙蘿青山寸步地自問心如何秋題牡丹叢晚叢白露夕衰葉涼風朝紅豔久已歇碧芳今亦銷幽人坐相對心事共蕭條勸酒寄元九薤葉有朝露槿枝無宿花君今亦如此促促生有涯既不逐禪僧林下學楞伽又不隨道士山中煉丹砂百年夜分半一歲春無多何不飲美酒胡然自悲嗟俗號消愁藥神速無以加一杯驅世慮兩杯反天和三杯即酩酊或笑任狂歌陶陶復兀兀吾孰知其他况在名利途平生有風波深心藏陷穽巧言織網羅舉目非不見不醉欲如何曲江感秋五年作沙草新雨地岸栁涼風枝三年感秋思併在曲江池早蟬已嘹唳晚荷復離披前秋去秋思一一生此時昔人三十二秋興已云悲我今欲四十秋懷亦可知歲月不虛設此身隨日衰暗老不自覺直到鬢成絲酬張太祝晚秋卧病見寄髙才淹禮寺短羽翔禁林西街居處逺北闕官曹深君病不來訪我忙難往尋差池終日别寥落經年心露濕緑蕪地月寒紅樹隂况兹獨愁夕聞彼相思吟上歎言一作言歡笑阻下嗟時歲侵容衰曉窗鏡思苦秋絃琴一章錦繡段八韻瓊瑶音何以報珍重慚無雙南金立秋日曲江憶元九下馬栁隂下獨上隄上行故人千萬里新蟬三兩聲城中曲江水江上江陵城兩地新秋思應同此日情早朝賀雪寄陳山人長安盈尺雪早朝賀君喜將赴銀臺門始出新昌里上堤馬蹄滑中路蠟燭死十里向北行寒風吹破耳待漏午門外候對三殿裏鬚鬢凍生冰衣裳冷如水忽思仙遊谷暗謝陳居士暖覆褐裘眠日髙應未起初與元九别後忽夢見之及寤而書適至兼寄桐花詩悵然感懷因以此寄元九初謫江陵永夀寺中語新昌坊北分歸來數行淚悲事不悲君悠悠藍田路自去無消息計君食宿程已過商山北昨夜雲四散千里同月色曉來夢見君應是君相憶夢中握君手問君意何如君言苦相憶無人可寄書覺來未及説叩門聲冬冬言是商州使送君書一封枕上忽驚起顛倒著衣裳開緘見手扎一紙十三行上論遷謫心下説離别腸心腸都未盡不暇敘炎涼云作此書夜夜宿商州東獨對孤燈坐陽城山館中夜深作書畢山月向西斜月下何所有一樹紫桐花桐花半落時復道正相思殷勤書背後兼寄桐花詩桐花詩八韻思緒一何深以我今朝意想君此夜心一章三遍讀一句十回吟珍重八十字字字化為金和元九悼往感舊蚊㡡作美人别君去自去無處尋舊物零落盡此情安可任唯有襭紗幌塵埃日夜侵馨香與顔色不似舊時深透影燈耿耿籠光月沉沉中有孤眠客秋涼生夜衾舊宅牡丹院新墳松柏林夢中咸陽淚覺後江陵心含此隔年恨發為中夜吟無論君自感聞者欲沾襟重到渭上舊居舊居清渭曲開門當蔡渡十年方一還幾欲迷歸路追思昔日行感傷故遊處插栁作髙林種桃成老樹因驚成人者盡是舊童孺試問舊老人半為繞村墓浮生同過客前後遞來去白日如弄珠出沒光不住人物日改變舉目悲所遇回念念我身安得不衰暮朱顔銷不歇白髮生無數唯有山門外三峰色如故白髮白髮知時節暗與我有期今朝日陽裏梳落數莖絲家人不慣見憫默為我悲我云何足怪此意爾不知凡人年三十外壯中已衰但思寢食味已減二十時况我今四十本來形貌羸書魔昏兩眼酒病沉四肢親愛日零落在者仍别離身心久如此白髮生已遲由來生老死三病長相隨除却念無生人間無藥治秋日池殘寥落水窗下悠揚日嫋嫋秋風多槐花半成實下有獨立人年來四十一將之饒州江浦夜泊明月滿深浦愁人卧孤舟煩寃寢不得夏夜長於秋苦乏衣食資逺為江海遊光隂坐遲暮鄉國行阻修身病向鄱陽家貧寄徐州前事與後事豈堪心併憂憂來起長望但見江水流雲樹藹蒼蒼煙波淡悠悠故園迷處所一念堪白頭思歸時初為校書郎養無晨昏膳隱無伏臘資遂求及親祿僶俯來京師薄俸未及親别家已經時冬積溫席戀春違采蘭期夏至一隂生稍稍夕漏遲塊然抱愁者長夜獨先知悠悠鄉關路夢去身不隨坐惜時節變蟬鳴槐花枝冀城北原作野色何莽蒼去聲秋聲亦蕭疏風吹黃埃起落日驅征車何代此開國封疆百里餘古今不相待朝市無常居昔人城邑中今變為丘墟昔人墓田中今化為里閭廢興相催迫日月互居諸世變無遺風焉能知其初行人千載後懷古空踟蹰客路感秋寄明凖上人日暮天地冷雨霽山河清長風從西來草木凝秋聲已感歲倐忽復傷物凋零孰能不憯悽天時牽人情借問空門子何法易修行使我忘得心不教煩惱生遊襄陽懷孟浩然楚山碧岩岩漢水碧湯湯秀氣結成象孟氏之文章今我諷遺文思人至其鄉清風無人繼日暮空襄陽南望鹿門山藹若有餘芳舊隱不知處雲深樹蒼蒼秋暮西歸途中書情耿耿旅燈下愁多常少眠思鄉貴早發發在雞鳴前九月草木落平蕪連逺山秋隂和曙色萬木蒼蒼然去秋偶東遊今秋始西旋馬瘦衣裳破别家來二年憶歸復愁歸歸無一囊錢心雖非蘭膏安得不自燃秋懷月出照北堂光華滿階墀涼風從西至草木日夜衰桐栁減緑隂蕙蘭消碧滋感物私自念我心亦如之安得長少壯盛衰迫天時人生如石火為樂長苦遲别楊頴士盧克柔殷堯藩倦鳥暮歸林浮雲晴歸山獨有行路子悠悠不知還人生苦營營終日羣動間所務雖不同同歸於不間扁舟來楚鄉匹馬往秦關離憂繞心曲宛轉如循環且持一杯酒聊以開愁顔題贈定光上人二十身出家四十心離塵得徑入大道乘此不退輪一坐十五年林下秋復春春花與秋氣不感無情人我來如有悟潛以心照身誤落聞見中憂喜傷形神安得遺耳目冥然反天真祇役駱口驛喜蕭侍御書至兼覩新詩吟諷通宵因寄八韻時為盩厔尉日暮心無憀吏役正營營忽驚芳信至復與新詩并是時天無雲山館有月明月下讀數遍風前吟一聲一吟三四歎聲盡有餘清雅哉君子文詠性不詠情使我靈府中鄙吝不得生始知聽韶濩可使心和平酬李少府曹長官舍見贈低腰復斂手心體不遑安一落風塵下始一作方知為吏難公事與日長宦情隨歲闌惆悵青袍袖藝香無半殘賴有李夫子此懷聊自寬兩心如止水彼此無波瀾往往簿書暇相勸強為歡白馬晚踏雪緑觴春暖寒戀月夜同宿愛山晴共看野性自相近不是為同官留别秋涼卷朝簟春暖撤夜衾雖是無情物欲别尚沉吟况與有情别别隨情淺深二年歡笑意一旦東西心獨留誠可念同行力不任前事詎能料後期諒難尋唯有潺湲淚不惜共沾襟曉别曉鼓聲已半離筵坐難久請君斷腸歌送我和淚酒月落欲明前馬嘶初别後浩浩暗塵中何由見回首北園北園東風起雜花次第開心知須臾落一日三四來花下豈無酒欲酌復遲回所思眇千里誰勸我一杯惜栯李花花細而繁色豔而黯亦花中之有思者速衰易落故惜之耳樹小花鮮妍香繁條軟弱髙低二三尺重疊千萬萼朝豔藹霏霏夕凋紛漠漠辭枝朱粉細覆地紅綃薄由來好顔色常苦易銷爍不見莨蕩花狂風吹不落照鏡皎皎青銅鏡斑斑白絲鬢豈復更藏年實年君不信新秋西風飄一葉庭前颯巳涼風池明月水衰蓮白露房其奈江南夜綿綿自此長夜雨早蛩啼復歇殘燈滅又明隔窗知夜雨芭蕉先有聲秋江送客秋鴻次第過哀猿朝夕聞是日孤舟客此地亦離羣濛濛潤衣雨漠漠冒帆雲不醉潯陽酒煙波愁殺人感逝寄逺寄通州元侍御果州崔員外澧州李舍人鳳州李郎中昨日聞甲死今朝聞乙死知識三分中二分化為鬼逝者不復見悲者長已矣存者今如何去我皆萬里平生知心者屈指能有幾通果澧鳳州眇然四君子相思俱老大浮世如流水應歎舊交遊凋零日如此何當一杯酒開眼笑相視秋月夜初色蒼然夜深光浩然稍轉西廊下漸滿南窗前况是緑蕪地復兹清露天落葉聲策策驚鳥影翩翩棲禽尚不穩愁人安可眠白香山詩集卷九
