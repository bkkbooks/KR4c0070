body:
  text: 白香山詩集卷十六歙縣汪立名編長慶集十六律詩五言七言凡九十六首東南行一百韻寄通州元九侍御澧州李十一舍人果州崔二十二使君開州韋大員外庾三十二補闕杜十四拾遺李二十助教員外竇七校書南去經三楚東來過五湖山頭看候館水面問征途地逺窮江界天低接一作極海隅飄零同落葉浩蕩似乘桴漸覺鄉原異深知土俗殊夷音語嘲􅑜蠻態笑睢盱水市通闤闠煙村混舳艫吏徴魚户稅人納火田租亥日饒蝦蟹寅年足虎貙成人男作丱事鬼女為巫樓暗攢倡婦隄喧簇販夫夜船論鋪賃春酒斷瓶沽見果皆盧橘聞禽悉鷓鴣山歌猿獨呌野哭鳥相呼嶺徼雲成棧江郊水當郛月移翹柱鶴風泛颭檣烏鼇礙潮無信蛟驚浪不虞鼉鳴江擂鼓唇氣海浮圖樹裂山魈穴沙含水弩樞喘牛犁紫芋羸馬放青菰繡面誰家婢鴉頭幾嵗奴泥中采菱芡燒後拾樵蘇鼎膩愁烹鱉盤腥厭膾鱸鍾儀徒戀楚張翰浪思吳氣序涼還熱光隂旦復晡身方逐萍梗年欲近桑榆渭北田園廢江西嵗月徂憶歸恆慘淡懷舊忽踟蹰自念咸秦客嘗為鄒魯儒藴藏經國術輕棄度關繻賦力凌鸚鵡詞鋒敵轆轤戰文重掉鞅射䇿一彎弧崔杜鞭齊下元韋轡並驅名聲逼揚馬交分過蕭朱世務輕磨揣周行竊覬覦風雲皆會合雨露各霑濡共偶一作遇升平代偏慙固陋軀承明連夜直建禮拂晨趨美服頒王府珍羞降御厨議髙通白虎諫切伏青蒲柏殿行陪宴花樓走看酺神旗張鳥獸天籟動笙竽戈劒星芒耀魚龍電䇿驅定場排越妓一作漢旅促坐進吳歈縹眇疑仙樂嬋娟勝畫圖歌鬟低翠羽舞汗墮紅珠别選間遊伴潛招小飲徒一杯愁已破三盞氣彌粗軟美仇家酒幽間葛氏姝十千方得斗二八正當壚論笑杓胡硉談憐鞏囁嚅李酣尤短竇庾醉更蔫迂鞍馬呼教住骰盤喝遣輸長驅波卷白連擲采成盧骰盤卷白波莫走鞍馬皆當時酒令籌併頻逃席觥嚴别置盂滿巵那可灌頽玉不勝扶入視中樞草歸乘內廄駒醉曾衝宰相驕不揖金吾日近恩雖重雲髙勢却孤翻身落霄漢失腳到泥塗博望移門籍潯陽佐郡符豫自大子贊善大夫出為江州司馬時情變寒暑世利算錙銖望日辭雙闕明朝别九衢播遷分郡國次第出京都十年春微之移佐通州其年秋豫出佐潯陽明年冬杓直出牧澧州崔二十二出牧果州韋大出牧開州秦嶺馳三驛商山上二邘商山險道中有東西二邘峴陽亭寂寞夏口路﨑嶇大道全生棘中丁盡執殳江關未撤警淮冦尚稽誅時淮西未平路經襄鄂二州界所見如此林對東西寺山分大小姑東林西林寺在廬山北大姑小姑在廬山南彭蠡湖中廬峰蓮刻削湓水帶縈紆蓮花峰在廬山北湓水在江城南何遜詩云湓城對湓水湓水縈如帶九派吞青草潯陽江九派南通青草洞庭湖孤城覆緑蕪南方城壁多以草覆黃昏鐘寂寂清曉角嗚嗚春色辭門栁秋聲到井梧殘芳悲鶗鴂音啼決見楚詞暮節感茱萸蕊拆金英菊花飄雪片蘆波紅日斜沒沙白月平鋪幾見林抽筍頻驚燕引雛嵗華何倐忽年少不須臾眇默思千古蒼茫想八區孔窮緣砥事顔夭有何辜龍智猶經醢龜靈未免刳窮通應已定聖哲不能踰況我身謀拙逢他厄運拘漂流隨大海鎚煆任洪爐險阻嘗之矣栖遲命也夫沈冥消意氣窮餓耗肌膚防瘴和殘藥迎寒補舊襦書牀鳴蟋蟀琴匣網蜘蛛貧室如懸磬端憂劇守株時遭人指點一作客答難數被鬼揶揄兀兀都疑夢昏昏半似愚女驚朝不起妻怪夜長吁萬里拋一作離朋侣一作執三年隔友于自然悲聚散不是恨榮枯去夏微之瘧今春席八殂天涯書達否泉下哭知無去年聞元九瘴瘧書去競未報今春聞席八殁久與還往能無慟哭謾寫詩盈卷一作軸空盛酒滿壺只添新悵望豈復舊歡娛壯志因愁減衰容與病俱相逢應不識滿頷白髭鬚立名按洪氏隆與職方乘嶺南村落有市謂之虛以其不常會多虛日也西蜀曰痰言如痰疾間而後作江南惡以疾稱因止曰亥獨徐筠水志云荆吳俗以寅申已亥日集於市觀公詩用亥日甚多則徐氏之説為是初到江州寄翰林張李杜三學士早攀霄漢上天衢晚落風波委世途雨露施恩無厚薄蓬蒿隨分有榮枯傷禽側翅驚弓箭老婦低顔事舅姑碧落三仙曾識面年深記得姓名無庾樓曉望獨憑朱檻立凌晨山色初明水色新竹霧曉籠銜嶺月蘋風暖送過江春子城隂處猶殘雪衙鼓聲前未有塵三百年來庾樓上曾經多少望鄉人宿西林寺木落天晴山翠開愛山騎馬入山來心知不及柴桑令一宿西林便欲一作却回柴桑令劉遺民也立名按侯鯖録云近見士子多使柴桑令為陶淵明不知劉遺民曽作柴桑令也江樓宴别樓中别曲催離酌燈下紅裙間緑袍縹眇楚風羅綺薄錚鏦越調管絃髙寒流帶月澄如鏡夕吹和霜利似刀尊酒未空歡未盡舞腰歌袖莫辭勞題山石榴花一叢千朵壓闌干剪碎紅綃却作團風嫋舞腰香不盡露銷妝臉淚初乾薔薇帶刺攀應懶菡蓞生泥玩亦難爭及此花簷户下任人採弄盡去聲人看代春贈山吐晴嵐水放光辛夷花白栁梢黃但知莫作江西意風景何曾異帝鄉答春草煙低重水花明從道風光似帝京其奈山猿江上呌故鄉無此斷腸聲櫻桃花下歎白髮逐處花皆好隨年貌自衰紅櫻滿眼日白髮半頭時倚樹無言久攀條欲放遲臨風兩堪歎如雪復如絲惜落花贈崔二十四漠漠紛紛不奈何狂風急雨兩相和晚來悵望君知否枝上稀疏地上多移山櫻桃亦知官舍非吾宅且斸山櫻滿院栽上佐近來多五考少應四度見花開官舍間題職散優間地身慵老大時送春惟有酒銷日不過棊祿米麞牙稻園蔬鴨腳葵飽餐仍晏起餘暇弄龜兒龜兒即小姪名晚春登大雲寺南樓贈常禪師花盡頭新白登樓意若何嵗時春日少世界苦人多愁醉非因酒悲吟不是歌求師治此病惟勸讀楞伽北樓送客歸上都憑髙送遠一悽悽却下朱欄手共一作即解攜京路人歸天直北江樓客散日平西長津欲渡回船尾殘酒重傾簇馬蹄不獨别君須強飲窮愁自要醉如泥北亭招客疏散郡丞同野客幽間官舍抵山家春風北户千莖竹晚日東園一樹花小盞吹醅嘗冷酒深爐敲火炙新茶能來盡日宮棊否太守知慵放晚衙宿西林寺早赴東林滿上人之會因寄崔二十二員外謫辭魏闕鵷鸞隔老入廬山麋鹿隨薄暮蕭條投寺宿凌晨清淨與僧期雙林我起聞鐘後隻日君趨入閣時鵬鷃髙低分皆定莫勞心力遠相思遊寶稱寺竹寺初晴日花塘欲晚一作曉春野猿疑弄客山鳥似呼人酒嫩傾金液茶新碾玉塵可憐幽靜地堪寄老慵身早春聞提壺鳥因題鄰家厭聽秋猿催下淚喜聞春鳥勸提壺誰家紅樹先花發何處青樓有酒沽進士粗豪尋靜盡拾遺風采近都無欲期明日東鄰醉變作騰騰一俗夫見紫薇花憶微之一叢暗淡將何比淺碧籠裙襯紫巾除却微之見應愛人間少有别花人薔薇花一叢獨死不知其故因有是篇柯條未嘗損根蕟不曾移同類今齊茂孤芳忽獨萎仍憐委地日正是帶花時碎碧初凋葉燋紅尚戀枝乾坤無厚薄草木自榮衰欲問因何事春風亦不知湖亭望水久雨南湖漲新晴北客過日沉紅有影風定緑無波岸沒閭閻少灘平船舫多可憐心賞處其奈獨遊何間遊外事因慵廢中懷與靜期尋泉上山遠看筍出林遲白石磨樵斧青竿理釣絲澄清深淺好最愛夕陽時憶微之傷仲遠李三仲遠去年春喪幽獨辭群久漂流去國賖只將琴作伴惟以酒為家感逝因看水傷離為見花李三埋地底元九謫天涯舉眼青雲遠回頭白日斜可能勝賈誼猶自滯長沙過鄭處士聞道移居村塢間竹林多處獨開關故來不是求他事暫借南亭一望山霖雨苦多江湖暴漲塊然獨望因題北亭自作潯陽客無如苦雨何隂昏晴日少間悶睡時多湖闊將天合雲低與水和籬根舟子語巷口釣人歌霧島沉黃氣風帆蹙白波門前車馬道一宿變江河春末夏初間遊江郭二首間出乘輕屐徐行踏軟沙觀魚傍湓浦看竹入楊家湓浦多魚浦西有楊侍郎宅多好竹林迸穿籬筍藤飄落水花雨埋釣舟小風揚酒旗斜嫩剝青菱角濃煎白茗芽淹留不知夕城樹欲栖鴉栁影繁初合鶯聲澀漸稀早梅迎夏結殘絮送春飛西日韶光盡南風暑氣微展張新小簟尉帖舊生衣緑蟻杯香嫩紅絲鱠縷肥故園無此味何必苦思歸紅藤杖杖出南蠻南詔紅藤杖西江白首人時時攜步月處處把尋春徑健孤莖直疏圓六節勻火山生處遠瀘水洗來新粗細才盈手髙低僅過身天邊望鄉客何日拄歸秦風雨中尋李十一因題船上匹馬來郊外扁舟在水濱可憐衝雨客來訪阻風人小榼沽清醑行厨煮白鱗停杯看栁色各憶故園春題廬山山下湯泉一眼湯泉流向東浸泥澆草暖無功驪山溫水因何事流入金鋪玉甃中寄蘄州簟與元九因題六韻時元九鰥居笛竹出蘄春霜刀劈翠筠織成雙鎖簟寄與獨眠人卷作筒中信舒為席上珍滑如鋪薤葉冷似卧龍鱗清潤宜乘露鮮華不受塵通州炎瘴地此物最關身秋熱西江風候接南威暑氣常多秋氣微猶道江州最涼冷至今九月著生衣題元八溪居溪風漢漠樹重重水檻山窗次苐逢晚葉尚開紅躑躅秋房初結白芙蓉聲來枕上千年鶴影落杯中五老峰更愧殷勤留客意魚鮮飯細酒香濃晚出西郊散吏間如客貧州冷似村早涼湖北岸殘照郭西門懶鑷從鬚白休治平聲一作醫任眼昏老來何所用少興不多言階下蓮葉展影翻當砌月花開香散入簾風不如種在天池上猶勝生於野水中端居詠懷賈生俟罪心相似張翰思歸事不如斜日早知驚鵩鳥秋風悔不憶鱸魚胸襟曾貯匡時䇿懷袖猶殘諫獵書從此萬緣都擺落欲㩦妻子買山居夜宿江浦聞元八改官因寄此什君遊丹陛已三遷我泛滄浪欲二年劒珮曉趨雙鳯闕煙波夜宿一漁船交親盡在青雲上鄉國遙拋白日邊若報生涯應笑殺結茅栽芋種畬田立名按元八即元宗簡也英華作元九是誤以為微之耳公佐江州元九方在通州及移虢州與白公忠州同除安得所謂劒珮曉趨雙鳯闕耶百花亭朱檻在空虛涼風八月初山形如峴首江色似桐廬佛寺乘船入人家枕水居髙亭仍有月今夜宿何如江樓早秋南國雖多熱秋來亦不遲湖光朝霽後竹氣晚涼時樓閣宜佳客江山入好詩清風水蘋葉白露木蘭枝欲作雲泉計須營伏臘資匡廬一步地官滿更何之送客之湖南年年漸見南方物事事堪傷北客情山鬼趫跳惟一足峽猿哀怨過三聲帆開青草湖中去衣濕黃梅雨裏行别後雙魚難定寄近來潮不到湓城百花亭晚望夜歸百花亭上晚徘徊雲景隂晴掩復開日色悠揚映山盡雨聲蕭颯渡江來鬢毛遇病雙如雪心緒逢秋一似灰向夜欲歸愁未了滿湖明月小船回西樓小郡大江邊危樓夕照前青蕪卑濕地白露泬寥天鄉國此時阻家書何處傳仍聞陳蔡戍轉戰已三年尋李道士山居兼呈元明府盡日行還歇遲遲獨上山攀藤老筋力照水病容顔陶巷招居住茅家許往還飽諳榮辱事無意戀人間四十五行年四十五兩鬢半蒼蒼清瘦詩成癖粗豪酒放狂老來尤委命安處即為鄉或擬廬山下來春結草堂寄李相公崔侍郎錢舍人曽陪鶴馭兩三仙親侍龍輿四五年天上歡娛春有限世間漂泊海無邊榮枯事過都成夢憂喜情忘便是禪官滿更歸何處去香爐峰在宅門前廳前桂天台嶺上凌霜樹司馬廳前委地叢一種不生明月裏山中猶校勝塵中尋王道士藥堂因有題贈行行覔路緣松嶠步步尋花到杏壇白石先生小有洞黃芽姹女大還丹常悲東郭千家冢欲乞西山五色丸但恐長生須有籍仙臺試為檢名看南浦嵗暮對酒送王十五歸京臘後冰生覆湓水夜來雲暗失廬山風飄細雪落如米索索蕭蕭蘆葦間此地二年留我住今朝一酌送君還相看漸老無過醉聚散窮通總是間除夜薄晚支頤坐中宵枕臂眠一從身去國再見日周天老度江南嵗春拋渭北田潯陽來早晚明日是三年聞李十一出牧澧州崔二十二出牧果州因寄絶句平生相見即睂開靜念無如李與崔各是天涯為刺史緣何不覔九江來元和十二年按淮西平于十二年十月時本作十三年誤淮冦未平詔停嵗仗憤然有感率爾成章聞停嵗仗軫皇情應為淮西冦未平不分氣從歌裏發無明心向酒中生愚計忽思飛短檄狂心便欲請長纓從來妄動多如此自笑何曾得事成庾樓新嵗嵗時銷旅貌風景觸鄉愁牢落江湖意新年上庾樓上香爐峰倚石攀蘿歇病身青笻竹杖白紗巾他時畫出廬山障便是香爐峰上人憶微之與君何日出屯蒙魚戀江湖鳥厭籠分手各拋滄海畔折腰俱老緑衫中三年隔闊音塵斷兩地飄零氣味同又被新年勸相憶栁條黃軟欲春風雨夜贈元十八卑濕沙頭宅連隂雨夜天共聽簷溜滴心事兩悠然把酒循環飲移牀曲尺眠莫言非故舊相識已三年寒食江畔草香沙暖水雲晴風景令人憶帝京還似往年春氣味不宜今日病心情聞鶯樹下沈吟立信馬江頭取次行忽見紫桐花悵望下邽明日是清明三月三日登庾樓寄庾三十二三日歡遊辭曲水二年愁卧在長沙每登髙處長相憶何况兹樓屬庾家聞李六景儉自河東令授唐鄧行軍司馬以詩賀之誰能淮上靜風波聞道河東應此科不獨文詞供奏記定將談笑解兵戈泥埋劒戟終難久水借蛟龍可在多四十著緋軍司馬男兒官職未蹉跎石楠樹可憐顔色好隂涼葉剪紅箋花撲霜繖蓋低垂金翡翠薰籠亂搭繡衣裳春芽細炷千燈焰夏蕊濃焚百和香見説上林無此樹只教桃栁占年芳栁一作李大林寺桃花人間四月芳菲盡山寺桃花始盛開長恨春歸無覔處不知轉入此中來附遊大林寺序余與河南元集虛范陽張允中南陽張深之廣平宋郁安定梁必復范陽張時東林寺沙門法演智滿士堅利辨道建神照雲皋息慈寂然凡十七人自遺愛草堂厯東西二林抵化城憩峰頂登香爐峰宿大林寺大林窮逺人迹罕到環寺多清流蒼石短松瘦竹寺中惟板屋木器其僧皆海東人山髙地深時節絶晚於時孟夏月如正二月天梨桃始華澗草猶短人物風候與平地聚落不同初到恍然若别造一世界者因口號絶句既而周覽屋壁見蕭郎中存魏郎中𢎞簡李補闕渤三人姓名詩句因與集虛輩歎且曰此地實匡廬間第一境由驛路至山門曽無半日程自蕭魏李遊逮今垂二十年寂寥無繼來者嗟乎名利之誘人也如此時元和十二年四月九日樂天記詠懷自從委順任浮沉漸覺一作學年多功用深面上滅除憂喜色胸中消盡是非心妻兒不問惟耽酒冠帶皆慵只抱琴長笑靈均不知命江蘺叢畔苦悲吟早發楚城驛過雨塵埃滅沿江道徑平月乘殘夜出人趂早涼行寂厯間吟動冥濛暗思生荷塘翻露氣稻壟㵼泉聲宿犬聞鈴起栖禽見火驚曨曨煙樹色十里始天明立名按太平寰宇記貞觀八年廢楚城縣歸潯陽詳其地即舊屬柴桑又云按圖經晉建興元年始立郡領潯陽柴桑彭澤上甲九江等五縣則潯陽柴桑各有其地自後併潯陽入柴桑後廢柴桑為潯陽於是潯陽柴桑合一縣而名異箬峴東池箬峴亭東有小池早荷新荇緑參差中宵把火行人發驚起雙棲白鷺鷥建昌江建昌江水縣門前立馬教人喚渡船忽似往年歸蔡渡草風沙雨渭河邊哭從弟傷心一尉便終身叔母年髙新婦貧一片緑衫消不得腰金拖紫是何人香爐峰下新卜山居草堂初成偶題東壁五架三間新草堂石階桂柱竹編牆南簷納日冬天暖北户迎風夏月涼灑砌飛泉才有點拂窗斜竹不成行來春更葺東廂屋紙閣蘆簾著孟光重題喜入山林初息影厭趨朝市久勞生早年薄有煙霞志嵗晚深諳世俗情已許虎溪雲裏卧不爭龍尾道前行從兹耳界應清淨免聽啾啾毁譽聲長松樹下小溪頭斑鹿胎巾白布裘藥圃茶園為産業野麋林鶴是交遊雲生澗户衣裳潤嵐隱山厨火燭幽最愛一泉新引得清泠屈曲繞階流日髙睡足猶慵起小閣重衾不怕寒遺愛寺泉一作鐘欹枕聽香爐峰雪撥簾看匡廬便是逃名地司馬仍為送老官心泰身寧是歸處故鄉可獨在長安宦途自此心長别世事從今口不言豈止形骸同土木兼將壽天任乾坤胸中壯氣猶須遣身外浮雲一作榮何足論還有一條遺恨事髙家門館未酬恩山中問月為問長安月誰教不相思必切離昔隨飛蓋處今照入山時借助秋懷曠留連夜卧遲如歸舊鄉國似對好親知松下行為伴溪頭坐有期千巖將萬壑無處不相隨立名按老學菴筆記世多言樂天用相字多從俗語作思必切如為問長安月如何不相離是也然北人大抵以相字作入聲至今猶然不獨樂天老杜云恰是春風相欺得夜來吹折數枝花亦從俗聲讀乃不失律俗謂南人入京師效北語過相藍輒讀其榜曰大厮國寺傳以為笑正月十五日夜東林寺學禪偶懷藍田楊主簿因呈智禪師新年三五東林夕星漢迢迢鐘梵遲花縣當君行樂夜松房是我坐禪時忽看月滿還相憶始歎春來自不知不覺定中微念起明朝更問鴈門師臨水坐昔為東掖垣中客今作西方社內人手把楊枝臨水坐間思往事似前身山居山齋方獨往塵事莫相仍藍輿辭鞍馬緇徒換友朋朝餐惟藥菜夜伴只紗燈除却青衫在其餘便是僧遺愛寺弄石臨溪坐尋花繞寺行時時聞鳥語處處是泉聲山中與元九書因題書後附與微之書四月十日夜樂天白微之微之不見足下面已三年矣不得足下書欲二年矣人生幾何離闊如此况以膠漆之心置於胡越之身進不得相合退不得相忘牽攣乖隔各欲白首微之微之如何如何天實為之謂之奈何僕初到潯陽時有熊孺登來得足下前年病甚時一札上報疾狀次序病心終論平生交分且云危惙之際不暇及他惟收數帙文章封題其上曰他日送達白二十二郎便請以代書悲哉微之於我也其若是乎又睹所寄聞僕左降詩云殘燈無焰影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒窗此句他人尚不可聞况僕心哉至今每吟猶惻惻耳且置是事略敘近懷僕自到九江巳涉三載形骸且健方寸甚安下至家人幸皆無恙長兄去夏自徐州至又有諸院孤小弟妹六七人提挈同來頃所牽念者今悉置在目前得同寒暖飢飽此一泰也江州風候稍涼地少瘴癘乃至蛇虺蚊蚋雖有甚稀湓魚頗肥江酒極美其餘食物多類北地僕門內之口雖不少司馬之俸雖不多量入儉用亦可自給身衣口食且免求人此二泰也僕去年秋始遊廬山到東西二林間香爐峰下見雲水泉石勝絶第一愛不能捨因置草堂前有喬松十數株修竹千餘竿青蘿為墻垣白石為橋道流水周於舍下飛泉落於簷間紅榴白蓮羅生池砌大抵若是不能殫記每一獨往動彌旬日平生所好者盡在其中不惟忘歸可以終老此三泰也計足下久不得僕書必加憂望今故録三泰以先奉報其餘事况條寫如後云云微之微之作此書夜正在草堂中山窗下信手把筆隨意亂書封題之時不覺欲曙舉頭但見山僧一兩人或坐或睡又聞山猿谷鳥哀鳴啾啾平生故人去我萬里瞥然塵念此際暫生餘習所牽便成三韻云微之微之此夕我心君知之乎樂天頓首憶昔封書與君夜金鑾殿後欲明天今夜封書在何處廬山菴裏曉燈前籠鳥檻猿俱未死人間相見是何年立名按此詩乃七言小律也事文類聚白氏金針有扇對謂第一句對第三句二句對四句也梅聖俞作續金針引詩云昔時花下留連飲暖日夭桃鶯亂吟今日江邊容易别淡煙衰草馬嘶頻正同此格黃石巖下作久别鵷鸞侣深隨鳥獸群教他遠親故何處覔知聞昔日青雲意今移向白雲戲贈李十三判官垂鞭相送醉醺醺遙見廬山指似君想君初覺從軍樂未愛香爐峰上雲醉中戲贈鄭使君時使君先歸留妓樂重飲密座移紅毯酡顔照緑杯雙娥留且住五馬任先回醉耳歌催醒愁睂笑引開平生少年興臨老暫重來江亭夕望憑髙望遠思悠哉晚上江亭夜未迥回日欲沒時紅浪沸月初生處白煙開辭枝雪蕊將春去滿鑷霜毛送老來爭敢三年作歸計心知不及賈生才酬元員外三月三十日慈恩寺相憶見寄悵望慈恩三月盡紫桐花落鳥關關誠知曲水春相憶其奈長沙老未還赤嶺猿聲催白首黃茅瘴色換朱顔誰言南國無霜雪盡在愁人鬢髮間中秋月英華作秋月萬里清光不可思添愁益一作足恨繞天涯誰人隴外久征戍何處庭前新别離失寵故姬歸院夜沒蕃老將上樓時照他幾許人腸斷玉兔銀蟾遠不知謝李六郎中寄新蜀茶故情周匝向交親新茗分張及病身紅紙一封書後信緑芽十片火前春湯添勺水煎魚眼末下刀圭攪麴塵不寄他人先寄我應緣我是别茶人立名按遁叟云火前寒食禁火之前也今世俗多用穀雨前茶稱為雨前學林新編茶之佳者造在社前其次火前其下則雨前攜諸山客同上香爐峰遇雨而還沾濡狼籍互相笑謔題此解嘲蕭灑登山去龍鍾遇雨回磴危攀薜荔石滑踐莓苔襪汙君相謔鞋穿我自咍莫欺泥土腳曾踏玉階來彭蠡湖晚歸彭蠡湖天晚桃花水氣春鳥飛千白點日沒半紅輪何必為遷客無勞是病身但來臨此望少有不愁人酬贈李鍊師見招幾年同諫直承明今日求真禮上清曾犯龍鱗容不死欲騎鶴背覔長生劉綱有婦仙同得伯道無兒纍更輕若許移家相近住便驅雞犬上層城西河雨夜送客雲黑雨翛翛江昏水暗流有風催解纜無月伴登樓酒罷無多興帆開不少留惟看一點火遙認是行舟登西樓憶行簡每因樓上西南望始覺人間道路長礙日暮山青簇簇浸天秋水白茫茫風波不見三年面書信難傳萬里腸早晚東歸來下峽穩乘船舫過瞿唐羅子有女名羅子生來才兩春我今年已長日夜二毛新顧念嬌啼面思量老病身直應頭似雪始得見成人讀僧靈徹詩東林寺裏西廊下石片鐫題數首詩言句怪來還校别看名知是老湯師聽李士良琵琶人各賦二十八字聲似胡兒彈舌語愁如塞月恨邊雲間人暫聽猶睂斂可使和蕃公主聞昭君怨明妃風貌最娉婷合在椒房應四星只得當年備宮掖何曾專夜奉幃屏見疏從道迷圖畫知屈那教配虜庭自是君恩薄如紙一作命卑如紙薄不須一向恨丹青間吟自從苦學空門法銷盡平生種種心惟有詩魔降未得每逢風月一間吟戲問山石榴小樹山榴近砌栽半含紅萼帶花來爭知司馬夫人妬移到庭前便不開編集拙詩成一十五卷因題卷末戲贈元九李二十一篇長恨有風情十首秦吟近正聲每被老元偷格律元九向江陵日嘗以拙詩一軸贈行自後格變苦教短李伏歌行李二十嘗自負歌行近見豫樂府五十首默然心伕世間富貴應無分身後文章合有名莫怪氣粗言語大新排十五卷詩成湖上間望藤花浪拂一作沸紫葺條菰葉風翻緑剪刀間弄水芳生楚思時時合眼詠離騷白香山詩集卷十六
