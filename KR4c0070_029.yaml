body:
  text: 白香山詩集卷二十九歙縣汪立名編後集九律詩凡一百七首太和戊申歲大有年詔賜百寮出城觀稼謹書盛事以俟采詩清晨承詔命豐嵗閲田閭膏雨抽苗足涼風吐穗初早禾黃錯落晚稻緑扶疏好入詩家詠宜令史館書散為萬姓食堆作九年儲莫道如雲稼今秋雲不如贈悼懷太子挽歌辭二首奉詔撰進竹馬書薨嵗銅龍表葬時永言窀穸事全用少陽儀壽夭由天命哀榮出聖慈恭聞褒贈詔軫念在與夷剪葉藩封早承華冊命尊笙歌辭洛苑風雪蔽梁園鹵簿凌霜宿銘旌向月翻宫寮不逮事哭送出都門雨中招張司業宿過夏衣香潤迎秋簟色鮮斜支花石枕臥詠蘂珠篇泥濘非遊日隂沈好睡天能來同宿否聽雨對牀眠和集賢劉學士早朝作吟君昨日早朝詩金御爐前喚仗時煙吐白龍頭宛轉扇開青雉尾參差暫留春一作書殿多稱屈合入綸闈即可知從此摩霄去非晚鬢間一作邊未有一莖絲送陜州王司馬建赴任建善詩者陜州司馬去何如養靜一作癖資貧兩有餘公事閒忙同少尹料錢多少敵尚書祗攜美酒為行伴唯一作獨作新詩趁下車自有一作得鐵牛無詠者料君投刃必應虛對琴待月竹院新晴夜松窗未臥時共琴為老伴與月有秋期玉軫臨風久金波出霧遲幽音待清景唯是我心知楊家南亭小亭門向月斜開滿地涼風滿地苔此一作北院好彈秋思處終須一夜抱琴來早寒黃葉聚牆角青苔圍柱根被經霜後薄鏡遇雨來昏半卷寒檐幕斜開暖閣門迎冬兼送老只仰酒盈尊齊月靜居病來心靜一無思老去身閒百不為忽忽眼塵猶愛睡些些口業尚誇詩葷腥每斷齊居月香火常親宴坐時萬慮消停百神泰唯應寂寞殺三尸宿裴相公興化池亭兼䝉借船舫遊泛林亭一出宿風塵忘却平津是要津松閣晴看山色近石渠秋放水聲新孫宏閣鬧無閒客傅說舟忙不借人何似掄才濟川外别開池館待交親和劉郎中望終南山秋雪遍覽古今集都無秋雪詩陽春先唱後隂嶺未消時草訝霜凝重松疑鶴散遲清光莫獨占亦一作還對白雲司廣府胡尚書頻寄詩因答絶句尚書清白臨南海雖飲貪泉心不回唯向詩中得珠玉時時寄到帝鄉來送鶴與裴相臨别贈詩司空愛爾爾須知不信聽吟乞鶴詩羽翮勢髙寧惜别稻粱恩重一作厚莫愁飢夜棲少一作莫共雞爭樹曉浴先饒鳯占池穩上青雲勿回顧的應勝在白家時令狐相公拜尚書後有喜從一作罷鎮歸朝之作劉郎中先和因以繼之車騎從新梁苑回履聲珮響入中臺鳯池望在終重去龍節功成且納來金勒最宜乘雪出玉觴何必待花開尚書首唱郎中和不計官資只計才送河南尹馮學士赴任石渠金谷中間路軒騎翩翩十日程清洛飲氷添苦節碧嵩看雪助髙情謾誇河北操旄鉞莫羡江西擁斾旌時新除二鎮節度何似府寮京令外别教三十六峰迎讀鄂公傳髙臥深居不見人功名斗藪似灰塵惟留一部清商樂月下風前伴老身烏夜啼城上歸時晚庭前宿處危月明無葉樹霜滑有風枝啼澀飢喉咽飛低凍翅垂畫堂鸚鵡鳥冷暖不相知鏡換杯欲將珠一作朱匣青銅鏡換取金尊白玉巵鏡裏老來無避處尊前愁至有消時茶能散悶為功淺萱縱忘憂得力遲不似杜康神用速十分一盞便開眉冬夜聞蟲蟲聲冬思苦於秋不解愁人聞亦愁我是老翁聽不畏少年莫聽白君頭雙鸚鵡緑衣整頓雙棲起紅觜分明對語時始覺琵琶絃莽鹵方知吉了舌參差鄭牛識字吾常歎諺云鄭元家牛觸牆成八字丁鶴能歌爾亦知若稱白家鸚鵡鳥籠中兼合解吟詩贈朱道士儀容白晳上仙郎方寸清虛內道場兩翼化生因服藥三尸餓死為休糧醮壇北向宵占斗寢室東開早納陽盡日窗間更無事惟燒一炷降真香昨以拙詩十首寄西川杜相公相公亦以新作十首惠然報示首數雖等工拙不倫重以一章用伸答謝詩家律手在成都權與尋常將相殊剪截五言兼用鉞陶鈞六義别開爐驚人卷軸須知有隨事文章不道無篇數雖同光價異十魚目換十驪珠和汴州令狐相公新於郡內栽竹百竿拆壁開軒旦夕對玩偶題七言五韻梁園修竹舊傳名園廢年深竹不生千畝荒涼尋未得百竿青翠種新成牆開乍見重添興窗靜時聞别有情煙葉䝉籠侵夜色風枝蕭颯欲秋聲更登樓望尤堪重千萬人家無一莖汴州人家並無竹重答汝州李六使君見和憶吳中舊遊五首為憶娃宫與虎邱玩君新作不能休蜀箋寫出篇篇好吳調吟時句句愁洛下林園終共住江南風月㑹重遊先與李六有此二句之約由來事過多堪惜何況蘇州勝汝州李前刺蘇州故有是句見殷堯藩侍御憶江南詩三十首詩中多敘蘇杭勝事余嘗典二郡因繼和之江南名郡數蘇杭寫在一作題寫殷家三十章君是旅人猶苦憶我為刺史更難忘境牽吟詠真詩國興入笙歌好醉鄉為念舊遊終一去扁舟直擬到滄浪聞新蟬贈劉二十八蟬發一聲時槐花帶兩枝只應催我老兼遣報君知白髮生頭速青雲入手遲無過一杯酒相勸數開睂贈王山人玉芝觀裏王居士服氣餐霞善養身夜後不聞龜喘息秋來唯長鶴精神容顔盡怪長如故名姓多疑不是真貴重榮華輕壽命知君悶見世間人和劉郎中學士題集賢閣朱閣青山髙庳齊與君才子作詩題傍聞大內笙歌近下視諸司屋舍低萬卷圖書天祿上一條風景月華西欲知丞相優賢意百步新廊不踏泥觀幻有起皆因滅無暌不暫同從歡終作戚轉苦又成空次第花生眼須臾燭過風更無尋覓處鳥迹印空中病假中龎少尹攜魚酒相過宦情牢落年將暮病假聯綿日漸深被老相催雖白首與春無分未甘心閒停茶碗從容語醉把花枝取次吟勞動故人龎閣老提魚攜酒逺相尋聽田順兒歌戛玉敲氷聲未停嫌雲不遏入青冥爭得黃金滿衫袖一時拋與斷年聽聽曹剛琵琶兼示重蓮撥撥絃絃意不同胡啼番語兩玲瓏誰能截得曹剛手插向重蓮衣袖中立名按韻語陽秋彈絲之法妙在左手脫右優而左劣亦何足論乎嘗觀琵琶録云元和中曹保有子善才善才有子剛皆能琵琶又有裴興奴長於攏撚時人謂剛有右手興奴有左手蓋攏撚在左手也剛劣于左手則琵琶之妙處逝矣惜乎樂天未知裴興奴手之妙也酬令狐相公春日尋花見寄六韻病卧帝王州花時不得遊老應隨日至春肯為人留粉壞杏將謝火繁桃尚稠白飄僧院地紅落酒家樓空裏雪相似晚來風不休吟君悵望句如到曲江頭和劉郎中曲江春望見示芳景多遊客衰翁獨在家肺傷妨飲酒眼痛忌看花寺路隨江曲官牆夾樹斜羡君猶壯健不枉度年華送東都留守令狐尚書赴任翠華黃屋未東巡碧洛青嵩付大臣地稱髙情多水竹山宜間望少風塵龍門即擬為遊客金谷先憑作主人歌酒家家花處處莫空管領上陽春立名按寶歷二年敬宗欲幸東都諫者皆不聽巳使按修宫闕賴裴度婉言而罷明年為文宗太和元年令狐楚以三年春留守東都故公首句及此蓋文宗方勵精圖治盡反敬宗弊政未東巡之語有微辭焉自題新昌居止因招楊郎中小飲地偏坊逺巷仍斜最近東頭是白家宿雨長齊鄰舍柳晴光照出夾城花春風小榼三升酒寒食深爐一碗茶能到南園同醉否笙歌隨分有些些南園試小樂小園斑駮花初發新樂錚鏦一作摐教欲成紅蕚紫房皆手植蒼頭碧玉盡家生髙調管色吹銀字慢拽歌詞唱渭城不飲一杯聽一曲將何安慰老心情和微之春日投簡陽明洞天五十韻青陽行巳半白日坐將徂越國强仍大稽城髙且孤利饒鹽煮海名勝水澄湖牛斗天垂象台明地展圖天台四明二山瓌竒填市井佳麗溢闉闍句踐遺風霸西施舊俗姝船頭龍夭矯橋腳獸睢盱鄉味珍蟛蚏時鮮貴鷓鴣語言諸夏異衣服一方殊搗練蛾睂婢鳴桹蛙角奴江清敵伊洛山翠勝荆巫華表雙棲鶴聯檣幾㸃烏煙波分渡口雲樹接城隅澗逺松如畫洲平水似鋪緑科秧早稻紫筍折新蘆暖踏泥中藕香尋石上蒲雨來萌盡達雷後蟄全蘇柳眼黃絲纇花房絳蠟珠林風新竹折野燒老桑枯帶嚲長枝蕙錢穿短貫榆暄和生野菜卑溼長街蕪女浣紗相伴兒烹鯉一呼山魈啼稚子林狖挂山都産業論蠶蟻孳生計鴨雛泉巖雪飄灑苔壁錦漫糊堰限舟航路堤通車馬途耶溪岸回合禹廟徑盤紆洞穴何因鑿星槎誰與刳石凹仙藥臼峰峭佛香爐去為投金簡來因挈玉壺貴仍招客宿健未要人扶聞望賢丞相儀形美丈夫前驅駐旌斾偏坐列笙竽刺史旟翻隼尚書履曳鳬學禪超後有觀妙造虛無髻裏傳僧寶環中得道樞登樓詩八詠置研賦三都捧擁羅將綺趨蹌紫與朱廟謨藏稷卨兵略貯孫吳令下三軍整風髙四海趨千家得慈母六郡事嚴姑重士過三哺輕財抵一銖送觥歌宛轉嘲妓笑盧胡佐飲時炮鱉蠲酲數膾鱸醉鄉雖咫尺樂事亦須臾若不中賢聖何由外智愚伊豫一生志我爾百年軀江上三千里城中十二衢出多無伴侣歸只對妻孥白首青山約抽身去得無酬鄭侍御多雨春空過詩三十韻次用本韻南雨來多滯東風動即狂月行離畢急龍走召雲忙鬼轉雷車響蛇騰電䇿光浸淫天似漏沮洳地成瘡慘淡隂煙白空濛宿霧黃暗遮千里目悶結九回腸寂寞羈臣館深沈思婦房鏡昏鸞滅影衣潤麝消香蘭溼難紉珮花凋易落妝霑黃鶯翅重滋緑草心長紫陌皆泥濘黃汚共渺茫恐霖成怪沴望霽劇禎祥楚柳腰肢嚲湘筠涕淚滂晝昏疑是夜隂盛勝于陽居士巾皆墊行人蓋盡張跳蛙還屢出移蟻欲深藏端坐交遊廢閒行去步妨愁生垂白叟惱殺踏青娘變海常須慮為魚慎勿忘此時方共懼何處可相將此以下叙浙東政事巳望東溟禱仍封北户禳却思逢旱魃誰喜見商羊預怕為蠶病先憂作麥傷惠施應浹洽政豈假揄揚祀典修咸秩農書振滿牀丹誠期懇苦白日㑹昭彰賑廩賙飢户苫城備壞牆且當營歲事寧暇惜年芳德勝令災弭人安在吏良尚書心若此不枉繫金章和春深二十首按此亦和微之作見劉賔客詩小序何處春深好春深富貴家馬為中路鳥妓作後庭花羅綺驅論隊金銀用斷車眼前何所苦惟苦日西斜何處春深好春深貧賤家荒涼三徑草冷落四鄰花奴困歸傭力妻愁出賃車途窮平路險舉足劇褒斜何處春深好春深執政家鳯池添研水雞樹落衣花詔借當衢宅恩容上殿車延英開對久門與日西斜何處春深好春深方鎮家通犀排帶胯瑞鶴一作鶻勘袍花飛絮衝毬馬垂楊拂妓車戎裝拜春設左握寶刀斜何處春深好春深刺史家隂繁棠布葉岐秀麥分花五匹鳴珂馬雙輪畫軾車和風引行樂葉葉隼旟斜何處春深好春深學士家鳯書裁五色馬鬛剪三花蠟炬開明火銀臺賜物車相逢不敢揖彼此帽低斜何處春深好春深女學家慣看溫室樹飽識浴堂花御印提隨仗香箋把下車宋家宫樣髻一片緑雲斜何處春深好春深御史家絮縈驄馬尾蝶繞繡衣花破柱行持斧埋輪立駐車入班遙認得魚貫一行斜何處春深好春深遷客家一杯寒食酒萬里故園花炎瘴蒸如火光隂走似車為憂鵩鳥至只恐日光斜何處春深好春深經業家唯求太常第不管曲江花折桂名慙郤收螢志慕車官場泥補處最怕寸隂斜何處春深好春深隱士家野衣裁薜葉山飯曬松花蘭索紉幽珮蒲輪駐軟車林間箕踞坐白眼向人斜何處春深好春深漁父家松灣隨櫂月桃浦落船花投餌移輕楫牽輪轉小車蕭蕭蘆葉裏風起釣絲斜何處春深好春深潮户家濤翻三月雪浪噴四時花曳練馳千馬驚雷走萬車餘波落何處江轉富陽斜何處春深好春深痛飲家十分杯裏物五色眼前花餔啜眠糟甕流涎見麴車中山一沈醉千度日西斜何處春深好春深上已家蘭亭席上酒曲洛岸邊花弄水遊童棹湔裾小婦車齊橈爭渡處一匹錦標斜何處春深好春深寒食家玲瓏鏤雞子宛轉綵毬花碧草追遊騎紅塵拜掃車鞦韆細腰女搖曳逐風斜何處春深好春深博奕家一先爭破眼六聚鬭成花鼓應投壺馬兵衝象戲車彈棊局上事最妙是長斜何處春深好春深嫁女家紫排襦上雉黃帖鬢邊花轉燭初移障鳴環欲上車青衣傳氊褥錦繡一條斜何處春深好春深娶婦家兩行籠裏燭一樹扇間花賓拜登華席親迎障幰車催妝詩未了星斗漸傾斜何處春深好春深妓女家睂欺楊柳葉裙妬石榴花蘭麝熏行被金銅釘坐車杭州蘇小小人道最夭伊耶切斜詠家醖十韻􅍦醒從古笑靈均長醉如今斆伯倫舊法依稀傳自杜杜康新方要妙得于陳陳郎中岵傳受此法井泉王相資重九麴糵精靈用上寅水用九月九日麴用七月上寅釀糯豈勞炊范黍撇篘何假漉陶巾常嫌竹葉猶凡濁始覺榴花不正真甕揭開時香酷烈瓶封貯後味甘辛捧疑明水從空化飲似陽和滿腹春色洞玉壺無表裏光搖金盞有精神能銷忙事成間事轉得憂人作樂人應是世間賢聖物與君還往擬終身池鶴二首髙竹籠前無伴侣亂雞羣裏有風標低頭乍恐丹砂落曬翅常疑白雪消轉覺鸕鷀毛色下苦嫌鸚鵡語聲嬌臨風一唳思何事悵望青田雲水遙池中此鶴鶴中稀恐是遼東老令威帶雪松枝翹膝脛放花菱片綴毛衣低回且向林一作籠間宿奮迅終須天外飛若問故巢知處在主人相戀未能歸對酒五首巧拙賢愚相是非何如一醉盡忘機君知天地中寬窄鵰鶚鸞皇各自飛蝸牛角上爭何事石火光中寄此身隨富隨貧且歡樂不開口笑是癡人丹砂見火去無迹白髮泥人來不休賴有酒仙相暖熱松喬醉即到前頭百歲無多時壯健一春能幾日晴眀相逢且莫推辭醉聽唱陽關第四聲第四聲勸君更盡一杯酒西出陽關無故人昨日低睂問疾來今朝收淚弔人回眼前流例君看取且遣琵琶送一杯立名按東坡志林舊傳陽關三疊然今世歌者每句再疊而巳若通一首言之又是四疊皆非是或每句三唱巳應三疊之說則叢然無復節奏余在密州有文勛長官以事至密自云得古本陽關其聲宛轉淒斷不類乃知唐本三疊蓋如此及在黃州得樂天對酒云相逢且莫推辭醉聽唱陽關第四聲注云第四聲勸君更盡一杯酒以此驗之若一句再疊則此句為第五聲今為第四聲則一句不疊審矣僧院花欲悟色空為佛事故栽芳樹在僧家細看便是華嚴偈方便風開智慧花老戒我有白頭戒聞於韓侍郎老多憂活計病更戀班行矍鑠誇身健周遮說話長不知吾免否兩鬢巳成霜戊申嵗暮詠懷三首窮冬月末兩三日半百年過六七時龍尾趁朝無氣力牛頭參道有心期榮華外物終須悟老病傍人豈得知猶被妻兒教漸退莫求致仕且分司唯生一女才十二祗缺三年未六旬㛰嫁纍輕何怕老飢寒心慣不憂貧紫泥丹筆皆經手赤紱金章盡到身更擬踟蹰覓何事不歸嵩洛作間人立名按韻語陽秋樂天以長慶三年自中書舍人為杭州刺史仍服緋故遊恩德寺詩序云俯視朱紱及自歎詩云實事漸消虛事在銀魚金帶繞身光戊申詠懷詩赤紱金章盡到身以今觀之金帶不應用銀魚金章不應用赤紱人皆以為疑而不知唐制紫為三品服緋為四品服淺緋為五品服各服金帶又制衣紫者魚袋以金飾衣緋者魚袋以銀飾樂天時為五品淺緋金帶佩銀魚宜矣七年囚閉作籠禽但願開籠便入林幸得展張今日翅不能辜負昔時心人間禍福愚難料世上風波老不禁萬一差池似前事又應追悔不抽簪贈夢得心中萬事不思量坐倚屏風臥向陽漸覺詠詩猶老醜豈宜憑酒更粗狂頭垂白髮我思退腳踏青雲君欲忙只有今春相伴在花前賸醉兩三場附劉白倡和集解彭城劉夢得詩豪者也其鋒森然少敢當者豫不量力往往犯之夫合應者聲同交爭者力敵一往一復欲罷不能繇是每制一篇先相視草視竟則興作興作則文成一二年來日尋筆研同和贈答不覺滋多至太和三年春以前紙墨所存者凡一百三十八首其餘乘興扶醉率然口號者不在此數因命小姪龜兒編録勒成兩卷仍寫二本一付龜兒一授夢得小兒崙郎各令收藏附兩家集豫頃以元微之唱和頗多或在人口常戲微之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠性情播揚名聲其適遺形其樂忘老幸也然江南士女語步才子者多云元白以子之故使僕不得獨於吳越間亦不幸也今垂老復遇夢得得非重不幸耶夢得夢得文之神妙莫先于詩若妙與神則吾豈敢如夢得雪裏髙山頭白早海中仙果子生遲沈舟側畔千帆過病樹前頭萬木春之句之類真謂神妙在在處處應當有靈物護之豈惟兩家子姪祕藏而已巳酉嵗三月五日樂天解想東遊五十韻并序太和三年春豫病免官後憶遊浙右數郡兼思到越一訪微之故兩浙之間一物已上想皆在目吟且成篇不能自休盈五百字亦猶孫興公想天台山而賦之也海內時無事江南嵗有秋生民皆樂業地主盡賢侯郊靜銷戎馬城髙逼斗牛平河七百里沃壤二三州自常及杭凡三百里坐有湖山趣行無風浪憂食寧妨解纜寢不廢乘流泉石諳天竺煙霞識虎邱天竺虎邱寺皆領郡時舊遊最熟處餘芳認蘭澤遺詠思蘋洲古詩云蘭澤多芳草又柳惲詩云汀州采白蘋菡萏紅塗粉菰蒲緑潑油鱗一作鮮差漁户舍綺錯稻田溝紫洞藏仙窟𤣥泉貯怪湫精神昂老鶴姿彩媚潛虯大謝詩云潛虯媚幽姿靜閲天工妙間窺物狀幽投竿出比目擲果下獼猴味苦蓮心小漿甜蔗節稠橘苞從自結藕孔是誰鎪逐日移潮信隨風變櫂謳遞夫交烈火候吏次鳴騶梵塔形疑踊重𤣥閣閶門勢欲浮吳閶客迎攜酒榼僧待置茶甌小宴間談笑初筵雅獻酬稍催朱蠟炬徐動碧牙籌圓盞飛蓮子長裾曳石榴柘枝隨畫鼓調笑從香毬幕揚雲飄檻簾褰月露鉤舞䋣紅袖凝去聲歌切翠睂愁絃管寧容歇杯盤未許收良辰宜酩酊卒歲好優游膾縷鮮仍細蓴絲滑且柔飽餐為日計穩睡是身謀名愧空虛得官知止足休自嫌猶屑屑衆笑太悠悠物表疏形役人寰足悔尤蛾須逺燈燭兔勿近罝罘幻世春來夢浮生水上漚百憂中莫入一醉外何求未死癡王湛無兒老鄧攸蜀琴安膝上周易在牀頭去去無程客行行不繫舟勞君頻問訊勸我少淹留自此後並屬微之雲雨多分散關山苦阻修一吟江月别七見日星周昔在杭州别微之微之留詩云明朝又向江頭别月落潮平是去時珠玉傳新什鵷鸞念故儔懸旌心宛轉束楚意綢繆驛舫粧青雀官槽秣紫騮鏡湖期逺泛禹穴約冥搜預掃題詩壁先開望海樓飲思親履舄宿憶並衾裯志氣吾衰也風情子在不應須相見後别作一家遊吾衰子在並出家語病免後喜除賔客臥在漳濵滿十旬起為商皓伴三人從今且莫嫌身病不病何由索得身長樂亭留别灞滻風煙函谷路曽經幾度别長安昔時蹙促為遷客今日從容自去官優詔幸分四皓秩祖筵慚繼二疏歡塵纓世網重重縛回顧方知出得難陜府王大夫相迎偶贈紫微閣老自多情白首園公豈要迎伴我緑槐隂下歇向君紅斾影前行綸巾髮少渾攲仄籃輿肩齊甚穩平但問主人留幾日分司賓客去無程别陜州王司馬笙歌惆悵欲為别風景闌珊初過春爭得遣君詩不苦黃河岸上白頭人將至東都先寄令狐留守黃鳥無聲葉滿枝閒吟想到洛城時惜逢金谷三春盡恨拜銅樓一月遲詩境忽來還自得醉鄉潛去與誰期東都添箇狂賓客先報壺觴風月知答崔十八見寄眀朝欲見琴尊伴洗拭金杯拂玉徽君乞曹州刺史替我拋刑部侍郎歸倚瘡老馬收蹄立避箭髙鴻盡翅飛豈料洛陽風月夜故人垂老得相依贈皇甫賓客輕衣穩馬槐隂路漸近東來漸少塵耳鬧久憎聞俗事眼明初喜見閒人昔曽對作承華相今復連為博望賓始信淡交宜久逺與君轉老轉相親歸履道宅驛吏引藤輿家童開竹扉往時多暫住今日是長歸眼下有衣食耳邊無是非不論貧與富飲水亦應肥問江南物歸來未及問生涯先問江南物在耶引手摩挲青石筍回頭㸃檢白蓮花蘇州舫故龍頭暗王尹橋傾雁齒斜别有夜深惆悵事月明雙鶴在裴家蕭庶子相過半日停車馬何人在白家殷勤蕭庶子愛酒不嫌茶答尉遲少尹問所須乍到頻勞問所須所須非玉亦非珠愛君水閣宜間詠每有詩成許去無詠間但有間銷日都無事繫懷朝眠因客起午飯伴僧齊樹合隂交户池分水夾階就中今夜好風月似江淮同崔十八寄元浙東王陜州未能同隱雲林下且復相招祿仕間隨月有錢勝賣藥終年無事抵歸山鏡湖水逺何由泛棠樹枝髙不易攀惆悵八科殘四在兩人榮鬧兩人閒答蘇庶子月夜聞家僮奏樂見贈牆西明月水東亭一曲霓裳按小伶不敢邀君無别意絃生管澀未堪聽偶吟里巷多通水林園盡不扃松身為外户池面是中庭元氏詩三帙陳家酒一瓶醉來狂發詠鄰女映籬聽白蓮池泛舟白藕新花照水開紅窗小舫信風回誰教一片江南興逐我殷勤萬里來池上即事行尋甃石引新泉坐看修橋補釣船緑竹挂衣涼處歇清風展簟困時眠身閒當貴真天爵官散無憂即地仙林下水邊無厭日便堪終老豈論年酬裴相公見寄二絶習靜心方泰勞生事漸稀可憐安穩地舍此欲何歸一雙垂翅鶴數首解嘲文總是迂閒物爭堪伴相君答夢得聞蟬見寄開緘思浩然獨詠晚風前人貌非前日蟬聲似去年槐花新雨後柳影欲秋天聽罷無他計相思又一篇令狐尚書許過敝居先贈長句不矜軒冕愛林泉許到池頭一醉眠巳遣平治行藥徑兼教掃拂釣魚船應將筆研隨詩主定有笙歌伴酒仙祗候髙情無别物蒼苔石筍白花蓮自題老宜官冷靜貧賴俸優饒熱月無堆案寒天不趁朝傍看應寂莫自覺甚逍遙徒對盈尊酒兼無愁可銷答崔十八勞將白叟比黃公今古由來事不同我有商山君未見清泉白石在胸中偶詠禦熱蕉衣健扶羸竹杖輕誦經憑檻立散藥繞廊行暝槿無風落秋蟲欲雨鳴身閒當將息病亦有心情答蘇六但喜暑隨三伏去不知秋送二毛來更無别計相寬慰故遣陽關勸一杯秋遊下馬間行伊水頭涼風清景勝春遊何事古今詩句裏不多說著洛陽秋偶作張翰一杯酒榮期三樂歌聰明傷混沌煩惱汚頭陀簟冷秋生早階閒日上多近來門更靜無雀可張羅遊平泉贈晦叔照水容雖老登山力未衰欲眠先命酒暫歇亦吟詩且喜身無縳終慙鬢有絲回頭語閒伴閒較十年遲不出門不出門來又數旬將何銷日與誰親鶴籠開處見君子書卷展時逢古人自靜其心延壽命無求於物長精神能行便是真修道何必降魔調伏身歎鶴病右翅低垂左脛傷可憐風貌甚昂藏亦知白日青天好未要髙飛且養瘡臨都驛送崔十八勿言臨都五六里扶病出城相送來莫道長安一步地馬頭西去幾時回與君後㑹知何處為我今朝盡一杯對鏡三分鬢髮二分絲曉鏡秋容相對時去作忙官應太老退為閒叟未全遲靜中得味何須道穩處安身更莫疑若使至今黃綺在聞吾此語亦分司白香山詩集卷二十九
