body:
  text: 白香山詩集巻十八歙縣汪立名編長慶集十八律詩五言七言凡九十四首夜入瞿唐峽瞿唐天下險夜上信難一作艱哉岸似雙屏合天如匹練一作帛開逆風驚浪起拔􅜺暗船來欲識愁多少髙於灧澦堆初到忠州贈李六好在天涯李使君江頭相見日黄昏吏人生梗都如鹿市井蕭疎一作疎蕪只抵邨一隻蘭船一作葉船當驛路一作步百層石磴上州門更無平地堪行處虚受朱輪五馬恩郡齋暇日憶廬山草堂兼寄二林僧社三十韻皆敘貶官以來出處之意諌諍知無補遷移分所當不堪匡聖主只合事空王龍象投新社鵷鸞失故行沈吟辭北闕誘引向西方便住雙林寺仍開一草堂平治行道路一作地安置坐禪牀手版支為枕頭巾閣在牆先生烏几舄居士白衣裳竟嵗何曾悶終身不擬忙滅除殘夢想換盡舊心腸世界多煩惱形神久損傷正從風鼓浪轉作日銷霜佛經云生死無休巳如風鼓海浪又云煩惱如霜露慧日能消除吾道尋知止君恩偶未忘忽蒙頒鳯詔兼謝剖魚章蓮靜方依水葵枯重仰陽三車猶夕㑹五馬已晨裝去似尋前世來如别故鄉睂低出鷲嶺脚重下蛇岡廬山岡名漸望廬山遠彌愁峽路長香爐峰隱隱巴字水茫茫瓢挂留庭樹經收在屋梁春抛紅藥圃夏憶白蓮塘惟擬捐塵事將何答寵光有期追永遠晉時永遠二法師同隱廬山二林無政繼龔黄南國秋猶熱西齋夜蹔涼閒吟四句偈靜對一爐香身老同邱井心空是道場覓僧為去伴留俸作歸糧為報山中侣憑看竹下房㑹應歸去在松菊莫教荒贈康叟八十秦翁老不歸南賓太守乞寒衣再三憐汝非他意天寶遺民見漸稀鸚鵡竟日語還黙中宵棲復驚身囚縁彩翠心苦為分明暮起歸巢思春多憶侣聲誰能拆籠破從放快飛鳴京使囘累得南省諸公書因以長句詩寄謝蕭五劉二元八吳十一韋大陸郎中崔二十二牛二李七庾三十二李六李十楊三樊大楊十二員外雪壓泥埋未死身每勞存問媿交親浮萍漂泊三千里列宿參差十五人禁月落時君待漏畬煙深處我行春瘴鄉得老猶為幸豈敢傷嗟白髪新東城春意風輭雲不動郡城東北隅晩來春澹澹天氣似京都絃管隨宜有杯觴不道無其如親故遠無可共歡娛木蓮樹圖并序木蓮樹生巴峽山谷間巴民亦呼為黄心樹大者髙五丈涉冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色豔膩皆同獨房蘂有異四月初始開自開迨謝僅二十日忠州西北十里有鳴玉谿生者穠茂尤異元和十四年夏命道士毋邱元志寫惜其遐僻因題三絶句云如折芙容栽旱地似抛芍藥挂髙枝雲埋水隔無人識惟有南賓太守知紅似燕支膩如粉傷心好物不須臾山中風起無時節明日重來得在無已愁花落荒巖底復恨根生亂石間幾度欲移移不得天教抛擲在深山立名按太平寰宇記鳴玉溪在忠州西十里上有懸巖瀑布髙五十餘丈潭洞幽邃古木蒼然種桃杏無論海角與天涯大抵心安即是家路遠誰能念鄉曲年深兼欲忘京華忠州且作三年計種杏栽桃擬待花新秋二毛生鏡日一葉落庭時老去爭由我愁來欲泥誰空銷閒嵗月不見舊親知惟弄扶牀女時時强展睂龍昌寺荷池冷碧新秋水殘紅半破蓮從來寥落意不似此池邊聽竹枝贈李侍御巴童巫女竹枝歌懊惱何人怨咽多蹔聽遣君猶悵望長聞教我復如何寄胡餅與楊萬州胡麻餅様學京都麫脆油香新出爐寄與飢饞楊大使嘗看得似輔興無感櫻桃花因招飲客櫻桃昨夜開如雪鬢髮今年白似霜漸覺花前成老醜何曾酒後更顛狂誰能聞此來相勸共泥春風醉一塲東亭閒望按英華作閒坐東亭盡日坐誰伴寂寥身緑桂一作樹為佳客紅蕉當美人笑言雖不接情狀似相親不作悠悠想如何度晩春畫木蓮花圖寄元郎中花房膩似紅蓮朶豔色鮮如紫牡丹惟有詩人應解愛丹青寫出與君看和李澧州題韋開州經藏詩既悟蓮花藏須遺貝葉書菩提無處所文字本空虚觀指非知月忘筌是得魚聞君登彼岸舍筏復何如九日題塗溪蕃一作萫草席鋪楓葉岸竹枝歌送菊花杯明年尚作南賓守或可重陽更一來即事寄微之畬田澀米不耕鉏旱地荒園少菜蔬想念土風今若此料看生計合何如衣縫紕纇黄絲絹飯下腥鹹白小魚飽暖飢寒何足道此身長短是空虛題郡中茘枝詩十八韻兼寄萬州楊八使君附茘枝圖序茘枝生巴峽間樹形團團如帷葢葉如桂冬青花如橘春榮實如丹夏熟紫如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪漿液甘酸如醴酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣元和十五年夏南賓守樂天命工史圖而書之葢為不識者與識而不及一二三日者云竒果標南土芳林對北堂素華春漠漠丹實夏煌煌葉捧低垂户枝擎重壓牆始因風弄色漸與日爭光夕訝條懸火朝驚樹㸃粧深於紅躑躅大校白檳榔星綴連心朶珠排耀眼房紫羅裁襯殻白玉裹填瓤早嵗曾聞說今朝始摘嘗嚼疑天上味齅異世間香潤勝蓮生水鮮逾橘得霜燕支掌中顆甘露舌頭漿物少尤珍重天髙苦渺茫巳教生暑月又使阻遐方粹液靈難駐妍姿嫩易傷近南光景熱向北道途長不得充王賦無由寄帝鄉惟君堪擲贈面白似潘郎留北客峽外相逢遠尊前一㑹難即今分手别且强展睂歡楚袖蕭條舞巴絃趣從速反數彈笙歌隨分有莫作帝鄉看重寄茘枝與楊使君時聞楊使君欲種植故有落句之戲摘來正帶凌晨露寄去須憑下水船映我緋衫渾不見對公銀印最相鮮香連翠葉真堪畫紅透青籠實可憐聞道萬州方欲種愁君得喫是何年和萬州楊使君四絶句競渡競渡相傳為汨羅不能止遏意無他自經放逐來憔悴能校靈均死幾多江邊草聞君澤畔傷春草憶在天門街裏時漠漠淒淒愁一作秋滿眼就中惆悵是江蘺嘉慶李東都緑李萬州栽君手封題我手開把得欲嘗先悵望與渠同别故鄉來白槿花秋蕣晩英無豔色何因栽種在人家使君只别羅敷面爭解囘頭愛白花和行簡望郡南山反照前山雲樹明從君苦道似華清試聽腸斷巴猿叫早晩驪山有此聲望郡南山白行簡臨江一嶂白雲間紅緑層層錦繡斑不作巴南天外意何如昭應望驪山按此詩本行簡作今本誤作望郡南山寄行簡種茘枝紅顆珍一作真珠誠可愛白鬚太守亦何癡十年結子知誰在自向庭中種茘枝陰雨嵐霧今朝重江山此地深灘聲秋更急峽氣曉多陰望闕雲遮眼思鄉雨一作淚滴心將何慰幽獨賴此北窻琴送客歸京水陸四千里何時歸到秦舟辭三峽雨馬入九衢塵有酒留行客無書寄貴人惟聞逺傳語好在曲江春送蕭處士遊黔南能文好飲老蕭郎身似浮雲鬢似霜生計抛來詩是業家園忘却酒為鄉江從巴峽初成字猿過巫陽始斷腸不醉黔中爭去得磨圍山月正蒼蒼東樓醉天涯深峽無人地嵗暮窮陰欲夜天不向東樓時一醉如何擬過二三年寄微之時微之為虢州司馬髙天黙黙物茫茫各有來由致損傷鸚為能言長翦翅龜縁難死久搘牀莫嫌冷落抛閒地猶勝炎蒸卧瘴鄉外物竟關身底事謾排門㦸繫腰章東樓招客夜飲莫辭數數醉東樓除醉無因破得愁惟有緑尊紅燭下蹔時不似在忠州醉後戲題自知清冷似冬凌每被人呼作律僧今夜酒醺羅綺煖被君融盡玉壺氷冬至夜老去襟懷常濩落病來鬚髮轉蒼浪心灰不及爐中火鬢雪多於砌下霜三峽南賔城最遠一年冬至夜偏長今宵始覺房櫳冷坐索寒衣䛏孟光竹枝詞四首瞿塘峽口水煙低白帝城頭月向西唱到竹枝聲咽處寒猿闇鳥一時啼竹枝苦怨怨何人夜靜山空歇又聞蠻兒巴女齊聲唱愁殺江南一作樓病使君巴東船舫上巴西波面風生雨脚齊水蓼冷花紅簇簇江蘺溼葉碧淒淒江畔誰人唱竹枝前聲斷咽後聲遲怪來調古縁詞苦多是通州司馬詩酬嚴中丞晩眺黔江見寄江水三廻曲愁人兩地情磨圍山下色明月峽中聲晩後連天碧秋來徹底清臨流有新恨照見白鬚生寄題楊萬州四望樓江上新樓名四望東西南北水茫茫無由得與君攜手同凭闌干一望鄉答楊使君登樓見憶忠萬樓中南北望南州煙水北州雲兩州何事偏相憶各是籠禽作使君除夜嵗暮紛多思天涯渺未歸老添新甲子病減舊容輝鄉國仍留念功名已息機明朝四十九應轉悟前非聞雷瘴地風霜早温天氣候催窮冬不見雪正月巳聞雷震蟄蟲蛇出驚枯草木開空餘客方寸依舊似寒灰春至若為南國春還至爭向東流日又長白片落梅浮澗水黄梢新栁出城牆閒拈蕉葉題詩詠悶取藤枝引酒嘗樂事漸無身漸老從今始擬負風光感春巫峽中心郡巴城四面春草青臨水地頭白見花人憂喜皆心火榮枯是眼塵除非一杯酒何物更關身春江炎涼昏曉苦推遷不覺忠州已二年閉閣只聽朝暮鼓上樓空望往來船鶯聲誘引來花下草色勾留坐水邊惟有春江看未厭縈砂繞石緑潺湲題東樓前李使君所種櫻桃花身入青雲無見日手栽紅樹又逢春惟留花向樓前看故故抛愁與後人巴水城下巴江水春來似麴塵軟沙如渭曲斜岸憶天津影蘸新黄栁香浮小白蘋臨流搔首坐惆悵為何人野行草潤衫襟重沙乾屐齒輕仰頭聽鳥立信脚望花行暇日無公事衰年有道情浮生短於夢夢裏莫營營送髙侍御使廻因寄楊八明月峽邊逢刺史黄茅岸上是忠州到城莫說忠州惡無益虚教楊八愁奉酬李相公見示絶句時初聞國哀碧油幢下捧新詩榮賤雖殊共一悲涕淚滿襟君莫怪甘泉侍從最多時立名按憲宗元和十五年正月服栁泌金丹多躁怒左右宦官往往獲罪有死者人人自危至是暴崩於中和殿時皆言内侍陳𢎞志弑逆也公是年冬自忠州召還拜司門員外郎戲贈蕭處士清禪師三杯嵬峨忘機客百衲頭陀任運僧又有放慵巴郡守不營一事共騰騰錢虢州以三堂絶句見寄因以本韻和之同事空王嵗月深相思逺寄定中吟遥知清淨中和化祇用金剛三昧心予早嵗與錢君同習讀金剛三昧經故云立名按昌黎和劉虢州山堂新題二十一詠序云􅉑州刺史宅連水池竹林往往為亭臺島渚目其處為三堂劉兄自給事出刺此州在任逾嵗職修人治州中稱無事頗復增飾從子弟而遊其間又作二十一詩以詠其事流行京師文士爭和之劉伯篘字素芝洺州廣平人元和八年出刺虢州制詞即公所撰山堂詩題有新亭流水竹洞月臺渚亭竹溪北湖花島栁溪西山竹徑荷池稻畦栁巷花源北樓鏡潭孤嶼方橋梯橋月池凡二十一首三月三日暮春風景初三日流世光陰半百年欲作閒遊無好伴半江惆悵却廻船寒食夜四十九年身老日一百五夜月明天抱膝思量何事在癡男騃一作癡女喚鞦韆代州民問龍昌寺底開山路巴子臺前種栁林官職家鄉都忘却誰人㑹得使君心答州民宦情斗擻隨塵去鄉思銷磨逐日無惟擬騰騰作閒事遮渠不道使君愚茘枝樓對酒茘枝新熟雞冠色燒酒初開琥珀香欲摘一枝傾一盞西樓無客共誰嘗立名按方輿勝覽茘枝樓在南賓郡西南隅白公置房家夜宴喜雪戱贈主人風頭向夜利如刀賴此温爐輭錦袍桑落氣熏珠翠煖柘枝聲引管絃髙酒鉤送盞推蓮子燭淚粘盤壘蒲萄不醉遣儂爭散得門前雪片似鵝毛立名按陸放翁云忠州在陜路與萬州最號窮陋不復有為郡之樂那得如樂天詩所詠光景當是不堪司馬閒冷驟易刺史故易見其樂爾醉後贈人香毬趂拍囘環匼花琖抛廵取次飛自入春來未同醉那能夜去獨先歸初除尚書郎脫刺史緋親賓相賀問何如服色恩光盡反初頭白喜抛黄草峽眼明驚拆紫泥書便留朱紱還鈴閣却著青袍侍玉除無奈嬌癡三嵗女繞腰啼哭覓金魚留題開元寺上方東寺臺閣好上方風景清數來猶未厭長别豈無情戀水多臨坐辭花賸繞行最憐新岸栁手種未全成别種東坡花樹兩絶三年留滯在江城草樹禽魚盡有情何處殷勤重囘首東坡桃李種新成花林好住莫顦顇春至但知依舊春樓上明年新太守不妨還是愛花人别橋上竹穿橋迸竹不依行恐礙行人被損傷我去自慙遺愛少不教君得似甘棠發白狗峽次黄牛峽登髙寺却望忠州白狗次黄牛灘如竹節稠路穿天地險人續古今愁忽見千花墖因停一葉舟畏途常廹促靜境蹔淹留巴曲春全盡巫陽雨半收北歸雖引領南望亦囘頭昔去悲殊俗今來念舊遊别僧山北寺抛竹水西樓郡樹花如雪軍厨酒似油時時大開口自笑憶忠州棣華驛見楊八題夢兄弟詩遥聞旅宿夢兄弟應為郵亭名棣華名作棣華來早晩自題詩後屬楊家商山路有感萬里路長在六年身始歸所經多舊館大半主人非商山路驛桐樹昔與微之前後題名處與君前後多遷謫五度經過此路隅笑問中庭老桐樹這囘歸去免來無德宗皇帝挽歌四首按此以下皆貞元末元和初之作誤簡忠州詩後姑仍之執象宗𤣥祖貽謀啓孝孫文髙柏梁殿禮薄灞陵原宮仗辭天闕朝儀出國門生成不可報二十七年春虞帝南廵後殷宗諒闇中初辭鑄鼎地已閉望仙宮曉落當陵月秋生滿斾風前星承帝座不使北辰空業大承宗祖功成付子孫睿文詩播樂遺訓史標言節表中和德方垂廣利恩懸知千載後理代數貞元夢減三齡壽哀延七月期寢園愁望遠宮仗哭行遲雲日添寒慘笳簫向晩悲因山有遺詔如葬漢文時昭德王皇后挽歌詞仙去逍遥境詩留窈窕章春歸金屋少夜入壽宮長鳯引曾辭輦蠶休昔采桑隂靈何處感沙麓月無光立名按新唐書貞元二年十一月皇后崩而不書氏葢淑妃王氏久疾帝念之立為后冊畢而没綱目以此病德宗謂不當立危病為母儀太平樂詞二首巳下七首在翰林時奉敕撰進嵗豐仍節儉時泰更銷兵聖念長如此何憂不太平湛露浮堯酒熏風起舜歌願同堯舜意所樂在人和小曲新詞二首霽色鮮宮殿秋聲脆管絃聖明千嵗樂嵗嵗似今年紅裾明月夜碧簟早秋時好向昭陽宿天涼玉漏遲閨怨詞三首朝憎鶯百囀夜妒燕雙棲不慣經春别惟知到曉啼珠箔籠寒月紗窻背曉燈夜來巾上淚一半是春氷關山征戍遠閨閤别離難苦戰應顦顇寒衣不要寛殘春曲禁中口號禁苑殘鶯三四聲景遲風慢暮春情日西無事牆陰下閒蹋宮花獨自行一作吟長安春青門栁枝輭無力東風吹作黄金色街東酒薄醉易醒滿眼春愁消不得長樂坡送人賦得愁行人南北分征路流水東西接御溝終日坡前恨離别漫名長樂是長愁長洲苑春入長洲草又生鷓鴣飛起少人行年深不辨娃宮處夜夜蘇臺空月明憶江栁曾栽楊栁江南岸一别江南兩度春遥憶青青江岸上不知攀折是何人南浦别南浦淒淒别西風嫋嫋秋一看腸一斷好去莫囘頭三年别悠悠一别已三年相望相思明月天腸斷青天望明月别來三十六回圓傷春曲深淺檐花千萬枝碧紗窻外囀黄鸝殘妝含淚下簾坐盡日傷春春不知後宮詞淚盡一作溼羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚熏籠坐到明立名按此詩舊作王建宮詞惟紀事作白詩白香山詩集巻十八
