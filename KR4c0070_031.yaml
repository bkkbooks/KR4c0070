body:
  text: 白香山詩集巻三十一歙縣汪立名編後集一律詩凡七十首和令狐相公寄劉郎中兼見示長句日月天衢仰面看尚淹池鳯滯臺鸞碧幢千里空移鎮赤筆三年未轉官别後縱吟終少興病来雖飲不多歡酒軍詩敵如相遇臨老猶能一據鞍即事見月連宵坐聞風盡日眠室香羅藥氣籠煖焙茶煙鶴啄新晴地雞栖薄暮天自看淘酒米倚杖小池前期宿客不至風飄雨灑簾帷故竹映松遮燈火深宿客不来嫌冷落一尊酒對一張琴問移竹問君移竹意如何慎勿排行但間窠多種少栽皆有意大都少校不如多重陽席上賦白菊滿園花菊鬱金黄中有孤叢色似霜還似今朝歌酒席白頭翁入少年場偶吟二首眼下有衣兼有食心中無喜亦無憂正如身後有何事應向人間無所求靜念道經深閉目閒迎禪客小低頭猶殘少許雲泉興一嵗龍門數度逰晴教曬藥泥茶竈閑看科松洗竹林活計縱貧長淨潔池亭雖小頗幽深廚香炊黍調和酒窗暖安絃拂拭琴老去生涯祗如此更無餘事可勞心何處春先到何處春先到橋東水北亭凍花開未得冷酒酌一作著難醒就日移輕榻遮風展小屏不勞人勸醉鶯語漸丁寜勉閒逰天時人事常多故一嵗春能幾䖏逰不是塵埃便風雨若非疾病即悲憂貧窮心苦多無興富貴身忙不自由唯有分司官恰好閒遊雖老未能休寄兩銀榼與裵侍郎因題兩絶句貧無好物堪為信雙榼雖輕意不輕願奉謝公池上酌丹心緑酒一時傾慣和麴糵堪盛否重用鹽梅試洗看小器不知容幾許襄陽米賤酒升寛銀匠洗銀多以鹽花梅漿也小橋栁細水涓涓似淚流日西惆悵小橋頭衰楊葉盡空枝在猶被霜風吹不休哭微之二首八月涼風吹白幕寢門廊下哭微之妻孥朋友來相弔唯道皇天無所知文章卓犖生無敵風骨英靈歿有神哭送咸陽北原上可能隨例作灰塵立名按紀事太和中稹拜左丞相自越過洛别樂天云君應怪我流連久我欲與君辭别難白頭徒侣漸稀少明日恐君無此歡又云自識君来三度别這囘白盡老髭鬚戀君不去君須㑹知得後囘相見無未幾死于鄂樂天哭之曰始以詩交終以詩訣兹筆相訣其今日乎稹以太和三年過洛五年卒于鄂州六年葬咸陽書録解題元稹與樂天齊名文章相上下出處亦不相悖晩而欲速託依奄宦得相卒為小人之歸而居易始終全節嗚呼為士者可以監矣雪夜喜李郎中見訪兼酬所贈可憐今夜鵝毛雪引得髙情鶴氅人紅蠟燭前明似晝青氊帳裏暖如春十分滿琖黄金液一尺中庭白玉塵對此欲留君便宿詩情酒分合相親任老不愁陌上春光盡亦任庭前日影斜面黑眼昏頭雪白老應無可更增加勸歡火急歡娱切勿遲眼看老病悔難追尊前花下歌筵裏㑹有求來不得時荅王尚書問履道池舊橋虹梁雁齒隨年換素板朱闌逐日修但恨尚書能久别莫愁州守不頻逰重移舊柱開中眼亂種新花擁兩頭李郭小船何足問待君乘過濟川舟晩歸府晩從履道來歸府街路雖長尹不嫌馬上涼於牀上坐緑槐風透紫蕉衫從龍潭寺至少林寺題贈同逰者山屐田衣六七賢搴芳蹋翠弄潺湲九龍潭月落杯酒三品松風飄管絃强健且宜逰勝地清涼不覺過炎天始知駕鶴乘雲外别有逍遥地上仙夜從法王寺下歸嶽寺雙刹夾虚空縁雲一徑通似從忉利下如過劒門中燈火光初合笙歌曲未終可憐獅子座舁出淨名翁宿龍潭寺夜上九潭誰是伴雲隨飛蓋月隨杯明年尚作三川守此地兼将歌舞來嵩陽觀夜奏霓裳開元遺曲自淒涼况近秋天調是商愛者誰人唯白尹奏時何處在嵩陽迥臨山月聲彌怨散入松風韻更長子晉少姨聞定怪人間亦便有霓裳立名按韻語陽秋云沈存中謂霓裳為道調法曲觀公此詩則霓裳用商調非道調明矣厥後文人往往指為亡國之音如杜牧詩霓裳一曲千峯上舞破中原始下來過元家履信宅雞犬喪家分散後園林失主寂寥時落花不語空辭樹流水無情自入池風蕩醼船初破漏雨淋歌閣欲傾欹前庭後院傷心事唯是春風秋月知和杜録事題紅葉寒山十月旦霜葉一時新似燒非因火如花不待春連行排絳帳亂落剪紅巾解駐籃轝看風前唯兩人題崔常侍濟上别墅時常侍以長告罷歸今故先報泉石求榮爭寵任紛紛脱棄金貂祗有君散員疎去未為貴小邑陶休何足云山色好當晴後見泉聲宜向醉中聞主人憶爾爾知否抛却青雲歸白雲過温尚書舊莊白石清泉抛濟口碧幢紅斾照河陽村人都不知時事猶自呼為處士莊天壇峰下贈杜録事年顔氣力漸衰殘王屋中峰欲上難頂上将探小有洞小有洞在天壇頂上喉中須嚥大還丹時杜方鍊伏火砂次河車九轉宜精鍊火候三年在好看他日藥成分一粒與君先去埽天壇贈僧五首鉢墖院如大師師年八十三登壇秉律凡六十年每嵗於師處授八闗戒者九度百千萬劫菩提種入十三年功徳林若不秉持僧行苦將何報荅佛恩深慈悲不瞬諸天眼清淨無塵幾地心每嵗八關蒙九授慇懃一戒重千金神照上人照以説壇為佛事心如定水隨形應口似懸河逐病治曾向衆中先禮拜西方去日莫相遺自逺禪師逺以無事為佛事自出家來常自在縁身一衲一繩牀令人見即心無事每一相逢是道場宗實上人實即樊司空之子捨官位妻子出家榮華恩愛棄成唾戒定真如和作香今古雖殊同一法瞿曇抛却轉輪王清閒上人自蜀入洛於長夀寺説法度人梓潼眷屬何年别長夀壇場近日開應是蜀人皆度了法輪移向洛中來彈秋思信意閒彈秋思時調清聲直韻疎遲近來漸喜無人聴琴格髙低心自知自詠隨宜飲食聊充腹取次衣裘亦煖身未必得年非痩薄無妨長福是單貧老龜豈羨犧牲飽蟠木寜爭桃李春隨分自安心自斷是非何用問閑人分司初到洛中偶題六韻兼戲呈馮尹相府念多病春宫容不才官銜依一作隨口得俸料逐身來白首林園在紅塵車馬廻招呼新客旅一作侣埽掠舊池臺小舫宜攜樂新荷好葢杯不知金谷主早晩賀筵開春風春風先發苑中梅櫻杏桃棃次第開薺花榆莢深邨裏亦道春風為我來洛橋寒食日十韻上苑風煙好中橋道路平蹴毬塵不起潑火雨新晴宿醉頭仍重晨逰眼乍明老慵雖省事春誘尚多情遇客踟躕立尋花取次行連錢嚼金勒鑿落寫銀罌府醖傷教送官娃豈要迎舞腰那及栁歌舌不如鶯鄉國真堪戀光隂可合輕三年遇寒食盡在洛陽城快活可惜鶯啼花落處一壺濁酒送殘春可憐月好風涼夜一部清商伴老身飽食安眠消日月閑談冷笑接交親誰知将相王侯外别有優游快活人送令狐相公赴太原六纛雙旌萬鐵衣并汾舊路滿光輝青衫書記何年去紅斾将軍藩鎮例驅紅斾昨日歸詩作馬蹄隨筆走獵酣鷹翅伴觥飛北都莫作多時計再為蒼生入紫微不出檐前新葉覆殘花席上餘杯對早茶好是老身消日䖏誰能騎馬傍人家惜落花夜來風雨急無復舊花林枝上三分落園中一寸深日斜啼鳥思春盡老人心莫怪添杯飲情多酒不禁老病晝聴笙歌夜醉眠若非月下即花前如今老病須知分不負春來二十年憶晦叔逰山弄水攜詩巻看月尋花把酒杯六事盡思君作伴幾時歸到洛陽來送徐州髙僕射赴鎮大一作伏紅斾引碧幢一作油旌新拜將軍指㸃行戰將易求何足貴書生難得始堪榮離筵歌舞花叢散候騎刀槍雪隊迎應笑蹉跎白頭尹風塵唯管洛陽城琴酒耳根得聴琴初暢心地忘機酒半酣若使啓期兼解醉應言四樂不言三聴幽蘭夢中古曲是幽蘭為我殷勤更弄看欲得身心俱静好自彈不及聴人彈六年秋重題白蓮素房含露玉冠鮮紺葉揺風鈿扇圓本是吳州供進藕今為伊水寄生蓮移根到此三千里結子經今六七年不獨池中花故舊兼乘舊日采花船元相公輓歌詞三首銘旌官重威儀盛騎吹聲䋣鹵簿長後魏帝孫唐宰相六年七月葬咸陽墓門已閉笳簫去唯有夫人哭不休蒼蒼露草咸陽壠此是千秋第一秋送葬萬人皆慘澹反虞駟馬亦悲鳴琴書劒佩誰收拾三嵗遺孤新學行重脩香山寺畢題二十二韻以紀之附修香山寺記洛都四野山水之勝龍門首焉龍門十寺觀逰之勝香山首焉香山之壊久矣樓亭騫崩佛僧暴露士君子惜之予亦惜之佛弟子恥之予亦恥之頃予為庶子賔客分司東都時性好閒逰靈蹟勝槩靡不周覽毎至兹寺慨然有葺完之願焉迨今七八年幸為山水主是償初心復始願之秋也似有縁㑹果成就之予早與故元相國微之定交於生死之間𠖇心於因果之際去年秋微之将薨以墓誌文見託既而元氏之老状其臧獲輿馬綾帛洎銀鞍玉帶之物價當六七十萬為謝文之贄來致於予予念平生分文不當辭贄不當納自秦抵洛往返再三訖不得巳廻施兹寺因請悲智僧清閒主張之命謹幹将士復掌治之始自寺前亭一所登寺橋一所連橋廊七間次至石樓一所連廊六間次東佛龕大屋十一間次南賓院堂一所大小屋共七間凡支壊補缺壘隤覆漏杇墁之功必精赭堊之飾必良雖一日必葺越三月而就譬如長者壊宅欝為導師化城於是龕像無燥濕陊泐之危寺僧有經行宴坐之安逰者得息肩觀者得寓目闗塞之氣色龍潭之景象香山之泉石石樓之風月與往來者耳目一時而新士君子佛弟子豁然如釋憾刷恥之為清閒上人與予及微之皆夙舊也交情願力盡得知之感往念來歡且贊曰凡此利益皆名功徳而是功徳應歸微之必有以滅宿殃薦𠖇福也予應曰嗚呼乘此功徳安知他劫不與微之結後縁於兹土乎因此行願安知他生不與微之復同逰於兹寺乎言及於斯漣洏涕下唐太和六年八月一日河南尹太原白居易記闕塞龍門口祇園鷲嶺頭曾隨減劫壊今遇勝縁修再瑩新金刹重裝舊石樓病僧皆引起忙客亦淹留四望窮沙界孤標出贍洲地圖鋪洛邑天柱倚崧丘兩面蒼蒼岸中心瑟瑟流波翻八灘雪堰護一潭油臺殿朝彌麗房廊夜更幽千花髙下墖一葉往來舟岫合雲初吐林開霧半收靜聞樵子語逺聴櫂郎謳官散殊無事身閒甚自由吟來攜筆研宿去抱衾裯霽月當窗白涼風滿簟秋煙香封藥竈泉冷洗茶甌南祖心應學西方社可投先宜知止足次要悟浮休覺路隨方樂迷塗到老愁須除愛名障莫作戀家囚便合窮年住何言竟日逰可憐終老地此是我菟裘卧聴法曲霓裳金磬玉笙和一作調已久牙牀角枕睡常遲朦朧閒夢初成後宛轉柔聲入破時樂可理心應不謬酒能陶性信無疑起嘗殘酌聴餘曲斜背銀缸半下帷結之歡愛今何在悲啼亦是空同為一夜夢共過十年中五鳯樓晩望六年八月十日作晴陽晩照溼烟消五鳯樓髙天泬寥野緑全經朝雨洗林紅半被暮雲燒龍門翠黛睂相對伊水黄金線一條自入秋來風景好就中最好是今朝寄劉蘇州附與劉蘇州書夢得閣下前者枉手札數幅兼惠荅憶春草報白君巳下五六章發函披文而後喜可知也又覆視書中有攘臂痛拳之戲笑與忭㑹甚樂甚樂誰復知之因有所云續前言之戲耳試為留聴與閣下在長安時合所著詩數百首題為劉白唱和集巻上下去年冬夢得由禮部郎中集賢學士遷蘇州刺史氷雪塞路自秦徂吳僕方守三川得為東道主閣下為僕税駕十五日朝觴夕詠頗極平生之歡各賦數篇視草而别嵗月易邁行復周星一往一來忽又盈篋誠知老醜冗長為少年者所嗤然吳苑洛城相去二三千里捨此何以啓齒而解頤哉嗟乎微之先我去矣詩敵之勍者非夢得而誰前後相荅彼此非一彼雖無虛可擊此亦非利不行但止交綏未嘗失律然得雋之句警策之篇多因彼唱此和中得之他人未能發也所以輒自愛重今復編而次焉以附前集合前三巻題此巻為下遷前下為中命曰劉白呉洛寄和巻自太和六年冬送夢得之任之作始居易頓首立名按姑蘇志禹錫以太和五年冬除蘇州刺史六年二月至任此云六年蓋傳寫之誤送夢得之任一首集中失載今蒐入補遺巻去年八月哭微之今年八月哭敦詩何堪老淚交流日多是秋風揺落時泣罷幾囘深自念情來一倍苦相思同年同病同心事除却蘇州更是誰送客病上籃轝相送來衰容秋思兩悠哉涼風嫋嫋吹槐子却請行人勸一杯秋思夕照紅於燒晴空碧勝藍獸形雲不一弓勢月初三雁思來天北砧愁滿水南蕭條秋氣味未老巳深諳酬夢得秋夕不寐見寄碧簟絳紗帳夜涼風景清病聞和藥氣渴聴碾茶聲露竹偷燈影煙松護月明何言千里隔秋思一時生題周家歌者清𦂳如敲玉深圓似轉簧一聲腸一斷能有幾多腸憶夢得夢得能唱竹枝聞者愁絶齒髪各蹉跎疎慵與病和愛花心在否見酒興如何年長風情少官髙俗慮多幾時紅燭下聞唱竹枝歌贈同座春黛雙蛾斂一作嫩秋蓬兩鬢侵謀歡身太晩恨老意彌深薄解燈前舞尤能酒後吟花叢便不入猶自未甘心夜招晦叔庭草留霜池結氷黄昏鐘絶凍雲凝碧氊帳上正飄雪紅火爐前初炷燈髙調秦箏一兩弄小花蠻榼二三升為君更奏湘神曲夜就儂家能不能戲荅皇甫監時皇甫監初喪偶寒宵勸酒君須飲君是孤眠七十身莫道非人身不煖十分一琖煖於人和楊師臯傷小姬英英自従嬌騃一相依共見楊花七度飛玳瑁牀空收枕席琵琶絃斷倚屏幃人間有夢何曾入泉下無家豈是歸墳上少啼留取淚明年寒食更霑衣池邊即事氊帳胡琴出塞曲蘭塘越棹弄潮聲何言此䖏同風月薊北江南萬里情聞樂感鄰老去親朋零落盡秋來絃管感傷多尚書宅畔悲鄰笛廷尉門前歎雀羅東鄰王大理去冬云亡南鄰崔尚書今秋薨逝緑綺窗空分妓女絳紗帳掩罷笙歌歡娱未足身先去爭奈書生薄命何太和六年冬暮贈崔常侍晦叔時為河南尹鬢毛霜一色光景水爭流易過唯冬日難銷是老愁香開緑蟻酒煖擁褐綾裘已共崔君約尊前倒即休戲招諸客黄醅緑醑迎冬􅌻絳帳紅爐逐夜開誰道洛中多逸客不将書喚不曾來十二月二十三日作兼呈晦叔案頭厯日雖未盡向後唯殘六七行牀下酒缾雖不滿猶應醉得兩三場病身不許依年老拙宦虚教逐日忙聞健偷閒且歡飲一杯之外莫思量白香山詩集巻三十一
