body:
  text: 白香山詩集巻六歙縣汪立名編長慶集六閑適古調詩四十五首自題冩真時為翰林學士我貌不自識李放寫我真静觀神與骨合是山中人蒲栁質易朽麋鹿心難馴何事赤墀上五年為侍臣况多剛狷性難與世同塵不惟非貴相但恐生禍因宜當早罷去収取雲泉身立名按公此詩内五年為侍臣及宜當早罷去之句當作於元和五年蓋是年歳滿當改官也以公年計之為三十九歳而公後題舊冩真圖乃曰我年三十六冩貌在丹青豈别有圖非李放所冩邪遣懐自此後詩在渭村作寓心身體中寓性方寸内此身是外物何足苦憂愛况有假飾者華簪及髙蓋此又踈於身復在外物外操之多惴慄失之又悲悔乃知名與利得䘮俱為害頽然環堵客蘿蕙為巾帶自得此道來身窮心甚泰渭上偶釣渭水如鏡色中有鯉與魴偶持一竿竹懸釣在一作至其傍㣲風吹釣絲嫋嫋十尺長身雖一作誰知對魚坐心在無何鄉昔有白頭人亦釣此渭陽釣人不釣魚七十得文王况我垂釣意人魚义兼亡無機兩不得但弄秋水光興盡釣亦罷歸來飲我觴隠几身適忘四支心適忘是非既適又忘適不知吾是誰百體如槁木兀然無所知方寸如死灰寂然無所思今日復明日身心忽兩遺行年三十九歳暮日斜時四十心不動吾今其庻幾春眠新浴肢體暢獨寢神魂安况因夜深坐遂成日髙眠春被薄亦暖朝窗深更閑却忘人間事似得枕上仙至適無夢想大和難名言全勝彭澤醉欲敵曹溪禪何物呼我覺伯勞聲闗闗起來妻子笑生計春茫然閑居腹空一盞粥飢食有餘味南簷半床日暖卧因成睡綿袍擁兩膝竹几支雙臂從旦直至昏身心一無事心足即為富身閑乃當貴富貴在此中何必居髙位君㸔裴相國金紫光照地心苦頭盡白纔年四十四乃知髙蓋車乘者多憂畏夏日東窗晚無熱比户凉有風盡日坐復卧不離一室中中心本無繫亦與出門同適意二首十年為旅客常有飢寒愁三年作諫官復多尸素羞有酒不暇飲有山不得遊豈無平生志拘牽不自由一朝歸渭上泛如不繫舟置心世事外無喜亦無憂終日一蔬食終年一布裘寒來彌嬾放數日一梳頭朝睡足始起夜酌醉即休人心不過適適外復何求早歳從旅遊頗諳時俗意中年忝班列備見朝廷事作客誠已難為臣尤不易况余方且介舉動多忤累直道速我尤詭遇非吾志胷中十年内消盡浩然氣自從返田畝頓覺無憂愧蟠木用難施浮雲心易遂悠悠身與世從此兩相棄首夏病間我生來幾時萬有四千日自省於其間非憂即有疾老去慮漸息年來病初愈忽喜身與心泰然兩無苦况兹孟夏月清和好時節㣲風吹裌衣不寒復不熱移榻樹隂下竟日何所為或飲一甌茗或吟兩句詩内無憂患廹外無職役覊此日不自適何時是適時晚春沽酒百花落如雪兩鬢垂作絲春去有來日我老無少時人生待富貴為樂常苦遲不如貧賤日隨分開愁眉賣我所乘馬典我舊朝衣盡將沽酒飲酩酊步行歸名姓日隠晦形骸日變衰醉卧黄公肆人知我是誰蘭若寓居名宦老慵求退身安草野家園病嬾歸寄居在蘭若薜衣換簪組藜杖代車馬行止輙自由甚覺身瀟灑晨逰南塢上夜息東菴下人間千萬事無有關心者麴生訪宿西齋寂巳暮叩門聲樀樀知是君宿來自拂塵埃席邨家何所有茶果迎來客貧静似僧居竹林依四壁厨燈斜影出簷雨餘聲滴不是愛閑人肯來同此夕聞庾七左降因詠所懐我病卧渭北君老謫巴東相悲一長歎薄命與君同既歎還自哂哂歎兩未終後心誚前意所見何迷䝉人生大塊間如鴻毛在風或飄青雲上或落泥途中衮服相天下儻來非我通布衣委草莽偶去非吾窮外物不可必中懐須自空無令怏怏氣留滯在心胷答卜者病眼昏似夜衰鬢䬃如秋除却須衣食平生百事休知君善易者問我决疑不不卜非他故人間無所求歸田三首人生何所欲所欲惟兩端中人愛富貴髙士慕神仙神仙須有籍富貴亦在天莫戀長安道莫尋方丈山西京塵浩浩東海浪漫漫金門不可入琪樹何由攀不如歸山下如法種春田種田意已决决意復何如賣馬買犢使徒步歸田廬迎春治耒耜候雨闢菑畬策杖田頭立躬親課僕夫吾聞老農言為稼慎在初所施不鹵莽其報必有餘上求奉王稅下望備家儲安得放慵惰拱手而曵裾學農未為鄙親友勿笑余更待明年後自擬執犁鋤三十為近臣腰間鳴佩玉四十為野夫田中學鋤榖何言十年内變化如此速此理固是常窮通相倚伏為魚有深水為鳥有髙木何必守一方窘然自牽束化吾足為馬吾因以行陸化吾手為彈吾因以求肉形骸為異物委順心猶足幸得且歸農安知不為福况吾行欲老瞥若風前燭孰能俄頃間將心繫榮辱秋遊原上七月行巳半早凉天氣清清晨起巾櫛徐歩出柴荆露杖笻竹冷風襟越蕉輕閑攜弟姪輩同上秋原行新棗未全赤晚𤓰有餘馨依依田家叟設此相逄迎自我到此邨往往白髪生邨中相識久老㓜皆有情留連向暮歸樹樹風蟬鳴一作聲是時新雨足禾黍夾道青見此令人飽何必待西成九日登西原宴望同諸兄弟作病愛枕席凉日髙眠未輟弟兄呼我起今日重陽節起登西原望懐抱同一豁移座就菊叢餻酒前羅列雖無絲與管歌笑隨情發白日未及傾顔酡耳已熱酒酣四向望六合何空闊天地自久長斯人幾時活請㸔原下邨邨人死不歇一邨四十家哭𦵏無虚月指此各相勉良辰且歡悦寄同病者三十生二毛早衰為沉疴四十官七品拙宦非由他面一作年顔日枯槁時命日蹉跎豈獨我如此聖賢無奈何囘觀親舊中舉目尤可嗟或有終老者沉賤如泥沙或有始壯者飄忽如風花窮卧與天促不如我者多以此反自慰常得心平和寄言同病者㢠廻歎且為歌遊藍田山卜居脫置腰下組擺落心中塵行歌望山去意似歸鄉人朝蹋玉峰下暮尋藍水濵擬求幽僻地安置疎慵身本性便山寺應須旁悟真村雪夜坐南窗背燈坐風霰暗紛紛寂寞深邨夜殘鴈雪中聞東園翫菊少年昨已去芳歳今又闌如何寂寞意復此荒凉園園中獨立久日淡風露寒秋蔬盡蕪没好樹亦凋殘唯有數叢菊新開籬落間攜觴聊就一作自酌為爾一留連憶我少小日易為興所牽見酒無時節未飲已欣然近從年長來漸覺取樂難常恐更衰老强飲亦無歡顧謂爾菊花後時何獨鮮誠知不為我借爾暫開顔觀稼世役不我牽身心常自若晚出㸔田畝閑行旁村落纍纍繞場稼嘖嘖羣飛雀年豐豈獨人禽鳥聲亦樂田翁逢我喜黙起具杯杓歛手笑相延社酒有殘酌媿兹勤且敬藜杖為淹泊言動任天真未覺農人惡停杯問生事夫種妻兒穫筋力苦疲勞衣食常單薄自慙禄位者曽不營農作飽食無所勞何殊衛人鶴聞哭者昨日南鄰哭哭聲一何苦云是妻哭夫夫年二十五今朝北里哭哭聲又何切云是母哭兒兒年十七八四鄰尚如此天下多夭折乃知浮世人少得垂白髪余今過四十念彼聊自悦從此明鏡中不嫌頭似雪新構亭臺示諸弟姪平臺髙數尺臺上結茅茨東西疏二牖南北開兩扉蘆簾前後巻竹簟當中施清冷白石枕疏凉黄葛衣開衿向風坐夏日如秋時嘯傲頗有趣窺臨不知疲東窗對華山三峰碧參差南簷當渭水卧見雲帆飛仰摘枝上果俯折畦中葵足以充飢渇何必慕甘肥况有好羣從旦夕相追隨立名按韻語陽秋樂天所至必築居在渭上有蔡渡居在江州有草堂在長安有新昌居在洛中有履道居皆有詩紀勝故其自謂云予自㓜迨老若白屋若朱門凡所止雖一日二日輙覆簣土為臺聚巻石為山環斗水為池所謂君子之居一日必葺者耶自吟拙什因有所懐嬾病毎多暇暇來何所為未能抛筆硯時作一篇詩詩成淡無味多被衆人嗤上怪落聲韻下嫌拙言詞時時自吟詠吟罷有所思蘇州及彭澤與我不同時此外復誰愛唯有元㣲之謫向江陵府三年作判司相去二千里詩成逺不知東坡一作陂秋意寄元八寥落野陂畔獨行思有餘秋荷病葉上白露大如珠忽憶同賞地曲江東北隅秋步少遊客唯我與君俱啼蛩隠紅蓼瘦馬蹋青蕪當時與今日俱是暮秋初節物苦相似時景亦無餘唯有人分散經年不得書閑居深閉竹間扉静掃松下地獨嘯晚風前何人知此意㸔山盡日坐枕帙移時睡誰能從我遊使君心無事詠拙所禀有巧拙不可改者性所賦有厚薄不可移者命我性拙且惷我命薄且屯問我何以知所知良有因亦曽舉兩足學人蹋紅塵從兹知性拙不解轉如輪亦曽奮六翮髙飛到青雲從兹知命薄摧落不逡廵慕貴而厭賤樂富而惡貧同此一作出天地間我豈異於人性命苟如此反則成苦辛以此自安分雖窮毎欣欣葺茅為我廬編蓬為我門縫布作袍被種榖充盤飱静讀古人書閑釣清渭濵優哉復游哉聊以終吾身詠慵有官慵不選有田慵不農屋穿慵不葺衣裂慵不縫有酒慵不酌無異尊長空有琴慵不彈亦與無絃同家人告飯盡欲炊慵不舂親朋寄書至欲讀慵開封嘗聞嵇叔夜一生在慵中彈琴復鍛鐵比我未為慵冬夜家貧親愛散身病交遊罷眼前無一人獨掩村齋卧冷落燈火暗離披簾幕破策策窗户前又聞新雪下長年漸省睡夜半起端坐不學坐忘心寂寞安可過兀然身寄世浩然心委化如此來四年一千三百夜村中留李三固言宿平生早遊宦不道無親故如我與君心相知應有數春明門前别金氏陂中遇村酒兩三盃相留寒日暮勿嫌村酒薄聊酌論心素請君少踟蹰繫馬門前樹明年身若健便擬江湖去他日縱相思知君無覓處後㑹既茫茫今宵君且住友人夜訪簷前清風簟松下明月盃幽意正如此况乃故人來遊悟真寺詩一百三十韻元和九年秋八月月上弦我遊悟真寺寺在王順山去山四五里先聞水潺湲自兹捨車馬始涉藍溪灣手拄青竹杖足蹋白石灘漸怪耳目曠不聞人世喧山下望山上初疑不可攀誰知中有路盤折通巖巔一息幡竿下再休石龕邉龕間長丈餘門户無扃關俯窺不見人石髪垂若鬟驚出白蝙蝠雙飛如雪翻囘首寺門望青崖夾朱軒如擘山腹開置寺於其間入門無平地地窄虗空寛房廊與臺殿髙下隨峰巒巖萼無撮土樹木多瘦堅根株抱石長屈曲蟲蛇蟠松桂亂無行四時鬱芊芊枝梢嫋清吹一作青翠韻若風中絃日月光不透緑隂相交延幽鳥時一聲聞之似寒蟬首憇賔位亭就坐未及安須㬰開北户萬里明豁然拂簷虹霏㣲遶棟雲囘旋赤日間白雨隂晴同一川野緑蔟草樹眼界吞秦原渭水細不見漢陵小於拳却顧來時路縈紆映朱䦨歴歴上山人一一遥可觀前對多寳塔風鐸鳴四端欒櫨與户牖恰恰金碧繁云昔伽葉佛此地坐涅槃至今鐵鉢在當底手跡穿西開玉像殿白佛森比肩斗藪塵埃衣禮拜氷雪顔曡霜為袈裟貫雹為華鬘逼觀疑鬼功其跡非雕鐫次登觀音堂未到聞旃檀上階脫雙履歛足升瑤筵六楹排玉鏡四座敷金鈿黒白自光明不待燈燭燃衆寳互低昂碧珮珊瑚幡風來似天樂相觸聲珊珊白珠垂露凝赤珠滴血殷㸃綴佛髻上合為七寳冠雙瓶白琉璃色若秋水寒隔瓶見舍利圓轉如金丹玉笛何代物天人施祗園吹如秋鶴聲可以降靈仙是時秋方中三五月正圓寳堂豁三門金魄當其前月與寳相射晶光爭鮮妍照人心骨冷竟夕不欲眠曉尋南塔路亂竹低嬋娟幽林不逢人寒蝶飛翾翾山果不識名離離夾道蕃足以療飢乏摘嘗味甘酸道南藍谷神紫繖白紙錢若歳有水旱詔使修蘋蘩以地清淨故獻奠無葷羶危石疊四五􅐑嵬欹且刓造物者何意堆在巖東偏冷滑無人跡苔㸃如花牋我來登上頭下臨不測淵目眩手足掉不敢低頭㸔風從石下生薄人而上摶衣服似羽翮開張欲飛騫􅑨􅑨三面峰峰尖刀劍攢往往白雲過决開露青天西北日落時夕暉紅團團千里翠屏外走下丹砂丸東南月上時夜氣青漫漫百丈碧潭底冩出黄金盤藍水色似藍日夜長潺潺周廻繞山轉下視如青環或鋪為慢流或激為奔湍泓澄最深處浮出蛟龍涎側身入其中懸磴尤險難捫蘿踏樛木下逐飲澗猨雪迸起白鷺錦跳驚紅鱣歇定方盥潄濯去支體煩淺深皆洞徹可照腦與肝但愛清見底欲尋不知源東崖饒怪石積甃蒼琅玕温潤發於外其間韞璵璠卞和死已久良玉多棄捐或時洩光彩夜與星月連中頂最髙峰拄天青玉竿􅫪􅤜上不得豈我能攀援上有白蓮池素葩覆清瀾聞名不可到處所非人寰又有一片石大如方尺甎插在半壁上其下萬仞懸云有過去師坐得無生禪號為定心石長老世相傳却上謁仙祠蔓草生綿綿昔聞王氏子羽化升上𤣥其西曬藥臺猶對芝术田時復明月夜上間黄鶴言廻尋畫龍堂二叟鬚髪斑想見聽法時歡喜禮印壇復歸泉窟下化作龍蜿蜒階前石孔在欲雨生白煙往有冩經僧身静心精專感彼雲外鴿羣飛千翩翩來添硯中水去吸巖下泉一日三往復時節長不愆經成號聖僧弟子名楊難誦此蓮花偈數滿百億千身壊口不壊舌根如紅蓮顱骨今不見石函尚存焉粉壁有吳畫筆彩依舊鮮素屏有禇書墨色如新乾名一作靈境與異跡周覽無不殫一遊五晝夜欲返仍盤桓我本山中人誤為時網牽牽率使讀書推挽令効官既登文字科又添諫諍員拙直不合時無益同素飱以此自慙惕戚戚常寡歡無成心力盡未老形骸殘今來脫簪組始覺離憂患及為山水遊彌得縱疎頑野麋斷羈絆行走無拘攣池魚放入海一往何時還身著居士衣手把南華篇終來此山住永謝區中縁我今四十餘從此終身閑若以七十期猶得三十年酬張十八訪宿見贈自此後詩為贊善大夫時作昔我為近臣君常稀到門今我官職冷唯君來往頻我受狷介性立為頑拙身平生雖寡合合即無緇磷况君秉髙義富貴視如雲五侯三相家眼冷不見君問其所與遊獨言韓舍人其次即及我我媿非其倫胡為謬相愛歳晚逾勤勤落然頽簷下一話夜達晨床單食味薄亦不嫌我貧日髙上馬去相顧猶逡廵長安久無雨日赤風昏昏憐君將病眼為我犯埃塵逺從延康里來訪曲江濵所重君子道不獨媿相親立名按嵗寒堂詩話元白張藉詩皆自淘浣中出專以道得人心中事為工又云張思深而語精元體輕而詞躁白則才多而意切蘇子曕喜之獨甚良有由然朝歸書寄元八進入閣前拜退就廊下餐歸來昭國里人卧馬歇鞍却睡至日午起坐心浩然况當好時節雨後清和天柿樹緑隂合王家庭院寛瓶中鄠縣酒墻上終南山獨眠仍獨坐開襟當風前禪僧與詩客次第來相㸔要語連夜語須眠終日眠除非奉朝謁此外無别牽年長身且健官貧心甚安幸無急病痛不至苦飢寒以此聊自適外縁不能干唯為静者信難為動者言臺中元侍御早晚作郎官未作郎官際無人相伴閒酬吳七見寄曲江有病客尋常多掩闗又聞馬死來不出身更閒聞有送書者自起出門㸔素緘署丹字中有瓊瑶篇口吟耳自聽當暑忽翛然似漱寒玉水如聞商風絃首章歎時節末句思笑言嬾慢不相訪隔街如隔山常聞陶潛語心逺地自偏君住安邑里左右車徒喧竹藥閉深院琴尊開小軒誰知市南地轉作壺中天君本上清人名在石堂間不知有何過謫作人間仙常恐歳月滿飄然歸紫煙莫忘蜉蝣内進士有同年昭國閒居貧閒日髙起門巷晝寂寂時暑放朝叅天隂少人客槐花滿田地僅絶人行跡獨在一床眠清涼風雨夕勿嫌坊曲逺近即多牽役勿嫌禄俸薄厚即多憂責平生尚恬曠老大宜安適何以養吾真官閒居處僻喜陳兄至黄鳥啼欲歇青梅結半成坐憐春物盡起入東園行攜觴嬾獨酌忽聞叩門聲閒人猶喜至何况是陳兄從容盡日語稠疊長年情勿輕一杯酒可以話平生贈杓直世路重禄位栖栖者孔宣人情愛年夀夭死者顔淵二人如何人不奈命與天我今信多幸撫已媿前賢己年四十四又為五品官况兹知足外别有所安焉早年以身代直赴逍遥篇近歳將心地廻向南宗禪外順世間法内脫區中縁進不厭朝市退不戀人寰自吾得此心投足無不安體非導引適意無江湖閑有興或飲酒無事多掩闗寂静夜深坐安穩日髙眠秋不苦長夜春不惜流年委形老小外忘懐生死間昨日共君語與余心膂然此道不可道因君聊强言立名按容齋五筆白樂天為人誠實洞達故作詩述懐好紀年歳寄張十八飢止一簞食渇止一壺漿出入止一馬寝興止一牀此外無長物於我有若亡胡然不知足名利心遑遑念兹彌嬾放積習遂為常經旬不出門竟日不下堂同病者張生貧僻住延康慵中毎相憶此意未能忘迢迢青槐街相去八九坊秋來未相見應有新詩章早晚來同宿天氣轉清涼題玉泉寺湛湛玉泉色悠悠浮雲身閒心對定水清淨兩無塵手把青笻杖頭戴白綸巾興盡下山去知我是誰人朝囘遊城南朝退馬未困秋初日猶長囘轡城南去郊野正清涼水竹夾小徑縈廻繞川岡仰㸔晚山色俯弄秋泉光青松繫我馬白石為我牀常時簪組累此日和身忘旦隨鵷鷺末暮遊鷗鶴旁機心一以盡兩處不亂行誰辨心與跡非行亦非藏白香山詩集巻六
