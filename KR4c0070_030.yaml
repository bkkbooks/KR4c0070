body:
  text: 白香山詩集卷三十歙縣汪立名編後集十律詩凡一百十四首勸酒十四首并序豫分秩東都居多暇日閒來輒飲醉後輒吟苦無詞章不成謡詠每發一意則成一篇凡十四篇皆主於酒聊以自勸故以何處難忘酒不如來飲酒命篇何處難忘酒七首何處難忘酒長安喜氣新初登髙第日乍作好官人省壁明張榜朝衣穩稱身此時無一盞爭奈帝城春何處難忘酒天涯話舊情青雲俱不達白髮遞相驚二十年前别三千里外行此時無一盞何以敘平生何處難忘酒朱門羡少年春分花發後寒食月明前小院回羅綺深房理管絃此時無一盞爭過艷陽天何處難忘酒霜庭老病翁暗聲啼蟋蟀乾葉落梧桐鬢為愁先白顔因醉暫紅此時無一盞何計奈秋風何處難忘酒軍功第一髙還鄉隨露布半路授旌旄玉柱剝蔥手金章爛椹袍此時無一盞何以騁雄豪何處難忘酒青門送别多斂襟收涕淚簇馬聽笙歌煙樹灞陵岸風塵長樂坡此時無一盞爭奈去留何何處難忘酒逐臣歸故園赦書逢驛騎賀客出都門半面瘴煙色滿衫鄉淚痕此時無一盞何物可招魂不如來飲酒七首莫隱深山去君應到自嫌齒傷朝水冷貌苦夜霜嚴漁去風生浦樵歸雪滿巖不如來飲酒相對醉厭厭莫作農夫去君應見自愁迎春犁瘦地趁晚餧羸牛數被官加稅稀逢嵗有秋不如來飲酒相伴醉悠悠莫作商人去恓惶君未諳雪霜行塞北風水宿江南藏鏹百千萬沈舟十二三不如來飲酒仰面醉酣酣莫事長征去辛勤難具論何曽畫麟閣祗是老轅門蟣蝨衣中物刀槍面上痕不如來飲酒合眼醉昏昏莫學長生去仙方誤殺君那將薤上露擬待鶴邊雲矻矻皆燒藥纍纍盡作墳不如來飲酒閒坐醉醺醺莫上青雲去青雲足愛憎自賢誇智慧相軋鬭功能魚爛緣吞餌蛾焦為撲燈不如來飲酒任性醉騰騰莫入紅塵去令人心力勞相爭兩蝸角所得一牛毛且滅嗔中火休磨笑裏刀不如來飲酒穩卧醉陶陶洛陽春洛陽陌上春常在昔别今來二十年唯覓少年心不得其餘萬事盡依然恨去年老去猶耽酒春來不著家去年來較晚不見洛陽花早出晚歸早起或因攜酒出晚歸多是看花回若拋風景長閒坐自問東京作底來魏王堤花寒懶發鳥慵啼信馬閒行到日西何處未春先有思柳條無力魏王堤嘗黃醅新酎憶微之世間好物黃醅酒天上閒人白侍郎愛向卯時謀洽樂亦曽酉日放粗狂醉來枕麴貧如富詩云一醉日富身後堆金有若亡元九計程殊未到甕頭一盞共誰嘗勸行樂少年信美何曽久春日雖遲不再中歡笑勝愁歌勝哭請君莫道等頭空老慵豈是交親向我疏老慵自愛閉門居近來漸喜知聞斷免惱嵇康索報書酬别微之臨都驛醉後作澧頭峽口錢唐岸三別都經二十年且喜筋骸俱健在勿嫌鬚鬢各皤然君歸北闕朝天帝我住東京作地仙博望自來非棄置承明重入莫拘牽醉收杯杓停燈語寒展衾裯對枕眠猶被分司官繫絆送君不得過甘泉豫與微之老而無子發于言歎著在詩篇今年冬各有一子戲作二什一以相賀一以自嘲常憂到老都無子何況新生又是兒隂德自然宜有慶于公隂德其後蕃昌皇天可得道無知皇天無知伯道無兒一園水竹今為主微之履信新居多水竹也百卷文章更付誰微之文集凡一百卷莫慮鵷雛無浴處即應重入鳯皇池立名按韻語陽秋樂天五十八始得阿崔微之五十一始得道保同時得嗣相與唱酬甚喜後二子俱以三嵗亡五十八翁方有後靜思堪喜亦堪嗟一珠甚小還慙蚌九子雖多不羡鴉秋月晚生丹桂實春風新長紫蘭芽持杯祝願無他語慎勿頑愚似汝爺自問年來私自問何故不歸京佩玉腰無力看花眼不明老慵難發遣春病易滋生賴有彈琴女時時聽一聲晚桃花一樹紅桃亞拂池竹遮松䕃晚開時非因斜日無由見不是間人豈得知寒地生材遺較易貧家養女嫁常遲春深欲落誰憐惜白侍郎來折一枝夜調琴憶崔少卿今夜調琴忽有情欲彈惆悵憶崔卿何人解愛中徽上秋思邊頭八九聲阿崔謝病臥東都羸然一老夫孤單同伯道遲暮過商瞿豈料鬢成雪方看掌弄珠巳衰寧望有雖晚亦勝無蘭入前春夢桑懸昨日弧里閭多慶賀親戚共歡娛膩剃新胎髮香綳小繡襦玉芽開手爪酥顆㸃肌膚弓冶將傳汝琴書勿墜吾未能知壽夭何暇慮賢愚乳氣初離殼啼聲漸變雛何時能反哺供養白頭烏贈鄰里往還問豫何故獨安然免被飢寒㛰嫁牽骨肉都盧無十口糧儲依約有三年但能抖擻人間事便是逍遙地上仙惟恐往還相厭賤南家飲酒北家眠王子晉廟子晉廟前山月明人間往往夜吹笙鸞吟鳯唱聽無拍多似霓裳散序聲晚起起晚憐春暖歸遲愛月明放慵長飽睡聞健且閒行北闕停朝簿西方入社名惟吟一句偈無念是無生酬皇甫賔客𤣥晏家風黃綺身深居髙臥養精神性慵無病常稱病心足雖貧不道貧竹院君閒銷永日花亭我醉送殘春自嫌詩酒猶多興若比先生是俗人池上贈韋山人新竹夾平流新荷拂小舟衆皆嫌好拙誰肯伴閒遊客為忙多去僧因飯暫留獨憐韋處士盡日共悠悠無夢老眼花前暗春衣雨後寒舊詩多忘却新酒且嘗看拙定於身穩慵應趁伴難漸消名利想無夢到長安對小潭寄逺上人小潭澄見底閒客坐開襟借問不流水何如無念心彼惟清且淺此乃寂而深是義誰能答明朝問道林間吟二首留司老賓客春盡興如何官寺行香少僧房寄宿多間傾一盞酒醉聽兩聲歌憶得陶潛語羲皇無以過閒遊來早晚巳得一周年嵩洛供雲水朝廷乞俸錢長歌時獨酌飽食後安眠聞道山榴發明朝向玉泉獨遊玉泉寺三月三十日雲樹玉泉寺肩輿半日程更無人作伴祗共酒同行新葉千萬影殘鶯三兩聲閒遊竟未足春盡有餘情晚出尋人不遇籃輿不乘乘晚涼相尋不遇亦何妨輕衣穩馬槐隂下自要閒行一兩坊苦熱頭痛汗盈巾連宵復達晨不堪逢苦熱猶賴是閒人朝客應煩倦農夫更苦辛始慙當此日得作自由身銷暑何以銷煩暑端居一院中眼前無長物窗下有清風熱散由心靜涼生為室空此時身自得難更與人同行香歸出作行香客歸如坐夏僧牀前雙草屨檐下一紗燈珮委腰無力冠欹髮不勝鸞臺龍尾道合盡少年登同王十七庶子李六員外鄭二侍御同年四人遊龍門有感而作一曲悲歌酒一尊同年零落幾人存世如閲水應堪嘆名似浮雲豈足論各從仕祿休明代共感平生知已恩今日與君重上處龍門不是舊龍門池上小宴問程秀才洛下林園好自知江南景物暗相隨淨淘紅粒罯香飯薄切紫鱗烹水葵雨滴篷聲青雀舫浪搖花影白蓮池停杯一問蘇州客何似吳松江上時橋亭卯飲卯時偶飲齊時臥林下髙橋橋上亭松影過窗眠始覺竹風吹面醉初醒就荷葉上包魚鮓當石渠中浸酒瓶生計悠悠身兀兀甘從妻喚作劉伶舟中夜坐潭邊霽後多清景橋下涼來足好風秋鶴一雙船一隻夜深相伴月明中戲和微之答竇七行軍之作依本韻旌鉞從櫜鞬賓僚禮數全䕫龍來要地鵷鷺下遼天赭汗騎驕馬青蛾舞醉仙合成江上作散到洛中傳陋巷能無酒貧池亦有船春裝秋未寄謾道有閒錢閒忙奔走朝行內棲遲林墅間多因病後退少及健時還斑白霜侵鬢蒼黃日下山間忙俱過日忙較不如間西風西風來幾日一葉巳先飛新霽乘輕屐初涼換熟衣淺渠銷漫水疏竹漏斜暉薄暮青苔巷家僮引鶴歸題西亭多見朱門富貴人林園未畢即無身我今幸作西亭主巳見池塘五度春觀游魚繞池閒步看魚游正值兒童弄釣舟一種愛魚心各異我來施食爾垂鈎看采蓮小桃閒上小蓮船半采紅蓮半白蓮不似江南惡風浪芙蓉池在臥牀前看采菱菱池如鏡淨無波白㸃花稀青角多時唱一聲新水調謾人道是采菱歌夭老早世身如風裏燭暮年髮似鏡中絲誰人斷得人間事少夭堪傷老又悲秋池洗浪清風透水霜水邊閒坐一繩牀眼塵心垢見皆盡不是秋池是道場登天宫閣午時乘興出薄暮未能還髙上煙中閣平看雪後山委形羣動裏任性一生間洛下多閒客其中我最閒新雪二首寄楊舍人不思北省煙霄地不憶南宫風月天惟憶靜恭楊閣老小園新雪暖爐前不思朱雀街東鼓不憶青龍寺後鐘唯憶夜深新雪後新昌臺上七株松日髙臥怕寒放懶日髙卧臨老誰言牽率身夾幕繞房深似洞重裀襯枕暖於春小青衣動桃根起嫩緑醅浮竹葉新未裹頭前傾一盞何如衝雪趁朝人和微之任校書郎日過三鄉三鄉過日君年幾今日君年五十餘不獨年催身亦變校書郎變作尚書和微之十七與君别及隴月花枝之詠别時十七今頭白惱亂君心三十年垂老休吟花月句恐君更結後身緣和微之歎槿花朝榮殊可惜暮落實堪嗟若向花中比猶應勝眼花思往喜今憶除司馬向江州及此凡經十五秋雖在簪裾從俗纍半尋山水是閒遊謫居終帶鄉關思領郡猶分邦國憂爭似如今作賔客都無一念到心頭題平泉薛家雪堆莊怪石千年應自結靈泉一帶是誰開蹙為宛轉青蛇項噴作玲瓏白雪堆赤日旱天長看雨𤣥隂臘月亦聞雷所嗟地去都門逺不得肩輿每日來和微之道保生三日相看鬢似絲始作弄璋詩且有承家望誰論得力時莫興三日歎猶勝七年遲豫老微之七嵗我未能忘喜君應不合悲嘉名稱道保乞姓號崔兒但恐持相並蒹葭瓊樹枝哭皇甫七郎中湜志業過𤣥晏詞華似禰衡多才非福祿薄命是聰明不得人間壽還留身後名涉江文一首便可敵公卿持正竒文甚多涉江一章尤著晚起爛熳朝眠後頻伸晚起時暖爐生火早寒鏡裹頭遲融雪煎香茗調酥煮乳糜慵饞還自哂快活亦誰知酒性溫無毒琴聲淡不悲榮公三樂外仍弄小男兒疑夢二首莫驚寵辱虛憂喜莫計恩讎浪苦辛黃帝孔邱無處問安知不是夢中身鹿疑鄭相終難辨蝶化莊生詎可知假使如今不是夢能長於夢幾多時夜宴惜别笙歌旖旎曲終頭轉作離聲滿坐愁箏怨朱絃從此斷燭啼紅淚為誰流夜長似嵗歡宜盡醉未如泥飲莫休何況雞鳴即須别門前風雨冷修修歸來二周歲歸來二周嵗二嵗似須臾池藕重生葉林鴉再引雛時豐實倉廩春暖葺庖廚更作三年計三年身健無吾土身心安處為吾土豈限長安與洛陽水竹花前謀活計琴詩酒裏到家鄉榮先生老何妨樂楚接輿歌未必狂不用將金買莊宅城東無主是春光題岐王舊山池石壁樹深藤老竹回環石壁重重錦翠斑俗客看來猶解愛忙人到此亦須間況當霽景涼風後如在千巖萬壑間黃綺更歸何處去洛陽城內有商山病眼花頭風目眩乘衰老祗有增加豈有瘳傳云有加而無瘳花發眼中猶足怪柳生肘上亦須休大窠羅綺看才辨小字文書見便愁必若不能分黑白却應無悔復無尤早飲醉中除河南尹敇到雪擁衡門水滿池溫爐卯後暖寒時緑醅新酎嘗初醉黃紙除書到不知厚俸自來誠忝濫老身欲起尚遲疑應須了却邱中計女嫁男㛰三徑資除夜病眼少眠非守嵗老心多感又臨春火銷燈盡天明後便是平頭六十人府西池柳無氣力枝先動池有波紋氷盡開今日不知誰計㑹春風春水一時來天津橋津橋東北斗亭西到此令人詩思迷睂月晚生神女浦臉波春傍窈娘堤柳絲嫋嫋風繅出草縷茸茸雨剪齊報道前驅少呼喝恐驚黃鳥不成啼不准擬二首籃輿騰騰一老夫褐裘烏帽白髭鬚早衰饒病多蔬食筋力消磨合有無不准擬身年六十上山仍未要人扶憶昔謫居炎瘴地巴猿引哭虎隨行多于賈誼長沙苦豫自左遷江峽凡經七年小較潘安白髮生不准擬身年六十遊春猶自有心情府中夜賞櫻桃㕔院春偏好石井闌堂夜更幽白粉牆頭花半出緋紗燭下水平流閒留賓客嘗新酒醉領笙歌上小舟舞袖飄颻棹容與忽疑身是夢中遊府西池北新葺水齊即事招賔偶題十六韻繚繞府西面潺湲池北頭鑿開明月峽決破白蘋洲清淺漪瀾急夤緣浦嶼幽直衝行徑斷平入臥齊流石疊青稜玉波翻白片鷗噴時千㸃雨澄處一泓油絶境應難别悲列切同心豈易求少逢人愛玩多是我淹留夾岸鋪長簟當軒泊小舟枕前看鶴浴牀下見魚遊洞户斜開扇疏簾半上鈎紫浮萍泛泛碧亞竹修修讀罷書仍展棊終局未收午茶能散睡卯酒善消愁檐雨晚初霽窗風涼欲休誰能伴老尹時復一閒遊哭崔兒掌珠一顆兒三歲鬢雪千莖父六旬豈料汝先為異物常憂吾不見成人悲腸自斷非因劔啼眼加昏不是塵懷抱又空天默默依前重作鄧攸身初喪崔兒報微之晦叔書報微之晦叔知欲題崔字淚先垂世間此恨偏敦我敦音堆見詩注天下何人不哭兒蟬老悲鳴拋蛻後龍眠驚覺失珠時文章千帙官三品身後傳誰庇廕誰府齊感懷酬夢得時初喪崔兒夢得以詩相安云從此期君比瓊樹一枝吹折一枝生故有此落句以報之府伶呼喚爭先到家醖提攜動輒隨合是人生開眼日自當年老斂睂時丹砂鍊作三銖土𤣥髮看成一把絲勞寄新詩逺安慰不聞枯樹更生枝齊居香火多相對葷腥久不嘗黃耆數匙粥赤箭一甌湯厚俸將何用閒居不可忘明年官滿後擬買雪堆莊與諸道者同遊二室至九龍潭作喜逢二室逰仙子厭作三川守土臣舉手摩挲潭上石開襟抖擻府中塵他日終為獨往客今朝未是自由身若言尹是嵩山主三十六峰應笑人履道池上作家池動作經旬别松竹琴魚好在無樹暗小巢藏巧婦渠荒新葉長慈姑不因車馬時時到豈覺林園日日蕪猶喜春深公事少每來花下得踟蹰六十拜河南尹六十河南尹前途足可知老應無處避病不與人期幸遇芳菲日猶當强健時萬金何假藉一盞莫推辭流水光隂急浮雲富貴遲人間若無酒盡合鬢成絲重修府西水亭院因下疏為沼隨髙築作臺龍門分水入金谷取花栽繞岸行初匝憑軒立未回園西有池位留與後人開與諸公同出城觀稼老尹醉醺醺來隨年少羣不憂頭似雪但喜稼如雲嵗望千箱積秋憐五榖分何人知帝力堯舜正為君水堂醉臥問杜三十一聞君洛下住多年何處春流最可憐為問魏王堤岸下何如同德寺門前無妨水色堪閒玩不得泉聲伴醉眠那似此堂簾幕底連明連夜碧潺湲歲暮言懷職與才相背心將口自言磨鉛教切玉驅鶴遣乘軒只合居巖窟何因入府門年終苦無替轉恐負君恩座中戲呈諸少年衰容禁得無多酒秋鬢新添幾許霜縱有風情應淡薄假如老健莫誇張興來吟詠從成癖飲後酣歌少放狂不為倚官兼挾勢因何入得少年場雪後早過天津橋偶呈諸客官橋晴雪曉峨峨老尹行吟獨一過紫綬相輝應不惡白鬚同色復如何悠揚短景凋年急牢落衰情感事多猶賴洛中饒醉客時時䛏我喚笙歌新製綾襖成感而有詠水波文襖造新成綾軟綿勻溫復輕晨興好擁向陽坐晚出宜披踏雪行鶴氅毳疏無實事木棉花冷得虛名宴安往往歡侵夜臥穩昏昏睡到明百姓多寒無可救一身獨暖亦何情心中為念農桑苦耳裏如聞飢凍聲爭得大裘長萬丈與君都蓋洛陽城立名按樂天詩多學杜葛常之云杜甫茅屋為秋風所破歌安得廣厦千萬間大庇天下寒士多歡顔風雨不動安如山於乎何時眼前見此屋吾廬獨破受凍死亦足此飢寒而憫人飢寒者也樂天新置布裘詩及新製綾襖成詩此飽暖而憫人饑寒者也芥隱筆記云樂天此詩與子美一意早春雪後贈洛陽李長官長水鄭明府二同年獻嵗晴和風景新銅駝街郭暖無塵府庭共賀三川雪縣道分行百里春朱紱洛陽官位屈青袍長水俸錢貧有何功德紆金紫若比同年是幸人醉吟醉來忘渴復忘饑冠帶形骸杳若遺耳底齊鐘初過後心頭卯酒未消時臨風朗詠從人聽看雪閒行任馬遲應被衆疑公事慢承前府尹不吟詩府酒五絶變法自慙到府來周歲惠愛威稜一事無惟是改張官酒法漸從濁水作醍醐招客日午微風且暮寒春風冷峭雪乾殘碧氊帳下紅爐畔試為來嘗一盞看辨味甘露太甜非正味醴泉雖潔不芳馨杯中此物何人别柔旨之中有典刑自勸憶昔羇貧應舉年脫衣典酒曲江邊十千一斗猶賖飲何況官供不著錢諭妓燭淚夜粘桃葉袖酒痕春汚石榴裙莫辭辛苦供歡宴老後思量悔煞君晚歸早出筋力年年減風光日日新退衙歸逼夜拜表出侵晨何處臺無月誰家池不春莫言無勝地自是少閒人坐厭推囚案行嫌引馬塵幾時辭府印却作自由身南龍興寺殘雪南龍興寺春晴後緩步徐吟繞四廊老趁風花應不稱閒尋松雪正相當吏人引從多乘輿賓客逢迎少下堂不擬人間更求事些些疏懶亦何妨天宫閣早春天宫髙閣上何頻每上令人耳目新前日晚登緣看雪今朝晴望為迎春林鶯何處吟箏柱牆柳誰家曬麴塵可惜三川虛作主風光不屬白頭人履道居三首莫嫌地窄林亭小莫厭貧家活計微大有髙門鎖寬宅主人到老不曽歸東里素帷猶未徹南鄰丹旐又新懸衡門蝸舍自慙愧收得身來巳五年世事平分衆所知何嘗苦樂不相隨唯餘耽酒狂歌客只有樂時無苦時和夢得冬日晨興漏傳初五㸃雞報第三聲帳下從容起窗間曨􅀈明照書燈未滅暖酒火重生理曲絃歌動先聞唱渭城雪夜對酒招客帳小青氊暖杯香緑蟻新醉憐今夜月歡憶去年人暗落燈花燼閒生草座塵殷勤報絃管明日有嘉賔贈晦叔憶夢得自别崔公四五秋因何臨老轉風流歸來不說秦中事歇定唯謀洛下遊酒面浮花應是喜歌睂斂黛不關愁得君更有無厭意猶恨尊前缺老劉醉後重贈晦叔老伴知君少歡情向我偏無論疏與數相見輒欣然各以詩成癖俱因酒得仙笑回青眼語醉並白頭眠豈是今投分多疑宿結緣人間更何事攜手送衰年睡覺星河耿耿漏綿綿月暗燈微欲曙天轉枕頻伸書帳下披裘箕踞火爐前老眠早覺常殘夜病力先衰不待年五欲巳消諸念息世間無境可勾牽白香山詩集卷三十
