body:
  text: 白香山詩集卷一歙縣汪立名編長慶集一諷諭古調詩五言凡六十四首賀雨皇帝嗣寶歷元和三年冬自冬及春暮不雨旱爞爞上心念下民懼嵗成災凶遂下罪已詔殷勤制一作告萬邦帝曰豫一人繼天承祖宗憂勤不遑寧夙夜心忡忡元年誅劉闢一舉靖巴卭二年戮李錡不戰安江東顧惟眇眇德遽有巍巍功或者天降沴無乃警豫躬上思答天戒下思致時雍莫如率其身慈和與儉恭乃命罷進獻乃命賑飢窮宥死降五刑已責按已責乃用左傳晉悼公已責事謂止逋債也今本皆作責已誤寬三農宫女出宣徽廏馬減飛龍庶政靡不舉皆由自宸衷奔騰道路人傴僂田野翁歡呼相告報感泣涕沾胸順人人心恱先天天意從詔下才七日和氣生沖融凝為油油一作悠悠雲散作習習風晝夜三日雨淒淒復濛濛萬心春熙熙百穀青芃芃人變愁為喜嵗易儉為豐乃知王者心憂樂與衆同皇天與后土所感無不通冠珮何鏘鏘將相及王公蹈舞呼萬嵗列賀明庭中小臣誠愚陋職忝金鑾宫稽首再三拜一言獻天聰君以明為聖臣以直為忠敢賀有其始亦願有其終立名按元和四年閏三月憲宗以久旱欲降德音公見詔節未詳即建言乞免江淮兩賦以救流瘠且多出宫人上悉從之制下而雨公集中有奏請加德音中節目二狀讀張籍古樂府張君何為者業文三十春尤工樂府詩舉代少其倫為詩意如何六義互鋪陳風雅比興外未嘗著空文讀君學仙詩可諷放佚君讀君董公詩可誨貪暴臣讀君商女詩可感悍婦仁讀君勤齊詩可勸薄夫敦上可禆教化舒之濟萬民下可理情性卷之善一身始從青襟嵗逮此白髮新日夜秉筆吟心苦力亦勤時無采詩官委棄如泥塵恐君百歲後滅沒人不聞願藏中祕書百代不湮淪願播內樂府時得聞至尊言者志之苗行者文之根所以讀君詩亦知君為人如何欲五十官小身賤貧病眼街西住無人行到門哭孔戡洛陽誰不死戡死聞長安我是知戡者聞之涕泫然戡佐山東軍非義不可干拂衣向西來其道直如弦從事得如此人人以為難人言明明代合置在朝端或望居諌司有事戡必言或望居憲府有邪戡必彈惜哉兩不諧沒齒為間官竟不得一日謇謇立君前形骸隨衆人斂葬北邙山平生剛腸內直氣歸其間賢者為生民生死懸在天謂天不愛人胡為生其賢謂天果愛民胡為奪其年茫茫元化中誰執如此權立名按孔戡即孔戣之兄也盧從史鎮澤潞辟為書記從史寖驕隂連王承宗田緒欲效河朔事以固位戡每秉筆至不軌之言極諌以為不可從史怒遂謝病歸從史復疏請貶逐憲宗不得已授衛尉丞詔下給事中呂元膺執之上令中使慰諭元膺制書方下戡不調而卒事詳唐書本傳凶宅長安多大宅列在街西東往往朱門內房廊相對空梟鳴松桂枝狐藏蘭菊叢蒼苔黃葉地日暮多旋風前主為將相得罪竄巴庸後主為公卿寢疾殁其中連延四五主殃禍繼相鍾自從十年來不利主人翁風雨壞簷隙蛇鼠穿牆墉人疑不敢買日毀土木功嗟嗟俗人心甚矣其愚蒙但恐災將至不思禍所從我今題此詩欲悟迷者胸凡為大官人年祿多髙崇權重持難久位髙勢易窮驕者物之盈老者數之終四者如冦盜日夜來相攻假使居吉土孰能保其躬因小以明大借家可喻邦周秦宅崤函其宅非不同一興八百年一死望夷宫寄語家與國人凶非宅凶夢仙人有夢仙者夢身升上清坐乘一白鶴前引雙紅旌羽衣忽飄飄玉鸞俄錚錚半空直下視人世塵冥冥漸失鄉國處才分山水形東海一片白列嶽五點青須臾羣仙來相引朝玉京安期羡門輩列侍如公卿仰謁玉皇帝稽首前致誠帝言汝仙才努力勿自輕却後十五年期汝不死庭再拜受斯言既寤喜且驚祕之不敢泄誓志居巖扃恩愛捨骨肉飲食斷羶腥朝餐雲母散夜吸沆瀣精空山三十載日望輜軿迎前期過已久鸞鶴無來聲齒髮日衰白耳目減聰明一朝同物化身與糞壤並神仙信有之俗力非可營苟無金骨相不列丹臺名徒傳辟穀法虛受燒丹經只自取勤苦百年終不成悲哉夢仙人一夢誤一生觀刈麥時為盩厔縣尉田家少間月五月人倍忙夜來南風起小麥覆隴黃婦姑荷簞食童稚攜壺漿相隨餉田去丁壯在南岡足蒸暑土氣背灼炎天光力盡不知熱但惜夏日長復有貧婦人抱子在其傍右手秉遺穗左臂懸敝筐聽其相顧言聞者為悲傷家田輸稅盡拾此充飢腸今我何功德曾不事農桑吏祿三百石嵗晏有餘糧念此私自愧盡日不能忘題海圖屏風元和己丑年作海水無風時波濤安悠悠鱗介無小大遂性各沉浮突兀海砥鼇首冠三神邱釣網不能制其來非一秋或者不量力謂兹鼇可求贔屭牽不動綸絶沉其鈎一鼇既頓頷諸鼇齊掉頭白濤與黑浪呼吸繞咽喉噴風激飛亷鼓波怒陽侯鯨鯢得其便張口欲吞舟萬里無活鱗百川多倒流遂使江漢水朝宗意亦休蒼然屏風上此畫良有由立名按此詩於題下注年必有為而作已丑為元和四年四月憲宗欲乘王士真死除人代之不從則興師討之以革河北諸鎮世襲之弊裴垍不可李絳言武俊父子相承四十餘年今承宗又已總軍務一旦易之恐未即奉詔又河北諸鎮事體正同必不自安隂相黨助中尉吐突承璀欲奪垍權自請將兵討之未行九月憲宗又欲以承宗為成德留後割其德棣二州更為一鎮命王氏壻薛昌朝領之承宗果囚昌朝抗不奉詔遂命承璀統兵討承宗自此兵連禍結師久無功公集有狀論其事云臣伏以河北事體本不宜用兵此詩當因是託諷也東坡云吳元濟以蔡叛犯許汝以驚東都此不可不討者也當時議者欲置之固為非䇿然不得武裴二傑士亦未易辦也白樂天豈庸人哉然其議論亦似屬置之者其詩有海圖屏風者可見其意且注云時方討淮蔡叛吾以是知仁人君子之於兵蓋不忍輕用如此淮蔡且欲以德懷况欲敵所恃以事無用乎悲乎此未易與俗士談也東坡此語定有為特借是以發之耳然今本並無淮蔡叛之注况元濟反在元和十年縱兵侵掠不容不討者詩中不量力鼇可求等語殊不相涉是詩之作確是元和四年然則宋本亦有繆誤東坡以注為據遂不復推考也羸駿驊騮失其主羸餓無人牧向風嘶一聲莽蒼黃河曲踏冰水畔立臥雪冢間宿嵗暮田野空寒草不滿腹豈無市駿者盡是凡人目相馬失於瘦遂遺千里足村中何擾擾有吏徵芻粟淪彼軍廄中化作駑駘肉廢琴絲桐合為琴中有太古聲古聲淡無味不稱今日情玉徽光彩滅朱絃塵土生廢棄來已久遺音尚泠泠不辭為君彈縱彈人不聽何物使之然羌笛與秦箏李都尉古劒古劒寒黯黯鑄來幾千秋白光納日月紫氣排斗牛有客借一觀愛之不敢求湛然玉匣中秋水澄不流至寶有本性精剛無與儔可使寸寸折不能繞指柔願快直士心將斷佞臣頭不願報小怨夜半刺私讐勸君慎所用無作神兵羞雲居寺孤桐一株青玉立千葉緑雲委亭亭五文餘髙意猶未已山僧年九十清淨老不死自云手種時一顆青桐子直從萌芽拔髙自毫末始四面無附枝中心有通理寄言立身者孤直當如此京兆府新栽蓮時為盩厔尉趨府作汚溝貯濁水水上葉田田我來一長歎知是東溪蓮下有青泥汚馨香無復全上有紅塵撲顔色不得鮮物性猶如此人事亦宜然託根非其所不如遭棄捐昔在溪中日花葉媚清漣今來不得地憔悴府門前月夜登閣避暑旱久炎氣其中人若燔燒清風隱何處草樹不動搖何以避暑氣無如出塵囂行行都門外佛閣正岧嶤清涼近髙生煩熱委靜銷開襟當軒坐神泰意飄飄回看歸路傍禾黍盡枯焦獨善誠有計將何救旱苗初授拾遺奉詔登左掖束帶參朝議何言初命卑且脫風塵吏杜甫陳子昻才名括天地當時非不遇尚無過斯位況豫蹇薄者寵至不自意驚近白日光慙非青雲器天子方從諫朝廷無忌諱豈不思匪躬適遇時無事受命已旬月飽食隨班次諫紙忽盈箱對之終自愧贈元稹自我從宦遊七年在長安所得惟元九乃知定交難豈無山上苗徑寸無嵗寒豈無要津水咫尺有波瀾之子異於是久處一作要誓不諼無波古井水有節秋竹竿一為同心友三及芳嵗闌一作蘭花下鞍馬遊雪中杯酒歡衡門相逢迎不具帶與冠春風日髙睡秋月夜深看不為同登科不為同署官所合在方寸心源無異端哭劉敦質小樹兩株柏新土三尺墳蒼蒼白露草此地哭劉君哭君豈無辭辭云君子人如何天不弔窮悴至終身愚者多貴壽賢者獨賤迍龍亢彼無悔蠖屈此不伸哭罷持此辭吾將詰羲文答友問大圭廉不割利劒用不缺當其斬馬時良玉不如鐵置鐵在洪爐鐵消易如雪良玉同其中三日燒不熱君疑才與德詠此知優劣雜興三首楚王多內寵傾國選嬪妃又愛從禽樂馳騁每相隨錦韝臂花隼羅袂控金羈遂習宫中女皆如馬上兒色禽合為荒刑政兩已衰雲夢春仍獵章華夜不歸東風二月天春鴈正離離美人挾銀鏑一發疉雙飛飛鴻驚斷行斂翅避蛾眉君王顧之笑弓箭生光輝回眸語君曰昔聞莊王時有一愚夫人其名曰樊姬不有此遊樂三載斷鮮肥越國政初荒越天旱不已風日燥水田水涸塵飛起國中新下令官渠禁流水流水不入田壅入王宫裏餘波養魚鳥倒影浮樓雉淡灩九折池縈回十餘里四月芰荷發越王日遊嬉左右好風來香動芙蓉蕊但愛芙蓉香又種芙蓉子不念閶門外千里稻苗死吳王心日侈服玩盡竒瓌身臥翠羽帳手持紅玉杯冠垂明月珠帶束通天犀行動自矜顧數步一徘徊小人知所好懷寶四方來姦邪得藉手從此幸門開古稱國之寶榖米與賢才今看君王眼視之如塵灰伍員諌已死浮尸去不回姑蘇臺下草麋鹿暗生麑宿紫閣山北村晨遊紫閣峰暮宿山下村村老見豫喜為豫開一尊舉杯未及飲暴卒來入門紫衣挾刀斧草草十餘人奪我席上酒掣我盤中飱主人退後立斂手反如賔中庭有竒樹種來三十春主人惜不得持斧斷其根口稱采造家身屬神策軍主人愼勿語中尉正承恩立名按貞元十二年始立左右神䇿護軍中尉統禁旅時竇霍權勢振赫嗣是宦官之驕橫日長公與元九書所謂聞紫閣村詩則握軍要者切齒是也宋洪景盧容齋續筆云宣和間朱勔挾花石進奉之名以固寵規利士民家一草一木稍堪玩使者即令健卒直入其家用黃封表志未即取護視倣不謹則被以大不恭罪及發行必撤屋決墻而出偶讀樂天此詩乃知唐世固有是事蓋貞元元和間也讀漢書禾黍與稂莠雨來同日滋桃李與荆棘霜降同夜萎草木既區别榮枯那等夷茫茫天地意無乃太無私小人與君子用置各有宜奈何西漢末忠邪並信之不然盡信忠早絶邪臣窺不然盡信邪早使忠臣知優遊兩不斷盛業日已衰痛矣蕭京輩終令陷禍機蕭望之京房等每讀元成紀憤憤令人悲寄言為國者不得學天時寄言為臣者可以鑒於斯贈樊著作陽城為諌議以正事其君其手如屈軼舉必指佞臣卒使不仁者不得秉國鈞元稹為御史以直立其身其心如肺石動必達窮民東川八十家寃憤一言伸劉闢肆亂心殺人正紛紛其嫂曰庾氏棄絶不為親從史萌逆節隱心潛負恩其佐曰孔戡捨去不為賔凡此士與女其道天下聞常恐國史上但紀鳯與麟賢者不為名名彰教乃敦每惜若人輩身死名亦淪君為著作郎職廢志空存雖有良史才直筆無所申何不自著書實録彼善人編為一家言以備史闕文蜀路石婦道傍一石婦無記復無銘傳是此鄉女為婦孝且貞十五嫁邑人十六夫征行夫行二十載婦獨守孤煢其夫有父母老病不安寧其婦執婦道一一如禮經晨昏問起居恭順發心誠藥餌自調節膳羞必甘馨夫行竟不歸婦德轉光明後人髙其節刻石像婦形儼然整衣巾若立在閨庭似見舅姑禮如聞環珮聲至今為婦者見此孝心生不比山頭石空有望夫名折劒頭拾得折劒頭不知折之由一握青蛇尾數寸碧峰頭疑是斬鯨鯢不然刺蛟虬缺落泥土中委棄無人收我有鄙介性好剛不好柔勿輕直折劒猶勝曲全鈎登樂遊園望獨上樂遊園四望天日曛東北何靄靄宫闕入煙雲愛此髙處立忽如遺垢氛耳目暫清曠懷抱鬱不伸下視十二街緑樹間紅塵車馬徒滿眼不見心所親孔生死洛陽元九謫荆門可憐南北路髙蓋者何人酬元九對新栽竹有懷見寄頃有贈元九詩云有節秋竹竿故元感之因重見寄昔我十年前與君始相識曾將秋竹竿比君孤且直中心一以合外事紛無極共保秋竹心風霜侵不得按今本作會將秋竹心風霜侵不得落去曾將秋竹竿以下四句始嫌梧桐樹秋至先改色不愛楊栁枝春來軟無力憐君別我後見竹長相憶常欲在眼前故栽庭戶側分首今何處君南我在北吟我贈君詩對之心惻惻感鶴鶴有不羣者飛飛在野田飢不啄腐鼠渴不飲盜泉貞姿自耿介雜鳥何翩翾同遊不同志如此十餘年一興嗜欲念遂為矰繳牽委質小池內爭食羣雞前不惟懷稻粱兼亦競腥羶不惟戀主人兼亦狎烏鳶物心不可知天性有時遷一飽尚如此況乘大夫軒春雪元和歲在卯六年春二月月晦寒食天天隂夜飛雪連宵復竟日浩浩殊未歇大似落鵝毛密如飄玉屑寒銷春茫蒼氣變風凛冽上林草盡沒曲江水復結紅乾杏花死緑凍楊栁一作枝折所憐物性傷非惜年芳絶上天有時令四序平分别寒燠苟反常物性皆夭閼我觀聖人意魯史有其説或記水不冰或書霜不殺上將警政教下以防災孽兹雪今如何信美非時節立名按昌黎有辛卯年雪詩元和六年春寒氣不肻歸河南二月末雪花一尺圍又云生平未曽見何暇論是非其雪之大可知詩中上林曲江自是京師作是年公尚為京兆户曹參軍四月丁母喪歸渭村李墓碑作五年喪母安得六年春猶在京師此詩可證李碑之訛矣髙僕射富貴人所愛聖人去其泰所以致仕年著在禮經內玄元亦有訓知止則不殆二疏獨能行遺迹東門外清風久銷歇追此向千載斯人古亦稀何況今之代遑遑名利客白首千百輩唯有髙僕射七十懸車蓋我年雖未老歲月亦云邁預恐耄及時貪榮不能退中心私自警何以為我戒故作僕射詩書之於大帶白牡丹和錢學士作城中看花客旦暮走營營素華人不顧亦占牡丹名開在深寺中車馬無來聲唯有錢學士盡日繞叢行憐此皓然質無人自芳馨衆嫌我獨賞移植在中庭留景夜不暝迎光曙先明對之心亦靜虛白相向生唐昌玉蕊花攀玩衆所爭折來比顔色一種如瑶瓊彼因稀見貴此以多為輕始知無正色愛惡隨人情豈惟花獨爾理與人事并君看入眼一作時者紫豔與紅英贈內生為同室親死為同穴塵他人尚相勉而況我與君黔婁固窮士妻賢忘其貧冀缺一農夫妻敬儼如賔陶潛不營生翟氏自㸑薪梁鴻不肯仕孟光甘布裙君雖不讀書此事耳亦聞至此千載後傳是何如人人生未死間不能忘其身所須者衣食不過飽與溫蔬食足充飢何必膏粱珍繒絮足禦寒何必錦繡文君家有貽訓清白遺子孫我亦貞苦士與君新結婚庶保貧與素偕老同欣欣寄唐生賈誼哭時事阮籍哭路岐唐生今亦哭異代同其悲唐生者何人五十寒且飢不悲口無食不悲身無衣所悲忠與義悲甚則哭之太尉擊賊日段太尉以笏擊朱泚尚書叱盜時顔尚書叱李希烈大夫死凶冦陸大夫為亂兵所殺諫議謫蠻夷楊諫議左遷道州每見如此事聲發涕輒隨往往聞其風俗士猶或非憐君頭半白其志竟不衰我亦君之徒鬱鬱何所為不能發聲哭轉作樂府詩篇篇無空文句句必盡規功髙虞人針痛甚騷人辭非求宫律髙不務文字奇惟歌生民病願得天子知未得天子知甘受時人嗤藥良氣味苦琴淡音聲稀不懼權豪怒亦任親朋譏人竟無奈何呼作狂男兒每逢羣盜息或遇雲霧披但自髙聲歌庶幾天聽卑歌哭雖異名所感則同歸寄君三十章與君為哭詞立名按舊書本傳唐衢應進士久而不第能為歌詩意多感發見人文章有所傷歎者讀訖必哭涕泗不能已每與人言論既别發聲一號音辭哀切聞者莫不泣下故世稱唐衢善哭李肇國史補曰唐衢周鄭客也有文學老而無成惟善哭每一發聲音調哀切聞者泣下常遊太原遇享軍酒酣乃哭滿座不樂主人為之罷宴傷唐衢二首自我心存道外物少能逼常排傷心事不為長歎息忽聞唐衢死不覺動顔色悲端從東來觸我心惻惻伊昔未相知偶遊滑臺側同宿李翺家一言如舊識酒酣出送我風雪黃河北日西並馬頭語别至昏黑君歸向東鄭我來遊上國交心不交面從此重相憶憐君儒家子不得詩書力五十著青衫試官無祿食遺文僅千首六義無差忒散在京洛一作索間何人為收拾憶昨元和初忝備諫官位是時兵革後生民正憔悴但傷民病痛不識時忌諱遂作秦中吟一吟悲一事貴人皆怪怒間人亦非訾天髙未及聞荆棘生滿地惟有唐衢見知我平生志一讀興歎嗟再吟垂涕泗因和三十韻手題逺緘寄致我陳杜間賞愛非常意此人無復見此詩猶可貴今日開篋看蠧魚損文字不知何處葬欲問先歔欷終去哭墳前還君一掬淚陳杜謂子昻與甫也此詩猶可貴謂唐衢詩也問友種蘭不種艾蘭生艾亦生根荄相交長莖葉相附榮香莖與臭葉日夜俱長大鋤艾恐傷蘭溉蘭恐滋艾蘭亦未能溉艾亦未能除沉吟意不決問君合何如悲哉行悲哉為儒者力學不知疲讀書眼前一作欲暗秉筆手生胝十上方一第成名常苦遲縱有宦達者兩鬢已成絲可憐少壯日適在窮賤時丈夫老且病焉用富貴為沉沉朱門宅中有乳臭兒狀貌如婦人光明膏粱肌手不把書卷身不擐戎衣二十襲封爵門承勳戚資春來日日出服御何輕肥朝從博徒飲暮有娼樓期平封封讀去聲一作評封還酒債堆金選蛾眉聲色狗馬外其餘一無知山苖與澗松地勢隨高卑古來無奈何非獨君傷悲紫藤藤花紫蒙茸藤葉青扶疏誰謂好顔色而為害有餘下如蛇屈盤上若繩縈紆可憐中間樹束縳成枯株柔蔓不自勝嫋嫋挂空虛豈知纒樹木千夫力不如先柔後為害有似諛佞徒附著君權勢君迷不肻誅又如妖婦人綢繆蠱其夫奇邪壞人室夫惑不能除寄言邦與家所愼在其初毫末不早辨滋蔓信難圗願以藤為戒銘之於座隅放鷹十月鷹出籠草枯雉兔肥下韝隨指顧百擲無一遺鷹翅疾如風鷹瓜利如錐本為鳥所設今為人所資孰能使之然有術甚易知取其向背性制在飢飽時不可使長飽不可使長飢飢則力不足飽則背人飛乘飢縱搏擊未飽須縶維所以爪翅功而人坐收之聖明馭英雄其術亦如斯鄙語不可棄吾聞諸獵師慈烏夜啼慈烏失其母啞啞吐哀音晝夜不飛去經年守故林夜夜夜半啼聞者為沾襟聲中如告訴未盡反哺心百鳥豈無母爾獨哀怨深應是母慈重使爾悲不任昔有吳起者母殁喪不臨嗟哉斯徒輩其心不如禽慈烏復慈烏鳥中之曽參立名按此詩當是元和辛卯居憂之作燕詩示劉叟叟冇愛子背叟逃去叟甚悲念之叟少年時亦嘗如是故作燕詩以諭之梁上有雙燕翩翩雄與雌銜泥兩椽間一巢生四兒四兒日夜長索食聲孜孜青蟲不易捕黃口無飽期觜爪雖欲弊心力不知疲須臾千來往猶恐巢中飢辛勤三十日母瘦雛漸肥喃喃教言語一一刷毛衣一旦羽翼成引上庭樹枝舉翅不回顧隨風四散飛雌雄空中鳴聲盡呼不歸却入空巢裏啁啾終夜悲燕燕爾勿悲爾當返自思思爾為雛日髙飛背母時當時父母念今日爾應知采地黃者麥死春不雨禾損秋早霜歲晏無口食田中采地黃采之將何用持以易餱糧凌晨荷鋤去薄暮不盈筐攜來朱門家賣與白面郎與君啖肥馬可使照地光願易馬殘粟救此苦飢腸初入太行路天冷日不光太行峰蒼莽嘗聞此中險今我方獨往馬蹄凍且滑羊腸不可上若比世路難猶自平於掌鄧魴張徹落第古琴無俗韻奏罷無人聽寒松無妖花枝下無人行春風十二街軒騎不暫停奔車看牡丹走馬聽秦箏衆目悅芳豔松獨守其貞衆耳喜鄭衛琴亦不改聲懷哉二夫子念此無自輕送王處士王門豈無酒侯門豈無肉主人貴且驕待客禮不足望塵而拜者朝夕走碌碌王生獨拂衣遐舉如雲鵠寧歸白雲外飲水卧空谷不能隨衆人斂手低眉目扣門與我别沽酒留君宿好去采薇人終南山正緑村居苦寒八年十二月五日雪紛紛竹柏皆凍死况彼無衣民回觀村閭間十室八九貧北風利如劒布絮不蔽身唯燒蒿棘火愁坐夜待晨乃知大寒歲農者尤苦辛顧我當此日草堂深掩門褐裘覆絁被坐臥有餘溫幸免飢凍苦乂無壠畝勤念彼深可愧自問是何人納粟有吏夜扣門髙聲催納粟家人不待曉場上張燈燭揚簸淨如珠一車三十斛猶憂納不中鞭責及僮僕昔余謬從事內愧才不足連授四命官坐尸十年祿常聞古人語損益周必復今日諒甘心還他太倉榖薛中丞百人無一直百直無一遇借問遇者誰正人行得路中丞薛存誠守直心甚固皇明燭如日再使秉王度姦豪與佞巧非不憎且懼直道漸光明邪謀難蓋覆每因匪躬節知有匡時具張為墜網綱倚作頽簷柱悠哉上天意報施紛回互自古已冥茫從今尤不諭豈與小人意昏然同好惡不然君子人何反如朝露裴相按裴相指裴垍也昨已夭薛君今又去以我惜賢心五年如旦暮况聞善人命長短繫運數今我一涕零豈為中丞故秋池二首前池秋始半卉物多摧壞欲暮槿先委未霜荷巳敗默然有所感可以從兹誡本不種松筠早凋何足怪鑿池貯秋水中有蘋與芰天旱水暗消塌然委空地有似泛泛者附離權與貴一旦恩勢移相隨共憔悴夏旱太隂不離畢太歲仍在午旱日與炎風枮燋我田畝金石欲銷鑠况兹禾與黍嗷嗷萬族中唯農最辛苦憫然望歲者出門何所覩但見棘與茨羅生遍場圃惡苗承沴氣欣然得其所感此因問天可能長不雨諭友昨夜霜一降殺君庭中槐乾葉不待黃索索飛下來憐君感物節晨起步前階臨風踏葉立半日顔色哀一作低西望長安城歌鐘十二街何人不歡樂君獨心悠哉白日頭上走朱顔鏡中頽平生青雲心銷化成死灰我今贈一言勝飲酒千杯其言雖甚鄙可破悒悒懷朱門有勳貴陋巷有顔回窮通各有命不繫才不才推此自豁豁不必待安排丘中有一士命首句為題二首丘中有一士不知其姓名面色不憂苦血氣常和平每選隙地居不踏要路行舉動無尤悔物莫與之爭藜藿不充腸布褐不蔽形終歲守窮餓而無嗟歎聲豈是愛貧賤深知時俗情勿矜羅弋巧鸞鶴在冥冥丘中有一士守道歲月深行披帶索衣坐拍無絃琴不飲濁泉水不息曲木隂所逢苟非義糞土千黃金鄉人化其風薰如蘭在林智愚與強弱不忍相欺侵我欲訪其人將行復沉吟何必見其面但在學其心新製布裘桂布白似雪吳綿軟於雲布重綿且厚為裘有餘溫朝擁坐至暮夜覆眠達晨誰知嚴冬月支體暖如春中夕忽有念撫裘起逡巡丈夫貴兼濟豈獨善一身安得萬里裘蓋裹周四垠穩暖皆如我天下無寒人杏園中棗樹人言百果中唯棗凡且鄙皮皴似龜手葉小如鼠耳胡為不自知生花此園裏豈宜遇攀玩幸免遭傷毁二月曲江頭雜英紅旖旎棗亦在其間如嫫對西子東風不擇木吹煦長未已眼看欲合抱得盡生生理寄言遊春客乞君一回視君愛繞指柔從君憐栁把君求恱目豔不敢爭桃李君若作大車輪軸材須此蝦蟇和張十六嘉魚薦宗廟靈龜貢邦家應龍能致雨潤我百榖芽蠢蠢水族中無用者蝦蟇形穢肌肉腥出沒於泥沙六月七月交時雨正雱𩃱蝦蟇得其志快樂無以加地既蕃其生使之族類多天又與其聲得以相喧譁豈唯玉池上汚君清冷波何獨瑶瑟前亂君鹿鳴歌常恐飛上天跳躍隨姮娥往往蝕明月遣君無奈何寄隱者賣藥向都城行憩青門樹道逢馳驛者色有非常懼親族走相送欲别不敢住私怪問道傍何人復何故云是右丞相當國握樞務祿厚食萬錢恩深日三顧昨日延英對今日崖州去由來君臣間寵辱在朝暮青青東郊草中有歸山路歸去臥雲人謀身計非誤放魚自此後詩到江州作曉日提竹籃家僮買春蔬青青芹蕨下疊臥雙白魚無聲但呀呀以氣相喣濡傾籃寫地上撥刺長尺餘豈唯刀機憂坐見螻蟻圖脫泉雖巳久得水猶可蘇放之小池中且用救乾枯水小池窄狹動尾觸四隅一時幸苟活久逺將何如憐其不得所移放於南湖南湖連西江好去勿踟蹰施恩即望報吾非斯人徒不須泥沙底辛苦覔明珠文柏牀陵上有老柏柯葉寒蒼蒼朝為風煙樹暮為宴寢牀以其多竒文宜升君子堂刮削露節目拂拭生輝光玄斑狀貍首素質如截肪雖充悅目玩終乏周身防華彩誠可愛生理苦已傷方知自殘者為有好文章潯陽三題并序廬山多桂樹湓浦多修竹東林寺有白蓮花皆植物之貞徑秀異者雖宫囿省寺中未必能盡有夫物以多為賤故南方人不貴重之至有蒸㸑其桂剪棄其竹白眼於蓮花者豫惜其不生於北土也因賦三題以唁之廬山桂偃蹇月中桂結根依青天天風繞月起吹子下人間飄零委何處乃落匡廬山生為石上桂葉如剪碧鮮枝幹日長大根荄日牢堅不歸天上月空老山中年廬山去咸陽道里三四千無人為移植得入上林園不及紅花樹長栽溫室前湓浦竹潯陽十月天天氣仍溫燠有霜不殺草有風不落木玄冥氣力薄草木冬猶緑誰肻湓浦頭回眼看修竹其有顧盻者持刀斬且束剖劈青琅玕家家蓋牆屋吾聞汾晉間竹少重如玉胡為取輕賤生此西江曲東林寺白蓮東林北塘水湛湛見底清中生白芙蓉菡蓞三百莖白日發光彩清飇散芳馨泄香銀囊破瀉露玉盤傾我慙塵埃眼見此瓊瑶英乃知紅蓮花虛得清淨名夏萼敷未歇秋房結才成夜深衆僧寢獨起繞池行欲收一顆子寄向長安城但恐出山去人間種不生立名按祝穆方輿勝覽晉慧逺法師居廬山東林寺有白蓮池與劉遺民等十八人同修淨土之法然逺公招陶潛入社終不能致謝靈運求入社而以心雜不許是三者中白蓮尤為舊物大水潯陽郊郭間大水歲一至閭閻半漂蕩城堞多傾墜蒼茫生海色渺漫連空翠風卷白波翻日煎紅浪沸工商徹屋去牛馬登山避况當率稅時頗害農桑事獨有傭舟子鼓枻生意氣不知萬人災自覔錐刀利吾無奈爾何爾非久得志九月霜降後水涸為平地白香山詩集卷一
