body:
  text: 白香山詩集卷二十三歙縣汪立名編後集三格詩凡五十八首詠興五首并序七年四月豫罷河南府歸履道第廬舍自給衣儲自充無欲無營或歌或舞頽然自適蓋河洛間一幸人也遇興發詠偶成五章各以首句命為題目解印出公府解印出公府抖擻塵土衣百吏放爾散雙鶴隨我歸歸來履道宅下馬入柴扉馬嘶返舊櫪鶴舞還故池雞犬何欣欣鄰里亦依依年顔老去日生計勝前時有帛禦冬寒有榖防嵗饑飽於東方朔樂於榮啓期人生且如此此外吾不知出府歸吾廬出府歸吾廬靜然安且逸更無客干謁時有僧問疾家僮十餘人櫪馬三四匹慵發經旬卧興來連日出出逰愛何處嵩碧伊瑟瑟况有清和天正當疏散日身閒自為貴何必居榮秩心足即非貧豈惟金滿室吾觀權勢者苦以身徇物炙手外炎炎履氷中栗栗朝飢口忘味夕惕心憂失但有富貴名而無富貴實池上有小舟池上有小舟舟中有胡牀牀前有新酒獨酌還獨嘗熏若春日氣皎如秋水光可洗機巧心可蕩塵垢腸岸曲舟行遲一曲進一觴未知幾曲醉醉入無何鄉夤緣潭島間水竹深青蒼身閒心無事白日為我長我若未忘世雖閒心亦忙世若未忘我雖退身難藏我今異於是身世交相忘四月池水滿四月池水滿龜遊魚躍出吾亦愛吾池池邊開一室人魚雖異族其樂歸於一且與爾為徒逍遙同過日爾無羡滄海蒲藻可委質吾亦忘青雲衡茅足容䣛况吾與爾輩本非蛟龍匹假如雲雨來祗是池中物小庭亦有月小庭亦有月小院亦有花可憐好風景不解嫌貧家菱角執笙簧谷兒抹琵琶紅綃信手舞紫綃隨意歌菱谷紫紅皆小臧獲名也村歌與社舞客哂主人誇但問樂不樂豈在鐘鼓多客告暮將歸主稱日未斜請客稍深酌願見朱顔酡客知主意厚分數隨後加堂上燭未秉座中冠已峨左顧短紅袖右命小青蛾長跪謝貴客蓬門勞見過客散有餘興醉卧獨吟哦幕天而席地誰奈劉伶何秋涼閒卧殘暑晝猶長早涼秋尚嫩露荷散清香風竹含疏韻幽閒竟日卧衰病無人問薄暮宅門前槐花深一寸酬思黯相公見過敝居戲贈軒蓋光照地行人為徘徊呼傳君子出乃是故人來訪我入窮巷引君登小臺臺前多竹樹池上無塵埃貧家何所有新酒三兩杯欵曲語上馬從容復遲回留守不外宿日斜宫漏催但留金刀贈未接玉山頽家醖不敢惜待君來即開村妓不辭出恐君囅然咍再授賓客分司優穩四皓官清崇三品列伊豫再塵忝內愧非才哲俸錢七八萬給受無虛月分命在東司又不勞朝謁既資閒養疾亦賴慵藏拙賓友得從容琴觴恣怡悅乘籃城外去繫馬花前歇六逰金谷春五看龍門雪吾若默無語安知吾快活吾欲更盡言復恐人豪奪應為時所笑苦惜分司闕但問適意無豈論官冷熱把酒把酒仰問天古今誰不死所貴未死間少憂多歡喜窮通諒在天憂喜即由已是故達道人去彼而取此勿言未富貴久忝居祿仕借問宗族間幾人拖金紫勿憂漸衰老且喜加年紀試數班行中幾人及暮齒朝餐不過飽五鼎徒為爾夕寢止求安一衾而已矣此外皆長去聲物於我雲相似有子不留金何况兼無子首夏林靜蚊未生池靜蛙未鳴景長天氣好竟日和且清春禽餘哢在夏木新陰成兀爾水邉坐翛然橋上行自問一何適身閒官不輕料錢隨月用生計逐日營食飽慙伯夷酒足愧淵明陶潛詩云飲酒常不足壽倍顔氏子富百黔婁生有一即為樂况吾四者并所以私自慰雖老有心情代鶴我本海上鶴偶逢江南客感君一顧恩同來洛陽陌洛陽寡族類皎皎惟兩翼貌是天與髙色非日浴白主人誠可戀其奈軒庭窄飲啄雜雞羣年深損標格故鄉渺何處雲水重重隔誰念深籠中七換摩天翮立秋夕有懷夢得露簟􅧛竹青風扇蒲葵輕一與故人别再見新蟬鳴是夕涼飈起閒境入幽情回燈見棲鶴隔竹聞吹笙夜茶一兩杓秋吟三數聲所思渺千里雲水長洲城哭崔常侍晦叔頑賤一拳石精珍百錬金名價既相逺交分何其深中誠一以合外物不能侵逶迤二十年與世同浮沈晚有退閒約白首歸雲林垂老忽相失悲哉口語心春日嵩髙陽一作春日髙嵩陽秋夜清洛隂丘園共誰卜山水共誰尋風月共誰賞詩篇共誰吟花開共誰看酒熟共誰斟惠死莊杜口鍾歿師廢琴道理使之然從古非獨今吾道自此孤我情安可任惟將病眼淚一灑秋風襟新秋曉興濁暑忽巳退清宵未全長晨釭耿殘焰宿閣凝微香喔喔雞下樹輝輝日上梁枕低茵席軟卧穩身入牀睡足景猶早起初風乍涼展張小屏障收拾生衣裳還有惆悵事遲遲未能忘拂鏡梳白髮可憐氷照霜秋日與張賓客舒著作同逰龍門醉中狂歌凡二百三十八字秋天髙髙秋光清秋風嫋嫋秋蟲鳴嵩峯餘霞錦綺卷伊水細浪鱗甲生洛陽閒客知無數少出逰山多在城商嶺老人自追逐蓬丘逸士相逢迎南出鼎門十八里莊店邐迤橋道平不寒不熱好時節鞍馬穩快衣衫輕並轡踟蹰下西岸扣舷容與繞中汀開懷曠達無所繫觸目勝絶不可名荷衰欲黃荇猶緑魚樂自躍鷗不驚翠藻蔓長孔雀尾彩船櫓急寒鴈聲家醖一壺白玉液野花數把黃金英晝逰四看西日暮夜話三及東方明暫停杯觴輟吟詠我有狂言君試聽丈夫一生有二志兼濟獨善難得并不能救療生民病即須先濯塵土纓况吾頭白眼已暗終日戚促何所成不如展眉開口笑龍門醉卧香山行履信池櫻桃島上醉後走筆送别舒員外兼寄宗正李卿考功崔郎中櫻桃島前春去春花萬枝忽憶與宗卿閒飲日又憶與考功狂醉時嵗晚無花空有葉風吹滿地乾重疊踏葉悲秋復憶春池邉樹下重殷勤今朝一酌臨寒水此地三回别故人櫻桃花來春千萬朵來春共誰花下坐不論崔李上青雲明日舒三亦拋我秋池獨泛蕭疏秋竹籬清淺秋風池一隻短舫艇一張斑鹿皮皮上有野叟手中持酒巵半酣箕踞坐自問身為誰嚴子垂釣日蘇門長嘯時悠然意自得意外何人知冬日早起閒詠氷塘耀初旭風竹飄餘霰幽境雖目前不因閒不見晨起對爐香道經尋兩卷晚坐拂琴塵秋思彈一遍此外更無事開尊時自勸何必東風來一杯春上面嵗暮慘淡嵗云暮窮陰動經旬霜風裂人面氷雪摧車輪而我當是時獨不知苦辛晨炊廪有米夕㸑㕑有薪夾帽長覆耳重裘寬裹身加之一杯酒煦嫗如陽春洛城士與庶比屋多飢貧何處爐有火誰家甑無塵如我飽暖者百人無一人安得不慙愧放歌聊自陳南池早春有懷朝逰北池上晚憩南塘畔西日雪全消東風氷盡泮篩篩魚尾掉瞥瞥鵝毛換泥暖草芽生沙虛泉脈散晴芳冒苔島宿潤侵蒲岸洛下日初長江南春欲半時光共拋擲人事堪嗟歎倚櫂忽尋思去年池上伴古意脈脈復脈脈美人千里隔不見來幾時瑶草三四碧玉琴聲悄悄鸞鏡塵羃羃昔為連理枝今作分飛翮寄書多不達加飯終無益心腸不自寬衣帶何由窄山逰示小妓雙鬟垂未合三十才過半本是綺羅人今為山水伴春泉共揮弄好樹同攀玩笑容花底迷酒思風前亂紅凝舞袖急黛慘歌聲緩莫唱楊栁枝無腸與君斷神照禪師同宿八年三月晦山梨花滿枝龍門水西寺夜與逺公期晏坐自相對密語誰得知前後際斷處一念不生時張常侍相訪西亭晚寂寞鶯散栁陰繁水户簾不卷風牀席自翻忽聞車馬客來訪蓬蒿門况是張常侍安得不開尊早夏逰宴雖慵興猶在雖老心猶健昨日山水逰今朝花酒宴山榴艷似火玉蘂飄如霰榮落逐瞬遷炎凉隨刻變未收木綿褥巳動蒲葵扇且喜物與人年年得相見感白蓮花白白芙容花本生吳江濆不與紅者雜色類自區分誰移爾至此姑蘇白使君初來苦憔悴久乃芳氛氲月月葉換葉年年根生根陳根與故葉銷化成泥塵化者日已逺來者日復新一為池中物永别江南春忽憶西涼州中有天寶民埋沒漢父祖孳生胡子孫巳忘鄉土戀豈念君親恩生人尚復爾草木何足云詠所樂獸樂在山谷魚樂在陂池蟲樂在深草鳥樂在髙枝所樂雖不同同歸適其宜不以彼易此况論是與非而我何所樂所樂在分司分司有何樂樂哉人不知官優有祿料職散無羈縻懶與道相近鈍將閒自隨昨朝拜表回今晚行香歸歸來北窗下解巾脫塵衣冷泉灌我頂暖水濯四肢體中幸無疾卧任清風吹心中又無事坐任白日移或開書一編或飲酒一巵但得如今日終身無厭時思舊閒日一思舊舊逰如目前再思今何在零落歸下泉退之服流黃一病訖不痊微之錬秋石未老身溘然杜子得丹訣終日斷腥羶崔君誇藥力經冬不衣綿或疾或暴夭悉不過中年惟豫不服食老命反遲延况在少壯時亦為嗜欲牽但耽葷與血不識汞與鉛飢來吞熱物渴來飲寒泉詩役五藏神酒汨三丹田隨日合破壞至今粗完全齒牙未缺落肢體尚輕便已開第七秩飽食仍安眠且盡杯中物其餘皆付天寄盧少尹老誨心不亂莊誡形太勞生命既能保死籍亦可逃嘉殽與㫖酒信是腐腸膏艷聲與麗色真為伐性刀補養在積功如裘集衆毛將欲致千里可得差一毫心不亂形太勞至差一毫皆出老莊及諸道書仙方禁誡顔回何為者簞瓢才自給肥膿不到口年不登三十張蒼何為者染愛浩無際妾媵填後房竟壽百餘嵗蒼壽有何德回夭有何辜誰謂具聖體不如肥瓠軀遂使世俗心多疑仙道書寄問盧先生此理當何如池上清晨候皇甫郎中曉景麗未熱晨飈鮮且凉池幽緑蘋合霜潔白蓮香深掃竹間徑靜拂松下牀玉柄鶴翎扇銀罌雲母漿屏除無俗物瞻望惟清光何人擬相訪嬴女從蕭郎詠懷我知世無幻了無干世意世知我無堪亦無責我事由兹兩相忘因得長自遂自遂意何如閒官在閒地閒地惟東都東都少名利閒官是賓客賓客無牽纍嵇康日日懶畢卓時時醉酒肆夜深歸僧房日髙睡形安不勞苦神泰無憂畏從官三十年無如今氣味鴻雖脫羅弋鶴尚居祿位惟此未忘懷有時猶內愧北窗三友今日北窗下自問何所為欣然得三友三友者為誰琴罷輒舉酒酒罷輒吟詩三友遞相引循環無已時一彈愜中心一詠暢四肢猶恐中有間以醉彌縫之豈獨吾拙好古人多若斯嗜詩有淵明嗜琴有啓期嗜酒有伯倫三人皆吾師或乏儋石儲或穿帶索衣絃歌復觴詠樂道知所歸三師去巳逺髙風不可追三友逰甚熟無日不相隨左擲白玉巵右拂黃金徽興酣不疊紙走筆操狂詞誰能持此詞為我謝親知縱未以為是豈以我為非吟四雖雜言酒酣後歌歇時請君添一酌聽我吟四雖年雖老猶少於韋長史命雖薄猶勝於鄭長水眼雖病猶明於徐郎中家雖貧猶富於郭庶子省躬審分何僥幸值酒逢歌且歡喜忘榮知足委天和亦應得盡生生理分司同官中韋長史績年七十餘郭庶子求貧苦最甚徐郎中晦因疾喪明余為河南尹時見同年鄭俞始授長水縣令因歎四子而成此篇也裴侍中晉公以集賢林亭即事詩二十六韻見贈猥䝉徴和才拙詞䋣輒廣為五百言以伸酬獻三江路千里五湖天一涯何如集賢第中有平津池池勝主見覺景新人未知竹森翠琅玕水深洞琉璃水竹以為質質立而文隨文之者何人公來親指麾疏鑿出人意結構得地宜虛襟一搜索勝槩無遁遺因下張沼沚依髙築階基嵩峯見數片伊水分一支南溪修且直長波碧逶迤北館壯復麗倒影紅參差東島號晨光杲曜迎朝曦西嶺名夕陽杳曖留落暉前有水心亭動蕩架漣漪後有開闔堂寒溫變天時幽泉鏡泓澄怪石山攲危已上八所各具本名春葩雪漠漠謂杏花島夏果珠離離謂櫻桃島主人命方舟宛在水中坻親賓次第至酒樂前後施解纜始登泛山逰仍水嬉沿洄無滯礙向背窮幽竒瞥過逺橋下飄旋深澗陲管絃去縹眇羅綺來霏微櫂風逐舞回梁塵隨歌飛宴餘日云暮醉客未放歸髙聲索彩箋大笑催金巵唱和筆走疾問答杯行遲一詠清兩耳一酣暢四肢主客忘貴賤不知俱是誰客有詩魔者吟哦不知疲乞公殘紙墨一掃狂歌詞維云社稷臣赫赫文武姿十授丞相印五建大將旗四朝致勛華一身冠臯夔去年才七十決赴懸車期公志不可奪君恩亦難違從容就中道俯僶來保釐貂蟬雖未脫鸞凰巳不羈厯徴今與古獨步無等夷陸賈功業少二疏官秩卑乘舟范蠡懼辟榖留侯飢豈若公今日身安家國肥羊祜在漢南空留峴首碑栁惲在江南祗賦汀洲詩謝安入東山但說攜蛾眉山簡醉髙陽惟聞倒接䍦豈如公今日餘力兼有之願公壽如山安樂長在兹願我比蒲稗永得相因依謝靈運詩云蒲稗相因依立名按韻語陽秋張衡詩客賦醉言歸主稱露未晞白詩有客告暮將歸主稱日未斜載觀此注可見公極平易句亦必有本蓋唐人最重文選也晚歸香山寺因詠所懷我年日已老我身日已閒閒出都門望但見水與山關塞碧巖巖伊流清潺潺中有古精舍軒户無扃關岸草歇可藉徑蘿行可攀朝隨浮雲出夕與飛鳥還吾道本迂拙世途多險艱嘗聞嵇呂輩尤悔生疏頑巢悟入箕潁皓知返商顔豈惟樂肥遁聊復袪憂患吾亦從此去終老伊嵩間立名按劇談録樂天為少傅分務洛師情興髙逸盧尚書簡辭有别墅近枕伊水冬日與羣從子姪同逰倚欄眺嵩洛俄而霰雪微下情興益髙因話亷察金陵常記江南煙水每見居人以葉舟浮泛就食菰米鱸魚近來思之如在心目良久忽見二人衣蓑笠循岸而來牽引蓬艇船頭覆青幕中有白衣人與衲僧偶坐船後有小竈安桐甑丱角童煮茗泝流過於檻前舟中吟嘯方酣問之乃是白傅與僧佛光自建春門往香山精舍此一段可謂天然圖畫張常侍池涼夜閒宴贈諸公竹橋新月上水岸涼風至對月五六人管絃三兩事留連池上酌欵曲城外意或嘯或謳吟誰知此閒味回看市朝客矻矻趨名利朝忙少逰宴夕困多眠睡清涼屬吾徒相逢勿辭醉和皇甫郎中秋曉同登天宫閣言懷六韻碧天忽巳髙白日猶未短玲瓏曉樓閣清脆秋絲管張翰一杯酣嵇康終日懶塵中足憂纍雲外多疏散病木斧斤遺𡨕鴻羈紲斷逍遙二三子永願為閒伴送吕漳州今朝一壺酒言别漳州牧半自要閒逰愛花憐草緑花前下鞍馬草上攜絲竹行客飲數杯主人歌一曲端居惜風景屢出勞僮僕獨醉似無名借君作題目短歌行世人求富貴多為奉嗜欲盛衰不自由得失常相逐問君少年日苦學將干祿負笈塵中逰抱書雪前讀布衾不周體藜茄才充腹三十登宦途五十被朝服奴溫新挾纊馬肥初食粟未敢議歡逰尚為名檢束耳目聾暗後堂上調絲竹牙齒缺落時盤中堆酒肉彼來此巳去外餘中不足少壯與榮華相避如寒燠青雲去地逺白日經天速從古無奈何短歌聽一作空一曲詠懷髙人樂丘園中人慕官職一事尚難成兩途安可得遑遑干世者多苦時命塞亦有愛閒人又為窮餓逼我今幸雙遂祿仕兼遊息未嘗羡榮華不省勞心力妻孥與婢僕亦免愁衣食所以吾一家面無憂喜色府西亭納涼歸避暑府西亭晚歸有閒思夏淺蟬未多緑槐陰滿地帶寬衫解領馬穩人攏轡面上有涼風眼前無俗事路經府門過落日照官次牽聯縲絏囚奔走塵埃吏低眉悄不語誰復知兹意憶得五年前晚衙時氣味老熱一飽百情足一酣萬事休何人不衰老我老心無憂仕者拘職役農者勞田疇何人不苦熱我熱身自由卧風北窗下坐月南池頭腦凉脫烏帽足熱濯清流慵發晝髙枕興來夜泛舟何乃有餘適祗緣無過求或問諸親友樂天是與不亦無别言語多道太悠悠悠悠君不知此味深且幽但恐君知後亦來從我逰新秋喜涼因寄兵部楊侍郎外强火未退中鋭金方戰一夕風雨來炎涼隨數變徐徐炎景度稍稍涼飈扇枕簟忽淒清巾裳亦輕健老夫納秋候心體殊安便睡足一屈伸搔首摩挲面褰簾對池竹幽寂如僧院俯觀游魚羣仰數浮雲片閒忙各有趣彼此寧相見昨日聞慕巢召對延英殿懶放二首呈劉夢得吳方之青衣報平旦呼我起盥櫛今早天氣寒郎君應不出又無賓客至何以銷閒日已向微陽前暖酒開詩帙朝憐一牀日暮愛一爐火牀暖日髙眠爐溫夜深坐雀羅門懶出鶴髮頭慵裹除却劉與吳何人來問我六十六病知心力減老覺光隂速五十八歸來今年六十六鬢絲千萬白池草八九緑童稚盡成人園林半喬木看山倚髙石引水穿深竹雖有潺湲聲至今聽未足三適贈道友褐綾袍厚暖卧蓋行坐披紫氊履寬穩蹇步頗相宜足適已忘履身適已忘衣况我心又適兼忘是與非三適合為一怡怡復熙熙禪那不動處混沌未鑿時此固不可說為君强言之洛陽春贈劉李二賓客齊梁格水南冠蓋地城東桃李園雪消洛陽堰春入永通門淑景方靄靄逰人稍喧喧年豐酒漿賤日晏歌吹繁中有老朝客華髮映朱軒從容三兩人藉草開一尊尊前春可惜身外事勿論明日期何處杏花逰趙村洛城東有趙村杏花千餘樹寒食人老何所樂樂在歸鄉國我歸故園來九度逢寒食故園在何處池館東城側四鄰梨花時二月伊水色豈獨好風土仍多舊親戚出去恣歡逰歸來聊燕息有官供祿俸無事勞心力但恐優穩多微躬消不得寄李蘇州兼示楊瓊真娘墓頭春草碧心奴鬢上秋霜白為問蘇臺酒席中使君歌笑與誰同就中猶有楊瓊在堪上東山伴謝公和裴令公一日日一年年雜言見贈一日日作老翁一年年過春風公心不以貴隔我我散惟將閒伴公我無才能忝髙秩合是人間閒散物公有功德在生民何因得作自由身前日魏王潭上宴連夜今日午橋池頭逰拂晨山客硯前吟待月野人樽前醉送春不敢與公閒中爭第一亦應占得第二第三人奉和裴令公三月上巳日逰太原龍泉憶去嵗禊洛見示之作依來體雜言去嵗暮春上已共泛洛水中流今嵗暮春上已獨立香山下頭風光閒寂寂旌斾逺悠悠丞相府歸晉國太行山礙并州鵬背負天龜曵尾雲泥不可得同遊立名按公集雜言對偶者今本皆作律詩然公與元九書云有五言七言長句絶句自百韻至兩韻者謂之雜律詩未嘗及雜言也今俱附格詩鹽官胡氏本則别長短句一體以歸之憶江南詞三首此曲亦名謝秋娘每首五句江南好風景舊曽諳日出江花紅勝火春來江水緑如藍能不憶江南江南憶最憶是杭州山寺月中尋桂子郡亭枕上看潮頭何日更重逰江南憶其次憶吳宫吳酒一杯春竹葉吳娃雙舞醉芙蓉早晚復相逢立名按郭茂倩云憶江南一曰望江南樂府雜録曰望江南本名謝秋娘李德裕鎮浙西為妾謝秋娘所製改為望江南泛小䑳二首水一塘䑳一隻䑳頭漾漾知風起䑳背蕭蕭聞雨滴醉卧船中欲醒時忽疑身是江南客船緩進水平流一莖竹篙剔船尾兩幅青幕覆船頭亞竹亂藤多照岸如從鳳口向湖洲白香山詩集卷二十三
