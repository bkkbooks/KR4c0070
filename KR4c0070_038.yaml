body:
  text: 白香山詩集巻三十八歙縣汪立名編別集一格律詩凡十一首窗中列逺岫以題中平聲為韻正按各本别附宣州試射中鵠賦後天靜秋山好窗開曉翠通遥憐峰窈窕不隔竹朦朧一作蒙籠萬㸃當虚室千重疊逺空列檐攢秀氣縁隙助清風碧愛新晴後明宜反照中宣城郡齋在望與古時一作古詩同玉水記方流以流字為韻六十字成近按各本别附省試性習相逺賦後原注中書侍郎髙郢下試貞元十六年二月十四日及第四人良璞含章久寒泉徹底幽矩浮光灎灎一作尹和光泛泛方折浪悠悠凌亂波紋異縈迴水性柔似風揺淺瀨疑一作如月落清流潛潁應傍達藏真豈上浮玉人如不見淪棄即千秋立名按貞元十六年公年二十九唐詩紀事作二十八誤也洪景盧容齋随筆予考登科記樂天以貞元十六年庚辰中書舍人髙郢下第四人與公自注正合且記事載鄭兪吳丹杜元穎玉水記方流詩云兪登貞元十六年進士第吳丹杜元穎白居易皆同年又云居易徳宗貞元十六年己夘髙郢下及第時年二十八不知徳宗貞元十六年乃庚辰非己夘也公壬子生至庚辰為二十九然則二十八者殆因巳夘而訛耳又注云傳作二十七李商隱墓銘作二十六按新書不詳登第年嵗舊書但誤作十四年進士第未嘗云二十七至李作墓碑亦僅曰前進士並無二十六及第語矛盾如此不知何所据也公應試詩賦皆擅名一時唐摭言貞元中樂天應宏詞試漢髙祖斬白蛇賦考落蓋賦有知我者謂我斬白帝不知我者謂我斬白蛇也然登科之人賦並無聞白公之賦傳於天下也容齋隨筆唐銓選凡試判登科謂之入等甚拙者謂之藍縷選未滿而試文三篇謂之宏辭試判三條謂之㧞萃中者即授官按樂天後以拔萃登科大社觀獻捷詩以功字為韻四韻成原注元和二年十一月四日自集賢院召赴銀臺候㫖五日召入翰林奉敕試制書詔批荅詩等五首翰林院使梁守謙奉宣宜授翰林學士數月除左拾遺淮海妖氛滅乾坤嘉一作喜氣通班師郊社内操袂凱歌中廟算無遺策天兵不戰功小臣同鳥獸率舞向皇風立名按元稹酬樂天六韻詩自注云樂天於翰林中書取詔批荅等撰為程式禁中號曰白樸每有新入學士求訪寳重過於六典也自誨樂天樂天來與汝言汝宜拳拳終身行焉物有萬類錮人如鎻事有萬感爇人如火萬類逓來鏁汝形骸使汝未老形枯如柴萬感逓至火汝心懐使汝未死心化為灰樂天樂天可不大哀汝胡不懲往而念來人生百嵗七十稀設使與汝七十期汝今年已四十四却後二十六年能㡬時汝不思二十五六年來事疾速倏忽如一寐往日來日皆瞥然胡為自苦於其間樂天樂天可不大哀而今而後汝宜飢而食渴而飲晝而興夜而寢無浪喜無妄憂病則臥死則休此中是汝家此中是汝鄉汝何捨此而去自取其遑遑遑遑兮欲安往哉樂天樂天歸去來立名按公年四十四為憲宗元和十年乙未是年盜殺武相元衡公以請捕賊不悅於執政謫江州即在是年三謡并序余廬山草堂中有朱藤杖一蟠木机一素屏風二時多杖藤而行隱机而坐掩屏而臥宴息之暇筆研在前偶為三謡各導其意亦猶座右陋室銘之類爾蟠木謡蟠木蟠木有似我身不中乎器無用於人下擁腫而上轔菌桷不桷兮輪不輪天子建明堂兮既非梁棟諸侯斵大輅兮材又不中唯我病夫或有所用用爾為几承吾臂支吾頤而已矣不傷爾性不枉爾理爾怏怏為几之外無所用爾爾既不材吾亦不材胡為乎人間徘徊蟠木蟠木吾與汝歸草堂去來素屏謡素屏素屏胡為乎不文不飾不丹不青當世豈無李陽冰之篆字張旭之筆迹邊鸞之花鳥張璪之松石吾不令加一㸃一畫於其上欲爾保真而全白吾於香爐峰下置草堂二屏倚在東西牆夜如明月入我室一作懐曉如白雲圍我牀我心久養浩然氣亦欲與爾表裏相輝光爾不見當今甲第與王宫織成步障銀屏風綴珠陷鈿貼雲母五金七寳相玲瓏貴豪待此方悅目晏然寢臥乎其中素屏素屏物各有所宜用各有所施爾今木為骨兮紙為面捨吾草堂欲何之朱藤謡朱藤朱藤温如紅玉直如朱繩自我得爾以為杖大有裨於股肱前年左選東南萬里交遊别我於國門親友送我於滻水登髙山兮車倒輪摧渡漢水兮馬跙蹄開中途不進部曲多迴唯此朱藤實隨我來瘴癘之鄉無人之地扶衛衰病驅訶魑魅吾獨一身賴爾為二或水或陸自北徂南泥黏雪滑足力不堪吾本兩足得爾為三紫霄峰頭黄石巖下松門石磴不通輿馬吾與爾披雲撥水環山繞野二年蹋徧匡廬間未嘗一歩而相捨雖有佳子弟良友朋扶危助蹇不如朱藤嗟乎窮既若是通復何如吾不以常杖待爾爾勿以常人望吾朱藤朱藤吾雖青雲之上黄泥之下誓不棄爾於斯須無可柰何歌無可柰何兮白日走而朱顔頽少日往而老日催生者不住兮死者不迴況乎寵辱豐顇之外物又何常不十去而一來去不可挽兮來不可推無可柰何兮巳焉哉惟天長而地久前無始兮後無終嗟吾生之㡬何寄瞬息乎其中又如太倉之稊米委一粒於萬鍾何不與道逍遥委化從容縱心放志洩洩融融胡為乎分愛惡於生死繫憂喜於窮通倔强其骨髓齟齬其心胷合冰炭以交戰祗自苦兮厥躬彼造物者云何不為此與化者云何不隨或喣或吹或盛或衰雖千變與萬化委一順以貫之為彼何非為此何是誰冥此心夢蝶之子何禍非福何吉非凶誰達此觀喪馬之翁俾吾為秋毫之杪吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多是以達人靜則脗然與陰合迹動則浩然與陽同波委順而已孰知其他時邪命邪吾其無柰彼何委邪順邪彼亦無柰吾何夫兩無柰何然後能冥至順而合太和故吾所以飲太和扣至順而為無可柰何之歌池上篇并序都城風土水木之勝在東南偏東南之勝在履道里里之勝在西北隅西閈北垣第一第即白氏叟樂天退老之地地方十七畝屋室三之一水五之一竹九之一而島樹橋道間之初樂天既為主喜且曰雖有臺無粟不能守也乃作池東粟廩又曰雖有子弟無書不能訓也乃作池北書庫又曰雖有賔朋無琴酒不能娛也乃作池西琴亭加石樽焉樂天罷杭州刺史時得天竺石一華亭鶴二以歸始作西平橋開環池路罷蘇州刺史時得太湖石白蓮折腰菱青版舫以歸又作中髙橋通三島逕罷刑部侍郎時有粟千斛書一車洎臧獲之習筦磬絃歌者指百以歸先是潁川陳孝山與釀法酒味甚佳博陵崔晦叔與琴韻甚清蜀客姜發授秋思聲甚淡𢎞農楊貞一與青石三方長平滑可以坐臥太和三年夏樂天始得請為太子賔客分秩於洛下息躬於池上凡三任所得四人所與洎吾不才身今率為池中物矣每至池風春池月秋水香蓮開之旦露清鶴唳之夕拂楊石舉陳酒援崔琴彈姜秋思頽然自適不知其他酒酣琴罷又命樂童登中島亭合奏霓裳散序聲隨風飄或凝或散悠揚於竹煙波月之間者久之曲未竟而樂天陶然巳醉睡於石上矣睡起偶詠非詩非賦阿龜握筆因題石間視其粗成韻章命為池上篇云爾十畞之宅五畞之園有水一池有竹千竿勿謂土狹勿謂地偏足以容厀足以息肩有堂有庭有橋有船有書有酒有歌有絃有叟在中白鬚飄然識分知足外無求焉如鳥擇木姑務巢安如龜居坎不知海寛靈鶴怪石紫菱白蓮皆吾所好盡在吾前時飲一杯或吟一篇妻孥熙熙雞犬閒閒優哉游哉吾將終老乎其間立名按公有奉和牛思黯太湖石兼呈夢得詩其末云共嗟無此分虚管太湖來自注與夢得俱典姑蘇而不獲此石而此詩序中又云罷蘇州刺史時得太湖石豈歸洛既久舊物皆不復存邪齒落辭并序開成二年予春秋六十六瘠黒衰白老狀具矣而雙齒又墮慨然感歎者久之因為齒落辭以自廣其辭曰嗟嗟乎雙齒自吾有之爾俾爾嚼肉咀蔬銜杯潄水豐吾膚革滋吾血髓從幼逮老勤亦至矣幸有輔車非無齗齶胡然捨我一旦雙落齒雖無情吾豈無情老與齒別齒隨涕零我老日來爾去不迴嗟嗟乎雙齒孰謂而來哉孰謂而去哉齒不能言請以意宣為口中之物忽乎六十餘年昔君之壯也血剛齒堅今君之老矣血衰齒寒輔車齗齶日削月朘上參差而下危瓦危臬曾何足以少安嘻君其聽哉女長辭姥臣老辭主髮衰辭頭葉枯辭樹物無細大功成者去君何嗟嗟獨不聞諸道經我身非我有也蓋天地之委形君何嗟嗟又不聞諸佛說是身如浮雲須臾變滅由是而言君何有焉所宜委百骸而順萬化胡為乎嗟嗟於一牙一齒之間吾應曰吾過矣爾之言然不能忘情吟并序樂天既老又病風乃録家事㑹經費去長物妓有樊素者年二十餘綽綽有歌舞態善唱楊枝人多以曲名名之由是名聞洛下籍在經費中將放之馬有駱者駔壯駿穩乗之亦有年籍在經物中將鬻之圉人牽馬出門馬驤首反顧一鳴聲音間佀知去而旋戀者素聞馬嘶慘然立且拜婉孌有辭辭具下辭畢泣下予聞素言亦愍黙不能對且命迴勒反袂飲素酒自飲一杯快吟數十聲聲成文文無定句句隨吟之短長也凡二百五十五言噫予非聖達不能忘情又不至於不及情者事來攪情情動不可柅因自哂題其篇曰不能忘情吟吟曰鬻駱馬兮放楊栁枝掩翠黛兮頓金羈馬不能言兮長鳴而却顧楊栁枝再拜長跪而致辭辭曰主乗此駱五年凡千有八百日銜橜之下不驚不逸素事主十年凡三千有六百日巾櫛之間無違無失今素貌雖陋未至衰摧駱力猶壯又無虺隤即駱之力尚可以代主一歩素之歌亦可以送主一杯一旦雙去有去無迴故素將去其辭也苦駱將去其鳴也哀此人之情也馬之情也豈主君獨無情哉予俯而歎仰而咍且曰駱駱爾勿嘶素素爾勿啼駱反廏素反閨吾疾雖作年雖頽幸未及項籍之將死何必一日之内棄騅兮而別虞兮乃目素兮素兮為我歌楊栁枝我姑酌彼金罍我與爾歸醉鄉去來立名按冷齋夜話東坡南遷侍兒王朝雲者請從行東坡佳之作詩有不學楊枝别樂天句其序云世謂樂天有鬻駱放楊枝詞佳其至老病不忍去也然夢得詩曰春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相共住春同樊素一時歸則是樊素竟去也白香山詩集巻三十八
